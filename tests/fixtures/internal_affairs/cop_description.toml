cop = "InternalAffairs/CopDescription"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_internalaffairs_copdescription_the_description_starts_with_this_cop_registers_an_offense_and_corrects_if_using_just_a_verb"
source = '''
module RuboCop
  module Cop
    module Lint
      # This cop checks some offenses...
      #
      # ...
      class Foo < Base
      end
    end
  end
end
'''
corrected = '''
module RuboCop
  module Cop
    module Lint
      # Checks some offenses...
      #
      # ...
      class Foo < Base
      end
    end
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 8
column_end = 40
message = "Description should be started with `Checks` instead of `This cop ...`."

