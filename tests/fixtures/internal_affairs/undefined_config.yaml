cop: InternalAffairs/UndefinedConfig
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_undefinedconfig_does_not_register_an_offense_for_implicit_configuration_keys
    source: |
      module RuboCop
        module Cop
          module Test
            class Foo < Base
              def configured?
                #{described_class::ALLOWED_CONFIGURATIONS.map { "cop_config['#{_1}']" }.join("\n          ")}
              end
            end
          end
        end
      end
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_undefinedconfig_registers_an_offense_when_the_cop_has_no_configuration_at_all
    source: |
      module RuboCop
        module Cop
          module Test
            class Bar < Base
              def configured?
                cop_config['Missing']
              end
            end
          end
        end
      end
    offenses:
      - line: 6
        column_start: 21
        column_end: 30
        message: "`Missing` is not defined in the configuration for `Test/Bar` in `config/default.yml`."

  - name: rubocop_cop_internalaffairs_undefinedconfig_registers_an_offense_when_the_cop_is_not_within_the_rubocop_cop_namespace
    source: |
      module Test
        class Foo < Base
          def configured?
            cop_config['Defined']
            cop_config['Missing']
          end
        end
      end
    offenses:
      - line: 5
        column_start: 17
        column_end: 26
        message: "`Missing` is not defined in the configuration for `Test/Foo` in `config/default.yml`."

