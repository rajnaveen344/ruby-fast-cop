cop: InternalAffairs/CopEnabled
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_copenabled_with_for_cop_registers_an_offense_when_using_config_for_cop_enabled
    source: |
      config.for_cop('Foo/Bar')['Enabled']
    offenses:
      - line: 1
        column_start: 0
        column_end: 36
        message: "Use `config.cop_enabled?('Foo/Bar')` instead [...]"
    corrected: |
      config.cop_enabled?('Foo/Bar')

  - name: rubocop_cop_internalaffairs_copenabled_with_for_cop_registers_an_offense_when_using_config_for_cop_enabled
    source: |
      ‹BASE›0‹/BASE›
      @config.for_cop('Foo/Bar')['Enabled']
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Use `@config.cop_enabled?('Foo/Bar')` instead [...]"
    corrected: |
      ‹BASE›0‹/BASE›
      @config.cop_enabled?('Foo/Bar')

  - name: rubocop_cop_internalaffairs_copenabled_with_for_cop_maintains_existing_quote_style_when_correcting
    source: |
      ‹BASE›0‹/BASE›
      @config.for_cop("Foo/Bar")["Enabled"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Use `@config.cop_enabled?(\"Foo/Bar\")` instead [...]"
    corrected: |
      ‹BASE›0‹/BASE›
      @config.cop_enabled?("Foo/Bar")

  - name: rubocop_cop_internalaffairs_copenabled_with_for_cop_does_not_register_an_offense_when_enabled_is_a_symbol
    source: |
      ‹BASE›0‹/BASE›
      @config.for_cop('Foo/Bar')[:Enabled]
    offenses:
      []

  - name: rubocop_cop_internalaffairs_copenabled_when_checking_config_enabled_registers_an_offense_and_does_not_correct_with_a_method_call
    source: |
      return false unless argument_alignment_config['Enabled']
      
      argument_alignment_config['EnforcedStyle'] == 'with_fixed_indentation'
    offenses:
      - line: 1
        column_start: 20
        column_end: 56
        message: Consider replacing uses of `argument_alignment_config` with `config.for_enabled_cop`.

  - name: rubocop_cop_internalaffairs_copenabled_when_checking_config_enabled_registers_an_offense_and_does_not_correct_with_a_local_variable
    source: |
      argument_alignment_config = config.for_cop('Layout/ArgumentAlignment')
      return false unless argument_alignment_config['Enabled']
      
      argument_alignment_config['EnforcedStyle'] == 'with_fixed_indentation'
    offenses:
      - line: 2
        column_start: 20
        column_end: 56
        message: Consider replacing uses of `argument_alignment_config` with `config.for_enabled_cop`.

  - name: rubocop_cop_internalaffairs_copenabled_when_checking_config_enabled_registers_an_offense_and_does_not_correct_with_an_instance_variable
    source: |
      ‹BASE›0‹/BASE›
      @argument_alignment_config = config.for_cop('Layout/ArgumentAlignment')
      return false unless @argument_alignment_config['Enabled']
      
      @argument_alignment_config['EnforcedStyle'] == 'with_fixed_indentation'
    offenses:
      - line: 2
        column_start: 20
        column_end: 57
        message: Consider replacing uses of `@argument_alignment_config` with `config.for_enabled_cop`.

  - name: rubocop_cop_internalaffairs_copenabled_when_checking_config_enabled_does_not_register_an_offense_when_the_hash_name_does_not_end_with_config
    source: |
      foo['Enabled']
    offenses:
      []
