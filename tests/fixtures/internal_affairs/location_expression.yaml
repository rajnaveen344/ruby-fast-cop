tests:
  - name: rubocop_cop_internalaffairs_locationexpression_registers_and_corrects_an_offense_when_using_location_expression
    source: |
      node.location.expression
    offenses:
      - line: 1
        column_start: 5
        column_end: 24
        message: Use `source_range` instead.
    corrected: |
      node.source_range

  - name: rubocop_cop_internalaffairs_locationexpression_registers_and_corrects_an_offense_when_using_node_location_expression
    source: |
      node&.location&.expression
    offenses:
      - line: 1
        column_start: 6
        column_end: 26
        message: Use `source_range` instead.
    corrected: |
      node&.source_range

