cop: InternalAffairs/RedundantExpectOffenseArguments
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_registers_an_offense_when_using_expect_no_offenses_with_string_and_single_keyword_arguments
    source: |
      expect_no_offenses('code', keyword: keyword)
    offenses:
      - line: 1
        column_start: 25
        column_end: 43
        message: Remove the redundant arguments.
    corrected: |
      expect_no_offenses('code')

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_registers_an_offense_when_using_expect_no_offenses_with_heredoc_and_single_keyword_arguments
    source: |
      expect_no_offenses(<<~CODE, keyword: keyword)
      CODE
    offenses:
      - line: 1
        column_start: 26
        column_end: 44
        message: Remove the redundant arguments.
    corrected: |
      expect_no_offenses(<<~CODE)
      CODE

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_registers_an_offense_when_using_expect_no_offenses_with_heredoc_multiple_keyword_arguments
    source: |
      expect_no_offenses(<<~CODE, foo: foo, bar: bar)
      CODE
    offenses:
      - line: 1
        column_start: 26
        column_end: 46
        message: Remove the redundant arguments.
    corrected: |
      expect_no_offenses(<<~CODE)
      CODE

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_does_not_register_an_offense_when_using_expect_no_offenses_with_string_argument_only
    source: |
      expect_no_offenses('code')
    offenses:
      []

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_does_not_register_an_offense_when_using_expect_no_offenses_with_heredoc_argument_only
    source: |
      expect_no_offenses(<<~CODE)
      CODE
    offenses:
      []

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_does_not_register_an_offense_when_using_expect_no_offenses_with_string_and_positional_arguments
    source: |
      expect_no_offenses('code', file)
    offenses:
      []

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_does_not_register_an_offense_when_using_expect_no_offenses_with_heredoc_and_positional_arguments
    source: |
      expect_no_offenses(<<~CODE, file)
      CODE
    offenses:
      []

  - name: rubocop_cop_internalaffairs_redundantexpectoffensearguments_does_not_crash_when_using_expect_no_offenses_with_no_arguments
    source: |
      expect_no_offenses
      CODE
    offenses:
      []
