cop = "InternalAffairs/CopEnabled"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopinternalaffairscopenabled_with_for_cop_registers_an_offense_when_using_configfor_copenabled"
source = '''
config.for_cop('Foo/Bar')['Enabled']
'''
corrected = '''
config.cop_enabled?('Foo/Bar')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 36
message = "Use `config.cop_enabled?('Foo/Bar')` instead [...]"

[[tests]]
name = "rubocopcopinternalaffairscopenabled_with_for_cop_registers_an_offense_when_using_configfor_copenabled_2"
source = '''
@config.for_cop('Foo/Bar')['Enabled']
'''
corrected = '''
@config.cop_enabled?('Foo/Bar')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 37
message = "Use `@config.cop_enabled?('Foo/Bar')` instead [...]"

[[tests]]
name = "rubocopcopinternalaffairscopenabled_with_for_cop_maintains_existing_quote_style_when_correcting"
source = '''
@config.for_cop("Foo/Bar")["Enabled"]
'''
corrected = '''
@config.cop_enabled?("Foo/Bar")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 37
message = "Use `@config.cop_enabled?(\"Foo/Bar\")` instead [...]"

[[tests]]
name = "rubocopcopinternalaffairscopenabled_with_for_cop_does_not_register_an_offense_when_enabled_is_a_symbol"
source = '''
@config.for_cop('Foo/Bar')[:Enabled]
'''
offenses = []

[[tests]]
