name = "rubocopcopinternalaffairsnodepatterngroups_with_nested_arguments_registers_an_offense_and_corrects_when_the_arguments_match"
source = '''
def_node_matcher :my_matcher, <<~PATTERN
  {(send (send ...) :foo) (csend (send ...) :foo)}
PATTERN
'''
corrected = '''
def_node_matcher :my_matcher, <<~PATTERN
  (call (send ...) :foo)
PATTERN
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 50
message = "Replace `(send (send ...) :foo)`, `(csend (send ...) :foo)` in node pattern union with `(call (send ...) :foo)`."

