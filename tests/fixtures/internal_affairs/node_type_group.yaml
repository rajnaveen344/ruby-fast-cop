cop: InternalAffairs/NodeTypeGroup
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_using_type_with_entire_numeric_group
    source: |
      node.type?(:int, :float, :rational, :complex)
    offenses:
      - line: 1
        column_start: 11
        column_end: 44
        message: "Use `:numeric` instead of individually listing group types."
    corrected: |
      node.numeric_type?

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_using_type_with_entire_numeric_group_in_any_order
    source: |
      node.type?(:rational, :complex, :int, :float)
    offenses:
      - line: 1
        column_start: 11
        column_end: 44
        message: "Use `:numeric` instead of individually listing group types."
    corrected: |
      node.numeric_type?

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_using_type_with_entire_numeric_when_other_types_are_present
    source: |
      node.type?(:rational, :complex, :send, :int, :float, :def)
    offenses:
      - line: 1
        column_start: 11
        column_end: 57
        message: "Use `:numeric` instead of individually listing group types."
    corrected: |
      node.type?(:numeric, :send, :def)

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_using_type_with_multiple_groups
    source: |
      node.type?(:rational, :complex, :irange, :int, :float, :erange)
    offenses:
      - line: 1
        column_start: 11
        column_end: 62
        message: "Use `:numeric` instead of individually listing group types."
    corrected: |
      node.type?(:numeric, :range)

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_using_type_and_other_node_types_as_argument
    source: |
      node.type?(bar, :irange, foo, :erange)
    offenses:
      - line: 1
        column_start: 11
        column_end: 37
        message: "Use `:range` instead of individually listing group types."
    corrected: |
      node.type?(bar, :range, foo)

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_for_save_navigation
    source: |
      node&.type?(:irange, :erange)
    offenses:
      - line: 1
        column_start: 12
        column_end: 28
        message: "Use `:range` instead of individually listing group types."
    corrected: |
      node&.range_type?

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_chained_to_a_method_call
    source: |
      node.each_child_node(:irange, :erange).any?
    offenses:
      - line: 1
        column_start: 21
        column_end: 37
        message: "Use `:range` instead of individually listing group types."
    corrected: |
      node.each_child_node(:range).any?

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_an_offense_when_chained_to_a_method_call_with_block
    source: |
      node.each_child_node(:irange, :erange).any? do |node|
        foo?(node)
      end
    offenses:
      - line: 1
        column_start: 21
        column_end: 37
        message: "Use `:range` instead of individually listing group types."
    corrected: |
      node.each_child_node(:range).any? do |node|
        foo?(node)
      end

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_no_offense_when_the_group_is_incomplete
    source: |
      node.type?(:int, :float, :complex)
    offenses:
      []

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_no_offense_with_no_arguments
    source: |
      node.type?
    offenses:
      []

  - name: rubocop_cop_internalaffairs_nodetypegroup_registers_no_offense_when_there_is_no_receiver
    source: |
      type?(:irange, :erange)
    offenses:
      []

  - name: rubocop_cop_internalaffairs_nodetypegroup
    source: |
      node.#{method}(:irange, :erange)
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: "Use `:range` instead of individually listing group types."
    corrected: |
      node.#{method}(:range)
    interpolated: true
