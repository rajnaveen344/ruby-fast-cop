cop = "InternalAffairs/UndefinedConfig"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopinternalaffairsundefinedconfig_does_not_register_an_offense_for_implicit_configuration_keys"
source = '''
module RuboCop
  module Cop
    module Test
      class Foo < Base
        def configured?
          cop_config['Safe']
          cop_config['SafeAutoCorrect']
          cop_config['AutoCorrect']
          cop_config['Severity']
          cop_config['StyleGuide']
          cop_config['Details']
          cop_config['Reference']
          cop_config['References']
          cop_config['Include']
          cop_config['Exclude']
        end
      end
    end
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopinternalaffairsundefinedconfig_registers_an_offense_when_the_cop_has_no_configuration_at_all"
source = '''
module RuboCop
  module Cop
    module Test
      class Bar < Base
        def configured?
          cop_config['Missing']
        end
      end
    end
  end
end
'''

[[tests.offenses]]
line = 6
column_start = 21
column_end = 30
message = "`Missing` is not defined in the configuration for `Test/Bar` in `config/default.yml`."

