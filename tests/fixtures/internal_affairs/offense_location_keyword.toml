[[tests]]
name = "rubocop_cop_internalaffairs_offenselocationkeyword_when_node_loc_selector_is_passed_registers_an_offense"
source = '''
add_offense(node, location: node.loc.selector)
'''
corrected = '''
add_offense(node, location: :selector)
'''

[[tests.offenses]]
line = 1
column_start = 28
column_end = 45
message = "Use `:selector` as the location argument to `#add_offense`."

