      PATTERN
      
      #{method} "self.bar?", <<~PATTERN
        (str)
      PATTERN
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: "Precede `#{method}` with a `@!method` YARD directive."
      - line: 5
        column_start: 0
        column_end: 33
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      # @!scope class
      #{method} :"self.foo?", <<~PATTERN
        (str)
      PATTERN
      
      # @!method bar?(node)
      # @!scope class
      #{method} "self.bar?", <<~PATTERN
        (str)
      PATTERN
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_when_using_class_methods_registers_an_offense_when_the_directive_has_the_wrong_name
