      ‹BASE›0‹/BASE›
      # @!method self.bar?(node)
      #{method} :"self.foo?", <<~PATTERN
        (str)
      PATTERN
    offenses:
      - line: 2
        column_start: 0
        column_end: 34
        message: Follow the `@!method` YARD directive with `@!scope class` if it is a class method.
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
