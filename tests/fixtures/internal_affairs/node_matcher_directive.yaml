cop: InternalAffairs/NodeMatcherDirective
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_nodematcherdirective_does_not_register_an_offense_if_the_node_matcher_already_has_a_directive
    source: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, '(str)'
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_does_not_register_an_offense_if_the_directive_is_in_a_comment_block
    source: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      # foo? matcher
      #{method} :foo?, '(str)'
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_registers_an_offense_if_the_matcher_does_not_have_a_directive
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, '(str)'
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, '(str)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_registers_an_offense_if_the_matcher_does_not_have_a_directive_and_a_method_call_is_used_for_a_pattern_argument
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, format(PATTERN, type: 'const')
    offenses:
      - line: 1
        column_start: 0
        column_end: 47
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, format(PATTERN, type: 'const')
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_registers_an_offense_if_the_matcher_does_not_have_a_directive_but_has_preceding_comments
    source: |
      ‹BASE›0‹/BASE›
      # foo
      #{method} :foo?, '(str)'
      
      # foo bar baz
      # foo bar baz
      # foo bar baz
      #{method} :bar?, '(sym)'
    offenses:
      - line: 2
        column_start: 0
        column_end: 24
        message: "Precede `#{method}` with a `@!method` YARD directive."
      - line: 7
        column_start: 0
        column_end: 24
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # foo
      # @!method foo?(node)
      #{method} :foo?, '(str)'
      
      # foo bar baz
      # foo bar baz
      # foo bar baz
      # @!method bar?(node)
      #{method} :bar?, '(sym)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_registers_an_offense_if_the_directive_name_does_not_match_the_actual_name
    source: |
      ‹BASE›0‹/BASE›
      # @!method bar?(node)
      #{method} :foo?, '(str)'
    offenses:
      - line: 2
        column_start: 0
        column_end: 24
        message: "`@!method` YARD directive has invalid method name, use `foo?` instead of `bar?`."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, '(str)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_registers_an_offense_if_the_matcher_has_multiple_directives
    source: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      # @!method foo?(node)
      #{method} :foo?, '(str)'
    offenses:
      - line: 3
        column_start: 0
        column_end: 24
        message: Multiple `@!method` YARD directives found for this matcher.
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_autocorrects_with_the_right_arguments_if_the_pattern_includes_arguments
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, '(str %1)'
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node, arg1)
      #{method} :foo?, '(str %1)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_autocorrects_with_the_right_arguments_if_the_pattern_references_a_non_contiguous_argument
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, '(str %4)'
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node, arg1, arg2, arg3, arg4)
      #{method} :foo?, '(str %4)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_does_not_register_an_offense_if_called_with_a_dynamic_method_name
    source: |
      ‹BASE›0‹/BASE›
      #{method} matcher_name, '(str)'
      #{method} "#{matcher_name}", '(str)'
    offenses:
      []

  - name: rubocop_cop_internalaffairs_nodematcherdirective_retains_indentation_properly_when_inserting
    source: |
      class MyCop
        #{method} :foo?, '(str)'
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      class MyCop
        # @!method foo?(node)
        #{method} :foo?, '(str)'
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_retains_indentation_properly_when_correcting
    source: |
      class MyCop
        # @!method bar?(node)
        #{method} :foo?, '(str)'
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 26
        message: "`@!method` YARD directive has invalid method name, use `foo?` instead of `bar?`."
    corrected: |
      class MyCop
        # @!method foo?(node)
        #{method} :foo?, '(str)'
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_inserts_a_blank_line_between_multiple_pattern_matchers
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, '(str)'
      #{method} :bar?, '(str)'
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: "Precede `#{method}` with a `@!method` YARD directive."
      - line: 2
        column_start: 0
        column_end: 24
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, '(str)'
      
      # @!method bar?(node)
      #{method} :bar?, '(str)'
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_inserts_a_blank_line_between_multiple_multi_line_pattern_matchers
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
      #{method} :bar?, <<~PATTERN
        (str)
      PATTERN
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
      - line: 4
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
      
      # @!method bar?(node)
      #{method} :bar?, <<~PATTERN
        (str)
      PATTERN
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_does_not_insert_a_blank_line_if_one_already_exists
    source: |
      ‹BASE›0‹/BASE›
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
      
      #{method} :bar?, <<~PATTERN
        (str)
      PATTERN
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
      - line: 5
        column_start: 0
        column_end: 27
        message: "Precede `#{method}` with a `@!method` YARD directive."
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
      
      # @!method bar?(node)
      #{method} :bar?, <<~PATTERN
        (str)
      PATTERN
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_removes_scope_class_yard_directive_if_it_is_not_a_class_method
    source: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      # @!scope class
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
    offenses:
      - line: 3
        column_start: 0
        column_end: 27
        message: Do not use the `@!scope class` YARD directive if it is not a class method.
    corrected: |
      ‹BASE›0‹/BASE›
      # @!method foo?(node)
      #{method} :foo?, <<~PATTERN
        (str)
      PATTERN
    interpolated: true
    verified: false

  - name: rubocop_cop_internalaffairs_nodematcherdirective_removes_the_receiver_from_the_yard_directive_if_it_is_not_a_class_method
    source: |
