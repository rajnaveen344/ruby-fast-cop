[[tests]]
name = "rubocopcopinternalaffairsstyledetectedapiuse_registers_an_offense_when_correct_style_detected_is_used_without_a_negative__style_detected_follow_up"
source = '''
def on_send(node)
  if offense?
    add_offense(node)
  else
    correct_style_detected
  end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "{} `correct_style_detected` method called without calling a negative `*_style_detected` method."

