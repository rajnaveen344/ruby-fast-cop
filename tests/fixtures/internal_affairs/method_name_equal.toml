cop = "InternalAffairs/MethodNameEqual"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopinternalaffairsmethodnameequal_registers_an_offense_when_using_method__do_something"
source = '''
node.method_name == :do_something
'''
corrected = '''
node.method?(:do_something)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 33
message = "Use `node.method?(:do_something)` instead."

[[tests]]
name = "rubocopcopinternalaffairsmethodnameequal_registers_an_offense_when_using_method__do_something_2"
source = '''
node.method_name != :do_something
'''
corrected = '''
!node.method?(:do_something)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 33
message = "Use `!node.method?(:do_something)` instead."

[[tests]]
name = "rubocopcopinternalaffairsmethodnameequal_registers_an_offense_when_using_method__other_nodedo_something"
source = '''
node.method_name == other_node.do_something
'''
corrected = '''
node.method?(other_node.do_something)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 43
message = "Use `node.method?(other_node.do_something)` instead."

[[tests]]
name = "rubocopcopinternalaffairsmethodnameequal_does_not_register_an_offense_when_using_method"
source = '''
node.method?(:do_something)
'''
offenses = []
