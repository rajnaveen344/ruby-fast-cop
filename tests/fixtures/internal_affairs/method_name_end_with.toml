cop = "InternalAffairs/MethodNameEndWith"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopinternalaffairsmethodnameendwith_registers_an_offense_if_there_is_potentially_usage_of_assignment_method"
source = '''
node.method_name.to_s.end_with?('=')
'''
corrected = '''
node.assignment_method?
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 36
message = "Use `assignment_method?` instead of `method_name.to_s.end_with?('=')`."

[[tests]]
name = "rubocopcopinternalaffairsmethodnameendwith_does_not_register_an_offense_if_method_name_is_a_variable"
source = '''
def assignment_method?(method_name)
  method_name.to_s.end_with?('=')
end
'''
offenses = []

