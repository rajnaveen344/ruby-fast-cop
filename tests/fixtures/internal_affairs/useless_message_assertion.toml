[[tests]]
name = "rubocopcopinternalaffairsuselessmessageassertion_registers_an_offense_for_specs_that_assert_using_the_msg"
source = '''
it 'uses described_class::MSG to specify the expected message' do
  inspect_source(cop, 'foo')
  expect(cop.messages).to eq([described_class::MSG])
end
'''

[[tests.offenses]]
