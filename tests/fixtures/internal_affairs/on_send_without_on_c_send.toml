cop = "InternalAffairs/OnSendWithoutOnCSend"
department = "internal_affairs"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopinternalaffairsonsendwithoutoncsend_registers_an_offense_when_on_send_is_defined_without_on_csend"
source = '''
class MyCop < RuboCop::Cop:Base
  def on_send(node)
    # ...
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 19
message = "Cop defines `on_send` but not `on_csend`."

[[tests]]
name = "rubocopcopinternalaffairsonsendwithoutoncsend_does_not_register_an_offense_when_on_send_is_not_defined"
