cop: InternalAffairs/RedundantDescribedClassAsSubject
department: internal_affairs
severity: convention
implemented: false

tests:
  - name: rubocop_cop_internalaffairs_redundantdescribedclassassubject_registers_an_offense_when_using_subject_cop_and_config_is_not_specified_in_describe
    source: |
      RSpec.describe RuboCop::Cop::Lint::RegexpAsCondition do
        subject(:cop) { described_class.new(config) }
      
        let(:config) { RuboCop::Config.new }
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 47
        message: "Remove the redundant `subject` and specify `:config` in `describe`."
    corrected: |
      RSpec.describe RuboCop::Cop::Lint::RegexpAsCondition, :config do
      
        let(:config) { RuboCop::Config.new }
      end

  - name: rubocop_cop_internalaffairs_redundantdescribedclassassubject_registers_an_offense_when_using_subject_cop_and_config_is_already_specified_in_describe
