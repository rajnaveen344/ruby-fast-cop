[[tests]]
name = "rubocopcopstyledirempty_target_ruby_version__24_registers_an_offense_for_direntriessize__2"
ruby_version = ">= 2.4"
source = '''
Dir.entries('path/to/dir').size == 2
'''
corrected = '''
Dir.empty?('path/to/dir')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 36
message = "Use `Dir.empty?('path/to/dir')` instead."

