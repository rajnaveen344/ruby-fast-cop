cop: Style/VariableInterpolation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_global_variables_in_string
    source: |
      puts "this is a #$test"
    offenses:
      - line: 1
        column_start: 17
        column_end: 22
        message: "Replace interpolated variable `$test` with expression `#{$test}`."
    corrected: |
      puts "this is a #{$test}"

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_global_variables_in_regexp
    source: |
      puts /this is a #$test/
    offenses:
      - line: 1
        column_start: 17
        column_end: 22
        message: "Replace interpolated variable `$test` with expression `#{$test}`."
    corrected: |
      puts /this is a #{$test}/

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_global_variables_in_backticks
    source: |
      puts `this is a #$test`
    offenses:
      - line: 1
        column_start: 17
        column_end: 22
        message: "Replace interpolated variable `$test` with expression `#{$test}`."
    corrected: |
      puts `this is a #{$test}`

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_global_variables_in_symbol
    source: |
      puts :"this is a #$test"
    offenses:
      - line: 1
        column_start: 18
        column_end: 23
        message: "Replace interpolated variable `$test` with expression `#{$test}`."
    corrected: |
      puts :"this is a #{$test}"

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_regexp_nth_back_references
    source: |
      puts "this is a #$1"
    offenses:
      - line: 1
        column_start: 17
        column_end: 19
        message: "Replace interpolated variable `$1` with expression `#{$1}`."
    corrected: |
      puts "this is a #{$1}"

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_regexp_back_references
    source: |
      puts "this is a #$+"
    offenses:
      - line: 1
        column_start: 17
        column_end: 19
        message: "Replace interpolated variable `$+` with expression `#{$+}`."
    corrected: |
      puts "this is a #{$+}"

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_instance_variables
    source: |
      puts "this is a #@test"
    offenses:
      - line: 1
        column_start: 17
        column_end: 22
        message: "Replace interpolated variable `@test` with expression `#{@test}`."
    corrected: |
      puts "this is a #{@test}"

  - name: rubocop_cop_style_variableinterpolation_registers_an_offense_for_interpolated_class_variables
    source: |
      puts "this is a #@@t"
    offenses:
      - line: 1
        column_start: 17
        column_end: 20
        message: "Replace interpolated variable `@@t` with expression `#{@@t}`."
    corrected: |
      puts "this is a #{@@t}"

  - name: rubocop_cop_style_variableinterpolation_does_not_register_an_offense_for_variables_in_expressions
    source: |
      puts "this is a #{@test} #{@@t} #{$t} #{$1} #{$+}"
    offenses:
      []
