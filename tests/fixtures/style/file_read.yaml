cop: Style/FileRead
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_fileread_does_not_register_an_offense_when_not_reading_from_the_block_variable
    source: |
      File.open(filename) do |f|
        something_else.read
      end
    offenses:
      []

  - name: rubocop_cop_style_fileread_registers_an_offense_for_and_corrects_file_open_filename_read
    source: |
      File.open(filename).read
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: Use `File.read`.
    corrected: |
      File.read(filename)

  - name: rubocop_cop_style_fileread_registers_an_offense_for_and_corrects_file_open_filename_read
    source: |
      ::File.open(filename).read
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Use `File.read`.
    corrected: |
      ::File.read(filename)

  - name: rubocop_cop_style_fileread_registers_an_offense_for_and_corrects_the_file_open_with_symbolic_read_proc_implicit_text_mode
    source: |
      File.open(filename, &:read)
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: Use `File.read`.
    corrected: |
      File.read(filename)

  - name: rubocop_cop_style_fileread_registers_an_offense_for_and_corrects_the_file_open_with_inline_read_block_implicit_text_mode
    source: |
      File.open(filename) { |f| f.read }
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: Use `File.read`.
    corrected: |
      File.read(filename)

  - name: rubocop_cop_style_fileread_registers_an_offense_for_and_corrects_the_file_open_with_multiline_read_block_implicit_text_mode
    source: |
      File.open(filename) do |f|
        f.read
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Use `File.read`.
    corrected: |
      File.read(filename)

  - name: rubocop_cop_style_fileread
    source: |
      File.open(filename, '#{mode}').read
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: "Use `File.#{read_method}`."
    corrected: |
      File.#{read_method}(filename)
    interpolated: true

  - name: rubocop_cop_style_fileread
    source: |
      File.open(filename, '#{mode}', &:read)
    offenses:
      - line: 1
        column_start: 0
        column_end: 38
        message: "Use `File.#{read_method}`."
    corrected: |
      File.#{read_method}(filename)
    interpolated: true

  - name: rubocop_cop_style_fileread
    source: |
      File.open(filename, '#{mode}') { |f| f.read }
    offenses:
      - line: 1
        column_start: 0
        column_end: 45
        message: "Use `File.#{read_method}`."
    corrected: |
      File.#{read_method}(filename)
    interpolated: true

  - name: rubocop_cop_style_fileread
    source: |
      File.open(filename, '#{mode}') do |f|
        f.read
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Use `File.#{read_method}`."
    corrected: |
      File.#{read_method}(filename)
    interpolated: true
