cop = "Style/RedundantMinMaxBy"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantminmaxby_behaves_like_redundant_method_autocorrects_arraymax_by__x_x_"
source = '''
array.max_by { |x| x }
'''
corrected = '''
array.max
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 22
message = "Use `max` instead of `max_by { |x| x }`."

