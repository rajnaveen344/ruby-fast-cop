cop = "Style/HashLikeCase"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylehashlikecase_minbranchescount_2_registers_an_offense_when_using_casewhen_with_string_conditions_and_literal_bodies_of_the_same_type"
source = '''
case x
when 'foo'
  'FOO'
when 'bar'
  'BAR'
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Consider replacing `case-when` with a hash lookup."

[tests.config]
MinBranchesCount = 2

[[tests]]
name = "rubocopcopstylehashlikecase_minbranchescount_2_registers_an_offense_when_using_casewhen_with_symbol_conditions_and_literal_bodies_of_the_same_type"
