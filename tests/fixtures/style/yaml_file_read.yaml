cop: Style/YamlFileRead
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_load_with_file_read_argument
    source: |
      YAML.load(File.read(path))
    offenses:
      - line: 1
        column_start: 5
        column_end: 26
        message: Use `load_file(path)` instead.
    corrected: |
      YAML.load_file(path)
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_safe_load_with_file_read_argument
    source: |
      YAML.safe_load(File.read(path))
    offenses:
      - line: 1
        column_start: 5
        column_end: 31
        message: Use `safe_load_file(path)` instead.
    corrected: |
      YAML.safe_load_file(path)
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_safe_load_with_file_read_and_some_arguments
    source: |
      YAML.safe_load(File.read(path), permitted_classes: [Regexp, Symbol], aliases: true)
    offenses:
      - line: 1
        column_start: 5
        column_end: 83
        message: "Use `safe_load_file(path, permitted_classes: [Regexp, Symbol], aliases: true)` instead."
    corrected: |
      YAML.safe_load_file(path, permitted_classes: [Regexp, Symbol], aliases: true)
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_parse_with_file_read_argument
    source: |
      YAML.parse(File.read(path))
    offenses:
      - line: 1
        column_start: 5
        column_end: 27
        message: Use `parse_file(path)` instead.
    corrected: |
      YAML.parse_file(path)
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_load_with_file_read_argument
    source: |
      ::YAML.load(::File.read(path))
    offenses:
      - line: 1
        column_start: 7
        column_end: 30
        message: Use `load_file(path)` instead.
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_registers_an_offense_when_using_yaml_load_with_file_read_rails_root_join_foo_bar_baz_argument
    source: |
      YAML.load(File.read(Rails.root.join('foo', 'bar', 'baz')))
    offenses:
      - line: 1
        column_start: 5
        column_end: 58
        message: "Use `load_file(Rails.root.join('foo', 'bar', 'baz'))` instead."
    corrected: |
      YAML.load_file(Rails.root.join('foo', 'bar', 'baz'))
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_does_not_register_an_offense_when_using_yaml_load_with_variable_argument
    source: |
      YAML.load(yaml)
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_3_0_does_not_register_an_offense_when_using_yaml_load_file
    source: |
      YAML.load_file(File.read(path))
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_yamlfileread_when_ruby_2_7_registers_an_offense_when_using_yaml_load_with_file_read_argument
    source: |
      YAML.load(File.read(path))
    offenses:
      - line: 1
        column_start: 5
        column_end: 26
        message: Use `load_file(path)` instead.
    corrected: |
      YAML.load_file(path)
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_yamlfileread_when_ruby_2_7_does_not_register_an_offense_when_using_yaml_safe_load_with_file_read_argument
    source: |
      YAML.safe_load(File.read(path))
    offenses:
      []
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_yamlfileread_when_ruby_2_7_registers_an_offense_when_using_yaml_parse_with_file_read_argument
    source: |
      YAML.parse(File.read(path))
    offenses:
      - line: 1
        column_start: 5
        column_end: 27
        message: Use `parse_file(path)` instead.
    corrected: |
      YAML.parse_file(path)
    ruby_version: ">= 2.7"
