cop: Style/ComparableBetween
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_comparablebetween
    source: |
      ‹BASE›0‹/BASE›
      #{logical_comparison}
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Prefer `x.between?(min, max)` over logical comparison.
    corrected: |
      x.between?(min, max)
    interpolated: true
    verified: false

  - name: rubocop_cop_style_comparablebetween_registers_an_offense_when_using_logical_comparison_with_and
    source: |
      x >= min and x <= max
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: Prefer `x.between?(min, max)` over logical comparison.
    corrected: |
      x.between?(min, max)

  - name: rubocop_cop_style_comparablebetween_registers_an_offense_when_comparing_with_itself_as_the_min_value
    source: |
      x >= x and x <= max
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Prefer `x.between?(x, max)` over logical comparison.
    corrected: |
      x.between?(x, max)

  - name: rubocop_cop_style_comparablebetween_registers_an_offense_when_comparing_with_itself_as_both_the_min_and_max_value
    source: |
      x >= x and x <= x
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Prefer `x.between?(x, x)` over logical comparison.
    corrected: |
      x.between?(x, x)

  - name: rubocop_cop_style_comparablebetween_does_not_register_an_offense_when_logical_comparison_excludes_max_value
    source: |
      x >= min && x < max
    offenses:
      []

  - name: rubocop_cop_style_comparablebetween_does_not_register_an_offense_when_logical_comparison_excludes_min_value
    source: |
      x > min && x <= max
    offenses:
      []

  - name: rubocop_cop_style_comparablebetween_does_not_register_an_offense_when_logical_comparison_excludes_min_and_max_value
    source: |
      x > min && x < max
    offenses:
      []

  - name: rubocop_cop_style_comparablebetween_does_not_register_an_offense_when_logical_comparison_has_different_subjects_for_min_and_max
    source: |
      x >= min && y <= max
    offenses:
      []
