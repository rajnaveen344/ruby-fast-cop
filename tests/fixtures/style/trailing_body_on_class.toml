cop = "Style/TrailingBodyOnClass"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletrailingbodyonclass_registers_an_offense_when_body_trails_after_class_definition"
source = '''
class Foo; body
end
class Foo body
end
class Bar; def bar; end
end
class Bar def bar; end
end
'''
corrected = '''
class Foo 
  body
end
class Foo 
  body
end
class Bar 
  def bar; end
end
class Bar 
  def bar; end
end
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 15
message = "Place the first line of class body on its own line."

[[tests.offenses]]
line = 3
column_start = 10
column_end = 14
message = "Place the first line of class body on its own line."

[[tests.offenses]]
line = 5
column_start = 11
column_end = 23
message = "Place the first line of class body on its own line."

[[tests.offenses]]
line = 7
column_start = 10
column_end = 22
message = "Place the first line of class body on its own line."

