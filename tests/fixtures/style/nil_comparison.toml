cop = "Style/NilComparison"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_nilcomparison_configured_with_predicate_preferred_registers_an_offense_for_nil"
source = '''
x == nil
'''
corrected = '''
x.nil?
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 2
column_end = 4
message = "Prefer the use of the `nil?` predicate."

[tests.config]
EnforcedStyle = "$UNRESOLVED:predicate"

