cop = "Style/NilComparison"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenilcomparison_configured_with_predicate_preferred_registers_an_offense_for__nil"
source = '''
x == nil
'''
corrected = '''
x.nil?
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 4
message = "Prefer the use of the `nil?` predicate."

[tests.config]
EnforcedStyle = "predicate"

