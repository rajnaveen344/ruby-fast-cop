cop = "Style/OptionHash"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleoptionhash_registers_an_offense"
source = '''
def some_method(options = {})
  puts some_arg
end
'''

[[tests.offenses]]
line = 1
column_start = 16
column_end = 28
message = "Prefer keyword arguments to options hashes."

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_the_last_argument_is_an_options_hash_named_something_else_does_not_register_an_offense"
source = '''
def steep(flavor, duration, config={})
  mug = config.fetch(:mug)
  prep(flavor, duration, mug)
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_the_last_argument_is_an_options_hash_named_something_else_when_the_argument_name_is_in_the_list_of_suspicious_names_registers_an_offense"
source = '''
def steep(flavor, duration, config={})
  mug = config.fetch(:mug)
  prep(flavor, duration, mug)
end
'''

[[tests.offenses]]
line = 1
column_start = 28
column_end = 37
message = "Prefer keyword arguments to options hashes."

[tests.config]
SuspiciousParamNames = ["options", "config"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_there_are_no_arguments_does_not_register_an_offense"
source = '''
def meditate
  puts true
  puts true
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_the_last_argument_is_a_nonoptionshash_optional_hash_does_not_register_an_offense"
source = '''
def cook(instructions, ingredients = { hot: [], cold: [] })
  prep(ingredients)
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_passing_options_hash_to_super_does_not_register_an_offense"
source = '''
def allowed(foo, options = {})
  super
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_passing_options_hash_to_super_does_not_register_an_offense_when_code_exists_before_call_to_super"
source = '''
def allowed(foo, options = {})
  bar

  super
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_when_passing_options_hash_to_super_does_not_register_an_offense_when_call_to_super_is_in_a_nested_block"
source = '''
def allowed(foo, options = {})
  5.times do
    super
  end
end
'''
offenses = []

[tests.config]
SuspiciousParamNames = ["options"]

[[tests]]
name = "rubocopcopstyleoptionhash_permitted_list_ignores_if_the_method_is_permitted"
source = '''
def to_json(options = {})
end
'''
offenses = []

[tests.config]
Allowlist = ["to_json"]
