[[tests]]
name = "rubocopcopstyleexplicitblockargument_registers_an_offense_and_corrects_when_method_contains_multiple_yields"
source = '''
def m
  items.something { |i| yield i }

  if condition
    yield 2
  elsif other_condition
    3.times { yield }
  else
    other_items.something { |i, j| yield i, j }
  end
end
'''
corrected = '''
def m(&block)
  items.something(&block)

  if condition
    yield 2
  elsif other_condition
    3.times(&block)
  else
    other_items.something(&block)
  end
end
'''

