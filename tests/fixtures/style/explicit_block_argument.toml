cop = "Style/ExplicitBlockArgument"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleexplicitblockargument_registers_an_offense_and_corrects_when_block_just_yields_its_arguments"
source = '''
def m
  items.something(first_arg) { |i| yield i }
end
'''
corrected = '''
def m(&block)
  items.something(first_arg, &block)
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 44
message = "Consider using explicit block argument in the surrounding method's signature over `yield`."

