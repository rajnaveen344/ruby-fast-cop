cop = "Style/HashTransformValues"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_does_not_flag_each_with_object_when_both_key__value_are_transformed"
ruby_version = ">= 2.4"
source = '''
{a: 1, b: 2}.each_with_object({}) {|(k, v), h| h[k.to_sym] = foo(v)}
'''
offenses = []

[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_does_not_flag_each_with_object_when_value_transformation_uses_key"
ruby_version = ">= 2.4"
strip_trailing_newline = true
source = '''
{a: 1, b: 2}.each_with_object({}) {|(k, v), h| h[k] = k.to_s}
'''
offenses = []

