[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_flags__map_to_h_when_transform_values_could_be_used"
ruby_version = ">= 2.4"
source = '''
x.map {|k, v| [k, foo(v)]}.to_h
'''
corrected = '''
x.transform_values {|v| foo(v)}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 31
message = "Prefer `transform_values` over `map {...}.to_h`."

