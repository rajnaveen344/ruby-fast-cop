[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_does_not_flag_each_with_object_when_receiver_is_a_method_chain_through_nonhash_methods"
ruby_version = ">= 2.4"
source = '''
x.to_enum(:foreach, path).select { |entry| entry.file? }.each_with_object({}) {|(k, v), h| h[k] = foo(v)}
'''
offenses = []

[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_flags_each_with_object_when_receiver_is_a_hashproducing_method"
ruby_version = ">= 2.4"
source = '''
x.to_h.each_with_object({}) {|(k, v), h| h[k] = foo(v)}
'''
corrected = '''
x.to_h.transform_values {|v| foo(v)}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 55
message = "Prefer `transform_values` over `each_with_object`."

[[tests]]
name = "rubocopcopstylehashtransformvalues_when_using_ruby_24_or_newer_flags_each_with_object_when_receiver_is_a_group_by_block"
ruby_version = ">= 2.4"
source = '''
x.group_by { |e| e.type }.each_with_object({}) {|(k, v), h| h[k] = foo(v)}
'''
corrected = '''
x.group_by { |e| e.type }.transform_values {|v| foo(v)}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 74
message = "Prefer `transform_values` over `each_with_object`."

