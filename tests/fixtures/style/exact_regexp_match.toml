cop = "Style/ExactRegexpMatch"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleexactregexpmatch_registers_an_offense_when_using_string__astringz"
source = '''
string =~ /\Astring\z/
'''
corrected = '''
string == 'string'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 22
message = "Use `string == 'string'`."

