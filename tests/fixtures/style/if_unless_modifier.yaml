cop: Style/IfUnlessModifier
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_ifunlessmodifier_modifier_if_that_does_not_fit_on_one_line_when_layout_linelength_is_enabled_corrects_it_to_normal_form
    source: |
      def f
        # Comment 1
        %{body} if condition # Comment 2
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 34
        message: Modifier form of `if` makes the line too long.
    corrected: |
      def f
        # Comment 1
        if condition
          puts '#{spaces}'
        end # Comment 2
      end
    interpolated: true
    verified: false

