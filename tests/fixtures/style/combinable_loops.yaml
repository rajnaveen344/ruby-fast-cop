cop: Style/CombinableLoops
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_combinableloops_when_looping_method_registers_an_offense_when_looping_over_the_same_data_as_previous_loop
    source: |
      items.each { |item| do_something(item) }
      items.each { |item| do_something_else(item, arg) }
      
      items.each_with_index { |item| do_something(item) }
      items.each_with_index { |item| do_something_else(item, arg) }
      
      items.reverse_each { |item| do_something(item) }
      items.reverse_each { |item| do_something_else(item, arg) }
    offenses:
      - line: 2
        column_start: 0
        column_end: 50
        message: Combine this loop with the previous loop.
      - line: 5
        column_start: 0
        column_end: 61
        message: Combine this loop with the previous loop.
      - line: 8
        column_start: 0
        column_end: 58
        message: Combine this loop with the previous loop.
    corrected: |
      items.each { |item| do_something(item)
      do_something_else(item, arg) }
      
      items.each_with_index { |item| do_something(item)
      do_something_else(item, arg) }
      
      items.reverse_each { |item| do_something(item)
      do_something_else(item, arg) }

  - name: rubocop_cop_style_combinableloops_when_looping_method_registers_an_offense_when_looping_over_the_same_data_for_the_second_consecutive_time
    source: |
      items.each do |item| foo(item) end
      items.each { |item| bar(item) }
      do_something
    offenses:
      - line: 2
        column_start: 0
        column_end: 31
        message: Combine this loop with the previous loop.
    corrected: |
      items.each do |item| foo(item)
      bar(item)  end
      do_something

  - name: rubocop_cop_style_combinableloops_when_looping_method_registers_an_offense_when_looping_over_the_same_data_for_the_third_consecutive_time
    source: |
      items.each { |item| foo(item) }
      items.each { |item| bar(item) }
      items.each { |item| baz(item) }
    offenses:
      - line: 2
        column_start: 0
        column_end: 31
        message: Combine this loop with the previous loop.
      - line: 3
        column_start: 0
        column_end: 31
        message: Combine this loop with the previous loop.
    corrected: |
      items.each { |item| foo(item)
      bar(item)
      baz(item) }

