cop: Style/StderrPuts
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_stderrputs_registers_an_offense_when_using_stderr_puts_hello
    source: |
      $stderr.puts('hello')
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Use `warn` instead of `$stderr.puts` to allow such output to be disabled.
    corrected: |
      warn('hello')

  - name: rubocop_cop_style_stderrputs_registers_no_offense_when_using_stderr_puts_with_no_arguments
    source: |
      $stderr.puts
    offenses:
      []

  - name: rubocop_cop_style_stderrputs_registers_an_offense_when_using_stderr_puts_hello
    source: |
      STDERR.puts('hello')
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Use `warn` instead of `STDERR.puts` to allow such output to be disabled.
    corrected: |
      warn('hello')

  - name: rubocop_cop_style_stderrputs_registers_an_offense_when_using_stderr_puts_hello
    source: |
      ::STDERR.puts('hello')
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: "Use `warn` instead of `::STDERR.puts` to allow such output to be disabled."
    corrected: |
      warn('hello')

  - name: rubocop_cop_style_stderrputs_registers_no_offense_when_using_stderr_puts_with_no_arguments
    source: |
      STDERR.puts
    offenses:
      []
