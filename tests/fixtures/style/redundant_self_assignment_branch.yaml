cop: Style/RedundantSelfAssignmentBranch
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_else_ternary_branch
    source: |
      foo = condition ? bar : foo
    offenses:
      - line: 1
        column_start: 24
        column_end: 27
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch
    source: |
      foo = condition ? bar(arg) : foo
    offenses:
      - line: 1
        column_start: 29
        column_end: 32
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar(arg) if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch
    source: |
      foo = condition ? bar.
        baz : foo
    offenses:
      - line: 2
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar.
        baz if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch
    source: |
      foo = condition ? (
        ) : foo
    offenses:
      - line: 2
        column_start: 6
        column_end: 9
        message: Remove the self-assignment branch.
    corrected: |
      foo = (
        ) if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_if_ternary_branch
    source: |
      foo = condition ? foo : bar
    offenses:
      - line: 1
        column_start: 18
        column_end: 21
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar unless condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_else_branch
    source: |
      foo = if condition
              bar
            else
              foo
            end
    offenses:
      - line: 4
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_if_branch
    source: |
      foo = if condition
              foo
            else
              bar
            end
    offenses:
      - line: 2
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = bar unless condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_if_branch_with_heredoc
    source: |
      foo = if condition
              foo
            else
              <<~TEXT
                bar
              TEXT
            end
    offenses:
      - line: 2
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = <<~TEXT unless condition
                bar
              TEXT

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_self_assigning_redundant_else_branch_and_multiline_if_branch
    source: |
      foo = if condition
              bar
              baz
            else
              foo
            end
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_self_assigning_redundant_else_branch_and_multiline_else_branch
    source: |
      foo = if condition
              foo
            else
              bar
              baz
            end
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_else_branch_and_empty_if_branch
    source: |
      foo = if condition
            else
              foo
            end
    offenses:
      - line: 3
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = nil if condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_registers_and_corrects_an_offense_when_self_assigning_redundant_else_branch_and_empty_else_branch
    source: |
      foo = if condition
              foo
            else
            end
    offenses:
      - line: 2
        column_start: 8
        column_end: 11
        message: Remove the self-assignment branch.
    corrected: |
      foo = nil unless condition

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_self_assigning_redundant_else_ternary_branch_for_ivar
    source: |
      ‹BASE›0‹/BASE›
      @foo = condition ? @bar : @foo
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_self_assigning_redundant_else_ternary_branch_for_cvar
    source: |
      ‹BASE›0‹/BASE›
      @@foo = condition ? @@bar : @@foo
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_self_assigning_redundant_else_ternary_branch_for_gvar
    source: |
      $foo = condition ? $bar : $foo
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_not_self_assigning_redundant_branches
    source: |
      foo = condition ? bar : baz
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_using_only_if_branch
    source: |
      foo = if condition
              bar
            end
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_multi_assignment
    source: |
      foo, bar = baz
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_lhs_is_not_variable
    source: |
      foo.do_something = condition ? foo.do_something : bar.do_something
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_using_elsif_and_self_assigning_the_value_of_then_branch
    source: |
      foo = if condition
        foo
      elsif another_condition
        bar
      else
        baz
      end
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_using_elsif_and_self_assigning_the_value_of_elsif_branch
    source: |
      foo = if condition
              bar
            elsif another_condition
              foo
            else
              baz
            end
    offenses:
      []

  - name: rubocop_cop_style_redundantselfassignmentbranch_does_not_register_an_offense_when_using_elsif_and_self_assigning_the_value_of_else_branch
    source: |
      foo = if condition
              bar
            elsif another_condition
              baz
            else
              foo
            end
    offenses:
      []
