cop: Style/MethodCallWithoutArgsParentheses
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_for_parens_in_method_call_without_args
    source: |
      top.test()
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      top.test

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_accepts_parentheses_for_methods_starting_with_an_upcase_letter
    source: |
      Test()
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_accepts_parens_in_method_call_with_args
    source: |
      top.test(a)
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_accepts_special_lambda_call_syntax
    source: |
      thing.()
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_accepts_parens_after_not
    source: |
      not(something)
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_does_not_register_an_offense_when_using_it_in_a_single_line_block
    source: |
      0.times { it() }
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_when_using_foo_it_in_a_single_line_block
    source: |
      0.times { foo.it() }
    offenses:
      - line: 1
        column_start: 16
        column_end: 18
        message: Do not use parentheses for method calls with no arguments.

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_when_using_foo_it_in_a_single_line_block
    source: |
      0.times { foo&.it() }
    offenses:
      - line: 1
        column_start: 17
        column_end: 19
        message: Do not use parentheses for method calls with no arguments.

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_does_not_register_an_offense_when_using_it_in_a_multiline_block
    source: |
      0.times do
        it()
        it = 1
        it
      end
    offenses:
      []

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_when_using_it_without_arguments_in_def_body
    source: |
      def foo
        it()
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 6
        message: Do not use parentheses for method calls with no arguments.

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_when_using_it_without_arguments_in_the_block_with_empty_block_parameter
    source: |
      0.times { ||
        it()
      }
    offenses:
      - line: 2
        column_start: 4
        column_end: 6
        message: Do not use parentheses for method calls with no arguments.

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_when_using_it_without_arguments_in_the_block_with_useless_block_parameter
    source: |
      0.times { |_n|
        it()
      }
    offenses:
      - line: 2
        column_start: 4
        column_end: 6
        message: Do not use parentheses for method calls with no arguments.

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_when_allowedmethods_is_enabled_allows_a_listed_method
    source: |
      s()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_when_allowedmethods_is_enabled_allows_a_listed_method_used_with_safe_navigation
    source: |
      foo&.s()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_when_allowedpatterns_is_enabled_allows_a_method_that_matches
    source: |
      my_test()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_when_allowedpatterns_is_enabled_allows_a_method_that_matches_with_safe_navigation
    source: |
      foo&.my_test()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_accepts_parens_in_local_variable_assignment
    source: |
      test = test()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_registers_an_offense_when_calling_method_on_a_receiver
    source: |
      test = x.test()
    offenses:
      - line: 1
        column_start: 13
        column_end: 15
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      test = x.test
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_registers_an_offense_when_calling_method_on_a_receiver_with_safe_navigation
    source: |
      test = x&.test()
    offenses:
      - line: 1
        column_start: 14
        column_end: 16
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      test = x&.test
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_accepts_parens_in_default_argument_assignment
    source: |
      def foo(test = test())
      end
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_accepts_parens_in_shorthand_assignment
    source: |
      test ||= test()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_accepts_parens_in_parallel_assignment
    source: |
      one, test = 1, test()
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_accepts_parens_in_complex_assignment
    source: |
      test = begin
        case a
        when b
          c = test() if d
        end
      end
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_assignment_to_a_variable_with_the_same_name_registers_an_empty_parens_offense_for_array_mass_assignment_with_same_name
    source: |
      A = [1, 2]
      def c; A; end
      
      c[2], x = c()
    offenses:
      - line: 4
        column_start: 11
        column_end: 13
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      A = [1, 2]
      def c; A; end
      
      c[2], x = c
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_for_obj_method_func
    source: |
      obj.method ||= func()
    offenses:
      - line: 1
        column_start: 19
        column_end: 21
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      obj.method ||= func
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_for_obj_method_func
    source: |
      obj.method &&= func()
    offenses:
      - line: 1
        column_start: 19
        column_end: 21
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      obj.method &&= func
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_offense_for_obj_method_func
    source: |
      obj.method += func()
    offenses:
      - line: 1
        column_start: 18
        column_end: 20
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      obj.method += func
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_autocorrects_calls_that_could_be_empty_literals
    source: |
      Hash.new()
      Array.new()
      String.new()
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Do not use parentheses for method calls with no arguments.
      - line: 2
        column_start: 9
        column_end: 11
        message: Do not use parentheses for method calls with no arguments.
      - line: 3
        column_start: 10
        column_end: 12
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      Hash.new
      Array.new
      String.new
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_method_call_as_argument_accepts_without_parens
    source: |
      _a = c(d.e)
    offenses:
      []
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_method_call_as_argument_registers_an_offense_with_empty_parens
    source: |
      _a = c(d())
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      _a = c(d)
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_method_call_as_argument_registers_an_empty_parens_offense_for_multiple_assignment
    source: |
      _a, _b, _c = d(e())
    offenses:
      - line: 1
        column_start: 16
        column_end: 18
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      _a, _b, _c = d(e)
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_method_call_as_argument_registers_an_empty_parens_offense_for_multiple_assignment_with_safe_navigation
    source: |
      _a, _b, _c = d&.e()
    offenses:
      - line: 1
        column_start: 17
        column_end: 19
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      _a, _b, _c = d&.e
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_empty_parens_offense_for_hash_mass_assignment
    source: |
      h = {}
      h[:a], h[:b] = c()
    offenses:
      - line: 2
        column_start: 16
        column_end: 18
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      h = {}
      h[:a], h[:b] = c
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]

  - name: rubocop_cop_style_methodcallwithoutargsparentheses_registers_an_empty_parens_offense_for_array_mass_assignment
    source: |
      a = []
      a[0], a[10] = c()
    offenses:
      - line: 2
        column_start: 15
        column_end: 17
        message: Do not use parentheses for method calls with no arguments.
    corrected: |
      a = []
      a[0], a[10] = c
    config:
      AllowedMethods: [$UNRESOLVED:s]
      AllowedPatterns: [test]
