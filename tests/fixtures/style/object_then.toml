cop = "Style/ObjectThen"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleobjectthen_enforcedstyle_then_does_not_register_an_offense_for_method_names_other_than_then"
source = '''
obj.map { |x| x.foo }
'''
offenses = []

[tests.config]
EnforcedStyle = "then"

[[tests]]
name = "rubocopcopstyleobjectthen_enforcedstyle_then_registers_an_offense_for_yield_self_with_proc_param"
source = '''
obj.yield_self(&:test)
'''
corrected = '''
obj.then(&:test)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 14
message = "Prefer `then` over `yield_self`."

[tests.config]
EnforcedStyle = "then"

[[tests]]
name = "rubocopcopstyleobjectthen_enforcedstyle_then_registers_an_offense_for_yield_self_with_safe_navigation_and_proc_param"
source = '''
obj&.yield_self(&:test)
'''
corrected = '''
obj&.then(&:test)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 15
message = "Prefer `then` over `yield_self`."

[tests.config]
EnforcedStyle = "then"

