cop: Style/AccessModifierDeclarations
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_accessmodifierdeclarations
    source: |
      class Foo
        foo
        bar(key: #{access_modifier})
      end
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_style_accessmodifierdeclarations_allow_access_modifiers_on_symbols
    source: |
      class Foo
        foo
        #{access_modifier} :bar
      end
    offenses:
      []
    config:
      AllowModifiersOnSymbols: true
    interpolated: true
    verified: false

  - name: rubocop_cop_style_accessmodifierdeclarations_allow_access_modifiers_on_symbols
    source: |
      class Foo
        foo
        #{access_modifier} :bar, :baz
      end
    offenses:
      []
    config:
      AllowModifiersOnSymbols: true
    interpolated: true
    verified: false

  - name: rubocop_cop_style_accessmodifierdeclarations_allow_access_modifiers_on_symbols
    source: |
      class Foo
        foo
        #{access_modifier} *%i[bar baz]
      end
    offenses:
      []
    config:
      AllowModifiersOnSymbols: true
    interpolated: true
    verified: false

  - name: rubocop_cop_style_accessmodifierdeclarations_allow_access_modifiers_on_symbols
    source: |
      class Foo
        foo
        #{access_modifier} *METHOD_NAMES
      end
    offenses:
      []
    config:
      AllowModifiersOnSymbols: true
    interpolated: true
    verified: false

