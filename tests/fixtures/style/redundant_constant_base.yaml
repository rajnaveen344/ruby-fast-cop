cop: Style/RedundantConstantBase
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_in_class_registers_no_offense
    source: |
      class Foo
        ::Bar
      end
    offenses:
      []

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_in_module_registers_no_offense
    source: |
      module Foo
        ::Bar
      end
    offenses:
      []

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_in_neither_class_nor_module_registers_an_offense
    source: |
      ::Bar
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: "Remove redundant `::`."
    corrected: |
      Bar

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_nested_constant_in_neither_class_nor_module_registers_an_offense
    source: |
      ::Bar::Baz
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: "Remove redundant `::`."
    corrected: |
      Bar::Baz

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_in_sclass_registers_an_offense
    source: |
      class << self
        ::Bar
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 4
        message: "Remove redundant `::`."
    corrected: |
      class << self
        Bar
      end

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_as_super_class_registers_an_offense
    source: |
      class Foo < ::Bar
      end
    offenses:
      - line: 1
        column_start: 12
        column_end: 14
        message: "Remove redundant `::`."
    corrected: |
      class Foo < Bar
      end

  - name: rubocop_cop_style_redundantconstantbase_with_prefixed_constant_and_prefixed_super_class_registers_an_offense
    source: |
      class Foo < ::Bar
        ::A
      end
    offenses:
      - line: 1
        column_start: 12
        column_end: 14
        message: "Remove redundant `::`."
    corrected: |
      class Foo < Bar
        ::A
      end

  - name: rubocop_cop_style_redundantconstantbase_when_lint_constantresolution_is_disabling_with_prefixed_constant_in_neither_class_nor_module_does_not_register_an_offense
    source: |
      ::Bar
    offenses:
      []
