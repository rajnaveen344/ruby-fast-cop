[[tests]]
name = "rubocop_cop_style_eachforsimpleloop_with_inline_block_with_no_parameters_autocorrects_an_offense"
source = '''
(0...10).each { do_something }
'''
corrected = '''
10.times { do_something }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 13
message = "Use `Integer#times` for a simple loop which iterates a fixed number of times."

[[tests]]
name = "rubocop_cop_style_eachforsimpleloop_with_inline_block_with_parameters_does_not_register_an_offense"
source = '''
