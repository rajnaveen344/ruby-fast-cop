cop = "Style/StaticClass"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_staticclass_registers_an_offense_when_class_has_only_class_method"
source = '''
class C
  def self.class_method; end
end
'''
corrected = '''
module C
module_function

  def class_method; end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Prefer modules to classes with only class methods."

[[tests]]
name = "rubocop_cop_style_staticclass_registers_an_offense_when_class_has_class_self_with_class_methods"
source = '''
class C
  def self.class_method; end

  class << self
    def other_class_method; end
  end
end
'''
corrected = '''
module C
module_function

  def class_method; end

 #{trailing_whitespace}
    def other_class_method; end
 #{trailing_whitespace}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Prefer modules to classes with only class methods."

