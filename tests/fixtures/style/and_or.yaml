cop: Style/AndOr
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_andor_when_style_is_conditionals
    source: |
      x = a + b #{operator} return x
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_style_andor_when_style_is_conditionals
    source: |
      if a %{operator} b
        do_something
      end
    offenses:
      - line: 1
        column_start: 5
        column_end: 18
        message: "Use `#{prefer}` instead of `#{operator}`."
    corrected: |
      if a #{prefer} b
        do_something
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_andor_when_style_is_conditionals
    source: |
      if some_condition
