cop: Style/InlineComment
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_inlinecomment_registers_an_offense_for_a_trailing_inline_comment
    source: |
      two = 1 + 1 # A trailing inline comment
    offenses:
      - line: 1
        column_start: 12
        column_end: 39
        message: Avoid trailing inline comments.

  - name: rubocop_cop_style_inlinecomment_does_not_register_an_offense_for_special_rubocop_inline_comments
    source: |
      two = 1 + 1 # rubocop:disable Layout/ExtraSpacing
    offenses:
      []

  - name: rubocop_cop_style_inlinecomment_does_not_register_an_offense_for_a_standalone_comment
    source: |
      # A standalone comment
    offenses:
      []
