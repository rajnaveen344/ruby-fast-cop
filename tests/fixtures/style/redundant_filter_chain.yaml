cop: Style/RedundantFilterChain
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.%{method} { |x| x > 1 }.any?
    offenses:
      - line: 1
        column_start: 4
        column_end: 32
        message: "Use `any?` instead of `#{method}.any?`."
    corrected: |
      arr.any? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.%{method} { |x| x > 1 }.empty?
    offenses:
      - line: 1
        column_start: 4
        column_end: 34
        message: "Use `none?` instead of `#{method}.empty?`."
    corrected: |
      arr.none? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.%{method} { |x| x > 1 }.none?
    offenses:
      - line: 1
        column_start: 4
        column_end: 33
        message: "Use `none?` instead of `#{method}.none?`."
    corrected: |
      arr.none? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.%{method}(&:odd?).none?
    offenses:
      - line: 1
        column_start: 4
        column_end: 27
        message: "Use `none?` instead of `#{method}.none?`."
    corrected: |
      arr.none?(&:odd?)
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.#{method} { |x| x > 1 }.many?
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.#{method} { |x| x > 1 }.present?
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      relation.#{method}(:name).any?
      foo.#{method}.any?
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain
    source: |
      arr.#{method}(&:odd?).any?(Integer)
      arr.#{method}(&:odd?).any? { |x| x > 10 }
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain_when_using_safe_navigation_operator
    source: |
      arr&.%{method} { |x| x > 1 }&.any?
    offenses:
      - line: 1
        column_start: 5
        column_end: 34
        message: "Use `any?` instead of `#{method}.any?`."
    corrected: |
      arr&.any? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain_when_using_safe_navigation_operator
    source: |
      arr&.%{method} { |x| x > 1 }&.empty?
    offenses:
      - line: 1
        column_start: 5
        column_end: 36
        message: "Use `none?` instead of `#{method}.empty?`."
    corrected: |
      arr&.none? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain_when_using_safe_navigation_operator
    source: |
      arr&.%{method} { |x| x > 1 }&.none?
    offenses:
      - line: 1
        column_start: 5
        column_end: 35
        message: "Use `none?` instead of `#{method}.none?`."
    corrected: |
      arr&.none? { |x| x > 1 }
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain_when_using_safe_navigation_operator
    source: |
      arr&.%{method}(&:odd?)&.none?
    offenses:
      - line: 1
        column_start: 5
        column_end: 29
        message: "Use `none?` instead of `#{method}.none?`."
    corrected: |
      arr&.none?(&:odd?)
    interpolated: true

  - name: rubocop_cop_style_redundantfilterchain_does_not_register_an_offense_when_using_any
    source: |
      arr.any? { |x| x > 1 }
    offenses:
      []

  - name: rubocop_cop_style_redundantfilterchain_when_allcops_activesupportextensionsenabled_true_registers_an_offense_when_using_select_followed_by_many
    source: |
      arr.select { |x| x > 1 }.many?
    offenses:
      - line: 1
        column_start: 4
        column_end: 30
        message: Use `many?` instead of `select.many?`.
    corrected: |
      arr.many? { |x| x > 1 }

  - name: rubocop_cop_style_redundantfilterchain_when_allcops_activesupportextensionsenabled_true_registers_an_offense_when_using_select_followed_by_present
    source: |
      arr.select { |x| x > 1 }.present?
    offenses:
      - line: 1
        column_start: 4
        column_end: 33
        message: Use `any?` instead of `select.present?`.
    corrected: |
      arr.any? { |x| x > 1 }
