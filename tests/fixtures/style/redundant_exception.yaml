cop: Style/RedundantException
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantexception
    source: |
      %{keyword} %{runtime_error}, "message"
    offenses:
      - line: 1
        column_start: 0
        column_end: 38
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      #{keyword} "message"
    interpolated: true

  - name: rubocop_cop_style_redundantexception
    source: |
      %{keyword}(%{runtime_error}, "message")
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      #{keyword}("message")
    interpolated: true

  - name: rubocop_cop_style_redundantexception
    source: |
      %{keyword} %{runtime_error}.new "message"
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: Redundant `RuntimeError.new` call can be replaced with just the message.
    corrected: |
      #{keyword} "message"
    interpolated: true

  - name: rubocop_cop_style_redundantexception
    source: |
      %{keyword} %{runtime_error}.new("message")
    offenses:
      - line: 1
        column_start: 0
        column_end: 42
        message: Redundant `RuntimeError.new` call can be replaced with just the message.
    corrected: |
      #{keyword} "message"
    interpolated: true

  - name: rubocop_cop_style_redundantexception
    source: |
      #{keyword} #{runtime_error}, 'message', caller
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantexception_accepts_rescue_w_non_redundant_error
    source: |
      #{keyword} OtherError, 'message'
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_redundantexception_common_behavior_raise
    source: |
      raise
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_runtimeerror
    source: |
      RuntimeError
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_raise
    source: |
      raise
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_runtimeerror
    source: |
      ::RuntimeError
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_fail
    source: |
      fail
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_runtimeerror
    source: |
      RuntimeError
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_fail
    source: |
      fail
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_common_behavior_runtimeerror
    source: |
      ::RuntimeError
    offenses:
      []

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_message
    source: |
      raise RuntimeError, "#{message}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      raise "#{message}"

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_command
    source: |
      raise RuntimeError, `command`
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      raise `command`

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_object_new
    source: |
      raise RuntimeError, Object.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      raise Object.new.to_s

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_new_object_new_and_parans
    source: |
      raise RuntimeError.new(Object.new)
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: Redundant `RuntimeError.new` call can be replaced with just the message.
    corrected: |
      raise Object.new.to_s

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_new_object_new_no_parens
    source: |
      raise RuntimeError.new Object.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: Redundant `RuntimeError.new` call can be replaced with just the message.
    corrected: |
      raise Object.new.to_s

  - name: rubocop_cop_style_redundantexception_registers_an_offense_for_raise_with_runtimeerror_variable
    source: |
      raise RuntimeError, variable
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Redundant `RuntimeError` argument can be removed.
    corrected: |
      raise variable.to_s
