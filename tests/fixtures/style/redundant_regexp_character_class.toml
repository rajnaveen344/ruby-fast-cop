cop = "Style/RedundantRegexpCharacterClass"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantregexpcharacterclass_with_a_character_class_containing_a_single_character_registers_an_offense_and_corrects"
source = '''
foo = /[a]/
'''
corrected = '''
foo = /a/
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 10
message = "Redundant single-element character class, `[a]` can be replaced with `a`."

[[tests]]
name = "rubocopcopstyleredundantregexpcharacterclass_with_multiple_character_classes_containing_single_characters_registers_an_offense_and_corrects"
