[[tests]]
name = "rubocopcopstylenegativearrayindex_does_not_register_an_offense_when_using_self_as_array_with_local_variable_receiver_for_length"
source = '''
length = do_something
self[length - 1]
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegativearrayindex_registers_an_offense_when_using_self_as_array_with_implicit_receiver_for_length"
source = '''
self[length - 1]
'''
corrected = '''
self[-1]
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 15
message = "Use `self[-1]` instead of `self[length - 1]`."

