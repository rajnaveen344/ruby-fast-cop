cop: Style/StringLiteralsInInterpolation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_embedded_expression_in_a_string
    source: |
      "#{"A"}"
    offenses:
      - line: 1
        column_start: 3
        column_end: 6
        message: Prefer single-quoted strings inside interpolations.
    corrected: |
      "#{'A'}"
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_embedded_expression_in_a_symbol
    source: |
      :"#{"A"}"
    offenses:
      - line: 1
        column_start: 4
        column_end: 7
        message: Prefer single-quoted strings inside interpolations.
    corrected: |
      :"#{'A'}"
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_embedded_expression_in_a_heredoc_string
    source: |
      ‹BASE›0‹/BASE›
      <<RUBY
      #{"A"}
      RUBY
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: Prefer single-quoted strings inside interpolations.
    corrected: |
      ‹BASE›0‹/BASE›
      <<RUBY
      #{'A'}
      RUBY
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_a_regexp
    source: |
      /foo#{"sar".sub("s", 'b')}/
    offenses:
      - line: 1
        column_start: 6
        column_end: 11
        message: Prefer single-quoted strings inside interpolations.
      - line: 1
        column_start: 16
        column_end: 19
        message: Prefer single-quoted strings inside interpolations.
    corrected: |
      /foo#{'sar'.sub('s', 'b')}/
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_accepts_double_quotes_on_a_static_string
    source: |
      "A"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_accepts_double_quotes_on_a_broken_static_string
    source: |
      "A" \
        "B"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_accepts_double_quotes_on_static_strings_within_a_method
    source: |
      def m
        puts "A"
        puts "B"
      end
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_can_handle_a_built_in_constant_parsed_as_string
    source: |
      if __FILE__ == $PROGRAM_NAME
      end
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_can_handle_character_literals
    source: |
      a = ?/
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_double_quotes_preferred_registers_an_offense_for_single_quotes_within_embedded_expression_in_a_string
    source: |
      "#{'A'}"
    offenses:
      - line: 1
        column_start: 3
        column_end: 6
        message: Prefer double-quoted strings inside interpolations.
    corrected: |
      "#{"A"}"
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_double_quotes_preferred_registers_an_offense_for_single_quotes_within_embedded_expression_in_a_symbol
    source: |
      :"#{'A'}"
    offenses:
      - line: 1
        column_start: 4
        column_end: 7
        message: Prefer double-quoted strings inside interpolations.
    corrected: |
      :"#{"A"}"
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_configured_with_double_quotes_preferred_registers_an_offense_for_single_quotes_within_embedded_expression_in_a_heredoc_string
    source: |
      ‹BASE›0‹/BASE›
      <<RUBY
      #{'A'}
      RUBY
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: Prefer double-quoted strings inside interpolations.
    corrected: |
      ‹BASE›0‹/BASE›
      <<RUBY
      #{"A"}
      RUBY
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliteralsininterpolation_when_configured_with_a_bad_value_fails
    source: |
      a = "#{"b"}"
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:other
    interpolated: true
    verified: false
