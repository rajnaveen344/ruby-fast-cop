cop: Style/ModuleFunction
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_modulefunction_when_enforced_style_is_module_function_registers_an_offense_for_extend_self_in_a_module
    source: |
      module Test
        extend self
        def test; end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 13
        message: Use `module_function` instead of `extend self`.
    corrected: |
      module Test
        module_function
        def test; end
      end
    config:
      EnforcedStyle: $UNRESOLVED:module_function
    interpolated: true
    verified: false

