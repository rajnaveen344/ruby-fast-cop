cop = "Style/DoubleCopDisableDirective"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyledoublecopdisabledirective_registers_an_offense_for_duplicate_disable_directives"
source = '''
def choose_move(who_to_move) # rubocop:disable Metrics/CyclomaticComplexity # rubocop:disable Metrics/AbcSize # rubocop:disable Metrics/MethodLength
end
'''
corrected = '''
def choose_move(who_to_move) # rubocop:disable Metrics/CyclomaticComplexity, Metrics/AbcSize, Metrics/MethodLength
end
'''

[[tests.offenses]]
line = 1
column_start = 29
column_end = 148
message = "More than one disable comment on one line."

[[tests]]
name = "rubocopcopstyledoublecopdisabledirective_registers_an_offense_for_duplicate_todo_directives"
source = '''
