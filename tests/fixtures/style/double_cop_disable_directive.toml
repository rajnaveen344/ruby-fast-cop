end
'''
corrected = '''
def choose_move(who_to_move) # rubocop:todo Metrics/CyclomaticComplexity, Metrics/AbcSize, Metrics/MethodLength
end
'''

[[tests.offenses]]
line = 1
column_start = 29
column_end = 139
message = "More than one disable comment on one line."

[[tests]]
name = "rubocopcopstyledoublecopdisabledirective_does_not_register_an_offense_for_cops_with_single_cop_directive"
