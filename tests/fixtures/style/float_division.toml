cop = "Style/FloatDivision"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylefloatdivision_enforcedstyle_is_left_coerce_registers_an_offense_and_corrects_for_right_coerce"
source = '''
a / b.to_f
'''
corrected = '''
a.to_f / b
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Prefer using `.to_f` on the left side."

[tests.config]
EnforcedStyle = "left_coerce"
References = ["https://blog.rubystyle.guide/ruby/2019/06/21/float-division.html"]

[[tests]]
name = "rubocopcopstylefloatdivision_enforcedstyle_is_left_coerce_does_not_register_an_offense_for_right_coerce_with_nth_ref"
