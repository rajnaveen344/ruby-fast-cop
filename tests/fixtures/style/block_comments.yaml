cop: Style/BlockComments
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_blockcomments_registers_an_offense_for_block_comments
    source: |
      =begin
      comment
      =end
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Do not use block comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # comment

  - name: rubocop_cop_style_blockcomments_accepts_regular_comments
    source: |
      ‹BASE›0‹/BASE›
      # comment
    offenses:
      []

  - name: rubocop_cop_style_blockcomments_autocorrects_a_block_comment_into_a_regular_comment
    source: |
      =begin
      comment line 1
      
      comment line 2
      =end
      def foo
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Do not use block comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # comment line 1
      #
      # comment line 2
      def foo
      end

  - name: rubocop_cop_style_blockcomments_autocorrects_an_empty_block_comment_by_removing_it
    source: |
      =begin
      =end
      def foo
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Do not use block comments.
    corrected: |
      def foo
      end

  - name: rubocop_cop_style_blockcomments_autocorrects_a_block_comment_into_a_regular_comment_without_trailing_newline
    source: |
      =begin
      comment line 1
      
      comment line 2
      =end
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Do not use block comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # comment line 1
      #
      # comment line 2
