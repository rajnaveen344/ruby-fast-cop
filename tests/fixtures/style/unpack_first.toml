cop = "Style/UnpackFirst"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleunpackfirst_ruby_version__24_registers_an_offense_when_using_unpack_with_first"
ruby_version = ">= 2.4"
source = '''
x.unpack('h*').first
'''
corrected = '''
x.unpack1('h*')
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 20
message = "Use `unpack1('h*')` instead of `unpack('h*').first`."

