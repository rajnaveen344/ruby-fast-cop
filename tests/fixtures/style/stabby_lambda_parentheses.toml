cop = "Style/StabbyLambdaParentheses"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_parentheses_registers_an_offense_for_a_stabby_lambda_without_parentheses"
source = '''
->a,b,c { a + b + c }
'''
corrected = '''
->(a,b,c) { a + b + c }
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 7
message = "Wrap stabby lambda arguments with parentheses."

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_parentheses_does_not_register_an_offense_for_a_stabby_lambda_with_parentheses"
strip_trailing_newline = true
source = '''
->(a,b,c) { a + b + c }
'''
offenses = []

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_parentheses_behaves_like_common_does_not_check_the_old_lambda_syntax"
strip_trailing_newline = true
source = '''
lambda(&:nil?)
'''
offenses = []

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_parentheses_behaves_like_common_does_not_check_a_stabby_lambda_without_arguments"
strip_trailing_newline = true
source = '''
-> { true }
'''
offenses = []

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_parentheses_behaves_like_common_does_not_check_a_method_call_named_lambda"
strip_trailing_newline = true
source = '''
o.lambda
'''
offenses = []

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_no_parentheses_registers_an_offense_for_a_stabby_lambda_with_parentheses"
source = '''
->(a,b,c) { a + b + c }
'''
corrected = '''
->a,b,c { a + b + c }
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 9
message = "Do not wrap stabby lambda arguments with parentheses."

[tests.config]
EnforcedStyle = "require_no_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_no_parentheses_behaves_like_common_does_not_check_the_old_lambda_syntax"
strip_trailing_newline = true
source = '''
lambda(&:nil?)
'''
offenses = []

[tests.config]
EnforcedStyle = "require_no_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_no_parentheses_behaves_like_common_does_not_check_a_stabby_lambda_without_arguments"
strip_trailing_newline = true
source = '''
-> { true }
'''
offenses = []

[tests.config]
EnforcedStyle = "require_no_parentheses"

[[tests]]
name = "rubocopcopstylestabbylambdaparentheses_require_no_parentheses_behaves_like_common_does_not_check_a_method_call_named_lambda"
strip_trailing_newline = true
source = '''
o.lambda
'''
offenses = []

[tests.config]
EnforcedStyle = "require_no_parentheses"
