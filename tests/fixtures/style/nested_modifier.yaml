cop: Style/NestedModifier
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_nestedmodifier
    source: |
      something if a %{keyword} b
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Avoid using nested modifiers.

  - name: rubocop_cop_style_nestedmodifier
    source: |
      something %{keyword} a if b
    offenses:
      - line: 1
        column_start: 10
        column_end: 27
        message: Avoid using nested modifiers.

  - name: rubocop_cop_style_nestedmodifier_autocorrects_if_if
    source: |
      something if a if b
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Avoid using nested modifiers.
    corrected: |
      something if b && a

  - name: rubocop_cop_style_nestedmodifier_autocorrects_unless_unless
    source: |
      something unless a unless b
    offenses:
      - line: 1
        column_start: 10
        column_end: 16
        message: Avoid using nested modifiers.
    corrected: |
      something unless b || a

  - name: rubocop_cop_style_nestedmodifier_autocorrects_if_unless
    source: |
      something if a unless b
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Avoid using nested modifiers.
    corrected: |
      something unless b || !a

  - name: rubocop_cop_style_nestedmodifier_autocorrects_unless_with_a_comparison_operator_if
    source: |
      something unless b > 1 if true
    offenses:
      - line: 1
        column_start: 10
        column_end: 16
        message: Avoid using nested modifiers.
    corrected: |
      something if true && !(b > 1)

  - name: rubocop_cop_style_nestedmodifier_autocorrects_unless_if
    source: |
      something unless a if b
    offenses:
      - line: 1
        column_start: 10
        column_end: 16
        message: Avoid using nested modifiers.
    corrected: |
      something if b && !a

  - name: rubocop_cop_style_nestedmodifier_adds_parentheses_when_needed_in_autocorrection
    source: |
      something if a || b if c || d
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Avoid using nested modifiers.
    corrected: |
      something if (c || d) && (a || b)

  - name: rubocop_cop_style_nestedmodifier_adds_parentheses_to_method_arguments_when_needed_in_autocorrection
    source: |
      a unless [1, 2].include? a if a
    offenses:
      - line: 1
        column_start: 2
        column_end: 8
        message: Avoid using nested modifiers.
    corrected: |
      a if a && ![1, 2].include?(a)

  - name: rubocop_cop_style_nestedmodifier_does_not_add_redundant_parentheses_in_autocorrection
    source: |
      something if a unless c || d
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Avoid using nested modifiers.
    corrected: |
      something unless c || d || !a

  - name: rubocop_cop_style_nestedmodifier_while_not_correctable_while
    source: |
      while
    offenses:
      []

  - name: rubocop_cop_style_nestedmodifier_until_not_correctable_until
    source: |
      until
    offenses:
      []

  - name: rubocop_cop_style_nestedmodifier_registers_one_offense_for_more_than_two_modifiers
    source: |
      something until a while b unless c if d
    offenses:
      - line: 1
        column_start: 26
        column_end: 32
        message: Avoid using nested modifiers.
    corrected: |
      something until a while b if d && !c
