[[tests]]
name = "rubocop_cop_style_ifwithbooleanliteralbranches_when_condition_is_a_comparison_method_registers_and_corrects_an_offense_when_using_if_foo_bar_with_boolean_literal_branches"
source = '''
if foo #{comparison_operator} bar
  true
else
  false
end
'''
corrected = '''
