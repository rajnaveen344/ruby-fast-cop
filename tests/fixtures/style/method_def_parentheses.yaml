cop: Style/MethodDefParentheses
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_methoddefparentheses_reports_an_offense_for_def_with_parameters_with_parens
    source: |
      def func(a, b)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 14
        message: Use def without parentheses.
    corrected: |
      def func a, b
      end

  - name: rubocop_cop_style_methoddefparentheses_accepts_a_def_with_parameters_but_no_parens
    source: |
      def func a, b
      end
    offenses:
      []

  - name: rubocop_cop_style_methoddefparentheses_reports_an_offense_for_opposite_correct
    source: |
      def func(a, b)
      end
      def func a, b
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 14
        message: Use def without parentheses.
    corrected: |
      def func a, b
      end
      def func a, b
      end

  - name: rubocop_cop_style_methoddefparentheses_reports_an_offense_for_class_def_with_parameters_with_parens
    source: |
      def Test.func(a, b)
      end
    offenses:
      - line: 1
        column_start: 13
        column_end: 19
        message: Use def without parentheses.
    corrected: |
      def Test.func a, b
      end

  - name: rubocop_cop_style_methoddefparentheses_accepts_a_class_def_with_parameters_with_parens
    source: |
      def Test.func a, b
      end
    offenses:
      []

  - name: rubocop_cop_style_methoddefparentheses_reports_an_offense_for_def_with_no_args_and_parens
    source: |
      def func()
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Use def without parentheses.
    corrected: |
      def func#{trailing_whitespace}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_methoddefparentheses_accepts_def_with_no_args_and_no_parens
    source: |
      def func
      end
    offenses:
      []

  - name: rubocop_cop_style_methoddefparentheses_auto_removes_the_parens_for_defs
    source: |
      def self.test(param); end
    offenses:
      - line: 1
        column_start: 13
        column_end: 20
        message: Use def without parentheses.
    corrected: |
      def self.test param; end

  - name: rubocop_cop_style_methoddefparentheses_requires_parens_for_forwarding
    source: |
      def foo(...)
        bar(...)
      end
    offenses:
      []
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_methoddefparentheses_requires_parens_for_anonymous_block_forwarding
    source: |
      def foo(&)
        bar(&)
      end
    offenses:
      []
    ruby_version: ">= 3.1"

  - name: rubocop_cop_style_methoddefparentheses_requires_parens_for_anonymous_rest_arguments_forwarding
    source: |
      def foo(*)
        bar(*)
      end
    offenses:
      []
    ruby_version: ">= 3.2"

  - name: rubocop_cop_style_methoddefparentheses_requires_parens_for_anonymous_keyword_rest_arguments_forwarding
    source: |
      def foo(**)
        bar(**)
      end
    offenses:
      []
    ruby_version: ">= 3.2"

  - name: rubocop_cop_style_methoddefparentheses_endless_methods_accepts_parens_without_args
    source: |
      def foo() = x
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_methoddefparentheses_endless_methods_accepts_parens_with_args
    source: |
      def foo(x) = x
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_methoddefparentheses_endless_methods_accepts_parens_for_method_calls_inside_an_endless_method
    source: |
      def foo(x) = bar(x)
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_methoddefparentheses_endless_methods_accepts_parens_with_forward_arg
    source: |
      def foo(...)= bar(...)
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_reports_an_offense_for_def_with_parameters_but_no_parens
    source: |
      def func a, b
      end
    offenses:
      - line: 1
        column_start: 9
        column_end: 13
        message: Use def with parentheses when there are parameters.
    corrected: |
      def func(a, b)
      end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_reports_an_offense_for_correct_opposite
    source: |
      def func(a, b)
      end
      def func a, b
      end
    offenses:
      - line: 3
        column_start: 9
        column_end: 13
        message: Use def with parentheses when there are parameters.
    corrected: |
      def func(a, b)
      end
      def func(a, b)
      end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_reports_an_offense_for_class_def_with_parameters_but_no_parens
    source: |
      def Test.func a, b
      end
    offenses:
      - line: 1
        column_start: 14
        column_end: 18
        message: Use def with parentheses when there are parameters.
    corrected: |
      def Test.func(a, b)
      end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_accepts_def_with_no_args_and_no_parens
    source: |
      def func
      end
    offenses:
      []
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_auto_adds_required_parens_for_a_defs
    source: |
      def self.test param; end
    offenses:
      - line: 1
        column_start: 14
        column_end: 19
        message: Use def with parentheses when there are parameters.
    corrected: |
      def self.test(param); end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_auto_adds_required_parens_for_a_defs_after_a_passing_method
    source: |
      def self.fine; end
      
      def self.test param; end
      
      def self.test2 param; end
    offenses:
      - line: 3
        column_start: 14
        column_end: 19
        message: Use def with parentheses when there are parameters.
      - line: 5
        column_start: 15
        column_end: 20
        message: Use def with parentheses when there are parameters.
    corrected: |
      def self.fine; end
      
      def self.test(param); end
      
      def self.test2(param); end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_parentheses_auto_adds_required_parens_to_argument_lists_on_multiple_lines
    source: |
      def test one,
      two
      end
    offenses:
      - line: 1
        column_start: 9
        column_end: 13
        message: Use def with parentheses when there are parameters.
    corrected: |
      def test(one,
      two)
      end
    config:
      EnforcedStyle: require_parentheses

  - name: rubocop_cop_style_methoddefparentheses_require_no_parentheses_except_multiline_when_args_span_multiple_lines_auto_adds_required_parens_to_argument_lists_on_multiple_lines
    source: |
      def test one,
      two
      end
    offenses:
      - line: 1
        column_start: 9
        column_end: 13
        message: Use def with parentheses when there are parameters.
    corrected: |
      def test(one,
      two)
      end
    config:
      EnforcedStyle: require_no_parentheses_except_multiline

  - name: rubocop_cop_style_methoddefparentheses_require_no_parentheses_except_multiline_when_args_span_multiple_lines_reports_an_offense_for_correct_opposite
    source: |
      def func(a,
               b)
      end
      def func a,
               b
      end
    offenses:
      - line: 4
        column_start: 9
        column_end: 11
        message: Use def with parentheses when there are parameters.
    corrected: |
      def func(a,
               b)
      end
      def func(a,
               b)
      end
    config:
      EnforcedStyle: require_no_parentheses_except_multiline
