cop: Style/DoubleNegation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_doublenegation_registers_an_offense_and_corrects_for_when_not_a_return_location
    source: |
      def foo?
        foo
        !!test.something
        bar
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 3
        message: Avoid the use of double negation (`!!`).
    corrected: |
      def foo?
        foo
        !test.something.nil?
        bar
      end
    config:
      EnforcedStyle: $UNRESOLVED:enforced_style
    interpolated: true
    verified: false

  - name: rubocop_cop_style_doublenegation_registers_an_offense_and_corrects_for
    source: |
      ‹BASE›0‹/BASE›
      !!test.something
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Avoid the use of double negation (`!!`).
    corrected: |
      ‹BASE›0‹/BASE›
      !test.something.nil?
    config:
      EnforcedStyle: $UNRESOLVED:enforced_style
    interpolated: true
    verified: false

