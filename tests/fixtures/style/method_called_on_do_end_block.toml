cop = "Style/MethodCalledOnDoEndBlock"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_multiline_doend_block_registers_an_offense_for_a_chained_call"
source = '''
a do
  b
end.c
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 5
message = "Avoid chaining a method call on a do...end block."

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_multiline_doend_block_accepts_it_if_there_is_no_chained_call"
source = '''
a do
  b
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_multiline_doend_block_accepts_a_chained_block"
source = '''
a do
  b
end.c do
  d
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_multiline_doend_block_when_using_safe_navigation_operator_registers_an_offense_for_a_chained_call"
source = '''
a do
  b
end&.c
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 6
message = "Avoid chaining a method call on a do...end block."

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_singleline_doend_block_registers_an_offense_for_a_chained_call"
source = '''
a do b end.c
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 12
message = "Avoid chaining a method call on a do...end block."

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a_singleline_doend_block_accepts_a_singleline_doend_block_with_a_chained_block"
source = '''
a do b end.c do d end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a__block_accepts_a_multiline_block_with_a_chained_call"
source = '''
a {
  b
}.c
'''
offenses = []

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_with_a__block_accepts_a_singleline_block_with_a_chained_call"
source = '''
a { b }.c
'''
offenses = []

[[tests]]
name = "rubocopcopstylemethodcalledondoendblock_ruby_27_registers_an_offense_for_a_chained_call"
