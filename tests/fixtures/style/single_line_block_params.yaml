cop: Style/SingleLineBlockParams
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_singlelineblockparams_finds_wrong_argument_names_in_calls_with_different_syntax
    source: |
      def m
        [0, 1].reduce { |c, d| c + d }
        [0, 1].reduce{ |c, d| c + d }
        [0, 1].reduce(5) { |c, d| c + d }
        [0, 1].reduce(5){ |c, d| c + d }
        [0, 1].reduce (5) { |c, d| c + d }
        [0, 1].reduce(5) { |c, d| c + d }
        ala.test { |x, z| bala }
      end
    offenses:
      - line: 2
        column_start: 18
        column_end: 24
        message: Name `reduce` block params `|a, e|`.
      - line: 3
        column_start: 17
        column_end: 23
        message: Name `reduce` block params `|a, e|`.
      - line: 4
        column_start: 21
        column_end: 27
        message: Name `reduce` block params `|a, e|`.
      - line: 5
        column_start: 20
        column_end: 26
        message: Name `reduce` block params `|a, e|`.
      - line: 6
        column_start: 22
        column_end: 28
        message: Name `reduce` block params `|a, e|`.
      - line: 7
        column_start: 21
        column_end: 27
        message: Name `reduce` block params `|a, e|`.
      - line: 8
        column_start: 13
        column_end: 19
        message: Name `test` block params `|x, y|`.
    corrected: |
      def m
        [0, 1].reduce { |a, e| a + e }
        [0, 1].reduce{ |a, e| a + e }
        [0, 1].reduce(5) { |a, e| a + e }
        [0, 1].reduce(5){ |a, e| a + e }
        [0, 1].reduce (5) { |a, e| a + e }
        [0, 1].reduce(5) { |a, e| a + e }
        ala.test { |x, y| bala }
      end
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_allows_calls_with_proper_argument_names
    source: |
      def m
        [0, 1].reduce { |a, e| a + e }
        [0, 1].reduce{ |a, e| a + e }
        [0, 1].reduce(5) { |a, e| a + e }
        [0, 1].reduce(5){ |a, e| a + e }
        [0, 1].reduce (5) { |a, e| a + e }
        [0, 1].reduce(5) { |a, e| a + e }
        ala.test { |x, y| bala }
      end
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_allows_an_unused_parameter_to_have_a_leading_underscore
    source: |
      File.foreach(filename).reduce(0) { |a, _e| a + 1 }
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_finds_incorrectly_named_parameters_with_leading_underscores
    source: |
      File.foreach(filename).reduce(0) { |_x, _y| }
    offenses:
      - line: 1
        column_start: 35
        column_end: 43
        message: Name `reduce` block params `|_a, _e|`.
    corrected: |
      File.foreach(filename).reduce(0) { |_a, _e| }
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_ignores_do_end_blocks
    source: |
      def m
        [0, 1].reduce do |c, d|
          c + d
        end
      end
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_ignores_reduce_symbols
    source: |
      def m
        call_method(:reduce) { |a, b| a + b}
      end
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_does_not_report_when_destructuring_is_used
    source: |
      def m
        test.reduce { |a, (id, _)| a + id}
      end
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_does_not_report_if_no_block_arguments_are_present
    source: |
      def m
        test.reduce { true }
      end
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_reports_an_offense_if_the_names_are_partially_correct
    source: |
      test.reduce(x) { |a, b| foo(a, b) }
    offenses:
      - line: 1
        column_start: 17
        column_end: 23
        message: Name `reduce` block params `|a, e|`.
    corrected: |
      test.reduce(x) { |a, e| foo(a, e) }
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_reports_an_offense_if_the_names_are_in_reverse_order
    source: |
      test.reduce(x) { |e, a| foo(e, a) }
    offenses:
      - line: 1
        column_start: 17
        column_end: 23
        message: Name `reduce` block params `|a, e|`.
    corrected: |
      test.reduce(x) { |a, e| foo(a, e) }
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_does_not_report_if_the_right_names_are_used_but_not_all_arguments_are_given
    source: |
      test.reduce(x) { |a| foo(a) }
    offenses:
      []
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]

  - name: rubocop_cop_style_singlelineblockparams_reports_an_offense_if_the_arguments_names_are_wrong_and_not_all_arguments_are_given
    source: |
      test.reduce(x) { |b| foo(b) }
    offenses:
      - line: 1
        column_start: 17
        column_end: 20
        message: Name `reduce` block params `|a|`.
    corrected: |
      test.reduce(x) { |a| foo(a) }
    config:
      Methods: ["{ 'reduce' => %w[a e] }", "{ 'test' => %w[x y] }"]
