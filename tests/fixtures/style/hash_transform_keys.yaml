cop: Style/HashTransformKeys
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashtransformkeys_when_using_ruby_2_5_or_newer_with_inline_block_flags_each_with_object_when_transform_keys_could_be_used
    source: |
      x.each_with_object({}) {|(k, v), h| h[foo(k)] = v}
    offenses:
      - line: 1
        column_start: 0
        column_end: 50
        message: Prefer `transform_keys` over `each_with_object`.
    corrected: |
      x.transform_keys {|k| foo(k)}
    ruby_version: ">= 2.5"

  - name: rubocop_cop_style_hashtransformkeys_when_using_ruby_2_5_or_newer_with_multiline_block_flags_each_with_object_when_transform_keys_could_be_used
    source: |
      some_hash.each_with_object({}) do |(key, val), memo|
        memo[key.to_sym] = val
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 52
        message: Prefer `transform_keys` over `each_with_object`.
    corrected: |
      some_hash.transform_keys do |key|
        key.to_sym
      end
    ruby_version: ">= 2.5"

  - name: rubocop_cop_style_hashtransformkeys_when_using_ruby_2_5_or_newer_with_safe_navigation_operator_flags_each_with_object_when_transform_keys_could_be_used
