cop = "Style/RedundantAssignment"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantassignment_reports_an_offense_for_def_ending_with_assignment_and_returning"
source = '''
def func
  some_preceding_statements
  x = something
  x
end
'''
corrected = '''
def func
  some_preceding_statements
  something
  
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 15
message = "Redundant assignment before returning detected."

[[tests]]
name = "rubocopcopstyleredundantassignment_does_not_register_an_offense_when_ensure_block_present"
source = '''
def func
  1
  x = 2
  x
ensure
  3
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantassignment_accepts_empty_when_nodes"
source = '''
def func
  case x
  when y then 1
  when z # do nothing
  else
    3
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantassignment_accepts_empty_in_nodes"
source = '''
def func
  case x
  in y then 1
  in z # do nothing
  else
    3
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantassignment_accepts_empty_method_body"
source = '''
def func
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantassignment_accepts_empty_if_body"
source = '''
def func
  if x
  elsif y
  else
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantassignment_when_inside_beginend_body_registers_an_offense_and_autocorrects"
source = '''
def func
  some_preceding_statements
  begin
    x = something
    x
  end
end
'''
corrected = '''
def func
  some_preceding_statements
  begin
    something
    
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 4
column_end = 17
message = "Redundant assignment before returning detected."

[[tests]]
name = "rubocopcopstyleredundantassignment_when_rescue_blocks_present_registers_an_offense_and_autocorrects_when_inside_function_or_rescue_block"
source = '''
def func
  1
  x = 2
  x
rescue SomeException
  3
  x = 4
  x
rescue AnotherException
  5
end
'''
corrected = '''
def func
  1
  2
  
rescue SomeException
  3
  4
  
rescue AnotherException
  5
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 7
message = "Redundant assignment before returning detected."

[[tests.offenses]]
line = 7
column_start = 2
column_end = 7
message = "Redundant assignment before returning detected."

[[tests]]
name = "rubocopcopstyleredundantassignment_when_inside_an_ifbranch_registers_an_offense_and_autocorrects"
source = '''
def func
  some_preceding_statements
  if x
    z = 1
    z
  elsif y
    2
  else
    z = 3
    z
  end
end
'''
corrected = '''
def func
  some_preceding_statements
  if x
    1
    
  elsif y
    2
  else
    3
    
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 4
column_end = 9
message = "Redundant assignment before returning detected."

[[tests.offenses]]
line = 9
column_start = 4
column_end = 9
message = "Redundant assignment before returning detected."

[[tests]]
name = "rubocopcopstyleredundantassignment_when_inside_a_whenbranch_registers_an_offense_and_autocorrects"
source = '''
def func
  some_preceding_statements
  case x
  when y
    res = 1
    res
  when z
    2
  when q
  else
    res = 3
    res
  end
end
'''
corrected = '''
def func
  some_preceding_statements
  case x
  when y
    1
    
  when z
    2
  when q
  else
    3
    
  end
end
'''

[[tests.offenses]]
line = 5
column_start = 4
column_end = 11
message = "Redundant assignment before returning detected."

[[tests.offenses]]
line = 11
column_start = 4
column_end = 11
message = "Redundant assignment before returning detected."

[[tests]]
name = "rubocopcopstyleredundantassignment_when_inside_an_in_branch_registers_an_offense_and_autocorrects"
source = '''
def func
  some_preceding_statements
  case x
  in y
    res = 1
    res
  in z
    2
  in q
