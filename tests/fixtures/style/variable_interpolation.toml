cop = "Style/VariableInterpolation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylevariableinterpolation_registers_an_offense_for_interpolated_global_variables_in_string"
source = '''
puts "this is a #$test"
'''
corrected = '''
puts "this is a #{$test}"
'''

[[tests.offenses]]
line = 1
column_start = 17
column_end = 22
message = "Replace interpolated variable `$test` with expression `#{$test}`."

