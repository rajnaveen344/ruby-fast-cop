      # comment a
      something(&:upcase) # comment b
      # comment c
    config:
      AllowComments: true
      AllowMethodsWithArguments: false
      AllowedMethods: [$UNRESOLVED:respond_to]
      AllowedPatterns: [$UNRESOLVED:respond_]

