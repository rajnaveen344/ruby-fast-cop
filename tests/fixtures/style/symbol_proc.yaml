cop: Style/SymbolProc
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_symbolproc_registers_an_offense_for_a_block_with_parameterless_method_call_on_param
    source: |
      coll.map { |e| e.upcase }
    offenses:
      - line: 1
        column_start: 9
        column_end: 25
        message: "Pass `&:upcase` as an argument to `map` instead of a block."
    corrected: |
      coll.map(&:upcase)

  - name: rubocop_cop_style_symbolproc_registers_an_offense_for_a_block_with_parameterless_method_call_on_param_and_no_space_between_method_name_and_opening_brace
    source: |
      foo.map{ |a| a.nil? }
    offenses:
      - line: 1
        column_start: 7
        column_end: 21
        message: "Pass `&:nil?` as an argument to `map` instead of a block."
    corrected: |
      foo.map(&:nil?)

  - name: rubocop_cop_style_symbolproc_registers_an_offense_for_safe_navigation_operator
    source: |
      coll&.map { |e| e.upcase }
    offenses:
      - line: 1
        column_start: 10
        column_end: 26
        message: "Pass `&:upcase` as an argument to `map` instead of a block."
    corrected: |
      coll&.map(&:upcase)

  - name: rubocop_cop_style_symbolproc_registers_an_offense_for_a_block_when_method_in_body_is_unary
    source: |
      something.map { |x| -x }
    offenses:
      - line: 1
        column_start: 14
        column_end: 24
        message: "Pass `&:-@` as an argument to `map` instead of a block."
    corrected: |
      something.map(&:-@)

  - name: rubocop_cop_style_symbolproc_accepts_block_with_more_than_1_arguments
    source: |
      something { |x, y| x.method }
    offenses:
      []

  - name: rubocop_cop_style_symbolproc_when_allcops_activesupportextensionsenabled_true_accepts_lambda_with_1_argument
    source: |
      ->(x) { x.method }
    offenses:
      []

