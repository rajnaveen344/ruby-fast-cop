cop = "Style/DisableCopsWithinSourceCodeDirective"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_registers_an_offense_for_disabled_cop_within_source_code"
source = '''
def foo # rubocop:disable Metrics/CyclomaticComplexity
end
'''
corrected = '''
def foo#{trailing_whitespace}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 8
column_end = 54
message = "RuboCop disable/enable directives are not permitted."

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_registers_an_offense_for_enabled_cop_within_source_code"
source = '''
def foo # rubocop:enable Metrics/CyclomaticComplexity
end
'''
corrected = '''
def foo#{trailing_whitespace}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 8
column_end = 53
message = "RuboCop disable/enable directives are not permitted."

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_registers_an_offense_for_disabling_all_cops"
source = '''
def foo # rubocop:enable all
end
'''
corrected = '''
def foo#{trailing_whitespace}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 8
column_end = 28
message = "RuboCop disable/enable directives are not permitted."

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_with_allowedcops_when_an_allowed_cop_is_disabled_does_not_register_an_offense"
source = '''
def foo # rubocop:disable Metrics/CyclomaticComplexity
end
'''
offenses = []

[tests.config]
AllowedCops = ["Metrics/CyclomaticComplexity", "Metrics/AbcSize"]

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_with_allowedcops_when_a_non_allowed_cop_is_disabled_registers_an_offense_and_corrects"
source = '''
def foo # rubocop:disable Layout/LineLength
end
'''
corrected = '''
def foo#{trailing_whitespace}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 8
column_end = 43
message = "RuboCop disable/enable directives for `Layout/LineLength` are not permitted."

[tests.config]
AllowedCops = ["Metrics/CyclomaticComplexity", "Metrics/AbcSize"]

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_with_allowedcops_when_a_mix_of_cops_are_disabled_registers_an_offense_and_corrects"
source = '''
def foo # rubocop:disable Metrics/AbcSize, Layout/LineLength, Metrics/CyclomaticComplexity, Style/AndOr
end
'''
corrected = '''
def foo # rubocop:disable Metrics/AbcSize, Metrics/CyclomaticComplexity
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 103
message = "RuboCop disable/enable directives for `Layout/LineLength`, `Style/AndOr` are not permitted."

[tests.config]
AllowedCops = ["Metrics/CyclomaticComplexity", "Metrics/AbcSize"]

[[tests]]
name = "rubocop_cop_style_disablecopswithinsourcecodedirective_with_allowedcops_when_using_leading_source_comment_does_not_register_an_offense"
source = '''
# comment

class Foo
end
'''
offenses = []

[tests.config]
AllowedCops = ["Metrics/CyclomaticComplexity", "Metrics/AbcSize"]
