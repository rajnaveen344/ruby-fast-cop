cop = "Style/DefWithParentheses"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyledefwithparentheses_reports_an_offense_for_def_with_empty_parens"
source = '''
def func()
end
'''
corrected = '''
def func
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 10
message = "Omit the parentheses in defs when the method doesn't accept any arguments."

[[tests]]
name = "rubocopcopstyledefwithparentheses_reports_an_offense_for_class_def_with_empty_parens"
source = '''
def Test.func()
  something
end
'''
corrected = '''
def Test.func
  something
end
'''

[[tests.offenses]]
line = 1
column_start = 13
column_end = 15
message = "Omit the parentheses in defs when the method doesn't accept any arguments."

[[tests]]
name = "rubocopcopstyledefwithparentheses_accepts_def_with_arg_and_parens"
source = '''
def func(a)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyledefwithparentheses_accepts_def_without_arguments"
source = '''
def func
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyledefwithparentheses_accepts_empty_parentheses_in_one_liners"
strip_trailing_newline = true
source = '''
def to_s() join '/' end
'''
offenses = []

[[tests]]
name = "rubocopcopstyledefwithparentheses_ruby__30_reports_an_offense_for_endless_method_definition_with_empty_parens"
ruby_version = ">= 3.0"
source = '''
def foo() = do_something
'''
corrected = '''
def foo = do_something
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 9
message = "Omit the parentheses in defs when the method doesn't accept any arguments."

[[tests]]
name = "rubocopcopstyledefwithparentheses_ruby__30_reports_an_offense_for_endless_method_definition_with_empty_parens_followed_by_a_space_before_"
ruby_version = ">= 3.0"
source = '''
def foo() =do_something
'''
corrected = '''
def foo =do_something
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 9
message = "Omit the parentheses in defs when the method doesn't accept any arguments."

[[tests]]
name = "rubocopcopstyledefwithparentheses_ruby__30_does_not_register_an_offense_for_endless_method_definition_with_empty_parens_followed_by_no_space_before_"
ruby_version = ">= 3.0"
source = '''
def foo()= do_something
'''
offenses = []

[[tests]]
name = "rubocopcopstyledefwithparentheses_ruby__30_does_not_register_an_offense_for_endless_method_definition_with_empty_parens_followed_by_no_spaces_around_"
ruby_version = ">= 3.0"
source = '''
def foo()=do_something
'''
offenses = []
