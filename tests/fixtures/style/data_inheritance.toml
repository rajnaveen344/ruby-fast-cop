cop = "Style/DataInheritance"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyledatainheritance_ruby__32_registers_an_offense_when_extending_instance_of_datadefine"
source = '''
class Person < Data.define(:first_name, :last_name)
  def foo; end
end
'''
corrected = '''
Person = Data.define(:first_name, :last_name) do
  def foo; end
end
'''

[[tests.offenses]]
line = 1
column_start = 15
column_end = 51
message = "Don't extend an instance initialized by `Data.define`. Use a block to customize the class."

