cop: Style/SendWithLiteralMethodName
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_sendwithliteralmethodname_when_calling_public_send_with_a_symbol_literal_argument_registers_an_offense
    source: |
      obj.public_send(:foo)
    offenses:
      - line: 1
        column_start: 4
        column_end: 21
        message: Use `foo` method call directly instead.
    corrected: |
      obj.foo

  - name: rubocop_cop_style_sendwithliteralmethodname_when_calling_public_send_with_a_symbol_literal_argument_with_safe_navigation_registers_an_offense
    source: |
      obj&.public_send(:foo)
    offenses:
      - line: 1
        column_start: 5
        column_end: 22
        message: Use `foo` method call directly instead.
    corrected: |
      obj&.foo

  - name: rubocop_cop_style_sendwithliteralmethodname_when_calling_public_send_with_a_symbol_literal_argument_and_some_arguments_with_parentheses_registers_an_offense
    source: |
      obj.public_send(:foo, bar, 42)
    offenses:
      - line: 1
        column_start: 4
        column_end: 30
        message: Use `foo` method call directly instead.
    corrected: |
      obj.foo(bar, 42)

