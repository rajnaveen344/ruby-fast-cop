cop = "Style/EmptyLambdaParameter"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleemptylambdaparameter_registers_an_offense_for_an_empty_block_parameter_with_a_lambda"
source = '''
-> () { do_something }
'''
corrected = '''
-> { do_something }
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 5
message = "Omit parentheses for the empty lambda parameters."

[[tests]]
name = "rubocopcopstyleemptylambdaparameter_accepts_a_keyword_lambda"
source = '''
lambda { || do_something }
'''
offenses = []

[[tests]]
name = "rubocopcopstyleemptylambdaparameter_does_not_crash_on_a_super"
source = '''
def foo
  super { || do_something }
end
'''
offenses = []
