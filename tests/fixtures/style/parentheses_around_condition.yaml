cop: Style/ParenthesesAroundCondition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_parenthesesaroundcondition_registers_an_offense_for_parentheses_around_condition
    source: |
      if (x > 10)
      elsif (x < 3)
      end
      unless (x > 10)
      end
      while (x > 10)
      end
      until (x > 10)
      end
      x += 1 if (x < 10)
      x += 1 unless (x < 10)
      x += 1 until (x < 10)
      x += 1 while (x < 10)
    offenses:
      - line: 1
        column_start: 3
        column_end: 11
        message: "Don't use parentheses around the condition of an `if`."
      - line: 2
        column_start: 6
        column_end: 13
        message: "Don't use parentheses around the condition of an `elsif`."
      - line: 4
        column_start: 7
        column_end: 15
        message: "Don't use parentheses around the condition of an `unless`."
      - line: 6
        column_start: 6
        column_end: 14
        message: "Don't use parentheses around the condition of a `while`."
      - line: 8
        column_start: 6
        column_end: 14
        message: "Don't use parentheses around the condition of an `until`."
      - line: 10
        column_start: 10
        column_end: 18
        message: "Don't use parentheses around the condition of an `if`."
      - line: 11
        column_start: 14
        column_end: 22
        message: "Don't use parentheses around the condition of an `unless`."
      - line: 12
        column_start: 13
        column_end: 21
        message: "Don't use parentheses around the condition of an `until`."
      - line: 13
        column_start: 13
        column_end: 21
        message: "Don't use parentheses around the condition of a `while`."
    corrected: |
      if x > 10
      elsif x < 3
      end
      unless x > 10
      end
      while x > 10
      end
      until x > 10
      end
      x += 1 if x < 10
      x += 1 unless x < 10
      x += 1 until x < 10
      x += 1 while x < 10
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_accepts_parentheses_if_there_is_no_space_between_the_keyword_and
    source: |
      if(x > 5) then something end
      do_something until(x > 5)
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_accepts_parentheses_around_condition_in_a_ternary
    source: |
      (a == 0) ? b : a
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_is_not_confused_by_leading_parentheses_in_subexpression
    source: |
      (a > b) && other ? one : two
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_is_not_confused_by_parentheses_in_subexpression
    source: |
      if (a + b).c()
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition
    source: |
      if (something #{op} top)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true
    interpolated: true
    verified: false

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_blow_up_when_the_condition_is_a_ternary_op
    source: |
      x if (a ? b : c)
    offenses:
      - line: 1
        column_start: 5
        column_end: 16
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      x if a ? b : c
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_blow_up_for_empty_if_condition
    source: |
      if ()
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_blow_up_for_empty_unless_condition
    source: |
      unless ()
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_register_an_offense_when_using_a_method_call_with_do_end_block_as_a_condition_in_while_loop
    source: |
      while (foo do
            end)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_register_an_offense_when_using_a_method_call_with_do_end_block_as_a_condition_in_until_loop
    source: |
      until (foo do
            end)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_register_an_offense_when_using_a_method_call_with_do_end_numbered_block_as_a_condition_in_while_loop
    source: |
      while (foo do
              _1
            end)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_register_an_offense_when_using_a_method_call_with_do_end_numbered_block_as_a_condition_in_until_loop
    source: |
      until (foo do
              _1
            end)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_registers_an_offense_when_using_method_call_with_block_as_a_while_condition
    source: |
      while (foo {
            })
      end
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: "Don't use parentheses around the condition of a `while`."
    corrected: |
      while foo {
            }
      end
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_registers_an_offense_when_using_method_call_with_block_as_a_until_condition
    source: |
      until (foo {
            })
      end
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: "Don't use parentheses around the condition of an `until`."
    corrected: |
      until foo {
            }
      end
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_registers_an_offense_when_using_method_call_with_do_end_block_as_a_if_condition
    source: |
      if (foo do
         end)
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 10
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if foo do
         end
      end
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_registers_an_offense_when_using_method_call_with_block_as_a_if_condition
    source: |
      if (foo {
         })
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 9
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if foo {
         }
      end
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_does_not_register_an_offense_when_parentheses_in_multiple_expressions_separated_by_semicolon
    source: |
      if (foo; bar)
        do_something
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_safe_assignment_is_allowed_accepts_variable_assignment_in_condition_surrounded_with_parentheses
    source: |
      if (test = 10)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_safe_assignment_is_allowed_accepts_element_assignment_in_condition_surrounded_with_parentheses
    source: |
      if (test[0] = 10)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_safe_assignment_is_allowed_accepts_setter_in_condition_surrounded_with_parentheses
    source: |
      if (self.test = 10)
      end
    offenses:
      []
    config:
      AllowSafeAssignment: true

  - name: rubocop_cop_style_parenthesesaroundcondition_safe_assignment_is_not_allowed_does_not_accept_variable_assignment_in_condition_surrounded_with_parentheses
    source: |
      if (test = 10)
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 14
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if test = 10
      end
    config:
      AllowSafeAssignment: false

  - name: rubocop_cop_style_parenthesesaroundcondition_safe_assignment_is_not_allowed_does_not_accept_element_assignment_in_condition_surrounded_with_parentheses
    source: |
      if (test[0] = 10)
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 17
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if test[0] = 10
      end
    config:
      AllowSafeAssignment: false

  - name: rubocop_cop_style_parenthesesaroundcondition_parentheses_in_multiline_conditions_are_allowed_accepts_parentheses_around_multiline_condition
    source: |
      if (
        x > 3 &&
        x < 10
      )
        return true
      end
    offenses:
      []
    config:
      AllowInMultilineConditions: true
      AllowSafeAssignment: false

  - name: rubocop_cop_style_parenthesesaroundcondition_parentheses_in_multiline_conditions_are_allowed_registers_an_offense_for_parentheses_in_single_line_condition
    source: |
      if (x > 3 && x < 10)
        return true
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 20
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if x > 3 && x < 10
        return true
      end
    config:
      AllowInMultilineConditions: true
      AllowSafeAssignment: false

  - name: rubocop_cop_style_parenthesesaroundcondition_parentheses_in_multiline_conditions_are_not_allowed_registers_an_offense_for_parentheses_around_multiline_condition
    source: |
      if (
        x > 3 &&
        x < 10
      )
        return true
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 4
        message: "Don't use parentheses around the condition of an `if`."
    corrected: |
      if x > 3 &&
        x < 10
        return true
      end
    config:
      AllowInMultilineConditions: false
      AllowSafeAssignment: false
