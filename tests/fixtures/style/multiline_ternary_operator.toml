cop = "Style/MultilineTernaryOperator"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemultilineternaryoperator_registers_an_offense_and_corrects_when_the_if_branch_and_the_else_branch_are_on_a_separate_line_from_the_condition"
source = '''
a = cond ?
  b : c
'''
corrected = '''
a = if cond
  b
else
  c
end
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 10
message = "Avoid multi-line ternary operators, use `if` or `unless` instead."

[[tests]]
name = "rubocopcopstylemultilineternaryoperator_registers_an_offense_and_corrects_when_the_false_branch_is_on_a_separate_line_and_assigning_a_return_value"
source = '''
a = cond ? b :
    c
'''
corrected = '''
a = if cond
  b
else
  c
end
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 14
message = "Avoid multi-line ternary operators, use `if` or `unless` instead."

