[[tests]]
name = "rubocopcopstylemultilineternaryoperator_registers_an_offense_and_corrects_when_nesting_multiline_ternary_operators"
source = '''
cond_a? ? foo :
  cond_b? ? bar :
    cond_c? ? baz : qux
'''
corrected = '''
if cond_a?
  foo
else
  if cond_b?
  bar
else
  cond_c? ? baz : qux
end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Avoid multi-line ternary operators, use `if` or `unless` instead."

