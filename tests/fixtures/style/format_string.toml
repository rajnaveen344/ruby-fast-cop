cop = "Style/FormatString"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleformatstring_when_enforced_style_is_sprintf_registers_an_offense_for_a_string_followed_by_something"
source = '''
puts "%d" % 10
'''
corrected = '''
puts sprintf("%d", 10)
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 11
message = "Favor `sprintf` over `String#%`."

[tests.config]
EnforcedStyle = "sprintf"

[[tests]]
name = "rubocopcopstyleformatstring_when_enforced_style_is_sprintf_registers_an_offense_for_something_followed_by_an_array"
