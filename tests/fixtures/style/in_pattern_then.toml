cop = "Style/InPatternThen"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleinpatternthen__ruby_27_registers_an_offense_for_in_b"
source = '''
case a
in b; c
end
'''
corrected = '''
case a
in b then c
end
'''

[[tests.offenses]]
line = 2
column_start = 4
column_end = 5
message = "Do not use `in b;`. Use `in b then` instead."

[[tests]]
name = "rubocopcopstyleinpatternthen__ruby_27_registers_an_offense_for_in_b_c_d_array_pattern"
source = '''
