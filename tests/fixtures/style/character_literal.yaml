cop: Style/CharacterLiteral
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_characterliteral_registers_an_offense_for_character_literals
    source: |
      x = ?x
    offenses:
      - line: 1
        column_start: 4
        column_end: 6
        message: Do not use the character literal - use string literal instead.
    corrected: |
      x = 'x'

  - name: rubocop_cop_style_characterliteral_registers_an_offense_for_literals_like_n
    source: |
      x = ?\n
    offenses:
      - line: 1
        column_start: 4
        column_end: 7
        message: Do not use the character literal - use string literal instead.
    corrected: |
      x = "\n"

  - name: rubocop_cop_style_characterliteral_accepts_literals_like_c_m_d
    source: |
      x = ?\C-\M-d
    offenses:
      []

  - name: rubocop_cop_style_characterliteral_accepts_in_a_w_literal
    source: |
      %w{? A}
    offenses:
      []

  - name: rubocop_cop_style_characterliteral_autocorrects_to
    source: |
      x = ?'
    offenses:
      - line: 1
        column_start: 4
        column_end: 6
        message: Do not use the character literal - use string literal instead.
    corrected: |
      x = "'"
