  - name: rubocop_cop_style_quotedsymbols_registers_an_offense_for_single_quotes
    source: |
      :'a'
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: Prefer double-quoted symbols unless you need single quotes to avoid extra backslashes for escaping.
    corrected: |
