cop: Style/QuotedSymbols
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_quotedsymbols_accepts_unquoted_symbols
    source: |
      :a
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_single_quotes
    source: |
      :'a'
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_with_interpolation
    source: |
      :"#{a}"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_when_interpolating_an_instance_variable
    source: |
      :"#@test"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_when_interpolating_a_global_variable
    source: |
      :"#$test"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_when_interpolating_a_class_variable
    source: |
      :"#@@test"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_with_escape_sequences
    source: |
      :"a\nb"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_single_quotes_with_double_quotes
    source: |
      :'"'
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_with_single_quotes
    source: |
      :"'"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_single_quotes_with_line_breaks
    source: |
      :'a
        bc'
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_with_line_breaks
    source: |
      :"a
        bc"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_when_control_characters_are_used
    source: |
      :"\e"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_when_unicode_control_sequence_is_used
    source: |
      :"Espa\u00f1a"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_accepts_double_quotes_with_some_other_special_symbols
    source: |
      g = :"\x3D"
      copyright = :"\u00A9"
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_registers_an_offense_and_corrects_for_double_quotes_without_interpolation
    source: |
      :"a"
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: "Prefer single-quoted symbols when you don't need string interpolation or special symbols."
    corrected: |
      :'a'

  - name: rubocop_cop_style_quotedsymbols_registers_an_offense_and_corrects_for_double_quotes_in_hash_keys
    source: |
      { "a": value }
    offenses:
      - line: 1
        column_start: 2
        column_end: 5
        message: "Prefer single-quoted symbols when you don't need string interpolation or special symbols."
    corrected: |
      { 'a': value }

  - name: rubocop_cop_style_quotedsymbols_registers_an_offense_and_corrects_for_an_escaped_quote_within_double_quotes
    source: |
      :"my\"quote"
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Prefer single-quoted symbols when you don't need string interpolation or special symbols."
    corrected: |
      :'my"quote'

  - name: rubocop_cop_style_quotedsymbols_registers_an_offense_and_corrects_escape_characters_properly
    source: |
      :"foo\\bar"
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: "Prefer single-quoted symbols when you don't need string interpolation or special symbols."
    corrected: |
      :'foo\\bar'

  - name: rubocop_cop_style_quotedsymbols_accepts_single_quoted_symbol_with_an_escaped_quote
    source: |
      :'o\'clock'
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_hash_with_hash_rocket_style_accepts_properly_quoted_symbols
    source: |
      { :'a' => value }
    offenses:
      []

  - name: rubocop_cop_style_quotedsymbols_hash_with_hash_rocket_style_corrects_wrong_quotes
    source: |
      { :"a" => value }
    offenses:
      - line: 1
        column_start: 2
        column_end: 6
        message: "Prefer single-quoted symbols when you don't need string interpolation or special symbols."
    corrected: |
      { :'a' => value }

