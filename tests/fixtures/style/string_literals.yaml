  - name: rubocop_cop_style_stringliterals_configured_with_double_quotes_preferred_registers_an_offense_for_single_quotes_when_double_quotes_would_be_equivalent
    source: |
      s = 'abc'
    offenses:
      - line: 1
        column_start: 4
        column_end: 9
        message: Prefer double-quoted strings unless you need single quotes to avoid extra backslashes for escaping.
    corrected: |
      s = "abc"
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_double_quotes_preferred_registers_an_offense_for_opposite_correct
    source: |
      s = "abc"
      x = 'abc'
    offenses:
