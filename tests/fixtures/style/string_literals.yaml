      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_in_interpolation
    source: |
      "#{"A"}"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_detects_unneeded_double_quotes_within_concatenated_string
    source: |
      "#{x}" \
      "y"
    offenses:
      - line: 2
        column_start: 0
        column_end: 3
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
    corrected: |
      "#{x}" \
      'y'
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_can_handle_a_built_in_constant_parsed_as_string
    source: |
      if __FILE__ == $PROGRAM_NAME
      end
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_can_handle_character_literals
    source: |
      a = ?/
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_registers_an_offense_for
    source: |
