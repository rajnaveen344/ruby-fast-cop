  - name: rubocop_cop_style_stringliterals_when_consistentquotesinmultiline_is_true_and_enforcedstyle_is_single_quotes_registers_an_offense_for_strings_with_line_breaks_in_them
    source: |
      "--
      SELECT *
        LEFT JOIN X on Y
        FROM Models"
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
    config:
      ConsistentQuotesInMultiline: true
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_when_consistentquotesinmultiline_is_true_and_enforcedstyle_is_single_quotes_accepts_continued_strings_using_all_single_quotes
    source: |
      'abc' \
      'def'
    offenses:
