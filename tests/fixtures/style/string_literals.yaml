    source: |
      execute <<-SQL
        SELECT name from users
      SQL
    offenses:
      []
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_double_quotes_preferred_accepts_single_quotes_in_string_with_escaped_non_character
    source: |
      '\n'
    offenses:
      []
    config:
      EnforcedStyle: double_quotes

