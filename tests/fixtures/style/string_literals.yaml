        column_start: 0
        column_end: 4
        message: Prefer double-quoted strings unless you need single quotes to avoid extra backslashes for escaping.
      - line: 2
        column_start: 0
        column_end: 4
        message: Prefer double-quoted strings unless you need single quotes to avoid extra backslashes for escaping.
    corrected: |
      "'"
      "\\"
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_double_quotes_preferred_does_not_accept_multiple_escaped_single_quotes_in_single_quotes
    source: |
      'This \'string\' has \'multiple\' escaped quotes'
    offenses:
      - line: 1
        column_start: 0
        column_end: 49
        message: Prefer double-quoted strings unless you need single quotes to avoid extra backslashes for escaping.
    corrected: |
      "This 'string' has 'multiple' escaped quotes"
    config:
      EnforcedStyle: double_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_double_quotes_preferred_accepts_double_quotes
    source: |
      a = "x"
    offenses:
      []
    config:
