cop: Style/StringLiterals
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_when_single_quotes_suffice
    source: |
      s = "abc"
      x = "a\\b"
      y ="\\b"
      z = "a\\"
      t = "{\"[\\\"*\\\"]\""
    offenses:
      - line: 1
        column_start: 4
        column_end: 9
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
      - line: 2
        column_start: 4
        column_end: 10
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
      - line: 3
        column_start: 3
        column_end: 8
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
      - line: 4
        column_start: 4
        column_end: 9
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
      - line: 5
        column_start: 4
        column_end: 22
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
    corrected: |
      s = 'abc'
      x = 'a\\b'
      y ='\\b'
      z = 'a\\'
      t = '{"[\"*\"]"'
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_registers_an_offense_for_correct_opposite
    source: |
      s = "abc"
      x = 'abc'
    offenses:
      - line: 1
        column_start: 4
        column_end: 9
        message: "Prefer single-quoted strings when you don't need string interpolation or special symbols."
    corrected: |
      s = 'abc'
      x = 'abc'
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_single_quotes
    source: |
      a = 'x'
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_single_quotes_in_interpolation
    source: |
      "hello#{hash['there']}"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_q_and_q_quotes
    source: |
      a = %q(x) + %Q[x]
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_quotes
    source: |
      a = %(x)
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_heredocs
    source: |
      execute <<-SQL
        SELECT name from users
      SQL
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_new_line_is_used
    source: |
      "\n"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_interpolating_quotes_in_multiple_lines
    source: |
      "#{encode_severity}:#{sprintf('%3d', line_number)}: #{m}"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_single_quotes_are_used
    source: |
      "'"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_interpolating_an_instance_variable
    source: |
      "#@test"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_interpolating_a_global_variable
    source: |
      "#$test"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_interpolating_a_class_variable
    source: |
      "#@@test"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_control_characters_are_used
    source: |
      "\e"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_when_unicode_control_sequence_is_used
    source: |
      "Espa\u00f1a"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_at_the_start_of_regexp_literals
    source: |
      s = /"((?:[^\"]|\.)*)"/
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_double_quotes_with_some_other_special_symbols
    source: |
      g = "\xf9"
      copyright = "\u00A9"
    offenses:
      []
    config:
      EnforcedStyle: single_quotes

  - name: rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_accepts_in_a_w
    source: |
      %w(")
    offenses:
      []
    config:
