cop: Style/StringHashKeys
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_stringhashkeys_registers_an_offense_when_using_strings_as_keys
    source: |
      { 'one' => 1 }
    offenses:
      - line: 1
        column_start: 2
        column_end: 7
        message: Prefer symbols instead of strings as hash keys.
    corrected: |
      { :one => 1 }

  - name: rubocop_cop_style_stringhashkeys_registers_an_offense_when_using_strings_as_keys_mixed_with_other_keys
    source: |
      { 'one' => 1, two: 2, 3 => 3 }
    offenses:
      - line: 1
        column_start: 2
        column_end: 7
        message: Prefer symbols instead of strings as hash keys.
    corrected: |
      { :one => 1, two: 2, 3 => 3 }

  - name: rubocop_cop_style_stringhashkeys_autocorrects_strings_as_keys_into_symbols_with_the_correct_syntax
    source: |
      { 'one two :' => 1 }
    offenses:
      - line: 1
        column_start: 2
        column_end: 13
        message: Prefer symbols instead of strings as hash keys.
    corrected: |
      { :"one two :" => 1 }

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_not_using_strings_as_keys
    source: |
      { one: 1 }
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_using_invalid_symbol_in_encoding_utf_8_as_keys
    source: |
      { "Test with malformed utf8 \251" => 'test-with-malformed-utf8' }
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_string_key_is_used_in_io_popen
    source: |
      IO.popen({"RUBYOPT" => '-w'}, 'ruby', 'foo.rb')
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_string_key_is_used_in_open3_capture3
    source: |
      Open3.capture3({"RUBYOPT" => '-w'}, 'ruby', 'foo.rb')
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_string_key_is_used_in_open3_pipeline
    source: |
      Open3.pipeline([{"RUBYOPT" => '-w'}, 'ruby', 'foo.rb'], ['wc', '-l'])
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_string_key_is_used_in_gsub
    source: |
      "The sky is green.".gsub(/green/, "green" => "blue")
    offenses:
      []

  - name: rubocop_cop_style_stringhashkeys_does_not_register_an_offense_when_string_key_is_used_in_gsub
    source: |
      "The sky is green.".gsub!(/green/, "green" => "blue")
    offenses:
      []
