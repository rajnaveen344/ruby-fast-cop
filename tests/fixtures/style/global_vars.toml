cop = "Style/GlobalVars"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleglobalvars_registers_an_offense_for_custom"
source = '''
puts $custom
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 12
message = "Do not introduce global variables."

[tests.config]
AllowedVariables = ["$allowed"]
References = ["https://www.zenspider.com/ruby/quickref.html"]

