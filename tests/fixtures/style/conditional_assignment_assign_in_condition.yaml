cop: Style/ConditionalAssignmentAssignInCondition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_conditionalassignment_registers_an_offense_assigning_any_variable_type_to_ternary
    source: |
      %{variable} = foo? ? 1 : 2
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Assign variables inside of conditionals.
    corrected: |
      foo? ? #{variable} = 1 : #{variable} = 2
    interpolated: true

  - name: rubocop_cop_style_conditionalassignment_registers_an_offense_assigning_any_variable_type_to_if_else
    source: |
      %{variable} = if foo
                      1
                    else
                      2
                    end
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Assign variables inside of conditionals.
    corrected: |
      if foo
        #{variable} = 1
      else
        #{variable} = 2
      end
    interpolated: true

  - name: rubocop_cop_style_conditionalassignment_registers_an_offense_assigning_any_variable_type_to_if_elsif_else
    source: |
      %{variable} = if foo
                      1
                    elsif baz
                      2
                    else
                      3
                    end
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Assign variables inside of conditionals.
    corrected: |
      if foo
        #{variable} = 1
      elsif baz
        #{variable} = 2
      else
        #{variable} = 3
      end
    interpolated: true

  - name: rubocop_cop_style_conditionalassignment_registers_an_offense_assigning_any_variable_type_to_if_else_with_multiple_assignment
    source: |
      %{variable}, %{variable} = if foo
                      something
                    else
                      something_else
                    end
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: Assign variables inside of conditionals.
    corrected: |
      if foo
        #{variable}, #{variable} = something
      else
        #{variable}, #{variable} = something_else
      end
    interpolated: true

