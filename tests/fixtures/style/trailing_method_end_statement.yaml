cop: Style/TrailingMethodEndStatement
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_trailingmethodendstatement_registers_an_offense_with_trailing_end_on_2_line_method
    source: |
      def some_method
      foo; end
    offenses:
      - line: 2
        column_start: 5
        column_end: 8
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      def some_method
      foo;#{trailing_whitespace}
      end
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_registers_an_offense_with_trailing_end_on_3_line_method
    source: |
      def a
        b
      { foo: bar }; end
    offenses:
      - line: 3
        column_start: 14
        column_end: 17
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      def a
        b
      { foo: bar };#{trailing_whitespace}
      end
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_registers_an_offense_with_trailing_end_on_method_with_comment
    source: |
      def c
        b = calculation
        [b] end # because b
    offenses:
      - line: 3
        column_start: 6
        column_end: 9
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      def c
        b = calculation
        [b]#{trailing_whitespace}
      end # because b
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_registers_an_offense_with_trailing_end_on_method_with_block
    source: |
      def d
        block do
          foo
        end end
    offenses:
      - line: 4
        column_start: 6
        column_end: 9
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      def d
        block do
          foo
        end#{trailing_whitespace}
      end
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_registers_an_offense_with_trailing_end_inside_class
    source: |
      class Foo
        def some_method
        foo; end
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 10
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      class Foo
        def some_method
        foo;#{trailing_whitespace}
        end
      end
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_does_not_register_on_single_line_no_op
    source: |
      def no_op; end
    offenses:
      []

  - name: rubocop_cop_style_trailingmethodendstatement_does_not_register_on_single_line_method
    source: |
      def something; do_stuff; end
    offenses:
      []

  - name: rubocop_cop_style_trailingmethodendstatement_autocorrects_all_trailing_ends_for_larger_example
    source: |
      class Foo
        def some_method
          [] end
        def another_method
          {} end
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 10
        message: Place the end statement of a multi-line method on its own line.
      - line: 5
        column_start: 7
        column_end: 10
        message: Place the end statement of a multi-line method on its own line.
    corrected: |
      class Foo
        def some_method
          []#{trailing_whitespace}
        end
        def another_method
          {}#{trailing_whitespace}
        end
      end
    interpolated: true

  - name: rubocop_cop_style_trailingmethodendstatement_when_ruby_3_0_or_higher_does_not_register_an_offense_when_using_endless_method_definition
    source: |
      def foo = bar
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_trailingmethodendstatement_when_ruby_3_0_or_higher
    source: |
      def foo =
                bar
    offenses:
      []
    ruby_version: ">= 3.0"
