cop = "Style/ModuleFunction"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemodulefunction_when_enforced_style_is_module_function_registers_an_offense_for_extend_self_in_a_module"
source = '''
module Test
  extend self
  def test; end
end
'''
corrected = '''
module Test
  module_function
  def test; end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 13
message = "Use `module_function` instead of `extend self`."

[tests.config]
Autocorrect = false
EnforcedStyle = "module_function"

