cop: Style/NumericPredicate
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_numericpredicate_when_configured_to_enforce_numeric_predicate_methods_when_checking_if_a_number_is_zero_registers_an_offense
    source: |
      number == 0
      0 == number
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Use `number.zero?` instead of `number == 0`.
      - line: 2
        column_start: 0
        column_end: 11
        message: Use `number.zero?` instead of `0 == number`.
    corrected: |
      number.zero?
      number.zero?
    config:
      EnforcedStyle: predicate
      AutoCorrect: true

  - name: rubocop_cop_style_numericpredicate_when_configured_to_enforce_numeric_predicate_methods_when_checking_if_a_number_is_zero_registers_an_offense_with_a_complex_expression
    source: |
      foo - 1 == 0
      0 == foo - 1
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Use `(foo - 1).zero?` instead of `foo - 1 == 0`.
      - line: 2
        column_start: 0
        column_end: 12
        message: Use `(foo - 1).zero?` instead of `0 == foo - 1`.
    corrected: |
      (foo - 1).zero?
      (foo - 1).zero?
    config:
      EnforcedStyle: predicate
      AutoCorrect: true

  - name: rubocop_cop_style_numericpredicate_when_configured_to_enforce_numeric_predicate_methods_when_checking_if_a_number_is_zero_allows_comparing_against_a_global_variable
