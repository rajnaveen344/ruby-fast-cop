cop = "Style/CommentedKeyword"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_commentedkeyword_registers_an_offense_and_corrects_when_commenting_on_the_same_line_as_end"
source = '''
if x
  y
end # comment
'''
corrected = '''
if x
  y
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 13
message = "Do not place comments on the same line as the `end` keyword."

