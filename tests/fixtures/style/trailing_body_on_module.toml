cop = "Style/TrailingBodyOnModule"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletrailingbodyonmodule_registers_an_offense_when_body_trails_after_module_definition"
source = '''
module Foo body
end
module Bar extend self
end
module Bar; def bar; end
end
module Bar def bar; end
end
'''
corrected = '''
module Foo 
  body
end
module Bar 
  extend self
end
module Bar 
  def bar; end
end
module Bar 
  def bar; end
end
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 15
message = "Place the first line of module body on its own line."

[[tests.offenses]]
line = 3
column_start = 11
column_end = 22
message = "Place the first line of module body on its own line."

[[tests.offenses]]
line = 5
column_start = 12
column_end = 24
message = "Place the first line of module body on its own line."

[[tests.offenses]]
line = 7
column_start = 11
column_end = 23
message = "Place the first line of module body on its own line."

