cop: Style/RedundantSort
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantsort_registers_an_offense_when_first_is_called_with_sort
    source: |
      [1, 2, 3].sort.first
    offenses:
      - line: 1
        column_start: 10
        column_end: 20
        message: Use `min` instead of `sort...first`.
    corrected: |
      [1, 2, 3].min

  - name: rubocop_cop_style_redundantsort_registers_an_offense_when_first_is_called_with_safe_navigation_sort
    source: |
      [1, 2, 3]&.sort.first
    offenses:
      - line: 1
        column_start: 11
        column_end: 21
        message: Use `min` instead of `sort...first`.
    corrected: |
      [1, 2, 3]&.min

  - name: rubocop_cop_style_redundantsort_registers_an_offense_when_first_is_safe_navigation_called_with_safe_navigation_sort
