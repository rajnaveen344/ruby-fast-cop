cop = "Style/ComparableBetween"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylecomparablebetween_registers_an_offense_with_logical_comparison_x__min__x__max"
source = '''
x >= min && x <= max
'''
corrected = '''
x.between?(min, max)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Prefer `x.between?(min, max)` over logical comparison."

