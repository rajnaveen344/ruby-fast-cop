[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_autocorrects_attr_name_true_to_attr_accessor_name"
source = '''
