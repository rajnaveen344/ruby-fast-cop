cop = "Style/Attr"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleattr_registers_an_offense_attr"
source = '''
class SomeClass
  attr :name
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_registers_an_offense_for_attr_within_class_eval"
source = '''
SomeClass.class_eval do
  attr :name
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_registers_an_offense_for_attr_within_module_eval"
source = '''
SomeClass.module_eval do
  attr :name
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_registers_an_offense_when_using_attr_and_method_definitions"
source = '''
class SomeClass
  attr :name

  def foo
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_accepts_attr_when_it_does_not_take_arguments"
strip_trailing_newline = true
source = '''
func(attr)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleattr_accepts_attr_when_it_has_a_receiver"
strip_trailing_newline = true
source = '''
x.attr arg
'''
offenses = []

[[tests]]
name = "rubocopcopstyleattr_does_not_register_offense_for_custom_attr_method"
source = '''
class SomeClass
  def attr(*args)
    p args
  end

  def a
    attr(1)
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleattr_autocorrects_attr_to_attr_reader"
source = '''
attr :name
'''
corrected = '''
attr_reader :name
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Do not use `attr`. Use `attr_reader` instead."

[[tests]]
name = "rubocopcopstyleattr_autocorrects_attr_false_to_attr_reader"
