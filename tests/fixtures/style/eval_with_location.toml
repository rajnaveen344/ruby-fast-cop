[[tests]]
name = "rubocopcopstyleevalwithlocation_registers_an_offense_when_using_eval_with_binding_only"
source = '''
eval <<-CODE, binding
  do_something
CODE
'''
corrected = '''
eval <<-CODE, binding, __FILE__, __LINE__ + 1
  do_something
CODE
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "Pass a binding, `__FILE__`, and `__LINE__` to `eval`."

