cop = "Style/EvalWithLocation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleevalwithlocation_registers_an_offense_when_using_eval_without_any_arguments"
source = '''
eval <<-CODE
  do_something
CODE
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 12
message = "Pass a binding, `__FILE__`, and `__LINE__` to `eval`."

