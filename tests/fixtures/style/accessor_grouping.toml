cop = "Style/AccessorGrouping"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleaccessorgrouping_when_enforcedstyle_is_grouped_registers_an_offense_and_corrects_when_using_separated_accessors"
source = '''
class Foo
  attr_reader :bar1
  attr_reader :bar2
  attr_accessor :quux
  attr_reader :bar3, :bar4
  other_macro :zoo
end
'''
corrected = '''
class Foo
  attr_reader :bar1, :bar2, :bar3, :bar4
  attr_accessor :quux
  other_macro :zoo
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 19
message = "Group together all `attr_reader` attributes."

