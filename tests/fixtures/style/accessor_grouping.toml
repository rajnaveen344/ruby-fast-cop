[[tests]]
name = "rubocopcopstyleaccessorgrouping_when_enforcedstyle_is_grouped_registers_an_offense_and_corrects_when_using_separated_accessors_with_different_access_modifiers"
source = '''
class Foo
  attr_reader :bar1
  attr_reader :bar2

  protected
  attr_accessor :quux

  private
  attr_reader :baz1, :baz2
  attr_writer :baz3
  attr_reader :baz4

  public
  attr_reader :bar3
  other_macro :zoo
end
'''
corrected = '''
class Foo
  attr_reader :bar1, :bar2, :bar3

  protected
  attr_accessor :quux

  private
  attr_reader :baz1, :baz2, :baz4
  attr_writer :baz3

  public
  other_macro :zoo
end
'''

