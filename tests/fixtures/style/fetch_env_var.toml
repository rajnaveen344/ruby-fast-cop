[[tests]]
name = "rubocop_cop_style_fetchenvvar_when_it_is_evaluated_with_no_default_values_registers_an_offense"
source = '''
ENV['X' + 'Y']
'''
corrected = '''
ENV.fetch('X' + 'Y', nil)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Use `ENV.fetch('X' + 'Y', nil)` instead of `ENV['X' + 'Y']`."

[tests.config]
AllowedVars = []

