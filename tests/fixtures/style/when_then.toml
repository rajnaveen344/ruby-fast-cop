cop = "Style/WhenThen"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_whenthen_registers_an_offense_for_when_b"
source = '''
case a
when b; c
end
'''
corrected = '''
case a
when b then c
end
'''

[[tests.offenses]]
line = 2
column_start = 6
column_end = 7
message = "Do not use `when b;`. Use `when b then` instead."

[[tests]]
name = "rubocop_cop_style_whenthen_registers_an_offense_for_when_b_c"
source = '''
case a
when b, c; d
end
'''
corrected = '''
case a
when b, c then d
end
'''

[[tests.offenses]]
line = 2
column_start = 9
column_end = 10
message = "Do not use `when b, c;`. Use `when b, c then` instead."

[[tests]]
name = "rubocop_cop_style_whenthen_accepts_separating_statements_in_the_body_of_when"
source = '''
case a
when b then c; d
end

case e
when f
  g; h
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_whenthen_when_inspecting_a_case_statement_with_an_empty_branch_does_not_register_an_offense"
source = '''
case value
when cond1
end
'''
offenses = []
