cop = "Style/NonNilCheck"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_registers_an_offense_for_nil"
source = '''
x != nil
'''
corrected = '''
!x.nil?
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Prefer `!x.nil?` over `x != nil`."

[tests.config]
IncludeSemanticChanges = false

