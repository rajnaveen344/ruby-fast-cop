cop: Style/ClassAndModuleChildren
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_classandmodulechildren_nested_style_registers_an_offense_for_not_nested_classes
    source: |
      class FooClass::BarClass
      end
    offenses:
      - line: 1
        column_start: 6
        column_end: 24
        message: Use nested module/class definitions instead of compact style.
    corrected: |
      module FooClass
        class BarClass
        end
      end
    config:
      EnforcedStyle: $UNRESOLVED:nested
    interpolated: true
    verified: false

  - name: rubocop_cop_style_classandmodulechildren_nested_style_registers_an_offense_for_not_nested_classes_when_namespace_is_defined_as_a_class
    source: |
      class FooClass
      end
      
      class FooClass::BarClass
      end
    offenses:
      - line: 4
        column_start: 6
        column_end: 24
        message: Use nested module/class definitions instead of compact style.
    corrected: |
      class FooClass
      end
      
      class FooClass
        class BarClass
        end
      end
    config:
      EnforcedStyle: $UNRESOLVED:nested
    interpolated: true
    verified: false

