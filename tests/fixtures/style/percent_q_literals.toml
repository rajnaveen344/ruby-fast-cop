cop = "Style/PercentQLiterals"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylepercentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_accepts_q"
strip_trailing_newline = true
source = '''
%q(hi)
'''
offenses = []

[tests.config]
EnforcedStyle = "lower_case_q"

[[tests]]
name = "rubocopcopstylepercentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_registers_an_offense_for_q"
source = '''
%Q(hi)
'''
corrected = '''
%q(hi)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Do not use `%Q` unless interpolation is needed. Use `%q`."

[tests.config]
EnforcedStyle = "lower_case_q"

[[tests]]
name = "rubocopcopstylepercentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_behaves_like_accepts_quote_characters_accepts_single_quotes"
strip_trailing_newline = true
source = '''
'hi'
'''
offenses = []

[tests.config]
EnforcedStyle = "lower_case_q"

[[tests]]
name = "rubocopcopstylepercentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_behaves_like_accepts_quote_characters_accepts_double_quotes"
