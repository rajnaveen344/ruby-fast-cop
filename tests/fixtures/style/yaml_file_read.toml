cop = "Style/YAMLFileRead"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleyamlfileread_when_ruby__30_registers_an_offense_when_using_yamlload_with_fileread_argument"
source = '''
YAML.load(File.read(path))
'''
corrected = '''
YAML.load_file(path)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 26
message = "Use `load_file(path)` instead."

