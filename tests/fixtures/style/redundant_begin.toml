cop = "Style/RedundantBegin"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantbegin_reports_an_offense_for_single_line_def_with_redundant_begin_block"
source = '''
def func; begin; x; y; rescue; z end; end
'''
corrected = '''
def func; ; x; y; rescue; z ; end
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 15
message = "Redundant `begin` block detected."

[[tests]]
name = "rubocopcopstyleredundantbegin_reports_an_offense_for_def_with_redundant_begin_block"
source = '''
def func
  begin
    ala
  rescue => e
    bala
  end
end
'''
corrected = '''
def func
  
    ala
  rescue => e
    bala
  
end
'''

[[tests.offenses]]
