cop: Style/EmptyClassDefinition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_emptyclassdefinition_when_enforcedstyle_is_class_definition_registers_an_offense_for_class_new_assignment_to_constant
    source: |
      FooError = Class.new(StandardError)
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: Prefer a two-line class definition over `Class.new` for classes with no body.
    corrected: |
      class FooError < StandardError
      end
    config:
      EnforcedStyle: $UNRESOLVED:class_definition
    interpolated: true
    verified: false

