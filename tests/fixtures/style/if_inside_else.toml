cop = "Style/IfInsideElse"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleifinsideelse_catches_an_if_node_nested_inside_an_else"
source = '''
if a
  blah
else
  if b
    foo
  end
end
'''
corrected = '''
if a
  blah
elsif b
  foo
end
'''

[[tests.offenses]]
line = 4
column_start = 2
column_end = 4
message = "Convert `if` nested inside `else` to `elsif`."

[tests.config]
AllowIfModifier = false

[[tests]]
name = "rubocopcopstyleifinsideelse_catches_an_ifelse_nested_inside_an_else"
