cop = "Style/ItBlockParameter"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_itblockparameter_ruby_3_4_enforcedstyle_allow_single_line_registers_an_offense_when_using_multiline_it_parameters"
source = '''
block do
  do_something(it)
end
'''
ruby_version = ">= 3.4"
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Avoid using `it` block parameter for multi-line blocks."

[tests.config]
EnforcedStyle = "$UNRESOLVED:allow_single_line"

