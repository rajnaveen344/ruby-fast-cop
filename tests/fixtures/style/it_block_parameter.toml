cop = "Style/ItBlockParameter"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleitblockparameter__ruby_34_enforcedstyle_allow_single_line_registers_an_offense_when_using_multiline_it_parameters"
ruby_version = ">= 3.4"
source = '''
block do
  do_something(it)
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Avoid using `it` block parameter for multi-line blocks."

[tests.config]
EnforcedStyle = "allow_single_line"

[[tests]]
name = "rubocopcopstyleitblockparameter__ruby_34_enforcedstyle_allow_single_line_registers_no_offense_when_using_it_block_parameter_with_multiline_method_chain"
ruby_version = ">= 3.4"
source = '''
collection.each
          .foo { puts it }
'''
offenses = []

[tests.config]
EnforcedStyle = "allow_single_line"

