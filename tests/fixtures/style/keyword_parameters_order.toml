cop = "Style/KeywordParametersOrder"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylekeywordparametersorder_registers_an_offense_and_corrects_when_kwoptarg_is_before_kwarg"
source = '''
def m(arg, optional: 1, required:)
end
'''
corrected = '''
def m(arg, required:, optional: 1)
end
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 22
message = "Place optional keyword parameters at the end of the parameters list."

