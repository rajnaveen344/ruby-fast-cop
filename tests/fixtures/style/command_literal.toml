[tests.config]
EnforcedStyle = "percent_x"

[[tests]]
name = "rubocopcopstylecommandliteral_heredoc_commands_is_ignored"
source = '''
<<`COMMAND`
  ls
COMMAND
'''
offenses = []

[tests.config]
EnforcedStyle = "backticks"

