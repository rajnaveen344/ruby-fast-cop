cop = "Style/CommandLiteral"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylecommandliteral_x_commands_with_other_delimiters_than_parentheses_registers_an_offense"
source = '''
%x$ls$
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Use backticks around command string."

[tests.config]
EnforcedStyle = "backticks"

[[tests]]
name = "rubocopcopstylecommandliteral_when_percentliteraldelimiters_is_configured_with_curly_braces_respects_the_configuration_when_autocorrecting"
source = '''
`ls`
'''
corrected = '''
%x[ls]
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Use `%x` around command string."

[tests.config]
EnforcedStyle = "percent_x"

[[tests]]
name = "rubocopcopstylecommandliteral_when_percentliteraldelimiters_only_has_a_default_respects_the_configuration_when_autocorrecting"
source = '''
`ls`
'''
corrected = '''
%x(ls)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Use `%x` around command string."

[tests.config]
EnforcedStyle = "percent_x"

[[tests]]
name = "rubocopcopstylecommandliteral_when_percentliteraldelimiters_is_configured_and_a_default_exists_ignores_the_default_when_autocorrecting"
