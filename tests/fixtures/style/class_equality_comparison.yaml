cop: Style/ClassEqualityComparison
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_classequalitycomparison_registers_an_offense_and_corrects_when_comparing_class_using_for_equality
    source: |
      var.class == Date
    offenses:
      - line: 1
        column_start: 4
        column_end: 17
        message: Use `instance_of?(Date)` instead of comparing classes.
    corrected: |
      var.instance_of?(Date)
    config:
      AllowedMethods: []

