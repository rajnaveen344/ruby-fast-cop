  - name: rubocop_cop_style_classequalitycomparison_does_not_register_an_offense_when_using_instance_of
    source: |
      var.instance_of?(Date)
    offenses:
      []
    config:
      AllowedMethods: []

  - name: rubocop_cop_style_classequalitycomparison_when_allowedmethods_is_enabled_does_not_register_an_offense_when_comparing_class_for_equality
    source: |
      def ==(other)
        self.class == other.class &&
          name == other.name
      end
    offenses:
      []
    config:
      AllowedMethods: [==]

  - name: rubocop_cop_style_classequalitycomparison_when_allowedpatterns_is_enabled_does_not_register_an_offense_when_comparing_class_for_equality
    source: |
      def equal?(other)
        self.class == other.class &&
          name == other.name
      end
    offenses:
      []
    config:
      AllowedMethods: [==]
      AllowedPatterns: [$UNRESOLVED:equal]

  - name: rubocop_cop_style_classequalitycomparison_with_string_comparison_in_module_registers_and_corrects_an_offense
    source: |
      module Foo
        def bar?(value)
          bar.class.name == 'Bar'
        end
      
        class Bar
        end
      end
    offenses:
      - line: 3
        column_start: 8
        column_end: 27
        message: "Use `instance_of?(::Bar)` instead of comparing classes."
    corrected: |
      module Foo
        def bar?(value)
          bar.instance_of?(::Bar)
        end
      
        class Bar
        end
      end
    config:
      AllowedMethods: [==]
      AllowedPatterns: [$UNRESOLVED:equal]

  - name: rubocop_cop_style_classequalitycomparison_with_instance_variable_comparison_in_module_registers_and_corrects_an_offense
    source: |
      module Foo
        def bar?(value)
          bar.class.name == Model
        end
      end
    offenses:
      - line: 3
        column_start: 8
        column_end: 27
        message: Use `instance_of?(Model)` instead of comparing classes.
    corrected: |
      module Foo
        def bar?(value)
          bar.instance_of?(Model)
        end
      end
    config:
      AllowedMethods: [==]
      AllowedPatterns: [$UNRESOLVED:equal]
