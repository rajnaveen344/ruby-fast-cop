cop: Style/NonNilCheck
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_registers_an_offense_for_nil
    source: |
      x != nil
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Prefer `!x.nil?` over `x != nil`.
    corrected: |
      !x.nil?
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_for_0
    source: |
      x != 0
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_for_x_nil
    source: |
      !x.nil?
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_for_not_x_nil
    source: |
      not x.nil?
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_if_only_expression_in_predicate
    source: |
      def signed_in?
        !current_user.nil?
      end
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_if_only_expression_in_class_predicate
    source: |
      def Test.signed_in?
        current_user != nil
      end
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_if_last_expression_in_predicate
    source: |
      def signed_in?
        something
        current_user != nil
      end
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_if_last_expression_in_class_predicate
    source: |
      def Test.signed_in?
        something
        current_user != nil
      end
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_does_not_register_an_offense_with_implicit_receiver
    source: |
      !nil?
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_not_allowing_semantic_changes_registers_an_offense_but_does_not_correct_when_the_code_was_not_modified
    source: |
      return nil unless (line =~ //) != nil
    offenses:
      - line: 1
        column_start: 18
        column_end: 37
        message: Prefer `!(line =~ //).nil?` over `(line =~ //) != nil`.
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_registers_an_offense_for_x_nil
    source: |
      !x.nil?
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      x
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_registers_an_offense_for_unless_x_nil
    source: |
      puts b unless x.nil?
    offenses:
      - line: 1
        column_start: 14
        column_end: 20
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      puts b if x
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_does_not_register_an_offense_for_x_nil
    source: |
      x.nil?
    offenses:
      []
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_does_not_register_an_offense_for_x
    source: |
      !x
    offenses:
      []
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_registers_an_offense_for_not_x_nil
    source: |
      not x.nil?
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      x
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_does_not_blow_up_with_ternary_operators
    source: |
      my_var.nil? ? 1 : 0
    offenses:
      []
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_autocorrects_by_changing_x_nil_to_x
    source: |
      x != nil
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      x
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_does_not_blow_up_when_autocorrecting_implicit_receiver
    source: |
      !nil?
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      self
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_allowing_semantic_changes_corrects_code_that_would_not_be_modified_if_includesemanticchanges_were_false
    source: |
      return nil unless (line =~ //) != nil
    offenses:
      - line: 1
        column_start: 18
        column_end: 37
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      return nil unless (line =~ //)
    config:
      IncludeSemanticChanges: true

  - name: rubocop_cop_style_nonnilcheck_when_enforcedstyle_comparison_of_style_nilcomparison_cop_includesemanticchanges_false_does_not_register_an_offense_for_foo_nil
    source: |
      foo != nil
    offenses:
      []
    config:
      IncludeSemanticChanges: false

  - name: rubocop_cop_style_nonnilcheck_when_enforcedstyle_comparison_of_style_nilcomparison_cop_includesemanticchanges_true_registers_an_offense_for_foo_nil
    source: |
      foo != nil
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Explicit non-nil checks are usually redundant.
    corrected: |
      foo
    config:
      IncludeSemanticChanges: true
