cop: Style/RequireOrder
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_requireorder_when_require_is_sorted_registers_no_offense
    source: |
      require 'a'
      require 'b'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_require_is_sorted_registers_no_offense_when_single_quoted_string_and_double_quoted_string_are_mixed
    source: |
      require 'a'
      require "b"
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_only_one_require_registers_no_offense
    source: |
      require 'a'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_require_is_not_sorted_in_different_sections_registers_no_offense
    source: |
      require 'b'
      require 'd'
      
      require 'a'
      require 'c'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_require_is_not_sorted_registers_an_offense
    source: |
      require 'b'
      require 'a'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'a'
      require 'b'

  - name: rubocop_cop_style_requireorder_when_unsorted_require_has_some_inline_comments_registers_an_offense
    source: |
      require 'b' # comment
      require 'a'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'a'
      require 'b' # comment

  - name: rubocop_cop_style_requireorder_when_unsorted_require_has_some_full_line_comments_registers_an_offense
    source: |
      ‹BASE›0‹/BASE›
      require 'b'
      # comment
      require 'a'
    offenses:
      - line: 3
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      ‹BASE›0‹/BASE›
      # comment
      require 'a'
      require 'b'

  - name: rubocop_cop_style_requireorder_when_require_relative_is_not_sorted_registers_an_offense
    source: |
      require_relative 'b'
      require_relative 'a'
    offenses:
      - line: 2
        column_start: 0
        column_end: 20
        message: Sort `require_relative` in alphabetical order.
    corrected: |
      require_relative 'a'
      require_relative 'b'

  - name: rubocop_cop_style_requireorder_when_multiple_require_are_not_sorted_registers_an_offense
    source: |
      require 'd'
      require 'a'
      require 'b'
      require 'c'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
      - line: 3
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
      - line: 4
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'a'
      require 'b'
      require 'c'
      require 'd'

  - name: rubocop_cop_style_requireorder_when_both_require_and_require_relative_are_in_same_section_registers_no_offense
    source: |
      require 'b'
      require_relative 'a'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_require_relative_is_put_between_unsorted_require_registers_no_offense
    source: |
      require 'c'
      require_relative 'b'
      require 'a'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_require_is_a_method_argument_registers_no_offense
    source: |
      do_something(require)
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_bundler_require_is_put_between_unsorted_require_registers_no_offense
    source: |
      require 'e'
      Bundler.require(:default)
      require 'c'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_bundler_require_with_no_arguments_is_put_between_require_registers_no_offense
    source: |
      require 'c'
      Bundler.require
      require 'a'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_something_other_than_a_method_call_is_used_between_require_registers_no_offense
    source: |
      require 'a'
      begin
      end
      require 'b'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_if_is_used_between_require_registers_no_offense
    source: |
      require 'c'
      if foo
        require 'a'
      end
      require 'b'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_unless_is_used_between_require_registers_no_offense
    source: |
      require 'c'
      unless foo
        require 'a'
      end
      require 'b'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_conditional_with_multiple_require_is_used_between_require_registers_no_offense
    source: |
      require 'd'
      if foo
        require 'a'
        require 'b'
      end
      require 'c'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_conditional_with_multiple_unsorted_require_is_used_between_require_registers_an_offense
    source: |
      require 'd'
      if foo
        require 'b'
        require 'a'
      end
      require 'c'
    offenses:
      - line: 4
        column_start: 2
        column_end: 13
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'd'
      if foo
        require 'a'
        require 'b'
      end
      require 'c'

  - name: rubocop_cop_style_requireorder_when_nested_conditionals_is_used_between_require_registers_no_offense
    source: |
      require 'c'
      if foo
        if bar
          require 'a'
        end
      end
      require 'b'
    offenses:
      []

  - name: rubocop_cop_style_requireorder_when_modifier_conditional_if_is_used_between_require_registers_an_offense
    source: |
      require 'c'
      require 'a' if foo
      require 'b'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
      - line: 3
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'a' if foo
      require 'b'
      require 'c'

  - name: rubocop_cop_style_requireorder_when_modifier_conditional_unless_is_used_between_require_registers_an_offense
    source: |
      require 'c'
      require 'a' unless foo
      require 'b'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
      - line: 3
        column_start: 0
        column_end: 11
        message: Sort `require` in alphabetical order.
    corrected: |
      require 'a' unless foo
      require 'b'
      require 'c'

  - name: rubocop_cop_style_requireorder_when_rescue_block_registers_an_offense_for_multiple_unsorted_require_s
    source: |
      begin
        do_something
      rescue
        require 'b'
        require 'a'
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 13
        message: Sort `require` in alphabetical order.
    corrected: |
      begin
        do_something
      rescue
        require 'a'
        require 'b'
      end

  - name: rubocop_cop_style_requireorder_when_rescue_block_registers_no_offense_for_single_require
    source: |
      begin
        do_something
      rescue
        require 'a'
      end
    offenses:
      []
