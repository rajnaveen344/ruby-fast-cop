cop: Style/IfWithSemicolon
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_for_one_line_if_end
    source: |
      if cond; run else dont end
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? run : dont

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_for_one_line_if_end_without_then_body
    source: |
      if cond; else dont end
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? nil : dont

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_when_not_using_else_branch
    source: |
      if cond; run end
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? run : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_a_parenthesized_method_call_with_an_argument
    source: |
      if cond;do_something(arg) end
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? do_something(arg) : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_an_array_literal_with_an_argument
    source: |
      if cond;[] end
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? [] : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_a_method_call_with_an_argument
    source: |
      if cond;do_something arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? do_something(arg) : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_a_safe_navigation_method_call_with_an_argument
    source: |
      if cond;obj&.do_something arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? obj&.do_something(arg) : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_else_end_when_the_then_body_contains_a_method_call_with_an_argument
    source: |
      if cond;foo foo_arg else bar bar_arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 40
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? foo(foo_arg) : bar(bar_arg)

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_else_end_when_the_then_body_contains_a_safe_navigation_method_call_with_an_argument
    source: |
      if cond;foo obj&.foo_arg else bar obj&.bar_arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 50
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? foo(obj&.foo_arg) : bar(obj&.bar_arg)

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_an_arithmetic_operator_method_call
    source: |
      if cond;do_something - arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? do_something - arg : nil

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_a_method_call_with
    source: |
      if cond; foo[key] else bar end
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? foo[key] : bar

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_and_corrects_a_single_line_if_end_when_the_then_body_contains_a_method_call_with
    source: |
      if cond; foo[key] = value else bar end
    offenses:
      - line: 1
        column_start: 0
        column_end: 38
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? foo[key] = value : bar

  - name: rubocop_cop_style_ifwithsemicolon_registers_an_offense_when_using_multiple_expressions_in_the_else_branch
    source: |
      if cond; foo else bar'arg'; baz end
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: Do not use `if cond;` - use a newline instead.
    corrected: |
      if cond
       foo else bar'arg'; baz end

  - name: rubocop_cop_style_ifwithsemicolon_can_handle_modifier_conditionals
    source: |
      class Hash
      end if RUBY_VERSION < "1.8.7"
    offenses:
      []

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_without_branch_bodies
    source: |
      if cond; elsif cond2; end
    offenses:
      - line: 1
        column_start: 0
        column_end: 25
        message: Do not use `if cond;` - use `if/else` instead.
    corrected: |
      if cond
      #{' ' * 2}
      elsif cond2
      #{' ' * 2}
      end
    interpolated: true

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_without_else_branch
    source: |
      if cond; run elsif cond2; run2 end
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: Do not use `if cond;` - use `if/else` instead.
    corrected: |
      if cond
        run
      elsif cond2
        run2
      end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_second_elsif_block
    source: |
      if cond; run elsif cond2; run2 elsif cond3; run3 else dont end
    offenses:
      - line: 1
        column_start: 0
        column_end: 62
        message: Do not use `if cond;` - use `if/else` instead.
    corrected: |
      if cond
        run
      elsif cond2
        run2
      elsif cond3
        run3
      else
        dont
      end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_with_else_branch
    source: |
      if cond; run elsif cond2; run2 else dont end
    offenses:
      - line: 1
        column_start: 0
        column_end: 44
        message: Do not use `if cond;` - use `if/else` instead.
    corrected: |
      if cond
        run
      elsif cond2
        run2
      else
        dont
      end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_a_nested_if_with_a_semicolon_is_used
    source: |
      if cond; run
        if cond; run
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Do not use `if cond;` - use a newline instead.
    corrected: |
      if cond
       run
        if cond; run
        end
      end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_and_corrects_when_using_nested_single_line_if_end_in_block_of_if_body
    source: |
      if foo?; bar { if qux?; quux else end } end
    offenses:
      - line: 1
        column_start: 0
        column_end: 43
        message: Do not use `if foo?;` - use `if/else` instead.
    corrected: |
      if foo?
       bar { if qux?; quux else end } end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_and_corrects_when_using_nested_single_line_if_end_in_the_block_of_else_body
    source: |
      if foo?; bar else baz { if qux?; quux else end } end
    offenses:
      - line: 1
        column_start: 0
        column_end: 52
        message: Do not use `if foo?;` - use `if/else` instead.
    corrected: |
      if foo?
       bar else baz { if qux?; quux else end } end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_and_corrects_when_using_nested_single_line_if_end_in_numblock_of_if_body
    source: |
      if foo?; bar { if _1; quux else end } end
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: Do not use `if foo?;` - use `if/else` instead.
    corrected: |
      if foo?
       bar { if _1; quux else end } end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_and_corrects_when_using_nested_single_line_if_end_in_the_numblock_of_else_body
    source: |
      if foo?; bar else baz { if _1; quux else end } end
    offenses:
      - line: 1
        column_start: 0
        column_end: 50
        message: Do not use `if foo?;` - use `if/else` instead.
    corrected: |
      if foo?
       bar else baz { if _1; quux else end } end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_using_multi_value_assignment_in_if_with_a_semicolon_is_used
    source: |
      if foo; bar, baz = qux else quux end
    offenses:
      - line: 1
        column_start: 0
        column_end: 36
        message: Do not use `if foo;` - use `if/else` instead.
    corrected: |
      if foo
       bar, baz = qux else quux end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_using_multi_value_assignment_in_else_with_a_semicolon_is_used
    source: |
      if foo; bar else baz, qux = quux end
    offenses:
      - line: 1
        column_start: 0
        column_end: 36
        message: Do not use `if foo;` - use `if/else` instead.
    corrected: |
      if foo
       bar else baz, qux = quux end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_using_return_with_value_in_if_with_a_semicolon_is_used
    source: |
      if cond; return value end
    offenses:
      - line: 1
        column_start: 0
        column_end: 25
        message: Do not use `if cond;` - use a newline instead.
    corrected: |
      if cond
       return value end

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_when_using_return_without_value_in_if_with_a_semicolon_is_used
    source: |
      if cond; return end
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Do not use `if cond;` - use a ternary operator instead.
    corrected: |
      cond ? return : nil

  - name: rubocop_cop_style_ifwithsemicolon_when_elsif_is_present_registers_an_offense_and_corrects_when_using_nested_if_end_in_if_body
    source: |
      if cond1; foo + if cond2; bar
        else
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: Do not use `if cond1;` - use a ternary operator instead.
    corrected: |
      cond1 ? foo + if cond2; bar
        else
        end : nil
