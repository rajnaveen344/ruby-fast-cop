cop = "Style/NegatedIfElseCondition"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_negatedifelsecondition_registers_an_offense_and_corrects_when_negating_condition_with_for_if_else"
source = '''
if !x
  do_something
else
  do_something_else
end
'''
corrected = '''
if x
  do_something_else
else
  do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Invert the negated condition and swap the if-else branches."

