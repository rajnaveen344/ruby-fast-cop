cop = "Style/NegatedIfElseCondition"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenegatedifelsecondition_registers_an_offense_and_corrects_when_negating_condition_with__for_ifelse"
source = '''
if !x
  do_something
else
  do_something_else
end
'''
corrected = '''
if x
  do_something_else
else
  do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Invert the negated condition and swap the if-else branches."

