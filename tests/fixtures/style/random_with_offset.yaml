cop: Style/RandomWithOffset
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_randomwithoffset_registers_an_offense_when_using_rand_int_offset
    source: |
      rand(6) + 1
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Prefer ranges when generating random numbers instead of integers with offsets.
    corrected: |
      rand(1..6)

