cop: Style/RedundantConditional
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_ternary_with_boolean_results
    source: |
      x == y ? true : false
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: This conditional expression can just be replaced by `x == y`.
    corrected: |
      x == y

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_ternary_with_negated_boolean_results
    source: |
      x == y ? false : true
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: This conditional expression can just be replaced by `!(x == y)`.
    corrected: |
      !(x == y)

  - name: rubocop_cop_style_redundantconditional_allows_ternary_with_non_boolean_results
    source: |
      x == y ? 1 : 10
    offenses:
      []

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_if_else_with_boolean_results
    source: |
      if x == y
        true
      else
        false
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: This conditional expression can just be replaced by `x == y`.
    corrected: |
      x == y

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_if_else_with_negated_boolean_results
    source: |
      if x == y
        false
      else
        true
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: This conditional expression can just be replaced by `!(x == y)`.
    corrected: |
      !(x == y)

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_unless_else_with_boolean_results
    source: |
      unless x == y
        true
      else
        false
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: This conditional expression can just be replaced by `!(x == y)`.
    corrected: |
      !(x == y)

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_unless_else_with_negated_boolean_results
    source: |
      unless x == y
        false
      else
        true
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: This conditional expression can just be replaced by `x == y`.
    corrected: |
      x == y

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_if_elsif_else_with_boolean_results
    source: |
      if cond
        false
      elsif x == y
        true
      else
        false
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 12
        message: This conditional expression can just be replaced by [...]
    corrected: |
      if cond
        false
      else
        x == y
      end

  - name: rubocop_cop_style_redundantconditional_registers_an_offense_for_if_elsif_else_with_negated_boolean_results
    source: |
      if cond
        false
      elsif x == y
        false
      else
        true
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 12
        message: This conditional expression can just be replaced by [...]
    corrected: |
      if cond
        false
      else
        !(x == y)
      end

  - name: rubocop_cop_style_redundantconditional_does_not_register_an_offense_for_if_else_with_non_boolean_results
    source: |
      if x == y
        1
      else
        2
      end
    offenses:
      []

  - name: rubocop_cop_style_redundantconditional_does_not_register_an_offense_for_if_elsif_else_with_non_boolean_results
    source: |
      if cond
        1
      elsif x == y
        2
      else
        3
      end
    offenses:
      []
