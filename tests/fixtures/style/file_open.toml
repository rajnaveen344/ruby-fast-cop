cop = "Style/FileOpen"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylefileopen_registers_an_offense_when_using_fileopen_without_a_block"
source = '''
File.open('file')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "`File.open` without a block may leak a file descriptor; use the block form."

[[tests]]
name = "rubocopcopstylefileopen_registers_an_offense_when_assigning_fileopen_to_a_variable"
source = '''
f = File.open('file')
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 21
message = "`File.open` without a block may leak a file descriptor; use the block form."

[[tests]]
name = "rubocopcopstylefileopen_registers_an_offense_when_using_fileopen_without_a_block_2"
source = '''
::File.open('file')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 19
message = "`File.open` without a block may leak a file descriptor; use the block form."

[[tests]]
name = "rubocopcopstylefileopen_registers_an_offense_when_chaining_methods_on_fileopen"
source = '''
