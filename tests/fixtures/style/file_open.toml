'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "`File.open` without a block may leak a file descriptor; use the block form."

[[tests]]
name = "rubocopcopstylefileopen_registers_an_offense_when_using_fileopen_with_mode_argument"
