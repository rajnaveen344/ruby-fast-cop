'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 22
message = "`File.open` without a block may leak a file descriptor; use the block form."

[[tests]]
name = "rubocopcopstylefileopen_does_not_register_an_offense_when_passing_fileopen_as_an_argument"
