cop = "Style/ClassMethodsDefinitions"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_classmethodsdefinitions_when_enforcedstyle_is_def_self_registers_an_offense_and_corrects_when_defining_class_methods_with_class_self"
source = '''
class A
  class << self
    attr_reader :two

    def three
    end
  end
end
'''
corrected = '''
class A
  class << self
    attr_reader :two

  end

  def self.three
  end
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 15
message = "Do not define public methods within class << self."

[tests.config]
EnforcedStyle = "$UNRESOLVED:def_self"

