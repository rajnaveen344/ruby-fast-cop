cop = "Style/ParallelAssignment"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleparallelassignment_registers_an_offense_when_the_right_side_has_multiple_arrays"
source = '''
a, b, c = [1, 2], [3, 4], [5, 6]
'''
corrected = '''
a = [1, 2]
b = [3, 4]
c = [5, 6]
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 32
message = "Do not use parallel assignment."

