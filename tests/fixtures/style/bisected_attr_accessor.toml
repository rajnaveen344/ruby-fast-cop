cop = "Style/BisectedAttrAccessor"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylebisectedattraccessor_registers_an_offense_and_corrects_when_both_accessors_of_the_name_exists"
source = '''
class Foo
  attr_reader :bar
  attr_writer :bar
  other_macro :something
end
'''
corrected = '''
class Foo
  attr_accessor :bar
  other_macro :something
end
'''

[[tests.offenses]]
line = 2
column_start = 14
column_end = 18
message = "Combine both accessors into `attr_accessor :bar`."

[[tests.offenses]]
line = 3
column_start = 14
column_end = 18
message = "Combine both accessors into `attr_accessor :bar`."

[[tests]]
name = "rubocopcopstylebisectedattraccessor_registers_an_offense_and_corrects_when_attr_and_attr_writer_exists"
source = '''
class Foo
  attr :bar
  attr_writer :bar
  other_macro :something
end
'''
corrected = '''
