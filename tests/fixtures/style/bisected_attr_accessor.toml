[[tests]]
name = "rubocopcopstylebisectedattraccessor_registers_an_offense_and_corrects_when_both_accessors_of_the_splat_exists"
source = '''
class Foo
  ATTRIBUTES = %i[foo bar]
  attr_reader *ATTRIBUTES
  attr_writer *ATTRIBUTES
  other_macro :something
end
'''
corrected = '''
class Foo
  ATTRIBUTES = %i[foo bar]
  attr_accessor *ATTRIBUTES
  other_macro :something
end
'''

[[tests.offenses]]
