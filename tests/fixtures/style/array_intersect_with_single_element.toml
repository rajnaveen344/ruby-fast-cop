cop = "Style/ArrayIntersectWithSingleElement"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylearrayintersectwithsingleelement_with_includeelement_does_not_register_an_offense"
source = '''
array.include?(element)
'''
offenses = []

[[tests]]
name = "rubocopcopstylearrayintersectwithsingleelement_with_intersectelement_registers_an_offense"
source = '''
array.intersect?([element])
'''
corrected = '''
array.include?(element)
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 27
message = "Use `include?(element)` instead of `intersect?([element])`."

[[tests]]
name = "rubocopcopstylearrayintersectwithsingleelement_with_intersectielement_registers_an_offense"
source = '''
array.intersect?(%i[element])
'''
corrected = '''
array.include?(:element)
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 29
message = "Use `include?(element)` instead of `intersect?([element])`."
