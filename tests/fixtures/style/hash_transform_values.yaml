cop: Style/HashTransformValues
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashtransformvalues_when_using_ruby_2_4_or_newer_with_inline_block_flags_each_with_object_when_transform_values_could_be_used
    source: |
      x.each_with_object({}) {|(k, v), h| h[k] = foo(v)}
    offenses:
      - line: 1
        column_start: 0
        column_end: 50
        message: Prefer `transform_values` over `each_with_object`.
    corrected: |
      x.transform_values {|v| foo(v)}
    ruby_version: ">= 2.4"

  - name: rubocop_cop_style_hashtransformvalues_when_using_ruby_2_4_or_newer_with_multiline_block_flags_each_with_object_when_transform_values_could_be_used
    source: |
      some_hash.each_with_object({}) do |(key, val), memo|
        memo[key] = val * val
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 52
        message: Prefer `transform_values` over `each_with_object`.
    corrected: |
      some_hash.transform_values do |val|
        val * val
      end
    ruby_version: ">= 2.4"

  - name: rubocop_cop_style_hashtransformvalues_when_using_ruby_2_4_or_newer_with_safe_navigation_operator_flags_each_with_object_when_transform_values_could_be_used
