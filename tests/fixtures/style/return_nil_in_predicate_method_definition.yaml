cop: Style/ReturnNilInPredicateMethodDefinition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_returnnilinpredicatemethoddefinition_when_defining_predicate_method_registers_an_offense_when_using_return
    source: |
      def foo?
        return if condition
      
        bar?
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 8
        message: Return `false` instead of `nil` in predicate methods.
    corrected: |
      def foo?
        return false if condition
      
        bar?
      end

