cop: Style/SymbolArray
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_symbolarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_symbols
    source: |
      [:one, :two, :three]
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Use `%i` or `%I` for an array of symbols.
    corrected: |
      ‹BASE›0‹/BASE›
      %i(one two three)
    config:
      EnforcedStyle: $UNRESOLVED:percent
      MinSize: 0
    interpolated: true
    verified: false

  - name: rubocop_cop_style_symbolarray_when_enforcedstyle_is_percent_autocorrects_arrays_of_one_symbol
    source: |
      [:one]
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Use `%i` or `%I` for an array of symbols.
    corrected: |
      ‹BASE›0‹/BASE›
      %i(one)
    config:
      EnforcedStyle: $UNRESOLVED:percent
      MinSize: 0
    interpolated: true
    verified: false

  - name: rubocop_cop_style_symbolarray_when_enforcedstyle_is_percent_autocorrects_arrays_of_symbols_with_embedded_newlines_and_tabs
    source: |
      [:"%{tab}", :"two
      ", :three]
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Use `%i` or `%I` for an array of symbols.
    corrected: |
      ‹BASE›0‹/BASE›
      %I(\t two\n three)
    config:
      EnforcedStyle: $UNRESOLVED:percent
      MinSize: 0
    interpolated: true
    verified: false

