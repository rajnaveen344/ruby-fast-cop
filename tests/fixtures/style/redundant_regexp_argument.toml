[[tests]]
name = "rubocopcopstyleredundantregexpargument_registers_an_offense_and_corrects_when_the_method_is_byteindex"
source = '''
'foo'.byteindex(/f/)
'''
corrected = '''
'foo'.byteindex('f')
'''

[[tests.offenses]]
line = 1
column_start = 16
column_end = 19
message = "Use string `'f'` as argument instead of regexp `/f/`."

