cop: Style/CollectionCompact
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_collectioncompact_registers_an_offense_and_corrects_when_using_reject_on_array_to_reject_nils
    source: |
      array.reject { |e| e.nil? }
      array.reject! { |e| e.nil? }
    offenses:
      - line: 1
        column_start: 6
        column_end: 27
        message: Use `compact` instead of `reject { |e| e.nil? }`.
      - line: 2
        column_start: 6
        column_end: 28
        message: Use `compact!` instead of `reject! { |e| e.nil? }`.
    corrected: |
      array.compact
      array.compact!
    ruby_version: ">= 2.4"

  - name: rubocop_cop_style_collectioncompact_registers_an_offense_and_corrects_when_using_safe_navigation_reject_call_on_array_to_reject_nils
    source: |
