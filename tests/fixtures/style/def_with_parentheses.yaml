cop: Style/DefWithParentheses
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_defwithparentheses_reports_an_offense_for_def_with_empty_parens
    source: |
      def func()
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: "Omit the parentheses in defs when the method doesn't accept any arguments."
    corrected: |
      def func
      end

  - name: rubocop_cop_style_defwithparentheses_reports_an_offense_for_class_def_with_empty_parens
    source: |
      def Test.func()
        something
      end
    offenses:
      - line: 1
        column_start: 13
        column_end: 15
        message: "Omit the parentheses in defs when the method doesn't accept any arguments."
    corrected: |
      def Test.func
        something
      end

  - name: rubocop_cop_style_defwithparentheses_ruby_3_0_reports_an_offense_for_endless_method_definition_with_empty_parens
    source: |
      def foo() = do_something
    offenses:
      - line: 1
        column_start: 7
        column_end: 9
        message: "Omit the parentheses in defs when the method doesn't accept any arguments."
    corrected: |
      def foo = do_something
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_defwithparentheses_ruby_3_0_reports_an_offense_for_endless_method_definition_with_empty_parens_followed_by_a_space_before
    source: |
      def foo() =do_something
    offenses:
      - line: 1
        column_start: 7
        column_end: 9
        message: "Omit the parentheses in defs when the method doesn't accept any arguments."
    corrected: |
      def foo =do_something
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_defwithparentheses_ruby_3_0_does_not_register_an_offense_for_endless_method_definition_with_empty_parens_followed_by_no_space_before
    source: |
      def foo()= do_something
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_defwithparentheses_ruby_3_0_does_not_register_an_offense_for_endless_method_definition_with_empty_parens_followed_by_no_spaces_around
    source: |
      def foo()=do_something
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_defwithparentheses_accepts_def_with_arg_and_parens
    source: |
      def func(a)
      end
    offenses:
      []

  - name: rubocop_cop_style_defwithparentheses_accepts_def_without_arguments
    source: |
      def func
      end
    offenses:
      []

  - name: rubocop_cop_style_defwithparentheses_accepts_empty_parentheses_in_one_liners
    source: |
      def to_s() join '/' end
    offenses:
      []
