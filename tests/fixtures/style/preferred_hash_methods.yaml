cop: Style/PreferredHashMethods
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_preferredhashmethods_with_enforced_short_style_registers_an_offense_for_has_key_with_one_arg
    source: |
      o.has_key?(o)
    offenses:
      - line: 1
        column_start: 2
        column_end: 10
        message: "Use `Hash#key?` instead of `Hash#has_key?`."
    corrected: |
      o.key?(o)
    config:
      EnforcedStyle: $UNRESOLVED:short
    interpolated: true
    verified: false

  - name: rubocop_cop_style_preferredhashmethods_with_enforced_short_style_accepts_has_key_with_no_args
    source: |
      o.has_key?
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:short
    interpolated: true
    verified: false

  - name: rubocop_cop_style_preferredhashmethods_with_enforced_short_style_registers_an_offense_for_has_value_with_one_arg
    source: |
