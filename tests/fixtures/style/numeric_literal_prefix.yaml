cop: Style/NumericLiteralPrefix
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_numericliteralprefix_octal_literals_when_config_is_zero_with_o_registers_an_offense_for_prefixes_0_and_0o
    source: |
      a = 01234
      b(0O1234)
    offenses:
      - line: 1
        column_start: 4
        column_end: 9
        message: Use 0o for octal literals.
      - line: 2
        column_start: 2
        column_end: 8
        message: Use 0o for octal literals.
    corrected: |
      a = 0o1234
      b(0o1234)
    config:
      EnforcedOctalStyle: zero_with_o

  - name: rubocop_cop_style_numericliteralprefix_octal_literals_when_config_is_zero_with_o_does_not_register_offense_for_lowercase_prefix
    source: |
      a = 0o101
      b = 0o567
    offenses:
      []
    config:
      EnforcedOctalStyle: zero_with_o

  - name: rubocop_cop_style_numericliteralprefix_octal_literals_when_config_is_zero_only_registers_an_offense_for_prefix_0o_and_0o
    source: |
      a = 0O1234
      b(0o1234)
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: Use 0 for octal literals.
      - line: 2
        column_start: 2
        column_end: 8
        message: Use 0 for octal literals.
    corrected: |
      a = 01234
      b(01234)
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_octal_literals_when_config_is_zero_only_does_not_register_offense_for_prefix_0
    source: |
      b = 0567
    offenses:
      []
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_hex_literals_registers_an_offense_for_uppercase_prefix
    source: |
      a = 0X1AC
      b(0XABC)
    offenses:
      - line: 1
        column_start: 4
        column_end: 9
        message: Use 0x for hexadecimal literals.
      - line: 2
        column_start: 2
        column_end: 7
        message: Use 0x for hexadecimal literals.
    corrected: |
      a = 0x1AC
      b(0xABC)
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_hex_literals_does_not_register_offense_for_lowercase_prefix
    source: |
      a = 0x101
    offenses:
      []
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_binary_literals_registers_an_offense_for_uppercase_prefix
    source: |
      a = 0B10101
      b(0B111)
    offenses:
      - line: 1
        column_start: 4
        column_end: 11
        message: Use 0b for binary literals.
      - line: 2
        column_start: 2
        column_end: 7
        message: Use 0b for binary literals.
    corrected: |
      a = 0b10101
      b(0b111)
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_binary_literals_does_not_register_offense_for_lowercase_prefix
    source: |
      a = 0b101
    offenses:
      []
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_decimal_literals_registers_an_offense_for_prefixes
    source: |
      a = 0d1234
      b(0D1990)
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: Do not use prefixes for decimal literals.
      - line: 2
        column_start: 2
        column_end: 8
        message: Do not use prefixes for decimal literals.
    corrected: |
      a = 1234
      b(1990)
    config:
      EnforcedOctalStyle: zero_only

  - name: rubocop_cop_style_numericliteralprefix_decimal_literals_does_not_register_offense_for_no_prefix
    source: |
      a = 101
    offenses:
      []
    config:
      EnforcedOctalStyle: zero_only
