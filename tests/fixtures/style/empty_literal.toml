cop = "Style/EmptyLiteral"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_emptyliteral_empty_array"
source = '''
test = #{initializer}
'''
corrected = '''
test = []
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 7
column_end = 21
message = "Use array literal `[]` instead of `#{initializer}`."

