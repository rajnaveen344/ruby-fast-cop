cop = "Style/FileRead"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylefileread_does_not_register_an_offense_when_not_reading_from_the_block_variable"
source = '''
File.open(filename) do |f|
  something_else.read
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylefileread_registers_an_offense_for_and_corrects_fileopenfilenameread"
source = '''
File.open(filename).read
'''
corrected = '''
File.read(filename)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 24
message = "Use `File.read`."

