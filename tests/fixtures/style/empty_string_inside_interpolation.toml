cop = "Style/EmptyStringInsideInterpolation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_emptystringinsideinterpolation_when_enforcedstyle_is_trailing_conditional_does_not_register_an_offense_when_if_branch_is_not_a_literal"
source = '''
"#{condition ? send_node : 'foo'}"
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:trailing_conditional"

[[tests]]
name = "rubocop_cop_style_emptystringinsideinterpolation_when_enforcedstyle_is_trailing_conditional_does_not_register_an_offense_when_else_branch_is_not_a_literal"
source = '''
"#{condition ? 'foo' : send_node}"
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:trailing_conditional"

[[tests]]
name = "rubocop_cop_style_emptystringinsideinterpolation_when_enforcedstyle_is_trailing_conditional_does_not_register_an_offense_when_both_if_and_else_branches_are_not_literals"
source = '''
"#{condition ? send_node : another_send_node}"
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:trailing_conditional"

[[tests]]
name = "rubocop_cop_style_emptystringinsideinterpolation_when_enforcedstyle_is_trailing_conditional"
source = '''
"#{condition ? 'foo' : %{empty}}"
'''
corrected = '''
"#{'foo' if condition}"
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 3
column_end = 33
message = "Do not return empty strings in string interpolation."

[tests.config]
EnforcedStyle = "$UNRESOLVED:trailing_conditional"

[[tests]]
name = "rubocop_cop_style_emptystringinsideinterpolation_when_enforcedstyle_is_trailing_conditional"
source = '''
"#{condition ? 42 : %{empty}}"
'''
corrected = '''
"#{42 if condition}"
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
