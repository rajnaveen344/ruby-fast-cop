cop: Style/ObjectThen
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_objectthen_enforcedstyle_then_does_not_register_an_offense_for_method_names_other_than_then
    source: |
      obj.map { |x| x.foo }
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:then
    interpolated: true
    verified: false

  - name: rubocop_cop_style_objectthen_enforcedstyle_then_ruby_2_5_accepts_yield_self_with_block
    source: |
      obj.yield_self { |e| e.test }
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:then
    ruby_version: ">= 2.5"
    interpolated: true
    verified: false

  - name: rubocop_cop_style_objectthen_enforcedstyle_then_ruby_2_6_registers_an_offense_for_yield_self_with_block
    source: |
      obj.yield_self { |e| e.test }
    offenses:
      - line: 1
        column_start: 4
        column_end: 14
        message: Prefer `then` over `yield_self`.
    corrected: |
      obj.then { |e| e.test }
    config:
      EnforcedStyle: $UNRESOLVED:then
    ruby_version: ">= 2.6"
    interpolated: true
    verified: false

  - name: rubocop_cop_style_objectthen_enforcedstyle_then_ruby_2_6_registers_an_offense_for_yield_self_with_safe_navigation_and_block
    source: |
      obj&.yield_self { |e| e.test }
    offenses:
      - line: 1
        column_start: 5
        column_end: 15
        message: Prefer `then` over `yield_self`.
    corrected: |
      obj&.then { |e| e.test }
    config:
      EnforcedStyle: $UNRESOLVED:then
    ruby_version: ">= 2.6"
    interpolated: true
    verified: false

  - name: rubocop_cop_style_objectthen_enforcedstyle_then_ruby_2_7_registers_an_offense_for_yield_self_with_numblock
