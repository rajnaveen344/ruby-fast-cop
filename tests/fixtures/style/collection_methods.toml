cop = "Style/CollectionMethods"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylecollectionmethods_collect_with_block_registers_an_offense"
source = '''
[1, 2, 3].collect { |e| e + 1 }
'''
corrected = '''
[1, 2, 3].map { |e| e + 1 }
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 17
message = "Prefer `map` over `collect`."

[tests.config]
MethodsAcceptingSymbol = ["inject", "reduce"]
PreferredMethods = { collect = "map", inject = "reduce", detect = "find", find_all = "select", "member?" = "include?" }

