cop = "Style/CollectionMethods"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_collectionmethods_registers_an_offense"
source = '''
[1, 2, 3].%{method} { |e| e + 1 }
'''
corrected = '''
[1, 2, 3].#{preferred_method} { |e| e + 1 }
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 10
column_end = 33
message = "Prefer `#{preferred_method}` over `#{method}`."

