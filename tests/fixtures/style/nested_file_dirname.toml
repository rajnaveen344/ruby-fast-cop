cop = "Style/NestedFileDirname"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylenestedfiledirname_ruby__31_registers_and_corrects_an_offense_when_using_filedirnamepath_nested_two_times"
ruby_version = ">= 3.1"
source = '''
File.dirname(File.dirname(path))
'''
corrected = '''
File.dirname(path, 2)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 32
message = "Use `dirname(path, 2)` instead."

[[tests]]
name = "rubocopcopstylenestedfiledirname_ruby__31_registers_and_corrects_an_offense_when_using_filedirnamepath_nested_three_times"
ruby_version = ">= 3.1"
source = '''
File.dirname(File.dirname(File.dirname(path)))
'''
