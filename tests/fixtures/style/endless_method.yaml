cop: Style/EndlessMethod
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_endlessmethod_ruby_3_0_enforcedstyle_disallow_registers_an_offense_for_an_endless_method
    source: |
      def my_method() = x
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Avoid endless method definitions.
    corrected: |
      def my_method
        x
      end
    config:
      EnforcedStyle: disallow
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_endlessmethod_ruby_3_0_enforcedstyle_disallow_registers_an_offense_for_an_endless_method_with_arguments
    source: |
      def my_method(a, b) = x
