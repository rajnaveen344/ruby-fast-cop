cop = "Style/HashLookupMethod"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylehashlookupmethod_with_enforcedstyle_brackets_default_registers_an_offense_for_fetch_with_one_argument"
source = '''
hash.fetch(key)
'''
corrected = '''
hash[key]
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 10
message = "Use `Hash#[]` instead of `Hash#fetch`."

[tests.config]
EnforcedStyle = "brackets"

