cop: Style/ItBlockParameter
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_itblockparameter_ruby_3_4_enforcedstyle_allow_single_line_registers_an_offense_when_using_multiline_it_parameters
    source: |
      block do
        do_something(it)
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Avoid using `it` block parameter for multi-line blocks.
    config:
      EnforcedStyle: allow_single_line
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_itblockparameter_ruby_3_4_enforcedstyle_allow_single_line_registers_no_offense_when_using_it_block_parameter_with_multi_line_method_chain
    source: |
      collection.each
                .foo { puts it }
    offenses:
      []
    config:
      EnforcedStyle: allow_single_line
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_itblockparameter_ruby_3_4_enforcedstyle_allow_single_line_registers_an_offense_when_using_a_single_numbered_parameters
    source: |
      block { do_something(_1) }
    offenses:
      - line: 1
        column_start: 21
        column_end: 23
        message: Use `it` block parameter.
    corrected: |
      block { do_something(it) }
    config:
      EnforcedStyle: allow_single_line
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_itblockparameter_ruby_3_4_enforcedstyle_allow_single_line_registers_an_offense_when_using_twice_a_single_numbered_parameters
    source: |
