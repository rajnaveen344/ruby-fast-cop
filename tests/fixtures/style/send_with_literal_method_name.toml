[[tests]]
name = "rubocopcopstylesendwithliteralmethodname_when_calling_public_send_with_a_symbol_literal_argument_registers_an_offense"
source = '''
obj.public_send(:foo)
'''
corrected = '''
obj.foo
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 21
message = "Use `foo` method call directly instead."

