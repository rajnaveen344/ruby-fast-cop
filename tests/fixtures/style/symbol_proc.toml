cop = "Style/SymbolProc"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylesymbolproc_registers_an_offense_for_a_block_with_parameterless_method_call_on_param"
source = '''
coll.map { |e| e.upcase }
'''
corrected = '''
coll.map(&:upcase)
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 25
message = "Pass `&:upcase` as an argument to `map` instead of a block."

[tests.config]
AllowComments = false
AllowMethodsWithArguments = false
AllowedMethods = ["define_method"]
AllowedPatterns = []

