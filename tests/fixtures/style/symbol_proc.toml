[[tests]]
name = "rubocop_cop_style_symbolproc_registers_an_offense_for_a_block_with_parameterless_method_call_on_param"
source = '''
coll.map { |e| e.upcase }
'''
corrected = '''
coll.map(&:upcase)
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 25
message = "Pass `&:upcase` as an argument to `map` instead of a block."

