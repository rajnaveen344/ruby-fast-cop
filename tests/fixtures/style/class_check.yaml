cop: Style/ClassCheck
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_classcheck_when_enforced_style_is_is_a_registers_an_offense_for_kind_of_and_corrects_to_is_a
    source: |
      x.kind_of? y
    offenses:
      - line: 1
        column_start: 2
        column_end: 10
        message: "Prefer `Object#is_a?` over `Object#kind_of?`."
    corrected: |
      x.is_a? y
    config:
      EnforcedStyle: is_a?

  - name: rubocop_cop_style_classcheck_when_enforced_style_is_is_a_registers_an_offense_for_kind_of_is_safe_navigation_called_and_corrects_to_is_a
    source: |
      x&.kind_of? y
    offenses:
      - line: 1
        column_start: 3
        column_end: 11
        message: "Prefer `Object#is_a?` over `Object#kind_of?`."
    corrected: |
      x&.is_a? y
    config:
      EnforcedStyle: is_a?

  - name: rubocop_cop_style_classcheck_when_enforced_style_is_kind_of_registers_an_offense_for_is_a_and_corrects_to_kind_of
    source: |
      x.is_a? y
    offenses:
      - line: 1
        column_start: 2
        column_end: 7
        message: "Prefer `Object#kind_of?` over `Object#is_a?`."
    corrected: |
      x.kind_of? y
    config:
      EnforcedStyle: kind_of?

  - name: rubocop_cop_style_classcheck_when_enforced_style_is_kind_of_registers_an_offense_for_is_a_is_safe_navigation_called_and_corrects_to_kind_of
    source: |
      x&.is_a? y
    offenses:
      - line: 1
        column_start: 3
        column_end: 8
        message: "Prefer `Object#kind_of?` over `Object#is_a?`."
    corrected: |
      x&.kind_of? y
    config:
      EnforcedStyle: kind_of?
