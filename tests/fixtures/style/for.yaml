cop: Style/For
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_for_when_each_is_the_enforced_style_registers_an_offense_for_for
    source: |
      def func
        for n in [1, 2, 3] do
          puts n
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 23
        message: Prefer `each` over `for`.
    corrected: |
      def func
        [1, 2, 3].each do |n|
          puts n
        end
      end
    config:
      EnforcedStyle: $UNRESOLVED:each
    interpolated: true
    verified: false

  - name: rubocop_cop_style_for_when_each_is_the_enforced_style_registers_an_offense_for_opposite_correct_style
    source: |
      def func
        for n in [1, 2, 3] do
          puts n
