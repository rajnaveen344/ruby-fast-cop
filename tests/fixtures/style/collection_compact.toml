cop = "Style/CollectionCompact"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylecollectioncompact_registers_an_offense_and_corrects_when_using_reject_on_array_to_reject_nils"
ruby_version = ">= 2.4"
source = '''
array.reject { |e| e.nil? }
array.reject! { |e| e.nil? }
'''
corrected = '''
array.compact
array.compact!
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 27
message = "Use `compact` instead of `reject { |e| e.nil? }`."

[[tests.offenses]]
line = 2
column_start = 6
column_end = 28
message = "Use `compact!` instead of `reject! { |e| e.nil? }`."

[tests.config]
AllowedReceivers = []

