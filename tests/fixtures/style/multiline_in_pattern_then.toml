cop = "Style/MultilineInPatternThen"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemultilineinpatternthen__ruby_27_registers_an_offense_for_empty_in_statement_with_then"
source = '''
case foo
in bar then
end
'''
corrected = '''
case foo
in bar
end
'''

[[tests.offenses]]
line = 2
column_start = 7
column_end = 11
message = "Do not use `then` for multiline `in` statement."

