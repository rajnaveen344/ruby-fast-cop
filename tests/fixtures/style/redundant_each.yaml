cop: Style/RedundantEach
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundanteach_registers_an_offense_when_using_each_each
    source: |
      array.each.each { |v| do_something(v) }
    offenses:
      - line: 1
        column_start: 6
        column_end: 11
        message: Remove redundant `each`.
    corrected: |
      array.each { |v| do_something(v) }

  - name: rubocop_cop_style_redundanteach_registers_an_offense_when_using_each_each
    source: |
      array.each&.each { |v| do_something(v) }
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: Remove redundant `each`.
    corrected: |
      array.each { |v| do_something(v) }

  - name: rubocop_cop_style_redundanteach_registers_an_offense_when_using_each_each
