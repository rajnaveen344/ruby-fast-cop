line = 5
column_start = 7
column_end = 10
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_when_ruby_30_or_higher_does_not_register_an_offense_when_using_endless_method_definition"
