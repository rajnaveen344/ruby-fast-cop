cop = "Style/TrailingMethodEndStatement"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_registers_an_offense_with_trailing_end_on_2_line_method"
source = '''
def some_method
foo; end
'''
corrected = '''
def some_method
foo; 
end
'''

[[tests.offenses]]
line = 2
column_start = 5
column_end = 8
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_registers_an_offense_with_trailing_end_on_3_line_method"
source = '''
def a
  b
{ foo: bar }; end
'''
corrected = '''
def a
  b
{ foo: bar }; 
end
'''

[[tests.offenses]]
line = 3
column_start = 14
column_end = 17
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_registers_an_offense_with_trailing_end_on_method_with_comment"
source = '''
def c
  b = calculation
  [b] end # because b
'''
corrected = '''
def c
  b = calculation
  [b] 
end # because b
'''

[[tests.offenses]]
line = 3
column_start = 6
column_end = 9
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_registers_an_offense_with_trailing_end_on_method_with_block"
source = '''
def d
  block do
    foo
  end end
'''
corrected = '''
def d
  block do
    foo
  end 
end
'''

[[tests.offenses]]
line = 4
column_start = 6
column_end = 9
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_registers_an_offense_with_trailing_end_inside_class"
source = '''
class Foo
  def some_method
  foo; end
end
'''
corrected = '''
class Foo
  def some_method
  foo; 
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 7
column_end = 10
message = "Place the end statement of a multi-line method on its own line."

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_does_not_register_on_single_line_no_op"
source = '''
def no_op; end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_does_not_register_on_single_line_method"
source = '''
def something; do_stuff; end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletrailingmethodendstatement_autocorrects_all_trailing_ends_for_larger_example"
source = '''
class Foo
  def some_method
    [] end
  def another_method
    {} end
end
'''
corrected = '''
class Foo
  def some_method
    [] 
  end
  def another_method
    {} 
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 7
column_end = 10
message = "Place the end statement of a multi-line method on its own line."

