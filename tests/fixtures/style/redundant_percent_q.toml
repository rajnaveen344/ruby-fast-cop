cop = "Style/RedundantPercentQ"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_a_heredoc_string_that_contains_q"
source = '''
  s = <<CODE
%q('hi') # line 1
%q("hi")
CODE
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_q_at_the_beginning_of_a_double_quoted_string_with_interpolation"
strip_trailing_newline = true
source = '''
"%q(a)#{b}"
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_q_at_the_beginning_of_a_double_quoted_string_with_interpolation_2"
strip_trailing_newline = true
source = '''
"%Q(a)#{b}"
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_q_at_the_beginning_of_a_section_of_a_double_quoted_string_with_interpolation"
strip_trailing_newline = true
source = '''
"%#{b}%q(a)"
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_q_at_the_beginning_of_a_section_of_a_double_quoted_string_with_interpolation_2"
strip_trailing_newline = true
source = '''
"%#{b}%Q(a)"
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_accepts_q_containing_string_interpolation"
strip_trailing_newline = true
source = '''
%q(foo #{'bar'} baz)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_only_single_quotes"
source = '''
%q('hi')
'''
corrected = '''
"'hi'"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Use `%q` only for strings that contain both single quotes and double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_only_double_quotes"
source = '''
%q("hi")
'''
corrected = '''
'"hi"'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Use `%q` only for strings that contain both single quotes and double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_no_quotes"
source = '''
%q(hi)
'''
corrected = '''
'hi'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Use `%q` only for strings that contain both single quotes and double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_single_quotes_and_double_quotes"
strip_trailing_newline = true
source = '''
%q('"hi"')
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_a_string_containing_escaped_backslashes"
source = '''
%q(\\\\foo\\\\)
'''
corrected = '''
'\\\\foo\\\\'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Use `%q` only for strings that contain both single quotes and double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_escaped_nonbackslash_characters"
strip_trailing_newline = true
source = '''
%q(\'foo\')
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_escaped_backslash_and_nonbackslash_characters"
strip_trailing_newline = true
source = '''
%q(\\ \'foo\' \\)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_regular_expressions_starting_with_q"
strip_trailing_newline = true
source = '''
/%q?/
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_autocorrects_for_strings_that_are_concatenated_with_backslash"
source = '''
%q(foo bar baz) \
  'boogers'
'''
corrected = '''
'foo bar baz' \
  'boogers'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Use `%q` only for strings that contain both single quotes and double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_static_string_without_quotes"
source = '''
%Q(hi)
'''
corrected = '''
"hi"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Use `%Q` only for strings that contain both single quotes and double quotes, or for dynamic strings that contain double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_static_string_with_only_double_quotes"
source = '''
%Q("hi")
'''
corrected = '''
'"hi"'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Use `%Q` only for strings that contain both single quotes and double quotes, or for dynamic strings that contain double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_registers_an_offense_for_dynamic_string_without_quotes"
source = '''
%Q(hi#{4})
'''
corrected = '''
"hi#{4}"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Use `%Q` only for strings that contain both single quotes and double quotes, or for dynamic strings that contain double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_single_quotes_and_double_quotes_2"
strip_trailing_newline = true
source = '''
%Q('"hi"')
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_double_quotes_and_an_escaped_special_character"
strip_trailing_newline = true
source = '''
%Q("\thi")
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_a_string_with_double_quotes_and_an_escaped_normal_character"
