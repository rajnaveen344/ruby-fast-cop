  'boogers'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Use `%Q` only for strings that contain both single quotes and double quotes, or for dynamic strings that contain double quotes."

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_autocorrects_safely_for_multiline_strings_containing_double_quotes"
source = '''
%Q(
  Quoth the Raven "Nevermore."
)
'''
corrected = '''
'
  Quoth the Raven "Nevermore."
'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Use `%Q` only for strings that contain both single quotes and double quotes, or for dynamic strings that contain double quotes."
