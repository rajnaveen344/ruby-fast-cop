'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_accepts_regular_expressions_starting_with_q_2"
strip_trailing_newline = true
source = '''
/%Q?/
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantpercentq_with_q_strings_autocorrects_for_strings_that_are_concatenated_with_backslash_2"
source = '''
%Q(foo bar baz) \
  'boogers'
'''
corrected = '''
