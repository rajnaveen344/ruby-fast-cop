cop = "Style/NilLambda"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_nillambda_block_lambda_registers_an_offense_when_returning_nil_implicitly"
source = '''
lambda do
  nil
end
'''
corrected = '''
lambda do
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 9
message = "Use an empty lambda instead of always returning nil."

