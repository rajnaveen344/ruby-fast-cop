cop = "Style/SuperArguments"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesuperarguments_registers_no_offense_when_explicitly_passing_no_arguments"
source = '''
def foo(a)
  super()
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylesuperarguments_registers_an_offense_when_passing_along_no_arguments"
source = '''
def foo
  super()
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 9
message = "Call `super` without arguments and parentheses when the signature is identical."

[[tests]]
name = "rubocopcopstylesuperarguments_registers_an_offense_for_nested_declarations"
source = '''
def foo(a)
  def bar(b:)
    super(b: b)
  end
  super(a)
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 15
message = "Call `super` without arguments and parentheses when the signature is identical."

[[tests.offenses]]
line = 5
column_start = 2
column_end = 10
message = "Call `super` without arguments and parentheses when the signature is identical."

[[tests]]
name = "rubocopcopstylesuperarguments_registers_an_offense_when_the_hash_argument_is_orassigned"
source = '''
