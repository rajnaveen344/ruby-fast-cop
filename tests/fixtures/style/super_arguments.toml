cop = "Style/SuperArguments"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_superarguments"
source = '''
def method(#{args})
  super(#{forwarded_args})
end
'''
corrected = '''
def method(#{args})
  super
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 26
message = "Call `super` without arguments and parentheses when the signature is identical."

[[tests]]
name = "rubocop_cop_style_superarguments"
source = '''
def self.method(#{args})
  super(#{forwarded_args})
end
'''
corrected = '''
def self.method(#{args})
  super
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 26
message = "Call `super` without arguments and parentheses when the signature is identical."

