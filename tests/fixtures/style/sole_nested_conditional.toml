cop = "Style/SoleNestedConditional"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesolenestedconditional_registers_an_offense_and_corrects_when_using_nested_if_within_if"
source = '''
if foo
  if bar
    do_something
  end
end
'''
corrected = '''
if foo && bar
    do_something
  end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 4
message = "Consider merging nested conditions into outer `if` conditions."

[tests.config]
AllowModifier = false

