cop = "Style/RescueModifier"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylerescuemodifier_registers_an_offense_for_modifier_rescue"
source = '''
method rescue handle
'''
corrected = '''
begin
  method
rescue
  handle
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Avoid using `rescue` in its modifier form."

[tests.config."Layout/IndentationWidth"]
Width = 2

