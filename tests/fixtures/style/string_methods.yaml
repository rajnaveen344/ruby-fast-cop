cop: Style/StringMethods
department: style
severity: convention
implemented: true

tests:
  - name: rubocop_cop_style_stringmethods_registers_an_offense
    source: |
      'something'.intern
    offenses:
      - line: 1
        column_start: 12
        column_end: 18
        message: Prefer `to_sym` over `intern`.
    corrected: |
      'something'.to_sym
    config:
      intern: to_sym

  - name: rubocop_cop_style_stringmethods_when_using_safe_navigation_operator_registers_an_offense
    source: |
      something&.intern
    offenses:
      - line: 1
        column_start: 11
        column_end: 17
        message: Prefer `to_sym` over `intern`.
    corrected: |
      something&.to_sym
    config:
      intern: to_sym
