cop: Style/Sample
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_sample
    source: |
      [1, 2, 3].%{wrong}
    offenses:
      - line: 1
        column_start: 10
        column_end: 18
        message: "Use `#{right}` instead of `#{wrong}`."
    corrected: |
      [1, 2, 3].#{right}
    interpolated: true
    verified: false

  - name: rubocop_cop_style_sample
    source: |
      [1, 2, 3]&.%{wrong}
