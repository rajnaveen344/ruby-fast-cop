cop = "Style/MultipleComparison"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemultiplecomparison_does_not_register_an_offense_for_comparing_an_lvar"
source = '''
a = "a"
if a == "a"
  print a
end
'''
offenses = []

[tests.config]
AllowMethodComparison = true
ComparisonsThreshold = 2

[[tests]]
name = "rubocopcopstylemultiplecomparison_registers_an_offense_and_corrects_when_a_is_compared_twice"
source = '''
a = "a"
if a == "a" || a == "b"
  print a
end
'''
corrected = '''
a = "a"
if ["a", "b"].include?(a)
  print a
end
'''

[[tests.offenses]]
line = 2
column_start = 3
column_end = 23
message = "Avoid comparing a variable with multiple items in a conditional, use `Array#include?` instead."

[tests.config]
AllowMethodComparison = true
ComparisonsThreshold = 2

