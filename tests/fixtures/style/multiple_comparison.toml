[[tests]]
name = "rubocopcopstylemultiplecomparison_registers_an_offense_and_corrects_when_a_is_compared_twice_in_if_and_elsif_conditions"
source = '''
def foo(a)
  if a == 'foo' || a == 'bar'
  elsif a == 'baz' || a == 'qux'
  elsif a == 'quux'
  end
end
'''
corrected = '''
def foo(a)
  if ['foo', 'bar'].include?(a)
  elsif ['baz', 'qux'].include?(a)
  elsif a == 'quux'
  end
end
'''

