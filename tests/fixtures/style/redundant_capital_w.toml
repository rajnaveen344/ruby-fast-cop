cop = "Style/RedundantCapitalW"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_normal_arrays_of_strings"
source = '''
["one", "two", "three"]
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_normal_arrays_of_strings_with_interpolation"
source = '''
["one", "two", "th#{?r}ee"]
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_an_offense_for_misused_w"
source = '''
%W(cat dog)
'''
corrected = '''
%w(cat dog)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Do not use `%W` unless interpolation is needed. If not, use `%w`."

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_an_offense_for_misused_w_with_different_bracket"
source = '''
%W[cat dog]
'''
corrected = '''
%w[cat dog]
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Do not use `%W` unless interpolation is needed. If not, use `%w`."

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_w_with_interpolation"
source = '''
%W(c#{?a}t dog)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_w_with_special_characters"
source = '''
def dangerous_characters
  %W(\000) +
  %W(\001) +
  %W(\027) +
  %W(\002) +
  %W(\003) +
  %W(\004) +
  %W(\005) +
  %W(\006) +
  %W(\007) +
  %W(\00) +
  %W(\a)
  %W(\s)
  %W(\n)
  %W(\!)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_w_without_interpolation"
source = '''
%w(cat dog)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantcapitalw_registers_no_offense_for_w_with_interpolationlike_syntax"
source = '''
%w(c#{?a}t dog)
'''
offenses = []

[[tests]]
