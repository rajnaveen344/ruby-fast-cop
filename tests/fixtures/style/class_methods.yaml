cop: Style/ClassMethods
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_classmethods_registers_an_offense_for_methods_using_a_class_name
    source: |
      class Test
        def Test.some_method
          do_something
        end
      end
    offenses:
      - line: 2
        column_start: 6
        column_end: 10
        message: Use `self.some_method` instead of `Test.some_method`.
    corrected: |
      class Test
        def self.some_method
          do_something
        end
      end

  - name: rubocop_cop_style_classmethods_registers_an_offense_for_methods_using_a_module_name
    source: |
      module Test
        def Test.some_method
          do_something
        end
      end
    offenses:
      - line: 2
        column_start: 6
        column_end: 10
        message: Use `self.some_method` instead of `Test.some_method`.
    corrected: |
      module Test
        def self.some_method
          do_something
        end
      end

  - name: rubocop_cop_style_classmethods_does_not_register_an_offense_for_methods_using_self
    source: |
      module Test
        def self.some_method
          do_something
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_classmethods_does_not_register_an_offense_for_other_top_level_singleton_methods
    source: |
      class Test
        X = Something.new
      
        def X.some_method
          do_something
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_classmethods_does_not_register_an_offense_outside_class_module_bodies
    source: |
      def Test.some_method
        do_something
      end
    offenses:
      []
