cop: Style/FloatDivision
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_floatdivision_enforcedstyle_is_left_coerce_registers_an_offense_and_corrects_for_right_coerce
    source: |
      a / b.to_f
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Prefer using `.to_f` on the left side.
    corrected: |
      a.to_f / b
    config:
      EnforcedStyle: $UNRESOLVED:left_coerce
    interpolated: true
    verified: false

  - name: rubocop_cop_style_floatdivision_enforcedstyle_is_left_coerce_does_not_register_an_offense_for_right_coerce_with_nth_ref
    source: |
      a / $1.to_f
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:left_coerce
    interpolated: true
    verified: false

