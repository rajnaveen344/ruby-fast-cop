cop: Style/HashConversion
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashconversion_reports_an_offense_for_single_argument_hash
    source: |
      Hash[ary]
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      ary.to_h

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_multi_argument_hash
    source: |
      Hash[a, b, c, d]
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.
    corrected: |
      {a => b, c => d}

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_argument_hash
    source: |
      Hash[a: b, c: d]
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: "Prefer literal hash to `Hash[key: value, ...]`."
    corrected: |
      {a: b, c: d}

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_argument_hash_as_a_method_argument_with_parentheses
    source: |
      do_something(Hash[a: b, c: d], 42)
    offenses:
      - line: 1
        column_start: 13
        column_end: 29
        message: "Prefer literal hash to `Hash[key: value, ...]`."
    corrected: |
      do_something({a: b, c: d}, 42)

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_argument_hash_as_a_method_argument_without_parentheses
    source: |
      do_something Hash[a: b, c: d], 42
    offenses:
      - line: 1
        column_start: 13
        column_end: 29
        message: "Prefer literal hash to `Hash[key: value, ...]`."
    corrected: |
      do_something({a: b, c: d}, 42)

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_empty_hash
    source: |
      Hash[]
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.
    corrected: |
      {}

  - name: rubocop_cop_style_hashconversion_registers_and_corrects_an_offense_when_using_multi_argument_hash_as_a_method_argument
    source: |
      do_something Hash[a, b, c, d], arg
    offenses:
      - line: 1
        column_start: 13
        column_end: 29
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.
    corrected: |
      do_something({a => b, c => d}, arg)

  - name: rubocop_cop_style_hashconversion_does_not_try_to_correct_multi_argument_hash_with_odd_number_of_arguments
    source: |
      Hash[a, b, c]
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.

  - name: rubocop_cop_style_hashconversion_wraps_complex_statements_in_parens_if_needed
    source: |
      Hash[a.foo :bar]
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      (a.foo :bar).to_h

  - name: rubocop_cop_style_hashconversion_registers_and_corrects_an_offense_when_using_argumentless_zip_without_parentheses_in_hash
    source: |
      Hash[array.zip]
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      array.zip([]).to_h

  - name: rubocop_cop_style_hashconversion_registers_and_corrects_an_offense_when_using_argumentless_zip_with_parentheses_in_hash
    source: |
      Hash[array.zip()]
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      array.zip([]).to_h

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_a_b
    source: |
      Hash[a || b]
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      (a || b).to_h

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_a_b
    source: |
      Hash[(a || b)]
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      (a || b).to_h

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_a_b
    source: |
      Hash[a && b]
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      (a && b).to_h

  - name: rubocop_cop_style_hashconversion_reports_different_offense_for_hash_a_b
    source: |
      Hash[(a && b)]
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      (a && b).to_h

  - name: rubocop_cop_style_hashconversion_registers_and_corrects_an_offense_when_using_zip_with_argument_in_hash
    source: |
      Hash[array.zip([1, 2, 3])]
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      array.zip([1, 2, 3]).to_h

  - name: rubocop_cop_style_hashconversion_reports_an_offense_when_using_nested_hash_without_arguments
    source: |
      Hash[Hash[]]
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      Hash[].to_h

  - name: rubocop_cop_style_hashconversion_reports_an_offense_when_using_nested_hash_with_arguments
    source: |
      Hash[Hash[k, v]]
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Prefer `ary.to_h` to `Hash[ary]`.
    corrected: |
      Hash[k, v].to_h

  - name: rubocop_cop_style_hashconversion_registers_an_offense_and_corrects_nested_hash_calls_with_multiple_arguments
    source: |
      Hash[1, Hash[k, v]]
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.
    corrected: |
      {1 => Hash[k, v]}

  - name: rubocop_cop_style_hashconversion_reports_an_offense_for_hash_to_h
    source: |
      Hash[].to_h
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Prefer literal hash to `Hash[arg1, arg2, ...]`.
    corrected: |
      {}.to_h

  - name: rubocop_cop_style_hashconversion_allowsplatargument_true_does_not_register_an_offense_for_unpacked_array
    source: |
      Hash[*ary]
    offenses:
      []
    config:
      AllowSplatArgument: true

  - name: rubocop_cop_style_hashconversion_allowsplatargument_false_reports_uncorrectable_offense_for_unpacked_array
    source: |
      Hash[*ary]
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Prefer `array_of_pairs.to_h` to `Hash[*array]`.
    config:
      AllowSplatArgument: false
