cop = "Style/RandomWithOffset"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylerandomwithoffset_registers_an_offense_when_using_randint__offset"
source = '''
rand(6) + 1
'''
corrected = '''
rand(1..6)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Prefer ranges when generating random numbers instead of integers with offsets."

