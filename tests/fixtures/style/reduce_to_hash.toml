cop = "Style/ReduceToHash"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylereducetohash_when_targeting_ruby_26_with_each_with_object_pattern_registers_an_offense_and_corrects_with_inline_block"
ruby_version = ">= 2.6"
source = '''
array.each_with_object({}) { |elem, hash| hash[elem.id] = elem.name }
'''
corrected = '''
array.to_h { |elem| [elem.id, elem.name] }
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 22
message = "Use `to_h { ... }` instead of `each_with_object`."

[[tests]]
name = "rubocopcopstylereducetohash_when_targeting_ruby_26_with_each_with_object_pattern_registers_an_offense_and_corrects_with_doend_block"
ruby_version = ">= 2.6"
source = '''
array.each_with_object({}) do |elem, hash|
  hash[elem.id] = elem.name
end
'''
corrected = '''
array.to_h do |elem|
  [elem.id, elem.name]
end
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 22
message = "Use `to_h { ... }` instead of `each_with_object`."

[[tests]]
