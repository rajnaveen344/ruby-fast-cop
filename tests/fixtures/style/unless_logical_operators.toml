implemented = false

[[tests]]
name = "rubocopcopstyleunlesslogicaloperators_enforcedstyle_is_forbid_mixed_logical_operators_registers_an_offense_when_using__and_"
source = '''
return unless a && b || c
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 25
message = "Do not use mixed logical operators in an `unless`."

[tests.config]
EnforcedStyle = "forbid_mixed_logical_operators"

