cop = "Style/UnlessLogicalOperators"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_unlesslogicaloperators_enforcedstyle_is_forbid_mixed_logical_operators_registers_an_offense_when_using_and"
source = '''
return unless a || b && c
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 25
message = "Do not use mixed logical operators in an `unless`."

[tests.config]
EnforcedStyle = "$UNRESOLVED:forbid_mixed_logical_operators"

