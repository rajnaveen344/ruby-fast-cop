cop = "Style/RedundantStringEscape"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_redundantstringescape_registers_an_offense_and_corrects_an_escaped_before_interpolation"
source = '''
%{l}\##{whatever}%{r}
'''
corrected = '''
#{l}##{whatever}#{r}
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "Redundant escape of # inside string literal."

