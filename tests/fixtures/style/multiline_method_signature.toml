cop = "Style/MultilineMethodSignature"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_multilinemethodsignature_when_arguments_span_a_single_line_when_defining_an_instance_method_registers_an_offense_and_corrects_when_closing_paren_is_on_the_following_line"
source = '''
def foo(bar
    )
end
'''
corrected = '''
def foo(bar)
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Avoid multi-line method signatures."

