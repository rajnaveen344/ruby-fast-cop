cop = "Style/NumericLiteralPrefix"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenumericliteralprefix_octal_literals_when_config_is_zero_with_o_registers_an_offense_for_prefixes_0_and_0o"
source = '''
a = 01234
b(0O1234)
'''
corrected = '''
a = 0o1234
b(0o1234)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 9
message = "Use 0o for octal literals."

[[tests.offenses]]
line = 2
column_start = 2
column_end = 8
message = "Use 0o for octal literals."

[tests.config]
EnforcedOctalStyle = "zero_with_o"
SupportedOctalStyles = ["zero_with_o", "zero_only"]

[[tests]]
name = "rubocopcopstylenumericliteralprefix_octal_literals_when_config_is_zero_with_o_does_not_register_offense_for_lowercase_prefix"
source = '''
a = 0o101
b = 0o567
'''
offenses = []

[tests.config]
EnforcedOctalStyle = "zero_with_o"
SupportedOctalStyles = ["zero_with_o", "zero_only"]

