cop = "Style/RedundantReturn"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantreturn_reports_an_offense_for_def_with_only_a_return"
source = '''
def func
  return something
ensure
  2
end
'''
corrected = '''
def func
  something
ensure
  2
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 8
message = "Redundant `return` detected."

[tests.config]
AllowMultipleReturnValues = false

