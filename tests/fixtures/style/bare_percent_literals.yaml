cop: Style/BarePercentLiterals
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_barepercentliterals_accepts_file
    source: |
      __FILE__
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts_regular_expressions
    source: |
      /%Q?/
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts
    source: |
      ""
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts_string_with_interpolation
    source: |
      "#{file}hi"
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts
    source: |
      'hi'
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %q(hi)
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_accepts_heredoc
    source: |
      func <<HEREDOC
      hi
      HEREDOC
    offenses:
      []

  - name: rubocop_cop_style_barepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_static_registers_an_offense_for
    source: |
      ‹BASE›0‹/BASE›
      %(hi)
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Use `%Q` instead of `%`.
    corrected: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    config:
      EnforcedStyle: $UNRESOLVED:percent_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_barepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_static_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:percent_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_barepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_dynamic_registers_an_offense_for
    source: |
      ‹BASE›0‹/BASE›
      %(#{x})
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Use `%Q` instead of `%`.
    corrected: |
      ‹BASE›0‹/BASE›
      %Q(#{x})
    config:
      EnforcedStyle: $UNRESOLVED:percent_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_barepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_dynamic_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(#{x})
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:percent_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_barepercentliterals_when_enforcedstyle_is_bare_percent_and_strings_are_static_registers_an_offense_for_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Use `%` instead of `%Q`.
    corrected: |
      ‹BASE›0‹/BASE›
      %(hi)
    config:
      EnforcedStyle: $UNRESOLVED:bare_percent
    interpolated: true
    verified: false

