      %Q(#{x})
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Use `%` instead of `%Q`.
    corrected: |
      ‹BASE›0‹/BASE›
      %(#{x})
    config:
      EnforcedStyle: $UNRESOLVED:bare_percent
    interpolated: true
    verified: false

