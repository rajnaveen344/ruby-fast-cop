cop = "Style/HashFetchChain"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylehashfetchchain_ruby__23_with_chained_fetch_methods_when_there_is_only_1_argument_does_not_register_an_offense"
source = '''
hash.fetch('foo').fetch('bar')
'''
offenses = []

