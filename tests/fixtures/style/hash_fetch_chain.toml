cop = "Style/HashFetchChain"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_does_not_register_an_offense_when_not_chained"
source = '''
hash.fetch('foo', #{argument})
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_when_the_first_argument_is_a_string"
source = '''
hash.fetch('foo', %{argument})&.fetch('bar', nil)
'''
corrected = '''
hash.dig('foo', 'bar')
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 49
message = "Use `dig('foo', 'bar')` instead."

[[tests]]
name = "rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_when_the_first_argument_is_a_symbol"
source = '''
hash.fetch(:foo, %{argument})&.fetch(:bar, nil)
'''
corrected = '''
hash.dig(:foo, :bar)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 47
message = "Use `dig(:foo, :bar)` instead."

[[tests]]
name = "rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_for_send_arguments"
source = '''
hash.fetch(foo, %{argument})&.fetch(bar, nil)
'''
corrected = '''
hash.dig(foo, bar)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 45
message = "Use `dig(foo, bar)` instead."

[[tests]]
name = "rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_for_mixed_arguments"
source = '''
