[[tests]]
name = "rubocopcopstylehashfetchchain_ruby__23_with_chained_fetch_methods_behaves_like_fetch_chain_when_the_2nd_argument_is_nil_registers_an_offense_and_corrects_when_the_first_argument_is_a_string"
source = '''
hash.fetch('foo', nil)&.fetch('bar', nil)
'''
corrected = '''
hash.dig('foo', 'bar')
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 41
message = "Use `dig('foo', 'bar')` instead."

