cop = "Style/RedundantStructKeywordInit"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantstructkeywordinit_ruby__32_registers_an_offense_when_using_keyword_init_nil_in_structnew"
ruby_version = ">= 3.2"
source = '''
Struct.new(:foo, keyword_init: nil)
'''
corrected = '''
Struct.new(:foo)
'''

[[tests.offenses]]
line = 1
column_start = 17
column_end = 34
message = "Remove the redundant `keyword_init: nil`."

