cop = "Style/CaseEquality"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylecaseequality_when_allowonconstant_is_false_registers_an_offense_and_corrects_for__when_the_receiver_is_a_constant"
source = '''
Array === var
'''
corrected = '''
var.is_a?(Array)
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "Avoid the use of the case equality operator `===`."

[tests.config]
AllowOnConstant = false
AllowOnSelfClass = false
References = ["https://docs.rubocop.org/rubocop-performance/cops_performance.html#performanceregexpmatch"]

[[tests]]
name = "rubocopcopstylecaseequality_when_allowonconstant_is_false_behaves_like_offenses_does_not_fail_when_the_receiver_is_implicit"
source = '''
puts "No offense"
'''
offenses = []

[tests.config]
AllowOnConstant = false
AllowOnSelfClass = false
References = ["https://docs.rubocop.org/rubocop-performance/cops_performance.html#performanceregexpmatch"]

