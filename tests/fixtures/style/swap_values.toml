cop = "Style/SwapValues"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_swapvalues"
source = '''
tmp = %{x}
#{x} = #{y}
#{y} = tmp
'''
corrected = '''
#{correction}
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Replace this and assignments at lines 2 and 3 with `#{correction}`."

