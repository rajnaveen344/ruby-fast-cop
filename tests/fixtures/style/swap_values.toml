cop = "Style/SwapValues"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleswapvalues_handles_comments_when_correcting"
source = '''
tmp = x # comment 1
# comment 2
x = y
y = tmp # comment 3
'''
corrected = '''
x, y = y, x
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Replace this and assignments at lines 3 and 4 with `x, y = y, x`."

[[tests]]
name = "rubocopcopstyleswapvalues_does_not_register_an_offense_when_idiomatically_swapping_variables"
source = '''
x, y = y, x
'''
offenses = []

[[tests]]
name = "rubocopcopstyleswapvalues_does_not_register_an_offense_when_almost_swapping_variables"
source = '''
tmp = x
x = y
y = not_a_tmp
'''
offenses = []

[[tests]]
name = "rubocopcopstyleswapvalues_does_not_register_an_offense_when_assigning_receiver_object_at_def"
source = '''
def (foo = Object.new).do_something
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleswapvalues_behaves_like_verbosely_swapping_registers_an_offense_and_corrects_when_verbosely_swapping_local_variables"
source = '''
tmp = x
x = y
y = tmp
'''
corrected = '''
x, y = y, x
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Replace this and assignments at lines 2 and 3 with `x, y = y, x`."

[[tests]]
name = "rubocopcopstyleswapvalues_behaves_like_verbosely_swapping_registers_an_offense_and_corrects_when_verbosely_swapping_global_variables"
source = '''
tmp = $x
$x = $y
$y = tmp
'''
corrected = '''
$x, $y = $y, $x
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Replace this and assignments at lines 2 and 3 with `$x, $y = $y, $x`."

[[tests]]
