cop = "Style/OperatorMethodCall"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_operatormethodcall"
source = '''
foo.#{operator_method} bar
'''
corrected = '''
foo #{operator_method} bar
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 3
column_end = 4
message = "Redundant dot detected."

