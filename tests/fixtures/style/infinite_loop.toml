[[tests]]
name = "rubocopcopstyleinfiniteloop_registers_an_offense_for_until_false_if_loop__would_work_because_of_previous_assignment_in_a_while_loop"
source = '''
while true
  a = 42
  break
end
until false
  # The variable `a` already exists here, having been introduced in the
  # above `while` loop. We can therefore safely change it too `Kernel#loop`.
  a = 43
  break
end
puts a
'''
corrected = '''
while true
  a = 42
  break
end
loop do
  # The variable `a` already exists here, having been introduced in the
  # above `while` loop. We can therefore safely change it too `Kernel#loop`.
  a = 43
  break
end
puts a
'''

[[tests.offenses]]
line = 5
column_start = 0
column_end = 5
message = "Use `Kernel#loop` for infinite loops."

[tests.config."Layout/IndentationWidth"]
Width = 2

