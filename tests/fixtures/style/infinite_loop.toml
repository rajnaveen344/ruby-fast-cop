cop = "Style/InfiniteLoop"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleinfiniteloop_registers_an_offense_for_a_while_loop_with_1_as_condition"
source = '''
while 1
  top
end
'''
corrected = '''
loop do
  top
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Use `Kernel#loop` for infinite loops."

[tests.config."Layout/IndentationWidth"]
Width = 2

