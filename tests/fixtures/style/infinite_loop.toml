[[tests]]
name = "rubocopcopstyleinfiniteloop_registers_an_offense_for_while_true_or_until_false_if_loop__would_work_because_of_an_earlier_assignment"
source = '''
a = 0
while true
  a = 42 # `a` is in scope outside of the `while`
  break
end
until false
  a = 43 # `a` is in scope outside of the `until`
  break
end
puts a
'''
corrected = '''
a = 0
loop do
  a = 42 # `a` is in scope outside of the `while`
  break
end
loop do
  a = 43 # `a` is in scope outside of the `until`
  break
end
puts a
'''

