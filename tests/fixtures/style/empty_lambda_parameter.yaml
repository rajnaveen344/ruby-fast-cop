cop: Style/EmptyLambdaParameter
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_emptylambdaparameter_registers_an_offense_for_an_empty_block_parameter_with_a_lambda
    source: |
      -> () { do_something }
    offenses:
      - line: 1
        column_start: 3
        column_end: 5
        message: Omit parentheses for the empty lambda parameters.
    corrected: |
      -> { do_something }

  - name: rubocop_cop_style_emptylambdaparameter_accepts_a_keyword_lambda
    source: |
      lambda { || do_something }
    offenses:
      []

  - name: rubocop_cop_style_emptylambdaparameter_does_not_crash_on_a_super
    source: |
      def foo
        super { || do_something }
      end
    offenses:
      []
