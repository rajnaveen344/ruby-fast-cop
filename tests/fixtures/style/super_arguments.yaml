cop: Style/SuperArguments
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_superarguments
    source: |
      def method(#{args})
        super(#{forwarded_args})
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Call `super` without arguments and parentheses when the signature is identical.
    corrected: |
      def method(#{args})
        super
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_superarguments
    source: |
      def self.method(#{args})
        super(#{forwarded_args})
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Call `super` without arguments and parentheses when the signature is identical.
    corrected: |
      def self.method(#{args})
        super
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_superarguments
    source: |
      def method(#{args})
