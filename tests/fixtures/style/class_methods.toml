cop = "Style/ClassMethods"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleclassmethods_registers_an_offense_for_methods_using_a_class_name"
source = '''
class Test
  def Test.some_method
    do_something
  end
end
'''
corrected = '''
class Test
  def self.some_method
    do_something
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 6
column_end = 10
message = "Use `self.some_method` instead of `Test.some_method`."

[[tests]]
name = "rubocopcopstyleclassmethods_registers_an_offense_for_methods_using_a_module_name"
source = '''
module Test
  def Test.some_method
    do_something
  end
end
'''
corrected = '''
module Test
  def self.some_method
    do_something
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 6
column_end = 10
message = "Use `self.some_method` instead of `Test.some_method`."

[[tests]]
name = "rubocopcopstyleclassmethods_does_not_register_an_offense_for_methods_using_self"
source = '''
module Test
  def self.some_method
    do_something
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleclassmethods_does_not_register_an_offense_for_other_toplevel_singleton_methods"
source = '''
class Test
  X = Something.new

  def X.some_method
    do_something
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleclassmethods_does_not_register_an_offense_outside_classmodule_bodies"
source = '''
def Test.some_method
  do_something
end
'''
offenses = []
