cop = "Style/DateTime"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_datetime_registers_an_offense_when_using_datetime_for_current_time"
source = '''
DateTime.now
'''
corrected = '''
Time.now
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 12
message = "Prefer `Time` over `DateTime`."

[tests.config]
AllowCoercion = false

