cop = "Style/StringConcatenation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_stringconcatenation_registers_an_offense_and_corrects_for_string_concatenation"
source = '''
email_with_name = user.name + ' <' + user.email + '>'
'''
corrected = '''
email_with_name = "#{user.name} <#{user.email}>"
'''

[[tests.offenses]]
line = 1
column_start = 18
column_end = 53
message = "Prefer string interpolation to string concatenation."

[[tests]]
name = "rubocop_cop_style_stringconcatenation_registers_an_offense_and_corrects_for_string_concatenation_as_part_of_other_expression"
source = '''
users = (user.name + ' ' + user.email) * 5
'''
corrected = '''
users = ("#{user.name} #{user.email}") * 5
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 37
message = "Prefer string interpolation to string concatenation."

[[tests]]
name = "rubocop_cop_style_stringconcatenation_correctly_handles_strings_with_special_characters"
source = '''
email_with_name = "\n" + user.name + ' ' + user.email + '\n'
'''
corrected = '''
email_with_name = "\n#{user.name} #{user.email}\\n"
'''

[[tests.offenses]]
line = 1
column_start = 18
column_end = 60
message = "Prefer string interpolation to string concatenation."

