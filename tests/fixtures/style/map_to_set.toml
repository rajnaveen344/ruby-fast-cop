cop = "Style/MapToSet"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemaptoset_for_mapto_set_with_block_arity_1_registers_an_offense_and_corrects"
source = '''
foo.map { |x| [x, x * 2] }.to_set
'''
corrected = '''
foo.to_set { |x| [x, x * 2] }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Pass a block to `to_set` instead of calling `map.to_set`."

