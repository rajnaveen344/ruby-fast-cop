cop = "Style/MapToSet"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_maptoset_registers_an_offense_and_corrects"
source = '''
foo.#{method} { |x| [x, x * 2] }.to_set
'''
corrected = '''
foo.to_set { |x| [x, x * 2] }
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 4
column_end = 39
message = "Pass a block to `to_set` instead of calling `#{method}.to_set`."

