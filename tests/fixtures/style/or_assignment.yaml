cop: Style/OrAssignment
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_orassignment_when_using_var_var_var_something_registers_an_offense_with_normal_variables
    source: |
      foo = foo ? foo : 'default'
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: Use the double pipe equals operator `||=` instead.
    corrected: |
      foo ||= 'default'

  - name: rubocop_cop_style_orassignment_when_using_var_var_var_something_registers_an_offense_with_instance_variables
    source: |
      ‹BASE›0‹/BASE›
      @foo = @foo ? @foo : 'default'
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Use the double pipe equals operator `||=` instead.
    corrected: |
      ‹BASE›0‹/BASE›
      @foo ||= 'default'

