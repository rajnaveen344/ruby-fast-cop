cop: Style/CollectionQuerying
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_positive
    source: |
      x.count.positive?
    offenses:
      - line: 1
        column_start: 2
        column_end: 17
        message: Use `any?` instead.
    corrected: |
      x.any?

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_multiline_count_positive
    source: |
      x
        .count
        .positive?
    offenses:
      - line: 2
        column_start: 3
        column_end: 8
        message: Use `any?` instead.
    corrected: |
      x
        .any?

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_positive
    source: |
      x.count(&:foo?).positive?
    offenses:
      - line: 1
        column_start: 2
        column_end: 25
        message: Use `any?` instead.
    corrected: |
      x.any?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_item_item_foo_positive
    source: |
      x.count { |item| item.foo? }.positive?
    offenses:
      - line: 1
        column_start: 2
        column_end: 38
        message: Use `any?` instead.
    corrected: |
      x.any? { |item| item.foo? }

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_1_foo_positive
    source: |
      x.count { _1.foo? }.positive?
    offenses:
      - line: 1
        column_start: 2
        column_end: 29
        message: Use `any?` instead.
    corrected: |
      x.any? { _1.foo? }

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_it_foo_positive
    source: |
      x.count { it.foo? }.positive?
    offenses:
      - line: 1
        column_start: 2
        column_end: 29
        message: Use `any?` instead.
    corrected: |
      x.any? { it.foo? }

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_positive
    source: |
      x&.count(&:foo?).positive?
    offenses:
      - line: 1
        column_start: 3
        column_end: 26
        message: Use `any?` instead.
    corrected: |
      x&.any?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_positive
    source: |
      x&.count.positive?
    offenses:
      - line: 1
        column_start: 3
        column_end: 18
        message: Use `any?` instead.
    corrected: |
      x&.any?

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_0
    source: |
      x.count(&:foo?) > 0
    offenses:
      - line: 1
        column_start: 2
        column_end: 19
        message: Use `any?` instead.
    corrected: |
      x.any?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_0
    source: |
      x.count(&:foo?) != 0
    offenses:
      - line: 1
        column_start: 2
        column_end: 20
        message: Use `any?` instead.
    corrected: |
      x.any?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_zero
    source: |
      x.count(&:foo?).zero?
    offenses:
      - line: 1
        column_start: 2
        column_end: 21
        message: Use `none?` instead.
    corrected: |
      x.none?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_0
    source: |
      x.count(&:foo?) == 0
    offenses:
      - line: 1
        column_start: 2
        column_end: 20
        message: Use `none?` instead.
    corrected: |
      x.none?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_registers_an_offense_for_count_foo_1
    source: |
      x.count(&:foo?) == 1
    offenses:
      - line: 1
        column_start: 2
        column_end: 20
        message: Use `one?` instead.
    corrected: |
      x.one?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_when_allcops_activesupportextensionsenabled_true_registers_an_offense_for_count_foo_1
    source: |
      x.count(&:foo?) > 1
    offenses:
      - line: 1
        column_start: 2
        column_end: 19
        message: Use `many?` instead.
    corrected: |
      x.many?(&:foo?)

  - name: rubocop_cop_style_collectionquerying_when_allcops_activesupportextensionsenabled_false_does_not_register_an_offense_for_count_foo_1
    source: |
      x.count(&:foo?) > 1
    offenses:
      []

  - name: rubocop_cop_style_collectionquerying_does_not_register_an_offense_for_count_foo_positive
    source: |
      x.count(foo).positive?
    offenses:
      []

  - name: rubocop_cop_style_collectionquerying_does_not_register_an_offense_for_count_foo_bar_positive
    source: |
      x.count(foo: bar).positive?
    offenses:
      []

  - name: rubocop_cop_style_collectionquerying_does_not_register_an_offense_for_count_positive
    source: |
      x.count&.positive?
    offenses:
      []

  - name: rubocop_cop_style_collectionquerying_does_not_register_an_offense_for_count
    source: |
      x.count
    offenses:
      []

  - name: rubocop_cop_style_collectionquerying_does_not_register_an_offense_when_count_does_not_have_a_receiver
    source: |
      count.positive?
    offenses:
      []
