cop = "Style/PreferredHashMethods"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylepreferredhashmethods_with_enforced_short_style_registers_an_offense_for_has_key_with_one_arg"
source = '''
o.has_key?(o)
'''
corrected = '''
o.key?(o)
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 10
message = "Use `Hash#key?` instead of `Hash#has_key?`."

[tests.config]
EnforcedStyle = "short"

[[tests]]
name = "rubocopcopstylepreferredhashmethods_with_enforced_short_style_accepts_has_key_with_no_args"
strip_trailing_newline = true
source = '''
o.has_key?
'''
offenses = []

[tests.config]
EnforcedStyle = "short"

