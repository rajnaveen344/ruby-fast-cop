cop = "Style/EachWithObject"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleeachwithobject_finds_inject_and_reduce_with_passed_in_and_returned_hash"
source = '''
[].inject({}) { |a, e| a }

[].reduce({}) do |a, e|
  a[e] = 1
  a[e] = 1
  a
end
'''
corrected = '''
[].each_with_object({}) { |e, a|  }

[].each_with_object({}) do |e, a|
  a[e] = 1
  a[e] = 1
end
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 9
message = "Use `each_with_object` instead of `inject`."

[[tests.offenses]]
line = 3
column_start = 3
column_end = 9
message = "Use `each_with_object` instead of `reduce`."

