cop = "Style/RedundantSortBy"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_redundantsortby_autocorrects_array_sort_by_x_x"
source = '''
array.sort_by { |x| x }
'''
corrected = '''
array.sort
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 23
message = "Use `sort` instead of `sort_by { |x| x }`."

