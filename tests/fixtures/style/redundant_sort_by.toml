cop = "Style/RedundantSortBy"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantsortby_autocorrects_arraysort_by__x_x_"
source = '''
array.sort_by { |x| x }
'''
corrected = '''
array.sort
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 23
message = "Use `sort` instead of `sort_by { |x| x }`."

