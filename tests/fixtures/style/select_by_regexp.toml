[[tests]]
name = "rubocopcopstyleselectbyregexp_when_ruby__34_behaves_like_regexp_match_with_itblocks_registers_an_offense_and_corrects_for_match"
ruby_version = ">= 3.4"
source = '''
array.select { it.match? /regexp/ }
'''
corrected = '''
array.grep(/regexp/)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 35
message = "Prefer `grep` to `select` with a regexp match."

