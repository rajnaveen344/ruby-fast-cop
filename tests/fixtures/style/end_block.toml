cop = "Style/EndBlock"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleendblock_reports_an_offense_and_corrects_end_block"
source = '''
END { test }
'''
corrected = '''
at_exit { test }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Avoid the use of `END` blocks. Use `Kernel#at_exit` instead."

[[tests]]
name = "rubocopcopstyleendblock_does_not_report_offenses_for_other_blocks"
source = '''
end_block { test }
'''
offenses = []
