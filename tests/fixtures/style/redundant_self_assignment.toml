cop = "Style/RedundantSelfAssignment"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantselfassignment_does_not_register_an_offense_when_lhs_and_receiver_are_different"
source = '''
foo = bar.concat(ary)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantselfassignment_does_not_register_an_offense_when_there_is_no_a_receiver"
source = '''
foo = concat(ary)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantselfassignment_does_not_register_an_offense_when_assigning_to_attribute_of_self"
source = '''
self.foo = foo.concat(ary)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantselfassignment_does_not_register_an_offense_when_assigning_to_attribute_of_self_with_safe_navigation"
source = '''
self.foo = foo&.concat(ary)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleredundantselfassignment_registers_an_offense_and_corrects_when_assigning_to_attribute_of_non_self"
source = '''
other.foo = other.foo.concat(ary)
'''
corrected = '''
other.foo.concat(ary)
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 11
message = "Redundant self assignment detected. Method `concat` modifies its receiver in place."

