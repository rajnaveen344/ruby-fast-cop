cop = "Style/RedundantConditional"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantconditional_registers_an_offense_for_ternary_with_boolean_results"
source = '''
x == y ? true : false
'''
corrected = '''
x == y
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "This conditional expression can just be replaced by `x == y`."

[[tests]]
name = "rubocopcopstyleredundantconditional_registers_an_offense_for_ternary_with_negated_boolean_results"
source = '''
x == y ? false : true
'''
corrected = '''
!(x == y)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "This conditional expression can just be replaced by `!(x == y)`."

[[tests]]
name = "rubocopcopstyleredundantconditional_allows_ternary_with_nonboolean_results"
strip_trailing_newline = true
source = '''
x == y ? 1 : 10
'''
offenses = []

