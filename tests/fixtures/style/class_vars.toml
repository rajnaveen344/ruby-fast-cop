cop = "Style/ClassVars"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleclassvars_registers_an_offense_for_class_variable_declaration"
source = '''
class TestClass; @@test = 10; end
'''

[[tests.offenses]]
line = 1
column_start = 17
column_end = 23
message = "Replace class var @@test with a class instance var."

[[tests]]
name = "rubocopcopstyleclassvars_registers_an_offense_for_class_variable_set_in_class"
source = '''
class TestClass
  class_variable_set(:@@test, 2)
end
'''

[[tests.offenses]]
line = 2
column_start = 21
column_end = 28
message = "Replace class var :@@test with a class instance var."

[[tests]]
name = "rubocopcopstyleclassvars_registers_an_offense_for_class_variable_set_on_class_receiver"
source = '''
class TestClass; end
TestClass.class_variable_set(:@@test, 42)
'''

[[tests.offenses]]
line = 2
column_start = 29
column_end = 36
message = "Replace class var :@@test with a class instance var."

[[tests]]
name = "rubocopcopstyleclassvars_does_not_register_an_offense_for_class_variable_usage"
strip_trailing_newline = true
source = '''
@@test.test(20)
'''
offenses = []

[[tests]]
name = "rubocopcopstyleclassvars_registers_no_offense_for_class_variable_set_without_arguments"
strip_trailing_newline = true
source = '''
class_variable_set
'''
offenses = []
