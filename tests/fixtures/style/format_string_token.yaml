  - name: rubocop_cop_style_formatstringtoken_when_enforced_style_is_annotated_registers_offenses_for_template_style
    source: |
      <<-HEREDOC
      foo %{annotated} + bar %{template}
      HEREDOC
    offenses:
      - line: 2
        column_start: 0
        column_end: 34
        message: Prefer annotated tokens [...]
    corrected: |
      <<-HEREDOC
      foo #{annotated} + bar #{template_to_annotated}
      HEREDOC
    config:
      MaxUnannotatedPlaceholdersAllowed: 0
      SupportedStyles: [annotated, template, unannotated]
      AllowedPatterns: allowed_patterns
      Mode: mode
      EnforcedStyle: enforced_style
      AllowedMethods: allowed_methods
    interpolated: true

  - name: rubocop_cop_style_formatstringtoken_when_enforced_style_is_annotated_supports_dynamic_string_with_interpolation
    source: |
      "a#{b}%{annotated} c#{d}%{template} e#{f}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 42
        message: Prefer annotated tokens [...]
    corrected: |
      "a#{b}#{annotated} c#{d}#{template_to_annotated} e#{f}"
    config:
      MaxUnannotatedPlaceholdersAllowed: 0
      SupportedStyles: [annotated, template, unannotated]
      AllowedPatterns: allowed_patterns
      Mode: mode
      EnforcedStyle: enforced_style
      AllowedMethods: allowed_methods
    interpolated: true

