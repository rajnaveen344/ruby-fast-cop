cop: Style/FormatStringToken
department: style
severity: convention
implemented: true

tests:
  - name: rubocop_cop_style_formatstringtoken_when_maxunannotatedplaceholdersallowed_is_1_does_not_register_offenses_for_single_unannotated
    source: |
      format('%#{token}', foo)
    offenses:
      []
    config:
      MaxUnannotatedPlaceholdersAllowed: 0
      SupportedStyles: [annotated, template, unannotated]
      AllowedPatterns: allowed_patterns
      Mode: mode
      EnforcedStyle: enforced_style
      AllowedMethods: allowed_methods
    interpolated: true

  - name: rubocop_cop_style_formatstringtoken_when_maxunannotatedplaceholdersallowed_is_1_registers_an_offense_for_dual_unannotated
    source: |
      format('%#{token} %s', foo, bar)
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Prefer [...]
      - line: 1
        column_start: 11
        column_end: 13
        message: Prefer [...]
    config:
      MaxUnannotatedPlaceholdersAllowed: 0
      SupportedStyles: [annotated, template, unannotated]
      AllowedPatterns: allowed_patterns
      Mode: mode
      EnforcedStyle: enforced_style
      AllowedMethods: allowed_methods
    interpolated: true

  - name: rubocop_cop_style_formatstringtoken_when_maxunannotatedplaceholdersallowed_is_1_does_not_register_offenses_for_dual_unannotated
    source: |
      format('%#{token} %s', foo, bar)
