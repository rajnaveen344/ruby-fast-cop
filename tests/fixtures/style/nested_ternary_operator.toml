cop = "Style/NestedTernaryOperator"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylenestedternaryoperator_registers_an_offense_and_corrects_for_a_nested_ternary_operator_expression"
source = '''
a ? (b ? b1 : b2) : a2
'''
corrected = '''
if a
b ? b1 : b2
else
a2
end
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 16
message = "Ternary operators must not be nested. Prefer `if` or `else` constructs instead."

[[tests]]
name = "rubocopcopstylenestedternaryoperator_registers_an_offense_and_corrects_for_a_nested_ternary_operator_expression_with_block"
source = '''
cond ? foo : bar(foo.a ? foo.b : foo) { |e, k| e.nil? ? nil : e[k] }
'''
corrected = '''
if cond
foo
else
bar(foo.a ? foo.b : foo) { |e, k| e.nil? ? nil : e[k] }
end
'''

[[tests.offenses]]
line = 1
column_start = 47
column_end = 66
message = "Ternary operators must not be nested. Prefer `if` or `else` constructs instead."

