cop: Style/Strip
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_strip_registers_an_offense_for_str_lstrip_rstrip
    source: |
      str.lstrip.rstrip
    offenses:
      - line: 1
        column_start: 4
        column_end: 17
        message: Use `strip` instead of `lstrip.rstrip`.
    corrected: |
      str.strip

  - name: rubocop_cop_style_strip_registers_an_offense_for_str_lstrip_rstrip
    source: |
      str&.lstrip.rstrip
    offenses:
      - line: 1
        column_start: 5
        column_end: 18
        message: Use `strip` instead of `lstrip.rstrip`.
    corrected: |
      str&.strip

  - name: rubocop_cop_style_strip_registers_an_offense_for_str_lstrip_rstrip
    source: |
      str&.lstrip&.rstrip
    offenses:
      - line: 1
        column_start: 5
        column_end: 19
        message: Use `strip` instead of `lstrip&.rstrip`.
    corrected: |
      str&.strip

  - name: rubocop_cop_style_strip_registers_an_offense_for_str_rstrip_lstrip
    source: |
      str.rstrip.lstrip
    offenses:
      - line: 1
        column_start: 4
        column_end: 17
        message: Use `strip` instead of `rstrip.lstrip`.
    corrected: |
      str.strip

  - name: rubocop_cop_style_strip_registers_an_offense_for_str_rstrip_lstrip
    source: |
      str&.rstrip.lstrip
    offenses:
      - line: 1
        column_start: 5
        column_end: 18
        message: Use `strip` instead of `rstrip.lstrip`.
    corrected: |
      str&.strip

  - name: rubocop_cop_style_strip_registers_an_offense_for_str_rstrip_lstrip
    source: |
      str&.rstrip&.lstrip
    offenses:
      - line: 1
        column_start: 5
        column_end: 19
        message: Use `strip` instead of `rstrip&.lstrip`.
    corrected: |
      str&.strip
