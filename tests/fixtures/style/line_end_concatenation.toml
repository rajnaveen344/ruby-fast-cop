cop = "Style/LineEndConcatenation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylelineendconcatenation_registers_an_offense_for_string_concat_at_line_end"
source = '''
top = "test" +
"top"
'''
corrected = '''
top = "test" \
"top"
'''

[[tests.offenses]]
line = 1
column_start = 13
column_end = 14
message = "Use `\\` instead of `+` to concatenate multiline strings."

