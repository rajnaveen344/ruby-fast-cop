[[tests]]
name = "rubocopcopstylelineendconcatenation_registers_offenses_only_for_the_appropriate_lines_in_chained_concats"
source = '''
top = "test#{x}" + # comment
"foo" +
%(bar) +
"baz" +
"qux"
'''
corrected = '''
top = "test#{x}" + # comment
"foo" +
%(bar) +
"baz" \
"qux"
'''

