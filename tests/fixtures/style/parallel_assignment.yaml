cop: Style/ParallelAssignment
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_the_right_side_has_multiple_arrays
    source: |
      a, b, c = [1, 2], [3, 4], [5, 6]
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: Do not use parallel assignment.
    corrected: |
      a = [1, 2]
      b = [3, 4]
      c = [5, 6]

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_the_right_side_has_multiple_hashes
    source: |
      a, b, c = {a: 1}, {b: 2}, {c: 3}
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: Do not use parallel assignment.
    corrected: |
      a = {a: 1}
      b = {b: 2}
      c = {c: 3}

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_the_right_side_has_constants
    source: |
      a, b, c = CONSTANT1, CONSTANT2, CONSTANT3
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: Do not use parallel assignment.
    corrected: |
      a = CONSTANT1
      b = CONSTANT2
      c = CONSTANT3

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_the_right_side_has_mixed_expressions
    source: |
      a, b, c = [1, 2], {a: 1}, CONSTANT3
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: Do not use parallel assignment.
    corrected: |
      a = [1, 2]
      b = {a: 1}
      c = CONSTANT3

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_the_right_side_has_methods_with_without_blocks
    source: |
      a, b = foo { |a| puts a }, bar()
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: Do not use parallel assignment.
    corrected: |
      a = foo { |a| puts a }
      b = bar()

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_assignments_must_be_reordered_to_preserve_meaning
    source: |
      a, b = 1, a
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Do not use parallel assignment.
    corrected: |
      b = a
      a = 1

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_assigning_to_same_variables_in_same_order
    source: |
      a, b = a, b
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Do not use parallel assignment.
    corrected: |
      a = a
      b = b

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_right_hand_side_has_maps_with_blocks
    source: |
      a, b = foo.map { |e| e.id }, bar.map { |e| e.id }
    offenses:
      - line: 1
        column_start: 0
        column_end: 49
        message: Do not use parallel assignment.
    corrected: |
      a = foo.map { |e| e.id }
      b = bar.map { |e| e.id }

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_left_hand_side_ends_with_an_implicit_variable
    source: |
      array = [1, 2, 3]
      a, b, c, = 8, 9, array
    offenses:
      - line: 2
        column_start: 0
        column_end: 22
        message: Do not use parallel assignment.
    corrected: |
      array = [1, 2, 3]
      a = 8
      b = 9
      c = array

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_right_hand_side_has_namespaced_constants
    source: |
      a, b = Float::INFINITY, Float::INFINITY
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: Do not use parallel assignment.
    corrected: |
      a = Float::INFINITY
      b = Float::INFINITY

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_assigning_to_namespaced_constants
    source: |
      Float::INFINITY, Float::INFINITY = 1, 2
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: Do not use parallel assignment.
    corrected: |
      Float::INFINITY = 1
      Float::INFINITY = 2

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_with_indices
    source: |
      a[0], a[1] = a[1], a[2]
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Do not use parallel assignment.
    corrected: |
      a[0] = a[1]
      a[1] = a[2]

  - name: rubocop_cop_style_parallelassignment
    source: |
      obj.attr1, obj.attr2 = obj.attr3, obj.attr1
    offenses:
      - line: 1
        column_start: 0
        column_end: 43
        message: Do not use parallel assignment.
    corrected: |
      obj.attr2 = obj.attr1
      obj.attr1 = obj.attr3

  - name: rubocop_cop_style_parallelassignment
    source: |
      obj.attr1, ary[0] = ary[1], obj.attr1
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: Do not use parallel assignment.
    corrected: |
      ary[0] = obj.attr1
      obj.attr1 = ary[1]

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_with_indices_of_different_variables
    source: |
      a[0], a[1] = a[1], b[0]
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Do not use parallel assignment.
    corrected: |
      a[0] = a[1]
      a[1] = b[0]

  - name: rubocop_cop_style_parallelassignment_registers_an_offense_when_a_lambda_with_parallel_assignment_is_used_on_the_rhs
    source: |
      a, b = x, -> { a, b = x, y }
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Do not use parallel assignment.
    corrected: |
      a = x
      b = -> { a, b = x, y }

