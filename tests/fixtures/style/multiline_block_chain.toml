cop = "Style/MultilineBlockChain"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemultilineblockchain_accepts_a_chain_of_blocks_spanning_one_line"
source = '''
a { b }.c { d }
w do x end.y do z end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemultilineblockchain_accepts_a_multiline_block_chained_with_calls_on_one_line"
source = '''
a do
  b
end.c.d
'''
offenses = []

[[tests]]
name = "rubocopcopstylemultilineblockchain_accepts_a_chain_of_calls_followed_by_a_multiline_block"
source = '''
a1.a2.a3 do
  b
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemultilineblockchain_with_multiline_block_chaining_registers_an_offense_for_a_simple_case"
source = '''
a do
  b
end.c do
  d
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 5
message = "Avoid multi-line chains of blocks."

