cop: Style/SymbolLiteral
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_symbolliteral_registers_an_offense_for_word_line_symbols_using_string_syntax
    source: |
      x = { :"test" => 0, :"other" => 1 }
    offenses:
      - line: 1
        column_start: 20
        column_end: 28
        message: Do not use strings for word-like symbol literals.
      - line: 1
        column_start: 6
        column_end: 13
        message: Do not use strings for word-like symbol literals.
    corrected: |
      x = { :test => 0, :other => 1 }

  - name: rubocop_cop_style_symbolliteral_accepts_string_syntax_when_symbols_have_whitespaces_in_them
    source: |
      x = { :"t o" => 0 }
    offenses:
      []

  - name: rubocop_cop_style_symbolliteral_accepts_string_syntax_when_symbols_have_special_chars_in_them
    source: |
      x = { :"\tab" => 1 }
    offenses:
      []

  - name: rubocop_cop_style_symbolliteral_accepts_string_syntax_when_symbol_start_with_a_digit
    source: |
      x = { :"1" => 1 }
    offenses:
      []
