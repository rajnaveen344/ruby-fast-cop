cop = "Style/NumberedParameters"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenumberedparameters__ruby_27_enforcedstyle_allow_single_line_registers_an_offense_when_using_numbered_parameters_with_multiline_blocks"
source = '''
collection.each do
  puts _1
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 18
message = "Avoid using numbered parameters for multi-line blocks."

[tests.config]
EnforcedStyle = "allow_single_line"

[[tests]]
name = "rubocopcopstylenumberedparameters__ruby_27_enforcedstyle_allow_single_line_registers_no_offense_when_using_numbered_parameters_with_multiline_method_chain"
source = '''
collection.each
          .foo { puts _1 }
'''
offenses = []

[tests.config]
EnforcedStyle = "allow_single_line"

[[tests]]
name = "rubocopcopstylenumberedparameters__ruby_27_enforcedstyle_allow_single_line_does_not_register_an_offense_when_using_numbered_parameters_with_singleline_blocks"
source = '''
collection.each { puts _1 }
'''
offenses = []

[tests.config]
EnforcedStyle = "allow_single_line"

[[tests]]
name = "rubocopcopstylenumberedparameters__ruby_27_enforcedstyle_disallow_does_an_offense_when_using_numbered_parameters_even_with_singleline_blocks"
source = '''
collection.each { puts _1 }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 27
message = "Avoid using numbered parameters."

[tests.config]
EnforcedStyle = "disallow"
