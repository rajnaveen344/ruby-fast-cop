cop = "Style/TrailingCommaInBlockArgs"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletrailingcommainblockargs_curly_brace_block_format_registers_an_offense_when_a_trailing_comma_is_not_needed"
source = '''
test { |a, b,| a + b }
'''
corrected = '''
test { |a, b| a + b }
'''

[[tests.offenses]]
line = 1
column_start = 12
column_end = 13
message = "Useless trailing comma present in block arguments."

