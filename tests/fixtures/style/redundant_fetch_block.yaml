cop: Style/RedundantFetchBlock
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_integer_in_the_block
    source: |
      hash.fetch(:key) { 5 }
    offenses:
      - line: 1
        column_start: 5
        column_end: 22
        message: "Use `fetch(:key, 5)` instead of `fetch(:key) { 5 }`."
    corrected: |
      hash.fetch(:key, 5)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_integer_in_the_block
    source: |
      hash&.fetch(:key) { 5 }
    offenses:
      - line: 1
        column_start: 6
        column_end: 23
        message: "Use `fetch(:key, 5)` instead of `fetch(:key) { 5 }`."
    corrected: |
      hash&.fetch(:key, 5)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_float_in_the_block
    source: |
      hash.fetch(:key) { 2.5 }
    offenses:
      - line: 1
        column_start: 5
        column_end: 24
        message: "Use `fetch(:key, 2.5)` instead of `fetch(:key) { 2.5 }`."
    corrected: |
      hash.fetch(:key, 2.5)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_symbol_in_the_block
    source: |
      hash.fetch(:key) { :value }
    offenses:
      - line: 1
        column_start: 5
        column_end: 27
        message: "Use `fetch(:key, :value)` instead of `fetch(:key) { :value }`."
    corrected: |
      hash.fetch(:key, :value)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_rational_in_the_block
    source: |
      hash.fetch(:key) { 2.0r }
    offenses:
      - line: 1
        column_start: 5
        column_end: 25
        message: "Use `fetch(:key, 2.0r)` instead of `fetch(:key) { 2.0r }`."
    corrected: |
      hash.fetch(:key, 2.0r)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_complex_in_the_block
    source: |
      hash.fetch(:key) { 1i }
    offenses:
      - line: 1
        column_start: 5
        column_end: 23
        message: "Use `fetch(:key, 1i)` instead of `fetch(:key) { 1i }`."
    corrected: |
      hash.fetch(:key, 1i)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_empty_block
    source: |
      hash.fetch(:key) {}
    offenses:
      - line: 1
        column_start: 5
        column_end: 19
        message: "Use `fetch(:key, nil)` instead of `fetch(:key) {}`."
    corrected: |
      hash.fetch(:key, nil)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_constant_in_the_block
    source: |
      hash.fetch(:key) { CONSTANT }
    offenses:
      - line: 1
        column_start: 5
        column_end: 29
        message: "Use `fetch(:key, CONSTANT)` instead of `fetch(:key) { CONSTANT }`."
    corrected: |
      hash.fetch(:key, CONSTANT)

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_registers_an_offense_and_corrects_when_using_fetch_with_string_in_the_block_and_strings_are_frozen
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      hash.fetch(:key) { 'value' }
    offenses:
      - line: 2
        column_start: 5
        column_end: 28
        message: "Use `fetch(:key, 'value')` instead of `fetch(:key) { 'value' }`."
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      hash.fetch(:key, 'value')

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_does_not_register_an_offense_when_using_fetch_with_string_in_the_block_and_strings_are_not_frozen
    source: |
      hash.fetch(:key) { 'value' }
    offenses:
      []

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_does_not_register_an_offense_when_using_fetch_with_argument_fallback
    source: |
      hash.fetch(:key, :value)
    offenses:
      []

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_does_not_register_an_offense_when_using_fetch_with_interpolated_symbol_in_the_block
    source: |
      hash.fetch(:key) { :"value_#{value}" }
    offenses:
      []

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_does_not_register_an_offense_when_using_fetch_with_an_argument_in_the_block
    source: |
      hash.fetch(:key) { |k| "missing-#{k}" }
    offenses:
      []

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_true_does_not_register_an_offense_when_using_fetch_with_rails_cache
    source: |
      Rails.cache.fetch(:key) { :value }
    offenses:
      []

  - name: rubocop_cop_style_redundantfetchblock_with_safeforconstants_false_does_not_register_an_offense_when_using_fetch_with_constant_in_the_block
    source: |
      hash.fetch(:key) { CONSTANT }
    offenses:
      []
