cop = "Style/SingleLineDoEndBlock"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end"
source = '''
foo do bar end
'''
corrected = '''
foo do
 bar#{' '}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Prefer multiline `do`...`end` block."

