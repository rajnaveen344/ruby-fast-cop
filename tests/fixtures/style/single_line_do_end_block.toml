cop = "Style/SingleLineDoEndBlock"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesinglelinedoendblock_registers_an_offense_when_using_single_line_doend"
source = '''
foo do bar end
'''
corrected = '''
foo do
 bar 
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Prefer multiline `do`...`end` block."

