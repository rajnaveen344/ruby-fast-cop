cop = "Style/SuperWithArgsParentheses"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylesuperwithargsparentheses_registers_an_offense_when_using_super_without_parenthesized_arguments"
source = '''
super name, age
'''
corrected = '''
super(name, age)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Use parentheses for `super` with arguments."

[[tests]]
name = "rubocopcopstylesuperwithargsparentheses_does_not_register_an_offense_when_using_super_with_parenthesized_arguments"
source = '''
super(name, age)
'''
offenses = []

[[tests]]
name = "rubocopcopstylesuperwithargsparentheses_does_not_register_an_offense_when_using_super_without_arguments"
source = '''
super()
'''
offenses = []

[[tests]]
name = "rubocopcopstylesuperwithargsparentheses_does_not_register_an_offense_when_using_zero_arity_super"
source = '''
super
'''
offenses = []
