cop = "Style/AsciiComments"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleasciicomments_registers_an_offense_for_a_comment_with_nonascii_chars"
source = '''
# 这是什么？
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 7
message = "Use only ascii symbols in comments."

[tests.config]
AllowedChars = ["©"]

[[tests]]
name = "rubocopcopstyleasciicomments_registers_an_offense_for_comments_with_mixed_chars"
source = '''
# foo ∂ bar
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 7
message = "Use only ascii symbols in comments."

[tests.config]
AllowedChars = ["©"]

[[tests]]
name = "rubocopcopstyleasciicomments_accepts_comments_with_only_ascii_chars"
strip_trailing_newline = true
source = '''
# AZaz1@$%~,;*_`|
'''
offenses = []

[tests.config]
AllowedChars = ["©"]

[[tests]]
name = "rubocopcopstyleasciicomments_when_certain_nonascii_chars_are_allowed_accepts_comment_with_allowed_nonascii_chars"
strip_trailing_newline = true
source = '''
# foo ∂ bar
'''
offenses = []

[tests.config]
AllowedChars = ["∂"]

[[tests]]
name = "rubocopcopstyleasciicomments_when_certain_nonascii_chars_are_allowed_registers_an_offense_for_comments_with_nonallowed_nonascii_chars"
source = '''
# 这是什么？
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 7
message = "Use only ascii symbols in comments."

[tests.config]
AllowedChars = ["∂"]
