cop: Style/MapIntoArray
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_mapintoarray_registers_an_offense_and_corrects_when_using_each_with_to_build_an_array
    source: |
      dest = []
      src.each { |e| dest << e * 2 }
    offenses:
      - line: 2
        column_start: 0
        column_end: 30
        message: Use `map` instead of `each` to map elements into an array.
    corrected: |
      dest = src.map { |e| e * 2 }

