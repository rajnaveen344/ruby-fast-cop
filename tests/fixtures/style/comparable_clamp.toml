[[tests]]
name = "rubocopcopstylecomparableclamp_target_ruby_version__24_registers_and_corrects_an_offense_when_using_if_x__low__elsif_high__x__else"
ruby_version = ">= 2.4"
source = '''
if x < low
  low
elsif high < x
  high
else
  x
end
'''
corrected = '''
x.clamp(low, high)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Use `x.clamp(low, high)` instead of `if/elsif/else`."

