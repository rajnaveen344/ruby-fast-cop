cop = "Style/PercentLiteralDelimiters"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylepercentliteraldelimiters_default_override_allows_all_preferred_delimiters_to_be_set_with_one_key"
source = '''
%w[string] + %i[string]
'''
offenses = []

[tests.config]
PreferredDelimiters = { default = "[]", "%" = "()" }

[[tests]]
name = "rubocopcopstylepercentliteraldelimiters_default_override_allows_individual_preferred_delimiters_to_override_default"
source = '''
