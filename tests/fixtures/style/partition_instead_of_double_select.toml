cop = "Style/PartitionInsteadOfDoubleSelect"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylepartitioninsteadofdoubleselect_when_using_select_and_reject_with_same_receiver_and_block_registers_an_offense_and_corrects_select_followed_by_reject"
source = '''
positives = arr.select { |x| x > 0 }
negatives = arr.reject { |x| x > 0 }
'''
corrected = '''
positives, negatives = arr.partition { |x| x > 0 }
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 36
message = "Use `partition` instead of consecutive `select` and `reject` calls."

