cop: Style/Lambda
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_lambda_with_enforced_lambda_style_with_a_single_line_lambda_literal_with_arguments_registers_an_offense
    source: |
      f = ->(x) { x }
    offenses:
      - line: 1
        column_start: 4
        column_end: 6
        message: Use the `lambda` method for all lambdas.
    corrected: |
      f = lambda { |x| x }
    config:
      EnforcedStyle: $UNRESOLVED:lambda
    interpolated: true
    verified: false

