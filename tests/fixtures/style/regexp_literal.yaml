cop: Style/RegexpLiteral
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_regexpliteral_when_regex_contains_slashes_in_interpolation_ignores_the_slashes_that_do_not_belong_regex
    source: |
      x =~ /\s{#{x[/\s+/].length}}/
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:slashes
    interpolated: true
    verified: false

  - name: rubocop_cop_style_regexpliteral_r_regex_with_other_delimiters_than_curly_braces_registers_an_offense
    source: |
      ‹BASE›0‹/BASE›
      %r_ls_
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Use `//` around regular expression.
    config:
      EnforcedStyle: $UNRESOLVED:slashes
    interpolated: true
    verified: false

  - name: rubocop_cop_style_regexpliteral_when_percentliteraldelimiters_is_configured_with_brackets_respects_the_configuration_when_autocorrecting
    source: |
      /a/
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Use `%r` around regular expression.
    corrected: |
      ‹BASE›0‹/BASE›
      %r[a]
    config:
      EnforcedStyle: $UNRESOLVED:percent_r
    interpolated: true
    verified: false

  - name: rubocop_cop_style_regexpliteral_when_percentliteraldelimiters_is_configured_with_slashes_respects_the_configuration_when_autocorrecting
