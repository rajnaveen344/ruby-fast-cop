cop: Style/SignalException
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_signalexception_when_enforced_style_is_semantic_registers_an_offense_for_raise_in_begin_section
    source: |
      begin
        raise
      rescue Exception
        #do nothing
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 7
        message: Use `fail` instead of `raise` to signal exceptions.
    corrected: |
      begin
        fail
      rescue Exception
        #do nothing
      end
    config:
      EnforcedStyle: semantic

  - name: rubocop_cop_style_signalexception_when_enforced_style_is_semantic_registers_an_offense_for_raise_in_def_body
    source: |
      def test
