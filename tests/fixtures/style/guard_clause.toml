[[tests]]
name = "rubocopcopstyleguardclause_registers_an_offense_when_using__raise_in_then_branch"
source = '''
def func
  if something
    work || raise('message')
  else
    test
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 4
message = "Use a guard clause (`work || raise('message') if something`) instead of wrapping the code inside a conditional expression."

[tests.config]
AllowConsecutiveConditionals = false
MinBodyLength = 1

[tests.config."Layout/LineLength"]
Enabled = true
Max = 80

