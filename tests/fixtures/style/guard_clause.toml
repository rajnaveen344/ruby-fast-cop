cop = "Style/GuardClause"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleguardclause_does_not_report_an_offense_if_body_is_ifelsifend"
source = '''
def func
  if something
    a
  elsif something_else
    b
  end
end
'''
offenses = []

[tests.config]
AllowConsecutiveConditionals = false
MinBodyLength = 1

[tests.config."Layout/LineLength"]
Enabled = true
Max = 80

