cop = "Style/YodaExpression"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_yodaexpression_registers_an_offense_when_numeric_literal_on_left"
source = '''
1 + x
'''
corrected = '''
x + 1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Non-literal operand (`x`) should be first."

[tests.config]
SupportedOperators = ["*", "+"]

[[tests]]
name = "rubocop_cop_style_yodaexpression_registers_an_offense_when_constant_on_left"
source = '''
CONST + x
'''
corrected = '''
x + CONST
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 9
message = "Non-literal operand (`x`) should be first."

[tests.config]
SupportedOperators = ["*", "+"]

