cop: Style/RedundantArgument
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantargument_registers_an_offense_and_corrects_when_method_called_on_variable
    source: |
      foo.join('')
      foo.sum(0)
      exit(true)
      exit!(false)
      foo.to_i(10)
      foo.split(' ')
      foo.chomp("\n")
      foo.chomp!("\n")
    offenses:
      - line: 1
        column_start: 8
        column_end: 12
        message: "Argument '' is redundant because it is implied by default."
      - line: 2
        column_start: 7
        column_end: 10
        message: Argument 0 is redundant because it is implied by default.
      - line: 3
        column_start: 4
        column_end: 10
        message: Argument true is redundant because it is implied by default.
      - line: 4
        column_start: 5
        column_end: 12
        message: Argument false is redundant because it is implied by default.
      - line: 5
        column_start: 8
        column_end: 12
        message: Argument 10 is redundant because it is implied by default.
      - line: 6
        column_start: 9
        column_end: 14
        message: "Argument ' ' is redundant because it is implied by default."
      - line: 7
        column_start: 9
        column_end: 15
        message: 'Argument "\n" is redundant because it is implied by default.'
      - line: 8
        column_start: 10
        column_end: 16
        message: 'Argument "\n" is redundant because it is implied by default.'
    corrected: |
      foo.join
      foo.sum
      exit
      exit!
      foo.to_i
      foo.split
      foo.chomp
      foo.chomp!
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_registers_an_offense_and_corrects_when_safe_navigation_method_called_on_variable
    source: |
      foo&.join('')
      foo&.sum(0)
      foo&.split(' ')
      foo&.chomp("\n")
      foo&.chomp!("\n")
    offenses:
      - line: 1
        column_start: 9
        column_end: 13
        message: "Argument '' is redundant because it is implied by default."
      - line: 2
        column_start: 8
        column_end: 11
        message: Argument 0 is redundant because it is implied by default.
      - line: 3
        column_start: 10
        column_end: 15
        message: "Argument ' ' is redundant because it is implied by default."
      - line: 4
        column_start: 10
        column_end: 16
        message: 'Argument "\n" is redundant because it is implied by default.'
      - line: 5
        column_start: 11
        column_end: 17
        message: 'Argument "\n" is redundant because it is implied by default.'
    corrected: |
      foo&.join
      foo&.sum
      foo&.split
      foo&.chomp
      foo&.chomp!
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_registers_an_offense_and_corrects_when_method_called_without_parenthesis_on_variable
    source: |
      foo.join ''
      foo.split ' '
    offenses:
      - line: 1
        column_start: 8
        column_end: 11
        message: "Argument '' is redundant because it is implied by default."
      - line: 2
        column_start: 9
        column_end: 13
        message: "Argument ' ' is redundant because it is implied by default."
    corrected: |
      foo.join
      foo.split
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_registers_an_offense_and_corrects_when_method_called_on_literals
    source: |
      [1, 2, 3].join('')
      "first second".split(' ')
    offenses:
      - line: 1
        column_start: 14
        column_end: 18
        message: "Argument '' is redundant because it is implied by default."
      - line: 2
        column_start: 20
        column_end: 25
        message: "Argument ' ' is redundant because it is implied by default."
    corrected: |
      [1, 2, 3].join
      "first second".split
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_registers_an_offense_and_corrects_when_method_called_without_parenthesis_on_literals
    source: |
      [1, 2, 3].join ''
    offenses:
      - line: 1
        column_start: 14
        column_end: 17
        message: "Argument '' is redundant because it is implied by default."
    corrected: |
      [1, 2, 3].join
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_works_with_double_quoted_strings_when_configuration_is_single_quotes
    source: |
      foo.join("")
      "first second".split(" ")
    offenses:
      - line: 1
        column_start: 8
        column_end: 12
        message: "Argument \"\" is redundant because it is implied by default."
      - line: 2
        column_start: 20
        column_end: 25
        message: "Argument \" \" is redundant because it is implied by default."
    corrected: |
      foo.join
      "first second".split
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_does_not_register_an_offense_when_single_quoted_strings_for_newline_cntrl_character
    source: |
      foo.chomp('\n')
      foo.chomp!('\n')
    offenses:
      []
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_does_not_fail_on_invalid_encoding_of_string_literal
    source: |
      foo.chomp("\x82")
    offenses:
      []
    config:
      Methods: "{\n        'join' => '', 'sum' => 0, 'exit' => true, 'exit!' => false,\n        'to_i' => 10, 'split' => ' ', 'chomp' => \"\\n\", 'chomp!' => \"\\n\"\n      }"

  - name: rubocop_cop_style_redundantargument_with_invalid_encoding_of_string_literal_configured_as_default_argument_registers_an_offense
    source: |
      foo.chomp("\x82")
    offenses:
      - line: 1
        column_start: 9
        column_end: 17
        message: 'Argument "\x82" is redundant because it is implied by default.'
    config:
      Methods: "{\n          'chomp' => \"\\x82\"\n        }"

  - name: rubocop_cop_style_redundantargument_does_not_register_an_offense_when_method_called_with_no_arguments
    source: |
      foo.join
      "first second".split
    offenses:
      []
    config:
      Methods: "{\n          'chomp' => \"\\x82\"\n        }"

  - name: rubocop_cop_style_redundantargument_does_not_register_an_offense_when_method_called_with_more_than_one_arguments
    source: |
      foo.join('', 2)
      [1, 2, 3].split(" ", true, {})
    offenses:
      []
    config:
      Methods: "{\n          'chomp' => \"\\x82\"\n        }"

  - name: rubocop_cop_style_redundantargument_does_not_register_an_offense_when_method_called_with_different_argument
    source: |
      foo.join(',')
      foo.sum(42)
      foo.split(',')
    offenses:
      []
    config:
      Methods: "{\n          'chomp' => \"\\x82\"\n        }"

  - name: rubocop_cop_style_redundantargument_does_not_register_an_offense_when_method_called_with_no_receiver
    source: |
      join('')
      split(' ')
    offenses:
      []
    config:
      Methods: "{\n          'chomp' => \"\\x82\"\n        }"

  - name: rubocop_cop_style_redundantargument_non_builtin_method_registers_an_offense_and_corrects_with_configured_argument
    source: |
      A.foo(2)
    offenses:
      - line: 1
        column_start: 5
        column_end: 8
        message: Argument 2 is redundant because it is implied by default.
    corrected: |
      A.foo
    config:
      Methods: "{ 'foo' => 2 }"

  - name: rubocop_cop_style_redundantargument_non_builtin_method_does_not_register_an_offense_with_other_argument
    source: |
      A.foo(5)
    offenses:
      []
    config:
      Methods: "{ 'foo' => 2 }"
