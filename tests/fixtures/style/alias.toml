cop = "Style/Alias"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_alias_when_enforcedstyle_is_prefer_alias_method_registers_an_offense_for_alias_with_symbol_args"
source = '''
alias :ala :bala
'''
corrected = '''
alias_method :ala, :bala
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Use `alias_method` instead of `alias`."

[tests.config]
EnforcedStyle = "$UNRESOLVED:prefer_alias_method"

