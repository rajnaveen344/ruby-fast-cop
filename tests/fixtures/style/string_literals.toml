[[tests]]
name = "rubocop_cop_style_stringliterals_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_when_single_quotes_suffice"
source = '''
s = "abc"
x = "a\\b"
y ="\\b"
z = "a\\"
t = "{\"[\\\"*\\\"]\""
'''
corrected = '''
s = 'abc'
x = 'a\\b'
y ='\\b'
z = 'a\\'
t = '{"[\"*\"]"'
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 9
message = "Prefer single-quoted strings when you don't need string interpolation or special symbols."

[[tests.offenses]]
line = 2
column_start = 4
column_end = 10
message = "Prefer single-quoted strings when you don't need string interpolation or special symbols."

