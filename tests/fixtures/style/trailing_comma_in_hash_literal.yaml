cop: Style/TrailingCommaInHashLiteral
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_trailingcommainhashliteral_registers_an_offense_for_trailing_comma_in_a_literal
    source: |
      MAP = { a: 1001, b: 2020, c: 3333, }
    offenses:
      - line: 1
        column_start: 33
        column_end: 34
        message: "Avoid comma after the last item of a hash#{extra_info}."
    corrected: |
      MAP = { a: 1001, b: 2020, c: 3333 }
    interpolated: true

  - name: rubocop_cop_style_trailingcommainhashliteral_accepts_literal_without_trailing_comma
    source: |
      MAP = { a: 1001, b: 2020, c: 3333 }
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainhashliteral_accepts_single_element_literal_without_trailing_comma
    source: |
      MAP = { a: 10001 }
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainhashliteral_accepts_empty_literal
    source: |
      MAP = {}
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainhashliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_comma_single_line_lists_unless_each_item_i
    source: |
      , unless each item is on its own line
    offenses:
      []
    config:
      EnforcedStyleForMultiline: comma

  - name: rubocop_cop_style_trailingcommainhashliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_diff_comma_single_line_lists_unless_that_item_i
    source: |
      , unless that item immediately precedes a newline
    offenses:
      []
    config:
      EnforcedStyleForMultiline: diff_comma

  - name: rubocop_cop_style_trailingcommainhashliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_consistent_comma_single_line_lists_unless_items_are_s
    source: |
      , unless items are split onto multiple lines
    offenses:
      []
    config:
      EnforcedStyleForMultiline: consistent_comma

  - name: rubocop_cop_style_trailingcommainhashliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_no_comma_registers_an_offense_for_trailing_comma_in_literal
