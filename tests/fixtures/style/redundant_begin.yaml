      var ||= begin # inner comment 1
        # inner comment 2
        foo
        # inner comment 3
      end
    offenses:
      - line: 2
        column_start: 8
        column_end: 13
        message: Redundant `begin` block detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # outer comment
       # inner comment 1
        # inner comment 2
        var ||= foo
        # inner comment 3

