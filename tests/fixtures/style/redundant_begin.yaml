cop: Style/RedundantBegin
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantbegin_reports_an_offense_for_single_line_def_with_redundant_begin_block
    source: |
      def func; begin; x; y; rescue; z end; end
    offenses:
      - line: 1
        column_start: 10
        column_end: 15
        message: Redundant `begin` block detected.
    corrected: |
      def func; ; x; y; rescue; z ; end

  - name: rubocop_cop_style_redundantbegin_reports_an_offense_for_def_with_redundant_begin_block
    source: |
      def func
        begin
          ala
        rescue => e
          bala
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 7
        message: Redundant `begin` block detected.
    corrected: |
      def func
       #{trailing_whitespace}
          ala
        rescue => e
          bala
       #{trailing_whitespace}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_redundantbegin_reports_an_offense_for_defs_with_redundant_begin_block
    source: |
      def Test.func
        begin
          ala
        rescue => e
          bala
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 7
        message: Redundant `begin` block detected.
    corrected: |
      def Test.func
       #{trailing_whitespace}
          ala
        rescue => e
          bala
       #{trailing_whitespace}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_redundantbegin_accepts_a_def_with_required_begin_block
