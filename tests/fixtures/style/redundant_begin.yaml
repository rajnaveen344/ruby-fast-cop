  - name: rubocop_cop_style_redundantbegin_doesn_t_modify_spacing_when_autocorrecting
    source: |
      def method
        begin
          BlockA do |strategy|
            foo
          end
      
          BlockB do |portfolio|
            foo
          end
      
        rescue => e # some problem
          bar
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 7
        message: Redundant `begin` block detected.
    corrected: |
      def method
       #{trailing_whitespace}
          BlockA do |strategy|
            foo
          end
      
          BlockB do |portfolio|
            foo
          end
      
        rescue => e # some problem
          bar
       #{trailing_whitespace}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_redundantbegin_autocorrects_when_there_are_trailing_comments
    source: |
      def method
        begin # comment 1
          do_some_stuff
        rescue # comment 2
        end # comment 3
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 7
        message: Redundant `begin` block detected.
    corrected: |
      def method
         # comment 1
          do_some_stuff
        rescue # comment 2
         # comment 3
      end

