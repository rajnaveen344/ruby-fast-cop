puts 1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "Frozen string literal comment must be set to `true`."

[tests.config]
EnforcedStyle = "always_true"
Exclude = ["/private/tmp/rubocop-repo/**/*.arb"]

