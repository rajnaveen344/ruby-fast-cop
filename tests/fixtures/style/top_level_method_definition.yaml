cop: Style/TopLevelMethodDefinition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_toplevelmethoddefinition_registers_an_offense_top_level_methods
    source: |
      def foo; end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_registers_an_offense_top_level_class_methods
    source: |
      def self.foo; end
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_top_level_define_method_registers_an_offense_with_inline_block
    source: |
      define_method(:foo) { puts 1 }
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_top_level_define_method_ruby_2_7_registers_an_offense_with_inline_numblock
    source: |
      define_method(:foo) { puts _1 }
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: Do not define methods at the top-level.
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_toplevelmethoddefinition_top_level_define_method_ruby_3_4_registers_an_offense_with_inline_itblock
    source: |
      define_method(:foo) { puts it }
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: Do not define methods at the top-level.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_toplevelmethoddefinition_top_level_define_method_registers_an_offense_for_multi_line_block
    source: |
      define_method(:foo) do |x|
        puts 1
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_top_level_define_method_registers_an_offense_for_proc_argument
    source: |
      define_method(:foo, instance_method(:bar))
    offenses:
      - line: 1
        column_start: 0
        column_end: 42
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_registers_an_offense_when_defining_a_top_level_method_after_a_class_definition
    source: |
      class Foo
      end
      
      def foo; end
    offenses:
      - line: 4
        column_start: 0
        column_end: 12
        message: Do not define methods at the top-level.

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_using_module
    source: |
      module Foo
        def foo; end
      end
    offenses:
      []

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_using_class
    source: |
      class Foo
        def self.foo; end
      end
    offenses:
      []

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_using_struct
    source: |
      Foo = Struct.new do
        def foo; end
      end
    offenses:
      []

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_defined_within_arbitrary_block
    source: |
      Foo = types.each do |type|
        def foo(type)
          puts type
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_define_method_is_not_top_level
    source: |
      class Foo
        define_method(:a) { puts 1 }
      
        define_method(:b) do |x|
          puts x
        end
      
        define_method(:c, instance_method(:d))
      end
    offenses:
      []

  - name: rubocop_cop_style_toplevelmethoddefinition_does_not_register_an_offense_when_just_called_method_on_top_level
    source: |
      require_relative 'foo'
    offenses:
      []
