cop: Style/ArrayJoin
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_arrayjoin_registers_an_offense_for_an_array_followed_by_string
    source: |
      ‹BASE›0‹/BASE›
      %w(one two three) * ", "
    offenses:
      - line: 1
        column_start: 18
        column_end: 19
        message: "Favor `Array#join` over `Array#*`."
    corrected: |
      ‹BASE›0‹/BASE›
      %w(one two three).join(", ")

  - name: rubocop_cop_style_arrayjoin_autocorrects_to_join_when_there_are_no_spaces
    source: |
      ‹BASE›0‹/BASE›
      %w(one two three)*", "
    offenses:
      - line: 1
        column_start: 17
        column_end: 18
        message: "Favor `Array#join` over `Array#*`."
    corrected: |
      ‹BASE›0‹/BASE›
      %w(one two three).join(", ")

  - name: rubocop_cop_style_arrayjoin_autocorrects_to_join_when_setting_to_a_variable
    source: |
      foo = %w(one two three)*", "
    offenses:
      - line: 1
        column_start: 23
        column_end: 24
        message: "Favor `Array#join` over `Array#*`."
    corrected: |
      foo = %w(one two three).join(", ")

  - name: rubocop_cop_style_arrayjoin_does_not_register_an_offense_for_numbers
    source: |
      ‹BASE›0‹/BASE›
      %w(one two three) * 4
    offenses:
      []

  - name: rubocop_cop_style_arrayjoin_does_not_register_an_offense_for_ambiguous_cases
    source: |
      ‹BASE›0‹/BASE›
      %w(one two three) * test
    offenses:
      []
