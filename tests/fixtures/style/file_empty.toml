cop = "Style/FileEmpty"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylefileempty_target_ruby_version__24_registers_an_offense_for_filezero"
ruby_version = ">= 2.4"
source = '''
File.zero?('path/to/file')
'''
corrected = '''
File.empty?('path/to/file')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 26
message = "Use `File.empty?('path/to/file')` instead."

