cop = "Style/MixinGrouping"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_mixingrouping_when_configured_with_separated_style_when_using_include_registers_an_offense_for_several_mixins_in_one_call"
source = '''
class Foo
  include Bar, Qux
end
'''
corrected = '''
class Foo
  include Qux
  include Bar
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 18
message = "Put `include` mixins in separate statements."

[tests.config]
EnforcedStyle = "$UNRESOLVED:separated"

