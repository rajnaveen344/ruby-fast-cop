cop = "Style/SymbolArray"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesymbolarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_symbols"
source = '''
[:one, :two, :three]
'''
corrected = '''
%i(one two three)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Use `%i` or `%I` for an array of symbols."

[tests.config]
EnforcedStyle = "percent"
MinSize = 0

[tests.config."Style/PercentLiteralDelimiters"]
PreferredDelimiters = { default = "()" }

