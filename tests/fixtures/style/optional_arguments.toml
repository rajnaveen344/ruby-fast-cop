cop = "Style/OptionalArguments"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleoptionalarguments_registers_an_offense_when_an_optional_argument_is_followed_by_a_required_argument"
source = '''
def foo(a = 1, b)
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 13
message = "Optional arguments should appear at the end of the argument list."

[[tests]]
name = "rubocopcopstyleoptionalarguments_registers_an_offense_for_each_optional_argument_when_multiple_optional_arguments_are_followed_by_a_required_argument"
source = '''
def foo(a = 1, b = 2, c)
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 13
message = "Optional arguments should appear at the end of the argument list."

[[tests.offenses]]
line = 1
column_start = 15
column_end = 20
message = "Optional arguments should appear at the end of the argument list."

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_without_arguments"
source = '''
def foo
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_with_only_one_required_argument"
source = '''
def foo(a)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_with_only_required_arguments"
source = '''
def foo(a, b, c)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_with_only_one_optional_argument"
source = '''
def foo(a = 1)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_with_only_optional_arguments"
source = '''
def foo(a = 1, b = 2, c = 3)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_allows_methods_with_multiple_optional_arguments_at_the_end"
source = '''
def foo(a, b = 2, c = 3)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_named_params_with_default_values_allows_optional_arguments_before_an_optional_named_argument"
source = '''
def foo(a = 1, b: 2)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_named_params_required_params_registers_an_offense_for_optional_arguments_that_come_before_required_arguments_where_there_are_name_arguments"
ruby_version = ">= 2.1"
source = '''
def foo(a = 1, b, c:, d: 4)
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 13
message = "Optional arguments should appear at the end of the argument list."

[[tests]]
name = "rubocopcopstyleoptionalarguments_named_params_required_params_allows_optional_arguments_before_required_named_arguments"
ruby_version = ">= 2.1"
source = '''
def foo(a = 1, b:)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleoptionalarguments_named_params_required_params_allows_optional_arguments_to_come_before_a_mix_of_required_and_optional_named_argument"
ruby_version = ">= 2.1"
source = '''
def foo(a = 1, b:, c: 3)
end
'''
offenses = []
