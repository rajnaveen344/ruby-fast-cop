cop: Style/RedundantSortBy
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantsortby_autocorrects_array_sort_by_x_x
    source: |
      array.sort_by { |x| x }
    offenses:
      - line: 1
        column_start: 6
        column_end: 23
        message: Use `sort` instead of `sort_by { |x| x }`.
    corrected: |
      array.sort

  - name: rubocop_cop_style_redundantsortby_autocorrects_array_sort_by_x_x
    source: |
      array&.sort_by { |x| x }
    offenses:
      - line: 1
        column_start: 7
        column_end: 24
        message: Use `sort` instead of `sort_by { |x| x }`.
    corrected: |
      array&.sort

  - name: rubocop_cop_style_redundantsortby_ruby_2_7_autocorrects_array_sort_by_x_x
    source: |
      array.sort_by { _1 }
    offenses:
      - line: 1
        column_start: 6
        column_end: 20
        message: Use `sort` instead of `sort_by { _1 }`.
    corrected: |
      array.sort
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_redundantsortby_ruby_2_7_autocorrects_array_sort_by_x_x
    source: |
      array&.sort_by { _1 }
    offenses:
      - line: 1
        column_start: 7
        column_end: 21
        message: Use `sort` instead of `sort_by { _1 }`.
    corrected: |
      array&.sort
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_redundantsortby_ruby_3_4_autocorrects_array_sort_by_x_x
    source: |
      array.sort_by { it }
    offenses:
      - line: 1
        column_start: 6
        column_end: 20
        message: Use `sort` instead of `sort_by { it }`.
    corrected: |
      array.sort
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_redundantsortby_ruby_3_4_autocorrects_array_sort_by_x_x
    source: |
      array&.sort_by { it }
    offenses:
      - line: 1
        column_start: 7
        column_end: 21
        message: Use `sort` instead of `sort_by { it }`.
    corrected: |
      array&.sort
    ruby_version: ">= 3.4"

  - name: rubocop_cop_style_redundantsortby_autocorrects_array_sort_by_y_y
    source: |
      array.sort_by { |y| y }
    offenses:
      - line: 1
        column_start: 6
        column_end: 23
        message: Use `sort` instead of `sort_by { |y| y }`.
    corrected: |
      array.sort

  - name: rubocop_cop_style_redundantsortby_autocorrects_array_sort_by_do_x_x_end
    source: |
      array.sort_by do |x|
        x
      end
    offenses:
      - line: 1
        column_start: 6
        column_end: 20
        message: Use `sort` instead of `sort_by { |x| x }`.
    corrected: |
      array.sort
