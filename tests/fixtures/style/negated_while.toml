cop = "Style/NegatedWhile"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenegatedwhile_registers_an_offense_for_while_with_exclamation_point_condition"
source = '''
while !a_condition
  some_method
end
some_method while !a_condition
'''
corrected = '''
until a_condition
  some_method
end
some_method until a_condition
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 18
message = "Favor `until` over `while` for negative conditions."

[[tests.offenses]]
line = 4
column_start = 0
column_end = 30
message = "Favor `until` over `while` for negative conditions."

