cop = "Style/OrAssignment"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleorassignment_when_using_var__var__var__something_registers_an_offense_with_normal_variables"
source = '''
foo = foo ? foo : 'default'
'''
corrected = '''
foo ||= 'default'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 27
message = "Use the double pipe equals operator `||=` instead."

