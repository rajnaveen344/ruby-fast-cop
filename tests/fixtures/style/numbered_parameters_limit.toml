cop = "Style/NumberedParametersLimit"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylenumberedparameterslimit_with_ruby__27_does_not_register_an_offense_for_a_normal_block_with_too_many_parameters"
source = '''
foo { |a, b, c, d, e, f, g| do_something(a,b,c,d,e,f,g) }
'''
offenses = []

[tests.config]
Max = 2

[[tests]]
name = "rubocopcopstylenumberedparameterslimit_with_ruby__27_does_not_register_an_offense_for_a_numblock_with_fewer_than_max_parameters"
source = '''
foo { do_something(_1) }
'''
offenses = []

[tests.config]
Max = 2

[[tests]]
name = "rubocopcopstylenumberedparameterslimit_with_ruby__27_does_not_register_an_offense_for_a_numblock_with_exactly_max_parameters"
source = '''
foo { do_something(_1, _2) }
'''
offenses = []

[tests.config]
Max = 2

[[tests]]
name = "rubocopcopstylenumberedparameterslimit_with_ruby__27_sets_max_properly_for_autogenconfig"
source = '''
foo { do_something(_1, _2, _3, _4, _5) }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 40
message = "Avoid using more than 2 numbered parameters; 5 detected."

[tests.config]
Max = 2

[[tests]]
name = "rubocopcopstylenumberedparameterslimit_with_ruby__27_when_there_are_more_than_max_numbered_parameters_registers_an_offense_for_a_single_line_numblock"
