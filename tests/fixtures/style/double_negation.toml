cop = "Style/DoubleNegation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyledoublenegation_when_enforcedstyle_allowed_in_returns_registers_an_offense_and_corrects_for__when_not_return_location_and_using_unless"
source = '''
def foo?
  unless condition_foo?
    !!foo
    do_something
  end
end
'''
corrected = '''
def foo?
  unless condition_foo?
    !foo.nil?
    do_something
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 5
message = "Avoid the use of double negation (`!!`)."

[tests.config]
EnforcedStyle = "allowed_in_returns"

