cop = "Style/WhileUntilModifier"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylewhileuntilmodifier_behaves_like_condition_modifier_cop_for_a_multiline_while_accepts_it_if_single_line_would_not_fit_on_one_line"
source = '''
while aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
end
'''
offenses = []

[tests.config."Layout/LineLength"]
Max = 80

[[tests]]
name = "rubocopcopstylewhileuntilmodifier_behaves_like_condition_modifier_cop_for_a_multiline_while_accepts_it_if_single_line_would_not_fit_on_one_line_and_body_last_argument_is_a_hash_type_with_value_omission"
ruby_version = ">= 3.1"
source = '''
while aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb(a:)
end
'''
offenses = []

[tests.config."Layout/LineLength"]
Max = 80

[[tests]]
name = "rubocopcopstylewhileuntilmodifier_behaves_like_condition_modifier_cop_for_a_multiline_while_accepts_it_if_body_spans_more_than_one_line"
source = '''
while some_condition
  do_something
  do_something_else
end
'''
offenses = []

[tests.config."Layout/LineLength"]
Max = 80

[[tests]]
name = "rubocopcopstylewhileuntilmodifier_behaves_like_condition_modifier_cop_for_a_multiline_while_corrects_it_if_result_fits_in_one_line"
source = '''
while condition
  do_something
end
'''
corrected = '''
do_something while condition
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Favor modifier `while` usage when having a single-line body."

[tests.config."Layout/LineLength"]
Max = 80

[[tests]]
name = "rubocopcopstylewhileuntilmodifier_behaves_like_condition_modifier_cop_for_a_multiline_while_accepts_an_empty_body"
source = '''
while cond
end
'''
offenses = []

[tests.config."Layout/LineLength"]
Max = 80

