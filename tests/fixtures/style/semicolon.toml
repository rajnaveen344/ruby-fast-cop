cop = "Style/Semicolon"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesemicolon_registers_an_offense_for_a_single_expression"
source = '''
puts "this is a test";
'''
corrected = '''
puts "this is a test"
'''

[[tests.offenses]]
line = 1
column_start = 21
column_end = 22
message = "Do not use semicolons to terminate expressions."

[tests.config]
AllowAsExpressionSeparator = false

[[tests]]
name = "rubocopcopstylesemicolon_registers_an_offense_for_several_expressions"
