cop: Style/NilLambda
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_nillambda_block_lambda_registers_an_offense_when_returning_nil_implicitly
    source: |
      lambda do
        nil
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      lambda do
      end

  - name: rubocop_cop_style_nillambda_block_lambda_registers_an_offense_when_returning_nil_with_return
    source: |
      lambda do
        return nil
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      lambda do
      end

  - name: rubocop_cop_style_nillambda_block_lambda_registers_an_offense_when_returning_nil_with_break
    source: |
      lambda do
        break nil
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      lambda do
      end

  - name: rubocop_cop_style_nillambda_block_lambda_registers_an_offense_when_returning_nil_with_next
    source: |
      lambda do
        next nil
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      lambda do
      end

  - name: rubocop_cop_style_nillambda_block_lambda_does_not_register_an_offense_when_not_returning_nil
    source: |
      lambda do
        6
      end
    offenses:
      []

  - name: rubocop_cop_style_nillambda_block_lambda_does_not_register_an_offense_when_doing_more_than_returning_nil
    source: |
      lambda do |x|
        x ? x.method : nil
      end
    offenses:
      []

  - name: rubocop_cop_style_nillambda_block_lambda_does_not_remove_block_params_or_change_spacing
    source: |
      fn = lambda do |x|
             nil
           end
    offenses:
      - line: 1
        column_start: 5
        column_end: 18
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      fn = lambda do |x|
           end

  - name: rubocop_cop_style_nillambda_block_lambda_properly_corrects_single_line
    source: |
      lambda { nil }
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Use an empty lambda instead of always returning nil.
    corrected: |
      lambda {}

