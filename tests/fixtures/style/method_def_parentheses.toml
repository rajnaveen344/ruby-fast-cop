cop = "Style/MethodDefParentheses"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemethoddefparentheses_require_parentheses_reports_an_offense_for_def_with_parameters_but_no_parens"
source = '''
def func a, b
end
'''
corrected = '''
def func(a, b)
end
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 13
message = "Use def with parentheses when there are parameters."

[tests.config]
EnforcedStyle = "require_parentheses"

[[tests]]
name = "rubocopcopstylemethoddefparentheses_require_parentheses_reports_an_offense_for_correct__opposite"
source = '''
def func(a, b)
end
def func a, b
end
'''
corrected = '''
def func(a, b)
end
def func(a, b)
end
'''

[[tests.offenses]]
line = 3
column_start = 9
column_end = 13
message = "Use def with parentheses when there are parameters."

[tests.config]
EnforcedStyle = "require_parentheses"

