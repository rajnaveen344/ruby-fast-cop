cop: Style/RedundantHeredocDelimiterQuotes
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantheredocdelimiterquotes_registers_an_offense_when_using_the_redundant_heredoc_delimiter_single_quotes_with
    source: |
      do_something(<<~'EOS')
        no string interpolation style text
      EOS
    offenses:
      - line: 1
        column_start: 13
        column_end: 21
        message: Remove the redundant heredoc delimiter quotes, use `<<~EOS` instead.
    corrected: |
      do_something(<<~EOS)
        no string interpolation style text
      EOS

  - name: rubocop_cop_style_redundantheredocdelimiterquotes_registers_an_offense_when_using_the_redundant_heredoc_delimiter_single_quotes_with
    source: |
      do_something(<<-'EOS')
        no string interpolation style text
      EOS
    offenses:
      - line: 1
        column_start: 13
        column_end: 21
        message: Remove the redundant heredoc delimiter quotes, use `<<-EOS` instead.
    corrected: |
      do_something(<<-EOS)
        no string interpolation style text
      EOS

  - name: rubocop_cop_style_redundantheredocdelimiterquotes_registers_an_offense_when_using_the_redundant_heredoc_delimiter_single_quotes_with
    source: |
      do_something(<<'EOS')
        no string interpolation style text
      EOS
    offenses:
      - line: 1
        column_start: 13
        column_end: 20
        message: Remove the redundant heredoc delimiter quotes, use `<<EOS` instead.
    corrected: |
      do_something(<<EOS)
        no string interpolation style text
      EOS

