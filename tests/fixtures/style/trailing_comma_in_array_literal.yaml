      EnforcedStyleForMultiline: comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_comma
    source: |
      VALUES = [
                 1001, 2020,
                 3333,
               ]
    offenses:
      - line: 3
        column_start: 15
        column_end: 16
        message: Avoid comma after the last item of an array, unless each item is on its own line.
    corrected: |
      VALUES = [
                 1001, 2020,
                 3333
               ]
    config:
      EnforcedStyleForMultiline: comma

