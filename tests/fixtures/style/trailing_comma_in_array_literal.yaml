cop: Style/TrailingCommaInArrayLiteral
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_trailingcommainarrayliteral_registers_an_offense_for_trailing_comma
    source: |
      VALUES = [1001, 2020, 3333, ]
    offenses:
      - line: 1
        column_start: 26
        column_end: 27
        message: "Avoid comma after the last item of an array#{extra_info}."
    corrected: |
      VALUES = [1001, 2020, 3333 ]
    interpolated: true

  - name: rubocop_cop_style_trailingcommainarrayliteral_accepts_literal_without_trailing_comma
    source: |
      VALUES = [1001, 2020, 3333]
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainarrayliteral_accepts_single_element_literal_without_trailing_comma
    source: |
      VALUES = [1001]
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainarrayliteral_accepts_empty_literal
    source: |
      VALUES = []
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainarrayliteral_accepts_rescue_clause
    source: |
      begin
        do_something
      rescue RuntimeError
      end
    offenses:
      []

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_comma_single_line_lists_unless_each_item_i
    source: |
      , unless each item is on its own line
    offenses:
      []
    config:
      EnforcedStyleForMultiline: comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_diff_comma_single_line_lists_unless_that_item_i
    source: |
      , unless that item immediately precedes a newline
    offenses:
      []
    config:
      EnforcedStyleForMultiline: diff_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_single_line_list_of_values_when_enforcedstyleformultiline_is_consistent_comma_single_line_lists_unless_items_are_s
    source: |
      , unless items are split onto multiple lines
    offenses:
      []
    config:
      EnforcedStyleForMultiline: consistent_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_no_comma_registers_an_offense_for_trailing_comma
    source: |
      VALUES = [
                 1001,
                 2020,
                 3333,
               ]
    offenses:
      - line: 4
        column_start: 15
        column_end: 16
        message: Avoid comma after the last item of an array.
    corrected: |
      VALUES = [
                 1001,
                 2020,
                 3333
               ]
    config:
      EnforcedStyleForMultiline: no_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_no_comma_accepts_a_literal_with_no_trailing_comma
    source: |
      VALUES = [ 1001,
                 2020,
                 3333 ]
    offenses:
      []
    config:
      EnforcedStyleForMultiline: no_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_no_comma_accepts_heredoc_with_commas
    source: |
      [
        <<-TEXT, 123
          Something with a , in it
        TEXT
      ]
    offenses:
      []
    config:
      EnforcedStyleForMultiline: no_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_no_comma_autocorrects_unwanted_comma_where_heredoc_has_commas
    source: |
      [
        <<-TEXT, 123,
          Something with a , in it
        TEXT
      ]
    offenses:
      - line: 2
        column_start: 14
        column_end: 15
        message: Avoid comma after the last item of an array.
    corrected: |
      [
        <<-TEXT, 123
          Something with a , in it
        TEXT
      ]
    config:
      EnforcedStyleForMultiline: no_comma

  - name: rubocop_cop_style_trailingcommainarrayliteral_with_multi_line_list_of_values_when_enforcedstyleformultiline_is_comma_when_closing_bracket_is_on_same_line_as_last_value_accepts_literal_with_no_trailing_comma
    source: |
      VALUES = [
                 1001,
                 2020,
                 3333]
    offenses:
      []
    config:
