cop: Style/RedundantDoubleSplatHashBraces
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces
    source: |
      do_something(**{foo: bar, baz: qux})
    offenses:
      - line: 1
        column_start: 13
        column_end: 35
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_nested_double_splat_hash_braces
    source: |
      do_something(**{foo: bar, **{baz: qux}})
    offenses:
      - line: 1
        column_start: 26
        column_end: 38
        message: Remove the redundant double splat and braces, use keyword arguments directly.
      - line: 1
        column_start: 13
        column_end: 39
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_in_double_splat_hash_braces
    source: |
      do_something(**{foo: bar, **options})
    offenses:
      - line: 1
        column_start: 13
        column_end: 36
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, **options)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_method_call
    source: |
      do_something(**{foo: bar, baz: qux}.merge(options))
    offenses:
      - line: 1
        column_start: 13
        column_end: 50
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_method_call
    source: |
      do_something(**{foo: bar, baz: qux}.merge!(options))
    offenses:
      - line: 1
        column_start: 13
        column_end: 51
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_pair_arguments_method_call
    source: |
      do_something(**{foo: bar, baz: qux}.merge(x: y))
    offenses:
      - line: 1
        column_start: 13
        column_end: 47
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, x: y)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_safe_navigation_method_call
    source: |
      do_something(**{foo: bar, baz: qux}&.merge(options))
    offenses:
      - line: 1
        column_start: 13
        column_end: 51
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_method_call_twice
    source: |
      do_something(**{ foo: bar }.merge(options))
      do_something(**{ baz: qux }.merge(options))
    offenses:
      - line: 1
        column_start: 13
        column_end: 42
        message: Remove the redundant double splat and braces, use keyword arguments directly.
      - line: 2
        column_start: 13
        column_end: 42
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, **options)
      do_something(baz: qux, **options)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_multiple_arguments_method_call
    source: |
      do_something(**{foo: bar, baz: qux}.merge(options1, options2))
    offenses:
      - line: 1
        column_start: 13
        column_end: 61
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options1, **options2)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_merge_method_chain
    source: |
      do_something(**{foo: bar, baz: qux}.merge(options1, options2).merge(options3))
    offenses:
      - line: 1
        column_start: 13
        column_end: 77
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options1, **options2, **options3)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_with_complex_merge_method_chain
    source: |
      do_something(**{foo: bar, baz: qux}.merge(options1, options2)&.merge!(options3))
    offenses:
      - line: 1
        column_start: 13
        column_end: 79
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      do_something(foo: bar, baz: qux, **options1, **options2, **options3)

  - name: rubocop_cop_style_redundantdoublesplathashbraces_registers_an_offense_when_using_double_splat_hash_braces_inside_block
    source: |
      block do
        do_something(**{foo: bar, baz: qux})
      end
    offenses:
      - line: 2
        column_start: 15
        column_end: 37
        message: Remove the redundant double splat and braces, use keyword arguments directly.
    corrected: |
      block do
        do_something(foo: bar, baz: qux)
      end

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_keyword_arguments
    source: |
      do_something(foo: bar, baz: qux)
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_no_hash_brace
    source: |
      do_something(**options.merge(foo: bar, baz: qux))
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_method_call_for_no_hash_braced_double_splat_receiver
    source: |
      do_something(**options.merge({foo: bar}))
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_safe_navigation_method_call_for_no_hash_braced_double_splat_receiver
    source: |
      do_something(**options&.merge({foo: bar}))
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_method_call_for_parenthesized_no_hash_double_double_splat
    source: |
      do_something(**(options.merge(foo: bar)))
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_empty_double_splat_hash_braces_arguments
    source: |
      do_something(**{})
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_empty_hash_braces_arguments
    source: |
      do_something({})
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_hash_rocket_double_splat_hash_braces_arguments
    source: |
      do_something(**{foo => bar})
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_method_call_that_is_not_merge_for_double_splat_hash_braces_arguments
    source: |
      do_something(**{foo: bar}.invert)
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_hash_braces_with_merge_and_method_chain
    source: |
      do_something(**{foo: bar, baz: qux}.merge(options).compact_blank)
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_hash_braces_arguments
    source: |
      do_something({foo: bar, baz: qux})
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_variable
    source: |
      do_something(**h)
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_hash_literal
    source: |
      { a: a }
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_within_block_argument_containing_a_hash_literal_in_an_array_literal
    source: |
      do_something(**x.do_something { [foo: bar] })
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_within_block_argument_containing_a_nested_hash_literal
    source: |
      do_something(**x.do_something { {foo: {bar: baz}} })
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_within_numbered_block_argument_containing_a_nested_hash_literal
    source: |
      do_something(**x.do_something { {foo: {bar: _1}} })
    offenses:
      []

  - name: rubocop_cop_style_redundantdoublesplathashbraces_does_not_register_an_offense_when_using_double_splat_with_a_hash_literal_enclosed_in_parenthesized_ternary_operator
    source: |
      do_something(**(foo ? {bar: bar} : baz))
    offenses:
      []
