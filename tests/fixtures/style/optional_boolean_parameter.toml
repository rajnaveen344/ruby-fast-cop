cop = "Style/OptionalBooleanParameter"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleoptionalbooleanparameter_registers_an_offense_when_defining_method_with_optional_boolean_arg"
source = '''
def some_method(bar = false)
end
'''

[[tests.offenses]]
line = 1
column_start = 16
column_end = 27
message = "Prefer keyword arguments for arguments with a boolean default value; use `bar: false` instead of `bar = false`."

[tests.config]
AllowedMethods = []

[[tests]]
name = "rubocopcopstyleoptionalbooleanparameter_registers_an_offense_when_defining_method_with_optional_boolean_arg_that_has_no_space"
source = '''
def some_method(bar=false)
end
'''

[[tests.offenses]]
line = 1
column_start = 16
column_end = 25
message = "Prefer keyword arguments for arguments with a boolean default value; use `bar: false` instead of `bar=false`."

[tests.config]
AllowedMethods = []

