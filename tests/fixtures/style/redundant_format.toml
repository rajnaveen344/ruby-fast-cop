[[tests]]
name = "rubocop_cop_style_redundantformat_does_not_register_an_offense_when_called_with_no_arguments"
source = '''
#{method}
#{method}()
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_redundantformat_does_not_register_an_offense_when_called_with_additional_arguments"
source = '''
#{method}('%s', foo)
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_redundantformat_does_not_register_an_offense_when_called_with_a_splat"
source = '''
#{method}('%s', *args)
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_redundantformat_does_not_register_an_offense_when_called_with_a_double_splat"
