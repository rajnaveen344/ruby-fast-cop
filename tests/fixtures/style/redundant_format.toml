'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_redundantformat_does_not_register_an_offense_when_called_on_an_object"
source = '''
foo.#{method}('bar')
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_style_redundantformat_when_only_given_a_single_string_argument_registers_an_offense"
source = '''
%{method}('foo')
'''
corrected = '''
'foo'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 16
message = "Use `'foo'` directly instead of `%{method}`."

[[tests]]
name = "rubocop_cop_style_redundantformat_when_only_given_a_single_string_argument_registers_an_offense_when_the_argument_is_an_interpolated_string"
source = '''
%{method}("#{foo}")
'''
corrected = '''
"#{foo}"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 19
message = "Use `\"#{foo}\"` directly instead of `%{method}`."

[[tests]]
name = "rubocop_cop_style_redundantformat_when_only_given_a_single_string_argument_registers_an_offense_when_called_with_kernel"
source = '''
Kernel.%{method}('foo')
'''
corrected = '''
'foo'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 23
message = "Use `'foo'` directly instead of `%{method}`."

[[tests]]
name = "rubocop_cop_style_redundantformat_when_only_given_a_single_string_argument_registers_an_offense_when_called_with_kernel"
