'''
corrected = '''
'foo'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 25
message = "Use `'foo'` directly instead of `%{method}`."

[[tests]]
name = "rubocop_cop_style_redundantformat_when_only_given_a_single_string_argument_registers_an_offense_when_the_argument_is_a_control_character"
