  - name: rubocop_cop_style_comparableclamp_target_ruby_version_2_4_registers_and_corrects_an_offense_when_using_if_x_low_elsif_high_x_else
    source: |
      if x < low
        low
      elsif high < x
        high
      else
        x
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Use `x.clamp(low, high)` instead of `if/elsif/else`.
    corrected: |
      x.clamp(low, high)
    ruby_version: ">= 2.4"

