cop = "Style/RedundantInterpolationUnfreeze"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantinterpolationunfreeze_target_ruby_version__30_registers_an_offense_for_"
source = '''
+"#{foo} bar"
'''
corrected = '''
"#{foo} bar"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Don't unfreeze interpolated strings as they are already unfrozen."

[[tests]]
name = "rubocopcopstyleredundantinterpolationunfreeze_target_ruby_version__30_registers_an_offense_for__as_a_normal_method_call"
