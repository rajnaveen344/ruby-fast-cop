  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_array_registers_an_offense_when_assigning_w_array
    source: |
      FOO = %w(one@example.com two@example.com)
    offenses:
      - line: 1
        column_start: 6
        column_end: 41
        message: "Use `['one@example.com', 'two@example.com']` for an array of words."
    corrected: |
      FOO = ['one@example.com', 'two@example.com']
    config:
