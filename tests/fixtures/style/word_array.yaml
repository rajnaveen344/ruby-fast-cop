    corrected: |
      %w(one two three)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_autocorrects_an_array_with_one_element
    source: |
