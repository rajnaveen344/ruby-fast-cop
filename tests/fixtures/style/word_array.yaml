        ['one', 'One'],
        ['two', 'Two'],
        ['forty two', 'Forty Two']
      ]
    offenses:
      []
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_investigates_a_large_matrix_in_a_reasonable_amount_of_time
    source: |
