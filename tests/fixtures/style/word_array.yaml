  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_does_not_register_an_offense_for_array_starting_with_w
    source: |
      %w(one two three)
    offenses:
      []
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
