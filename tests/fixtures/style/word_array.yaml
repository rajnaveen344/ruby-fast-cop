      foo(%w(bar baz)) { qux }
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_does_not_register_offense_for_array_with_allowed_number_of_strings
    source: |
      ["one", "two", "three"]
    offenses:
      []
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_does_not_register_an_offense_for_an_array_with_comments_in_it
    source: |
      [
      "foo", # comment here
      "bar", # this thing was done because of a bug
      "baz" # do not delete this line
      ]
    offenses:
      []
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_an_array_with_comments_outside_of_it
    source: |
      [
      "foo",
      "bar",
      "baz"
