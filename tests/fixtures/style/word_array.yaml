        #{Array.new(999) do |n|
                      "['#{n}', 'simple_content'],"
                    end.join("\n  ")}
        ['100', 'complex content'],
      ]
    offenses:
      []
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent
