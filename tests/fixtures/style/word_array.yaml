cop: Style/WordArray
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_single_quoted_strings
    source: |
      ['one', 'two', 'three']
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(one two three)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_double_quoted_strings
    source: |
      ["one", "two", "three"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(one two three)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_strings_containing_hyphens
    source: |
      ['foo', 'bar', 'foo-bar']
    offenses:
      - line: 1
        column_start: 0
        column_end: 25
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(foo bar foo-bar)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_when_the_default_external_encoding_is_utf_8_registers_an_offense_for_arrays_of_unicode_word_characters
    source: |
      ["ВУЗ", "вуз", "%{wide}"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(ВУЗ вуз 中文网)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_when_the_default_external_encoding_is_us_ascii_registers_an_offense_for_arrays_of_unicode_word_characters
    source: |
      ["ВУЗ", "вуз", "%{wide}"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %W(\u0412\u0423\u0417 \u0432\u0443\u0437 \u4E2D\u6587\u7F51)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_with_character_constants
    source: |
      ["one", ?\n]
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %W(one \n)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_uses_w_when_autocorrecting_strings_with_embedded_newlines_and_tabs
    source: |
      ["one
      ", "hi	there"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %W(one\n hi\tthere)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_registers_an_offense_for_strings_with_newline_and_tab_escapes
    source: |
      ["one\n", "hi\tthere"]
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %W(one\n hi\tthere)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_does_not_register_an_offense_for_array_of_non_words
    source: |
