        column_start: 0
        column_end: 23
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(one two three)
      %w(a b c d)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

  - name: rubocop_cop_style_wordarray_when_enforcedstyle_is_percent_detects_when_the_cop_must_be_disabled_to_avoid_offenses
    source: |
      ['one', 'two', 'three']
      %w(a b)
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Use `%w` or `%W` for an array of words.
    corrected: |
      %w(one two three)
      %w(a b)
    config:
      MinSize: 0
      WordRegex: '/\A(?:\p{Word}|\p{Word}-\p{Word}|\n|\t)+\z/'
      EnforcedStyle: percent

