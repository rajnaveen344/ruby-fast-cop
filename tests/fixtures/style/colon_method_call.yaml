cop: Style/ColonMethodCall
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_colonmethodcall_registers_an_offense_for_instance_method_call
    source: |
      test::method_name
    offenses:
      - line: 1
        column_start: 4
        column_end: 6
        message: "Do not use `::` for method calls."
    corrected: |
      test.method_name

  - name: rubocop_cop_style_colonmethodcall_registers_an_offense_for_instance_method_call_with_arg
    source: |
      test::method_name(arg)
    offenses:
      - line: 1
        column_start: 4
        column_end: 6
        message: "Do not use `::` for method calls."
    corrected: |
      test.method_name(arg)

  - name: rubocop_cop_style_colonmethodcall_registers_an_offense_for_class_method_call
    source: |
      Class::method_name
    offenses:
      - line: 1
        column_start: 5
        column_end: 7
        message: "Do not use `::` for method calls."
    corrected: |
      Class.method_name

  - name: rubocop_cop_style_colonmethodcall_registers_an_offense_for_class_method_call_with_arg
    source: |
      Class::method_name(arg, arg2)
    offenses:
      - line: 1
        column_start: 5
        column_end: 7
        message: "Do not use `::` for method calls."
    corrected: |
      Class.method_name(arg, arg2)

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_for_constant_access
    source: |
      Tip::Top::SOME_CONST
    offenses:
      []

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_for_nested_class
    source: |
      Tip::Top.some_method
    offenses:
      []

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_for_op_methods
    source: |
      Tip::Top.some_method[3]
    offenses:
      []

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_when_for_constructor_methods
    source: |
      Tip::Top(some_arg)
    offenses:
      []

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_for_java_static_types
    source: |
      Java::int
    offenses:
      []

  - name: rubocop_cop_style_colonmethodcall_does_not_register_an_offense_for_java_package_namespaces
    source: |
      Java::com
    offenses:
      []
