cop = "Style/Dir"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyledir_when_using_expand_path_and_dirname_registers_an_offense"
source = '''
File.expand_path(File.dirname(__FILE__))
'''
corrected = '''
__dir__
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 40
message = "Use `__dir__` to get an absolute path to the current file's directory."

[[tests]]
name = "rubocopcopstyledir_when_using_expand_path_and_dirname_registers_an_offense_with_file"
source = '''
::File.expand_path(::File.dirname(__FILE__))
'''
corrected = '''
__dir__
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 44
message = "Use `__dir__` to get an absolute path to the current file's directory."

[[tests]]
name = "rubocopcopstyledir_when_using_dirname_and_realpath_registers_an_offense"
