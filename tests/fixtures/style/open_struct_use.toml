cop = "Style/OpenStructUse"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_openstruct_when_used_in_assignments_registers_an_offense"
source = '''
a = %{klass}.new(a: 42)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 23
message = "Avoid using `OpenStruct`;[...]"

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_openstruct_when_inheriting_from_it_via_registers_an_offense"
source = '''
class SubClass < %{klass}
end
'''

[[tests.offenses]]
line = 1
column_start = 17
column_end = 25
message = "Avoid using `OpenStruct`;[...]"

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_openstruct_when_inheriting_from_it_via_class_new_registers_an_offense"
source = '''
SubClass = Class.new(%{klass})
'''

[[tests.offenses]]
line = 1
column_start = 21
column_end = 30
message = "Avoid using `OpenStruct`;[...]"

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_custom_namespaced_openstruct_when_inheriting_from_it"
source = '''
class A < SomeNamespace::OpenStruct; end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_custom_namespaced_openstruct_when_defined_in_custom_namespace_when_class"
source = '''
module SomeNamespace
  class OpenStruct
  end
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_custom_namespaced_openstruct_when_defined_in_custom_namespace_when_module"
source = '''
module SomeNamespace
  module OpenStruct
  end
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_openstructuse_when_using_custom_namespaced_openstruct_when_used_in_assignments_registers_no_offense"
source = '''
a = SomeNamespace::OpenStruct.new
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_openstructuse_when_not_using_openstruct_registers_no_offense"
source = '''
a = 42
'''
offenses = []
