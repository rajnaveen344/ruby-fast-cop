cop = "Style/OpenStructUse"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleopenstructuse_when_using_openstruct_for_openstruct_when_used_in_assignments_registers_an_offense"
source = '''
a = OpenStruct.new(a: 42)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 14
message = "Avoid using `OpenStruct`; use `Struct`, `Hash`, a class or test doubles instead."

[tests.config]
References = ["https://docs.ruby-lang.org/en/3.0/OpenStruct.html#class-OpenStruct-label-Caveats"]

