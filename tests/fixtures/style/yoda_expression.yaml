cop: Style/YodaExpression
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_yodaexpression_registers_an_offense_when_numeric_literal_on_left
    source: |
      1 + x
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Non-literal operand (`x`) should be first.
    corrected: |
      x + 1
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_registers_an_offense_when_constant_on_left
    source: |
      CONST + x
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Non-literal operand (`x`) should be first.
    corrected: |
      x + CONST
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_registers_an_offense_and_corrects_when_using_complex_use_of_numeric_literals
    source: |
      2 + (1 + x)
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Non-literal operand (`(1 + x)`) should be first.
    corrected: |
      (x + 1) + 2
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_registers_an_offense_and_corrects_when_using_complex_use_of_constants
    source: |
      TWO + (ONE + x)
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Non-literal operand (`(ONE + x)`) should be first.
    corrected: |
      (x + ONE) + TWO
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_accepts_numeric_literal_on_the_right
    source: |
      x + 42
    offenses:
      []
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_accepts_constant_on_the_right
    source: |
      x + FORTY_TWO
    offenses:
      []
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_accepts_neither_numeric_literal_nor_constant
    source: |
      x + y
    offenses:
      []
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_accepts
    source: |
      1 | x
    offenses:
      []
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_registers_an_offense_and_corrects_when_using_suffix_form_of_operator_with_constant_receiver
    source: |
      1 + CONST.+(ary)
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Non-literal operand (`CONST.+(ary)`) should be first.
    corrected: |
      ary.+(CONST) + 1
    config:
      SupportedOperators: ["*", +]

  - name: rubocop_cop_style_yodaexpression_registers_an_offense_and_corrects_when_using_suffix_form_of_nullary_operator_with_constant_receiver
    source: |
      1 + CONST.*
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Non-literal operand (`CONST.*`) should be first.
    corrected: |
      CONST.* + 1
    config:
      SupportedOperators: ["*", +]
