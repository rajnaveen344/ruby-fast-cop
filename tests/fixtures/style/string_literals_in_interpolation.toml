cop = "Style/StringLiteralsInInterpolation"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_embedded_expression_in_a_string"
source = '''
"#{"A"}"
'''
corrected = '''
"#{'A'}"
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 6
message = "Prefer single-quoted strings inside interpolations."

[tests.config]
EnforcedStyle = "single_quotes"

[[tests]]
name = "rubocop_cop_style_stringliteralsininterpolation_configured_with_single_quotes_preferred_registers_an_offense_for_double_quotes_within_embedded_expression_in_a_symbol"
