cop: Style/HashSlice
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashslice_using_include_does_not_register_an_offense_when_using_select_and_calling_include_method_with_symbol_array
    source: |
      {foo: 1, bar: 2, baz: 3}.select { |k, v| !%i[foo bar].include?(k) }
    offenses:
      []

  - name: rubocop_cop_style_hashslice_using_include_registers_and_corrects_an_offense_when_using_reject_and_calling_include_method_with_symbol_array
    source: |
      {foo: 1, bar: 2, baz: 3}.reject { |k, v| !%i[foo bar].include?(k) }
    offenses:
      - line: 1
        column_start: 25
        column_end: 67
        message: "Use `slice(:foo, :bar)` instead."
    corrected: |
      {foo: 1, bar: 2, baz: 3}.slice(:foo, :bar)

  - name: rubocop_cop_style_hashslice_using_include_registers_and_corrects_an_offense_when_using_filter_and_calling_include_method_with_symbol_array
    source: |
      {foo: 1, bar: 2, baz: 3}.filter { |k, v| [:foo, :bar].include?(k) }
    offenses:
      - line: 1
        column_start: 25
        column_end: 67
        message: "Use `slice(:foo, :bar)` instead."
    corrected: |
      {foo: 1, bar: 2, baz: 3}.slice(:foo, :bar)

  - name: rubocop_cop_style_hashslice_using_include_registers_and_corrects_an_offense_when_using_select_and_calling_include_method_with_dynamic_symbol_array
    source: |
      {foo: 1, bar: 2, baz: 3}.select { |k, v| %I[#{foo} bar].include?(k) }
    offenses:
      - line: 1
        column_start: 25
        column_end: 69
        message: "Use `slice(:\"#{foo}\", :bar)` instead."
    corrected: |
      {foo: 1, bar: 2, baz: 3}.slice(:"#{foo}", :bar)

  - name: rubocop_cop_style_hashslice_using_include_registers_and_corrects_an_offense_when_using_select_and_calling_include_method_with_dynamic_string_array
    source: |
      {foo: 1, bar: 2, baz: 3}.select { |k, v| %W[#{foo} bar].include?(k) }
    offenses:
      - line: 1
        column_start: 25
        column_end: 69
        message: "Use `slice(\"#{foo}\", 'bar')` instead."
    corrected: |
      {foo: 1, bar: 2, baz: 3}.slice("#{foo}", 'bar')

  - name: rubocop_cop_style_hashslice_using_include_does_not_register_an_offense_when_using_select_and_calling_include_method_with_variable
    source: |
      array = %i[foo bar]
      {foo: 1, bar: 2, baz: 3}.select { |k, v| !array.include?(k) }
    offenses:
      []

  - name: rubocop_cop_style_hashslice_using_include_does_not_register_an_offense_when_using_select_and_calling_include_method_with_method_call
    source: |
      {foo: 1, bar: 2, baz: 3}.select { |k, v| !array.include?(k) }
    offenses:
      []

