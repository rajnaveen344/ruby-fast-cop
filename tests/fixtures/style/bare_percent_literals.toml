cop = "Style/BarePercentLiterals"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylebarepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_static_registers_an_offense_for_"
source = '''
%(hi)
'''
corrected = '''
%Q(hi)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 2
message = "Use `%Q` instead of `%`."

[tests.config]
EnforcedStyle = "percent_q"

[[tests]]
name = "rubocopcopstylebarepercentliterals_when_enforcedstyle_is_percent_q_and_strings_are_static_accepts_q"
source = '''
