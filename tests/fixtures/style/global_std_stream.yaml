cop: Style/GlobalStdStream
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_globalstdstream_registers_an_offense_and_corrects_when_using_std_stream_as_const
    source: |
      STDOUT.puts('hello')
      
      hash = { out: STDOUT, key: value }
      
      def m(out = STDOUT)
        out.puts('hello')
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Use `$stdout` instead of `STDOUT`.
      - line: 3
        column_start: 14
        column_end: 20
        message: Use `$stdout` instead of `STDOUT`.
      - line: 5
        column_start: 12
        column_end: 18
        message: Use `$stdout` instead of `STDOUT`.
    corrected: |
      $stdout.puts('hello')
      
      hash = { out: $stdout, key: value }
      
      def m(out = $stdout)
        out.puts('hello')
      end

  - name: rubocop_cop_style_globalstdstream_registers_an_offense_when_using_redundant_constant_base
    source: |
      ::STDOUT.puts('hello')
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Use `$stdout` instead of `STDOUT`.
    corrected: |
      $stdout.puts('hello')

  - name: rubocop_cop_style_globalstdstream_does_not_register_an_offense_when_using_non_std_stream_const
    source: |
      SOME_CONST.puts('hello')
    offenses:
      []

  - name: rubocop_cop_style_globalstdstream_does_not_register_an_offense_when_assigning_std_stream_const_to_std_stream_gvar
    source: |
      $stdin = STDIN
    offenses:
      []

  - name: rubocop_cop_style_globalstdstream_does_not_register_an_offense_when_assigning_other_const_to_std_stream_gvar
    source: |
      $stdin = SOME_CONST
    offenses:
      []

  - name: rubocop_cop_style_globalstdstream_does_not_register_an_offense_when_using_namespaced_constant
    source: |
      Foo::STDOUT.puts('hello')
      Foo::Bar::STDOUT.puts('hello')
      ::Foo::STDOUT.puts('hello')
      ::Foo::BaR::STDOUT.puts('hello')
      foo::STDOUT.puts('hello')
    offenses:
      []
