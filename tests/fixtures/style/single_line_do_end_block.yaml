cop: Style/SingleLineDoEndBlock
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end
    source: |
      foo do bar end
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do
       bar#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_no_body
    source: |
      foo do end
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Prefer multiline `do`...`end` block.
    corrected: |
      ‹BASE›0‹/BASE›
      foo do
      #{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_block_argument
    source: |
      foo do |arg| bar(arg) end
    offenses:
      - line: 1
        column_start: 0
        column_end: 25
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do |arg|
       bar(arg)#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_numbered_block_argument
    source: |
      foo do bar(_1) end
    offenses:
      - line: 1
        column_start: 0
        column_end: 18
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do
       bar(_1)#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_it_block_argument
    source: |
      foo do bar(it) end
    offenses:
      - line: 1
        column_start: 0
        column_end: 18
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do
       bar(it)#{' '}
      end
    ruby_version: ">= 3.4"
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_heredoc_body
    source: |
      foo do <<~EOS end
        text
      EOS
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do
       <<~EOS#{' '}
        text
      EOS
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_block
    source: |
      ->(arg) do foo arg end
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Prefer multiline `do`...`end` block.
    corrected: |
      ->(arg) do
       foo arg#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_registers_an_offense_when_using_single_line_do_end_with_lambda_block
    source: |
      lambda do |arg| foo(arg) end
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Prefer multiline `do`...`end` block.
    corrected: |
      lambda do |arg|
       foo(arg)#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_does_not_register_an_offense_when_using_multiline_do_end
    source: |
      foo do
        bar
      end
    offenses:
      []

  - name: rubocop_cop_style_singlelinedoendblock_does_not_register_an_offense_when_using_single_line
    source: |
      foo { bar }
    offenses:
      []

  - name: rubocop_cop_style_singlelinedoendblock_when_layout_linelength_is_disabled_registers_an_offense_when_using_single_line_do_end
    source: |
      foo do bar end
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer multiline `do`...`end` block.
    corrected: |
      foo do
       bar#{' '}
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_style_singlelinedoendblock_when_layout_redundantlinebreak_is_enabled_with_inspectblocks_true_when_a_block_fits_on_a_single_line_does_not_register_an_offense
    source: |
      a do b end
    offenses:
      []

  - name: rubocop_cop_style_singlelinedoendblock_when_layout_redundantlinebreak_is_enabled_with_inspectblocks_true_when_the_block_does_not_fit_on_a_single_line_registers_an_offense_and_corrects
    source: |
      aaaaaaaaaaaa do bbbbbbbbbbbbb end
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: Prefer multiline `do`...`end` block.
    corrected: |
      aaaaaaaaaaaa do
       bbbbbbbbbbbbb#{' '}
      end
    interpolated: true
    verified: false
