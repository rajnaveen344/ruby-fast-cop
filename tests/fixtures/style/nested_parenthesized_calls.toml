cop = "Style/NestedParenthesizedCalls"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenestedparenthesizedcalls_on_a_nonparenthesized_method_call_doesnt_register_an_offense"
source = '''
puts 1, 2
'''
offenses = []

[tests.config]
AllowedMethods = ["be"]

[[tests]]
name = "rubocopcopstylenestedparenthesizedcalls_on_a_method_call_with_no_arguments_doesnt_register_an_offense"
