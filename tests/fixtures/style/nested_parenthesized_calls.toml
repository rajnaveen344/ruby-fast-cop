'''
offenses = []

[tests.config]
AllowedMethods = ["be"]

[[tests]]
name = "rubocopcopstylenestedparenthesizedcalls_on_a_nonparenthesized_call_nested_in_a_parenthesized_one_with_a_single_argument_to_the_nested_call_registers_an_offense"
source = '''
puts(compute something)
'''
corrected = '''
puts(compute(something))
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 22
message = "Add parentheses to nested method call `compute something`."

[tests.config]
AllowedMethods = ["be"]

[[tests]]
name = "rubocopcopstylenestedparenthesizedcalls_on_a_nonparenthesized_call_nested_in_a_parenthesized_one_with_a_single_argument_to_the_nested_call_when_using_safe_navigation_operator_registers_an_offense"
source = '''
puts(receiver&.compute something)
'''
corrected = '''
puts(receiver&.compute(something))
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 32
message = "Add parentheses to nested method call `receiver&.compute something`."

[tests.config]
AllowedMethods = ["be"]

