cop = "Style/TopLevelMethodDefinition"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_registers_an_offense_toplevel_methods"
source = '''
def foo; end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 12
message = "Do not define methods at the top-level."

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_registers_an_offense_toplevel_class_methods"
source = '''
def self.foo; end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Do not define methods at the top-level."

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_registers_an_offense_when_defining_a_toplevel_method_after_a_class_definition"
source = '''
class Foo
end

def foo; end
'''

[[tests.offenses]]
line = 4
column_start = 0
column_end = 12
message = "Do not define methods at the top-level."

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_using_module"
source = '''
module Foo
  def foo; end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_using_class"
source = '''
class Foo
  def self.foo; end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_using_struct"
source = '''
Foo = Struct.new do
  def foo; end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_defined_within_arbitrary_block"
source = '''
Foo = types.each do |type|
  def foo(type)
    puts type
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_define_method_is_not_toplevel"
source = '''
class Foo
  define_method(:a) { puts 1 }

  define_method(:b) do |x|
    puts x
  end

  define_method(:c, instance_method(:d))
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyletoplevelmethoddefinition_does_not_register_an_offense_when_just_called_method_on_toplevel"
source = '''
