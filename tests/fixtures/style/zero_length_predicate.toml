[[tests]]
name = "rubocopcopstylezerolengthpredicate_with_arrays_registers_an_offense_for_arraylength__0"
source = '''
[1, 2, 3].length == 0
'''
corrected = '''
[1, 2, 3].empty?
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "Use `empty?` instead of `length == 0`."

