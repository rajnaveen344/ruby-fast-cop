cop = "Style/MapIntoArray"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemapintoarray_registers_an_offense_and_corrects_when_using_each_with__to_build_an_array"
source = '''
dest = []
src.each { |e| dest << e * 2 }
'''
corrected = '''
dest = src.map { |e| e * 2 }
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 30
message = "Use `map` instead of `each` to map elements into an array."

