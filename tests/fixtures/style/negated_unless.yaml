cop: Style/NegatedUnless
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_negatedunless_with_both_style_registers_an_offense_for_unless_with_exclamation_point_condition
    source: |
      unless !a_condition
        some_method
      end
      some_method unless !a_condition
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Favor `if` over `unless` for negative conditions.
      - line: 4
        column_start: 0
        column_end: 31
        message: Favor `if` over `unless` for negative conditions.
    corrected: |
      if a_condition
        some_method
      end
      some_method if a_condition

  - name: rubocop_cop_style_negatedunless_with_both_style_registers_an_offense_for_unless_with_not_condition
    source: |
      unless not a_condition
        some_method
      end
      some_method unless not a_condition
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Favor `if` over `unless` for negative conditions.
      - line: 4
        column_start: 0
        column_end: 34
        message: Favor `if` over `unless` for negative conditions.
    corrected: |
      if a_condition
        some_method
      end
      some_method if a_condition

  - name: rubocop_cop_style_negatedunless_with_both_style_accepts_an_unless_else_with_negative_condition
    source: |
      unless !a_condition
        some_method
      else
        something_else
      end
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_with_both_style_accepts_an_unless_where_only_part_of_the_condition_is_negated
    source: |
      unless !condition && another_condition
        some_method
      end
      unless not condition or another_condition
        some_method
      end
      some_method unless not condition or another_condition
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_with_both_style_accepts_an_unless_where_the_condition_is_doubly_negated
    source: |
      unless !!condition
        some_method
      end
      some_method unless !!condition
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_with_both_style_autocorrects_by_replacing_parenthesized_unless_not_with_if
    source: |
      something unless (!x.even?)
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: Favor `if` over `unless` for negative conditions.
    corrected: |
      something if (x.even?)

  - name: rubocop_cop_style_negatedunless_with_prefix_style_registers_an_offense_for_prefix
    source: |
      unless !foo
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Favor `if` over `unless` for negative conditions.
    corrected: |
      if foo
      end

  - name: rubocop_cop_style_negatedunless_with_prefix_style_does_not_register_an_offense_for_postfix
    source: |
      foo unless !bar
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_with_postfix_style_registers_an_offense_for_postfix
    source: |
      foo unless !bar
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Favor `if` over `unless` for negative conditions.
    corrected: |
      foo if bar

  - name: rubocop_cop_style_negatedunless_with_postfix_style_does_not_register_an_offense_for_prefix
    source: |
      unless !foo
      end
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_does_not_blow_up_for_ternary_ops
    source: |
      a ? b : c
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_does_not_blow_up_on_a_negated_ternary_operator
    source: |
      ‹BASE›0‹/BASE›
      !foo.empty? ? :bar : :baz
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_does_not_blow_up_for_empty_if_condition
    source: |
      if ()
      end
    offenses:
      []

  - name: rubocop_cop_style_negatedunless_does_not_blow_up_for_empty_unless_condition
    source: |
      unless ()
      end
    offenses:
      []
