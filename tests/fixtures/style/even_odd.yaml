cop: Style/EvenOdd
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_evenodd_converts_x_2_0_to_even
    source: |
      x % 2 == 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "Replace with `Integer#even?`."
    corrected: |
      x.even?

  - name: rubocop_cop_style_evenodd_converts_x_2_0_to_odd
    source: |
      x % 2 != 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "Replace with `Integer#odd?`."
    corrected: |
      x.odd?

  - name: rubocop_cop_style_evenodd_converts_x_2_0_to_even
    source: |
      (x % 2) == 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Replace with `Integer#even?`."
    corrected: |
      x.even?

  - name: rubocop_cop_style_evenodd_converts_x_2_0_to_odd
    source: |
      (x % 2) != 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Replace with `Integer#odd?`."
    corrected: |
      x.odd?

  - name: rubocop_cop_style_evenodd_converts_x_2_1_to_odd
    source: |
      x % 2 == 1
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "Replace with `Integer#odd?`."
    corrected: |
      x.odd?

  - name: rubocop_cop_style_evenodd_converts_x_2_1_to_even
    source: |
      x % 2 != 1
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "Replace with `Integer#even?`."
    corrected: |
      x.even?

  - name: rubocop_cop_style_evenodd_converts_x_2_1_to_odd
    source: |
      (x % 2) == 1
    offenses:
      - line: 1
        column_start: 0
