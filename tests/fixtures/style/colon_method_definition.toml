cop = "Style/ColonMethodDefinition"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylecolonmethoddefinition_accepts_a_class_method_defined_using_"
source = '''
class Foo
  def self.bar
    something
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylecolonmethoddefinition_using_self_registers_an_offense_for_a_class_method_defined_using_"
source = '''
class Foo
  def self::bar
    something
  end
end
'''
corrected = '''
class Foo
  def self.bar
    something
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 10
column_end = 12
message = "Do not use `::` for defining class methods."

[[tests]]
name = "rubocopcopstylecolonmethoddefinition_using_the_class_name_registers_an_offense_for_a_class_method_defined_using_"
source = '''
class Foo
  def Foo::bar
    something
  end
end
'''
corrected = '''
class Foo
  def Foo.bar
    something
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 9
column_end = 11
message = "Do not use `::` for defining class methods."
