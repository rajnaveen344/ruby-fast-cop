cop = "Style/MultilineIfModifier"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemultilineifmodifier_if_guard_clause_registers_an_offense"
source = '''
{
  result: run
} if cond
'''
corrected = '''
if cond
  {
    result: run
  }
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Favor a normal if-statement over a modifier clause in a multiline statement."

[[tests]]
name = "rubocopcopstylemultilineifmodifier_if_guard_clause_allows_a_one_liner"
source = '''
run if cond
'''
offenses = []

[[tests]]
name = "rubocopcopstylemultilineifmodifier_if_guard_clause_allows_a_multiline_condition"
source = '''
run if cond &&
       cond2
'''
offenses = []

[[tests]]
name = "rubocopcopstylemultilineifmodifier_if_guard_clause_registers_an_offense_when_indented"
source = '''
{
  result: run
} if cond
'''
base_indent = 2
corrected = '''
  if cond
    {
      result: run
    }
  end
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 3
message = "Favor a normal if-statement over a modifier clause in a multiline statement."

