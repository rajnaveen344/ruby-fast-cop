cop = "Style/ImplicitRuntimeError"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_registers_an_offense_for_raise_without_error_class"
source = '''
raise 'message'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Use `raise` with an explicit exception class and message, rather than just a message."

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_registers_an_offense_for_fail_without_error_class"
source = '''
fail 'message'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Use `fail` with an explicit exception class and message, rather than just a message."

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_registers_an_offense_for_raise_with_a_multiline_string"
source = '''
raise 'message' \
      '2nd line'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Use `raise` with an explicit exception class and message, rather than just a message."

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_registers_an_offense_for_fail_with_a_multiline_string"
source = '''
fail 'message' \
      '2nd line'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 16
message = "Use `fail` with an explicit exception class and message, rather than just a message."

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_does_not_register_an_offense_for_raise_with_an_error_class"
source = '''
raise StandardError, 'message'
'''
offenses = []

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_does_not_register_an_offense_for_fail_with_an_error_class"
source = '''
fail StandardError, 'message'
'''
offenses = []

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_does_not_register_an_offense_for_raise_without_arguments"
strip_trailing_newline = true
source = '''
raise
'''
offenses = []

[[tests]]
name = "rubocopcopstyleimplicitruntimeerror_does_not_register_an_offense_for_fail_without_arguments"
strip_trailing_newline = true
source = '''
fail
'''
offenses = []
