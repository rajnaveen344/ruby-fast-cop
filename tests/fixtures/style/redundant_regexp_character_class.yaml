cop: Style/RedundantRegexpCharacterClass
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantregexpcharacterclass_with_a_character_class_containing_a_single_character_registers_an_offense_and_corrects
    source: |
      foo = /[a]/
    offenses:
      - line: 1
        column_start: 7
        column_end: 10
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = /a/

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_multiple_character_classes_containing_single_characters_registers_an_offense_and_corrects
    source: |
      foo = /[a]b[c]d/
    offenses:
      - line: 1
        column_start: 7
        column_end: 10
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
      - line: 1
        column_start: 11
        column_end: 14
        message: Redundant single-element character class, `[c]` can be replaced with `c`.
    corrected: |
      foo = /abcd/

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_a_character_class_containing_a_single_character_inside_a_group_registers_an_offense_and_corrects
    source: |
      foo = /([a])/
    offenses:
      - line: 1
        column_start: 8
        column_end: 11
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = /(a)/

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_a_character_class_containing_a_single_character_before_quantifier_registers_an_offense_and_corrects
    source: |
      foo = /[a]+/
    offenses:
      - line: 1
        column_start: 7
        column_end: 10
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = /a+/

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_a_character_class_containing_a_single_character_before_n_m_quantifier_registers_an_offense_and_corrects
    source: |
      foo = /[a]{2,10}/
    offenses:
      - line: 1
        column_start: 7
        column_end: 10
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = /a{2,10}/

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_r_regexp_with_a_character_class_containing_a_single_character_registers_an_offense_and_corrects
    source: |
      foo = %r{[a]}
    offenses:
      - line: 1
        column_start: 9
        column_end: 12
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = %r{a}

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_r_regexp_with_multiple_character_classes_containing_single_characters_registers_an_offense_and_corrects
    source: |
      foo = %r{[a]b[c]d}
    offenses:
      - line: 1
        column_start: 9
        column_end: 12
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
      - line: 1
        column_start: 13
        column_end: 16
        message: Redundant single-element character class, `[c]` can be replaced with `c`.
    corrected: |
      foo = %r{abcd}

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_r_regexp_with_a_character_class_containing_a_single_character_inside_a_group_registers_an_offense_and_corrects
    source: |
      foo = %r{([a])}
    offenses:
      - line: 1
        column_start: 10
        column_end: 13
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = %r{(a)}

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_r_regexp_with_a_character_class_containing_a_single_character_before_quantifier_registers_an_offense_and_corrects
    source: |
      foo = %r{[a]+}
    offenses:
      - line: 1
        column_start: 9
        column_end: 12
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = %r{a+}

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_r_regexp_with_a_character_class_containing_a_single_character_before_n_m_quantifier_registers_an_offense_and_corrects
    source: |
      foo = %r{[a]{2,10}}
    offenses:
      - line: 1
        column_start: 9
        column_end: 12
        message: Redundant single-element character class, `[a]` can be replaced with `a`.
    corrected: |
      foo = %r{a{2,10}}

  - name: rubocop_cop_style_redundantregexpcharacterclass_with_a_character_class_containing_a_single_range_does_not_register_an_offense
    source: |
      foo = /[a-z]/
    offenses:
