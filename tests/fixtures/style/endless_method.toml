[[tests]]
name = "rubocopcopstyleendlessmethod_ruby__30_enforcedstyle_disallow_registers_an_offense_for_an_endless_method"
source = '''
def my_method() = x
'''
corrected = '''
def my_method
  x
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 19
message = "Avoid endless method definitions."

[tests.config]
EnforcedStyle = "disallow"

