cop: Style/IpAddresses
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_ipaddresses_does_not_register_an_offense_on_an_empty_string
    source: |
      ''
    offenses:
      []

  - name: rubocop_cop_style_ipaddresses_ipv4_registers_an_offense_for_a_valid_address
    source: |
      '255.255.255.255'
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv4_does_not_register_an_offense_for_an_invalid_address
    source: |
      "578.194.591.059"
    offenses:
      []

  - name: rubocop_cop_style_ipaddresses_ipv4_does_not_register_an_offense_for_an_address_inside_larger_text
    source: |
      "My IP is 192.168.1.1"
    offenses:
      []

  - name: rubocop_cop_style_ipaddresses_ipv6_registers_an_offense_for_a_valid_address
    source: |
      '2001:0db8:85a3:0000:0000:8a2e:0370:7334'
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv6_registers_an_offense_for_an_address_with_0s_collapsed
    source: |
      '2001:db8:85a3::8a2e:370:7334'
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv6_registers_an_offense_for_a_shortened_address
    source: |
      '2001:db8::1'
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv6_registers_an_offense_for_a_very_short_address
    source: |
      '1::'
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv6_registers_an_offense_for_the_loopback_address
    source: |
      '::1'
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Do not hardcode IP addresses.

  - name: rubocop_cop_style_ipaddresses_ipv6_does_not_register_an_offense_for_an_invalid_address
    source: |
      "2001:db8::1xyz"
    offenses:
      []

  - name: rubocop_cop_style_ipaddresses_ipv6_the_unspecified_address_short_form_of_0_0_0_0_0_0_0_0_does_not_register_an_offense
    source: |
      "::"
    offenses:
      []

  - name: rubocop_cop_style_ipaddresses_ipv6_the_unspecified_address_short_form_of_0_0_0_0_0_0_0_0_when_it_is_removed_from_the_allowed_addresses_registers_an_offense
    source: |
      '::'
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: Do not hardcode IP addresses.
    config:
      AllowedAddresses: []

  - name: rubocop_cop_style_ipaddresses_with_allowed_addresses_does_not_register_an_offense_for_an_allowed_address
    source: |
      "a::b"
    offenses:
      []
    config:
      AllowedAddresses: ["a::b"]

  - name: rubocop_cop_style_ipaddresses_with_allowed_addresses_does_not_register_an_offense_if_the_case_differs
    source: |
      "A::B"
    offenses:
      []
    config:
      AllowedAddresses: ["a::b"]
