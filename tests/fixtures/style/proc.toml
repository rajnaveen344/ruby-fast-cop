cop = "Style/Proc"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_proc_registers_an_offense_for_a_proc_new_call"
source = '''
f = Proc.new { |x| puts x }
'''
corrected = '''
f = proc { |x| puts x }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 12
message = "Use `proc` instead of `Proc.new`."

[[tests]]
name = "rubocop_cop_style_proc_registers_an_offense_for_proc_new"
source = '''
f = ::Proc.new { |x| puts x }
'''
corrected = '''
f = proc { |x| puts x }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 14
message = "Use `proc` instead of `Proc.new`."

[[tests]]
name = "rubocop_cop_style_proc_accepts_the_proc_new_call_without_block"
source = '''
p = Proc.new
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_proc_accepts_the_proc_new_call_without_block"
