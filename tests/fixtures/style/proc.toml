cop = "Style/Proc"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleproc_registers_an_offense_for_a_procnew_call"
source = '''
f = Proc.new { |x| puts x }
'''
corrected = '''
f = proc { |x| puts x }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 12
message = "Use `proc` instead of `Proc.new`."

[[tests]]
name = "rubocopcopstyleproc_registers_an_offense_for_procnew"
source = '''
f = ::Proc.new { |x| puts x }
'''
corrected = '''
f = proc { |x| puts x }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 14
message = "Use `proc` instead of `Proc.new`."

[[tests]]
name = "rubocopcopstyleproc_accepts_the_procnew_call_without_block"
source = '''
