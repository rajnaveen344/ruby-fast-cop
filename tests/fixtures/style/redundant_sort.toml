cop = "Style/RedundantSort"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantsort_registers_an_offense_when_first_is_called_with_sort"
source = '''
[1, 2, 3].sort.first
'''
corrected = '''
[1, 2, 3].min
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 20
message = "Use `min` instead of `sort...first`."

[[tests]]
name = "rubocopcopstyleredundantsort_registers_an_offense_when_first_is_called_with_safe_navigation_sort"
