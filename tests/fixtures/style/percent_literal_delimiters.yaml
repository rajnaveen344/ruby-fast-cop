cop: Style/PercentLiteralDelimiters
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_percentliteraldelimiters_default_override_allows_all_preferred_delimiters_to_be_set_with_one_key
    source: |
      ‹BASE›0‹/BASE›
      %w[string] + %i[string]
    offenses:
      []
    config:
      PreferredDelimiters: "{ 'default' => '[]', '%' => '()' }"

  - name: rubocop_cop_style_percentliteraldelimiters_default_override_allows_individual_preferred_delimiters_to_override_default
    source: |
      ‹BASE›0‹/BASE›
      %w[string] + [%(string)]
    offenses:
      []
    config:
      PreferredDelimiters: "{ 'default' => '[]', '%' => '()' }"

  - name: rubocop_cop_style_percentliteraldelimiters_invalid_cop_config_raises_an_error_when_invalid_configuration_is_specified
    source: |
      ‹BASE›0‹/BASE›
      %w[string]
    offenses:
      []
    config:
      PreferredDelimiters: "{ 'foobar' => '()' }"

  - name: rubocop_cop_style_percentliteraldelimiters_interpolated_string_does_not_register_an_offense_for_preferred_delimiters
    source: |
      ‹BASE›0‹/BASE›
      %[string]
