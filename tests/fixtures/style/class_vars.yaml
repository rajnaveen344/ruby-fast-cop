cop: Style/ClassVars
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_classvars_registers_an_offense_for_class_variable_declaration
    source: |
      class TestClass; @@test = 10; end
    offenses:
      - line: 1
        column_start: 17
        column_end: 23
        message: Replace class var @@test with a class instance var.

  - name: rubocop_cop_style_classvars_registers_an_offense_for_class_variable_set_in_class
    source: |
      class TestClass
        class_variable_set(:@@test, 2)
      end
    offenses:
      - line: 2
        column_start: 21
        column_end: 28
        message: "Replace class var :@@test with a class instance var."

  - name: rubocop_cop_style_classvars_registers_an_offense_for_class_variable_set_on_class_receiver
    source: |
      class TestClass; end
      TestClass.class_variable_set(:@@test, 42)
    offenses:
      - line: 2
        column_start: 29
        column_end: 36
        message: "Replace class var :@@test with a class instance var."

  - name: rubocop_cop_style_classvars_does_not_register_an_offense_for_class_variable_usage
    source: |
      ‹BASE›0‹/BASE›
      @@test.test(20)
    offenses:
      []

  - name: rubocop_cop_style_classvars_registers_no_offense_for_class_variable_set_without_arguments
    source: |
      class_variable_set
    offenses:
      []
