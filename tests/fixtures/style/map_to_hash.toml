cop = "Style/MapToHash"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylemaptohash__ruby_26_for_mapto_h_with_block_arity_1_registers_an_offense_and_corrects"
source = '''
foo.map { |x| [x, x * 2] }.to_h
'''
corrected = '''
foo.to_h { |x| [x, x * 2] }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Pass a block to `to_h` instead of calling `map.to_h`."

[[tests]]
name = "rubocopcopstylemaptohash__ruby_26_for_mapto_h_with_block_arity_1_and_destructuring_argument_registers_an_offense_and_corrects"
source = '''
