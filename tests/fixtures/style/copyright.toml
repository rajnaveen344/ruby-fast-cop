cop = "Style/Copyright"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_copyright_does_not_register_an_offense_when_the_notice_is_present"
source = '''
# Copyright 2015 Acme Inc.
# test2
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocop_cop_style_copyright_does_not_register_an_offense_when_the_notice_is_not_the_first_comment"
source = '''
# test2
# Copyright 2015 Acme Inc.
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocop_cop_style_copyright_does_not_register_an_offense_when_the_notice_is_in_a_block_comment"
source = '''
=begin
blah, blah, blah
Copyright 2015 Acme Inc.
=end
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocop_cop_style_copyright_when_multiline_copyright_notice_does_not_register_an_offense_when_the_multiline_copyright_notice_is_present"
source = '''
# Copyright 2015 Acme Inc.
#
# License details...
class Foo
end
'''
offenses = []

[tests.config]
Notice = "<<~'COPYRIGHT'"

[[tests]]
name = "rubocop_cop_style_copyright_when_multiline_copyright_notice_registers_an_offense_when_the_multiline_copyright_notice_is_missing"
source = '''
# Comment
class Foo
end
'''
corrected = '''
# Copyright (c) 2015 Acme Inc.
#
# License details...

# Comment
class Foo
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Include a copyright notice matching [...]"

[tests.config]
Notice = "<<~'COPYRIGHT'"

[[tests]]
name = "rubocop_cop_style_copyright_when_the_copyright_notice_comes_after_any_code_adds_an_offense"
source = '''
# test2
names = Array.new
# Copyright (c) 2015 Acme Inc.
names << 'James'
'''
corrected = '''
# Copyright (c) 2015 Acme Inc.
# test2
names = Array.new
# Copyright (c) 2015 Acme Inc.
names << 'James'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Include a copyright notice matching [...]"

[tests.config]
Notice = "<<~'COPYRIGHT'"

[[tests]]
name = "rubocop_cop_style_copyright_when_the_copyright_notice_is_missing_and_the_source_code_file_starts_with_a_shebang_adds_an_offense"
source = '''
#!/usr/bin/env ruby
names = Array.new
names << 'James'
'''
corrected = '''
#!/usr/bin/env ruby
# Copyright (c) 2015 Acme Inc.
names = Array.new
names << 'James'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Include a copyright notice matching [...]"

[tests.config]
Notice = "<<~'COPYRIGHT'"

[[tests]]
name = "rubocop_cop_style_copyright_adds_an_offense"
source = '''
# encoding: utf-8
names = Array.new
names << 'James'
'''
corrected = '''
# encoding: utf-8
# Copyright (c) 2015 Acme Inc.
names = Array.new
names << 'James'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Include a copyright notice matching [...]"

[tests.config]
Notice = "<<~'COPYRIGHT'"

