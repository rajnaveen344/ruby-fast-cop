cop = "Style/Copyright"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylecopyright_does_not_register_an_offense_when_the_notice_is_present"
source = '''
# Copyright 2015 Acme Inc.
# test2
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
AutocorrectNotice = ""
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocopcopstylecopyright_does_not_register_an_offense_when_the_notice_is_not_the_first_comment"
source = '''
# test2
# Copyright 2015 Acme Inc.
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
AutocorrectNotice = ""
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocopcopstylecopyright_does_not_register_an_offense_when_the_notice_is_in_a_block_comment"
source = '''
=begin
blah, blah, blah
Copyright 2015 Acme Inc.
=end
names = Array.new
names << 'James'
'''
offenses = []

[tests.config]
AutocorrectNotice = ""
Notice = "Copyright (\\(c\\) )?2015 Acme Inc"

[[tests]]
name = "rubocopcopstylecopyright_when_multiline_copyright_notice_does_not_register_an_offense_when_the_multiline_copyright_notice_is_present"
source = '''
# Copyright 2015 Acme Inc.
#
# License details...
class Foo
end
'''
offenses = []

[tests.config]
AutocorrectNotice = "# Copyright (c) 2015 Acme Inc.\n#\n# License details...\n"
Notice = "Copyright (\\(c\\) )?2015 Acme Inc.\n\nLicense details\\.\\.\\.\n"

[[tests]]
name = "rubocopcopstylecopyright_when_multiline_copyright_notice_registers_an_offense_when_the_multiline_copyright_notice_is_missing"
source = '''
# Comment
class Foo
end
'''
corrected = '''
# Copyright (c) 2015 Acme Inc.
#
# License details...

# Comment
class Foo
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "Include a copyright notice matching /Copyright (\\(c\\) )?2015 Acme Inc.\n\nLicense details\\.\\.\\.\n/ before any code."

[tests.config]
AutocorrectNotice = "# Copyright (c) 2015 Acme Inc.\n#\n# License details...\n"
Notice = "Copyright (\\(c\\) )?2015 Acme Inc.\n\nLicense details\\.\\.\\.\n"

[[tests]]
name = "rubocopcopstylecopyright_when_the_copyright_notice_is_missing_adds_an_offense"
source = '''
# test
# test2
names = Array.new
names << 'James'
'''
corrected = '''
