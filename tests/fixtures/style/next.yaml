  - name: rubocop_cop_style_next_allowconsecutiveconditionals_false_registers_an_offense_and_corrects_when_another_conditional_statements_is_at_the_same_depth
    source: |
      [].each do
        if foo?
          work
        end
      
        if bar?
          work
        end
