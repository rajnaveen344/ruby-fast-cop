  - name: rubocop_cop_style_next_registers_an_offense_when_line_break_before_condition
    source: |
      array.each do |item|
        if
           condition
          next if item.zero?
          do_something
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 4
        message: Use `next` to skip iteration.
    corrected: |
      array.each do |item|
        next unless condition
          next if item.zero?
          do_something
      end
    config:
      MinBodyLength: 1

