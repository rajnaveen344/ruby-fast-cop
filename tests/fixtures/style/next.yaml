cop: Style/Next
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_next
    source: |
      3.downto(1) do
        %{condition} o == 1
          puts o
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 21
        message: Use `next` to skip iteration.
    corrected: |
      3.downto(1) do
        next #{opposite} o == 1
        puts o
      end
    config:
      MinBodyLength: 1
    interpolated: true
    verified: false

