  - name: rubocop_cop_style_next_autocorrects_a_misaligned_end
    source: |
      [1, 2, 3, 4].each do |num|
        if !opts.nil?
          puts num
          if num != 2
            puts 'hello'
            puts 'world'
          end
       end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 15
        message: Use `next` to skip iteration.
    corrected: |
      [1, 2, 3, 4].each do |num|
        next unless !opts.nil?
        puts num
        next unless num != 2
        puts 'hello'
        puts 'world'
      end
    config:
      EnforcedStyle: always
      MinBodyLength: 1

  - name: rubocop_cop_style_next_keeps_comments_when_autocorrecting
