cop = "Style/StringChars"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylestringchars_registers_and_corrects_an_offense_when_using_split"
source = '''
string.split(//)
'''
corrected = '''
string.chars
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 16
message = "Use `chars` instead of `split(//)`."

