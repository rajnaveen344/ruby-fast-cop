cop = "Style/StructInheritance"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylestructinheritance_registers_an_offense_when_extending_instance_of_struct"
source = '''
class Person < Struct.new(:first_name, :last_name)
  def foo; end
end
'''
corrected = '''
Person = Struct.new(:first_name, :last_name) do
  def foo; end
end
'''

[[tests.offenses]]
line = 1
column_start = 15
column_end = 50
message = "Don't extend an instance initialized by `Struct.new`. Use a block to customize the struct."

[[tests]]
name = "rubocopcopstylestructinheritance_registers_an_offense_when_extending_instance_of_struct_2"
source = '''
class Person < ::Struct.new(:first_name, :last_name)
  def foo; end
end
'''
corrected = '''
Person = ::Struct.new(:first_name, :last_name) do
