cop = "Style/NumericPredicate"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylenumericpredicate_when_configured_to_enforce_numeric_predicate_methods_when_checking_if_a_number_is_zero_registers_an_offense"
source = '''
number == 0
0 == number
'''
corrected = '''
number.zero?
number.zero?
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Use `number.zero?` instead of `number == 0`."

[[tests.offenses]]
line = 2
column_start = 0
column_end = 11
message = "Use `number.zero?` instead of `0 == number`."

[tests.config]
AllowedMethods = []
AllowedPatterns = []
EnforcedStyle = "predicate"
Exclude = ["/private/tmp/rubocop-repo/spec/**/*"]

