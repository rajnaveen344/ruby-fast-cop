[[tests]]
name = "rubocopcopstyleemptyblockparameter_registers_an_offense_for_an_empty_block_parameter_with_doend_style"
source = '''
a do ||
end
'''
corrected = '''
a do
end
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 7
message = "Omit pipes for the empty block parameters."

