cop = "Style/TrivialAccessors"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyletrivialaccessors_registers_an_offense_on_instance_reader"
source = '''
class Foo
  def foo
    @foo
  end
end
'''
corrected = '''
class Foo
  attr_reader :foo
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 5
message = "Use `attr_reader` to define trivial reader methods."

