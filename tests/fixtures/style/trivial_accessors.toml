[[tests]]
name = "rubocopcopstyletrivialaccessors_flags_a_reader_inside_a_class_inside_an_instance_eval_call"
source = '''
something.instance_eval do
  class << @blah
    begin
      def bar
        @bar
      end
    end
  end
end
'''
corrected = '''
something.instance_eval do
  class << @blah
    begin
      attr_reader :bar
    end
  end
end
'''

