cop: Style/TrivialAccessors
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_trivialaccessors_registers_an_offense_on_instance_reader
    source: |
      class Foo
        def foo
          @foo
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: Use `attr_reader` to define trivial reader methods.
    corrected: |
      class Foo
        attr_reader :foo
      end

  - name: rubocop_cop_style_trivialaccessors_registers_an_offense_on_instance_writer
    source: |
      class Foo
        def foo=(val)
          @foo = val
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: Use `attr_writer` to define trivial writer methods.
    corrected: |
      class Foo
        attr_writer :foo
      end

  - name: rubocop_cop_style_trivialaccessors_registers_an_offense_on_class_reader
    source: |
      class Foo
        def self.foo
          @foo
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: Use `attr_reader` to define trivial reader methods.
    corrected: |
      class Foo
        class << self
          attr_reader :foo
        end
      end

  - name: rubocop_cop_style_trivialaccessors_registers_an_offense_on_class_writer
    source: |
      class Foo
        def self.foo=(val)
          @foo = val
