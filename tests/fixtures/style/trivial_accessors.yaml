  - name: rubocop_cop_style_trivialaccessors_flags_a_reader_inside_a_class_inside_an_instance_eval_call
    source: |
      something.instance_eval do
        class << @blah
          begin
            def bar
              @bar
            end
          end
        end
      end
    offenses:
      - line: 4
        column_start: 6
        column_end: 9
        message: Use `attr_reader` to define trivial reader methods.
    corrected: |
      something.instance_eval do
        class << @blah
          begin
            attr_reader :bar
          end
        end
      end

  - name: rubocop_cop_style_trivialaccessors_exact_name_match_disabled_registers_an_offense_when_names_mismatch_in_writer
