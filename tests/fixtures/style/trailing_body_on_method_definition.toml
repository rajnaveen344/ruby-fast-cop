cop = "Style/TrailingBodyOnMethodDefinition"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyletrailingbodyonmethoddefinition_registers_an_offense_when_body_trails_after_method_definition"
source = '''
def some_method; body
end
def extra_large; { size: 15 };
end
def seven_times(stuff) 7.times { do_this(stuff) }
end
'''
corrected = '''
def some_method 
  body
end
def extra_large 
  { size: 15 };
end
def seven_times(stuff) 
  7.times { do_this(stuff) }
end
'''

[[tests.offenses]]
line = 1
column_start = 17
column_end = 21
message = "Place the first line of a multi-line method definition's body on its own line."

[[tests.offenses]]
line = 3
column_start = 17
column_end = 29
message = "Place the first line of a multi-line method definition's body on its own line."

[[tests.offenses]]
line = 5
column_start = 23
column_end = 49
message = "Place the first line of a multi-line method definition's body on its own line."

[tests.config."Layout/IndentationWidth"]
Width = 2

