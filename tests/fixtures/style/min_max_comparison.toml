cop = "Style/MinMaxComparison"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_minmaxcomparison_registers_and_corrects_an_offense_when_using_a_b_a_b"
source = '''
a > b ? a : b
'''
corrected = '''
[a, b].max
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 13
message = "Use `[a, b].max` instead."

