cop = "Style/PerlBackrefs"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleperlbackrefs_autocorrects_puts_1_to_puts_regexplast_match1"
source = '''
puts $1
'''
corrected = '''
puts Regexp.last_match(1)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 7
message = "Prefer `Regexp.last_match(1)` over `$1`."

