[[tests]]
name = "rubocopcopstyleperlbackrefs_autocorrects_1_to_regexplast_match1_in_namespace"
source = '''
module Foo
  class Regexp
  end

  puts $1
end
'''
corrected = '''
module Foo
  class Regexp
  end

  puts ::Regexp.last_match(1)
end
'''

[[tests.offenses]]
line = 5
column_start = 7
column_end = 9
message = "Prefer `::Regexp.last_match(1)` over `$1`."
