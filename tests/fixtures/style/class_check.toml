cop = "Style/ClassCheck"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleclasscheck_when_enforced_style_is_is_a_registers_an_offense_for_kind_of_and_corrects_to_is_a"
source = '''
x.kind_of? y
'''
corrected = '''
x.is_a? y
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 10
message = "Prefer `Object#is_a?` over `Object#kind_of?`."

[tests.config]
EnforcedStyle = "is_a?"

[[tests]]
name = "rubocopcopstyleclasscheck_when_enforced_style_is_is_a_registers_an_offense_for_kind_of_is_safe_navigation_called_and_corrects_to_is_a"
source = '''
x&.kind_of? y
'''
corrected = '''
x&.is_a? y
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 11
message = "Prefer `Object#is_a?` over `Object#kind_of?`."

[tests.config]
EnforcedStyle = "is_a?"

[[tests]]
name = "rubocopcopstyleclasscheck_when_enforced_style_is_kind_of_registers_an_offense_for_is_a_and_corrects_to_kind_of"
