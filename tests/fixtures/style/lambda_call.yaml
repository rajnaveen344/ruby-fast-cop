cop: Style/LambdaCall
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_x
    source: |
      x.(a, b)
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Prefer the use of `x.call(a, b)` over `x.(a, b)`.
    corrected: |
      x.call(a, b)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_x
    source: |
      x&.(a, b)
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Prefer the use of `x&.call(a, b)` over `x&.(a, b)`.
    corrected: |
      x&.call(a, b)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_x
    source: |
      x.(a, b).(c)
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Prefer the use of `x.(a, b).call(c)` over `x.(a, b).(c)`.
      - line: 1
        column_start: 0
        column_end: 8
        message: Prefer the use of `x.call(a, b)` over `x.(a, b)`.
    corrected: |
      x.(a, b).call(c)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_x
    source: |
      x&.(a, b)&.(c)
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer the use of `x&.(a, b)&.call(c)` over `x&.(a, b)&.(c)`.
      - line: 1
        column_start: 0
        column_end: 9
        message: Prefer the use of `x&.call(a, b)` over `x&.(a, b)`.
    corrected: |
      x&.(a, b)&.call(c)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_x_with_no_arguments
    source: |
      x.()
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: Prefer the use of `x.call` over `x.()`.
    corrected: |
      x.call
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

  - name: rubocop_cop_style_lambdacall_when_style_is_set_to_call_registers_an_offense_for_correct_opposite
    source: |
      x.call(a, b)
      x.(a, b)
    offenses:
      - line: 2
        column_start: 0
        column_end: 8
        message: Prefer the use of `x.call(a, b)` over `x.(a, b)`.
    corrected: |
      x.call(a, b)
      x.call(a, b)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

