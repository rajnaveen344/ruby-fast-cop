      - line: 3
        column_start: 0
        column_end: 9
        message: Prefer the use of `x&.call(a, b)` over `x&.(a, b)`.
    corrected: |
      x&.call(a, b)
      x&.call(a, b)
      x&.call(a, b)
    config:
      EnforcedStyle: $UNRESOLVED:call
    interpolated: true
    verified: false

