cop = "Style/RedundantHeredocDelimiterQuotes"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantheredocdelimiterquotes_registers_an_offense_when_using_the_redundant_heredoc_delimiter_single_quotes_with_"
source = '''
do_something(<<~'EOS')
  no string interpolation style text
EOS
'''
corrected = '''
do_something(<<~EOS)
  no string interpolation style text
EOS
'''

[[tests.offenses]]
line = 1
column_start = 13
column_end = 21
message = "Remove the redundant heredoc delimiter quotes, use `<<~EOS` instead."

