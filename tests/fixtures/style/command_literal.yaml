      foo = %x(ls)
    config:
      EnforcedStyle: percent_x

  - name: rubocop_cop_style_commandliteral_when_enforcedstyle_is_set_to_percent_x_a_single_line_string_with_backticks_registers_an_offense_without_autocorrection
    source: |
