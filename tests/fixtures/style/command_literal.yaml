    config:
      EnforcedStyle: percent_x

  - name: rubocop_cop_style_commandliteral_when_enforcedstyle_is_set_to_percent_x_a_single_line_x_string_without_backticks_is_accepted
    source: |
      foo = %x(ls)
    offenses:
      []
    config:
      EnforcedStyle: percent_x

  - name: rubocop_cop_style_commandliteral_when_enforcedstyle_is_set_to_percent_x_a_single_line_x_string_with_backticks_is_accepted
    source: |
