cop = "Style/ExpandPathArguments"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleexpandpatharguments_registers_an_offense_when_using_fileexpand_path___file__"
source = '''
File.expand_path('..', __FILE__)
'''
corrected = '''
File.expand_path(__dir__)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 16
message = "Use `expand_path(__dir__)` instead of `expand_path('..', __FILE__)`."

