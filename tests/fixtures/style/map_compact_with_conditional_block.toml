cop = "Style/MapCompactWithConditionalBlock"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemapcompactwithconditionalblock_with_multiline_block_registers_an_offense_and_corrects_to_select_with_if_condition"
source = '''
foo.map do |item|
  if item.bar?
    item
  else
    next
  end
end.compact
'''
corrected = '''
foo.select { |item| item.bar? }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 17
message = "Replace `map { ... }.compact` with `select`."

