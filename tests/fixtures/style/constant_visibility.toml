cop = "Style/ConstantVisibility"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_constantvisibility_when_defining_a_constant_in_a_class_with_a_single_statement_body_registers_an_offense_when_not_using_a_visibility_declaration"
source = '''
class Foo
  BAR = 42
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 10
message = "Explicitly make `BAR` public or private using either `#public_constant` or `#private_constant`."

[[tests]]
name = "rubocop_cop_style_constantvisibility_when_defining_a_constant_in_a_class_with_a_single_statement_body_registers_an_offense_when_no_arguments_are_used_in_the_visibility_declaration"
source = '''
class Foo
  BAR = 42
  private_constant
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 10
message = "Explicitly make `BAR` public or private using either `#public_constant` or `#private_constant`."

[[tests]]
name = "rubocop_cop_style_constantvisibility_when_defining_a_constant_in_a_class_with_a_multi_statement_body_registers_an_offense_when_not_using_a_visibility_declaration"
source = '''
class Foo
  include Bar
  BAR = 42
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 10
message = "Explicitly make `BAR` public or private using either `#public_constant` or `#private_constant`."

[[tests]]
name = "rubocop_cop_style_constantvisibility_when_defining_a_constant_in_a_class_with_a_multi_statement_body_registers_an_offense_when_there_is_no_matching_visibility_declaration"
source = '''
class Foo
  include Bar
  BAR = 42
  private_constant :FOO
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 10
message = "Explicitly make `BAR` public or private using either `#public_constant` or `#private_constant`."

[[tests]]
name = "rubocop_cop_style_constantvisibility_when_defining_a_constant_in_a_class_with_a_multi_statement_body_does_not_register_an_offense_when_using_a_visibility_declaration"
source = '''
class Foo
  BAR = 42
  private_constant :BAR
end
'''
offenses = []

