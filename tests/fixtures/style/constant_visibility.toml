offenses = []

[[tests]]
name = "rubocop_cop_style_constantvisibility_registers_an_offense_for_module_definitions"
source = '''
module Foo
  MyClass = Class.new()
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 23
message = "Explicitly make `MyClass` public or private using either `#public_constant` or `#private_constant`."

[[tests]]
name = "rubocop_cop_style_constantvisibility_ignoremodules_does_not_register_an_offense_for_class_definitions"
source = '''
class Foo
  SomeClass = Class.new()
  SomeModule = Module.new()
  SomeStruct = Struct.new()
end
'''
offenses = []

[tests.config]
IgnoreModules = true

