cop = "Style/FileWrite"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_filewrite_does_not_register_an_offense_for_the_file_open_with_multiline_write_block_when_not_writing_to_the_block_variable"
source = '''
File.open(filename, 'w') do |f|
  something.write(content)
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_filewrite_does_not_register_an_offense_when_a_splat_argument_is_passed_to_f_write"
source = '''
File.open(filename, 'w') do |f|
  f.write(*objects)
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_filewrite"
source = '''
File.open(filename, '#{mode}').write(content)
'''
corrected = '''
File.#{write_method}(filename, content)
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 45
message = "Use `File.#{write_method}`."

