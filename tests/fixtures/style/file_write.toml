cop = "Style/FileWrite"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylefilewrite_does_not_register_an_offense_for_the_fileopen_with_multiline_write_block_when_not_writing_to_the_block_variable"
source = '''
File.open(filename, 'w') do |f|
  something.write(content)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylefilewrite_does_not_register_an_offense_when_a_splat_argument_is_passed_to_fwrite"
source = '''
File.open(filename, 'w') do |f|
  f.write(*objects)
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylefilewrite_registers_an_offense_for_and_corrects_fileopenfilename_wwritecontent"
source = '''
File.open(filename, 'w').write(content)
'''
corrected = '''
File.write(filename, content)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 39
message = "Use `File.write`."

