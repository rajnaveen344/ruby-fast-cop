cop: Style/DirEmpty
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_dirempty_target_ruby_version_2_4_registers_an_offense_for_dir_entries_size_2
    source: |
      Dir.entries('path/to/dir').size == 2
    offenses:
      - line: 1
        column_start: 0
        column_end: 36
        message: "Use `Dir.empty?('path/to/dir')` instead."
    corrected: |
      Dir.empty?('path/to/dir')
    ruby_version: ">= 2.4"

  - name: rubocop_cop_style_dirempty_target_ruby_version_2_4_registers_an_offense_for_dir_entries_size_2
    source: |
      Dir.entries('path/to/dir').size != 2
    offenses:
      - line: 1
        column_start: 0
        column_end: 36
        message: "Use `!Dir.empty?('path/to/dir')` instead."
    corrected: |
      !Dir.empty?('path/to/dir')
    ruby_version: ">= 2.4"

  - name: rubocop_cop_style_dirempty_target_ruby_version_2_4_registers_an_offense_for_dir_entries_size_2
    source: |
