        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      foo ? raise(Ex, 'error') : bar
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_a_raise_with_exception_object_when_used_in_a_logical_and_expression_registers_an_offense_and_autocorrects
    source: |
      bar && raise(Ex.new('error'))
    offenses:
      - line: 1
        column_start: 7
        column_end: 29
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      bar && raise(Ex, 'error')
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_a_raise_with_exception_object_when_used_in_a_logical_or_expression_registers_an_offense_and_autocorrects
    source: |
      bar || raise(Ex.new('error'))
    offenses:
      - line: 1
        column_start: 7
        column_end: 29
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      bar || raise(Ex, 'error')
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_opposite_correct_reports_an_offense_for_opposite_correct
    source: |
      if a
        raise RuntimeError, msg
      else
        raise Ex.new(msg)
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 19
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      if a
        raise RuntimeError, msg
      else
        raise Ex, msg
      end
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_opposite_correct_reports_multiple_offenses
    source: |
      if a
        raise RuntimeError, msg
      elsif b
        raise Ex.new(msg)
      else
        raise ArgumentError.new(msg)
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 19
        message: Provide an exception class and message as arguments to `raise`.
      - line: 6
        column_start: 2
        column_end: 30
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      if a
        raise RuntimeError, msg
      elsif b
        raise Ex, msg
      else
        raise ArgumentError, msg
      end
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_when_an_exception_object_is_assigned_to_a_local_variable_autocorrects_to_exploded_style
    source: |
      def do_something
        klass = RuntimeError
        raise klass.new('hi')
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 23
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      def do_something
        klass = RuntimeError
        raise klass, 'hi'
      end
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_when_exception_type_is_in_allowedcompacttypes_accepts_exception_constructor_with_no_arguments
    source: |
      raise Ex1.new
    offenses:
      []
    config:
      AllowedCompactTypes: [Ex1]
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_when_exception_type_is_in_allowedcompacttypes_with_one_argument_accepts_exception_constructor
