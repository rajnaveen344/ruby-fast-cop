cop: Style/RaiseArgs
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_a_raise_with_2_args_reports_an_offense
    source: |
      raise RuntimeError, msg
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      raise RuntimeError.new(msg)
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_a_raise_with_2_args_and_exception_object_is_assigned_to_a_local_variable_reports_an_offense
    source: |
      raise error_class, msg
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      raise error_class.new(msg)
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_a_raise_with_exception_instantiation_and_message_arguments_reports_an_offense
    source: |
      raise FooError.new, message
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      raise FooError.new(message)
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_when_used_in_a_ternary_expression_registers_an_offense_and_autocorrects
    source: |
      foo ? raise(Ex, 'error') : bar
    offenses:
      - line: 1
        column_start: 6
        column_end: 24
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      foo ? raise(Ex.new('error')) : bar
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_when_used_in_a_logical_and_expression_registers_an_offense_and_autocorrects
    source: |
      bar && raise(Ex, 'error')
    offenses:
      - line: 1
        column_start: 7
        column_end: 25
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      bar && raise(Ex.new('error'))
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_when_used_in_a_logical_or_expression_registers_an_offense_and_autocorrects
    source: |
      bar || raise(Ex, 'error')
    offenses:
      - line: 1
        column_start: 7
        column_end: 25
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      bar || raise(Ex.new('error'))
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_correct_opposite_reports_an_offense
    source: |
      if a
        raise RuntimeError, msg
      else
        raise Ex.new(msg)
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 25
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      if a
        raise RuntimeError.new(msg)
      else
        raise Ex.new(msg)
      end
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_correct_opposite_reports_multiple_offenses
    source: |
      if a
        raise RuntimeError, msg
      elsif b
        raise Ex.new(msg)
      else
        raise ArgumentError, msg
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 25
        message: Provide an exception object as an argument to `raise`.
      - line: 6
        column_start: 2
        column_end: 26
        message: Provide an exception object as an argument to `raise`.
    corrected: |
      if a
        raise RuntimeError.new(msg)
      elsif b
        raise Ex.new(msg)
      else
        raise ArgumentError.new(msg)
      end
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_with_a_raise_with_3_args_reports_an_offense
    source: |
      raise RuntimeError, msg, caller
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: Provide an exception object as an argument to `raise`.
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_accepts_a_raise_with_msg_argument
    source: |
      raise msg
    offenses:
      []
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_accepts_a_raise_with_an_exception_argument
    source: |
      raise Ex.new(msg)
    offenses:
      []
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_compact_accepts_exception_constructor_with_keyword_arguments_and_message_argument
    source: |
      raise MyKwArgError.new(a: 1, b: 2), message
    offenses:
      []
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_a_raise_with_exception_object_with_one_argument_reports_an_offense
    source: |
      raise Ex.new(msg)
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      raise Ex, msg
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_a_raise_with_exception_object_with_no_arguments_reports_an_offense
    source: |
      raise Ex.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Provide an exception class and message as arguments to `raise`.
    corrected: |
      raise Ex
    config:
      EnforcedStyle: exploded

  - name: rubocop_cop_style_raiseargs_when_enforced_style_is_exploded_with_a_raise_with_exception_object_when_used_in_a_ternary_expression_registers_an_offense_and_autocorrects
    source: |
      foo ? raise(Ex.new('error')) : bar
    offenses:
      - line: 1
