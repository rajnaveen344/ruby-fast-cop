cop = "Style/SingleLineMethods"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesinglelinemethods_registers_an_offense_for_a_singleline_method"
source = '''
def some_method; body end
def link_to(name, url); {:name => name}; end
def @table.columns; super; end
'''
corrected = '''
def some_method; 
  body 
end
def link_to(name, url); 
  {:name => name}; 
end
def @table.columns; 
  super; 
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 25
message = "Avoid single-line method definitions."

[[tests.offenses]]
line = 2
column_start = 0
column_end = 44
message = "Avoid single-line method definitions."

[[tests.offenses]]
line = 3
column_start = 0
column_end = 30
message = "Avoid single-line method definitions."

[tests.config]
AllowIfMethodIsEmpty = true

[tests.config."Layout/IndentationWidth"]
Width = 2

[tests.config."Style/EndlessMethod"]
Enabled = false

