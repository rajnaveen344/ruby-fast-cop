cop: Style/RedundantInterpolation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_1_1
    source: |
      "#{1 + 1}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (1 + 1).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_1_1
    source: |
      %|#{1 + 1}|
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (1 + 1).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_q_1_1
    source: |
      %Q(#{1 + 1})
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (1 + 1).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_1_1_2_2
    source: |
      "#{1 + 1; 2 + 2}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (1 + 1; 2 + 2).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#{@var}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Prefer `to_s` over string interpolation.
    corrected: |
      @var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#@var"
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Prefer `to_s` over string interpolation.
    corrected: |
      @var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#{@@var}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Prefer `to_s` over string interpolation.
    corrected: |
      @@var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#@@var"
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Prefer `to_s` over string interpolation.
    corrected: |
      @@var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#{$var}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      "#$var"
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_1
    source: |
      "#{$1}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $1.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_1
    source: |
      "#$1"
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $1.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for
    source: |
      "#{$+}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $+.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for
    source: |
      "#$+"
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Prefer `to_s` over string interpolation.
    corrected: |
      $+.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_number
    source: |
      "#{number}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Prefer `to_s` over string interpolation.
    corrected: |
      number.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_do_something_42
    source: |
      "#{do_something(42)}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: Prefer `to_s` over string interpolation.
    corrected: |
      do_something(42).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_do_something_42
    source: |
      "#{do_something 42}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Prefer `to_s` over string interpolation.
    corrected: |
      do_something(42).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_foo_do_something_42
    source: |
      "#{foo.do_something 42}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: Prefer `to_s` over string interpolation.
    corrected: |
      foo.do_something(42).to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      var = 1; "#{var}"
    offenses:
      - line: 1
        column_start: 9
        column_end: 17
        message: Prefer `to_s` over string interpolation.
    corrected: |
      var = 1; var.to_s

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_var
    source: |
      ["#{@var}", 'foo']
    offenses:
      - line: 1
        column_start: 1
        column_end: 10
        message: Prefer `to_s` over string interpolation.
    corrected: |
      [@var.to_s, 'foo']

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_a_one_line_in_pattern_matching
    source: |
      "#{42 in var}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (42 in var).to_s
    ruby_version: ">= 2.7"

  - name: rubocop_cop_style_redundantinterpolation_registers_an_offense_for_a_one_line_in_pattern_matching
    source: |
      "#{42 in var}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer `to_s` over string interpolation.
    corrected: |
      (42 in var).to_s
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_redundantinterpolation_accepts_an_offense_for_a_one_line_pattern_matching
    source: |
      "#{42 => var}"
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_redundantinterpolation_accepts_an_offense_for_a_part_of_one_line_pattern_matching
    source: |
      "#{x; 42 => var}"
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_style_redundantinterpolation_accepts_strings_with_characters_before_the_interpolation
    source: |
      "this is #{@sparta}"
    offenses:
      []

  - name: rubocop_cop_style_redundantinterpolation_accepts_strings_with_characters_after_the_interpolation
    source: |
      "#{@sparta} this is"
    offenses:
      []

  - name: rubocop_cop_style_redundantinterpolation_accepts_strings_implicitly_concatenated_with_a_later_string
    source: |
      "#{sparta}" ' this is'
    offenses:
      []

  - name: rubocop_cop_style_redundantinterpolation_accepts_strings_implicitly_concatenated_with_an_earlier_string
    source: |
      'this is ' "#{sparta}"
    offenses:
      []

  - name: rubocop_cop_style_redundantinterpolation_accepts_strings_that_are_part_of_a_w
    source: |
      %W(#{@var} foo)
    offenses:
      []
