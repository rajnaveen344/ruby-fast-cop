cop: Style/GuardClause
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_guardclause_reports_an_offense_if_method_body_is_if_unless_without_else
    source: |
      def func
        if something
          #{body}
        end
      end
      
      def func
        unless something
          #{body}
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 4
        message: Use a guard clause (`return unless something`) instead of wrapping the code inside a conditional expression.
      - line: 8
        column_start: 2
        column_end: 8
        message: Use a guard clause (`return if something`) instead of wrapping the code inside a conditional expression.
    corrected: |
      def func
        return unless something
          #{body}
       #{trailing_whitespace}
      end
      
      def func
        return if something
          #{body}
       #{trailing_whitespace}
      end
    interpolated: true

