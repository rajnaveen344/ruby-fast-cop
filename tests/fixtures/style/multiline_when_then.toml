cop = "Style/MultilineWhenThen"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_multilinewhenthen_registers_an_offense_for_empty_when_statement_with_then"
source = '''
case foo
when bar then
end
'''
corrected = '''
case foo
when bar
end
'''

[[tests.offenses]]
line = 2
column_start = 9
column_end = 13
message = "Do not use `then` for multiline `when` statement."

[[tests]]
name = "rubocop_cop_style_multilinewhenthen_registers_an_offense_for_multiline_one_line_in_a_body_when_statement_with_then"
source = '''
case foo
when bar then
do_something
end
'''
corrected = '''
case foo
when bar
do_something
end
'''

[[tests.offenses]]
line = 2
column_start = 9
column_end = 13
message = "Do not use `then` for multiline `when` statement."

[[tests]]
