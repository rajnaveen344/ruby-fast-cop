cop: Style/ExactRegexpMatch
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_astring_z
    source: |
      string =~ /\Astring\z/
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: "Use `string == 'string'`."
    corrected: |
      string == 'string'

  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_astring_z
    source: |
      string === /\Astring\z/
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: "Use `string == 'string'`."
    corrected: |
      string == 'string'

  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_match_astring_z
    source: |
      string.match(/\Astring\z/)
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: "Use `string == 'string'`."
    corrected: |
      string == 'string'

  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_match_astring_z
    source: |
      string&.match(/\Astring\z/)
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Use `string == 'string'`."
    corrected: |
      string == 'string'

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_match_without_receiver
    source: |
      match(/\Astring\z/)
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_match_astring_z
    source: |
      string.match?(/\Astring\z/)
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Use `string == 'string'`."
    corrected: |
      string == 'string'

  - name: rubocop_cop_style_exactregexpmatch_registers_an_offense_when_using_string_astring_z
    source: |
      string !~ /\Astring\z/
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: "Use `string != 'string'`."
    corrected: |
      string != 'string'

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_string_astring_interpolation_z_string_interpolation
    source: |
      string =~ /\Astring#{interpolation}\z/
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_string_a0_z_literal_with_quantifier
    source: |
      string === /\A0+\z/
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_string_astring_z_any_pattern
    source: |
      string =~ /\Astring.*\z/
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_string_string_multiline_matches
    source: |
      string =~ /^string$/
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_does_not_register_an_offense_when_using_string_astring_z_i_regexp_opt
    source: |
      string =~ /\Astring\z/i
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_invalid_regular_expressions_does_not_register_an_offense_for_single_invalid_regexp
    source: |
      string =~ /^\P$/
    offenses:
      []

  - name: rubocop_cop_style_exactregexpmatch_invalid_regular_expressions_registers_an_offense_for_regexp_following_invalid_regexp
    source: |
      string =~ /^\P$/
      string.match(/\Astring\z/)
    offenses:
      - line: 2
        column_start: 0
        column_end: 26
        message: "Use `string == 'string'`."
    corrected: |
      string =~ /^\P$/
      string == 'string'
