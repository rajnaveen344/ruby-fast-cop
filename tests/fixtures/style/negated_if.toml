cop = "Style/NegatedIf"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenegatedif_does_not_blow_up_for_ternary_ops"
source = '''
a ? b : c
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_does_not_blow_up_on_a_negated_ternary_operator"
source = '''
!foo.empty? ? :bar : :baz
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_does_not_blow_up_for_empty_if_condition"
source = '''
if ()
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_does_not_blow_up_for_empty_unless_condition"
source = '''
unless ()
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_with_both_style_registers_an_offense_for_if_with_exclamation_point_condition"
source = '''
if !a_condition
  some_method
end
some_method if !a_condition
'''
corrected = '''
unless a_condition
  some_method
end
some_method unless a_condition
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Favor `unless` over `if` for negative conditions."

[[tests.offenses]]
line = 4
column_start = 0
column_end = 27
message = "Favor `unless` over `if` for negative conditions."

[[tests]]
name = "rubocopcopstylenegatedif_with_both_style_registers_an_offense_for_if_with_not_condition"
source = '''
if not a_condition
  some_method
end
some_method if not a_condition
'''
corrected = '''
unless a_condition
  some_method
end
some_method unless a_condition
'''

[[tests.offenses]]
