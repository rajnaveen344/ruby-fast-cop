[[tests]]
name = "rubocopcopstylenegatedif_with_both_style_accepts_an_ifelse_with_negative_condition"
source = '''
if !a_condition
  some_method
else
  something_else
end
if not a_condition
  some_method
elsif other_condition
  something_else
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_with_both_style_accepts_an_if_where_only_part_of_the_condition_is_negated"
source = '''
if !condition && another_condition
  some_method
end
if not condition or another_condition
  some_method
end
some_method if not condition or another_condition
'''
offenses = []

[[tests]]
name = "rubocopcopstylenegatedif_with_both_style_accepts_an_if_where_the_condition_is_doubly_negated"
source = '''
