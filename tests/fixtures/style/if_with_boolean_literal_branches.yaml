      if foo #{comparison_operator} bar
        true
      else
        false
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Remove redundant `if` with boolean literal branches.
    corrected: |
      foo #{comparison_operator} bar
    interpolated: true

