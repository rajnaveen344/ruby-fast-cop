cop = "Style/WhileUntilDo"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylewhileuntildo_registers_an_offense_for_do_in_multiline_while"
source = '''
while cond do
end
'''
corrected = '''
while cond
end
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 13
message = "Do not use `do` with multi-line `while`."

[[tests]]
name = "rubocopcopstylewhileuntildo_registers_an_offense_for_do_in_multiline_until"
source = '''
until cond do
end
'''
corrected = '''
until cond
end
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 13
message = "Do not use `do` with multi-line `until`."

[[tests]]
