cop: Style/HashAsLastArrayItem
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_registers_an_offense_and_corrects_when_hash_without_braces
    source: |
      [1, 2, one: 1, two: 2]
    offenses:
      - line: 1
        column_start: 7
        column_end: 21
        message: Wrap hash in `{` and `}`.
    corrected: |
      [1, 2, {one: 1, two: 2}]
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_does_not_register_an_offense_when_hash_with_braces
    source: |
      [1, 2, { one: 1, two: 2 }]
    offenses:
      []
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_does_not_register_an_offense_when_hash_is_not_inside_array
    source: |
      foo(one: 1, two: 2)
    offenses:
      []
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_does_not_register_an_offense_when_the_array_is_all_hashes
    source: |
      [{ one: 1 }, { two: 2 }]
    offenses:
      []
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_does_not_register_an_offense_when_the_hash_is_empty
    source: |
      [1, {}]
    offenses:
      []
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_braces_does_not_register_an_offense_when_using_double_splat_operator
    source: |
      [1, **options]
    offenses:
      []
    config:
      EnforcedStyle: braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_registers_an_offense_and_corrects_when_hash_with_braces
    source: |
      [{ one: 1 }, { three: 3 }, 2, { three: 3 }]
    offenses:
      - line: 1
        column_start: 30
        column_end: 42
        message: Omit the braces around the hash.
    corrected: |
      [{ one: 1 }, { three: 3 }, 2,  three: 3 ]
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_registers_an_offense_and_corrects_when_hash_with_braces_and_trailing_comma
    source: |
      [1, 2, { one: 1, two: 2, },]
    offenses:
      - line: 1
        column_start: 7
        column_end: 26
        message: Omit the braces around the hash.
    corrected: |
      [1, 2,  one: 1, two: 2, ]
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_registers_an_offense_and_corrects_when_hash_with_braces_and_trailing_comma_and_new_line
    source: |
      [
        1,
        2,
        {
          one: 1,
          two: 2,
        },
      ]
    offenses:
      - line: 4
        column_start: 2
        column_end: 3
        message: Omit the braces around the hash.
    corrected: |
      [
        1,
        2,
      #{'  '}
          one: 1,
          two: 2,
      #{'  '}
      ]
    config:
      EnforcedStyle: no_braces
    interpolated: true

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_hash_is_not_the_last_element
    source: |
      [
        1,
        2,
        {
          one: 1
        },
        two: 2
      ]
    offenses:
      []
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_hash_without_braces
    source: |
      [1, 2, one: 1, two: 2]
    offenses:
      []
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_hash_is_not_inside_array
    source: |
      foo({ one: 1, two: 2 })
    offenses:
      []
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_the_array_is_all_hashes
    source: |
      [{ one: 1 }, { two: 2 }]
    offenses:
      []
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_the_hash_is_empty
    source: |
      [1, {}]
    offenses:
      []
    config:
      EnforcedStyle: no_braces

  - name: rubocop_cop_style_hashaslastarrayitem_when_enforcedstyle_is_no_braces_does_not_register_an_offense_when_passing_an_implicit_array_to_a_setter
    source: |
      cache_store = :redis_cache_store, { url: ENV['REDIS_URL'] }
    offenses:
      []
    config:
      EnforcedStyle: no_braces
