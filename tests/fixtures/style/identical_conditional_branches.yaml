cop: Style/IdenticalConditionalBranches
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_identicalconditionalbranches_on_if_else_with_identical_bodies_registers_and_corrects_an_offense
    source: |
      if something
        do_x
      else
        do_x
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Move `do_x` out of the conditional.
      - line: 4
        column_start: 2
        column_end: 6
        message: Move `do_x` out of the conditional.
    corrected: |
      if something
      else
      end
      do_x

  - name: rubocop_cop_style_identicalconditionalbranches_on_if_else_with_identical_trailing_lines_registers_and_corrects_an_offense
    source: |
      if something
        method_call_here(1, 2, 3)
        do_x
      else
        1 + 2 + 3
        do_x
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 6
        message: Move `do_x` out of the conditional.
      - line: 6
        column_start: 2
        column_end: 6
        message: Move `do_x` out of the conditional.
    corrected: |
      if something
        method_call_here(1, 2, 3)
      else
        1 + 2 + 3
      end
      do_x

