cop: Style/EnvHome
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_envhome_registers_and_corrects_an_offense_when_using_env_home
    source: |
      ENV['HOME']
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Use `Dir.home` instead.
    corrected: |
      Dir.home

  - name: rubocop_cop_style_envhome_registers_and_corrects_an_offense_when_using_env_fetch_home
    source: |
      ENV.fetch('HOME')
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Use `Dir.home` instead.
    corrected: |
      Dir.home

  - name: rubocop_cop_style_envhome_registers_and_corrects_an_offense_when_using_env_fetch_home_nil
    source: |
      ENV.fetch('HOME', nil)
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Use `Dir.home` instead.
    corrected: |
      Dir.home

  - name: rubocop_cop_style_envhome_registers_and_corrects_an_offense_when_using_env_home
    source: |
      ::ENV['HOME']
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Use `Dir.home` instead.
    corrected: |
      Dir.home

  - name: rubocop_cop_style_envhome_does_not_register_an_offense_when_using_dir_home
    source: |
      Dir.home
    offenses:
      []

  - name: rubocop_cop_style_envhome_does_not_register_an_offense_when_using_env_home_home_foo
    source: |
      ENV['HOME'] = '/home/foo'
    offenses:
      []

  - name: rubocop_cop_style_envhome_does_not_register_an_offense_when_using_env_fetch_home_default
    source: |
      ENV.fetch('HOME', default)
    offenses:
      []
