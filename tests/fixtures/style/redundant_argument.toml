cop = "Style/RedundantArgument"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantargument_registers_an_offense_and_corrects_when_method_called_on_variable"
source = '''
foo.join('')
foo.sum(0)
exit(true)
exit!(false)
foo.to_i(10)
foo.split(' ')
foo.chomp("\n")
foo.chomp!("\n")
'''
corrected = '''
foo.join
foo.sum
exit
exit!
foo.to_i
foo.split
foo.chomp
foo.chomp!
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 12
message = "Argument '' is redundant because it is implied by default."

[[tests.offenses]]
line = 2
column_start = 7
column_end = 10
message = "Argument 0 is redundant because it is implied by default."

[[tests.offenses]]
line = 3
column_start = 4
column_end = 10
message = "Argument true is redundant because it is implied by default."

[[tests.offenses]]
line = 4
column_start = 5
column_end = 12
message = "Argument false is redundant because it is implied by default."

[[tests.offenses]]
line = 5
column_start = 8
column_end = 12
message = "Argument 10 is redundant because it is implied by default."

[[tests.offenses]]
line = 6
column_start = 9
column_end = 14
message = "Argument ' ' is redundant because it is implied by default."

[[tests.offenses]]
line = 7
column_start = 9
column_end = 15
message = "Argument \"\\n\" is redundant because it is implied by default."

[[tests.offenses]]
line = 8
column_start = 10
column_end = 16
message = "Argument \"\\n\" is redundant because it is implied by default."

[tests.config]
Methods = { join = "", sum = 0, exit = true, "exit!" = false, to_i = 10, split = " ", chomp = "\n", "chomp!" = "\n" }

