cop: Style/MapToHash
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      foo.#{method} { |x| [x, x * 2] }.to_h
    offenses:
      - line: 1
        column_start: 4
        column_end: 37
        message: "Pass a block to `to_h` instead of calling `#{method}.to_h`."
    corrected: |
      foo.to_h { |x| [x, x * 2] }
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      foo.#{method} { |(k, v)| [k, v * 2] }.to_h
    offenses:
      - line: 1
        column_start: 4
        column_end: 42
        message: "Pass a block to `to_h` instead of calling `#{method}.to_h`."
    corrected: |
      foo.to_h { |k, v| [k, v * 2] }
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      foo.#{method} { |x, y| [x.to_s, y.to_i] }.to_h
    offenses:
      - line: 1
        column_start: 4
        column_end: 46
        message: "Pass a block to `to_h` instead of calling `#{method}.to_h`."
    corrected: |
      foo.to_h { |x, y| [x.to_s, y.to_i] }
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      #{method} { |x| [x, x * 2] }.to_h
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: "Pass a block to `to_h` instead of calling `#{method}.to_h`."
    corrected: |
      to_h { |x| [x, x * 2] }
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      foo&.#{method} { |x| [x, x * 2] }&.to_h
    offenses:
      - line: 1
        column_start: 5
        column_end: 39
        message: "Pass a block to `to_h` instead of calling `#{method}&.to_h`."
    corrected: |
      foo&.to_h { |x| [x, x * 2] }
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects
    source: |
      foo&.#{method} { |x| [x, x * 2] }.to_h
