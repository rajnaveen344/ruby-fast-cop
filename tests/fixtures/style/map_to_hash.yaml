  - name: rubocop_cop_style_maptohash_ruby_2_6_does_not_register_an_offense
    source: |
      foo.#{method} { |x| x * 2 }.to_h { [it.to_s, it] }
    offenses:
      []
    ruby_version: ">= 3.4"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_registers_an_offense_and_corrects_with_newline_removal
    source: |
      {foo: bar}
        .#{method} { |k, v| [k.to_s, v.do_something] }
        .to_h
        .freeze
    offenses:
      - line: 2
        column_start: 3
        column_end: 48
        message: "Pass a block to `to_h` instead of calling `#{method}.to_h`."
    corrected: |
      {foo: bar}
        .to_h { |k, v| [k.to_s, v.do_something] }
        .freeze
    ruby_version: ">= 2.6"
    interpolated: true
