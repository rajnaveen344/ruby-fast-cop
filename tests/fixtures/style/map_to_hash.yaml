    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_does_not_register_an_offense
    source: |
      foo.#{method} { |x| x * 2 }
    offenses:
      []
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_does_not_register_an_offense
    source: |
      foo.#{method} { |x| x * 2 }.to_h { |x| [x.to_s, x] }
    offenses:
      []
    ruby_version: ">= 2.6"
    interpolated: true

  - name: rubocop_cop_style_maptohash_ruby_2_6_does_not_register_an_offense
    source: |
      foo.#{method} { |x| x * 2 }.to_h { |x| [x.to_s, x] }
    offenses:
      []
    ruby_version: ">= 2.7"
