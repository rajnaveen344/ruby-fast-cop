  - name: rubocop_cop_style_maptohash_ruby_2_6_when_the_receiver_is_a_hash_registers_an_offense_and_corrects
    source: |
      { foo: :bar }.#{method} { |x, y| [x.to_s, y.to_s] }.to_h
