cop: Style/RedundantParentheses
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantparentheses
    source: |
      %{expr}
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: "Don't use parentheses around #{type}."
    corrected: |
      #{correct}
    interpolated: true

