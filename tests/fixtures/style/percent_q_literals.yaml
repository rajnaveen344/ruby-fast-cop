cop: Style/PercentQLiterals
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_percentqliterals_accepts_single_quotes
    source: |
      'hi'
    offenses:
      []

  - name: rubocop_cop_style_percentqliterals_accepts_double_quotes
    source: |
      "hi"
    offenses:
      []

  - name: rubocop_cop_style_percentqliterals_with_special_characters_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %q(\t)
    offenses:
      []

  - name: rubocop_cop_style_percentqliterals_with_special_characters_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(\t)
    offenses:
      []

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %q(hi)
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:lower_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_lower_case_q_without_interpolation_registers_an_offense_for_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Do not use `%Q` unless interpolation is needed. Use `%q`.
    corrected: |
      ‹BASE›0‹/BASE›
      %q(hi)
    config:
      EnforcedStyle: $UNRESOLVED:lower_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_lower_case_q_with_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(#{1 + 2})
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:lower_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_lower_case_q_with_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %q(#{1 + 2})
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:lower_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_upper_case_q_without_interpolation_registers_an_offense_for_q
    source: |
      ‹BASE›0‹/BASE›
      %q(hi)
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Use `%Q` instead of `%q`.
    corrected: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    config:
      EnforcedStyle: $UNRESOLVED:upper_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_upper_case_q_without_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(hi)
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:upper_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_upper_case_q_without_interpolation_does_not_register_an_offense_when_correcting_leads_to_a_parsing_error
    source: |
      ‹BASE›0‹/BASE›
      %q(\u)
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:upper_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_upper_case_q_with_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %Q(#{1 + 2})
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:upper_case_q
    interpolated: true
    verified: false

  - name: rubocop_cop_style_percentqliterals_when_enforcedstyle_is_upper_case_q_with_interpolation_accepts_q
    source: |
      ‹BASE›0‹/BASE›
      %q(#{1 + 2})
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:upper_case_q
    interpolated: true
    verified: false
