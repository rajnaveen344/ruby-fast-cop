cop = "Style/IpAddresses"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleipaddresses_does_not_register_an_offense_on_an_empty_string"
strip_trailing_newline = true
source = '''
''
'''
offenses = []

[tests.config]
AllowedAddresses = ["::"]
Exclude = ["/private/tmp/rubocop-repo/**/*.gemfile", "/private/tmp/rubocop-repo/**/Gemfile", "/private/tmp/rubocop-repo/**/gems.rb", "/private/tmp/rubocop-repo/**/*.gemspec"]

[[tests]]
name = "rubocopcopstyleipaddresses_ipv4_registers_an_offense_for_a_valid_address"
source = '''
'255.255.255.255'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Do not hardcode IP addresses."

[tests.config]
AllowedAddresses = ["::"]
Exclude = ["/private/tmp/rubocop-repo/**/*.gemfile", "/private/tmp/rubocop-repo/**/Gemfile", "/private/tmp/rubocop-repo/**/gems.rb", "/private/tmp/rubocop-repo/**/*.gemspec"]

