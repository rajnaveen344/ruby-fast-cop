cop: Style/Encoding
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_encoding_does_not_register_an_offense_when_no_encoding_present
    source: |
      def foo() end
    offenses:
      []

  - name: rubocop_cop_style_encoding_does_not_register_an_offense_when_encoding_present_but_not_utf_8
    source: |
      ‹BASE›0‹/BASE›
      # encoding: us-ascii
      def foo() end
    offenses:
      []

  - name: rubocop_cop_style_encoding_does_not_register_an_offense_on_a_different_magic_comment_type
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      def foo() end
    offenses:
      []

  - name: rubocop_cop_style_encoding_registers_an_offense_when_encoding_present_and_utf_8
    source: |
      ‹BASE›0‹/BASE›
      # encoding: utf-8
      def foo() end
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      def foo() end

  - name: rubocop_cop_style_encoding_registers_an_offense_when_magic_encoding_with_mixed_case_present
    source: |
      ‹BASE›0‹/BASE›
      # Encoding: UTF-8
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Unnecessary utf-8 encoding comment.
    corrected: |

  - name: rubocop_cop_style_encoding_registers_an_offense_when_encoding_present_on_2nd_line_after_shebang
    source: |
      ‹BASE›0‹/BASE›
      #!/usr/bin/env ruby
      # encoding: utf-8
      def foo() end
    offenses:
      - line: 2
        column_start: 0
        column_end: 17
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      ‹BASE›0‹/BASE›
      #!/usr/bin/env ruby
      def foo() end

  - name: rubocop_cop_style_encoding_registers_an_offense_and_corrects_if_there_are_multiple_encoding_magic_comments
    source: |
      ‹BASE›0‹/BASE›
      # encoding: utf-8
      # coding: utf-8
      def foo() end
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Unnecessary utf-8 encoding comment.
      - line: 2
        column_start: 0
        column_end: 15
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      def foo() end

  - name: rubocop_cop_style_encoding_registers_an_offense_and_corrects_the_magic_comment_follows_another_magic_comment
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      # encoding: utf-8
      def foo() end
    offenses:
      - line: 2
        column_start: 0
        column_end: 17
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      def foo() end

  - name: rubocop_cop_style_encoding_does_not_register_an_offense_when_encoding_is_not_at_the_top_of_the_file
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      
      # encoding: utf-8
      def foo() end
    offenses:
      []

  - name: rubocop_cop_style_encoding_does_not_register_an_offense_when_encoding_is_in_the_wrong_place
    source: |
      ‹BASE›0‹/BASE›
      def foo() end
      # encoding: utf-8
    offenses:
      []

  - name: rubocop_cop_style_encoding_vim_comments_registers_an_offense_and_corrects
    source: |
      ‹BASE›0‹/BASE›
      # vim:filetype=ruby, fileencoding=utf-8
      def foo() end
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      ‹BASE›0‹/BASE›
      # vim: filetype=ruby
      def foo() end

  - name: rubocop_cop_style_encoding_emacs_comment_registers_an_offense_for_encoding
    source: |
      ‹BASE›0‹/BASE›
      # -*- encoding : utf-8 -*-
      def foo() 'ä' end
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      def foo() 'ä' end

  - name: rubocop_cop_style_encoding_emacs_comment_only_removes_encoding_if_there_are_other_editor_comments
    source: |
      ‹BASE›0‹/BASE›
      # -*- encoding : utf-8; mode: enh-ruby -*-
      def foo() 'ä' end
    offenses:
      - line: 1
        column_start: 0
        column_end: 42
        message: Unnecessary utf-8 encoding comment.
    corrected: |
      ‹BASE›0‹/BASE›
      # -*- mode: enh-ruby -*-
      def foo() 'ä' end
