cop: Style/OptionalArguments
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_optionalarguments_registers_an_offense_when_an_optional_argument_is_followed_by_a_required_argument
    source: |
      def foo(a = 1, b)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 13
        message: Optional arguments should appear at the end of the argument list.

  - name: rubocop_cop_style_optionalarguments
    source: |
      def foo(a = 1, b = 2, c)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 13
        message: Optional arguments should appear at the end of the argument list.
      - line: 1
        column_start: 15
        column_end: 20
        message: Optional arguments should appear at the end of the argument list.

  - name: rubocop_cop_style_optionalarguments_allows_methods_without_arguments
    source: |
      def foo
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_allows_methods_with_only_one_required_argument
    source: |
      def foo(a)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_allows_methods_with_only_required_arguments
    source: |
      def foo(a, b, c)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_allows_methods_with_only_one_optional_argument
    source: |
      def foo(a = 1)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_allows_methods_with_only_optional_arguments
    source: |
      def foo(a = 1, b = 2, c = 3)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_allows_methods_with_multiple_optional_arguments_at_the_end
    source: |
      def foo(a, b = 2, c = 3)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_named_params_with_default_values_allows_optional_arguments_before_an_optional_named_argument
    source: |
      def foo(a = 1, b: 2)
      end
    offenses:
      []

  - name: rubocop_cop_style_optionalarguments_named_params_required_params
    source: |
      def foo(a = 1, b, c:, d: 4)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 13
        message: Optional arguments should appear at the end of the argument list.
    ruby_version: ">= 2.1"

  - name: rubocop_cop_style_optionalarguments_named_params_required_params_allows_optional_arguments_before_required_named_arguments
    source: |
      def foo(a = 1, b:)
      end
    offenses:
      []
    ruby_version: ">= 2.1"

  - name: rubocop_cop_style_optionalarguments_named_params_required_params_allows_optional_arguments_to_come_before_a_mix_of_required_and_optional_named_argument
    source: |
      def foo(a = 1, b:, c: 3)
      end
    offenses:
      []
    ruby_version: ">= 2.1"
