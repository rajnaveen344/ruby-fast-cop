[[tests]]
name = "rubocopcopstyleselectbyrange_when_ruby__34_behaves_like_range_check_with_itblocks_registers_an_offense_and_corrects_for_between"
ruby_version = ">= 3.4"
source = '''
array.select { it.between?(1, 10) }
'''
corrected = '''
array.grep(1..10)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 35
message = "Prefer `grep` to `select` with a range check."

