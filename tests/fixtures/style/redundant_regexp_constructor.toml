cop = "Style/RedundantRegexpConstructor"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantregexpconstructor_registers_an_offense_when_wrapping_regexp_with_regexpnew"
source = '''
Regexp.new(/regexp/)
'''
corrected = '''
/regexp/
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Remove the redundant `Regexp.new`."

