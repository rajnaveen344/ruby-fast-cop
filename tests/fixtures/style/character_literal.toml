cop = "Style/CharacterLiteral"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylecharacterliteral_registers_an_offense_for_character_literals"
source = '''
x = ?x
'''
corrected = '''
x = 'x'
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 6
message = "Do not use the character literal - use string literal instead."

[[tests]]
name = "rubocopcopstylecharacterliteral_registers_an_offense_for_literals_like_n"
source = '''
x = ?\n
'''
corrected = '''
x = "\n"
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Do not use the character literal - use string literal instead."

[[tests]]
name = "rubocopcopstylecharacterliteral_accepts_literals_like_cmd"
strip_trailing_newline = true
source = '''
x = ?\C-\M-d
'''
offenses = []

[[tests]]
name = "rubocopcopstylecharacterliteral_accepts__in_a_w_literal"
strip_trailing_newline = true
source = '''
%w{? A}
'''
offenses = []

[[tests]]
name = "rubocopcopstylecharacterliteral_autocorrects__to_"
source = '''
x = ?'
'''
corrected = '''
x = "'"
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 6
message = "Do not use the character literal - use string literal instead."
