      "foo" == bar
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Reverse the order of the operands `\"foo\" == bar`."
    corrected: |
      bar == "foo"
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

