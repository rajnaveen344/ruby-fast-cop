  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_interpolated_regex_on_left
    source: |
      /#{interpolation}/ == foo
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_accessor_and_variable_on_left_in_boolean_expression
    source: |
