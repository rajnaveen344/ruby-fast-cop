cop: Style/YodaCondition
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_method_call_on_receiver_on_left
    source: |
      b.value == 2
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_safe_navigation_on_left
    source: |
      b&.value == 2
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_instance_variable_on_left
    source: |
      @value == 2
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_class_variable_on_left
    source: |
      @@value == 2
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_variable_on_left_after_assign
    source: |
      b = 1; b == 2
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_global_variable_on_left
    source: |
      $var == 5
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_string_literal_on_right
    source: |
      foo == "bar"
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_constant_on_right
    source: |
      foo == BAR
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_interpolated_string_on_left
    source: |
      "#{interpolation}" == foo
