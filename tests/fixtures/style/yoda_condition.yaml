    source: |
      (first_line - second_line) > 0
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

  - name: rubocop_cop_style_yodacondition_enforce_not_yoda_accepts_number_on_both_sides
    source: |
      5 == 6
    offenses:
      []
    config:
      EnforcedStyle: forbid_for_all_comparison_operators

