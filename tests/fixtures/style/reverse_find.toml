cop = "Style/ReverseFind"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_reversefind_when_ruby_4_0_registers_an_offense_when_using_reverse_find_with_block"
source = '''
array.reverse.find { |item| item.even? }
'''
corrected = '''
array.rfind { |item| item.even? }
'''
ruby_version = ">= 4.0"

[[tests.offenses]]
line = 1
column_start = 6
column_end = 18
message = "Use `rfind` instead."

