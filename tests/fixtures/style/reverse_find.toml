cop = "Style/ReverseFind"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylereversefind_when_ruby__40_registers_an_offense_when_using_reversefind_with_block"
ruby_version = ">= 4.0"
source = '''
array.reverse.find { |item| item.even? }
'''
corrected = '''
array.rfind { |item| item.even? }
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 18
message = "Use `rfind` instead."

