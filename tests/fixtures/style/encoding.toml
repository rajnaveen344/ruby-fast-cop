def foo() end
'''
corrected = '''
# vim: filetype=ruby
def foo() end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 39
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_emacs_comment_registers_an_offense_for_encoding"
source = '''
# -*- encoding : utf-8 -*-
def foo() 'ä' end
'''
corrected = '''
def foo() 'ä' end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 26
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_emacs_comment_only_removes_encoding_if_there_are_other_editor_comments"
source = '''
# -*- encoding : utf-8; mode: enh-ruby -*-
def foo() 'ä' end
'''
corrected = '''
# -*- mode: enh-ruby -*-
def foo() 'ä' end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 42
message = "Unnecessary utf-8 encoding comment."
