cop = "Style/Encoding"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleencoding_does_not_register_an_offense_when_no_encoding_present"
source = '''
def foo() end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleencoding_does_not_register_an_offense_when_encoding_present_but_not_utf8"
source = '''
# encoding: us-ascii
def foo() end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleencoding_does_not_register_an_offense_on_a_different_magic_comment_type"
source = '''
# frozen_string_literal: true
def foo() end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleencoding_registers_an_offense_when_encoding_present_and_utf8"
source = '''
# encoding: utf-8
def foo() end
'''
corrected = '''
def foo() end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_registers_an_offense_when_magic_encoding_with_mixed_case_present"
source = '''
# Encoding: UTF-8
'''
corrected = '''

'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_registers_an_offense_when_encoding_present_on_2nd_line_after_shebang"
source = '''
#!/usr/bin/env ruby
# encoding: utf-8
def foo() end
'''
corrected = '''
#!/usr/bin/env ruby
def foo() end
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 17
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_registers_an_offense_and_corrects_if_there_are_multiple_encoding_magic_comments"
source = '''
# encoding: utf-8
# coding: utf-8
def foo() end
'''
corrected = '''
def foo() end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Unnecessary utf-8 encoding comment."

[[tests.offenses]]
line = 2
column_start = 0
column_end = 15
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_registers_an_offense_and_corrects_the_magic_comment_follows_another_magic_comment"
source = '''
# frozen_string_literal: true
# encoding: utf-8
def foo() end
'''
corrected = '''
# frozen_string_literal: true
def foo() end
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 17
message = "Unnecessary utf-8 encoding comment."

[[tests]]
name = "rubocopcopstyleencoding_does_not_register_an_offense_when_encoding_is_not_at_the_top_of_the_file"
source = '''
# frozen_string_literal: true

# encoding: utf-8
def foo() end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleencoding_does_not_register_an_offense_when_encoding_is_in_the_wrong_place"
source = '''
