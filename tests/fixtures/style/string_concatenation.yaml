cop: Style/StringConcatenation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_stringconcatenation_registers_an_offense_and_corrects_for_string_concatenation
    source: |
      email_with_name = user.name + ' <' + user.email + '>'
    offenses:
      - line: 1
        column_start: 18
        column_end: 53
        message: Prefer string interpolation to string concatenation.
    corrected: |
      email_with_name = "#{user.name} <#{user.email}>"

  - name: rubocop_cop_style_stringconcatenation_registers_an_offense_and_corrects_for_string_concatenation_as_part_of_other_expression
    source: |
      users = (user.name + ' ' + user.email) * 5
    offenses:
      - line: 1
        column_start: 9
        column_end: 37
        message: Prefer string interpolation to string concatenation.
    corrected: |
      users = ("#{user.name} #{user.email}") * 5

  - name: rubocop_cop_style_stringconcatenation_correctly_handles_strings_with_special_characters
    source: |
      email_with_name = "\n" + user.name + ' ' + user.email + '\n'
    offenses:
      - line: 1
        column_start: 18
        column_end: 60
        message: Prefer string interpolation to string concatenation.
    corrected: |
      email_with_name = "\n#{user.name} #{user.email}\\n"

  - name: rubocop_cop_style_stringconcatenation_correctly_handles_nested_concatenatable_parts
    source: |
      (user.vip? ? greeting + ', ' : '') + user.name + ' <' + user.email + '>'
    offenses:
      - line: 1
        column_start: 0
        column_end: 72
        message: Prefer string interpolation to string concatenation.
      - line: 1
        column_start: 13
        column_end: 28
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "#{user.vip? ? "#{greeting}, " : ''}#{user.name} <#{user.email}>"

  - name: rubocop_cop_style_stringconcatenation_correctly_handles_nested_concatenatable_parts_and_escaped_double_quotes
    source: |
      "foo" + "\"#{bar}\"" + 'baz'
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo\"#{bar}\"baz"

  - name: rubocop_cop_style_stringconcatenation_correctly_handles_nested_concatenatable_parts_and_escaped_single_quotes
    source: |
      "foo" + "\'#{bar}\'" + 'baz'
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo'#{bar}'baz"

  - name: rubocop_cop_style_stringconcatenation_does_not_register_an_offense_when_using_with_all_non_string_arguments
    source: |
      user.name + user.email
    offenses:
      []

  - name: rubocop_cop_style_stringconcatenation_implicit_concatenation_registers_an_offense_and_corrects_with_implicit_concatenation_at_the_end
    source: |
      "a" + "b" "c"
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "abc"

  - name: rubocop_cop_style_stringconcatenation_implicit_concatenation_registers_an_offense_and_corrects_with_implicit_concatenation_at_the_start
    source: |
      "a" "b" + "c"
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "abc"

  - name: rubocop_cop_style_stringconcatenation_implicit_concatenation_registers_an_offense_and_corrects_with_implicit_concatenation_at_the_middle
    source: |
      "a" + "b" "c" + "d"
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "abcd"

  - name: rubocop_cop_style_stringconcatenation_implicit_concatenation_registers_an_offense_and_corrects_with_string_interpolation
    source: |
      "string #{interpolation}" 'foo' + 'bar'
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "string #{interpolation}foobar"

  - name: rubocop_cop_style_stringconcatenation_multiline_string_continuation_does_not_register_an_offense
    source: |
      "this is a long string " +
        "this is a continuation"
    offenses:
      []

  - name: rubocop_cop_style_stringconcatenation_multiline_simple_expressions_registers_an_offense_and_corrects
    source: |
      email_with_name = user.name +
        ' ' +
        user.email +
        '\n'
    offenses:
      - line: 1
        column_start: 18
        column_end: 29
        message: Prefer string interpolation to string concatenation.
    corrected: |
      email_with_name = "#{user.name} #{user.email}\\n"

  - name: rubocop_cop_style_stringconcatenation_multiline_if_condition_registers_an_offense_but_does_not_correct
    source: |
      "result:" + if condition
        "true"
      else
        "false"
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_multiline_multiline_block_registers_an_offense_but_does_not_correct
    source: |
      '(' + values.map do |v|
          v.titleize
      end.join(', ') + ')'
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_nested_interpolation_registers_an_offense_and_corrects
    source: |
      "foo" + "bar: #{baz}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foobar: #{baz}"

  - name: rubocop_cop_style_stringconcatenation_inline_block_registers_an_offense_but_does_not_correct
    source: |
      '(' + values.map { |v| v.titleize }.join(', ') + ')'
    offenses:
      - line: 1
        column_start: 0
        column_end: 52
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_inline_block_registers_an_offense_but_does_not_correct_for_numblocks
    source: |
      '(' + values.map { _1.titleize }.join(', ') + ')'
    offenses:
      - line: 1
        column_start: 0
        column_end: 49
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_heredoc_registers_an_offense_but_does_not_correct
    source: |
      "foo" + <<~STR
        text
      STR
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_heredoc_registers_an_offense_but_does_not_correct_when_string_concatenation_with_multiline_heredoc_text
    source: |
      "foo" + <<~TEXT
        bar
        baz
      TEXT
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Prefer string interpolation to string concatenation.

  - name: rubocop_cop_style_stringconcatenation_double_quotes_inside_string_registers_an_offense_and_corrects_with_double_quotes
    source: |
      email_with_name = "He said " + "\"Arrest that man!\"."
    offenses:
      - line: 1
        column_start: 18
        column_end: 54
        message: Prefer string interpolation to string concatenation.
    corrected: |
      email_with_name = "He said \"Arrest that man!\"."

  - name: rubocop_cop_style_stringconcatenation_double_quotes_inside_string_registers_an_offense_and_corrects_with_percentage_quotes
    source: |
      email_with_name = %(He said ) + %("Arrest that man!".)
    offenses:
      - line: 1
        column_start: 18
        column_end: 54
        message: Prefer string interpolation to string concatenation.
    corrected: |
      email_with_name = "He said \"Arrest that man!\"."

  - name: rubocop_cop_style_stringconcatenation_empty_quotes_registers_an_offense_and_corrects
    source: |
      '"' + "foo" + '"'
      '"' + "foo" + "'"
      "'" + "foo" + '"'
      "'" + "foo" + '"' + "bar"
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Prefer string interpolation to string concatenation.
      - line: 2
        column_start: 0
        column_end: 17
        message: Prefer string interpolation to string concatenation.
      - line: 3
        column_start: 0
        column_end: 17
        message: Prefer string interpolation to string concatenation.
      - line: 4
        column_start: 0
        column_end: 25
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "\"foo\""
      "\"foo'"
      "'foo\""
      "'foo\"bar"

  - name: rubocop_cop_style_stringconcatenation_double_quotes_inside_string_surrounded_single_quotes_registers_an_offense_and_corrects_with_double_quotes
    source: |
      '"bar"' + foo
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "\"bar\"#{foo}"

  - name: rubocop_cop_style_stringconcatenation_characters_for_interpolation_inside_single_quotes_registers_an_offense_for
    source: |
      "foo" + '#{bar}'
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo\#{bar}"

  - name: rubocop_cop_style_stringconcatenation_characters_for_interpolation_inside_single_quotes_registers_an_offense_for
    source: |
      "foo" + '#@bar'
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo\#@bar"

  - name: rubocop_cop_style_stringconcatenation_characters_for_interpolation_inside_single_quotes_registers_an_offense_for
    source: |
      "foo" + '#@@bar'
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo\#@@bar"

  - name: rubocop_cop_style_stringconcatenation_characters_for_interpolation_inside_single_quotes_registers_an_offense_for
    source: |
      "foo" + '#$bar'
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "foo\#$bar"

  - name: rubocop_cop_style_stringconcatenation_mode_conservative_when_first_operand_is_not_string_literal_does_not_register_offense
    source: |
      user.name + "!!"
      user.name + "<"
      user.name + "<" + "user.email" + ">"
    offenses:
      []
    config:
      Mode: conservative

  - name: rubocop_cop_style_stringconcatenation_mode_conservative_when_first_operand_is_string_literal_registers_an_offense
    source: |
      "Hello " + user.name
      "Hello " + user.name + "!!"
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Prefer string interpolation to string concatenation.
      - line: 2
        column_start: 0
        column_end: 27
        message: Prefer string interpolation to string concatenation.
    corrected: |
      "Hello #{user.name}"
      "Hello #{user.name}!!"
    config:
      Mode: conservative
