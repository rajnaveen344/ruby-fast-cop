cop = "Style/LambdaCall"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylelambdacall_when_style_is_set_to_call_registers_an_offense_for_x"
source = '''
x.(a, b)
'''
corrected = '''
x.call(a, b)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Prefer the use of `x.call(a, b)` over `x.(a, b)`."

[tests.config]
EnforcedStyle = "call"

