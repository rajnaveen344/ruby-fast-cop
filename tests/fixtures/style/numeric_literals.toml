cop = "Style/NumericLiterals"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylenumericliterals_registers_an_offense_for_a_long_undelimited_integer"
source = '''
a = 12345
'''
corrected = '''
a = 12_345
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 9
message = "Use underscores(_) as thousands separator and separate every 3 digits with them."

[tests.config]
AllowedNumbers = []
AllowedPatterns = []
MinDigits = 5
Strict = false

