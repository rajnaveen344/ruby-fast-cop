cop: Style/KeywordParametersOrder
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_keywordparametersorder_registers_an_offense_and_corrects_when_kwoptarg_is_before_kwarg
    source: |
      def m(arg, optional: 1, required:)
      end
    offenses:
      - line: 1
        column_start: 11
        column_end: 22
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m(arg, required:, optional: 1)
      end

  - name: rubocop_cop_style_keywordparametersorder_registers_an_offense_and_corrects_when_kwoptarg_is_before_kwarg_and_argument_parentheses_omitted
    source: |
      def m arg, optional: 1, required:
        do_something
      end
    offenses:
      - line: 1
        column_start: 11
        column_end: 22
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m arg, required:, optional: 1
        do_something
      end

  - name: rubocop_cop_style_keywordparametersorder_registers_an_offense_and_corrects_when_multiple_kwoptarg_are_before_kwarg_and_argument_parentheses_omitted
    source: |
      def m arg, optional1: 1, optional2: 2, required:
        do_something
      end
    offenses:
      - line: 1
        column_start: 25
        column_end: 37
        message: Place optional keyword parameters at the end of the parameters list.
      - line: 1
        column_start: 11
        column_end: 23
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m arg, required:, optional1: 1, optional2: 2
        do_something
      end

  - name: rubocop_cop_style_keywordparametersorder_registers_an_offense_and_corrects_when_multiple_kwoptarg_s_are_interleaved_with_kwarg_s
    source: |
      def m(arg, optional1: 1, required1:, optional2: 2, required2:, **rest, &block)
      end
    offenses:
      - line: 1
        column_start: 11
        column_end: 23
        message: Place optional keyword parameters at the end of the parameters list.
      - line: 1
        column_start: 37
        column_end: 49
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m(arg, required1:, required2:, optional1: 1, optional2: 2, **rest, &block)
      end

  - name: rubocop_cop_style_keywordparametersorder
    source: |
      def m arg, optional1: 1, required1:, optional2: 2, required2:, **rest
        do_something
      end
    offenses:
      - line: 1
        column_start: 11
        column_end: 23
        message: Place optional keyword parameters at the end of the parameters list.
      - line: 1
        column_start: 37
        column_end: 49
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m arg, required1:, required2:, optional1: 1, optional2: 2, **rest
        do_something
      end

  - name: rubocop_cop_style_keywordparametersorder
    source: |
      def m arg, optional1: 1, required1:, optional2: 2, required2:, **rest, &block
        do_something
      end
    offenses:
      - line: 1
        column_start: 11
        column_end: 23
        message: Place optional keyword parameters at the end of the parameters list.
      - line: 1
        column_start: 37
        column_end: 49
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      def m arg, required1:, required2:, optional1: 1, optional2: 2, **rest, &block
        do_something
      end

  - name: rubocop_cop_style_keywordparametersorder_registers_an_offense_but_does_not_autocorrect_when_the_argument_range_contains_comments
    source: |
      def foo(optional: 123,
          # Some explanation
          required:)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 21
        message: Place optional keyword parameters at the end of the parameters list.

  - name: rubocop_cop_style_keywordparametersorder_does_not_register_an_offense_when_there_are_no_kwoptarg_s_before_kwarg_s
    source: |
      def m(arg, required:, optional: 1)
      end
    offenses:
      []

  - name: rubocop_cop_style_keywordparametersorder_when_using_block_keyword_parameters_registers_an_offense_and_corrects_when_kwoptarg_is_before_kwarg
    source: |
      m(arg) do |block_arg, optional: 1, required:|
      end
    offenses:
      - line: 1
        column_start: 22
        column_end: 33
        message: Place optional keyword parameters at the end of the parameters list.
    corrected: |
      m(arg) do |block_arg, required:, optional: 1|
      end

  - name: rubocop_cop_style_keywordparametersorder_when_using_block_keyword_parameters_does_not_register_an_offense_when_there_are_no_kwoptarg_s_before_kwarg_s
    source: |
      m(arg) do |block_arg, required:, optional: 1|
      end
    offenses:
      []
