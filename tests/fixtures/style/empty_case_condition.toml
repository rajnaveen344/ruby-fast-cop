cop = "Style/EmptyCaseCondition"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleemptycasecondition_given_a_case_statement_with_an_empty_case_with_multiple_when_branches_and_an_else_behaves_like_detectcorrect_empty_case_accept_nonempty_case_registers_an_offense_and_autocorrects"
source = '''
case
when 1 == 2
  foo
when 1 == 1
  bar
else
  baz
end
'''
corrected = '''
if 1 == 2
  foo
elsif 1 == 1
  bar
else
  baz
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Do not use empty `case` condition, instead use an `if` expression."

[[tests]]
name = "rubocopcopstyleemptycasecondition_given_a_case_statement_with_an_empty_case_with_multiple_when_branches_and_an_else_behaves_like_detectcorrect_empty_case_accept_nonempty_case_accepts_the_source_with_case"
source = '''
case :a
when 1 == 2
  foo
when 1 == 1
  bar
else
  baz
end
'''
offenses = []

[[tests]]
name = "rubocopcopstyleemptycasecondition_given_a_case_statement_with_an_empty_case_with_multiple_when_branches_and_an_else_with_code_comments_behaves_like_detectcorrect_empty_case_accept_nonempty_case_registers_an_offense_and_autocorrects"
source = '''
def example
  # Comment before everything
  case # first comment
  # condition a
  # This is a multi-line comment
  when 1 == 2
    foo
  # condition b
  when 1 == 1
    bar
  # condition c
  else
    baz
  end
end
'''
corrected = '''
def example
  # Comment before everything
  # first comment
  # condition a
  # This is a multi-line comment
  if 1 == 2
    foo
  # condition b
  elsif 1 == 1
    bar
  # condition c
  else
    baz
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 6
message = "Do not use empty `case` condition, instead use an `if` expression."

