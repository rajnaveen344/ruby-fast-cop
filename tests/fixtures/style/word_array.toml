[[tests]]
name = "rubocopcopstylewordarray_when_enforcedstyle_is_percent_registers_an_offense_for_arrays_of_single_quoted_strings"
source = '''
['one', 'two', 'three']
'''
corrected = '''
%w(one two three)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 23
message = "Use `%w` or `%W` for an array of words."

[tests.config]
EnforcedStyle = "percent"
MinSize = 0
WordRegex = "(?-mix:\\A(?:\\p{Word}|\\p{Word}-\\p{Word}|\\n|\\t)+\\z)"

