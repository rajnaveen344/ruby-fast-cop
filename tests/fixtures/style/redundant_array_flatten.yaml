cop: Style/RedundantArrayFlatten
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantarrayflatten_registers_an_offense_for_x_flatten_join
    source: |
      x.flatten.join
    offenses:
      - line: 1
        column_start: 1
        column_end: 9
        message: Remove the redundant `flatten`.
    corrected: |
      x.join

  - name: rubocop_cop_style_redundantarrayflatten_registers_an_offense_for_x_flatten_join_nil
    source: |
      x.flatten.join(nil)
    offenses:
      - line: 1
        column_start: 1
        column_end: 9
        message: Remove the redundant `flatten`.
    corrected: |
      x.join(nil)

  - name: rubocop_cop_style_redundantarrayflatten_registers_an_offense_for_x_flatten_depth_join
    source: |
      x.flatten(depth).join
    offenses:
      - line: 1
        column_start: 1
        column_end: 16
        message: Remove the redundant `flatten`.
    corrected: |
      x.join

  - name: rubocop_cop_style_redundantarrayflatten_registers_an_offense_for_x_flatten_join
    source: |
      x&.flatten&.join
    offenses:
      - line: 1
        column_start: 1
        column_end: 10
        message: Remove the redundant `flatten`.
    corrected: |
      x&.join

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_x_flatten_foo
    source: |
      x.flatten.foo
    offenses:
      []

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_x_flatten
    source: |
      x.flatten
    offenses:
      []

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_x_flatten_join_separator
    source: |
      x.flatten.join(separator)
    offenses:
      []

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_flatten_join_without_an_explicit_receiver
    source: |
      flatten.join
    offenses:
      []

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_x_flatten_depth_extra_arg_join
    source: |
      x.flatten(depth, extra_arg).join
    offenses:
      []

  - name: rubocop_cop_style_redundantarrayflatten_does_not_register_an_offense_for_x_flatten_join_separator_extra_arg
    source: |
      x.flatten.join(separator, extra_arg)
    offenses:
      []
