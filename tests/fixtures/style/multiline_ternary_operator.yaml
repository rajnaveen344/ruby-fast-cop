cop: Style/MultilineTernaryOperator
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_multilineternaryoperator
    source: |
      a = cond ?
        b : c
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a = if cond
        b
      else
        c
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_the_false_branch_is_on_a_separate_line_and_assigning_a_return_value
    source: |
      a = cond ? b :
          c
    offenses:
      - line: 1
        column_start: 4
        column_end: 14
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a = if cond
        b
      else
        c
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_the_false_branch_is_on_a_separate_line
    source: |
      cond ? b :
      c
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      if cond
        b
      else
        c
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_nesting_multiline_ternary_operators
    source: |
      cond_a? ? foo :
        cond_b? ? bar :
          cond_c? ? baz : qux
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
      - line: 2
        column_start: 2
        column_end: 17
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      if cond_a?
        foo
      else
        if cond_b?
        bar
      else
        cond_c? ? baz : qux
      end
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_everything_is_on_a_separate_line
    source: |
      a = cond ?
          b :
          c
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a = if cond
        b
      else
        c
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_condition_is_multiline
    source: |
      a =
        b ==
          c ? d : e
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a =
        if b ==
          c
        d
      else
        e
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_condition_is_multiline_and_using_hash_key_assignment
    source: |
      a[:a] =
        b ==
          c ? d : e
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a[:a] =
        if b ==
          c
        d
      else
        e
      end

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_condition_is_multiline_and_using_assignment_method
    source: |
      a.foo =
        b ==
          c ? d : e
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      a.foo =
        if b ==
          c
        d
      else
        e
      end

  - name: rubocop_cop_style_multilineternaryoperator
    source: |
      do_something(arg
                     .foo ? bar : baz)
    offenses:
      []

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_returning_a_multiline_ternary_operator_expression_with_return
    source: |
      return cond ?
             foo :
             bar
    offenses:
      - line: 1
        column_start: 7
        column_end: 13
        message: Avoid multi-line ternary operators, use single-line instead.
    corrected: |
      return cond ? foo : bar

  - name: rubocop_cop_style_multilineternaryoperator_ruby_3_2_registers_an_offense_and_corrects_when_returning_a_multiline_ternary_operator_expression_with_break
    source: |
      break cond ?
            foo :
            bar
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: Avoid multi-line ternary operators, use single-line instead.
    corrected: |
      break cond ? foo : bar
    ruby_version: ">= 3.2"

  - name: rubocop_cop_style_multilineternaryoperator_ruby_3_2_registers_an_offense_and_corrects_when_returning_a_multiline_ternary_operator_expression_with_next
    source: |
      next cond ?
           foo :
           bar
    offenses:
      - line: 1
        column_start: 5
        column_end: 11
        message: Avoid multi-line ternary operators, use single-line instead.
    corrected: |
      next cond ? foo : bar
    ruby_version: ">= 3.2"

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_returning_a_multiline_ternary_operator_expression_with_method_call
    source: |
      do_something cond ?
                   foo :
                   bar
    offenses:
      - line: 1
        column_start: 13
        column_end: 19
        message: Avoid multi-line ternary operators, use single-line instead.
    corrected: |
      do_something cond ? foo : bar

  - name: rubocop_cop_style_multilineternaryoperator_registers_an_offense_and_corrects_when_returning_a_multiline_ternary_operator_expression_with_safe_navigation_method_call
    source: |
      obj&.do_something cond ?
                        foo :
                        bar
    offenses:
      - line: 1
        column_start: 18
        column_end: 24
        message: Avoid multi-line ternary operators, use single-line instead.
    corrected: |
      obj&.do_something cond ? foo : bar

  - name: rubocop_cop_style_multilineternaryoperator_accepts_a_single_line_ternary_operator_expression
    source: |
      a = cond ? b : c
    offenses:
      []

  - name: rubocop_cop_style_multilineternaryoperator
    source: |
      # comment a
      a = cond ?
        b : c # comment b
      # comment c
    offenses:
      - line: 2
        column_start: 4
        column_end: 10
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      # comment a
      a = if cond
        b
      else
        c
      end # comment b
      # comment c

  - name: rubocop_cop_style_multilineternaryoperator
    source: |
      a = cond ? # comment a
        # comment b
        b : c
      
      a = cond ?
        b : # comment
        c
      
      a = cond ? b : # comment
        c
    offenses:
      - line: 1
        column_start: 4
        column_end: 22
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
      - line: 5
        column_start: 4
        column_end: 10
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
      - line: 9
        column_start: 4
        column_end: 24
        message: Avoid multi-line ternary operators, use `if` or `unless` instead.
    corrected: |
      # comment a
      # comment b
      a = if cond
        b
      else
        c
      end
      
      # comment
      a = if cond
        b
      else
        c
      end
      
      # comment
      a = if cond
        b
      else
        c
      end
