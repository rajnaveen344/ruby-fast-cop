cop: Style/Dir
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_dir_when_using_expand_path_and_dirname_registers_an_offense
    source: |
      File.expand_path(File.dirname(__FILE__))
    offenses:
      - line: 1
        column_start: 0
        column_end: 40
        message: "Use `__dir__` to get an absolute path to the current file's directory."
    corrected: |
      __dir__

  - name: rubocop_cop_style_dir_when_using_expand_path_and_dirname_registers_an_offense_with_file
    source: |
      ::File.expand_path(::File.dirname(__FILE__))
    offenses:
      - line: 1
        column_start: 0
        column_end: 44
        message: "Use `__dir__` to get an absolute path to the current file's directory."
    corrected: |
      __dir__

  - name: rubocop_cop_style_dir_when_using_dirname_and_realpath_registers_an_offense
    source: |
      File.dirname(File.realpath(__FILE__))
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Use `__dir__` to get an absolute path to the current file's directory."
    corrected: |
      __dir__

  - name: rubocop_cop_style_dir_when_using_dirname_and_realpath_registers_an_offense_with_file
    source: |
      ::File.dirname(::File.realpath(__FILE__))
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: "Use `__dir__` to get an absolute path to the current file's directory."
    corrected: |
      __dir__
