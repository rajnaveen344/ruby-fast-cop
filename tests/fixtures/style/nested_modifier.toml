cop = "Style/NestedModifier"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenestedmodifier_autocorrects_if__if"
source = '''
something if a if b
'''
corrected = '''
something if b && a
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 12
message = "Avoid using nested modifiers."

[[tests]]
name = "rubocopcopstylenestedmodifier_autocorrects_unless__unless"
source = '''
something unless a unless b
'''
corrected = '''
something unless b || a
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 16
message = "Avoid using nested modifiers."

[[tests]]
name = "rubocopcopstylenestedmodifier_autocorrects_if__unless"
