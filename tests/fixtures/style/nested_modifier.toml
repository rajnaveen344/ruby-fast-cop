cop = "Style/NestedModifier"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_nestedmodifier"
source = '''
something if a %{keyword} b
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 12
message = "Avoid using nested modifiers."

[[tests]]
name = "rubocop_cop_style_nestedmodifier"
source = '''
something %{keyword} a if b
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 27
message = "Avoid using nested modifiers."

[[tests]]
name = "rubocop_cop_style_nestedmodifier_autocorrects_if_if"
source = '''
something if a if b
'''
corrected = '''
