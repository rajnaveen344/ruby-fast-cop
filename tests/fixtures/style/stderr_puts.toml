cop = "Style/StderrPuts"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylestderrputs_registers_an_offense_when_using_stderrputshello"
source = '''
$stderr.puts('hello')
'''
corrected = '''
warn('hello')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 12
message = "Use `warn` instead of `$stderr.puts` to allow such output to be disabled."

[[tests]]
name = "rubocopcopstylestderrputs_registers_no_offense_when_using_stderrputs_with_no_arguments"
source = '''
$stderr.puts
'''
offenses = []

