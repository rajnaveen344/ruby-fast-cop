cop = "Style/RedundantException"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantexception_registers_an_offense_for_raise_with_runtimeerror_message"
source = '''
raise RuntimeError, "#{message}"
'''
corrected = '''
raise "#{message}"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 32
message = "Redundant `RuntimeError` argument can be removed."

[[tests]]
name = "rubocopcopstyleredundantexception_registers_an_offense_for_raise_with_runtimeerror_command"
source = '''
raise RuntimeError, `command`
'''
corrected = '''
raise `command`
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 29
message = "Redundant `RuntimeError` argument can be removed."

