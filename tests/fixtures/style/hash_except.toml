cop = "Style/HashExcept"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylehashexcept_ruby_30_or_higher_registers_and_corrects_an_offense_when_using_reject_and_comparing_with_lvar__sym"
source = '''
{foo: 1, bar: 2, baz: 3}.reject { |k, v| k == :bar }
'''
corrected = '''
{foo: 1, bar: 2, baz: 3}.except(:bar)
'''

[[tests.offenses]]
line = 1
column_start = 25
column_end = 52
message = "Use `except(:bar)` instead."

[[tests]]
name = "rubocopcopstylehashexcept_ruby_30_or_higher_registers_and_corrects_an_offense_when_using_safe_navigation_reject_call_and_comparing_with_lvar__sym"
