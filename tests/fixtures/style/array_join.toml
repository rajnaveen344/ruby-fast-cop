cop = "Style/ArrayJoin"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylearrayjoin_registers_an_offense_for_an_array_followed_by_string"
source = '''
%w(one two three) * ", "
'''
corrected = '''
%w(one two three).join(", ")
'''

[[tests.offenses]]
line = 1
column_start = 18
column_end = 19
message = "Favor `Array#join` over `Array#*`."

[[tests]]
name = "rubocopcopstylearrayjoin_autocorrects__to_join_when_there_are_no_spaces"
source = '''
%w(one two three)*", "
'''
corrected = '''
%w(one two three).join(", ")
'''

[[tests.offenses]]
line = 1
