cop = "Style/HashAsLastArrayItem"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylehashaslastarrayitem_when_enforcedstyle_is_braces_registers_an_offense_and_corrects_when_hash_without_braces"
source = '''
[1, 2, one: 1, two: 2]
'''
corrected = '''
[1, 2, {one: 1, two: 2}]
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 21
message = "Wrap hash in `{` and `}`."

[tests.config]
EnforcedStyle = "braces"

[[tests]]
name = "rubocopcopstylehashaslastarrayitem_when_enforcedstyle_is_braces_registers_an_offense_and_corrects_when_the_singleline_array_contains_only_hash_elements_without_braces"
source = '''
