cop = "Style/RedundantFilterChain"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_redundantfilterchain"
source = '''
arr.%{method} { |x| x > 1 }.any?
'''
corrected = '''
arr.any? { |x| x > 1 }
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 4
column_end = 32
message = "Use `any?` instead of `#{method}.any?`."

