cop = "Style/RedundantFilterChain"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleredundantfilterchain_registers_an_offense_when_using_select_followed_by_any"
source = '''
arr.select { |x| x > 1 }.any?
'''
corrected = '''
arr.any? { |x| x > 1 }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 29
message = "Use `any?` instead of `select.any?`."

[[tests]]
name = "rubocopcopstyleredundantfilterchain_registers_an_offense_when_using_select_followed_by_empty"
source = '''
arr.select { |x| x > 1 }.empty?
'''
corrected = '''
arr.none? { |x| x > 1 }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 31
message = "Use `none?` instead of `select.empty?`."

[[tests]]
