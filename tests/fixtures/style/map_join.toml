cop = "Style/MapJoin"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemapjoin_with_mapto_sjoin_registers_an_offense_and_corrects"
source = '''
array.map(&:to_s).join(', ')
'''
corrected = '''
array.join(', ')
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "Remove redundant `map(&:to_s)` before `join`."

