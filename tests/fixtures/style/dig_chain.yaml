cop: Style/DigChain
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_unchained_dig_without_a_receiver
    source: |
      dig
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_x_dig
    source: |
      X::dig(:foo, :bar)
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_dig_chained_to_something_else
    source: |
      x.dig(:foo).bar
      x.bar.dig(:foo)
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_when_the_chain_is_broken_up
    source: |
      x.dig(:foo).first.dig(:bar)
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_dig_without_arguments
    source: |
      x.dig
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_chained_dig_without_arguments
    source: |
      x.dig(:foo, :bar).dig
      x.dig.dig(:foo, :bar)
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_a_hash
    source: |
      x.dig({ foo: 1, bar: 2 }).dig({ baz: 3, quux: 4 })
    offenses:
      []

  - name: rubocop_cop_style_digchain_does_not_register_an_offense_for_kwargs
    source: |
      x.dig(foo: 1, bar: 2).dig(baz: 3, quux: 4)
    offenses:
      []

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_single_values
    source: |
      x.dig(:foo).dig(:bar).dig(:baz)
    offenses:
      - line: 1
        column_start: 2
        column_end: 31
        message: "Use `dig(:foo, :bar, :baz)` instead of chaining."
    corrected: |
      x.dig(:foo, :bar, :baz)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_when_attached_to_a_chain_of_non_dig_receivers
    source: |
      x.y.z.dig(:foo).dig(:bar).dig(:baz)
    offenses:
      - line: 1
        column_start: 6
        column_end: 35
        message: "Use `dig(:foo, :bar, :baz)` instead of chaining."
    corrected: |
      x.y.z.dig(:foo, :bar, :baz)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_multiple_values
    source: |
      x.dig(:foo, :bar).dig(:baz, :quux)
    offenses:
      - line: 1
        column_start: 2
        column_end: 34
        message: "Use `dig(:foo, :bar, :baz, :quux)` instead of chaining."
    corrected: |
      x.dig(:foo, :bar, :baz, :quux)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_safe_navigation
    source: |
      x.dig(:foo, :bar)&.dig(:baz, :quux)
    offenses:
      - line: 1
        column_start: 2
        column_end: 35
        message: "Use `dig(:foo, :bar, :baz, :quux)` instead of chaining."
    corrected: |
      x.dig(:foo, :bar, :baz, :quux)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_safe_navigation_method_chain
    source: |
      x&.dig(:foo, :bar)&.dig(:baz, :quux)
    offenses:
      - line: 1
        column_start: 3
        column_end: 36
        message: "Use `dig(:foo, :bar, :baz, :quux)` instead of chaining."
    corrected: |
      x&.dig(:foo, :bar, :baz, :quux)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_without_a_receiver
    source: |
      dig(:foo, :bar).dig(:baz, :quux)
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: "Use `dig(:foo, :bar, :baz, :quux)` instead of chaining."
    corrected: |
      dig(:foo, :bar, :baz, :quux)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_instead_of_dot
    source: |
      x.dig(:foo, :bar)::dig(:baz, :quux)
    offenses:
      - line: 1
        column_start: 2
        column_end: 35
        message: "Use `dig(:foo, :bar, :baz, :quux)` instead of chaining."
    corrected: |
      x.dig(:foo, :bar, :baz, :quux)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_with_splat
    source: |
      x.dig(:foo).dig(*names).dig(:bar)
    offenses:
      - line: 1
        column_start: 2
        column_end: 33
        message: "Use `dig(:foo, *names, :bar)` instead of chaining."
    corrected: |
      x.dig(:foo, *names, :bar)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_when_split_over_multiple_lines
    source: |
      x.dig(:foo)
       .dig(:bar)
       .dig(:baz)
    offenses:
      - line: 1
        column_start: 2
        column_end: 11
        message: "Use `dig(:foo, :bar, :baz)` instead of chaining."
    corrected: |
      x.dig(:foo, :bar, :baz)

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_registers_an_offense_and_corrects_when_split_over_multiple_lines_with_comments
    source: |
      x.dig(:foo) # comment 1
       .dig(:bar) # comment 2
       .dig(:baz) # comment 3
    offenses:
      - line: 1
        column_start: 2
        column_end: 23
        message: "Use `dig(:foo, :bar, :baz)` instead of chaining."
    corrected: |
      # comment 1
      # comment 2
      x.dig(:foo, :bar, :baz) # comment 3

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_argument_forwarding_registers_an_offense_and_corrects_with_forwarded_args
    source: |
      def foo(...)
        x.dig(:foo).dig(...)
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 22
        message: "Use `dig(:foo, ...)` instead of chaining."
    corrected: |
      def foo(...)
        x.dig(:foo, ...)
      end

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_argument_forwarding_does_not_register_an_offense_when_combining_would_add_a_syntax_error
    source: |
      def foo(...)
        x.dig(...).dig(:foo)
        x.dig(...).dig(...)
      end
    offenses:
      []

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_argument_forwarding_ruby_3_1_does_not_register_an_offense_when_dig_is_given_a_forwarded_anonymous_block
    source: |
      def foo(&)
        x.dig(&).dig(:foo)
      end
    offenses:
      []
    ruby_version: ">= 3.1"

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_argument_forwarding_ruby_3_2_registers_an_offense_and_corrects_with_forwarded_anonymous_splat
    source: |
      def foo(*)
        x.dig(*).dig(*)
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 17
        message: Use `dig(*, *)` instead of chaining.
    corrected: |
      def foo(*)
        x.dig(*, *)
      end
    ruby_version: ">= 3.2"

  - name: rubocop_cop_style_digchain_with_chained_dig_calls_argument_forwarding_ruby_3_2_does_not_register_an_offense_with_forwarded_anonymous_kwsplat
    source: |
      def foo(**)
        x.dig(**).dig(:foo)
      end
    offenses:
      []
    ruby_version: ">= 3.2"
