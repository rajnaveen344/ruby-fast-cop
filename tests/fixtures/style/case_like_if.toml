cop = "Style/CaseLikeIf"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylecaselikeif_registers_an_offense_and_corrects_when_using_"
source = '''
if Integer === x
elsif /foo/ === x
elsif (1..10) === x
else
end
'''
corrected = '''
case x
when Integer
when /foo/
when (1..10)
else
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 16
message = "Convert `if-elsif` to `case-when`."

[tests.config]
MinBranchesCount = 2

