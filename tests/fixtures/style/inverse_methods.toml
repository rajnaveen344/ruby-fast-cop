cop = "Style/InverseMethods"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleinversemethods_registers_an_offense_for_calling_none_with_a_symbol_proc"
source = '''
!foo.none?(&:even?)
'''
corrected = '''
foo.any?(&:even?)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 19
message = "Use `any?` instead of inverting `none?`."

[tests.config]
InverseBlocks = { select = "reject", "select!" = "reject!" }
InverseMethods = { "any?" = "none?", "even?" = "odd?", "present?" = "blank?", "include?" = "exclude?", "==" = "!=", "=~" = "!~", "<" = ">=", ">" = "<=" }

