[[tests]]
name = "rubocop_cop_style_inversemethods_registers_an_offense_for_calling_none_with_a_symbol_proc"
source = '''
!foo.none?(&:even?)
'''
corrected = '''
foo.any?(&:even?)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 19
message = "Use `any?` instead of inverting `none?`."

[[tests]]
name = "rubocop_cop_style_inversemethods_does_not_register_an_offense_for_safe_navigation_calling_none_with_a_symbol_proc"
source = '''
!foo&.none?(&:even?)
'''
offenses = []

