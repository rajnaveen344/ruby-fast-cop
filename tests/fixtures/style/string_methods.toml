cop = "Style/StringMethods"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylestringmethods_registers_an_offense"
source = '''
'something'.intern
'''
corrected = '''
'something'.to_sym
'''

[[tests.offenses]]
line = 1
column_start = 12
column_end = 18
message = "Prefer `to_sym` over `intern`."

[tests.config]
PreferredMethods = { intern = "to_sym" }
intern = "to_sym"

[[tests]]
name = "rubocopcopstylestringmethods_when_using_safe_navigation_operator_registers_an_offense"
source = '''
something&.intern
'''
corrected = '''
something&.to_sym
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 17
message = "Prefer `to_sym` over `intern`."

[tests.config]
PreferredMethods = { intern = "to_sym" }
intern = "to_sym"
