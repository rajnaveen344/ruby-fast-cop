cop = "Style/BlockComments"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleblockcomments_registers_an_offense_for_block_comments"
source = '''
=begin
comment
=end
'''
corrected = '''
# comment
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Do not use block comments."

[[tests]]
name = "rubocopcopstyleblockcomments_accepts_regular_comments"
strip_trailing_newline = true
source = '''
# comment
'''
offenses = []

[[tests]]
name = "rubocopcopstyleblockcomments_autocorrects_a_block_comment_into_a_regular_comment"
source = '''
=begin
comment line 1

comment line 2
=end
def foo
end
'''
corrected = '''
# comment line 1
#
# comment line 2
def foo
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Do not use block comments."

[[tests]]
name = "rubocopcopstyleblockcomments_autocorrects_an_empty_block_comment_by_removing_it"
source = '''
=begin
=end
def foo
end
'''
corrected = '''
def foo
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Do not use block comments."

[[tests]]
name = "rubocopcopstyleblockcomments_autocorrects_a_block_comment_into_a_regular_comment_without_trailing_newline"
source = '''
=begin
comment line 1

comment line 2
=end
'''
corrected = '''
# comment line 1
#
# comment line 2
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Do not use block comments."
