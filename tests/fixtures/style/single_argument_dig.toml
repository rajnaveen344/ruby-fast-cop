cop = "Style/SingleArgumentDig"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesingleargumentdig_dig_over_literal_with_single_argument_registers_an_offense_and_corrects_unsuitable_use_of_dig"
source = '''
{ key: 'value' }.dig(:key)
'''
corrected = '''
{ key: 'value' }[:key]
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 26
message = "Use `{ key: 'value' }[:key]` instead of `{ key: 'value' }.dig(:key)`."

[[tests]]
name = "rubocopcopstylesingleargumentdig_dig_over_literal_with_single_argument_does_not_register_an_offense_unsuitable_use_of_dig_with_safe_navigation_operator"
source = '''
{ key: 'value' }&.dig(:key)
'''
offenses = []

[[tests]]
name = "rubocopcopstylesingleargumentdig_dig_over_literal_with_multiple_arguments_does_not_register_an_offense"
source = '''
{ key1: { key2: 'value' } }.dig(:key1, :key2)
'''
offenses = []

[[tests]]
name = "rubocopcopstylesingleargumentdig_dig_over_literal_when_using_dig_with_splat_operator_does_not_register_an_offense"
source = '''
{ key1: { key2: 'value' } }.dig(*%i[key1 key2])
'''
offenses = []

[[tests]]
name = "rubocopcopstylesingleargumentdig__ruby_27_when_using_dig_with_arguments_forwarding_does_not_register_an_offense"
source = '''
