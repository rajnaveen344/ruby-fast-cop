[[tests]]
name = "rubocopcopstylesingleargumentdig_dig_over_a_variable_as_caller_with_single_argument_registers_an_offense_and_corrects_unsuitable_use_of_dig"
source = '''
data.dig(var)
'''
corrected = '''
data[var]
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 13
message = "Use `data[var]` instead of `data.dig(var)`."

