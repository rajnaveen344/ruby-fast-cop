cop = "Style/UnlessElse"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleunlesselse_unless_with_else_registers_an_offense"
source = '''
unless x # negative 1
  a = 1 # negative 2
else # positive 1
  a = 0 # positive 2
end
'''
corrected = '''
if x # positive 1
  a = 0 # positive 2
else # negative 1
  a = 1 # negative 2
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "Do not use `unless` with `else`. Rewrite these with the positive case first."

[[tests]]
name = "rubocopcopstyleunlesselse_unless_with_else_and_nested_unless_with_else_registers_offenses_for_both_but_corrects_only_the_outer_unlesselse"
source = '''
unless abc
  a
else
  unless cde
    b
  else
    c
  end
end
'''
corrected = '''
if abc
  unless cde
    b
  else
    c
  end
else
  a
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Do not use `unless` with `else`. Rewrite these with the positive case first."

[[tests.offenses]]
line = 4
column_start = 2
column_end = 12
message = "Do not use `unless` with `else`. Rewrite these with the positive case first."

[[tests]]
name = "rubocopcopstyleunlesselse_unless_with_nested_ifelse_registers_an_offense"
source = '''
unless(x)
  if(y == 0)
    a = 0
  elsif(z == 0)
    a = 1
  else
    a = 2
  end
else
  a = 3
end
'''
corrected = '''
if(x)
  a = 3
else
  if(y == 0)
    a = 0
  elsif(z == 0)
    a = 1
  else
    a = 2
  end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 9
message = "Do not use `unless` with `else`. Rewrite these with the positive case first."

[[tests]]
name = "rubocopcopstyleunlesselse_when_using_unless_with_then_registers_an_offense"
source = '''
