cop: Style/HashFetchChain
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_does_not_register_an_offense_when_not_chained
    source: |
      hash.fetch('foo', #{argument})
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_when_the_first_argument_is_a_string
    source: |
      hash.fetch('foo', %{argument})&.fetch('bar', nil)
    offenses:
      - line: 1
        column_start: 5
        column_end: 49
        message: "Use `dig('foo', 'bar')` instead."
    corrected: |
      hash.dig('foo', 'bar')

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_when_the_first_argument_is_a_symbol
    source: |
      hash.fetch(:foo, %{argument})&.fetch(:bar, nil)
    offenses:
      - line: 1
        column_start: 5
        column_end: 47
        message: "Use `dig(:foo, :bar)` instead."
    corrected: |
      hash.dig(:foo, :bar)

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_for_send_arguments
    source: |
      hash.fetch(foo, %{argument})&.fetch(bar, nil)
    offenses:
      - line: 1
        column_start: 5
        column_end: 45
        message: Use `dig(foo, bar)` instead.
    corrected: |
      hash.dig(foo, bar)

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_for_mixed_arguments
    source: |
      hash.fetch('foo', %{argument})&.fetch(:bar, %{argument})&.fetch(baz, nil)
    offenses:
      - line: 1
        column_start: 5
        column_end: 73
        message: "Use `dig('foo', :bar, baz)` instead."
    corrected: |
      hash.dig('foo', :bar, baz)

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_with_safe_navigation
    source: |
      hash&.fetch('foo', %{argument})&.fetch('bar', nil)
    offenses:
      - line: 1
        column_start: 6
        column_end: 50
        message: "Use `dig('foo', 'bar')` instead."
    corrected: |
      hash&.dig('foo', 'bar')

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_registers_an_offense_and_corrects_when_chained_onto_other_methods
    source: |
      x.hash.fetch('foo', %{argument})&.fetch('bar', nil)
    offenses:
      - line: 1
        column_start: 7
        column_end: 51
        message: "Use `dig('foo', 'bar')` instead."
    corrected: |
      x.hash.dig('foo', 'bar')

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_when_there_is_only_1_argument_does_not_register_an_offense
    source: |
      hash.fetch('foo').fetch('bar')
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_when_a_block_is_given_to_fetch_does_not_register_an_offense
    source: |
      hash.fetch('foo') { :default }.fetch('bar') { :default }
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_when_no_arguments_are_given_to_fetch_does_not_register_an_offense
    source: |
      hash.fetch
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_when_the_2nd_argument_is_not_nil_or_does_not_register_an_offense
    source: |
      hash.fetch('foo', bar).fetch('baz', quux)
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_when_the_chain_ends_with_a_non_nil_value_does_not_register_an_offense
    source: |
      hash.fetch('foo', {}).fetch('bar', {})
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_fetch_chain_nil
    source: |
      nil
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_fetch_chain
    source: |
      {}
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_fetch_chain_hash_new
    source: |
      Hash.new
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_with_chained_fetch_methods_fetch_chain_hash_new
    source: |
      ::Hash.new
    offenses:
      []

  - name: rubocop_cop_style_hashfetchchain_ruby_2_3_when_split_on_multiple_lines_registers_an_offense_and_corrects
    source: |
      hash
        .fetch('foo', nil)
        .fetch('bar', nil)
    offenses:
      - line: 2
        column_start: 3
        column_end: 20
        message: "Use `dig('foo', 'bar')` instead."
    corrected: |
      hash
        .dig('foo', 'bar')

  - name: rubocop_cop_style_hashfetchchain_ruby_2_2_does_not_register_an_offense
    source: |
      hash.fetch('foo', {}).fetch('bar', nil)
    offenses:
      []
    ruby_version: ">= 2.2"
