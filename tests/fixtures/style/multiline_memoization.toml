[[tests]]
name = "rubocopcopstylemultilinememoization_enforcedstyle_keyword_with_a_multiline_memoization_without_a_begin_and_end_block_when_the_expression_is_wrapped_in_parentheses_registers_an_offense_when_expression_starts_on_first_line"
source = '''
foo ||= (
  bar
  baz
)
'''
corrected = '''
foo ||= begin
  bar
  baz
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 9
message = "Wrap multiline memoization blocks in `begin` and `end`."

[tests.config]
EnforcedStyle = "keyword"

