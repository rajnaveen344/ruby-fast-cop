cop = "Style/MultilineMemoization"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemultilinememoization_enforcedstyle_keyword_behaves_like_with_all_enforced_styles_with_a_single_line_memoization_allows_expression_on_first_line"
strip_trailing_newline = true
source = '''
foo ||= bar
'''
offenses = []

[tests.config]
EnforcedStyle = "keyword"

