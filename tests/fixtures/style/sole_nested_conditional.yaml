cop: Style/SoleNestedConditional
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_solenestedconditional_registers_an_offense_and_corrects_when_using_nested_if_within_if
    source: |
      if foo
        if bar
          do_something
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 4
        message: Consider merging nested conditions into outer `if` conditions.
    corrected: |
      if foo && bar
          do_something
        end
    config:
      AllowModifier: false

  - name: rubocop_cop_style_solenestedconditional_registers_an_offense_and_corrects_when_using_nested_unless_within_if
    source: |
      if foo
        unless bar
          do_something
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 8
        message: Consider merging nested conditions into outer `if` conditions.
    corrected: |
      if foo && !bar
          do_something
        end
    config:
      AllowModifier: false

  - name: rubocop_cop_style_solenestedconditional_registers_an_offense_and_corrects_when_using_nested_if_within_unless
    source: |
      unless foo
        if bar
