        column_end: 4
        message: Consider merging nested conditions into outer `unless` conditions.
    corrected: |
      if !foo && bar
          do_something
        end
    config:
      AllowModifier: false

  - name: rubocop_cop_style_solenestedconditional_registers_an_offense_and_corrects_when_using_nested_if_within_unless_foo_bar
