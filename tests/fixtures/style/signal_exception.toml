cop = "Style/SignalException"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylesignalexception_when_enforced_style_is_semantic_registers_an_offense_for_raise_in_begin_section"
source = '''
begin
  raise
rescue Exception
  #do nothing
end
'''
corrected = '''
begin
  fail
rescue Exception
  #do nothing
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 7
message = "Use `fail` instead of `raise` to signal exceptions."

[tests.config]
EnforcedStyle = "semantic"

