  - name: rubocop_cop_style_redundantreturn_when_multi_value_returns_are_not_allowed_reports_an_offense_for_def_with_only_a_return
    source: |
      def func
        return something, test
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 8
        message: Redundant `return` detected. To return multiple values, use an array.
    corrected: |
      def func
        [something, test]
      end
    config:
      AllowMultipleReturnValues: false

