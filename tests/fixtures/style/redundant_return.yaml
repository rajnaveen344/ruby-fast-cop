        else
          3
        end
      end
    config:
      AllowMultipleReturnValues: true

  - name: rubocop_cop_style_redundantreturn_when_return_is_inside_a_when_branch_registers_an_offense_and_autocorrects
    source: |
      def func
        some_preceding_statements
        case x
        when y then return 1
        when z then return 2
        when q
        else
          return 3
        end
      end
    offenses:
