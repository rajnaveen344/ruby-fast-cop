cop: Style/RedundantReturn
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_redundantreturn_reports_an_offense_for_def_with_only_a_return
    source: |
      def func
        return something
      ensure
        2
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 8
        message: Redundant `return` detected.
    corrected: |
      def func
        something
      ensure
        2
      end
    config:
      AllowMultipleReturnValues: false

  - name: rubocop_cop_style_redundantreturn_reports_an_offense_for_defs_with_only_a_return
    source: |
      def Test.func
        return something
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 8
        message: Redundant `return` detected.
    corrected: |
      def Test.func
        something
      end
    config:
      AllowMultipleReturnValues: false

  - name: rubocop_cop_style_redundantreturn_reports_an_offense_for_def_ending_with_return
    source: |
      def func
        some_preceding_statements
        return something
