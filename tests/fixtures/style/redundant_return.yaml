        return 5
      rescue AnotherException
        return 6
      ensure
        return 7
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 8
        message: Redundant `return` detected.
      - line: 7
        column_start: 2
        column_end: 8
        message: Redundant `return` detected.
      - line: 9
        column_start: 2
        column_end: 8
        message: Redundant `return` detected.
    corrected: |
      def func
        1
