cop: Style/Documentation
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class
    source: |
      class MyClass
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_cbase_class
    source: |
      class ::MyClass
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: "Missing top-level documentation comment for `class ::MyClass`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_self
    source: |
      class self::MyClass
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 19
        message: "Missing top-level documentation comment for `class self::MyClass`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_method_call
    source: |
      class my_method::MyClass
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: "Missing top-level documentation comment for `class my_method::MyClass`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_safe_navigation_method_call
    source: |
      class obj&.my_method::MyClass
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: "Missing top-level documentation comment for `class obj&.my_method::MyClass`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_local_variable
    source: |
      m = Module.new
      module m::N
        def method
        end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: "Missing top-level documentation comment for `module m::N`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_instance_variable
    source: |
      module @m::N
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Missing top-level documentation comment for `module @m::N`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_class_variable
    source: |
      module @@m::N
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: "Missing top-level documentation comment for `module @@m::N`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_global_variable
    source: |
      module $m::N
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "Missing top-level documentation comment for `module $m::N`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_nested_under_local_variables
    source: |
      m = Module.new
      n = Module.new
      module m::n::M
        def method
        end
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 14
        message: "Missing top-level documentation comment for `module m::n::M`."

  - name: rubocop_cop_style_documentation_does_not_consider_comment_followed_by_empty_line_to_be_class_documentation
    source: |
      # Copyright 2014
      # Some company
      
      class MyClass
        def method
        end
      end
    offenses:
      - line: 4
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_namespace
    source: |
      module MyModule
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Missing top-level documentation comment for `module MyModule`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_empty_module_without_documentation
    source: |
      module Test
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Missing top-level documentation comment for `module Test`.

  - name: rubocop_cop_style_documentation_accepts_non_empty_class_with_documentation
    source: |
      # class comment
      class MyClass
        def method
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_with_annotation_comment
    source: |
      # OPTIMIZE: Make this faster.
      class MyClass
        def method
        end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_with_directive_comment
    source: |
      # rubocop:disable Style/For
      class MyClass
        def method
        end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_with_frozen_string_comment
    source: |
      # frozen_string_literal: true
      class MyClass
        def method
        end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_registers_an_offense_for_non_empty_class_with_encoding_comment
    source: |
      # encoding: ascii-8bit
      class MyClass
        def method
        end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 13
        message: Missing top-level documentation comment for `class MyClass`.

  - name: rubocop_cop_style_documentation_accepts_non_empty_class_with_annotation_comment_followed_by_other_comment
    source: |
      # OPTIMIZE: Make this faster.
      # Class comment.
      class MyClass
        def method
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_non_empty_class_with_comment_that_ends_with_an_annotation
    source: |
      # Does fooing.
      # FIXME: Not yet implemented.
      class Foo
        def initialize
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_non_empty_module_with_documentation
    source: |
      # class comment
      module MyModule
        def method
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_empty_class_without_documentation
    source: |
      class MyClass
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_namespace_module_without_documentation
    source: |
      module Test
        class A; end
        class B; end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_namespace_class_without_documentation
    source: |
      class Test
        class A; end
        class B; end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_namespace_class_which_defines_constants
    source: |
      class Test
        A = Class.new
        B = Class.new(A)
        C = Class.new { call_method }
        D = 1
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_accepts_namespace_module_which_defines_constants
    source: |
      module Test
        A = Class.new
        B = Class.new(A)
        C = Class.new { call_method }
        D = 1
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_with_non_empty_module_with_constants_visibility_declaration_content_does_not_register_an_offense
    source: |
      module Namespace
        class Private
        end
      
        private_constant :Private
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_with_non_empty_class_with_constants_visibility_declaration_content_does_not_register_an_offense
    source: |
      class Namespace
        class Private
        end
      
        private_constant :Private
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_registers_an_offense_with_custom_macro
    source: |
      class Foo < ApplicationRecord
        belongs_to :bar
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Missing top-level documentation comment for `class Foo`.

  - name: rubocop_cop_style_documentation_without_documentation_include_statement_only_class_does_not_register_offense_with_single_include_statements
    source: |
      module Foo
        include Bar
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_include_statement_only_class_does_not_register_offense_with_single_extend_statements
    source: |
      module Foo
        extend Bar
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_include_statement_only_class_does_not_register_offense_with_single_prepend_statements
    source: |
      module Foo
        prepend Bar
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_include_statement_only_class_does_not_register_offense_with_multiple_include_macros
    source: |
      module Foo
        include A
        include B
        extend C
        prepend D
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_without_documentation_include_statement_only_class_registers_an_offense_for_include_statement_with_other_methods
    source: |
      module Foo
        extend B
        include C
      
        def foo; end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Missing top-level documentation comment for `module Foo`.

  - name: rubocop_cop_style_documentation_does_not_raise_an_error_for_an_implicit_match_conditional
    source: |
      class Test
        if //
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: Missing top-level documentation comment for `class Test`.

  - name: rubocop_cop_style_documentation_registers_an_offense_if_the_comment_line_contains_code
    source: |
      module A # The A Module
        class B
          C = 1
          def method
          end
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 9
        message: "Missing top-level documentation comment for `class A::B`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_compact_style_nested_module
    source: |
      module A::B
        C = 1
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: "Missing top-level documentation comment for `module A::B`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_compact_style_nested_class
    source: |
      class A::B
        C = 1
        def method
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "Missing top-level documentation comment for `class A::B`."

  - name: rubocop_cop_style_documentation_registers_an_offense_for_a_deeply_nested_class
    source: |
      module A::B
        module C
          class D
            class E::F
              def method
              end
            end
          end
        end
      end
    offenses:
      - line: 4
        column_start: 6
        column_end: 16
        message: "Missing top-level documentation comment for `class A::B::C::D::E::F`."

  - name: rubocop_cop_style_documentation_sparse_and_trailing_comments
    source: |
      module TestModule
        # documentation comment
        #{keyword} Test
          def method
          end
        end # decorating comment
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_documentation_sparse_and_trailing_comments
    source: |
      module TestModule
        %{keyword} Test
          def method
          end
          # sparse comment
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 17
        message: "Missing top-level documentation comment for `#{keyword} TestModule::Test`."
    interpolated: true

  - name: rubocop_cop_style_documentation_with_nodoc
    source: |
      #{keyword} Test #:nodoc:
        def method
        end
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_documentation_with_nodoc
    source: |
      #{keyword} A::B::Test #:nodoc:
        def method
        end
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_documentation_with_nodoc
    source: |
      module TestModule #:nodoc:
        TEST = 20
        %{keyword} Test
          def method
          end
        end
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 17
        message: "Missing top-level documentation comment for `#{keyword} TestModule::Test`."
    interpolated: true

  - name: rubocop_cop_style_documentation_with_nodoc_with_all_modifier
    source: |
      module A #:nodoc: all
        module B
          TEST = 20
          #{keyword} Test
            TEST = 20
          end
        end
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_style_documentation_with_nodoc_on_a_subclass_accepts_non_namespace_subclass_without_documentation
    source: |
      class Test < Parent #:nodoc:
        def method
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_with_nodoc_on_a_subclass_registers_an_offense_for_nested_subclass_without_documentation
    source: |
      module TestModule #:nodoc:
        TEST = 20
        class Test < Parent
          def method
          end
        end
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 12
        message: "Missing top-level documentation comment for `class TestModule::Test`."

  - name: rubocop_cop_style_documentation_with_nodoc_on_a_subclass_with_all_modifier_accepts_nested_subclass_without_documentation
    source: |
      module A #:nodoc: all
        module B
          TEST = 20
          class Test < Parent
            TEST = 20
          end
        end
      end
    offenses:
      []

  - name: rubocop_cop_style_documentation_with_nodoc_on_a_subclass_when_allowedconstants_is_configured_ignores_the_constants_in_the_config
    source: |
      module A
        module ClassMethods
          def do_something
          end
        end
      end
    offenses:
      []
