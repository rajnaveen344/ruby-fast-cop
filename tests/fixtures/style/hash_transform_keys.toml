'''
offenses = []

[[tests]]
name = "rubocopcopstylehashtransformkeys_when_using_ruby_25_or_newer_flags_each_with_object_when_receiver_is_a_hashproducing_method"
ruby_version = ">= 2.5"
source = '''
x.to_h.each_with_object({}) {|(k, v), h| h[foo(k)] = v}
'''
corrected = '''
x.to_h.transform_keys {|k| foo(k)}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 55
message = "Prefer `transform_keys` over `each_with_object`."

[[tests]]
name = "rubocopcopstylehashtransformkeys_when_using_ruby_25_or_newer_flags_each_with_object_when_receiver_is_a_group_by_block"
ruby_version = ">= 2.5"
source = '''
x.group_by { |e| e.type }.each_with_object({}) {|(k, v), h| h[foo(k)] = v}
'''
corrected = '''
x.group_by { |e| e.type }.transform_keys {|k| foo(k)}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 74
message = "Prefer `transform_keys` over `each_with_object`."

