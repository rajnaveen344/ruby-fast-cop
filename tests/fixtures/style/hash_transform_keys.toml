cop = "Style/HashTransformKeys"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylehashtransformkeys_when_using_ruby_25_or_newer_does_not_flag_each_with_object_when_both_key__value_are_transformed"
ruby_version = ">= 2.5"
source = '''
{a: 1, b: 2}.each_with_object({}) {|(k, v), h| h[k.to_sym] = foo(v)}
'''
offenses = []

[[tests]]
name = "rubocopcopstylehashtransformkeys_when_using_ruby_25_or_newer_does_not_flag_each_with_object_when_key_transformation_uses_value"
ruby_version = ">= 2.5"
strip_trailing_newline = true
source = '''
{a: 1, b: 2}.each_with_object({}) {|(k, v), h| h[foo(v)] = v}
'''
offenses = []

