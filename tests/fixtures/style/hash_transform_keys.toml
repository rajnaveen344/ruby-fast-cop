[[tests]]
name = "rubocopcopstylehashtransformkeys_when_using_ruby_25_or_newer_does_not_flag_each_with_object_when_receiver_is_a_method_chain_through_nonhash_methods"
ruby_version = ">= 2.5"
source = '''
