cop = "Style/MissingRespondToMissing"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstylemissingrespondtomissing_registers_an_offense_when_respond_to_missing_is_not_implemented"
source = '''
class Test
  def method_missing
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 20
message = "When using `method_missing`, define `respond_to_missing?`."

[[tests]]
name = "rubocopcopstylemissingrespondtomissing_registers_an_offense_when_method_missing_is_implemented_as_a_class_methods"
source = '''
class Test
  def self.method_missing
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 25
message = "When using `method_missing`, define `respond_to_missing?`."

[[tests]]
name = "rubocopcopstylemissingrespondtomissing_allows_method_missing_and_respond_to_missing_implemented_as_instance_methods"
source = '''
class Test
  def respond_to_missing?
  end

  def method_missing
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcopstylemissingrespondtomissing_allows_method_missing_and_respond_to_missing_implemented_as_class_methods"
source = '''
