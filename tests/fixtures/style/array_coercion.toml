cop = "Style/ArrayCoercion"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_arraycoercion_registers_an_offense_and_corrects_when_splatting_variable_into_array"
source = '''
[*paths].each { |path| do_something(path) }
'''
corrected = '''
Array(paths).each { |path| do_something(path) }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 8
message = "Use `Array(paths)` instead of `[*paths]`."

[[tests]]
name = "rubocop_cop_style_arraycoercion_registers_an_offense_and_corrects_when_converting_variable_into_array_with_check"
source = '''
paths = [paths] unless paths.is_a?(Array)
'''
corrected = '''
paths = Array(paths)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 41
message = "Use `Array(paths)` instead of explicit `Array` check."

[[tests]]
name = "rubocop_cop_style_arraycoercion_does_not_register_an_offense_when_splat_is_not_in_array"
source = '''
first_path, rest = *paths
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_arraycoercion_does_not_register_an_offense_when_splatting_multiple_variables_into_array"
source = '''
[*paths, '/root'].each { |path| do_something(path) }
'''
offenses = []

[[tests]]
name = "rubocop_cop_style_arraycoercion_does_not_register_an_offense_when_converting_variable_into_other_named_array_variable_with_check"
source = '''
other_paths = [paths] unless paths.is_a?(Array)
'''
offenses = []
