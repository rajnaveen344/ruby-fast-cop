cop = "Style/RedundantConstantBase"
department = "style"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_in_class_registers_no_offense"
source = '''
class Foo
  ::Bar
end
'''
offenses = []

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_in_module_registers_no_offense"
source = '''
module Foo
  ::Bar
end
'''
offenses = []

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_in_neither_class_nor_module_registers_an_offense"
source = '''
::Bar
'''
corrected = '''
Bar
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 2
message = "Remove redundant `::`."

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_nested_constant_in_neither_class_nor_module_registers_an_offense"
source = '''
::Bar::Baz
'''
corrected = '''
Bar::Baz
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 2
message = "Remove redundant `::`."

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_in_sclass_registers_an_offense"
source = '''
class << self
  ::Bar
end
'''
corrected = '''
class << self
  Bar
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 4
message = "Remove redundant `::`."

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_as_super_class_registers_an_offense"
source = '''
