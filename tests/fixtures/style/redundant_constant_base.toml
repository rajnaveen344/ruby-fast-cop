  ::A
end
'''

[[tests.offenses]]
line = 1
column_start = 12
column_end = 14
message = "Remove redundant `::`."

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_when_lintconstantresolution_is_disabling_with_prefixed_constant_in_neither_class_nor_module_does_not_register_an_offense"
source = '''
::Bar
'''
offenses = []

[tests.config."Lint/ConstantResolution"]
Enabled = true
