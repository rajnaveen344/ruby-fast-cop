end
'''

[[tests.offenses]]
line = 1
column_start = 12
column_end = 14
message = "Remove redundant `::`."

[tests.config."Lint/ConstantResolution"]
Enabled = false

[[tests]]
name = "rubocopcopstyleredundantconstantbase_with_prefixed_constant_and_prefixed_super_class_registers_an_offense"
source = '''
class Foo < ::Bar
  ::A
end
'''
corrected = '''
