cop = "Style/Next"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_style_next"
source = '''
3.downto(1) do
  %{condition} o == 1
    puts o
  end
end
'''
corrected = '''
3.downto(1) do
  next #{opposite} o == 1
  puts o
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 21
message = "Use `next` to skip iteration."

[tests.config]
MinBodyLength = 1

