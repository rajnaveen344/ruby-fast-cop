cop = "Style/Next"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstylenext_keeps_comments_when_autocorrecting"
source = '''
loop do
  if test # keep me
    # keep me
    something # keep me
    # keep me

  end # keep me
end
'''
corrected = '''
loop do
  next unless test # keep me
  # keep me
  something # keep me
  # keep me

 # keep me
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 9
message = "Use `next` to skip iteration."

[tests.config]
AllowConsecutiveConditionals = false
EnforcedStyle = "skip_modifier_ifs"
MinBodyLength = 1

