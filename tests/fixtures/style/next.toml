[[tests]]
name = "rubocop_cop_style_next_autocorrects_a_misaligned_end"
source = '''
[1, 2, 3, 4].each do |num|
  if !opts.nil?
    puts num
    if num != 2
      puts 'hello'
      puts 'world'
    end
 end
end
'''
corrected = '''
[1, 2, 3, 4].each do |num|
  next unless !opts.nil?
  puts num
  next unless num != 2
  puts 'hello'
  puts 'world'
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 15
message = "Use `next` to skip iteration."

[tests.config]
EnforcedStyle = "always"
MinBodyLength = 1

