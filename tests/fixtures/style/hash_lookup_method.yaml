    config:
      EnforcedStyle: $UNRESOLVED:brackets
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_fetch_registers_an_offense_for_bracket_access_with_one_argument
    source: |
