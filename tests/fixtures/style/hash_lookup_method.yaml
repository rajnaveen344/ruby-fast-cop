cop: Style/HashLookupMethod
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_brackets_default_registers_an_offense_for_fetch_with_one_argument
    source: |
      hash.fetch(key)
    offenses:
      - line: 1
        column_start: 5
        column_end: 10
        message: "Use `Hash#[]` instead of `Hash#fetch`."
    corrected: |
      hash[key]
    config:
      EnforcedStyle: $UNRESOLVED:brackets
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_brackets_default_registers_an_offense_for_fetch_with_one_argument_and_receiver_chain
    source: |
      some_method.hash.fetch(key)
    offenses:
      - line: 1
        column_start: 17
        column_end: 22
        message: "Use `Hash#[]` instead of `Hash#fetch`."
    corrected: |
      some_method.hash[key]
    config:
      EnforcedStyle: $UNRESOLVED:brackets
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_brackets_default_accepts_bracket_access
    source: |
      hash[key]
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:brackets
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_brackets_default_accepts_fetch_with_default_value
    source: |
      hash.fetch(key, default)
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:brackets
    interpolated: true
    verified: false

  - name: rubocop_cop_style_hashlookupmethod_with_enforcedstyle_brackets_default_accepts_fetch_with_block
    source: |
