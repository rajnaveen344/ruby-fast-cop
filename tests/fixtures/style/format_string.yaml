cop: Style/FormatString
department: style
severity: convention
implemented: false

tests:
  - name: rubocop_cop_style_formatstring_when_enforced_style_is_sprintf_registers_an_offense_for_a_string_followed_by_something
    source: |
      puts "%d" % 10
    offenses:
      - line: 1
        column_start: 10
        column_end: 11
        message: "Favor `sprintf` over `String#%`."
    corrected: |
      puts sprintf("%d", 10)
    config:
      EnforcedStyle: sprintf

  - name: rubocop_cop_style_formatstring_when_enforced_style_is_sprintf_registers_an_offense_for_something_followed_by_an_array
    source: |
      puts x % [10, 11]
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: "Favor `sprintf` over `String#%`."
    corrected: |
      puts sprintf(x, 10, 11)
    config:
      EnforcedStyle: sprintf

  - name: rubocop_cop_style_formatstring_when_enforced_style_is_sprintf_registers_an_offense_for_string_with_a_hash_argument
    source: |
      puts x % { a: 10, b: 11 }
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: "Favor `sprintf` over `String#%`."
    corrected: |
      puts sprintf(x, a: 10, b: 11)
    config:
      EnforcedStyle: sprintf

  - name: rubocop_cop_style_formatstring_when_enforced_style_is_sprintf_when_using_a_known_autocorrectable_method_that_does_not_convert_to_an_array_registers_an_offense_for_to_s
    source: |
      puts "%s" % a.to_s
    offenses:
      - line: 1
        column_start: 10
        column_end: 11
        message: "Favor `sprintf` over `String#%`."
    corrected: |
      puts sprintf("%s", a.to_s)
    config:
      EnforcedStyle: sprintf

