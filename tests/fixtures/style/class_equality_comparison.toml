cop = "Style/ClassEqualityComparison"
department = "style"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopstyleclassequalitycomparison_registers_an_offense_and_corrects_when_comparing_class_using__for_equality"
source = '''
var.class == Date
'''
corrected = '''
var.instance_of?(Date)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 17
message = "Use `instance_of?(Date)` instead of comparing classes."

[tests.config]
AllowedMethods = []
AllowedPatterns = []

