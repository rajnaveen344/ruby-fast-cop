[[tests]]
name = "rubocopcopstyleclassequalitycomparison_with_string_comparison_in_module_registers_and_corrects_an_offense"
source = '''
module Foo
  def bar?(value)
    bar.class.name == 'Bar'
  end

  class Bar
  end
end
'''
corrected = '''
module Foo
  def bar?(value)
    bar.instance_of?(::Bar)
  end

  class Bar
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 8
column_end = 27
message = "Use `instance_of?(::Bar)` instead of comparing classes."

[tests.config]
AllowedMethods = []
AllowedPatterns = []

