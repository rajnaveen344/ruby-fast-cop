cop: Metrics/CollectionLiteralLength
department: metrics
severity: convention
implemented: false

tests:
  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_array_literal_with_too_many_entries_on_one_line
    source: |
      #{literal}
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_array_literal_with_too_many_entries_one_per_line
    source: |
      [
        #{large_array.join(",\n  ")}
      ]
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_no_offense_when_using_an_array_literal_with_fewer_entries_than_the_threshold_one_per_line
    source: |
      [
        #{large_array.drop(1).join(",\n  ")}
      ]
    offenses:
      []
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_hash_literal_with_too_many_entries_on_one_line
    source: |
      #{literal}
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_hash_literal_with_too_many_entries_one_per_line
    source: |
      {
        #{large_hash.map { |k, v| "#{k} => #{v}" }.join(",\n  ")}
      }
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_no_offense_when_using_an_hash_literal_with_fewer_entries_than_the_threshold_one_per_line
    source: |
      {
        #{large_hash.drop(1).map { |k, v| "#{k} => #{v}" }.join(",\n  ")}
      }
    offenses:
      []
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_set_literal_with_too_many_entries_on_one_line
    source: |
      #{literal}
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_set_literal_with_too_many_entries_one_per_line
    source: |
      Set[
        #{large_array.join(",\n  ")}
      ]
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: "#{message}"
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_registers_no_offense_when_using_an_set_literal_with_fewer_entries_than_the_threshold_one_per_line
    source: |
      Set[
        #{large_array.drop(1).join(",\n  ")}
      ]
    offenses:
      []
    config:
      LengthThreshold: length_threshold
    interpolated: true

  - name: rubocop_cop_metrics_collectionliterallength_does_not_register_an_offense_when_is_called_on_something_other_than_set
    source: |
      foo[
        #{large_array.join(",\n  ")}
      ]
    offenses:
      []
    config:
      LengthThreshold: length_threshold
    interpolated: true
