cop = "Metrics/ClassLength"
department = "metrics"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopmetricsclasslength_rejects_a_class_with_more_than_5_lines"
source = '''
class Test
  a = 1
  a = 2
  a = 3
  a = 4
  a = 5
  a = 6
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Class has too many lines. [6/5]"

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsclasslength_registers_an_offense_when_a_class_with_a_singleton_class_definition_has_more_than_5_lines"
source = '''
class Test
  class << self
    a = 1
    a = 2
    a = 3
    a = 4
    a = 5
    a = 6
  end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "Class has too many lines. [8/5]"

[tests.config]
CountComments = false
Max = 5

