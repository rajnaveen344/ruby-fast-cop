cop: Metrics/ParameterLists
department: metrics
severity: convention
implemented: false

tests:
  - name: rubocop_cop_metrics_parameterlists_registers_an_offense_for_a_method_def_with_5_parameters
    source: |
      def meth(a, b, c, d, e)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 23
        message: Avoid parameter lists longer than 4 parameters. [5/4]
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_accepts_a_method_def_with_4_parameters
    source: |
      def meth(a, b, c, d)
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_accepts_a_proc_with_more_than_4_parameters
    source: |
      proc { |a, b, c, d, e| }
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_accepts_a_lambda_with_more_than_4_parameters
    source: |
      ->(a, b, c, d, e) { }
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_when_countkeywordargs_is_true_counts_keyword_arguments_as_well
    source: |
      def meth(a, b, c, d: 1, e: 2)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 29
        message: Avoid parameter lists longer than 4 parameters. [5/4]
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_when_countkeywordargs_is_false_does_not_count_keyword_arguments
    source: |
      def meth(a, b, c, d: 1, e: 2)
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_when_countkeywordargs_is_false_does_not_count_keyword_arguments_without_default_values
    source: |
      def meth(a, b, c, d:, e:)
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_registers_an_offense_when_optargs_count_exceeds_the_maximum
    source: |
      def foo(a = 1, b = 2, c = 3, d = 4, e = 5, f = 6, g = 7)
      end
      
      def foo(a = 1, b = 2, c = 3, d = 4)
      end
    offenses:
      - line: 1
        column_start: 7
        column_end: 56
        message: Avoid parameter lists longer than 4 parameters. [7/4]
      - line: 1
        column_start: 0
        column_end: 56
        message: Method has too many optional parameters. [7/3]
      - line: 4
        column_start: 0
        column_end: 35
        message: Method has too many optional parameters. [4/3]
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_method_has_allowed_amount_of_optargs
    source: |
      def foo(a, b = 2, c = 3, d = 4)
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_method_has_allowed_amount_of_args_with_block_arg
    source: |
      def foo(a, b, c, d, &block)
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_method_has_no_args
    source: |
      def foo
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_registers_an_offense_when_defining_initialize_in_the_class_definition
    source: |
      class Foo
        def initialize(one:, two:, three:, four:, five:)
        end
      end
    offenses:
      - line: 2
        column_start: 16
        column_end: 50
        message: Avoid parameter lists longer than 4 parameters. [5/4]
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_defining_initialize_in_the_block_of_struct_new
    source: |
      Struct.new(:one, :two, :three, :four, :five) do
        def initialize(one:, two:, three:, four:, five:)
        end
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_defining_initialize_in_the_block_of_struct_new
    source: |
      ::Struct.new(:one, :two, :three, :four, :five) do
        def initialize(one:, two:, three:, four:, five:)
        end
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_defining_initialize_in_the_block_of_data_define
    source: |
      Data.define(:one, :two, :three, :four, :five) do
        def initialize(one:, two:, three:, four:, five:)
        end
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3

  - name: rubocop_cop_metrics_parameterlists_does_not_register_an_offense_when_defining_initialize_in_the_block_of_data_define
    source: |
      ::Data.define(:one, :two, :three, :four, :five) do
        def initialize(one:, two:, three:, four:, five:)
        end
      end
    offenses:
      []
    config:
      Max: 4
      CountKeywordArgs: true
      MaxOptionalParameters: 3
