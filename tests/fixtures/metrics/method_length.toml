cop = "Metrics/MethodLength"
department = "metrics"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopmetricsmethodlength_accepts_a_method_with_less_than_5_lines"
source = '''
def m
  a = 1
  a = 2
  a = 3
  a = 4
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_accepts_a_method_with_multiline_arguments_and_less_than_5_lines_of_body"
source = '''
def m(x,
      y,
      z)
  a = 1
  a = 2
  a = 3
  a = 4
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_does_not_count_blank_lines"
source = '''
def m()
  a = 1
  a = 2
  a = 3
  a = 4


  a = 7
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_accepts_empty_methods"
source = '''
def m()
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_is_not_fooled_by_oneliner_methods_syntax_1"
source = '''
def one_line; 10 end
def self.m()
  a = 1
  a = 2
  a = 4
  a = 5
  a = 6
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_is_not_fooled_by_oneliner_methods_syntax_2"
source = '''
def one_line(test) 10 end
def self.m()
  a = 1
  a = 2
  a = 4
  a = 5
  a = 6
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_properly_counts_lines_when_method_ends_with_block"
source = '''
def m
  something do
    a = 2
    a = 3
    a = 4
    a = 5
  end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Method has too many lines. [6/5]"

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_does_not_count_commented_lines_by_default"
source = '''
def m()
  a = 1
  #a = 2
  a = 3
  #a = 4
  a = 5
  a = 6
end
'''
offenses = []

[tests.config]
CountComments = false
Max = 5

[[tests]]
name = "rubocopcopmetricsmethodlength_does_not_crash_when_using_a_heredoc_in_a_block_without_block_arguments"
