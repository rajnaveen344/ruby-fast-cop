  - name: rubocop_cop_metrics_blocknesting_nested_for_registers_an_offense
    source: |
      if a
        if b
          for c in [1,2] do
            puts c
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 21
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_nested_rescue_registers_an_offense
    source: |
      if a
        if b
          begin
            puts c
          rescue
            puts x
          end
        end
      end
    offenses:
      - line: 5
        column_start: 4
        column_end: 10
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_accepts_if_elsif
    source: |
      if a
      elsif b
      elsif c
      elsif d
      end
    offenses:
      []
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_when_countblocks_is_false_accepts_nested_multiline_blocks
    source: |
      if a
        if b
          [1, 2].each do |c|
            puts c
          end
        end
      end
    offenses:
      []
    config:
      CountBlocks: false
      Max: 2

