cop: Metrics/BlockNesting
department: metrics
severity: convention
implemented: false

tests:
  - name: rubocop_cop_metrics_blocknesting_accepts_max_levels_of_nesting
    source: |
      if a
        if b
          puts b
        end
      end
    offenses:
      []
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_max_1_levels_of_if_nesting_registers_an_offense
    source: |
      if a
        if b
          if c
            puts c
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 8
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_max_2_levels_of_if_nesting_registers_an_offense
    source: |
      if a
        if b
          if c
            if d
              puts d
            end
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 8
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_multiple_nested_ifs_at_same_level_registers_2_offenses
    source: |
      if a
        if b
          if c
            puts c
          end
        end
        if d
          if e
            puts e
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 8
        message: Avoid more than 2 levels of block nesting.
      - line: 8
        column_start: 4
        column_end: 8
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_nested_case_registers_an_offense
    source: |
      if a
        if b
          case c
            when C
              puts C
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 10
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_nested_case_as_a_pattern_matching_registers_an_offense
    source: |
      if a
        if b
          case c
            in C
              puts C
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 10
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2
    ruby_version: ">= 2.7"

  - name: rubocop_cop_metrics_blocknesting_nested_while_registers_an_offense
    source: |
      if a
        if b
          while c
            puts c
          end
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 11
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_nested_modifier_while_registers_an_offense
    source: |
      if a
        if b
          begin
            puts c
          end while c
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 9
        message: Avoid more than 2 levels of block nesting.
    config:
      Max: 2

  - name: rubocop_cop_metrics_blocknesting_nested_until_registers_an_offense
    source: |
      if a
        if b
          until c
            puts c
          end
        end
      end
    offenses:
