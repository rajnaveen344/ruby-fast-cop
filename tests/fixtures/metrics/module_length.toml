cop = "Metrics/ModuleLength"
department = "metrics"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopmetricsmodulelength_rejects_a_module_with_more_than_5_lines"
source = '''
module Test
  a = 1
  a = 2
  a = 3
  a = 4
  a = 5
  a = 6
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "Module has too many lines. [6/5]"

[tests.config]
CountAsOne = []
CountComments = false
Max = 5

