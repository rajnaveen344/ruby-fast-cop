cop = "Metrics/CollectionLiteralLength"
department = "metrics"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_array_literal_with_too_many_entries_on_one_line"
source = '''
#{literal}
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 10
message = "#{message}"

[tests.config]
LengthThreshold = "$UNRESOLVED:length_threshold"

[[tests]]
name = "rubocop_cop_metrics_collectionliterallength_registers_an_offense_when_using_an_array_literal_with_too_many_entries_one_per_line"
source = '''
[
  #{large_array.join(",\n  ")}
]
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "#{message}"

[tests.config]
LengthThreshold = "$UNRESOLVED:length_threshold"

[[tests]]
name = "rubocop_cop_metrics_collectionliterallength_registers_no_offense_when_using_an_array_literal_with_fewer_entries_than_the_threshold_one_per_line"
source = '''
[
  #{large_array.drop(1).join(",\n  ")}
]
'''
interpolated = true
verified = false
offenses = []

[tests.config]
LengthThreshold = "$UNRESOLVED:length_threshold"

