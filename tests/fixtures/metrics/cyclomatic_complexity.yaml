  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_counts_enumerating_methods_with_blocks_as_1
    source: |
      define_method :method_name do
        (1..4).map do |i|                            # map: +1
          i * 2
        end.each.with_index { |val, i| puts val, i } # each: +0, with_index: +1
        return treasure.map
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: Cyclomatic complexity for `method_name` is too high. [3/1]
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_ruby_2_7_counts_enumerating_methods_with_numblocks_as_1
