cop: Metrics/CyclomaticComplexity
department: metrics
severity: convention
implemented: false

tests:
  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_accepts_a_method_with_no_decision_points
    source: |
      def method_name
        call_foo
      end
    offenses:
      []
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_accepts_an_empty_method
    source: |
      def method_name
      end
    offenses:
      []
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_accepts_an_empty_define_method
    source: |
      define_method :method_name do
      end
    offenses:
      []
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_accepts_complex_code_outside_of_methods
    source: |
      def method_name
        call_foo
      end
      
      if first_condition then
        call_foo if second_condition && third_condition
        call_bar if fourth_condition || fifth_condition
      end
    offenses:
      []
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_registers_an_offense_for_an_if_modifier
    source: |
      def self.method_name
        call_foo if some_condition
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Cyclomatic complexity for `method_name` is too high. [2/1]
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_registers_an_offense_for_an_unless_modifier
    source: |
      def method_name
        call_foo unless some_condition
      end
