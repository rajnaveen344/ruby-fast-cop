      - line: 1
        column_start: 0
        column_end: 15
        message: Cyclomatic complexity for `method_name` is too high. [2/1]
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_registers_an_offense_for_an_elsif_block
    source: |
      def method_name
        if first_condition then
          call_foo
        elsif second_condition then
          call_bar
        else
          call_bam
        end
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Cyclomatic complexity for `method_name` is too high. [3/1]
    config:
      Max: 1

  - name: rubocop_cop_metrics_cyclomaticcomplexity_when_max_is_1_registers_an_offense_for_a_ternary_operator
