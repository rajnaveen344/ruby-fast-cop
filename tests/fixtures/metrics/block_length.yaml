cop: Metrics/BlockLength
department: metrics
severity: convention
implemented: true

tests:
  - name: rubocop_cop_metrics_blocklength_still_rejects_other_methods_with_long_blocks
    source: |
      something do
        a = 1
        a = 2
        a = 3
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Block has too many lines. [3/2]
    config:
      Max: 2
      CountComments: false

  - name: rubocop_cop_metrics_blocklength_accepts_the_foo_method_with_a_long_block
    source: |
      #{allowed} do
        a = 1
        a = 2
        a = 3
      end
    offenses:
      []
    config:
      Max: 2
      CountComments: false
    interpolated: true

  - name: rubocop_cop_metrics_blocklength_rejects_a_block_with_more_than_5_lines
    source: |
      something do
        a = 1
        a = 2
        a = 3
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Block has too many lines. [3/2]
    config:
      Max: 2
      CountComments: false

  - name: rubocop_cop_metrics_blocklength_reports_the_correct_beginning_and_end_lines
    source: |
      something do
        a = 1
        a = 2
        a = 3
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Block has too many lines. [3/2]
    config:
      Max: 2
      CountComments: false

  - name: rubocop_cop_metrics_blocklength_accepts_a_block_with_less_than_3_lines
    source: |
