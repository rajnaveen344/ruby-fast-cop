cop: Metrics/ModuleLength
department: metrics
severity: convention
implemented: false

tests:
  - name: rubocop_cop_metrics_modulelength_rejects_a_module_with_more_than_5_lines
    source: |
      module Test
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
        a = 6
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Module has too many lines. [6/5]
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_reports_the_correct_beginning_and_end_lines
    source: |
      module Test
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
        a = 6
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Module has too many lines. [6/5]
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_accepts_a_module_with_5_lines
    source: |
      module Test
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
      end
    offenses:
      []
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_accepts_a_module_with_less_than_5_lines
    source: |
      module Test
        a = 1
        a = 2
        a = 3
        a = 4
      end
    offenses:
      []
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_does_not_count_blank_lines
    source: |
      module Test
        a = 1
        a = 2
        a = 3
        a = 4
      
      
        a = 7
      end
    offenses:
      []
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_accepts_empty_modules
    source: |
      module Test
      end
    offenses:
      []
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_when_a_module_has_inner_modules_does_not_count_lines_of_inner_modules
    source: |
      module NamespaceModule
        module TestOne
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
        end
        module TestTwo
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
        end
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
      end
    offenses:
      []
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_when_a_module_has_inner_modules_rejects_a_module_with_6_lines_that_belong_to_the_module_directly
    source: |
      module NamespaceModule
        module TestOne
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
        end
        module TestTwo
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
        end
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
        a = 6
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Module has too many lines. [6/5]
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_when_a_module_has_inner_classes_does_not_count_lines_of_inner_classes
    source: |
      module NamespaceModule
        class TestOne
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
        end
        class TestTwo
          a = 1
          a = 2
          a = 3
          a = 4
