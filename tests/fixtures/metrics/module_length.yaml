        message: Module has too many lines. [8/5]
    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_when_a_module_has_inner_classes_rejects_a_module_with_more_than_5_lines_that_belong_to_the_module_directly_and_including_its_singleton_class
    source: |
