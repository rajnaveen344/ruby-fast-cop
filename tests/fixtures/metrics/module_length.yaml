  - name: rubocop_cop_metrics_modulelength_when_inspecting_a_class_defined_with_module_new_registers_an_offense
    source: |
      Foo = Module.new do
        a = 1
        a = 2
        a = 3
        a = 4
        a = 5
        a = 6
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Module has too many lines. [6/5]
    config:
      CountComments: false
      Max: 5

