    config:
      CountComments: false
      Max: 5

  - name: rubocop_cop_metrics_modulelength_when_a_module_has_inner_classes_rejects_a_module_with_more_than_5_lines_including_its_singleton_class
    source: |
      module Test
        class << self
          a = 1
          a = 2
          a = 3
          a = 4
          a = 5
          a = 6
        end
      end
    offenses:
      - line: 1
