cop = "Gemspec/DevelopmentDependencies"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecdevelopmentdependencies_with_enforcedstyle_gemfile_behaves_like_prefer_gem_file_registers_an_offense_when_using_add_development_dependency_in_a_gemspec"
source = '''
Gem::Specification.new do |spec|
  spec.name = 'example'
  spec.add_development_dependency 'foo'
  spec.add_development_dependency 'allowed'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 39
message = "Specify development dependencies in Gemfile."

[tests.config]
AllowedGems = ["allowed"]
Enabled = true
EnforcedStyle = "Gemfile"

