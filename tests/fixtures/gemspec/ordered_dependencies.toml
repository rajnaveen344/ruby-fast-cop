cop = "Gemspec/OrderedDependencies"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecordereddependencies_behaves_like_ordered_dependency_when_add_dependency_when_gems_are_alphabetically_sorted_does_not_register_any_offenses"
source = '''
Gem::Specification.new do |spec|
  spec.add_dependency 'rspec'
  spec.add_dependency 'rubocop'
end
'''
offenses = []

[tests.config]
TreatCommentsAsGroupSeparators = false

[[tests]]
name = "rubocopcopgemspecordereddependencies_behaves_like_ordered_dependency_when_add_dependency_when_gems_are_not_alphabetically_sorted_registers_an_offense"
source = '''
Gem::Specification.new do |spec|
  spec.add_dependency 'rubocop'
  spec.add_dependency 'rspec'
end
'''
corrected = '''
Gem::Specification.new do |spec|
  spec.add_dependency 'rspec'
  spec.add_dependency 'rubocop'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 29
message = "Dependencies should be sorted in an alphabetical order within their section of the gemspec. Dependency `rspec` should appear before `rubocop`."

[tests.config]
TreatCommentsAsGroupSeparators = false

