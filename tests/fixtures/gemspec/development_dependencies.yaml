cop: Gemspec/DevelopmentDependencies
department: gemspec
severity: convention
implemented: false

tests:
  - name: rubocop_cop_gemspec_developmentdependencies_registers_an_offense_when_using_add_development_dependency_in_a_gemspec
    source: |
      Gem::Specification.new do |spec|
        spec.name = 'example'
        spec.add_development_dependency 'foo'
        spec.add_development_dependency 'allowed'
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 39
        message: Specify development dependencies in %{preferred_file}.
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_registers_an_offense_when_using_add_development_dependency_in_a_gemspec_a_single_version_argument
    source: |
      Gem::Specification.new do |spec|
        spec.name = 'example'
        spec.add_development_dependency 'foo', '>= 1.0'
        spec.add_development_dependency 'allowed', '>= 1.0'
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 49
        message: Specify development dependencies in %{preferred_file}.
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_registers_an_offense_when_using_add_development_dependency_in_a_gemspec_with_two_version
    source: |
      Gem::Specification.new do |spec|
        spec.name = 'example'
        spec.add_development_dependency 'foo', '>= 1.0', '< 2.0'
        spec.add_development_dependency 'allowed', '>= 1.0', '< 2.0'
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 58
        message: Specify development dependencies in %{preferred_file}.
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_registers_no_offenses_when_specifying_dependencies_in_gemfile
    source: |
      gem 'example'
    offenses:
      []
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_registers_no_offenses_when_specifying_dependencies_in_gems_rb
    source: |
      gem 'example'
    offenses:
      []
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_with_enforcedstyle_gemspec_registers_no_offenses_when_using_add_development_dependency
    source: |
      Gem::Specification.new do |spec|
        spec.name = 'example'
        spec.add_development_dependency 'foo'
      end
    offenses:
      []
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_with_enforcedstyle_gemspec_registers_an_offense_when_specifying_dependencies_in_gemfile
    source: |
      gem 'example'
      gem 'allowed'
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Specify development dependencies in gemspec.
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style

  - name: rubocop_cop_gemspec_developmentdependencies_with_enforcedstyle_gemspec_registers_an_offense_when_specifying_dependencies_in_gems_rb
    source: |
      gem 'example'
      gem 'allowed'
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Specify development dependencies in gemspec.
    config:
      AllowedGems: [allowed]
      Enabled: true
      EnforcedStyle: enforced_style
