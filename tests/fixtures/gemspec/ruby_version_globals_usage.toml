cop = "Gemspec/RubyVersionGlobalsUsage"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecrubyversionglobalsusage_registers_an_offense_when_using_ruby_version"
source = '''
Gem::Specification.new do |spec|
  RUBY_VERSION
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 14
message = "Do not use `RUBY_VERSION` in gemspec file."

[[tests]]
name = "rubocopcopgemspecrubyversionglobalsusage_registers_an_offense_when_using_ruby_version_2"
source = '''
