cop = "Gemspec/RequireMFA"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecrequiremfa_when_the_gemspec_is_blank_does_not_register_an_offense"
filename = "my.gemspec"
source = '''

'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]
References = ["https://guides.rubygems.org/mfa-requirement-opt-in/"]

[[tests]]
name = "rubocopcopgemspecrequiremfa_when_the_specification_is_blank_registers_an_offense_and_corrects"
filename = "my.gemspec"
source = '''
Gem::Specification.new do |spec|
end
'''
corrected = '''
Gem::Specification.new do |spec|
spec.metadata['rubygems_mfa_required'] = 'true'
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 32
message = "`metadata['rubygems_mfa_required']` must be set to `'true'`."

[tests.config]
Include = ["**/*.gemspec"]
References = ["https://guides.rubygems.org/mfa-requirement-opt-in/"]

