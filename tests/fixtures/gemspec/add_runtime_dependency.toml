cop = "Gemspec/AddRuntimeDependency"
department = "gemspec"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopgemspecaddruntimedependency_registers_an_offense_when_using_add_runtime_dependency"
source = '''
Gem::Specification.new do |spec|
  spec.add_runtime_dependency('rubocop')
end
'''
corrected = '''
Gem::Specification.new do |spec|
  spec.add_dependency('rubocop')
end
'''

[[tests.offenses]]
line = 2
column_start = 7
column_end = 29
message = "Use `add_dependency` instead of `add_runtime_dependency`."

[tests.config]
Include = ["**/*.gemspec"]
References = ["https://github.com/ruby/rubygems/issues/7799#issuecomment-2192720316"]

[[tests]]
name = "rubocopcopgemspecaddruntimedependency_does_not_register_an_offense_when_using_add_dependency"
source = '''
Gem::Specification.new do |spec|
  spec.add_dependency('rubocop')
end
'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]
References = ["https://github.com/ruby/rubygems/issues/7799#issuecomment-2192720316"]

