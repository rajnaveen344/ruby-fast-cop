cop = "Gemspec/AddRuntimeDependency"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_gemspec_addruntimedependency_registers_an_offense_when_using_add_runtime_dependency"
source = '''
Gem::Specification.new do |spec|
  spec.add_runtime_dependency('rubocop')
end
'''
corrected = '''
Gem::Specification.new do |spec|
  spec.add_dependency('rubocop')
end
'''

[[tests.offenses]]
line = 2
column_start = 7
column_end = 29
message = "Use `add_dependency` instead of `add_runtime_dependency`."

[[tests]]
name = "rubocop_cop_gemspec_addruntimedependency_does_not_register_an_offense_when_using_add_dependency"
source = '''
Gem::Specification.new do |spec|
  spec.add_dependency('rubocop')
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_gemspec_addruntimedependency_does_not_register_an_offense_when_using_add_development_dependency"
