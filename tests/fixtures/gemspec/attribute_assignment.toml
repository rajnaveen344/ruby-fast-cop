cop = "Gemspec/AttributeAssignment"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecattributeassignment_does_not_register_an_offense_when_only_indexed_hash_assignment_is_used"
source = '''
Gem::Specification.new do |spec|
  spec.metadata['key-0'] = 'value-0'
  spec.metadata['key-1'] = 'value-1'
end
'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecattributeassignment_does_not_register_an_offense_when_only_normal_hash_assignment_is_used"
source = '''
Gem::Specification.new do |spec|
  spec.metadata = { 'key' => 'value' }
  spec.metadata = { 'key' => 'value' }
end
'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecattributeassignment_does_not_register_an_offense_when_only_indexed_array_assignment_is_used"
source = '''
Gem::Specification.new do |spec|
  spec.authors[0] = 'author-0'
  spec.authors[1] = 'author-1'
end
'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecattributeassignment_does_not_register_an_offense_when_only_normal_array_assignment_is_used"
source = '''
Gem::Specification.new do |spec|
  spec.authors = %w[author-1 author-2]
  spec.authors = %w[author-1 author-2]
end
'''
offenses = []

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecattributeassignment_registers_an_offense_for_inconsistent_hash_assignment"
source = '''
Gem::Specification.new do |spec|
  spec.metadata = { 'key-0' => 'value-0' }
  spec.metadata['key-1'] = 'value-1'
  spec.metadata['key-2'] = 'value-2'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 36
message = "Use consistent style for Gemspec attributes assignment."

[[tests.offenses]]
line = 4
column_start = 2
column_end = 36
message = "Use consistent style for Gemspec attributes assignment."

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecattributeassignment_registers_an_offense_for_inconsistent_array_assignment"
source = '''
Gem::Specification.new do |spec|
  spec.authors = %w[author-0 author-1]
  spec.authors[2] = 'author-2'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 30
message = "Use consistent style for Gemspec attributes assignment."

[tests.config]
Include = ["**/*.gemspec"]

