cop: Gemspec/OrderedDependencies
department: gemspec
severity: convention
implemented: false

tests:
  - name: rubocop_cop_gemspec_ordereddependencies_when_gems_are_alphabetically_sorted_does_not_register_any_offenses
    source: |
      Gem::Specification.new do |spec|
        spec.#{add_dependency} 'rspec'
        spec.#{add_dependency} 'rubocop'
      end
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_gemspec_ordereddependencies_when_gems_are_not_alphabetically_sorted_registers_an_offense
    source: |
      Gem::Specification.new do |spec|
        spec.%{add_dependency} 'rubocop'
        spec.%{add_dependency} 'rspec'
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 32
        message: Dependencies should be sorted in an alphabetical order within their section of the gemspec. Dependency `rspec` should appear before `rubocop`.
    corrected: |
      Gem::Specification.new do |spec|
        spec.#{add_dependency} 'rspec'
        spec.#{add_dependency} 'rubocop'
      end
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_gemspec_ordereddependencies_when_each_individual_group_of_line_is_sorted_does_not_register_any_offenses
    source: |
      Gem::Specification.new do |spec|
        spec.#{add_dependency} 'rspec'
        spec.#{add_dependency} 'rubocop'
      
        spec.#{add_dependency} 'hello'
        spec.#{add_dependency} 'world'
      end
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_gemspec_ordereddependencies_when_dependency_is_separated_by_multiline_comment_with_treatcommentsasgroupseparators_true_accepts
    source: |
      Gem::Specification.new do |spec|
        # For code quality
        spec.#{add_dependency} 'rubocop'
        # For
        # test
        spec.#{add_dependency} 'rspec'
      end
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_gemspec_ordereddependencies_when_dependency_is_separated_by_multiline_comment_with_treatcommentsasgroupseparators_false_registers_an_offense
    source: |
      Gem::Specification.new do |spec|
        # For code quality
        spec.%{add_dependency} 'rubocop'
        # For
        # test
        spec.%{add_dependency} 'rspec'
      end
    offenses:
      - line: 6
        column_start: 2
        column_end: 32
        message: Dependencies should be sorted in an alphabetical order within their section of the gemspec. Dependency `rspec` should appear before `rubocop`.
    corrected: |
      Gem::Specification.new do |spec|
        # For
        # test
        spec.#{add_dependency} 'rspec'
        # For code quality
        spec.#{add_dependency} 'rubocop'
      end
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_gemspec_ordereddependencies_ordered_dependency_add_dependency
    source: |
      add_dependency
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
