cop = "Gemspec/DeprecatedAttributeAssignment"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_gemspec_deprecatedattributeassignment_registers_and_corrects_an_offense_when_using_s_rubygems_version"
source = '''
Gem::Specification.new do |s|
  s.name = 'your_cool_gem_name'
  s.#{attribute} = #{value}
  s.bindir = 'exe'
end
'''
corrected = '''
Gem::Specification.new do |s|
  s.name = 'your_cool_gem_name'
  s.bindir = 'exe'
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 3
column_start = 2
column_end = 27
message = "Do not set `#{attribute}` in gemspec."

