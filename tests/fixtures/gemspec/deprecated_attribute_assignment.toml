cop = "Gemspec/DeprecatedAttributeAssignment"
department = "gemspec"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopgemspecdeprecatedattributeassignment_behaves_like_deprecated_attributes_registers_and_corrects_an_offense_when_using_srubygems_version_"
source = '''
Gem::Specification.new do |s|
  s.name = 'your_cool_gem_name'
  s.date = Time.now.strftime('%Y-%m-%d')
  s.bindir = 'exe'
end
'''
corrected = '''
Gem::Specification.new do |s|
  s.name = 'your_cool_gem_name'
  s.bindir = 'exe'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 40
message = "Do not set `date` in gemspec."

[tests.config]
Include = ["**/*.gemspec"]

