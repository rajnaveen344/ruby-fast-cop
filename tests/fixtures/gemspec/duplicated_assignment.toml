cop = "Gemspec/DuplicatedAssignment"
department = "gemspec"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopgemspecduplicatedassignment_registers_an_offense_when_using_name_twice"
source = '''
Gem::Specification.new do |spec|
  spec.name = 'rubocop'
  spec.name = 'rubocop2'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 24
message = "`name=` method calls already given on line 2 of the gemspec."

[tests.config]
Include = ["**/*.gemspec"]

[[tests]]
name = "rubocopcopgemspecduplicatedassignment_registers_an_offense_when_using_name_twice_and_using__1_as_a_specification_variable"
source = '''
Gem::Specification.new do
  _1.name = 'rubocop'
  _1.name = 'rubocop2'
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 22
message = "`name=` method calls already given on line 2 of the gemspec."

[tests.config]
