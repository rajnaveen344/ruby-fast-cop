cop: Lint/RedundantCopEnableDirective
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_redundantcopenabledirective_when_cop_is_disabled_in_the_configuration_registers_no_offense_when_enabling_the_cop
    source: |
      foo
      # rubocop:enable Layout/LineLength
    offenses:
      []

  - name: rubocop_cop_lint_redundantcopenabledirective_when_cop_is_disabled_in_the_configuration_registers_an_offense_if_enabling_it_twice
    source: |
      foo
      # rubocop:enable Layout/LineLength
      # rubocop:enable Layout/LineLength
    offenses:
      - line: 3
        column_start: 17
        column_end: 34
        message: Unnecessary enabling of Layout/LineLength.

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_an_offense_and_corrects_unnecessary_enable
    source: |
      foo
      # rubocop:enable Layout/LineLength
    offenses:
      - line: 2
        column_start: 17
        column_end: 34
        message: Unnecessary enabling of Layout/LineLength.
    corrected: |
      foo

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_an_offense_and_corrects_when_the_first_cop_is_unnecessarily_enabled
    source: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Metrics/AbcSize, Layout/LineLength
    offenses:
      - line: 3
        column_start: 17
        column_end: 32
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_multiple_offenses_and_corrects_the_same_comment
    source: |
      foo
      # rubocop:enable Metrics/ModuleLength, Metrics/AbcSize
      bar
    offenses:
      - line: 2
        column_start: 39
        column_end: 54
        message: Unnecessary enabling of Metrics/AbcSize.
      - line: 2
        column_start: 17
        column_end: 37
        message: Unnecessary enabling of Metrics/ModuleLength.
    corrected: |
      foo
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_correct_offense_when_combined_with_necessary_enable
    source: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Metrics/AbcSize, Layout/LineLength
      bar
    offenses:
      - line: 3
        column_start: 17
        column_end: 32
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout/LineLength
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_correct_offense_when_combined_with_necessary_enable_no_white_space_after_comma
    source: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Metrics/AbcSize,Layout/LineLength
      bar
    offenses:
      - line: 3
        column_start: 17
        column_end: 32
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout/LineLength
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_registers_an_offense_and_corrects_redundant_enabling_of_same_cop
    source: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout/LineLength
      
      bar
      
      # rubocop:enable Layout/LineLength
      bar
    offenses:
      - line: 7
        column_start: 17
        column_end: 34
        message: Unnecessary enabling of Layout/LineLength.
    corrected: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout/LineLength
      
      bar
      
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_all_switch_registers_an_offense_and_corrects_unnecessary_enable_all
    source: |
      foo
      # rubocop:enable all
    offenses:
      - line: 2
        column_start: 17
        column_end: 20
        message: Unnecessary enabling of all cops.
    corrected: |
      foo

  - name: rubocop_cop_lint_redundantcopenabledirective_all_switch_when_at_least_one_cop_was_disabled_does_not_register_offense
    source: |
      # rubocop:disable Layout/LineLength
      foooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo
      # rubocop:enable all
    offenses:
      []

  - name: rubocop_cop_lint_redundantcopenabledirective_when_last_cop_is_unnecessarily_enabled_registers_an_offense_and_corrects
    source: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength, Metrics/AbcSize
    offenses:
      - line: 3
        column_start: 36
        column_end: 51
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength

  - name: rubocop_cop_lint_redundantcopenabledirective_when_last_cop_is_unnecessarily_enabled_registers_an_offense_and_corrects_when_there_is_no_space_between_the_cops_and_the_comma
    source: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength,Metrics/AbcSize
    offenses:
      - line: 3
        column_start: 35
        column_end: 50
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength

  - name: rubocop_cop_lint_redundantcopenabledirective_when_middle_cop_is_unnecessarily_enabled_registers_an_offense_and_corrects
    source: |
      # rubocop:disable Layout/LineLength, Lint/Debugger
      foo
      # rubocop:enable Layout/LineLength, Metrics/AbcSize, Lint/Debugger
    offenses:
      - line: 3
        column_start: 36
        column_end: 51
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength, Lint/Debugger
      foo
      # rubocop:enable Layout/LineLength, Lint/Debugger

  - name: rubocop_cop_lint_redundantcopenabledirective_when_middle_cop_is_unnecessarily_enabled_registers_an_offense_and_corrects_when_there_is_extra_white_space
    source: |
      # rubocop:disable Layout/LineLength,  Lint/Debugger
      foo
      # rubocop:enable Layout/LineLength,  Metrics/AbcSize,  Lint/Debugger
    offenses:
      - line: 3
        column_start: 37
        column_end: 52
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      # rubocop:disable Layout/LineLength,  Lint/Debugger
      foo
      # rubocop:enable Layout/LineLength,  Lint/Debugger

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_cops_are_unnecessarily_enabled_on_the_same_line_registers_an_offense_and_corrects
    source: |
      foo
      # rubocop:enable Layout/LineLength, Metrics/AbcSize, Lint/Debugger
                                          ^^^^^^^^^^^^^^^ Unnecessary enabling of Metrics/AbcSize.
    offenses:
      - line: 2
        column_start: 53
        column_end: 66
        message: Unnecessary enabling of Lint/Debugger.
      - line: 3
        column_start: 17
        column_end: 34
        message: Unnecessary enabling of Layout/LineLength.
    corrected: |
      foo

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_cops_are_unnecessarily_enabled_on_separate_lines_registers_an_offense_and_corrects_when_there_is_extra_white_space
    source: |
      foo
      # rubocop:enable Metrics/ModuleSize
      # rubocop:enable Layout/LineLength, Metrics/ClassSize
      # rubocop:enable Metrics/AbcSize, Lint/Debugger
    offenses:
      - line: 2
        column_start: 17
        column_end: 35
        message: Unnecessary enabling of Metrics/ModuleSize.
      - line: 3
        column_start: 17
        column_end: 34
        message: Unnecessary enabling of Layout/LineLength.
      - line: 3
        column_start: 36
        column_end: 53
        message: Unnecessary enabling of Metrics/ClassSize.
      - line: 4
        column_start: 34
        column_end: 47
        message: Unnecessary enabling of Lint/Debugger.
      - line: 4
        column_start: 17
        column_end: 32
        message: Unnecessary enabling of Metrics/AbcSize.
    corrected: |
      foo

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_an_offense_and_corrects_unnecessary_enable
    source: |
      foo
      # rubocop:enable Layout
    offenses:
      - line: 2
        column_start: 17
        column_end: 23
        message: Unnecessary enabling of Layout.
    corrected: |
      foo

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_an_offense_and_corrects_when_the_first_department_is_unnecessarily_enabled
    source: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Metrics, Layout/LineLength
    offenses:
      - line: 3
        column_start: 17
        column_end: 24
        message: Unnecessary enabling of Metrics.
    corrected: |
      # rubocop:disable Layout/LineLength
      foo
      # rubocop:enable Layout/LineLength

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_multiple_offenses_and_corrects_the_same_comment
    source: |
      foo
      # rubocop:enable Metrics, Layout
      bar
    offenses:
      - line: 2
        column_start: 26
        column_end: 32
        message: Unnecessary enabling of Layout.
      - line: 2
        column_start: 17
        column_end: 24
        message: Unnecessary enabling of Metrics.
    corrected: |
      foo
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_correct_offense_when_combined_with_necessary_enable
    source: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Metrics, Layout/LineLength
      bar
    offenses:
      - line: 3
        column_start: 17
        column_end: 24
        message: Unnecessary enabling of Metrics.
    corrected: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout/LineLength
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_an_offense_and_corrects_redundant_enabling_of_same_department
    source: |
      # rubocop:disable Layout
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout
      
      bar
      
      # rubocop:enable Layout
      bar
    offenses:
      - line: 7
        column_start: 17
        column_end: 23
        message: Unnecessary enabling of Layout.
    corrected: |
      # rubocop:disable Layout
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout
      
      bar
      
      bar

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_an_offense_and_corrects_redundant_enabling_of_cop_of_same_department
    source: |
      # rubocop:disable Layout
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout, Layout/LineLength
    offenses:
      - line: 3
        column_start: 25
        column_end: 42
        message: Unnecessary enabling of Layout/LineLength.
    corrected: |
      # rubocop:disable Layout
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout

  - name: rubocop_cop_lint_redundantcopenabledirective_when_all_department_enabled_registers_an_offense_and_corrects_redundant_enabling_of_department_of_same_cop
    source: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      # rubocop:enable Layout
      some_code
    offenses:
      - line: 3
        column_start: 17
        column_end: 23
        message: Unnecessary enabling of Layout.
    corrected: |
      # rubocop:disable Layout/LineLength
      fooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo = barrrrrrrrrrrrrrrrrrrrrrrrrr
      
      some_code
