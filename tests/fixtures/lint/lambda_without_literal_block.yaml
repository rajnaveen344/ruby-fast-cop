cop: Lint/LambdaWithoutLiteralBlock
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_lambdawithoutliteralblock_registers_and_corrects_an_offense_when_using_lambda_with_proc_block_argument
    source: |
      lambda(&proc { do_something })
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: lambda without a literal block is deprecated; use the proc without lambda instead.
    corrected: |
      proc { do_something }

  - name: rubocop_cop_lint_lambdawithoutliteralblock_registers_and_corrects_an_offense_when_using_lambda_with_proc_new_block_argument
    source: |
      lambda(&Proc.new { do_something })
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: lambda without a literal block is deprecated; use the proc without lambda instead.
    corrected: |
      Proc.new { do_something }

  - name: rubocop_cop_lint_lambdawithoutliteralblock_registers_and_corrects_an_offense_when_using_lambda_with_a_proc_variable_block_argument
    source: |
      pr = Proc.new { do_something }
      lambda(&pr)
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: lambda without a literal block is deprecated; use the proc without lambda instead.
    corrected: |
      pr = Proc.new { do_something }
      pr

  - name: rubocop_cop_lint_lambdawithoutliteralblock_does_not_register_an_offense_when_using_lambda_with_a_literal_block
    source: |
      lambda { do_something }
    offenses:
      []

  - name: rubocop_cop_lint_lambdawithoutliteralblock_does_not_register_an_offense_when_using_lambda_call
    source: |
      lambda.call
    offenses:
      []

  - name: rubocop_cop_lint_lambdawithoutliteralblock_does_not_register_an_offense_when_using_lambda_with_a_symbol_proc
    source: |
      lambda(&:do_something)
    offenses:
      []
