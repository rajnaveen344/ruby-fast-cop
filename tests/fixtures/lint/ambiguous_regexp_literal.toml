cop = "Lint/AmbiguousRegexpLiteral"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintambiguousregexpliteral_ruby__27_behaves_like_with_a_regexp_literal_in_the_first_argument_without_parentheses_registers_an_offense_and_corrects_when_single_argument"
source = '''
p /pattern/
'''
corrected = '''
p(/pattern/)
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 3
message = "Ambiguous regexp literal. Parenthesize the method arguments if it's surely a regexp literal, or add a whitespace to the right of the `/` if it should be a division."

