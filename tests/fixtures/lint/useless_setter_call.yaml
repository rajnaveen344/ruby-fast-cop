cop: Lint/UselessSetterCall
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselesssettercall_with_method_ending_with_setter_call_on_local_object_registers_an_offense_and_corrects
    source: |
      def test
        top = Top.new
        top.attr = 5
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 5
        message: Useless setter call to local variable `top`.
    corrected: |
      def test
        top = Top.new
        top.attr = 5
        top
      end

