cop = "Lint/FlipFlop"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintflipflop_registers_an_offense_for_inclusive_flipflops"
source = '''
DATA.each_line do |line|
print line if (line =~ /begin/)..(line =~ /end/)
end
'''

[[tests.offenses]]
line = 2
column_start = 14
column_end = 48
message = "Avoid the use of flip-flop operators."

[[tests]]
name = "rubocopcoplintflipflop_registers_an_offense_for_exclusive_flipflops"
source = '''
DATA.each_line do |line|
print line if (line =~ /begin/)...(line =~ /end/)
end
'''

[[tests.offenses]]
line = 2
column_start = 14
column_end = 49
message = "Avoid the use of flip-flop operators."
