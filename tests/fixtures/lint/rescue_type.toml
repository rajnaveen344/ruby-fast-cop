[[tests]]
name = "rubocop_cop_lint_rescuetype_begin_rescue_registers_an_offense_and_autocorrects"
source = '''
begin
  foo
rescue %{rescues}
  bar
end
'''
corrected = '''
begin
  foo
rescue
  bar
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 3
column_start = 0
column_end = 17
message = "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."

