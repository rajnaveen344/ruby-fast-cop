[[tests]]
name = "rubocopcoplintrescuetype_behaves_like_offenses_begin_rescue_rescuing_from_nil_registers_an_offense_and_autocorrects"
source = '''
begin
  foo
rescue nil
  bar
end
'''
corrected = '''
begin
  foo
rescue
  bar
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 10
message = "Rescuing from `nil` will raise a `TypeError` instead of catching the actual exception."

