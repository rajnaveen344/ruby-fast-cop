  - name: rubocop_cop_lint_redundantwithobject_registers_an_offense_and_corrects_when_using_ary_each_with_object_v_v
    source: |
      ary.each_with_object([]) { |v| v }
    offenses:
      - line: 1
        column_start: 4
        column_end: 24
        message: Use `each` instead of `each_with_object`.
    corrected: |
      ary.each { |v| v }

  - name: rubocop_cop_lint_redundantwithobject_registers_an_offense_and_corrects_when_using_ary_each_with_object_v_v
