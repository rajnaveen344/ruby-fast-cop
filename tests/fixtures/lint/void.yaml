cop: Lint/Void
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_void
    source: |
      a %{op} b
      a %{op} b
      a %{op} b
    offenses:
      - line: 1
        column_start: 2
        column_end: 9
        message: "Operator `#{op}` used in void context."
      - line: 2
        column_start: 2
        column_end: 9
        message: "Operator `#{op}` used in void context."
    corrected: |
      a
      b
      a
      b
      a #{op} b
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_void
    source: |
      something
      a #{op} b
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_void
    source: |
      a #{op} b
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_void
