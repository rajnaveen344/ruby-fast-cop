[[tests]]
name = "rubocop_cop_lint_ambiguousblockassociation_without_parentheses_without_receiver_registers_an_offense"
source = '''
some_method a { |el| puts el }
'''
corrected = '''
some_method(a { |el| puts el })
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "Parenthesize the param `a { |el| puts el }` to make sure that the block will be associated with the `a` method call."

