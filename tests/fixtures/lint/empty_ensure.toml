cop = "Lint/EmptyEnsure"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintemptyensure_registers_an_offense_and_corrects_empty_ensure"
source = '''
begin
  something
ensure # hello
  # world
end
'''
corrected = '''
begin
  something
 # hello
  # world
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 6
message = "Empty `ensure` block detected."

[[tests]]
name = "rubocopcoplintemptyensure_does_not_register_an_offense_for_nonempty_ensure"
source = '''
begin
  something
  return
ensure
  file.close
end
'''
offenses = []
