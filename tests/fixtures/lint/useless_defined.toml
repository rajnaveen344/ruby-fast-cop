cop = "Lint/UselessDefined"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintuselessdefined_registers_an_offense_when_using_defined_with_a_string_argument"
source = '''
defined?("FooBar")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 18
message = "Calling `defined?` with a string argument will always return a truthy value."

[[tests]]
name = "rubocopcoplintuselessdefined_registers_an_offense_when_using_defined_with_interpolation"
source = '''
defined?("Foo#{bar}")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 21
message = "Calling `defined?` with a string argument will always return a truthy value."

[[tests]]
name = "rubocopcoplintuselessdefined_registers_an_offense_when_using_defined_with_a_symbol"
source = '''
defined?(:FooBar)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 17
message = "Calling `defined?` with a symbol argument will always return a truthy value."

[[tests]]
name = "rubocopcoplintuselessdefined_registers_an_offense_when_using_defined_an_interpolated_symbol"
source = '''
defined?(:"Foo#{bar}")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 22
message = "Calling `defined?` with a symbol argument will always return a truthy value."

[[tests]]
name = "rubocopcoplintuselessdefined_does_not_register_an_offense_when_using_defined_with_a_constant"
source = '''
defined?(FooBar)
'''
offenses = []

[[tests]]
name = "rubocopcoplintuselessdefined_does_not_register_an_offense_when_using_defined_with_a_method"
source = '''
defined?(foo_bar)
'''
offenses = []

[[tests]]
name = "rubocopcoplintuselessdefined_does_not_register_an_offense_when_calling_a_method_on_a_symbol"
source = '''
defined?(:foo.to_proc)
'''
offenses = []
