cop = "Lint/OutOfRangeRegexpRef"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_outofrangeregexpref_registers_an_offense_when_references_are_used_before_any_regexp"
source = '''
puts $3
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 7
message = "$3 is out of range (no regexp capture groups detected)."

[[tests]]
name = "rubocop_cop_lint_outofrangeregexpref_registers_an_offense_when_out_of_range_references_are_used_for_named_captures"
source = '''
/(?<foo>FOO)(?<bar>BAR)/ =~ "FOOBAR"
puts $3
'''

[[tests.offenses]]
line = 2
column_start = 5
column_end = 7
message = "$3 is out of range (2 regexp capture groups detected)."

