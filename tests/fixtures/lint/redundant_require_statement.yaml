cop: Lint/RedundantRequireStatement
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_redundantrequirestatement_registers_an_offense_when_using_requiring_enumerator
    source: |
      require 'enumerator'
      require 'uri'
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Remove unnecessary `require` statement.
    corrected: |
      require 'uri'

  - name: rubocop_cop_lint_redundantrequirestatement_registers_an_offense_when_using_requiring_enumerator_with_modifier_form
    source: |
      require 'enumerator' if condition
      require 'uri'
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Remove unnecessary `require` statement.
    corrected: |
      if condition
      end
      require 'uri'

  - name: rubocop_cop_lint_redundantrequirestatement_registers_an_offense_when_using_requiring_enumerator_in_condition
    source: |
      if condition
        require 'enumerator'
      end
      require 'uri'
    offenses:
      - line: 2
        column_start: 2
        column_end: 22
        message: Remove unnecessary `require` statement.
    corrected: |
      if condition
      end
      require 'uri'

  - name: rubocop_cop_lint_redundantrequirestatement_target_ruby_version_2_0_does_not_register_an_offense_when_using_requiring_thread
    source: |
      require 'thread'
    offenses:
      []
    ruby_version: ">= 2.0"

  - name: rubocop_cop_lint_redundantrequirestatement_target_ruby_version_2_1_registers_an_offense_and_corrects_when_using_requiring_thread_or_already_redundant_features
    source: |
      require 'enumerator'
      require 'thread'
      require 'uri'
    offenses:
