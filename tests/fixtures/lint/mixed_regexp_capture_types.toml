cop = "Lint/MixedRegexpCaptureTypes"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_registers_an_offense_when_both_of_named_and_numbered_captures_are_used"
source = '''
/(?<foo>bar)(baz)/
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 18
message = "Do not mix named captures and numbered captures in a Regexp literal."

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_does_not_register_offense_to_a_regexp_with_named_capture_only"
source = '''
/(?<foo>foo?<bar>bar)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_does_not_register_offense_to_a_regexp_with_look_behind"
source = '''
/(?<=>)(<br>)(?=><)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_does_not_register_offense_to_a_regexp_with_numbered_capture_only"
source = '''
/(foo)(bar)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_does_not_register_offense_to_a_regexp_with_named_capture_and_noncapturing_group"
source = '''
/(?<foo>bar)(?:bar)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_does_not_register_offense_when_using_a_regexp_cannot_be_processed_by_regexp_parser_gem"
source = '''
/data = ({"words":.+}}}[^}]*})/m
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_when_containing_a_nonregexp_literal_does_not_register_an_offense_when_containing_a_lvar"
source = '''
var = '(\d+)'
/(?<foo>#{var}*)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_when_containing_a_nonregexp_literal_does_not_register_an_offense_when_containing_an_ivar"
source = '''
