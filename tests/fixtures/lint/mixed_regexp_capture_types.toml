'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_when_containing_a_nonregexp_literal_does_not_register_an_offense_when_containing_a_cvar"
source = '''
/(?<foo>#{@@var}*)/
'''
offenses = []

[[tests]]
name = "rubocopcoplintmixedregexpcapturetypes_when_containing_a_nonregexp_literal_does_not_register_an_offense_when_containing_a_gvar"
source = '''
