cop: Lint/DuplicateSetElement
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}[:foo, :bar, :foo]
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}[:foo, :bar]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      ::#{class_name}[:foo, :bar, :foo]
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      ::#{class_name}[:foo, :bar]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_multiple_duplicate_symbol_element
    source: |
      #{class_name}[:foo, :bar, :foo, :baz, :baz]
    offenses:
      - line: 1
        column_start: 0
        column_end: 43
        message: "Remove the duplicate element in #{class_name}."
      - line: 1
        column_start: 0
        column_end: 43
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}[:foo, :bar, :baz]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_duplicate_lvar_element
    source: |
      foo = do_foo
      bar = do_bar
      
      #{class_name}[foo, bar, foo]
    offenses:
      - line: 4
        column_start: 0
        column_end: 28
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      foo = do_foo
      bar = do_bar
      
      #{class_name}[foo, bar]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_duplicate_ivar_element
    source: |
      #{class_name}[@foo, @bar, @foo]
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}[@foo, @bar]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_duplicate_constant_element
    source: |
      #{class_name}[Foo, Bar, Foo]
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}[Foo, Bar]
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_does_not_register_an_offense_when_using_duplicate_method_call_element
    source: |
      #{class_name}[foo, bar, foo]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_does_not_register_an_offense_when_using_duplicate_safe_navigation_method_call_element
    source: |
      #{class_name}[obj&.foo, obj&.bar, obj&.foo]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_does_not_register_an_offense_when_using_duplicate_ternary_operator_element
    source: |
      #{class_name}[rand > 0.5 ? 1 : 2, rand > 0.5 ? 1 : 2]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}.new([:foo, :bar, :foo])
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}.new([:foo, :bar])
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}.new(%i[foo bar foo])
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      #{class_name}.new(%i[foo bar])
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      ::#{class_name}.new([:foo, :bar, :foo])
    offenses:
      - line: 1
        column_start: 0
        column_end: 39
        message: "Remove the duplicate element in #{class_name}."
    corrected: |
      ::#{class_name}.new([:foo, :bar])
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}[foo, bar]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}.new([:foo, :bar])
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}[]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement
    source: |
      #{class_name}[:foo]
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_duplicate_symbol_element_in_to_set
    source: |
      [:foo, :bar, :foo].to_set
    offenses:
      - line: 1
        column_start: 13
        column_end: 17
        message: Remove the duplicate element in Set.
    corrected: |
      [:foo, :bar].to_set

  - name: rubocop_cop_lint_duplicatesetelement_registers_an_offense_when_using_duplicate_symbol_element_in_to_set
    source: |
      [:foo, :bar, :foo]&.to_set
    offenses:
      - line: 1
        column_start: 13
        column_end: 17
        message: Remove the duplicate element in Set.
    corrected: |
      [:foo, :bar]&.to_set

  - name: rubocop_cop_lint_duplicatesetelement_does_not_register_an_offense_when_using_duplicate_symbol_element_in_array
    source: |
      Array[:foo, :bar, :foo]
    offenses:
      []

  - name: rubocop_cop_lint_duplicatesetelement_does_not_register_an_offense_when_using_duplicate_symbol_element_in_array_new
    source: |
      Array.new([:foo, :bar, :foo])
    offenses:
      []
