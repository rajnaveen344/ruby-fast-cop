cop = "Lint/RedundantSplatExpansion"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintredundantsplatexpansion_allows_assigning_to_a_splat"
strip_trailing_newline = true
source = '''
*, rhs = *node
'''
offenses = []

[tests.config]
AllowPercentLiteralArrayArgument = true

