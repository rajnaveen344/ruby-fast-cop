cop: Lint/NumericOperationWithConstantResult
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_multiplied_by_0
    source: |
      x * 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Numeric operation with a constant result detected.
    corrected: |
      0

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_divided_by_itself
    source: |
      x / x
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Numeric operation with a constant result detected.
    corrected: |
      1

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_raised_to_the_power_of_0
    source: |
      x ** 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Numeric operation with a constant result detected.
    corrected: |
      1

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_multiplied_by_0_via_abbreviated_assignment
    source: |
      x *= 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Numeric operation with a constant result detected.
    corrected: |
      x = 0

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_divided_by_itself_via_abbreviated_assignment
    source: |
      x /= x
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Numeric operation with a constant result detected.
    corrected: |
      x = 1

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_raised_to_the_power_of_0_via_abbreviated_assignment
    source: |
      x **= 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Numeric operation with a constant result detected.
    corrected: |
      x = 1

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_multiplied_by_0_using_dot_notation
    source: |
      x.*(0)
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Numeric operation with a constant result detected.
    corrected: |
      0

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_divided_by_using_dot_notation
    source: |
      x./(x)
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Numeric operation with a constant result detected.
    corrected: |
      1

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_multiplied_by_0_using_safe_navigation
    source: |
      x&.*(0)
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Numeric operation with a constant result detected.
    corrected: |
      0

  - name: rubocop_cop_lint_numericoperationwithconstantresult_registers_an_offense_when_a_variable_is_divided_by_using_safe_navigation
    source: |
      x&./(x)
    offenses:
      - line: 1
        column_start: 0
        column_end: 7
        message: Numeric operation with a constant result detected.
    corrected: |
      1
