cop: Lint/SendWithMixinArgument
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_sendwithmixinargument_registers_an_offense_when_using_send_with_include
    source: |
      Foo.send(:include, Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 23
        message: "Use `include Bar` instead of `send(:include, Bar)`."
    corrected: |
      Foo.include Bar

  - name: rubocop_cop_lint_sendwithmixinargument_registers_an_offense_when_using_send_with_prepend
    source: |
      Foo.send(:prepend, Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 23
        message: "Use `prepend Bar` instead of `send(:prepend, Bar)`."
    corrected: |
      Foo.prepend Bar

  - name: rubocop_cop_lint_sendwithmixinargument_registers_an_offense_when_using_send_with_extend
    source: |
      Foo.send(:extend, Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 22
        message: "Use `extend Bar` instead of `send(:extend, Bar)`."
    corrected: |
      Foo.extend Bar

  - name: rubocop_cop_lint_sendwithmixinargument_when_specifying_a_mixin_method_as_a_string_registers_an_offense_when_using_send_with_include
    source: |
      Foo.send('include', Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 24
        message: "Use `include Bar` instead of `send('include', Bar)`."
    corrected: |
      Foo.include Bar

  - name: rubocop_cop_lint_sendwithmixinargument_when_specifying_a_mixin_method_as_a_string_registers_an_offense_when_using_send_with_prepend
    source: |
      Foo.send('prepend', Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 24
        message: "Use `prepend Bar` instead of `send('prepend', Bar)`."
    corrected: |
      Foo.prepend Bar

  - name: rubocop_cop_lint_sendwithmixinargument_when_specifying_a_mixin_method_as_a_string_registers_an_offense_when_using_send_with_extend
    source: |
      Foo.send('extend', Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 23
        message: "Use `extend Bar` instead of `send('extend', Bar)`."
    corrected: |
      Foo.extend Bar

  - name: rubocop_cop_lint_sendwithmixinargument_registers_an_offense_when_using_public_send_method
    source: |
      Foo.public_send(:include, Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 30
        message: "Use `include Bar` instead of `public_send(:include, Bar)`."
    corrected: |
      Foo.include Bar

  - name: rubocop_cop_lint_sendwithmixinargument_registers_an_offense_when_using_send_method
    source: |
      Foo.__send__(:include, Bar)
    offenses:
      - line: 1
        column_start: 4
        column_end: 27
        message: "Use `include Bar` instead of `__send__(:include, Bar)`."
    corrected: |
      Foo.include Bar

  - name: rubocop_cop_lint_sendwithmixinargument_does_not_register_an_offense_when_not_using_a_mixin_method
    source: |
      Foo.send(:do_something, Bar)
    offenses:
      []

  - name: rubocop_cop_lint_sendwithmixinargument_does_not_register_an_offense_when_using_include
    source: |
      Foo.include Bar
    offenses:
      []

  - name: rubocop_cop_lint_sendwithmixinargument_does_not_register_an_offense_when_using_prepend
    source: |
      Foo.prepend Bar
    offenses:
      []

  - name: rubocop_cop_lint_sendwithmixinargument_does_not_register_an_offense_when_using_extend
    source: |
      Foo.extend Bar
    offenses:
      []

  - name: rubocop_cop_lint_sendwithmixinargument_when_using_namespace_for_module_registers_an_offense_when_using_send_with_include
    source: |
      A::Foo.send(:include, B::Bar)
    offenses:
      - line: 1
        column_start: 7
        column_end: 29
        message: "Use `include B::Bar` instead of `send(:include, B::Bar)`."
    corrected: |
      A::Foo.include B::Bar

  - name: rubocop_cop_lint_sendwithmixinargument_when_multiple_arguments_are_passed_registers_an_offense
    source: |
      Foo.send(:include, Bar, Baz)
    offenses:
      - line: 1
        column_start: 4
        column_end: 28
        message: "Use `include Bar, Baz` instead of `send(:include, Bar, Baz)`."
    corrected: |
      Foo.include Bar, Baz
