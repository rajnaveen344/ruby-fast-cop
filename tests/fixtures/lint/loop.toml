cop = "Lint/Loop"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintloop_registers_an_offense_and_corrects_for_beginendwhile"
source = '''
begin
  something
end while test
'''
corrected = '''
loop do
  something
break unless test
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 9
message = "Use `Kernel#loop` with `break` rather than `begin/end/until`(or `while`)."

[[tests]]
name = "rubocopcoplintloop_registers_an_offense_for_beginenduntil"
source = '''
begin
  something
end until test
'''
corrected = '''
loop do
  something
break if test
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 9
message = "Use `Kernel#loop` with `break` rather than `begin/end/until`(or `while`)."

