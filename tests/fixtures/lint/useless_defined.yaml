cop: Lint/UselessDefined
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessdefined_registers_an_offense_when_using_defined_with_a_string_argument
    source: |
      defined?("FooBar")
    offenses:
      - line: 1
        column_start: 0
        column_end: 18
        message: Calling `defined?` with a string argument will always return a truthy value.

  - name: rubocop_cop_lint_uselessdefined_registers_an_offense_when_using_defined_with_interpolation
    source: |
      defined?("Foo#{bar}")
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: Calling `defined?` with a string argument will always return a truthy value.

  - name: rubocop_cop_lint_uselessdefined_registers_an_offense_when_using_defined_with_a_symbol
    source: |
      defined?(:FooBar)
    offenses:
      - line: 1
        column_start: 0
        column_end: 17
        message: Calling `defined?` with a symbol argument will always return a truthy value.

  - name: rubocop_cop_lint_uselessdefined_registers_an_offense_when_using_defined_an_interpolated_symbol
    source: |
      defined?(:"Foo#{bar}")
    offenses:
      - line: 1
        column_start: 0
        column_end: 22
        message: Calling `defined?` with a symbol argument will always return a truthy value.

  - name: rubocop_cop_lint_uselessdefined_does_not_register_an_offense_when_using_defined_with_a_constant
    source: |
      defined?(FooBar)
    offenses:
      []

  - name: rubocop_cop_lint_uselessdefined_does_not_register_an_offense_when_using_defined_with_a_method
    source: |
      defined?(foo_bar)
    offenses:
      []

  - name: rubocop_cop_lint_uselessdefined_does_not_register_an_offense_when_calling_a_method_on_a_symbol
    source: |
      defined?(:foo.to_proc)
    offenses:
      []
