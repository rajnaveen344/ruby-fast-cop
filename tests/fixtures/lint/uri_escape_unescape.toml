cop = "Lint/UriEscapeUnescape"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_uriescapeunescape_registers_an_offense_when_using_uri_escape_http_example_com"
source = '''
URI.escape('http://example.com')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 32
message = "`URI.escape` method is obsolete and should not be used. Instead, use `CGI.escape`, `URI.encode_www_form` or `URI.encode_www_form_component` depending on your specific use case."

