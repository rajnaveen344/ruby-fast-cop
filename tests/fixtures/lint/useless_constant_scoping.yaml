cop: Lint/UselessConstantScoping
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessconstantscoping_registers_an_offense_when_using_constant_after_private_access_modifier
    source: |
      class Foo
        private
        CONST = 42
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 12
        message: Useless `private` access modifier for constant scope.

  - name: rubocop_cop_lint_uselessconstantscoping_registers_an_offense_when_using_constant_not_defined_in_private_constant
    source: |
      class Foo
        private
      
        CONST = 42
        private_constant :X
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 12
        message: Useless `private` access modifier for constant scope.

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_crash_an_offense_when_using_constant_and_private_constant_with_variable_argument
    source: |
      class Foo
        private
      
        CONST = 42
      
        private_constant var
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 12
        message: Useless `private` access modifier for constant scope.

  - name: rubocop_cop_lint_uselessconstantscoping_registers_an_offense_when_multiple_assigning_to_constants_after_private_access_modifier
    source: |
      class Foo
        private
        FOO = BAR = 42
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 16
        message: Useless `private` access modifier for constant scope.

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant
    source: |
      class Foo
        CONST = 42
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessconstantscoping_registers_an_offense_when_using_constant_after_private_access_modifier_in_class_self
    source: |
      class Foo
        class << self
          private
          CONST = 42
        end
      end
    offenses:
      - line: 4
        column_start: 4
        column_end: 14
        message: Useless `private` access modifier for constant scope.

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant_after_private_access_modifier_in_class_self_with_private_constant
    source: |
      class Foo
        class << self
          private
          CONST = 42
          private_constant :CONST
        end
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant_defined_in_symbol_argument_of_private_constant
    source: |
      class Foo
        private
      
        CONST = 42
        private_constant :CONST
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant_defined_in_multiple_symbol_arguments_of_private_constant
    source: |
      class Foo
        private
      
        CONST = 42
        private_constant :CONST, :X
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant_defined_in_string_argument_of_private_constant
    source: |
      class Foo
        private
      
        CONST = 42
        private_constant 'CONST'
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessconstantscoping_does_not_register_an_offense_when_using_constant_after_private_access_modifier_with_arguments
    source: |
      class Foo
        private do_something
      
        CONST = 42
      end
    offenses:
      []
