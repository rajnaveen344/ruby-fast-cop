cop = "Lint/NumberConversion"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_numberconversion_registers_an_offense_when_using_to_i"
source = '''
"10".to_i
'''
corrected = '''
Integer("10", 10)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 9
message = "Replace unsafe number conversion with number class parsing, instead of using `\"10\".to_i`, use stricter `Integer(\"10\", 10)`."

