cop = "Lint/DuplicateMethods"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintduplicatemethods_registers_an_offense_for_duplicate_class_methods_with_named_receiver_in_class"
filename = "src.rb"
source = '''
class A
  def A.some_method
    implement 1
  end
  def A.some_method
    implement 2
  end
end
'''

[[tests.offenses]]
line = 5
column_start = 2
column_end = 19
message = "Method `A.some_method` is defined at both src.rb:2 and src.rb:5."

