[[tests]]
name = "rubocopcoplintduplicatemethods_does_not_register_an_offense_when_there_are_same_alias_method_name_outside_ensure_scope"
source = '''
module FooTest
  def make_save_always_fail
    Foo.class_eval do
      def failed_save
        raise
      end
      alias_method :original_save, :save
      alias_method :save, :failed_save
    end

    yield
  ensure
    Foo.class_eval do
      alias_method :save, :original_save
    end
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintduplicatemethods_registers_an_offense_when_there_are_duplicate_alias_method_name_inside_ensure_scope"
