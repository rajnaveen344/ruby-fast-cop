cop = "Lint/DuplicateMatchPattern"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_duplicatematchpattern_registers_an_offense_for_repeated_in_patterns"
source = '''
case x
in foo
  first_method
in bar
  second_method
in foo
  third_method
end
'''
ruby_version = ">= 2.7"

[[tests.offenses]]
line = 6
column_start = 3
column_end = 6
message = "Duplicate `in` pattern detected."

[[tests]]
name = "rubocop_cop_lint_duplicatematchpattern_registers_an_offense_for_subsequent_repeated_in_patterns"
