cop = "Lint/DuplicateCaseCondition"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintduplicatecasecondition_registers_an_offense_for_repeated_case_conditionals"
source = '''
case x
when false
  first_method
when true
  second_method
when false
  third_method
end
'''

[[tests.offenses]]
line = 6
column_start = 5
column_end = 10
message = "Duplicate `when` condition detected."

