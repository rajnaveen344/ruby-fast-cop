cop = "Lint/NestedMethodDefinition"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_nestedmethoddefinition_registers_an_offense_for_a_nested_method_definition"
source = '''
def x; def y; end; end
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 17
message = "Method definitions must not be nested. Use `lambda` instead."

[[tests]]
name = "rubocop_cop_lint_nestedmethoddefinition_registers_an_offense_for_a_nested_singleton_method_definition"
source = '''
class Foo
end
foo = Foo.new
def foo.bar
  def baz
  end
end
'''

[[tests.offenses]]
line = 5
column_start = 2
column_end = 9
message = "Method definitions must not be nested. Use `lambda` instead."

