cop = "Lint/AmbiguousOperatorPrecedence"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_does_not_register_an_offense_when_there_is_only_one_operator_in_the_expression"
source = '''
a + b
'''
offenses = []

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_does_not_register_an_offense_when_all_operators_in_the_expression_have_the_same_precedence"
source = '''
a + b + c
a * b / c % d
a && b && c
'''
offenses = []

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_does_not_register_an_offense_when_expressions_are_wrapped_in_parentheses_by_precedence"
source = '''
a + (b * c)
(a ** b) + c
'''
offenses = []

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_does_not_register_an_offense_when_expressions_are_wrapped_in_parentheses_by_reverse_precedence"
source = '''
(a + b) * c
a ** (b + c)
'''
offenses = []

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_does_not_register_an_offense_when_boolean_expressions_are_wrapped_in_parens"
source = '''
(a && b) || c
a || (b & c)
'''
offenses = []

[[tests]]
name = "rubocopcoplintambiguousoperatorprecedence_registers_an_offense_when_an_expression_with_mixed_precedence_has_no_parens"
source = '''
a + b * c
'''
corrected = '''
a + (b * c)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 9
message = "Wrap expressions with varying precedence with parentheses to avoid ambiguity."

