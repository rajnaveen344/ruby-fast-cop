cop = "Lint/UnusedBlockArgument"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintunusedblockargument_inspection_when_a_block_takes_multiple_arguments_and_an_argument_is_unused_registers_an_offense"
source = '''
hash.each do |key, value|
  puts key
end
'''
corrected = '''
hash.each do |key, _value|
  puts key
end
'''

[[tests.offenses]]
line = 1
column_start = 19
column_end = 24
message = "Unused block argument - `value`. If it's necessary, use `_` or `_value` as an argument name to indicate that it won't be used."

[tests.config]
AllowUnusedKeywordArguments = false
IgnoreEmptyBlocks = true

