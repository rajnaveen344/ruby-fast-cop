[[tests]]
name = "rubocopcoplintunusedblockargument_inspection_when_a_lambda_block_takes_arguments_and_all_the_arguments_are_unused_registers_offenses_and_suggests_using_a_proc"
source = '''
-> (foo, bar) { do_something }
'''
corrected = '''
-> (_foo, _bar) { do_something }
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 12
message = "Unused block argument - `bar`. If it's necessary, use `_` or `_bar` as an argument name to indicate that it won't be used. Also consider using a proc without arguments instead of a lambda if you want it to accept any arguments but don't care about them."

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Unused block argument - `foo`. If it's necessary, use `_` or `_foo` as an argument name to indicate that it won't be used. Also consider using a proc without arguments instead of a lambda if you want it to accept any arguments but don't care about them."

