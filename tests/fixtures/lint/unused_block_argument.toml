cop = "Lint/UnusedBlockArgument"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_unusedblockargument_inspection_when_a_block_takes_multiple_arguments_and_an_argument_is_unused_registers_an_offense"
source = '''
hash.each do |key, value|
  puts key
end
'''
corrected = '''
hash.each do |key, _value|
  puts key
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 19
column_end = 24
message = "#{message}"

[tests.config]
AllowUnusedKeywordArguments = false

