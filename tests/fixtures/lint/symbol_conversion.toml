  "a": 1,
  "b": 2,
  'c': 3,
  'd-e': 4
}
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 3
message = "Symbol hash key should be quoted for consistency; use `\"a\":` instead."

[[tests.offenses]]
line = 3
column_start = 2
column_end = 3
message = "Symbol hash key should be quoted for consistency; use `\"b\":` instead."

[tests.config]
EnforcedStyle = "consistent"

