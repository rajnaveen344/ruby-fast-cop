cop: Lint/UselessOr
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessor
    source: |
      x.#{method} || fallback
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: "`fallback` will never evaluate because `x.#{method}` always returns a truthy value."
    corrected: |
      x.#{method}
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      x.#{method} or fallback
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: "`fallback` will never evaluate because `x.#{method}` always returns a truthy value."
    corrected: |
      x.#{method}
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      x.#{method} || fallback || other_fallback
    offenses:
      - line: 1
        column_start: 0
        column_end: 41
        message: "`fallback` will never evaluate because `x.#{method}` always returns a truthy value."
    corrected: |
      x.#{method}
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      foo || x.#{method} || fallback
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: "`fallback` will never evaluate because `x.#{method}` always returns a truthy value."
    corrected: |
      foo || x.#{method}
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      (foo || x.#{method}) || fallback
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: "`fallback` will never evaluate because `x.#{method}` always returns a truthy value."
    corrected: |
      (foo || x.#{method})
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      (foo || x.#{method}) && operand
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      foo || x.#{method}
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      x&.#{method} || fallback
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_uselessor
    source: |
      x.#{method}
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_uselessor_does_not_register_an_offense_with_x_foo_fallback
    source: |
      x.foo || fallback
    offenses:
      []
