cop = "Lint/OrAssignmentToConstant"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintorassignmenttoconstant_registers_an_offense_with_orassignment_to_a_constant"
source = '''
CONST ||= 1
'''
corrected = '''
CONST = 1
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "Avoid using or-assignment with constants."

[[tests]]
name = "rubocopcoplintorassignmenttoconstant_registers_an_offense_with_orassignment_to_a_constant_in_method_definition"
source = '''
def foo
  M::CONST ||= 1
end
'''

[[tests.offenses]]
line = 2
column_start = 11
column_end = 14
message = "Avoid using or-assignment with constants."

[[tests]]
name = "rubocopcoplintorassignmenttoconstant_registers_an_offense_with_orassignment_to_a_constant_in_singleton_method_definition"
source = '''
def self.foo
  M::CONST ||= 1
end
'''

[[tests.offenses]]
line = 2
column_start = 11
column_end = 14
message = "Avoid using or-assignment with constants."

[[tests]]
name = "rubocopcoplintorassignmenttoconstant_registers_an_offense_with_orassignment_to_a_constant_in_method_definition_using_define_method"
source = '''
