cop = "Lint/LiteralAssignmentInCondition"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintliteralassignmentincondition_registers_an_offense_when_assigning_integer_literal_to_local_variable_in_if_condition"
source = '''
if test = 42
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 12
message = "Don't use literal assignment `= 42` in conditional, should be `==` or non-literal operand."

