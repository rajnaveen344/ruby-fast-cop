cop: Lint/ToEnumArguments
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_required_arg_is_missing
    source: |
      def m(x)
        return to_enum(:m) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 20
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_optional_arg_is_missing
    source: |
      def m(x, y = 1)
        return to_enum(:m, x) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 23
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_splat_arg_is_missing
    source: |
      def m(x, y = 1, *args)
        return to_enum(:m, x, y) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 26
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_required_keyword_arg_is_missing
    source: |
      def m(x, y = 1, *args, required:)
        return to_enum(:m, x, y, *args) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 33
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_optional_keyword_arg_is_missing
    source: |
      def m(x, y = 1, *args, required:, optional: true)
        return to_enum(:m, x, y, *args, required: required) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 53
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_splat_keyword_arg_is_missing
    source: |
      def m(x, y = 1, *args, required:, optional: true, **kwargs)
        return to_enum(:m, x, y, *args, required: required, optional: optional) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 73
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_arguments_are_swapped
    source: |
      def m(x, y = 1)
        return to_enum(:m, y, x) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 26
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_other_values_are_passed_for_keyword_arguments
    source: |
      def m(required:, optional: true)
        return to_enum(:m, required: something_else, optional: optional) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 66
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_does_not_register_an_offense_when_not_inside_method_definition
    source: |
      to_enum(:m)
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments_does_not_register_an_offense_when_method_call_has_a_receiver_other_than_self
    source: |
      def m(x)
        return foo.to_enum(:m) unless block_given?
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_method_is_called_on_self
    source: |
      def m(x)
        return self.to_enum(:m) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 25
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_ignores_the_block_argument
    source: |
      def m(x, &block)
        return to_enum(:m, x) unless block_given?
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments_does_not_register_an_offense_when_enumerator_is_created_for_another_method
    source: |
      def m(x)
        return to_enum(:not_m) unless block_given?
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments_does_not_register_an_offense_when_enumerator_is_created_for_another_method_in_no_arguments_method_definition
    source: |
      def m
        return to_enum(:not_m) unless block_given?
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments_registers_an_offense_when_enumerator_is_created_for_method_with_missing_arguments
    source: |
      def m(x)
        return to_enum(__method__) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 28
        message: Ensure you correctly provided all the arguments.

  - name: rubocop_cop_lint_toenumarguments_does_not_register_an_offense_when_enumerator_is_not_created_for_method_and_callee_methods
    source: |
      def m(x)
        return to_enum(never_nullable(value), x)
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments
    source: |
      def m(x)
        return to_enum(obj&.never_nullable(value), x)
      end
    offenses:
      []

  - name: rubocop_cop_lint_toenumarguments
    source: |
      def m(x, y = 1, *args, required:, optional: true, **kwargs, &block)
        return to_enum(#{code}, x, y, *args, required: required, optional: optional, **kwargs) unless block_given?
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_toenumarguments_arguments_forwarding_registers_an_offense_when_enumerator_is_created_with_non_matching_arguments
    source: |
      def m(...)
        return to_enum(:m, x, ...) unless block_given?
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 28
        message: Ensure you correctly provided all the arguments.
    ruby_version: ">= 3.0"

  - name: rubocop_cop_lint_toenumarguments_arguments_forwarding_does_not_register_an_offense_when_enumerator_is_created_with_the_correct_arguments
    source: |
      def m(...)
        return to_enum(:m, ...) unless block_given?
      end
    offenses:
      []
    ruby_version: ">= 3.0"

  - name: rubocop_cop_lint_toenumarguments_anonymous_positional_arguments_forwarding_does_not_register_an_offense_when_enumerator_is_created_with_the_correct_arguments
    source: |
      def do_something(*)
        return to_enum(:do_something, *) unless block_given?
      
        do_something_else
      end
    offenses:
      []
    ruby_version: ">= 3.2"

  - name: rubocop_cop_lint_toenumarguments_anonymous_keyword_arguments_forwarding_does_not_register_an_offense_when_enumerator_is_created_with_the_correct_arguments
    source: |
      def do_something(**)
        return to_enum(:do_something, **) unless block_given?
      
        do_something_else
      end
    offenses:
      []
    ruby_version: ">= 3.2"
