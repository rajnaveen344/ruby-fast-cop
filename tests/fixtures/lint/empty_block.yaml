cop: Lint/EmptyBlock
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_emptyblock_registers_an_offense_for_empty_block_within_method_call
    source: |
      items.each { |item| }
    offenses:
      - line: 1
        column_start: 0
        column_end: 21
        message: Empty block detected.
    config:
      AllowEmptyLambdas: true
      AllowComments: true

