cop: Lint/SuppressedExceptionInNumberConversion
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_suppressedexceptioninnumberconversion_registers_an_offense_when_using_integer_arg_rescue_nil
    source: |
      Integer(arg) rescue nil
    offenses:
      - line: 1
        column_start: 0
        column_end: 23
        message: "Use `Integer(arg, exception: false)` instead."
    corrected: |
      Integer(arg, exception: false)
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_suppressedexceptioninnumberconversion_registers_an_offense_when_using_integer_arg_base_rescue_nil
