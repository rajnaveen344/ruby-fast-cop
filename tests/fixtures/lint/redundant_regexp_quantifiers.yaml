cop: Lint/RedundantRegexpQuantifiers
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_redundantregexpquantifiers_with_non_redundant_quantifiers_does_not_register_an_offense
    source: |
      foo = /(?:(a)+)+/
    offenses:
      []

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_nested_possessive_quantifiers_does_not_register_an_offense
    source: |
      foo = /(?:a+)++/
    offenses:
      []

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_nested_reluctant_quantifiers_does_not_register_an_offense
    source: |
      foo = /(?:a+)+?/
    offenses:
      []

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_nested_interval_quantifiers_does_not_register_an_offense
    source: |
      foo = /(?:a+){3,4}/
    offenses:
      []

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_duplicate_quantifiers_registers_an_offense_and_corrects
    source: |
      foo = /(?:a+)+/
    offenses:
      - line: 1
        column_start: 11
        column_end: 14
        message: Replace redundant quantifiers `+` and `+` with a single `+`.
    corrected: |
      foo = /(?:a+)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_duplicate_quantifiers_registers_an_offense_and_corrects
    source: |
      foo = /(?:a*)*/
    offenses:
      - line: 1
        column_start: 11
        column_end: 14
        message: Replace redundant quantifiers `*` and `*` with a single `*`.
    corrected: |
      foo = /(?:a*)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_duplicate_quantifiers_registers_an_offense_and_corrects
    source: |
      foo = /(?:a?)?/
    offenses:
      - line: 1
        column_start: 11
        column_end: 14
        message: Replace redundant quantifiers `?` and `?` with a single `?`.
    corrected: |
      foo = /(?:a?)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_any_other_redundant_combination_of_greedy_quantifiers_registers_an_offense_and_corrects
    source: |
      foo = /(?:a+)?/
    offenses:
      - line: 1
        column_start: 11
        column_end: 14
        message: Replace redundant quantifiers `+` and `?` with a single `*`.
    corrected: |
      foo = /(?:a*)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_nested_interval_quantifiers_that_can_be_normalized_registers_an_offense_and_corrects
    source: |
      foo = /(?:a{1,}){,1}/
    offenses:
      - line: 1
        column_start: 11
        column_end: 20
        message: Replace redundant quantifiers `{1,}` and `{,1}` with a single `*`.
    corrected: |
      foo = /(?:a*)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_redundant_quantifiers_applied_to_character_sets_registers_an_offense_and_corrects
    source: |
      foo = /(?:[abc]+)+/
    offenses:
      - line: 1
        column_start: 15
        column_end: 18
        message: Replace redundant quantifiers `+` and `+` with a single `+`.
    corrected: |
      foo = /(?:[abc]+)/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_redundant_quantifiers_in_x_mode_registers_an_offense_and_corrects
    source: |
      foo = /(?: a ? ) + /x
    offenses:
      - line: 1
        column_start: 13
        column_end: 18
        message: Replace redundant quantifiers `?` and `+` with a single `*`.
    corrected: |
      foo = /(?: a * )  /x

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_non_redundant_quantifiers_and_interpolation_in_x_mode_does_not_register_an_offense
    source: |
      foo = /(?:a*#{interpolation})?/x
    offenses:
      []

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_deeply_nested_redundant_quantifiers_registers_an_offense_and_corrects
    source: |
      foo = /(?:(?:(?:(?:a)?))+)/
    offenses:
      - line: 1
        column_start: 21
        column_end: 25
        message: Replace redundant quantifiers `?` and `+` with a single `*`.
    corrected: |
      foo = /(?:(?:(?:(?:a)*)))/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_multiple_redundant_quantifiers_registers_offenses_and_corrects_with_leading_optional_quantifier
    source: |
      foo = /(?:(?:a?)+)+/
    offenses:
      - line: 1
        column_start: 16
        column_end: 19
        message: Replace redundant quantifiers `+` and `+` with a single `+`.
      - line: 1
        column_start: 14
        column_end: 19
        message: Replace redundant quantifiers `?` and `+` with a single `*`.
    corrected: |
      foo = /(?:(?:a*))/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_multiple_redundant_quantifiers_registers_offenses_and_corrects_with_interspersed_optional_quantifier
    source: |
      foo = /(?:(?:a+)?)+/
    offenses:
      - line: 1
        column_start: 16
        column_end: 19
        message: Replace redundant quantifiers `?` and `+` with a single `*`.
      - line: 1
        column_start: 14
        column_end: 19
        message: Replace redundant quantifiers `+` and `+` with a single `+`.
    corrected: |
      foo = /(?:(?:a*))/

  - name: rubocop_cop_lint_redundantregexpquantifiers_with_multiple_redundant_quantifiers_registers_offenses_and_corrects_with_trailing_optional_quantifier
    source: |
      foo = /(?:(?:a+)+)?/
    offenses:
      - line: 1
        column_start: 16
        column_end: 19
        message: Replace redundant quantifiers `+` and `?` with a single `*`.
      - line: 1
        column_start: 14
        column_end: 19
        message: Replace redundant quantifiers `+` and `?` with a single `*`.
    corrected: |
      foo = /(?:(?:a*))/
