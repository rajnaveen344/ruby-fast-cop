cop: Lint/TripleQuotes
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_triplequotes_triple_quotes_on_one_line_registers_an_offense_and_corrects
    source: |
      """a string"""
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Delimiting a string with multiple quotes has no effect, use a single quote instead.
    corrected: |
      "a string"

  - name: rubocop_cop_lint_triplequotes_triple_quotes_on_multiple_lines_registers_an_offense_and_corrects
    source: |
      """
        a string
      """
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Delimiting a string with multiple quotes has no effect, use a single quote instead.
    corrected: |
      "
        a string
      "

  - name: rubocop_cop_lint_triplequotes_triple_quotes_when_only_quotes_registers_an_offense_and_corrects_to_a_single_empty_quote
    source: |
      """"""
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Delimiting a string with multiple quotes has no effect, use a single quote instead.
    corrected: |
      ""

  - name: rubocop_cop_lint_triplequotes_triple_quotes_with_only_whitespace_does_not_register
    source: |
      " " " " " "
    offenses:
      []

  - name: rubocop_cop_lint_triplequotes_quintuple_quotes_registers_an_offense_and_corrects
    source: |
      """""
        a string
      """""
    offenses:
      - line: 1
        column_start: 0
        column_end: 5
        message: Delimiting a string with multiple quotes has no effect, use a single quote instead.
    corrected: |
      "
        a string
      "

  - name: rubocop_cop_lint_triplequotes_string_interpolation_does_not_register_an_offense
    source: |
      str = "#{abc}"
    offenses:
      []

  - name: rubocop_cop_lint_triplequotes_string_interpolation_with_nested_extra_quotes_registers_an_offense_and_corrects
    source: |
      str = "#{'''abc'''}"
    offenses:
      - line: 1
        column_start: 9
        column_end: 18
        message: Delimiting a string with multiple quotes has no effect, use a single quote instead.
    corrected: |
      str = "#{'abc'}"

  - name: rubocop_cop_lint_triplequotes_heredocs_does_not_register_an_offense
    source: |
      str = <<~STRING
        a string
        #{interpolation}
      STRING
    offenses:
      []

  - name: rubocop_cop_lint_triplequotes_does_not_register_an_offense_for_implicit_concatenation
    source: |
      '' ''
      'a''b''c'
      'a''''b'
    offenses:
      []
