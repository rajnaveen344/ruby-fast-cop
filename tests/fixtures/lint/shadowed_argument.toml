cop = "Lint/ShadowedArgument"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintshadowedargument_method_argument_shadowing_when_a_single_argument_is_shadowed_registers_an_offense"
source = '''
def do_something(foo)
  foo = 42
  puts foo
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 10
message = "Argument `foo` was shadowed by a local variable before it was used."

[tests.config]
IgnoreImplicitReferences = false

