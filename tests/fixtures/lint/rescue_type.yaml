cop: Lint/RescueType
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_rescuetype_accepts_rescue_modifier
    source: |
      foo rescue nil
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_accepts_rescuing_nothing
    source: |
      begin
        foo
      rescue
        bar
      end
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_accepts_rescuing_a_single_exception
    source: |
      def foobar
        foo
      rescue NameError
        bar
      end
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_accepts_rescuing_nothing_within_a_method_definition
    source: |
      def foobar
        foo
      rescue
        bar
      end
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_begin_rescue_registers_an_offense_and_autocorrects
    source: |
      begin
        foo
      rescue %{rescues}
        bar
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 17
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      begin
        foo
      rescue
        bar
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_begin_rescue_registers_an_offense_and_autocorrects
    source: |
      begin
        foo
      rescue %{rescues}, StandardError
        bar
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 32
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      begin
        foo
      rescue StandardError
        bar
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_begin_rescue_registers_an_offense_and_autocorrects
    source: |
      begin
        foo
      rescue StandardError, %{rescues}
        bar
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 32
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      begin
        foo
      rescue StandardError
        bar
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_begin_rescue_ensure_registers_an_offense_and_autocorrects
    source: |
      begin
        foo
      rescue %{rescues}
        bar
      ensure
        baz
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 17
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      begin
        foo
      rescue
        bar
      ensure
        baz
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_def_rescue_registers_an_offense_and_autocorrects
    source: |
      def foobar
        foo
      rescue %{rescues}
        bar
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 17
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      def foobar
        foo
      rescue
        bar
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_def_rescue_ensure_registers_an_offense_and_autocorrects
    source: |
      def foobar
        foo
      rescue %{rescues}
        bar
      ensure
        baz
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 17
        message: "Rescuing from `#{rescues}` will raise a `TypeError` instead of catching the actual exception."
    corrected: |
      def foobar
        foo
      rescue
        bar
      ensure
        baz
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_rescuetype_offenses_nil
    source: |
      nil
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses_string
    source: |
      'string'
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses_string
    source: |
      "#{string}"
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses_0
    source: |
      0
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses_0_0
    source: |
      0.0
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses
    source: |
      []
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses
    source: |
      {}
    offenses:
      []

  - name: rubocop_cop_lint_rescuetype_offenses_symbol
    source: |
      :symbol
    offenses:
      []
