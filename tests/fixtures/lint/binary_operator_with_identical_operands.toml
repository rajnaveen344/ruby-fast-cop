cop = "Lint/BinaryOperatorWithIdenticalOperands"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintbinaryoperatorwithidenticaloperands_registers_an_offense_for__with_duplicate_operands"
source = '''
y = a.x(arg) == a.x(arg)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 24
message = "Binary operator `==` has identical operands."

