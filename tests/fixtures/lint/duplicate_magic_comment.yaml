cop: Lint/DuplicateMagicComment
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_duplicatemagiccomment_registers_an_offense_when_frozen_magic_comments_are_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      # frozen_string_literal: true
    offenses:
      - line: 2
        column_start: 0
        column_end: 29
        message: Duplicate magic comment detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true

  - name: rubocop_cop_lint_duplicatemagiccomment_registers_an_offense_when_frozen_magic_comments_with_different_case_are_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      # frozen_string_literal: TRUE
    offenses:
      - line: 2
        column_start: 0
        column_end: 29
        message: Duplicate magic comment detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true

  - name: rubocop_cop_lint_duplicatemagiccomment_registers_an_offense_when_same_encoding_magic_comments_are_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
      # encoding: ascii
    offenses:
      - line: 2
        column_start: 0
        column_end: 17
        message: Duplicate magic comment detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # encoding: ascii

  - name: rubocop_cop_lint_duplicatemagiccomment_registers_an_offense_when_different_encoding_magic_comments_are_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
      # encoding: utf-8
    offenses:
      - line: 2
        column_start: 0
        column_end: 17
        message: Duplicate magic comment detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # encoding: ascii

  - name: rubocop_cop_lint_duplicatemagiccomment_registers_an_offense_when_encoding_and_frozen_magic_comments_are_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
      # frozen_string_literal: true
      # encoding: ascii
      # frozen_string_literal: true
    offenses:
      - line: 3
        column_start: 0
        column_end: 17
        message: Duplicate magic comment detected.
      - line: 4
        column_start: 0
        column_end: 29
        message: Duplicate magic comment detected.
    corrected: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
      # frozen_string_literal: true

  - name: rubocop_cop_lint_duplicatemagiccomment_does_not_register_an_offense_when_frozen_magic_comments_are_not_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
    offenses:
      []

  - name: rubocop_cop_lint_duplicatemagiccomment_does_not_register_an_offense_when_encoding_magic_comments_are_not_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
    offenses:
      []

  - name: rubocop_cop_lint_duplicatemagiccomment_does_not_register_an_offense_when_encoding_and_frozen_magic_comments_are_not_duplicated
    source: |
      ‹BASE›0‹/BASE›
      # encoding: ascii
      # frozen_string_literal: true
    offenses:
      []
