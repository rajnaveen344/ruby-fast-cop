cop = "Lint/InterpolationCheck"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintinterpolationcheck_registers_an_offense_and_corrects_for_interpolation_in_single_quoted_string"
source = '''
'foo #{bar}'
'''
corrected = '''
"foo #{bar}"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 12
message = "Interpolation in single quoted string detected. Use double quoted strings if you need interpolation."

[[tests]]
name = "rubocopcoplintinterpolationcheck_registers_an_offense_and_corrects_when_containing_a_closing_brace_without_double_quotes"
source = '''
'foo #{bar} }'
'''
corrected = '''
"foo #{bar} }"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Interpolation in single quoted string detected. Use double quoted strings if you need interpolation."

[[tests]]
name = "rubocopcoplintinterpolationcheck_registers_an_offense_and_corrects_when_including_interpolation_and_double_quoted_string_in_single_quoted_string"
source = '''
'foo "#{bar}"'
'''
corrected = '''
%{foo "#{bar}"}
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Interpolation in single quoted string detected. Use double quoted strings if you need interpolation."

[[tests]]
name = "rubocopcoplintinterpolationcheck_registers_an_offense_for_interpolation_in_single_quoted_split_string"
source = '''
'x' \
  'foo #{bar}'
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 14
message = "Interpolation in single quoted string detected. Use double quoted strings if you need interpolation."

[[tests]]
name = "rubocopcoplintinterpolationcheck_registers_an_offense_for_interpolation_in_double__single_quoted_split_string"
source = '''
"x" \
  'foo #{bar}'
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 14
message = "Interpolation in single quoted string detected. Use double quoted strings if you need interpolation."

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_for_properly_interpolation_strings"
source = '''
hello = "foo #{bar}"
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_for_interpolation_in_nested_strings"
source = '''
foo = "bar '#{baz}' qux"
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_for_interpolation_in_a_regexp"
source = '''
/\#{20}/
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_for_an_escaped_interpolation"
source = '''
"\#{msg}"
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_crash_for_xff"
source = '''
foo = "\xff"
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_for_escaped_crab_claws_in_dstr"
source = '''
foo = "alpha #{variable} beta \#{gamma}\" delta"
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_offense_for_strings_in_w"
source = '''
%w("#{a}-foo")
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_when_using_invalid_syntax_in_interpolation"
source = '''
'#{%<expression>s}'
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_when_using_invalid_syntax_in_interpolation_with_double_quotes"
source = '''
'Text `A("#{%<base>s}/%<path>s")` and `B` with C.'
'''
offenses = []

[[tests]]
name = "rubocopcoplintinterpolationcheck_does_not_register_an_offense_when_double_quotes_and_unbalanced_braces_would_break_percent_literal"
source = '''
'a "b" } #{c}'
'''
offenses = []
