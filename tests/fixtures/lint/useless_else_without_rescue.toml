cop = "Lint/UselessElseWithoutRescue"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintuselesselsewithoutrescue_with_else_without_rescue_registers_an_offense"
source = '''
begin
  do_something
else
  handle_unknown_errors
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 4
message = "`else` without `rescue` is useless."

[[tests]]
name = "rubocopcoplintuselesselsewithoutrescue_with_else_with_rescue_accepts"
source = '''
begin
  do_something
rescue ArgumentError
  handle_argument_error
else
  handle_unknown_errors
end
'''
offenses = []
