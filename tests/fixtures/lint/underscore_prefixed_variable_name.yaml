cop: Lint/UnderscorePrefixedVariableName
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_variable_is_used_registers_an_offense
    source: |
      def some_method
        _foo = 1
        puts _foo
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: false

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_non_underscore_prefixed_variable_is_used_does_not_register_an_offense
    source: |
      def some_method
        foo = 1
        puts foo
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: false

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_variable_is_reassigned_does_not_register_an_offense
    source: |
      def some_method
        _foo = 1
        _foo = 2
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: false

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_method_argument_is_used_registers_an_offense
    source: |
      def some_method(_foo)
        puts _foo
      end
    offenses:
      - line: 1
        column_start: 16
        column_end: 20
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: false

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_block_argument_is_used_registers_an_offense
    source: |
      1.times do |_foo|
        puts _foo
      end
    offenses:
      - line: 1
        column_start: 12
        column_end: 16
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: config

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_keyword_block_argument_is_used_registers_an_offense
    source: |
      define_method(:foo) do |_foo: 'default'|
        puts _foo
      end
    offenses:
      - line: 1
        column_start: 24
        column_end: 28
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: config

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_keyword_block_argument_is_used_when_allowkeywordblockarguments_is_set_does_not_register_an_offense
    source: |
      define_method(:foo) do |_foo: 'default'|
        puts _foo
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_variable_in_top_level_scope_is_used_registers_an_offense
    source: |
      _foo = 1
      puts _foo
    offenses:
      - line: 1
        column_start: 0
        column_end: 4
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_variable_is_captured_by_a_block_accepts
    source: |
      _foo = 1
      1.times do
        _foo = 2
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_named_capture_variable_is_used_registers_an_offense
    source: |
      /(?<_foo>\w+)/ =~ 'FOO'
      puts _foo
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_argument_is_not_used_explicitly_does_not_register_an_offense
    source: |
      def some_method(*_)
        #{keyword}
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: true
    interpolated: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_argument_is_used_explicitly_registers_an_offense
    source: |
      def some_method(*_)
        #{keyword}
        puts _
      end
    offenses:
      - line: 1
        column_start: 17
        column_end: 18
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: true
    interpolated: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_argument_is_not_used_does_not_register_an_offense
    source: |
      def some_method(*_)
        #{keyword}(:something)
      end
    offenses:
      []
    config:
      AllowKeywordBlockArguments: true
    interpolated: true

  - name: rubocop_cop_lint_underscoreprefixedvariablename_when_an_underscore_prefixed_argument_is_used_explicitly_registers_an_offense
    source: |
      def some_method(*_)
        #{keyword}(*_)
      end
    offenses:
      - line: 1
        column_start: 17
        column_end: 18
        message: Do not use prefix `_` for a variable that is used.
    config:
      AllowKeywordBlockArguments: true
    interpolated: true
