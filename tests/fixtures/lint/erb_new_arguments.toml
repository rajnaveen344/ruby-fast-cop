[[tests]]
name = "rubocopcoplinterbnewarguments__ruby_25_does_not_register_an_offense_when_using_erbnew_with_nonkeyword_arguments"
source = '''
ERB.new(str, nil, '-', '@output_buffer')
'''
offenses = []

[[tests]]
name = "rubocopcoplinterbnewarguments__ruby_26_registers_an_offense_when_using_erbnew_with_nonkeyword_2nd_argument"
source = '''
ERB.new(str, nil)
'''
corrected = '''
ERB.new(str)
'''

[[tests.offenses]]
line = 1
column_start = 13
column_end = 16
message = "Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments."

