cop: Lint/AmbiguousOperator
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_ambiguousoperator_with_unary_operator_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_registers_an_offense_and_corrects
    source: |
      do_something(+24)
      do_something +42
    offenses:
      - line: 2
        column_start: 13
        column_end: 14
        message: "Ambiguous positive number operator. Parenthesize the method arguments if it's surely a positive number operator, or add a whitespace to the right of the `+` if it should be an addition."
    corrected: |
      do_something(+24)
      do_something(+42)

  - name: rubocop_cop_lint_ambiguousoperator_with_unary_operator_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_when_a_method_with_no_arguments_is_used_in_advance_registers_an_offense_and_corrects
    source: |
      do_something
      do_something +42
    offenses:
      - line: 2
        column_start: 13
        column_end: 14
        message: "Ambiguous positive number operator. Parenthesize the method arguments if it's surely a positive number operator, or add a whitespace to the right of the `+` if it should be an addition."
    corrected: |
      do_something
      do_something(+42)

  - name: rubocop_cop_lint_ambiguousoperator_with_unary_operator_in_the_first_argument_without_parentheses_with_a_whitespace_on_the_right_of_the_operator_does_not_register_an_offense
    source: |
      do_something + 42
    offenses:
