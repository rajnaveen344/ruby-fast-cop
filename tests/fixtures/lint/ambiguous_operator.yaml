  - name: rubocop_cop_lint_ambiguousoperator_with_a_block_ampersand_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_registers_an_offense_and_corrects
    source: |
      process = proc { do_something }
      2.times &process
    offenses:
      - line: 2
        column_start: 8
        column_end: 9
        message: "Ambiguous block operator. Parenthesize the method arguments if it's surely a block operator, or add a whitespace to the right of the `&` if it should be a binary AND."
    corrected: |
      process = proc { do_something }
      2.times(&process)

  - name: rubocop_cop_lint_ambiguousoperator_with_a_block_ampersand_in_the_first_argument_without_parentheses_with_a_whitespace_on_the_right_of_the_operator_does_not_register_an_offense
