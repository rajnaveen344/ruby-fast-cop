  - name: rubocop_cop_lint_ambiguousoperator_with_unary_operator_in_the_first_argument_with_parentheses_around_the_operator_does_not_register_an_offense
    source: |
      do_something(-42)
    offenses:
      []

  - name: rubocop_cop_lint_ambiguousoperator_with_a_splat_operator_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_registers_an_offense_and_corrects
    source: |
      array = [1, 2, 3]
      puts *array
    offenses:
      - line: 2
        column_start: 5
        column_end: 6
        message: "Ambiguous splat operator. Parenthesize the method arguments if it's surely a splat operator, or add a whitespace to the right of the `*` if it should be a multiplication."
    corrected: |
      array = [1, 2, 3]
      puts(*array)

  - name: rubocop_cop_lint_ambiguousoperator_with_a_splat_operator_in_the_first_argument_without_parentheses_with_a_whitespace_on_the_right_of_the_operator_does_not_register_an_offense
    source: |
