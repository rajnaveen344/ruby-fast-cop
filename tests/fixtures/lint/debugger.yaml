cop: Lint/Debugger
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_does_not_register_an_offense_for_a_byebug_call
    source: |
      byebug
    offenses:
      []
    config:
      DebuggerMethods: [custom_debugger]

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_does_not_register_an_offense_for_a_custom_debugger_call_when_used_in_assignment
    source: |
      x.y = custom_debugger
    offenses:
      []
    config:
      DebuggerMethods: [custom_debugger]

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_registers_an_offense_for_a_custom_debugger_call
    source: |
      custom_debugger
    offenses:
      - line: 1
        column_start: 0
        column_end: 15
        message: Remove debugger entry point `custom_debugger`.
    config:
      DebuggerMethods: [custom_debugger]

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_registers_an_offense_for_a_custom_debugger_call_when_used_in_block
    source: |
      x.y = do_something { custom_debugger }
    offenses:
      - line: 1
        column_start: 21
        column_end: 36
        message: Remove debugger entry point `custom_debugger`.
    config:
      DebuggerMethods: [custom_debugger]

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_registers_an_offense_for_a_custom_debugger_call_when_used_in_numbered_block
    source: |
      x.y = do_something do
        z(_1)
        custom_debugger
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 17
        message: Remove debugger entry point `custom_debugger`.
    config:
      DebuggerMethods: [custom_debugger]

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_registers_an_offense_for_a_custom_debugger_call_when_used_in_it_block
    source: |
      x.y = do_something do
        z(it)
        custom_debugger
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 17
        message: Remove debugger entry point `custom_debugger`.
    config:
      DebuggerMethods: [custom_debugger]
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_debugger_with_the_debuggermethods_configuration_registers_an_offense_for_a_custom_debugger_call_when_used_in_lambda_literal
