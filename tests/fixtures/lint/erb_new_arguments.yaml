cop: Lint/ErbNewArguments
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_erbnewarguments_ruby_2_5_does_not_register_an_offense_when_using_erb_new_with_non_keyword_arguments
    source: |
      ERB.new(str, nil, '-', '@output_buffer')
    offenses:
      []
    ruby_version: ">= 2.5"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_registers_an_offense_when_using_erb_new_with_non_keyword_2nd_argument
    source: |
      ERB.new(str, nil)
    offenses:
      - line: 1
        column_start: 13
        column_end: 16
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ERB.new(str)
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_registers_an_offense_when_using_erb_new_with_non_keyword_2nd_and_3rd_arguments
    source: |
      ERB.new(str, nil, '-')
    offenses:
      - line: 1
        column_start: 18
        column_end: 21
        message: "Passing trim_mode with the 3rd argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, trim_mode: '-')` instead."
      - line: 1
        column_start: 13
        column_end: 16
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ERB.new(str, trim_mode: '-')
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_registers_an_offense_when_using_erb_new_with_non_keyword_2nd_3rd_and_4th_arguments
    source: |
      ERB.new(str, nil, '-', '@output_buffer')
                        ^^^ Passing trim_mode with the 3rd argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, trim_mode: '-')` instead.
    offenses:
      - line: 1
        column_start: 23
        column_end: 39
        message: "Passing eoutvar with the 4th argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, eoutvar: '@output_buffer')` instead."
      - line: 2
        column_start: 13
        column_end: 16
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ERB.new(str, trim_mode: '-', eoutvar: '@output_buffer')
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6
    source: |
      ERB.new(str, nil, '-', '@output_buffer', trim_mode: '-', eoutvar: '@output_buffer')
                        ^^^ Passing trim_mode with the 3rd argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, trim_mode: '-')` instead.
    offenses:
      - line: 1
        column_start: 23
        column_end: 39
        message: "Passing eoutvar with the 4th argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, eoutvar: '@output_buffer')` instead."
      - line: 2
        column_start: 13
        column_end: 16
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ERB.new(str, trim_mode: '-', eoutvar: '@output_buffer')
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6
    source: |
      ERB.new(str, nil, '-', trim_mode: '-', eoutvar: '@output_buffer')
    offenses:
      - line: 1
        column_start: 18
        column_end: 21
        message: "Passing trim_mode with the 3rd argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, trim_mode: '-')` instead."
      - line: 1
        column_start: 13
        column_end: 16
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ERB.new(str, trim_mode: '-', eoutvar: '@output_buffer')
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_registers_an_offense_when_using_erb_new_with_non_keyword_2nd_3rd_and_4th_arguments
    source: |
      ::ERB.new(str, nil, '-', '@output_buffer')
                          ^^^ Passing trim_mode with the 3rd argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, trim_mode: '-')` instead.
    offenses:
      - line: 1
        column_start: 25
        column_end: 41
        message: "Passing eoutvar with the 4th argument of `ERB.new` is deprecated. Use keyword argument like `ERB.new(str, eoutvar: '@output_buffer')` instead."
      - line: 2
        column_start: 15
        column_end: 18
        message: Passing safe_level with the 2nd argument of `ERB.new` is deprecated. Do not use it, and specify other arguments as keyword arguments.
    corrected: |
      ::ERB.new(str, trim_mode: '-', eoutvar: '@output_buffer')
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_does_not_register_an_offense_when_using_erb_new_with_keyword_arguments
    source: |
      ERB.new(str, trim_mode: '-', eoutvar: '@output_buffer')
    offenses:
      []
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_does_not_register_an_offense_when_using_erb_new_without_optional_arguments
    source: |
      ERB.new(str)
    offenses:
      []
    ruby_version: ">= 2.6"

  - name: rubocop_cop_lint_erbnewarguments_ruby_2_6_when_using_actionview_template_handlers_erb_new_does_not_register_an_offense_when_using_erb_new_without_arguments
    source: |
