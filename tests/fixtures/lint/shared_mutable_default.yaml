cop: Lint/SharedMutableDefault
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_sharedmutabledefault_when_line_is_unrelated_does_not_register_an_offense
    source: |
      []
      {}
      Array.new
      Hash.new
      Hash.new { |h, k| h[k] = [] }
      Hash.new { |h, k| h[k] = {} }
      Hash.new { 0 }
      Hash.new { Array.new }
      Hash.new { Hash.new }
      Hash.new { {} }
      Hash.new { [] }
      Hash.new(0)
      Hash.new(false)
      Hash.new(true)
      Hash.new(nil)
      Hash.new(BigDecimal(0))
      Hash.new(BigDecimal(0.0))
      Hash.new(0.0)
      Hash.new(0.0.to_d)
    offenses:
      []

  - name: rubocop_cop_lint_sharedmutabledefault_when_default_literal_is_frozen_does_not_register_an_offense
    source: |
      Hash.new([].freeze)
      Hash.new({}.freeze)
      Hash.new(Array.new.freeze)
      Hash.new(Hash.new.freeze)
    offenses:
      []

  - name: rubocop_cop_lint_sharedmutabledefault_when_capacity_keyword_argument_is_used_does_not_register_an_offense
    source: |
      Hash.new(capacity: 42)
    offenses:
      []

  - name: rubocop_cop_lint_sharedmutabledefault_when_hash_is_initialized_with_an_array_registers_an_offense
    source: |
      Hash.new([])
      Hash.new Array.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Do not create a Hash with a mutable default value [...]
      - line: 2
        column_start: 0
        column_end: 18
        message: Do not create a Hash with a mutable default value [...]

  - name: rubocop_cop_lint_sharedmutabledefault_when_hash_is_initialized_with_a_hash_registers_an_offense
    source: |
      Hash.new({})
      Hash.new(Hash.new)
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Do not create a Hash with a mutable default value [...]
      - line: 2
        column_start: 0
        column_end: 18
        message: Do not create a Hash with a mutable default value [...]

  - name: rubocop_cop_lint_sharedmutabledefault_when_hash_is_initialized_with_a_hash_and_capacity_keyword_argument_registers_an_offense
    source: |
      Hash.new({}, capacity: 42)
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Do not create a Hash with a mutable default value [...]
