cop = "Lint/ConstantOverwrittenInRescue"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintconstantoverwritteninrescue_registers_an_offense_when_overriding_an_exception_with_an_exception_result"
source = '''
begin
  something
rescue => StandardError
end
'''
corrected = '''
begin
  something
rescue StandardError
end
'''

[[tests.offenses]]
line = 3
column_start = 7
column_end = 9
message = "`StandardError` is overwritten by `rescue =>`."

