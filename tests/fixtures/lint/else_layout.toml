cop = "Lint/ElseLayout"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_elselayout_registers_an_offense_and_corrects_for_expr_on_same_line_as_else"
source = '''
if something
  test
else ala
  something
  test
end
'''
corrected = '''
if something
  test
else
  ala
  something
  test
end
'''

[[tests.offenses]]
line = 3
column_start = 5
column_end = 8
message = "Odd `else` layout detected. Did you mean to use `elsif`?"

[[tests]]
name = "rubocop_cop_lint_elselayout_registers_an_offense_and_corrects_for_the_entire_else_body_being_on_the_same_line_without_then_single_line"
source = '''
if something
  test
else something_else
end
'''
corrected = '''
if something
  test
else
  something_else
end
'''

[[tests.offenses]]
line = 3
column_start = 5
column_end = 19
message = "Odd `else` layout detected. Did you mean to use `elsif`?"

[[tests]]
name = "rubocop_cop_lint_elselayout_registers_an_offense_for_a_part_of_else_body_being_on_the_same_line_with_then_single_line"
source = '''
if something then test
else something_else
  other
end
'''
corrected = '''
if something then test
else
  something_else
  other
end
'''

[[tests.offenses]]
line = 2
column_start = 5
column_end = 19
message = "Odd `else` layout detected. Did you mean to use `elsif`?"

[[tests]]
name = "rubocop_cop_lint_elselayout_does_not_register_an_offense_for_the_single_line_else_body_being_on_the_same_line_with_then_single_line"
source = '''
if something then test
else something_else
end
'''
offenses = []

