cop = "Lint/InheritException"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintinheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_registers_an_offense_and_corrects"
source = '''
class C < Exception; end
'''
corrected = '''
class C < RuntimeError; end
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 19
message = "Inherit from `RuntimeError` instead of `Exception`."

[tests.config]
EnforcedStyle = "runtime_error"

