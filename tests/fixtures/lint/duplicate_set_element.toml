cop = "Lint/DuplicateSetElement"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_duplicatesetelement"
source = '''
#{class_name}[:foo, :bar, :foo]
'''
corrected = '''
#{class_name}[:foo, :bar]
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 31
message = "Remove the duplicate element in #{class_name}."

