[[tests]]
name = "rubocopcoplintduplicatesetelement_registers_an_offense_when_using_duplicate_symbol_element_in_set"
source = '''
Set[:foo, :bar, :foo]
'''
corrected = '''
Set[:foo, :bar]
'''

