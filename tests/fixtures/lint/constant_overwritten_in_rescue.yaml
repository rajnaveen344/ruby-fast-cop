cop: Lint/ConstantOverwrittenInRescue
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_an_exception_with_an_exception_result
    source: |
      begin
        something
      rescue => StandardError
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 9
        message: "`StandardError` is overwritten by `rescue =>`."
    corrected: |
      begin
        something
      rescue StandardError
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_a_fully_qualified_constant
    source: |
      begin
        something
      rescue => ::StandardError
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 9
        message: "`::StandardError` is overwritten by `rescue =>`."
    corrected: |
      begin
        something
      rescue ::StandardError
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_a_constant_with_a_method_call_receiver
    source: |
      begin
        something
      rescue => foo.class::RESCUABLE_EXCEPTIONS
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 9
        message: "`foo.class::RESCUABLE_EXCEPTIONS` is overwritten by `rescue =>`."
    corrected: |
      begin
        something
      rescue foo.class::RESCUABLE_EXCEPTIONS
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_a_constant_with_a_variable_receiver
    source: |
      var = Object
      begin
        something
      rescue => var::StandardError
      end
    offenses:
      - line: 4
        column_start: 7
        column_end: 9
        message: "`var::StandardError` is overwritten by `rescue =>`."
    corrected: |
      var = Object
      begin
        something
      rescue var::StandardError
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_a_nested_constant
    source: |
      begin
        something
      rescue => MyNamespace::MyException
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 9
        message: "`MyNamespace::MyException` is overwritten by `rescue =>`."
    corrected: |
      begin
        something
      rescue MyNamespace::MyException
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_registers_an_offense_when_overriding_a_fully_qualified_nested_constant
    source: |
      begin
        something
      rescue => ::MyNamespace::MyException
      end
    offenses:
      - line: 3
        column_start: 7
        column_end: 9
        message: "`::MyNamespace::MyException` is overwritten by `rescue =>`."
    corrected: |
      begin
        something
      rescue ::MyNamespace::MyException
      end

  - name: rubocop_cop_lint_constantoverwritteninrescue_does_not_register_an_offense_when_not_overriding_an_exception_with_an_exception_result
    source: |
      begin
        something
      rescue StandardError
      end
    offenses:
      []

  - name: rubocop_cop_lint_constantoverwritteninrescue_does_not_register_an_offense_when_using_but_correctly_assigning_to_variables
    source: |
      begin
        something
      rescue StandardError => e
      end
    offenses:
      []
