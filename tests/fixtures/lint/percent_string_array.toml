cop = "Lint/PercentStringArray"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_percentstringarray_detecting_quotes_or_commas_in_a_w_w_string_accepts_tokens_without_quotes_or_commas"
source = '''
%#{char}(foo bar baz)
'''
interpolated = true
verified = false
offenses = []

[[tests]]
name = "rubocop_cop_lint_percentstringarray_detecting_quotes_or_commas_in_a_w_w_string_adds_an_offense_and_corrects_when_tokens_contain_quotes_and_are_comma_separated"
source = '''
%#{char}('foo', 'bar', 'baz')
'''
corrected = '''
%#{char}(foo bar baz)
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 23
message = "Within `%w`/`%W`, quotes and ',' are unnecessary and may be unwanted in the resulting strings."

[[tests]]
name = "rubocop_cop_lint_percentstringarray_detecting_quotes_or_commas_in_a_w_w_string_adds_an_offense_and_corrects_when_tokens_contain_both_types_of_quotes"
