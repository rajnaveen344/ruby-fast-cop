cop: Lint/FloatComparison
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_comparing_with_float
    source: |
      x == 0.1
      0.1 == x
      x != 0.1
      0.1 != x
      x.eql?(0.1)
      0.1.eql?(x)
    offenses:
      - line: 1
        column_start: 0
        column_end: 8
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 2
        column_start: 0
        column_end: 8
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 3
        column_start: 0
        column_end: 8
        message: Avoid inequality comparisons of floats as they are unreliable.
      - line: 4
        column_start: 0
        column_end: 8
        message: Avoid inequality comparisons of floats as they are unreliable.
      - line: 5
        column_start: 0
        column_end: 11
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 6
        column_start: 0
        column_end: 11
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_comparing_with_float_returning_method
    source: |
      x == Float(1)
      x == '0.1'.to_f
      x == 1.fdiv(2)
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 2
        column_start: 0
        column_end: 15
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 3
        column_start: 0
        column_end: 14
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_comparing_with_arithmetic_operator_on_floats
    source: |
      x == 0.1 + y
      x == y + Float('0.1')
      x == y + z * (foo(arg) + '0.1'.to_f)
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 2
        column_start: 0
        column_end: 21
        message: Avoid equality comparisons of floats as they are unreliable.
      - line: 3
        column_start: 0
        column_end: 36
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_comparing_with_method_on_float_receiver
    source: |
      x == 0.1.abs
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison
    source: |
      x == 1.1.ceil
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison
    source: |
      x == 1.1.ceil(1)
    offenses:
      - line: 1
        column_start: 0
        column_end: 16
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_comparing_with_float_using_epsilon
    source: |
      (x - 0.1) < epsilon
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_comparing_with_rational_literal
    source: |
      value == 0.2r
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_comparing_against_zero
    source: |
      x == 0.0
      x.to_f == 0
      x.to_f.abs == 0.0
      x != 0.0
      x.to_f != 0
      x.to_f.zero?
      x.to_f.nonzero?
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_comparing_against_nil
    source: |
      Float('not_a_float', exception: false) == nil
      nil != Float('not_a_float', exception: false)
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_comparing_with_multiple_arguments
    source: |
      x.==(0.1, 0.2)
      x.!=(0.1, 0.2)
      x.eql?(0.1, 0.2)
      x.equal?(0.1, 0.2)
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_for_eql_called_with_safe_navigation
    source: |
      x&.eql?(0.1)
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_for_equal_called_with_safe_navigation
    source: |
      x&.equal?(0.1)
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Avoid equality comparisons of floats as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_using_float_in_case_statement
    source: |
      case value
      when 1.0
        foo
      when 2.0
        bar
      end
    offenses:
      - line: 2
        column_start: 5
        column_end: 8
        message: Avoid float literal comparisons in case statements as they are unreliable.
      - line: 4
        column_start: 5
        column_end: 8
        message: Avoid float literal comparisons in case statements as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_registers_an_offense_when_using_float_in_case_statement_with_multiple_conditions
    source: |
      case value
      when 1.0, 2.0
        foo
      end
    offenses:
      - line: 2
        column_start: 10
        column_end: 13
        message: Avoid float literal comparisons in case statements as they are unreliable.
      - line: 2
        column_start: 5
        column_end: 8
        message: Avoid float literal comparisons in case statements as they are unreliable.

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_using_zero_float_in_case_statement
    source: |
      case value
      when 0.0
        foo
      end
    offenses:
      []

  - name: rubocop_cop_lint_floatcomparison_does_not_register_an_offense_when_using_non_float_in_case_statement
    source: |
      case value
      when 1
        foo
      when 'string'
        bar
      end
    offenses:
      []
