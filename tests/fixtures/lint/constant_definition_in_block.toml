cop = "Lint/ConstantDefinitionInBlock"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_constant"
source = '''
FOO = 1
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_constant_followed_by_another_statement"
source = '''
