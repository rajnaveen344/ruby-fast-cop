cop = "Lint/ConstantDefinitionInBlock"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintconstantdefinitioninblock_does_not_register_an_offense_for_a_toplevel_constant"
source = '''
FOO = 1
'''
offenses = []

[tests.config]
AllowedMethods = ["enums"]

[[tests]]
name = "rubocopcoplintconstantdefinitioninblock_does_not_register_an_offense_for_a_toplevel_constant_followed_by_another_statement"
source = '''
FOO = 1
bar
'''
offenses = []

[tests.config]
AllowedMethods = ["enums"]

[[tests]]
name = "rubocopcoplintconstantdefinitioninblock_registers_an_offense_for_a_constant_defined_within_a_block"
source = '''
describe do
  FOO = 1
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 9
message = "Do not define constants this way within a block."

[tests.config]
AllowedMethods = ["enums"]

