cop = "Lint/OrderedMagicComments"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_orderedmagiccomments"
source = '''
# frozen_string_literal: true
# encoding: ascii
'''
corrected = '''
# encoding: ascii
# frozen_string_literal: true
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 17
message = "The encoding magic comment should precede all other magic comments."

