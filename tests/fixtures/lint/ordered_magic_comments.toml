[[tests]]
name = "rubocopcoplintorderedmagiccomments_registers_an_offense_and_corrects_when_an_encoding_magic_comment_does_not_precede_all_other_magic_comments"
source = '''
# frozen_string_literal: true
# encoding: ascii
'''
corrected = '''
# encoding: ascii
# frozen_string_literal: true
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 17
message = "The encoding magic comment should precede all other magic comments."

