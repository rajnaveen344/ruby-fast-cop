cop: Lint/HeredocMethodCallPosition
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_heredocmethodcallposition_correct_cases_accepts_simple_correct_case
    source: |
      <<~SQL
        foo
      SQL
    offenses:
      []

  - name: rubocop_cop_lint_heredocmethodcallposition_correct_cases_accepts_chained_correct_case
    source: |
      <<~SQL.bar
        foo
      SQL
    offenses:
      []

  - name: rubocop_cop_lint_heredocmethodcallposition_correct_cases_ignores_if_no_call
    source: |
      <<-SQL
        foo
      SQL
    offenses:
      []

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_simple_incorrect_case_detects
    source: |
      <<-SQL
        foo
      SQL
      .strip_indent
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
    corrected: |
      <<-SQL.strip_indent
        foo
      SQL

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_simple_incorrect_case_with_paren_detects
    source: |
      <<-SQL
        foo
      SQL
      .foo(bar_baz)
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
    corrected: |
      <<-SQL.foo(bar_baz)
        foo
      SQL

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_chained_case_no_parens_detects
    source: |
      <<-SQL
        foo
      SQL
      .strip_indent.foo
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
    corrected: |
      <<-SQL.strip_indent.foo
        foo
      SQL

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_chained_case_with_parens_detects
    source: |
      <<-SQL
        foo
      SQL
      .abc(1, 2, 3).foo
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
    corrected: |
      <<-SQL.abc(1, 2, 3).foo
        foo
      SQL

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_with_trailing_comma_in_method_call_detects
    source: |
      bar(<<-SQL
        foo
      SQL
      .abc,
      )
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
    corrected: |
      bar(<<-SQL.abc,
        foo
      SQL
      )

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_chained_case_with_multiple_line_args_detects
    source: |
      <<-SQL
        foo
      SQL
      .abc(1, 2,
      3).foo
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.

  - name: rubocop_cop_lint_heredocmethodcallposition_incorrect_cases_chained_case_without_args_detects
    source: |
      <<-SQL
        foo
      SQL
      .abc
      .foo
    offenses:
      - line: 4
        column_start: 0
        column_end: 1
        message: Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening.
