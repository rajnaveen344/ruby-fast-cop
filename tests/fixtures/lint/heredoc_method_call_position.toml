cop = "Lint/HeredocMethodCallPosition"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintheredocmethodcallposition_correct_cases_accepts_simple_correct_case"
source = '''
<<~SQL
  foo
SQL
'''
offenses = []

[[tests]]
name = "rubocopcoplintheredocmethodcallposition_correct_cases_accepts_chained_correct_case"
source = '''
<<~SQL.bar
  foo
SQL
'''
offenses = []

[[tests]]
name = "rubocopcoplintheredocmethodcallposition_correct_cases_ignores_if_no_call"
source = '''
<<-SQL
  foo
SQL
'''
offenses = []

[[tests]]
name = "rubocopcoplintheredocmethodcallposition_incorrect_cases_simple_incorrect_case_detects"
source = '''
<<-SQL
  foo
SQL
.strip_indent
'''
corrected = '''
<<-SQL.strip_indent
  foo
SQL
'''

[[tests.offenses]]
line = 4
column_start = 0
column_end = 1
message = "Put a method call with a HEREDOC receiver on the same line as the HEREDOC opening."

