cop = "Lint/SuppressedExceptionInNumberConversion"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintsuppressedexceptioninnumberconversion_registers_an_offense_when_using_integerarg_rescue_nil"
ruby_version = ">= 2.6"
source = '''
Integer(arg) rescue nil
'''
corrected = '''
Integer(arg, exception: false)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 23
message = "Use `Integer(arg, exception: false)` instead."

