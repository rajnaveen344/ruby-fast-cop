cop: Lint/EnsureReturn
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_ensurereturn_registers_an_offense_but_does_not_correct_for_return_in_ensure
    source: |
      begin
        something
      ensure
        file.close
        return
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 8
        message: Do not return from an `ensure` block.

  - name: rubocop_cop_lint_ensurereturn_registers_an_offense_but_does_not_correct_for_return_with_argument_in_ensure
    source: |
      begin
        foo
      ensure
        return baz
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 12
        message: Do not return from an `ensure` block.

  - name: rubocop_cop_lint_ensurereturn_registers_an_offense_when_returning_multiple_values_in_ensure
    source: |
      begin
        something
      ensure
        do_something
        return foo, bar
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 17
        message: Do not return from an `ensure` block.

  - name: rubocop_cop_lint_ensurereturn_does_not_register_an_offense_for_return_outside_ensure
    source: |
      begin
        something
        return
      ensure
        file.close
      end
    offenses:
      []

  - name: rubocop_cop_lint_ensurereturn_does_not_check_when_ensure_block_has_no_body
    source: |
      begin
        something
      ensure
      end
    offenses:
      []
