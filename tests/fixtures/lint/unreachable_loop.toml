cop = "Lint/UnreachableLoop"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintunreachableloop_handles_inner_loops"
source = '''
until x > 0

  items.each do |item|
    next if item.odd?
    break
  end

  if x > 0
    break some_value
  else
    raise MyError
  end

  loop do

    case y
    when 1
      return something
    when 2
      break
    else
      throw :exit
    end
  end
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 11
message = "This loop will have at most one iteration."

[[tests.offenses]]
line = 14
column_start = 2
column_end = 9
message = "This loop will have at most one iteration."

[[tests]]
name = "rubocopcoplintunreachableloop_does_not_register_an_offense_when_branch_includes_continue_statement_preceding_break_statement"
source = '''
while x > 0
  if y
    next if something
    break
  else
    break
  end
end
'''
offenses = []

