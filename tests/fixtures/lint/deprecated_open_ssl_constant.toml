cop = "Lint/DeprecatedOpenSslConstant"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_two_arguments_and_corrects"
source = '''
OpenSSL::Cipher::AES.new(128, :GCM)
'''
corrected = '''
OpenSSL::Cipher.new('aes-128-gcm')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 35
message = "Use `OpenSSL::Cipher.new('aes-128-gcm')` instead of `OpenSSL::Cipher::AES.new(128, :GCM)`."

