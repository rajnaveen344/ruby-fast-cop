cop = "Lint/AmbiguousRange"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_ambiguousrange_registers_an_offense_and_corrects_when_not_parenthesized"
source = '''
x || 1#{operator}2
'''
corrected = '''
(x || 1)#{operator}2
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Wrap complex range boundaries with parentheses to avoid ambiguity."

