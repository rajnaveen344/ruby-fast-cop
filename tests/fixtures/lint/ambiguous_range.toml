cop = "Lint/AmbiguousRange"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintambiguousrange_for_an_irange_registers_an_offense_and_corrects_when_not_parenthesized"
source = '''
x || 1..2
'''
corrected = '''
(x || 1)..2
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Wrap complex range boundaries with parentheses to avoid ambiguity."

[tests.config]
RequireParenthesesForMethodChains = false

