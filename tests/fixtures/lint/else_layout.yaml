cop: Lint/ElseLayout
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_elselayout_registers_an_offense_and_corrects_for_expr_on_same_line_as_else
    source: |
      if something
        test
      else ala
        something
        test
      end
    offenses:
      - line: 3
        column_start: 5
        column_end: 8
        message: Odd `else` layout detected. Did you mean to use `elsif`?
    corrected: |
      if something
        test
      else
        ala
        something
        test
      end

  - name: rubocop_cop_lint_elselayout_registers_an_offense_and_corrects_for_the_entire_else_body_being_on_the_same_line_without_then_single_line
    source: |
      if something
        test
      else something_else
      end
    offenses:
      - line: 3
        column_start: 5
        column_end: 19
        message: Odd `else` layout detected. Did you mean to use `elsif`?
    corrected: |
      if something
        test
      else
        something_else
      end

  - name: rubocop_cop_lint_elselayout_registers_an_offense_for_a_part_of_else_body_being_on_the_same_line_with_then_single_line
    source: |
      if something then test
      else something_else
        other
      end
    offenses:
      - line: 2
        column_start: 5
        column_end: 19
        message: Odd `else` layout detected. Did you mean to use `elsif`?
    corrected: |
      if something then test
      else
        something_else
        other
      end

  - name: rubocop_cop_lint_elselayout_does_not_register_an_offense_for_the_single_line_else_body_being_on_the_same_line_with_then_single_line
    source: |
      if something then test
      else something_else
      end
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_accepts_proper_else
    source: |
      if something
        test
      else
        something
        test
      end
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_registers_an_offense_and_corrects_for_elsifs
    source: |
      if something
        test
      elsif something
        bala
      else ala
        something
        test
      end
    offenses:
      - line: 5
        column_start: 5
        column_end: 8
        message: Odd `else` layout detected. Did you mean to use `elsif`?
    corrected: |
      if something
        test
      elsif something
        bala
      else
        ala
        something
        test
      end

  - name: rubocop_cop_lint_elselayout_registers_and_corrects_an_offense_when_using_multiple_elsif_s
    source: |
      if condition_foo
        foo
      elsif condition_bar
        bar
      elsif condition_baz
        baz
      else qux
        quux
        corge
      end
    offenses:
      - line: 7
        column_start: 5
        column_end: 8
        message: Odd `else` layout detected. Did you mean to use `elsif`?
    corrected: |
      if condition_foo
        foo
      elsif condition_bar
        bar
      elsif condition_baz
        baz
      else
        qux
        quux
        corge
      end

  - name: rubocop_cop_lint_elselayout_accepts_ternary_ops
    source: |
      x ? a : b
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_accepts_modifier_forms
    source: |
      x if something
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_accepts_empty_braces
    source: |
      if something
        ()
      else
        ()
      end
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_does_not_register_an_offense_for_an_elsif_with_no_body
    source: |
      if something
        foo
      elsif something_else
      end
    offenses:
      []

  - name: rubocop_cop_lint_elselayout_does_not_register_an_offense_if_the_entire_if_is_on_a_single_line
    source: |
      if a then b else c end
    offenses:
      []
