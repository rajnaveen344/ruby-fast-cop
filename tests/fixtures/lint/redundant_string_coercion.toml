[[tests]]
name = "rubocopcoplintredundantstringcoercion_registers_an_offense_and_corrects_to_s_in_interpolation"
source = '''
"this is the #{result.to_s}"
/regexp #{result.to_s}/
:"symbol #{result.to_s}"
`backticks #{result.to_s}`
'''
corrected = '''
"this is the #{result}"
/regexp #{result}/
:"symbol #{result}"
`backticks #{result}`
'''

[[tests.offenses]]
line = 1
column_start = 22
column_end = 26
message = "Redundant use of `Object#to_s` in interpolation."

