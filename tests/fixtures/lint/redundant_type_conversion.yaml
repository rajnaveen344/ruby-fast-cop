cop: Lint/RedundantTypeConversion
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_redundanttypeconversion
    source: |
      ‹BASE›0‹/BASE›
      #{receiver}.#{conversion}#{suffix}
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: "Redundant `#{conversion}` detected."
    corrected: |
      ‹BASE›0‹/BASE›
      #{receiver}#{suffix}
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_redundanttypeconversion
    source: |
      ‹BASE›0‹/BASE›
      #{receiver}&.#{conversion}#{suffix}
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: "Redundant `#{conversion}` detected."
    corrected: |
      ‹BASE›0‹/BASE›
      #{receiver}#{suffix}
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_redundanttypeconversion
    source: |
      ‹BASE›0‹/BASE›
      #{receiver}.#{conversion}()
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Redundant `#{conversion}` detected."
    corrected: |
      ‹BASE›0‹/BASE›
      #{receiver}
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_redundanttypeconversion
