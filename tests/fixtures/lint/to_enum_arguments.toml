cop = "Lint/ToEnumArguments"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplinttoenumarguments_registers_an_offense_when_required_arg_is_missing"
source = '''
def m(x)
  return to_enum(:m) unless block_given?
end
'''

[[tests.offenses]]
line = 2
column_start = 9
column_end = 20
message = "Ensure you correctly provided all the arguments."

