cop = "Lint/ConstantResolution"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintconstantresolution_registers_no_offense_when_qualifying_a_const"
source = '''
::MyConst
'''
offenses = []

[[tests]]
name = "rubocopcoplintconstantresolution_registers_no_offense_qualifying_a_namespace_const"
source = '''
::MyConst::MY_CONST
'''
offenses = []

[[tests]]
name = "rubocopcoplintconstantresolution_registers_an_offense_not_qualifying_a_const"
source = '''
MyConst
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Fully qualify this constant to avoid possibly ambiguous resolution."

[[tests]]
name = "rubocopcoplintconstantresolution_registers_an_offense_not_qualifying_a_namespace_const"
source = '''
MyConst::MY_CONST
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 7
message = "Fully qualify this constant to avoid possibly ambiguous resolution."

[[tests]]
name = "rubocopcoplintconstantresolution_module__class_definitions_does_not_register_offense"
source = '''
module Foo; end
class Bar; end
'''
offenses = []

[[tests]]
name = "rubocopcoplintconstantresolution_with_only_set_registers_no_offense_when_qualifying_a_const"
source = '''
::MyConst
'''
offenses = []

[tests.config]
Only = ["MY_CONST"]

