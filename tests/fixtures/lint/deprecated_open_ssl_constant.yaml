cop: Lint/DeprecatedOpenSslConstant
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_two_arguments_and_corrects
    source: |
      OpenSSL::Cipher::AES.new(128, :GCM)
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: "Use `OpenSSL::Cipher.new('aes-128-gcm')` instead of `OpenSSL::Cipher::AES.new(128, :GCM)`."
    corrected: |
      OpenSSL::Cipher.new('aes-128-gcm')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_one_argument_and_corrects
    source: |
      OpenSSL::Cipher::AES.new('128-GCM')
    offenses:
      - line: 1
        column_start: 0
        column_end: 35
        message: "Use `OpenSSL::Cipher.new('aes-128-gcm')` instead of `OpenSSL::Cipher::AES.new('128-GCM')`."
    corrected: |
      OpenSSL::Cipher.new('aes-128-gcm')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_double_quoted_string_argument_and_corrects
    source: |
      OpenSSL::Cipher::AES128.new("GCM")
    offenses:
      - line: 1
        column_start: 0
        column_end: 34
        message: "Use `OpenSSL::Cipher.new('aes-128-gcm')` instead of `OpenSSL::Cipher::AES128.new(\"GCM\")`."
    corrected: |
      OpenSSL::Cipher.new('aes-128-gcm')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_cbc_argument_and_corrects
    source: |
      OpenSSL::Cipher::DES.new('cbc')
    offenses:
      - line: 1
        column_start: 0
        column_end: 31
        message: "Use `OpenSSL::Cipher.new('des-cbc')` instead of `OpenSSL::Cipher::DES.new('cbc')`."
    corrected: |
      OpenSSL::Cipher.new('des-cbc')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_when_the_cipher_constant_appears_twice_and_autocorrects
    source: |
      OpenSSL::Cipher::Cipher.new('AES-256-ECB')
    offenses:
      - line: 1
        column_start: 0
        column_end: 42
        message: "Use `OpenSSL::Cipher.new('AES-256-ECB')` instead of `OpenSSL::Cipher::Cipher.new('AES-256-ECB')`."
    corrected: |
      OpenSSL::Cipher.new('AES-256-ECB')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_ecb_argument_and_corrects
    source: |
      OpenSSL::Cipher::BF.new('ecb')
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: "Use `OpenSSL::Cipher.new('bf-ecb')` instead of `OpenSSL::Cipher::BF.new('ecb')`."
    corrected: |
      OpenSSL::Cipher.new('bf-ecb')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_aes_blocksize_constant_and_mode_argument_and_corrects
    source: |
      OpenSSL::Cipher::AES128.new(:GCM)
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: "Use `OpenSSL::Cipher.new('aes-128-gcm')` instead of `OpenSSL::Cipher::AES128.new(:GCM)`."
    corrected: |
      OpenSSL::Cipher.new('aes-128-gcm')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_cipher_constant_and_no_arguments_and_corrects
    source: |
      OpenSSL::Cipher::#{algorithm_name}.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 38
        message: "Use `OpenSSL::Cipher.new('#{algorithm_name.downcase}')` instead of `OpenSSL::Cipher::#{algorithm_name}.new`."
    corrected: |
      OpenSSL::Cipher.new('#{algorithm_name.downcase}')
    interpolated: true

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_with_aes_blocksize_constant_and_corrects
    source: |
      OpenSSL::Cipher::AES128.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Use `OpenSSL::Cipher.new('aes-128-cbc')` instead of `OpenSSL::Cipher::AES128.new`."
    corrected: |
      OpenSSL::Cipher.new('aes-128-cbc')

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_when_using_cipher_with_a_string
    source: |
      OpenSSL::Cipher.new('aes-128-gcm')
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_with_cipher_constant_and_argument_is_a_variable
    source: |
      mode = "cbc"
      OpenSSL::Cipher::AES128.new(mode)
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_with_cipher_constant_and_argument_is_a_method_call
    source: |
      OpenSSL::Cipher::AES128.new(do_something)
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_with_cipher_constant_and_argument_is_a_safe_navigation_method_call
    source: |
      OpenSSL::Cipher::AES128.new(foo&.bar)
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_with_cipher_constant_and_argument_is_a_constant
    source: |
      OpenSSL::Cipher::AES128.new(MODE)
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_when_building_an_instance_using_a_digest_constant_and_corrects
    source: |
      OpenSSL::Digest::SHA256.new
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Use `OpenSSL::Digest.new('SHA256')` instead of `OpenSSL::Digest::SHA256.new`."
    corrected: |
      OpenSSL::Digest.new('SHA256')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_when_using_digest_class_methods_on_an_algorithm_constant_and_corrects
    source: |
      OpenSSL::Digest::SHA256.digest('foo')
    offenses:
      - line: 1
        column_start: 0
        column_end: 37
        message: "Use `OpenSSL::Digest.digest('SHA256', 'foo')` instead of `OpenSSL::Digest::SHA256.digest('foo')`."
    corrected: |
      OpenSSL::Digest.digest('SHA256', 'foo')

  - name: rubocop_cop_lint_deprecatedopensslconstant_registers_an_offense_when_using_a_digest_constant_with_chained_methods_and_corrects
    source: |
      OpenSSL::Digest::SHA256.new.digest('foo')
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: "Use `OpenSSL::Digest.new('SHA256')` instead of `OpenSSL::Digest::SHA256.new`."
    corrected: |
      OpenSSL::Digest.new('SHA256').digest('foo')

  - name: rubocop_cop_lint_deprecatedopensslconstant_when_used_in_a_block_registers_an_offense_when_using_digest_class_methods_on_an_algorithm_constant_and_corrects
    source: |
      do_something do
        OpenSSL::Digest::SHA1.new
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 27
        message: "Use `OpenSSL::Digest.new('SHA1')` instead of `OpenSSL::Digest::SHA1.new`."
    corrected: |
      do_something do
        OpenSSL::Digest.new('SHA1')
      end

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_when_building_digest_using_an_algorithm_string
    source: |
      OpenSSL::Digest.new('SHA256')
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_when_building_digest_using_an_algorithm_string_and_nested_digest_constants
    source: |
      OpenSSL::Digest::Digest.new('SHA256')
    offenses:
      []

  - name: rubocop_cop_lint_deprecatedopensslconstant_does_not_register_an_offense_when_using_digest_class_methods_with_an_algorithm_string_and_value
    source: |
      OpenSSL::Digest.digest('SHA256', 'foo')
    offenses:
      []
