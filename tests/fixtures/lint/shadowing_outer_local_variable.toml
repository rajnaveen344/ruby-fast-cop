[[tests]]
name = "rubocopcoplintshadowingouterlocalvariable_when_a_block_argument_has_same_name_as_an_outer_scope_variable_registers_an_offense"
source = '''
def some_method
  foo = 1
  puts foo
  1.times do |foo|
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 14
column_end = 17
message = "Shadowing outer local variable - `foo`."

