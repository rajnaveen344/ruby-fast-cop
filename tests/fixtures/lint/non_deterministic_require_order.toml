cop = "Lint/NonDeterministicRequireOrder"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintnondeterministicrequireorder_when_requiring_files_when_ruby_30_or_higher_with_dir_does_not_register_an_offense"
ruby_version = ">= 3.0"
source = '''
Dir["./lib/**/*.rb"].each do |file|
  require file
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnondeterministicrequireorder_when_requiring_files_when_ruby_30_or_higher_with_dir_with_extra_logic_does_not_register_an_offense"
ruby_version = ">= 3.0"
source = '''
Dir["./lib/**/*.rb"].each do |file|
  if file.start_with?('_')
    puts "Not required."
  else
    require file
  end
end
'''
offenses = []

