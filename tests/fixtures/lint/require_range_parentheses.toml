cop = "Lint/RequireRangeParentheses"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintrequirerangeparentheses_registers_an_offense_when_the_end_of_the_range__is_line_break"
source = '''
42..
do_something
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "Wrap the endless range literal `42..` to avoid precedence ambiguity."

