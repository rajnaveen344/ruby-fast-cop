cop = "Lint/NoReturnInBeginEndBlocks"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintnoreturninbeginendblocks_behaves_like_rejects_return_inside_a_block_rejects_a_return_statement_inside_a_block_when_using__for_local_variable"
source = '''
some_value = 10

some_value = begin
  return 1 if rand(1..2).odd?
  2
end
'''

[[tests.offenses]]
line = 4
column_start = 2
column_end = 10
message = "Do not `return` in `begin..end` blocks in assignment contexts."

