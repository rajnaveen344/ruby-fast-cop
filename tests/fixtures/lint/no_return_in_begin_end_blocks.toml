cop = "Lint/NoReturnInBeginEndBlocks"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_noreturninbeginendblocks"
source = '''
some_value = 10

some_value #{operator} begin
  return 1 if rand(1..2).odd?
  2
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 4
column_start = 2
column_end = 10
message = "Do not `return` in `begin..end` blocks in assignment contexts."

