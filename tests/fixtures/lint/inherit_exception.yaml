cop: Lint/InheritException
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_registers_an_offense_and_corrects
    source: |
      class C < Exception; end
    offenses:
      - line: 1
        column_start: 10
        column_end: 19
        message: Inherit from `RuntimeError` instead of `Exception`.
    corrected: |
      class C < RuntimeError; end
    config:
      EnforcedStyle: $UNRESOLVED:runtime_error
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_when_creating_a_subclass_using_class_new_registers_an_offense_and_corrects
    source: |
      Class.new(Exception)
    offenses:
      - line: 1
        column_start: 10
        column_end: 19
        message: Inherit from `RuntimeError` instead of `Exception`.
    corrected: |
      Class.new(RuntimeError)
    config:
      EnforcedStyle: $UNRESOLVED:runtime_error
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_when_inheriting_exception_registers_an_offense_and_corrects
    source: |
      module Foo
        class C < Exception; end # This `Exception` is the same as `::Exception`.
        class Exception < RuntimeError; end
      end
    offenses:
      - line: 2
        column_start: 12
        column_end: 21
        message: Inherit from `RuntimeError` instead of `Exception`.
    corrected: |
      module Foo
        class C < RuntimeError; end # This `Exception` is the same as `::Exception`.
        class Exception < RuntimeError; end
      end
    config:
      EnforcedStyle: $UNRESOLVED:runtime_error
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_when_inheriting_exception_and_has_non_constant_siblings_registers_an_offense_and_corrects
    source: |
      module Foo
        include Bar
      
        class C < Exception; end # This `Exception` is the same as `::Exception`.
        class Exception < RuntimeError; end
      end
    offenses:
      - line: 4
        column_start: 12
        column_end: 21
        message: Inherit from `RuntimeError` instead of `Exception`.
    corrected: |
      module Foo
        include Bar
      
        class C < RuntimeError; end # This `Exception` is the same as `::Exception`.
        class Exception < RuntimeError; end
      end
    config:
      EnforcedStyle: $UNRESOLVED:runtime_error
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_when_inheriting_exception_registers_an_offense_and_corrects
    source: |
      module Foo
        class Exception < RuntimeError; end
        class C < ::Exception; end
      end
    offenses:
      - line: 3
        column_start: 12
        column_end: 23
        message: Inherit from `RuntimeError` instead of `Exception`.
    corrected: |
      module Foo
        class Exception < RuntimeError; end
        class C < RuntimeError; end
      end
    config:
      EnforcedStyle: $UNRESOLVED:runtime_error
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_inheritexception_when_class_inherits_from_exception_with_enforced_style_set_to_runtime_error_when_inheriting_a_standard_lib_exception_class_that_is_not_a_subclass_of_standarderror_does_not_register_an_offense
    source: |
      class C < Interrupt; end
    offenses:
      []
    config:
