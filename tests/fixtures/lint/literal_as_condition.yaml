cop: Lint/LiteralAsCondition
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_literalascondition
    source: |
      if %{lit}
        top
      end
    offenses:
      - line: 1
        column_start: 3
        column_end: 9
        message: "Literal `#{lit}` appeared as a condition."
    corrected: |
      top
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_literalascondition
    source: |
      if %{lit}
        top
      else
        foo
      end
