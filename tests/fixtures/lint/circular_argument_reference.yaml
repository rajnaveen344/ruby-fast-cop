cop: Lint/CircularArgumentReference
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_contains_a_circular_argument_reference_registers_an_offense
    source: |
      def omg_wow(msg = msg)
        puts msg
      end
    offenses:
      - line: 1
        column_start: 18
        column_end: 21
        message: Circular argument reference - `msg`.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_contains_a_triple_circular_argument_reference_registers_an_offense
    source: |
      def omg_wow(msg = msg = msg)
        puts msg
      end
    offenses:
      - line: 1
        column_start: 24
        column_end: 27
        message: Circular argument reference - `msg`.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_contains_a_circular_argument_reference_with_intermediate_argument_registers_an_offense
    source: |
      def omg_wow(msg = foo = msg)
        puts msg
      end
    offenses:
      - line: 1
        column_start: 24
        column_end: 27
        message: Circular argument reference - `msg`.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_contains_a_circular_argument_reference_with_two_intermediate_arguments_registers_an_offense
    source: |
      def omg_wow(msg = foo = msg2 = foo)
        puts msg
      end
    offenses:
      - line: 1
        column_start: 31
        column_end: 34
        message: Circular argument reference - `msg`.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_does_not_contain_a_circular_argument_among_assignments_does_not_register_an_offense
    source: |
      def omg_wow(msg = foo = self.msg)
        puts msg
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_method_does_not_contain_a_circular_argument_reference_does_not_register_an_offense
    source: |
      def omg_wow(msg)
        puts msg
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_ordinal_arguments_when_the_seemingly_circular_default_value_is_a_method_call_does_not_register_an_offense
    source: |
      def omg_wow(msg = self.msg)
        puts msg
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_when_the_keyword_argument_is_not_circular_does_not_register_an_offense
    source: |
      def some_method(some_arg: nil)
        puts some_arg
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_when_the_keyword_argument_is_not_circular_and_calls_a_method_does_not_register_an_offense
    source: |
      def some_method(some_arg: some_method)
        puts some_arg
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_when_there_is_one_circular_argument_reference_registers_an_offense
    source: |
      def some_method(some_arg: some_arg)
        puts some_arg
      end
    offenses:
      - line: 1
        column_start: 26
        column_end: 34
        message: Circular argument reference - `some_arg`.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_does_not_register_an_offense
    source: |
      def puts_value(value: self.class.value, smile: self.smile)
        puts value
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_does_not_register_an_offense
    source: |
      def puts_length(length: mystring.length)
        puts length
      end
    offenses:
      []
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_circularargumentreference_circular_argument_references_in_keyword_arguments_when_there_are_multiple_offensive_keyword_arguments_registers_an_offense
    source: |
      def some_method(some_arg: some_arg, other_arg: other_arg)
        puts [some_arg, other_arg]
      end
    offenses:
      - line: 1
        column_start: 26
        column_end: 34
        message: Circular argument reference - `some_arg`.
      - line: 1
        column_start: 47
        column_end: 56
        message: Circular argument reference - `other_arg`.
    ruby_version: ">= 3.4"
