cop: Lint/UselessDefaultValueArgument
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessdefaultvalueargument_with_fetch_registers_an_offense_for_x_fetch_key_default_value_block_value
    source: |
      x.fetch(key, default_value) { block_value }
    offenses:
      - line: 1
        column_start: 13
        column_end: 26
        message: Block supersedes default value argument.
    corrected: |
      x.fetch(key) { block_value }

