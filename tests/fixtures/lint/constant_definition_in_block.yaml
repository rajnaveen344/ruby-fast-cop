cop: Lint/ConstantDefinitionInBlock
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_constant
    source: |
      FOO = 1
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_constant_followed_by_another_statement
    source: |
      FOO = 1
      bar
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_constant_defined_within_a_block
    source: |
      describe do
        FOO = 1
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 9
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_constant_defined_within_a_block_followed_by_another_statement
    source: |
      describe do
        FOO = 1
        bar
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 9
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_class
    source: |
      class Foo; end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_class_followed_by_another_statement
    source: |
      class Foo; end
      bar
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_class_defined_within_a_block
    source: |
      describe do
        class Foo; end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 16
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_class_defined_within_a_block_followed_by_another_statement
    source: |
      describe do
        class Foo; end
        bar
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 16
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_class_defined_within_a_numblock
    source: |
      describe do
        class Foo; end
        _1
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 16
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_module
    source: |
      module Foo; end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_top_level_module_followed_by_another_statement
    source: |
      module Foo; end
      bar
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_module_defined_within_a_block
    source: |
      describe do
        module Foo; end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 17
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_module_defined_within_a_block_followed_by_another_statement
    source: |
      describe do
        module Foo; end
        bar
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 17
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_module_defined_within_a_numblock
    source: |
      describe do
        module Foo; end
        _1
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 17
        message: Do not define constants this way within a block.

  - name: rubocop_cop_lint_constantdefinitioninblock_registers_an_offense_for_a_module_defined_within_an_itblock
    source: |
      describe do
        module Foo; end
        it
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 17
        message: Do not define constants this way within a block.
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_constant_with_an_explicit_self_scope
    source: |
      describe do
        self::FOO = 1
      end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_constant_with_an_explicit_self_scope_followed_by_another_statement
    source: |
      describe do
        self::FOO = 1
        bar
      end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_constant_with_an_explicit_top_level_scope
    source: |
      describe do
        ::FOO = 1
      end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_does_not_register_an_offense_for_a_constant_with_an_explicit_top_level_scope_followed_by_another_statement
    source: |
      describe do
        ::FOO = 1
        bar
      end
    offenses:
      []

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_enums_does_not_register_an_offense_for_a_casign_used_within_a_block_of_enums_method
    source: |
      class TestEnum < T::Enum
        enums do
          Foo = new("foo")
        end
      end
    offenses:
      []
    config:
      AllowedMethods: [enums]

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_enums_does_not_register_an_offense_for_a_class_defined_within_a_block_of_enums_method
    source: |
      enums do
        class Foo
        end
      end
    offenses:
      []
    config:
      AllowedMethods: [enums]

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_enums_does_not_register_an_offense_for_a_module_defined_within_a_block_of_enums_method
    source: |
      enums do
        module Foo
        end
      end
    offenses:
      []
    config:
      AllowedMethods: [enums]

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_enums_does_not_register_an_offense_for_a_module_defined_within_a_numblock_of_enums_method
    source: |
      enums do
        module Foo
        end
        _1
      end
    offenses:
      []
    config:
      AllowedMethods: [enums]

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_enums_does_not_register_an_offense_for_a_module_defined_within_an_itblock_of_enums_method
    source: |
      enums do
        module Foo
        end
        it
      end
    offenses:
      []
    config:
      AllowedMethods: [enums]
    ruby_version: ">= 3.4"

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_registers_an_offense_for_a_casign_used_within_a_block_of_enums_method
    source: |
      class TestEnum < T::Enum
        enums do
          Foo = new("foo")
        end
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 20
        message: Do not define constants this way within a block.
    config:
      AllowedMethods: []

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_registers_an_offense_for_a_class_defined_within_a_block_of_enums_method
    source: |
      enums do
        class Foo
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 11
        message: Do not define constants this way within a block.
    config:
      AllowedMethods: []

  - name: rubocop_cop_lint_constantdefinitioninblock_when_allowedmethods_registers_an_offense_for_a_module_defined_within_a_block_of_enums_method
    source: |
      enums do
        module Foo
        end
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 12
        message: Do not define constants this way within a block.
    config:
      AllowedMethods: []
