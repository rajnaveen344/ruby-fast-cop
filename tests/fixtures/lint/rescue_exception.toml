cop = "Lint/RescueException"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintrescueexception_registers_an_offense_for_rescue_from_exception"
source = '''
begin
  something
rescue Exception
  #do nothing
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 16
message = "Avoid rescuing the `Exception` class. Perhaps you meant to rescue `StandardError`?"

[[tests]]
name = "rubocopcoplintrescueexception_registers_an_offense_for_rescue_with_exception"
source = '''
begin
  something
rescue ::Exception
  #do nothing
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 18
message = "Avoid rescuing the `Exception` class. Perhaps you meant to rescue `StandardError`?"

[[tests]]
name = "rubocopcoplintrescueexception_registers_an_offense_for_rescue_with_standarderror_exception"
source = '''
begin
  something
rescue StandardError, Exception
  #do nothing
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 31
message = "Avoid rescuing the `Exception` class. Perhaps you meant to rescue `StandardError`?"

[[tests]]
name = "rubocopcoplintrescueexception_registers_an_offense_for_rescue_with_exception__e"
source = '''
begin
  something
rescue Exception => e
  #do nothing
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 21
message = "Avoid rescuing the `Exception` class. Perhaps you meant to rescue `StandardError`?"

[[tests]]
name = "rubocopcoplintrescueexception_does_not_register_an_offense_for_rescue_with_no_class"
source = '''
