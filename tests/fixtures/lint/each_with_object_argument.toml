cop = "Lint/EachWithObjectArgument"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplinteachwithobjectargument_registers_an_offense_for_fixnum_argument"
source = '''
collection.each_with_object(0) { |e, a| a + e }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "The argument to each_with_object cannot be immutable."

[[tests]]
name = "rubocopcoplinteachwithobjectargument_registers_an_offense_for_float_argument"
source = '''
collection.each_with_object(0.1) { |e, a| a + e }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 32
message = "The argument to each_with_object cannot be immutable."

[[tests]]
name = "rubocopcoplinteachwithobjectargument_registers_an_offense_for_bignum_argument"
source = '''
c.each_with_object(100000000000000000000) { |e, o| o + e }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 41
message = "The argument to each_with_object cannot be immutable."

[[tests]]
name = "rubocopcoplinteachwithobjectargument_accepts_a_variable_argument"
source = '''
