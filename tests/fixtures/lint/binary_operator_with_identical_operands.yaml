cop: Lint/BinaryOperatorWithIdenticalOperands
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_binaryoperatorwithidenticaloperands
    source: |
      y = a.x(arg) %{operator} a.x(arg)
    offenses:
      - line: 1
        column_start: 4
        column_end: 33
        message: Binary operator `%{operator}` has identical operands.

  - name: rubocop_cop_lint_binaryoperatorwithidenticaloperands
    source: |
      y = a.x(arg) #{operator} a.x(arg)
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_binaryoperatorwithidenticaloperands_does_not_register_an_offense_when_using_binary_operator_with_different_operands
    source: |
      x == y
      y = x && z
      y = a.x + b.x
      a.x(arg) > b.x(arg)
      a.(x) > b.(x)
    offenses:
      []

  - name: rubocop_cop_lint_binaryoperatorwithidenticaloperands_does_not_register_an_offense_when_using_arithmetic_operator_with_numerics
    source: |
      x = 2 + 2
      x = 1 << 1
    offenses:
      []

  - name: rubocop_cop_lint_binaryoperatorwithidenticaloperands_does_not_crash_on_operator_without_any_argument
    source: |
      foo.*
    offenses:
      []
