cop: Lint/UselessAccessModifier
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessaccessmodifier_when_an_access_modifier_has_no_effect_registers_an_offense_and_corrects
    source: |
      class SomeClass
        def some_method
          puts 10
        end
        private
        def self.some_method
          puts 10
        end
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 9
        message: Useless `private` access modifier.
    corrected: |
      class SomeClass
        def some_method
          puts 10
        end
        def self.some_method
          puts 10
        end
      end

  - name: rubocop_cop_lint_uselessaccessmodifier_when_an_access_modifier_is_used_on_top_level_registers_an_offense_and_corrects
    source: |
      def some_method
        puts 10
      end
      private
      def other_method
        puts 10
      end
    offenses:
      - line: 4
        column_start: 0
        column_end: 7
        message: Useless `private` access modifier.
    corrected: |
      def some_method
        puts 10
      end
      def other_method
        puts 10
      end

