cop = "Lint/IdentityComparison"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintidentitycomparison_registers_an_offense_and_corrects_when_using__for_comparison_between_object_ids"
source = '''
foo.object_id == bar.object_id
'''
corrected = '''
foo.equal?(bar)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "Use `equal?` instead of `==` when comparing `object_id`."

[[tests]]
name = "rubocopcoplintidentitycomparison_registers_an_offense_and_corrects_when_using__for_comparison_between_object_ids_2"
source = '''
foo.object_id != bar.object_id
'''
corrected = '''
!foo.equal?(bar)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "Use `!equal?` instead of `!=` when comparing `object_id`."

