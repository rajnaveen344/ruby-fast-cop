  def initialize
    super
    @delicious ||= true
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_constructor_has_disjunctive_assignment_lhs_is_ivar_constructor_calls_any_method_before_disjunctive_assignment_accepts"
source = '''
class Banana
  def initialize
    # With the limitations of static analysis, it's very difficult
    # to determine, after this method call, whether the disjunctive
    # assignment is necessary or not.
    absolutely_any_method
    @delicious ||= true
  end
end
'''
offenses = []
