cop = "Lint/DisjunctiveAssignmentInConstructor"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_empty_constructor_accepts"
source = '''
class Banana
  def initialize
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_constructor_does_not_have_disjunctive_assignment_accepts"
source = '''
class Banana
  def initialize
    @delicious = true
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_constructor_has_disjunctive_assignment_lhs_is_lvar_accepts"
source = '''
class Banana
  def initialize
    delicious ||= true
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_constructor_has_disjunctive_assignment_lhs_is_ivar_registers_an_offense_and_corrects"
source = '''
class Banana
  def initialize
    @delicious ||= true
  end
end
'''
corrected = '''
class Banana
  def initialize
    @delicious = true
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 15
column_end = 18
message = "Unnecessary disjunctive assignment. Use plain assignment."

[[tests]]
