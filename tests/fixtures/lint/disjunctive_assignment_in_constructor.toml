source = '''
class Banana
  def initialize
    @delicious ||= true
    super
  end
end
'''
corrected = '''
class Banana
  def initialize
    @delicious = true
    super
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 15
column_end = 18
message = "Unnecessary disjunctive assignment. Use plain assignment."

[[tests]]
name = "rubocopcoplintdisjunctiveassignmentinconstructor_constructor_has_disjunctive_assignment_lhs_is_ivar_constructor_calls_super_before_disjunctive_assignment_accepts"
source = '''
