cop: Lint/TrailingCommaInAttributeDeclaration
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_trailingcommainattributedeclaration_registers_an_offense_when_using_trailing_comma
    source: |
      class Foo
        attr_reader :bar,
      
        def baz
          puts "Qux"
        end
      end
    offenses:
      - line: 2
        column_start: 18
        column_end: 19
        message: Avoid leaving a trailing comma in attribute declarations.
    corrected: |
      class Foo
        attr_reader :bar
      
        def baz
          puts "Qux"
        end
      end

  - name: rubocop_cop_lint_trailingcommainattributedeclaration_does_not_register_an_offense_when_not_using_trailing_comma
    source: |
      class Foo
        attr_reader :bar
      
        def baz
          puts "Qux"
        end
      end
    offenses:
      []
