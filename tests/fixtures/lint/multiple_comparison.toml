cop = "Lint/MultipleComparison"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_multiplecomparison"
source = '''
x %{operator1} y %{operator2} z
'''
corrected = '''
x #{operator1} y && y #{operator2} z
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 31
message = "Use the `&&` operator to compare multiple values."

[[tests]]
name = "rubocop_cop_lint_multiplecomparison_accepts_to_use_one_compare_operator"
source = '''
x < 1
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_multiplecomparison_accepts_to_use_operator"
source = '''
x >= y & x < z
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_multiplecomparison_accepts_to_use_operator"
source = '''
x >= y | x < z
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_multiplecomparison_accepts_to_use_operator"
source = '''
x >= y ^ x < z
'''
offenses = []
