[[tests]]
name = "rubocopcoplintredundantregexpquantifiers_with_duplicate__quantifiers_registers_an_offense_and_corrects"
source = '''
foo = /(?:a+)+/
'''
corrected = '''
foo = /(?:a+)/
'''

[[tests.offenses]]
line = 1
column_start = 11
column_end = 14
message = "Replace redundant quantifiers `+` and `+` with a single `+`."

