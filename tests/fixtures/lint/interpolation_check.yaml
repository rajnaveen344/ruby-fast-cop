cop: Lint/InterpolationCheck
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_interpolationcheck_registers_an_offense_and_corrects_for_interpolation_in_single_quoted_string
    source: |
      'foo #{bar}'
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: Interpolation in single quoted string detected. Use double quoted strings if you need interpolation.
    corrected: |
      "foo #{bar}"

  - name: rubocop_cop_lint_interpolationcheck_registers_an_offense_and_corrects_when_including_interpolation_and_double_quoted_string_in_single_quoted_string
    source: |
      'foo "#{bar}"'
    offenses:
      - line: 1
        column_start: 0
        column_end: 14
        message: Interpolation in single quoted string detected. Use double quoted strings if you need interpolation.
    corrected: |
      ‹BASE›0‹/BASE›
      %{foo "#{bar}"}

  - name: rubocop_cop_lint_interpolationcheck_registers_an_offense_for_interpolation_in_single_quoted_split_string
    source: |
      'x' \
        'foo #{bar}'
    offenses:
      - line: 2
        column_start: 2
        column_end: 14
        message: Interpolation in single quoted string detected. Use double quoted strings if you need interpolation.

  - name: rubocop_cop_lint_interpolationcheck_registers_an_offense_for_interpolation_in_double_single_quoted_split_string
    source: |
      "x" \
        'foo #{bar}'
    offenses:
      - line: 2
        column_start: 2
        column_end: 14
        message: Interpolation in single quoted string detected. Use double quoted strings if you need interpolation.

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_for_properly_interpolation_strings
    source: |
      hello = "foo #{bar}"
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_for_interpolation_in_nested_strings
    source: |
      foo = "bar '#{baz}' qux"
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_for_interpolation_in_a_regexp
    source: |
      /\#{20}/
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_for_an_escaped_interpolation
    source: |
      "\#{msg}"
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_crash_for_xff
    source: |
      foo = "\xff"
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_for_escaped_crab_claws_in_dstr
    source: |
      foo = "alpha #{variable} beta \#{gamma}\" delta"
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_offense_for_strings_in_w
    source: |
      ‹BASE›0‹/BASE›
      %w("#{a}-foo")
    offenses:
      []

  - name: rubocop_cop_lint_interpolationcheck_does_not_register_an_offense_when_using_invalid_syntax_in_interpolation
    source: |
      '#{%<expression>s}'
    offenses:
      []
