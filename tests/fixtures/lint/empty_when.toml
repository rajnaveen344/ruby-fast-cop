cop = "Lint/EmptyWhen"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_emptywhen_when_a_when_body_is_missing_registers_an_offense_for_a_missing_when_body"
source = '''
case foo
when :bar then 1
when :baz # nothing
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 9
message = "Avoid `when` branches without a body."

[tests.config]
AllowComments = false

