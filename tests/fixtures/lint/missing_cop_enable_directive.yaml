cop: Lint/MissingCopEnableDirective
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_infinite_registers_an_offense_when_a_cop_is_disabled_and_never_re_enabled
    source: |
      ‹BASE›0‹/BASE›
      # rubocop:disable Layout/SpaceAroundOperators
      x =   0
      # Some other code
    offenses:
      - line: 1
        column_start: 0
        column_end: 45
        message: "Re-enable Layout/SpaceAroundOperators cop with `# rubocop:enable` after disabling it."
    config:
      MaximumRangeSize: "Float::INFINITY"

  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_infinite_does_not_register_an_offense_when_the_disable_cop_is_re_enabled
    source: |
      ‹BASE›0‹/BASE›
      # rubocop:disable Layout/SpaceAroundOperators
      x =   0
      # rubocop:enable Layout/SpaceAroundOperators
      # Some other code
    offenses:
      []
    config:
      MaximumRangeSize: "Float::INFINITY"

  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_infinite_registers_an_offense_when_a_department_is_disabled_and_never_re_enabled
    source: |
      ‹BASE›0‹/BASE›
      # rubocop:disable Layout
      x =   0
      # Some other code
    offenses:
      - line: 1
        column_start: 0
        column_end: 24
        message: "Re-enable Layout department with `# rubocop:enable` after disabling it."
    config:
      MaximumRangeSize: "Float::INFINITY"

  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_infinite_does_not_register_an_offense_when_the_disable_department_is_re_enabled
    source: |
      ‹BASE›0‹/BASE›
      # rubocop:disable Layout
      x =   0
      # rubocop:enable Layout
      # Some other code
    offenses:
      []
    config:
      MaximumRangeSize: "Float::INFINITY"

  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_finite_registers_an_offense_when_a_cop_is_disabled_for_too_many_lines
    source: |
      ‹BASE›0‹/BASE›
      # rubocop:disable Layout/SpaceAroundOperators
      x =   0
      y = 1
      # Some other code
      # rubocop:enable Layout/SpaceAroundOperators
    offenses:
      - line: 1
        column_start: 0
        column_end: 45
        message: Re-enable Layout/SpaceAroundOperators cop within 2 lines after disabling it.
    config:
      MaximumRangeSize: 2

  - name: rubocop_cop_lint_missingcopenabledirective_when_the_maximum_range_size_is_finite_registers_an_offense_when_a_cop_is_disabled_and_never_re_enabled
