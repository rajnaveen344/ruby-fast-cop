cop = "Lint/NonLocalExitFromIterator"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_allows_return_with_value"
source = '''
def find_first_sold_out_item(items)
  items.each do |item|
    return item if item.stock == 0
    item.foobar!
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_allows_return_in_define_method"
source = '''
[:method_one, :method_two].each do |method_name|
  define_method(method_name) do
    return if predicate?
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_allows_return_in_define_singleton_method"
source = '''
str = 'foo'
str.define_singleton_method :bar do |baz|
  return unless baz
  replace baz
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_block_is_followed_by_method_chain_and_has_single_argument_registers_an_offense"
source = '''
items.each do |item|
  return if item.stock == 0
  item.update!(foobar: true)
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 8
message = "Non-local exit from iterator, without return value. `next`, `break`, `Array#find`, `Array#any?`, etc. is preferred."

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_block_is_followed_by_method_chain_and_has_single_argument_registers_an_offense_for_numblocks"
source = '''
