[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_block_is_not_followed_by_method_chain_allows"
source = '''
transaction do
  return unless update_necessary?
  find_each do |item|
    return if item.stock == 0 # false-negative...
    item.update!(foobar: true)
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_block_is_lambda_allows"
source = '''
items.each(lambda do |item|
  return if item.stock == 0
  item.update!(foobar: true)
end)
items.each -> (item) {
  return if item.stock == 0
  item.update!(foobar: true)
}
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_lambda_is_inside_of_block_followed_by_method_chain_allows"
source = '''
RSpec.configure do |config|
  # some configuration

  if Gem.loaded_specs["paper_trail"].version < Gem::Version.new("4.0.0")
    current_behavior = ActiveSupport::Deprecation.behavior
    ActiveSupport::Deprecation.behavior = lambda do |message, callstack|
      return if message =~ /foobar/
      Array.wrap(current_behavior).each do |behavior|
        behavior.call(message, callstack)
      end
    end

    # more configuration
  end
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintnonlocalexitfromiterator_when_block_in_middle_of_nest_is_followed_by_method_chain_registers_offenses"
source = '''
transaction do
  return unless update_necessary?
  items.each do |item|
    return if item.nil?
    item.with_lock do
      return if item.stock == 0
      item.very_complicated_update_operation!
    end
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 4
column_end = 10
message = "Non-local exit from iterator, without return value. `next`, `break`, `Array#find`, `Array#any?`, etc. is preferred."

