cop: Lint/RandOne
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_randone_registers_an_offense
    source: |
      %{source}
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: "`#{source}` always returns `0`. [...]"
    interpolated: true

  - name: rubocop_cop_lint_randone_offenses_rand_1
    source: |
      rand 1
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_rand_1
    source: |
      rand(-1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_rand_1_0
    source: |
      rand(1.0)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_rand_1_0
    source: |
      rand(-1.0)
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_rand
    source: |
      rand
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_rand_2
    source: |
      rand(2)
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_rand_1_1
    source: |
      rand(-1..1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_kernel_rand_1
    source: |
      Kernel.rand(1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_kernel_rand_1
    source: |
      Kernel.rand(-1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_kernel_rand_1_0
    source: |
      Kernel.rand 1.0
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_kernel_rand_1_0
    source: |
      Kernel.rand(-1.0)
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_kernel_rand
    source: |
      Kernel.rand
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_kernel_rand_2
    source: |
      Kernel.rand 2
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_kernel_rand_1_1
    source: |
      Kernel.rand(-1..1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_offenses_kernel_rand_1
    source: |
      ::Kernel.rand(1)
    offenses:
      []

  - name: rubocop_cop_lint_randone_no_offense_kernel_rand
    source: |
      ::Kernel.rand
    offenses:
      []
