cop = "Lint/DuplicateElsifCondition"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintduplicateelsifcondition_registers_an_offense_for_repeated_elsif_conditions"
source = '''
if x == 1
elsif x == 2
elsif x == 1
end
'''

[[tests.offenses]]
line = 3
column_start = 6
column_end = 12
message = "Duplicate `elsif` condition detected."

[[tests]]
name = "rubocopcoplintduplicateelsifcondition_registers_an_offense_for_subsequent_repeated_elsif_conditions"
source = '''
if x == 1
elsif x == 2
elsif x == 2
end
'''

[[tests.offenses]]
line = 3
column_start = 6
column_end = 12
message = "Duplicate `elsif` condition detected."

[[tests]]
name = "rubocopcoplintduplicateelsifcondition_registers_multiple_offenses_for_multiple_repeated_elsif_conditions"
source = '''
if x == 1
elsif x == 2
elsif x == 1
elsif x == 2
end
'''

[[tests.offenses]]
line = 3
column_start = 6
column_end = 12
message = "Duplicate `elsif` condition detected."

[[tests.offenses]]
line = 4
column_start = 6
column_end = 12
message = "Duplicate `elsif` condition detected."

[[tests]]
name = "rubocopcoplintduplicateelsifcondition_does_not_register_an_offense_for_nonrepeated_elsif_conditions"
source = '''
if x == 1
elsif x == 2
else
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintduplicateelsifcondition_does_not_register_an_offense_for_partially_repeated_elsif_conditions"
source = '''
if x == 1
elsif x == 1 && x == 2
end
'''
offenses = []
