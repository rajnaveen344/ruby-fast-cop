cop = "Lint/RefinementImportMethods"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_refinementimportmethods_ruby_3_1_registers_an_offense_when_using_include_in_refine_block"
source = '''
refine Foo do
  include Bar
end
'''
ruby_version = ">= 3.1"

[[tests.offenses]]
line = 2
column_start = 2
column_end = 9
message = "Use `import_methods` instead of `include` because it is deprecated in Ruby 3.1."

[[tests]]
name = "rubocop_cop_lint_refinementimportmethods_ruby_3_1_registers_an_offense_when_using_prepend_in_refine_block"
source = '''
refine Foo do
  prepend Bar
end
'''
ruby_version = ">= 3.1"

[[tests.offenses]]
line = 2
column_start = 2
column_end = 9
message = "Use `import_methods` instead of `prepend` because it is deprecated in Ruby 3.1."

[[tests]]
name = "rubocop_cop_lint_refinementimportmethods_ruby_3_1_does_not_register_an_offense_when_using_import_methods_in_refine_block"
source = '''
refine Foo do
  import_methods Bar
end
'''
ruby_version = ">= 3.1"
offenses = []

