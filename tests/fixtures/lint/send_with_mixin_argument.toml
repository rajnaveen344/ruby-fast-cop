cop = "Lint/SendWithMixinArgument"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintsendwithmixinargument_registers_an_offense_when_using_send_with_include"
source = '''
Foo.send(:include, Bar)
'''
corrected = '''
Foo.include Bar
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 23
message = "Use `include Bar` instead of `send(:include, Bar)`."

