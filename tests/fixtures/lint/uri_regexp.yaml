cop: Lint/UriRegexp
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uriregexp_does_not_register_an_offense_when_using_regexp_without_receiver
    source: |
      regexp('http://example.com')
    offenses:
      []

  - name: rubocop_cop_lint_uriregexp_does_not_register_an_offense_when_using_regexp_with_variable_receiver
    source: |
      m.regexp('http://example.com')
    offenses:
      []

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_registers_an_offense_and_corrects_using_uri_regexp_with_argument
    source: |
      URI.regexp('http://example.com')
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp('http://example.com')` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp('http://example.com')`."
    corrected: |
      URI::DEFAULT_PARSER.make_regexp('http://example.com')
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_registers_an_offense_and_corrects_using_uri_regexp_with_argument
    source: |
      ::URI.regexp('http://example.com')
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: "`::URI.regexp('http://example.com')` is obsolete and should not be used. Instead, use `::URI::DEFAULT_PARSER.make_regexp('http://example.com')`."
    corrected: |
      ::URI::DEFAULT_PARSER.make_regexp('http://example.com')
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_registers_an_offense_and_corrects_using_uri_regexp_without_argument
    source: |
      URI.regexp
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp`."
    corrected: |
      URI::DEFAULT_PARSER.make_regexp
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_registers_an_offense_and_corrects_using_uri_regexp_without_argument
    source: |
      ::URI.regexp
    offenses:
      - line: 1
        column_start: 6
        column_end: 12
        message: "`::URI.regexp` is obsolete and should not be used. Instead, use `::URI::DEFAULT_PARSER.make_regexp`."
    corrected: |
      ::URI::DEFAULT_PARSER.make_regexp
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_array_argument_registers_an_offense_and_corrects_using_uri_regexp_with_literal_arrays
    source: |
      URI.regexp(['http', 'https'])
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp(['http', 'https'])` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp(['http', 'https'])`."
    corrected: |
      URI::DEFAULT_PARSER.make_regexp(['http', 'https'])
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_array_argument_registers_an_offense_and_corrects_using_uri_regexp_with_w_arrays
    source: |
      URI.regexp(%w[http https])
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp(%w[http https])` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp(%w[http https])`."
    corrected: |
      URI::DEFAULT_PARSER.make_regexp(%w[http https])
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_3_array_argument_registers_an_offense_and_corrects_using_uri_regexp_with_i_arrays
    source: |
      URI.regexp(%i[http https])
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp(%i[http https])` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp(%i[http https])`."
    corrected: |
      URI::DEFAULT_PARSER.make_regexp(%i[http https])
    ruby_version: ">= 3.3"

  - name: rubocop_cop_lint_uriregexp_ruby_3_4_registers_an_offense_and_corrects_using_uri_regexp_with_argument
    source: |
      URI.regexp('http://example.com')
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: "`URI.regexp('http://example.com')` is obsolete and should not be used. Instead, use `URI::RFC2396_PARSER.make_regexp('http://example.com')`."
    corrected: |
      URI::RFC2396_PARSER.make_regexp('http://example.com')
    ruby_version: ">= 3.4"
