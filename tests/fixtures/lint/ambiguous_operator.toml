do_something +42
'''
corrected = '''
do_something
do_something(+42)
'''

[[tests.offenses]]
line = 2
column_start = 13
column_end = 14
message = "Ambiguous positive number operator. Parenthesize the method arguments if it's surely a positive number operator, or add a whitespace to the right of the `+` if it should be an addition."

