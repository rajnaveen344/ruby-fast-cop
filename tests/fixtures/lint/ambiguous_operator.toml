cop = "Lint/AmbiguousOperator"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintambiguousoperator_with__unary_operator_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_registers_an_offense_and_corrects"
source = '''
do_something(+24)
do_something +42
'''
corrected = '''
do_something(+24)
do_something(+42)
'''

[[tests.offenses]]
line = 2
column_start = 13
column_end = 14
message = "Ambiguous positive number operator. Parenthesize the method arguments if it's surely a positive number operator, or add a whitespace to the right of the `+` if it should be an addition."

[[tests]]
name = "rubocopcoplintambiguousoperator_with__unary_operator_in_the_first_argument_without_parentheses_without_whitespaces_on_the_right_of_the_operator_when_a_method_with_no_arguments_is_used_in_advance_registers_an_offense_and_corrects"
source = '''
