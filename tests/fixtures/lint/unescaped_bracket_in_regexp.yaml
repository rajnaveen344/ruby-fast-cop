cop: Lint/UnescapedBracketInRegexp
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_when_unescaped_bracket_is_the_first_character_does_not_register_an_offense
    source: |
      /]/
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_unescaped_bracket_in_regexp_registers_an_offense_and_corrects
    source: |
      /abc]123/
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Regular expression has `]` without escape.
    corrected: |
      /abc\]123/

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_unescaped_bracket_in_regexp_with_regexp_options_registers_an_offense_and_corrects
    source: |
      /abc]123/i
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Regular expression has `]` without escape.
    corrected: |
      /abc\]123/i

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_multiple_unescaped_brackets_in_regexp_registers_an_offense_for_each_bracket
    source: |
      /abc]123]/
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Regular expression has `]` without escape.
      - line: 1
        column_start: 8
        column_end: 9
        message: Regular expression has `]` without escape.
    corrected: |
      /abc\]123\]/

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_escaped_bracket_in_regexp_does_not_register_an_offense
    source: |
      /abc\]123/
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_character_class_does_not_register_an_offense
    source: |
      /[abc]/
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_literal_regexp_character_class_in_lookbehind_does_not_register_an_offense
    source: |
      /(?<=[<>=:])/
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_when_unescaped_bracket_is_the_first_character_does_not_register_an_offense
    source: |
      %r{]}
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_unescaped_bracket_in_regexp_registers_an_offense_and_corrects
    source: |
      %r{abc]123}
    offenses:
      - line: 1
        column_start: 6
        column_end: 7
        message: Regular expression has `]` without escape.
    corrected: |
      %r{abc\]123}

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_unescaped_bracket_in_regexp_with_regexp_options_registers_an_offense_and_corrects
    source: |
      %r{abc]123}i
    offenses:
      - line: 1
        column_start: 6
        column_end: 7
        message: Regular expression has `]` without escape.
    corrected: |
      %r{abc\]123}i

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_multiple_unescaped_brackets_in_regexp_registers_an_offense_for_each_bracket
    source: |
      %r{abc]123]}
    offenses:
      - line: 1
        column_start: 6
        column_end: 7
        message: Regular expression has `]` without escape.
      - line: 1
        column_start: 10
        column_end: 11
        message: Regular expression has `]` without escape.
    corrected: |
      %r{abc\]123\]}

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_escaped_bracket_in_regexp_does_not_register_an_offense
    source: |
      %r{abc\]123}
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_character_class_does_not_register_an_offense
    source: |
      %r{[abc]}
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_r_regexp_character_class_in_lookbehind_does_not_register_an_offense
    source: |
      %r{(?<=[<>=:])}
    offenses:
      []

  - name: rubocop_cop_lint_unescapedbracketinregexp_when_unescaped_bracket_is_the_first_character_does_not_register_an_offense
    source: |
      Regexp.#{method}(']')
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_unescaped_bracket_in_regexp_registers_an_offense_and_corrects
    source: |
      Regexp.#{method}('abc]123')
    offenses:
      - line: 1
        column_start: 0
        column_end: 27
        message: Regular expression has `]` without escape.
    corrected: |
      Regexp.#{method}('abc\]123')
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_unescaped_bracket_in_regexp_with_regexp_options_registers_an_offense_and_corrects
    source: |
      Regexp.#{method}('abc]123', 'i')
    offenses:
      - line: 1
        column_start: 0
        column_end: 32
        message: Regular expression has `]` without escape.
    corrected: |
      Regexp.#{method}('abc\]123', 'i')
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_multiple_unescaped_brackets_in_regexp_registers_an_offense_for_each_bracket
    source: |
      Regexp.#{method}('abc]123]')
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Regular expression has `]` without escape.
      - line: 1
        column_start: 0
        column_end: 28
        message: Regular expression has `]` without escape.
    corrected: |
      Regexp.#{method}('abc\]123\]')
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_escaped_bracket_in_regexp_does_not_register_an_offense
    source: |
      Regexp.#{method}('abc\]123')
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_character_class_does_not_register_an_offense
    source: |
      Regexp.#{method}('[abc]')
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_containing_dstr_node_does_not_register_an_offense
    source: |
      Regexp.#{method}("(?:#{arr[1]}:\s*)")
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_invalid_regular_expressions
    source: |
      Regexp.#{method}("#{invalid_regexp}")
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_lint_unescapedbracketinregexp_invalid_regular_expressions
    source: |
      [Regexp.#{method}('#{invalid_regexp}'), Regexp.#{method}('abc]123')]
    offenses:
      - line: 1
        column_start: 0
        column_end: 68
        message: Regular expression has `]` without escape.
    interpolated: true
