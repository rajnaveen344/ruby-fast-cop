cop: Lint/SuppressedException
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_suppressedexception_with_allowcomments_set_to_false_registers_an_offense_for_empty_rescue_block
    source: |
      begin
        something
      rescue
        #do nothing
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 6
        message: Do not suppress exceptions.
    config:
      AllowComments: false

  - name: rubocop_cop_lint_suppressedexception_with_allowcomments_set_to_false_does_not_register_an_offense_for_rescue_with_body
    source: |
      begin
        something
        return
      rescue
        file.close
      end
    offenses:
      []
    config:
      AllowComments: false

