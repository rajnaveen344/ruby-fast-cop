cop = "Lint/ItWithoutArgumentsInBlock"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintitwithoutargumentsinblock_registers_an_offense_when_using_it_without_arguments_in_a_single_line_block"
source = '''
0.times { it }
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 12
message = "`it` calls without arguments will refer to the first block param in Ruby 3.4; use `it()` or `self.it`."

[[tests]]
name = "rubocopcoplintitwithoutargumentsinblock_registers_an_offense_when_using_it_without_arguments_in_a_multiline_block"
source = '''
0.times do
  it
  it = 1
  it
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 4
message = "`it` calls without arguments will refer to the first block param in Ruby 3.4; use `it()` or `self.it`."

