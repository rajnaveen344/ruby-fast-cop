cop = "Lint/MissingCopEnableDirective"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintmissingcopenabledirective_when_the_maximum_range_size_is_infinite_registers_an_offense_when_a_cop_is_disabled_and_never_reenabled"
source = '''
# rubocop:disable Layout/SpaceAroundOperators
x =   0
# Some other code
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 45
message = "Re-enable Layout/SpaceAroundOperators cop with `# rubocop:enable` after disabling it."

[tests.config]
MaximumRangeSize = inf

[tests.config."Layout/SpaceAroundOperators"]
Enabled = true

[[tests]]
name = "rubocopcoplintmissingcopenabledirective_when_the_maximum_range_size_is_infinite_does_not_register_an_offense_when_the_disable_cop_is_reenabled"
source = '''
# rubocop:disable Layout/SpaceAroundOperators
x =   0
# rubocop:enable Layout/SpaceAroundOperators
# Some other code
'''
offenses = []

[tests.config]
MaximumRangeSize = inf

[tests.config."Layout/SpaceAroundOperators"]
Enabled = true

