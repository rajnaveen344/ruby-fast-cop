cop: Lint/ArrayLiteralInRegexp
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_arrayliteralinregexp
    source: |
      /#{%{source}}/
    offenses:
      - line: 1
        column_start: 1
        column_end: 14
        message: Use a character class instead of interpolating an array in a regexp.
    corrected: |
      ‹BASE›0‹/BASE›
      #{correction}
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_arrayliteralinregexp
    source: |
      /#{%{source}}/
    offenses:
      - line: 1
        column_start: 1
        column_end: 14
        message: Use alternation instead of interpolating an array in a regexp.
    corrected: |
      ‹BASE›0‹/BASE›
      #{correction}
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_arrayliteralinregexp
    source: |
      /#{%{source}}/
    offenses:
      - line: 1
        column_start: 1
        column_end: 14
        message: Use alternation or a character class instead of interpolating an array in a regexp.

