cop = "Lint/NextWithoutAccumulator"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintnextwithoutaccumulator_behaves_like_reduceinject_given_a_reduce_block_registers_an_offense_for_a_bare_next"
source = '''
(1..4).reduce(0) do |acc, i|
  next if i.odd?
  acc + i
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Use `next` with an accumulator argument in a `reduce`."

[[tests]]
name = "rubocopcoplintnextwithoutaccumulator_behaves_like_reduceinject_given_a_reduce_block_registers_an_offense_for_a_bare_next_in_the_block_of_safe_navigation_method_called"
source = '''
(1..4)&.reduce(0) do |acc, i|
  next if i.odd?
  acc + i
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Use `next` with an accumulator argument in a `reduce`."

