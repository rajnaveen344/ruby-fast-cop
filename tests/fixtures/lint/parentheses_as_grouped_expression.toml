cop = "Lint/ParenthesesAsGroupedExpression"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintparenthesesasgroupedexpression_registers_an_offense_and_corrects_for_method_call_with_space_before_the_parenthesis"
source = '''
a.func (x)
'''
corrected = '''
a.func(x)
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 7
message = "`(x)` interpreted as grouped expression."

[[tests]]
name = "rubocopcoplintparenthesesasgroupedexpression_registers_an_offense_and_corrects_for_predicate_method_call_with_space_before_the_parenthesis"
source = '''
is? (x)
'''
corrected = '''
is?(x)
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 4
message = "`(x)` interpreted as grouped expression."

[[tests]]
name = "rubocopcoplintparenthesesasgroupedexpression_registers_an_offense_and_corrects_for_method_call_with_space_before_the_parenthesis_when_block_argument_and_parenthesis"
source = '''
a.concat ((1..1).map { |i| i * 10 })
'''
corrected = '''
a.concat((1..1).map { |i| i * 10 })
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 9
message = "`((1..1).map { |i| i * 10 })` interpreted as grouped expression."

[[tests]]
name = "rubocopcoplintparenthesesasgroupedexpression_does_not_register_an_offense_method_call_with_space_before_the_parenthesis_when_block_argument_is_no_parenthesis"
source = '''
a.concat (1..1).map { |i| i * 10 }
'''
offenses = []

