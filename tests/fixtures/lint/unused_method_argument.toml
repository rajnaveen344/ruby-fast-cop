cop = "Lint/UnusedMethodArgument"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_unusedmethodargument_inspection_when_a_method_takes_multiple_arguments_and_an_argument_is_unused_registers_an_offense_and_adds_underscore_prefix"
source = '''
def some_method(foo, bar)
  puts bar
end
'''
corrected = '''
def some_method(_foo, bar)
  puts bar
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 16
column_end = 19
message = "#{message}"

[tests.config]
AllowUnusedKeywordArguments = false
IgnoreEmptyMethods = false
IgnoreNotImplementedMethods = false

