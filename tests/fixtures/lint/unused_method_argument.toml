[[tests]]
name = "rubocopcoplintunusedmethodargument_inspection_when_a_method_takes_multiple_arguments_and_an_argument_is_unused_registers_an_offense_and_adds_underscoreprefix"
source = '''
def some_method(foo, bar)
  puts bar
end
'''
corrected = '''
def some_method(_foo, bar)
  puts bar
end
'''

[[tests.offenses]]
line = 1
column_start = 16
column_end = 19
message = "Unused method argument - `foo`. If it's necessary, use `_` or `_foo` as an argument name to indicate that it won't be used. If it's unnecessary, remove it."

[tests.config]
AllowUnusedKeywordArguments = false
IgnoreEmptyMethods = false
IgnoreNotImplementedMethods = false
NotImplementedExceptions = ["NotImplementedError"]

