cop: Lint/FlipFlop
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_flipflop_registers_an_offense_for_inclusive_flip_flops
    source: |
      DATA.each_line do |line|
      print line if (line =~ /begin/)..(line =~ /end/)
      end
    offenses:
      - line: 2
        column_start: 14
        column_end: 48
        message: Avoid the use of flip-flop operators.

  - name: rubocop_cop_lint_flipflop_registers_an_offense_for_exclusive_flip_flops
    source: |
      DATA.each_line do |line|
      print line if (line =~ /begin/)...(line =~ /end/)
      end
    offenses:
      - line: 2
        column_start: 14
        column_end: 49
        message: Avoid the use of flip-flop operators.
