cop = "Lint/UselessAccessModifier"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintuselessaccessmodifier_when_an_access_modifier_has_no_effect_registers_an_offense_and_corrects"
source = '''
class SomeClass
  def some_method
    puts 10
  end
  private
  def self.some_method
    puts 10
  end
end
'''
corrected = '''
class SomeClass
  def some_method
    puts 10
  end
  def self.some_method
    puts 10
  end
end
'''

[[tests.offenses]]
line = 5
column_start = 2
column_end = 9
message = "Useless `private` access modifier."

[tests.config]
ContextCreatingMethods = []
MethodCreatingMethods = []

