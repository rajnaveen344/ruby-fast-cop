cop = "Lint/DuplicateRegexpCharacterClassElement"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_duplicateregexpcharacterclasselement_with_a_repeated_character_class_element_registers_an_offense_and_corrects"
source = '''
foo = /[xyx]/
'''
corrected = '''
foo = /[xy]/
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 11
message = "Duplicate element inside regexp character class"

