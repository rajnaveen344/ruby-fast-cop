cop = "Lint/UnreachableCode"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_unreachablecode"
source = '''
class Dummy
  def #{t}; end
end

d = Dummy.new
d.instance_eval do
  #{t}
  bar
end

#{t}
bar
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 12
column_start = 0
column_end = 3
message = "Unreachable code detected."

[[tests]]
name = "rubocop_cop_lint_unreachablecode"
source = '''
def foo
  def #{t}; end
end

#{t}
bar
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 6
