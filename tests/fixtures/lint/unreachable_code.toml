cop = "Lint/UnreachableCode"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintunreachablecode_registers_an_offense_for_return_before_other_statements"
source = '''
def something
  array.each do |item|
    return
    bar
  end
end
'''

[[tests.offenses]]
line = 4
column_start = 4
column_end = 7
message = "Unreachable code detected."

[[tests]]
name = "rubocopcoplintunreachablecode_registers_an_offense_for_return_in_begin"
source = '''
def something
  array.each do |item|
    begin
