cop = "Lint/DuplicateHashKey"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintduplicatehashkey_when_there_is_a_duplicated_key_in_the_hash_literal_registers_an_offense"
source = '''
hash = { 'otherkey' => 'value', 'key' => 'value', 'key' => 'hi' }
'''

[[tests.offenses]]
line = 1
column_start = 50
column_end = 55
message = "Duplicated key in hash literal."

[[tests]]
name = "rubocopcoplintduplicatehashkey_when_there_is_a_duplicated_constant_key_in_the_hash_literal_registers_an_offense"
