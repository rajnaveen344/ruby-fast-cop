      - line: 1
        column_start: 10
        column_end: 12
        message: Redundant safe navigation detected, use `.` instead.
      - line: 2
        column_start: 14
        column_end: 16
        message: Redundant safe navigation detected, use `.` instead.
      - line: 3
        column_start: 15
        column_end: 17
        message: Redundant safe navigation detected, use `.` instead.
    corrected: |
      FOO::Const.do_something
      bar::ConstName.do_something
      BAZ::Const_name.do_something # It is treated as camel case, similar to the `Naming/ConstantName` cop.
    config:
      AdditionalNilMethods: [present?]
      AllowedMethods: [respond_to?]

