cop: Lint/RedundantSafeNavigation
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_redundantsafenavigation_registers_an_offense_and_corrects_when_is_used_for_camel_case_const_receiver
    source: |
      Const&.do_something
      ConstName&.do_something
      Const_name&.do_something # It is treated as camel case, similar to the `Naming/ConstantName` cop.
    offenses:
      - line: 1
        column_start: 5
        column_end: 7
        message: Redundant safe navigation detected, use `.` instead.
      - line: 2
        column_start: 9
        column_end: 11
        message: Redundant safe navigation detected, use `.` instead.
      - line: 3
        column_start: 10
        column_end: 12
        message: Redundant safe navigation detected, use `.` instead.
    corrected: |
      Const.do_something
      ConstName.do_something
      Const_name.do_something # It is treated as camel case, similar to the `Naming/ConstantName` cop.
    config:
      AdditionalNilMethods: [present?]
      AllowedMethods: [respond_to?]

  - name: rubocop_cop_lint_redundantsafenavigation_does_not_register_an_offense_when_is_used_for_snake_case_const_receiver
    source: |
      CONST&.do_something
      CONST_NAME&.do_something
    offenses:
      []
    config:
      AdditionalNilMethods: [present?]
      AllowedMethods: [respond_to?]

