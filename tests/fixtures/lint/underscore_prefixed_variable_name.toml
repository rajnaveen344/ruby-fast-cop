cop = "Lint/UnderscorePrefixedVariableName"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintunderscoreprefixedvariablename_when_an_underscoreprefixed_variable_is_used_registers_an_offense"
source = '''
def some_method
  _foo = 1
  puts _foo
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 6
message = "Do not use prefix `_` for a variable that is used."

[tests.config]
AllowKeywordBlockArguments = false

[[tests]]
name = "rubocopcoplintunderscoreprefixedvariablename_when_nonunderscoreprefixed_variable_is_used_does_not_register_an_offense"
source = '''
def some_method
  foo = 1
  puts foo
end
'''
offenses = []

[tests.config]
AllowKeywordBlockArguments = false

