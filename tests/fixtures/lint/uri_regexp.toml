cop = "Lint/UriRegexp"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_uriregexp_does_not_register_an_offense_when_using_regexp_without_receiver"
source = '''
regexp('http://example.com')
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_uriregexp_does_not_register_an_offense_when_using_regexp_with_variable_receiver"
source = '''
m.regexp('http://example.com')
'''
offenses = []

[[tests]]
name = "rubocop_cop_lint_uriregexp_ruby_3_3_registers_an_offense_and_corrects_using_uri_regexp_with_argument"
source = '''
URI.regexp('http://example.com')
'''
corrected = '''
URI::DEFAULT_PARSER.make_regexp('http://example.com')
'''
ruby_version = ">= 3.3"

[[tests.offenses]]
line = 1
column_start = 4
column_end = 10
message = "`URI.regexp('http://example.com')` is obsolete and should not be used. Instead, use `URI::DEFAULT_PARSER.make_regexp('http://example.com')`."

