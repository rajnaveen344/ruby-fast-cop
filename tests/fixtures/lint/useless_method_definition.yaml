cop: Lint/UselessMethodDefinition
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_uselessmethoddefinition_does_not_register_an_offense_for_empty_constructor
    source: |
      class Foo
        def initialize(arg1, arg2)
        end
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessmethoddefinition_does_not_register_an_offense_for_constructor_with_only_comments
    source: |
      def initialize(arg)
        # Comment.
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessmethoddefinition_does_not_register_an_offense_for_constructor_containing_additional_code_to_super
    source: |
      def initialize(arg)
        super
        do_something
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessmethoddefinition_does_not_register_an_offense_for_empty_class_level_initialize_method
    source: |
      def self.initialize
      end
    offenses:
      []

  - name: rubocop_cop_lint_uselessmethoddefinition_registers_an_offense_and_corrects_for_method_containing_only_super_call
    source: |
      class Foo
        def useful_instance_method
          do_something
        end
      
        def instance_method
          super
        end
      
        def instance_method_with_args(arg)
          super(arg)
        end
      
        def self.useful_class_method
          do_something
        end
      
        def self.class_method
          super
        end
      
        def self.class_method_with_args(arg)
          super(arg)
        end
      
        class << self
          def self.other_useful_class_method
            do_something
          end
      
          def other_class_method
            super
          end
      
          def other_class_method_with_parens
            super()
          end
      
          def other_class_method_with_args(arg)
            super(arg)
          end
        end
      end
    offenses:
      - line: 6
        column_start: 2
        column_end: 21
        message: Useless method definition detected.
      - line: 10
        column_start: 2
        column_end: 36
        message: Useless method definition detected.
      - line: 18
        column_start: 2
        column_end: 23
        message: Useless method definition detected.
      - line: 22
        column_start: 2
        column_end: 38
        message: Useless method definition detected.
      - line: 31
        column_start: 4
        column_end: 26
        message: Useless method definition detected.
      - line: 35
        column_start: 4
        column_end: 38
        message: Useless method definition detected.
      - line: 39
        column_start: 4
        column_end: 41
        message: Useless method definition detected.
    corrected: |
      class Foo
        def useful_instance_method
          do_something
        end
      
       #{trailing_whitespace}
      
       #{trailing_whitespace}
      
        def self.useful_class_method
          do_something
        end
      
       #{trailing_whitespace}
      
       #{trailing_whitespace}
      
        class << self
          def self.other_useful_class_method
            do_something
          end
      
         #{trailing_whitespace}
      
         #{trailing_whitespace}
      
         #{trailing_whitespace}
        end
      end
    interpolated: true
    verified: false

