[[tests]]
name = "rubocopcoplintpercentsymbolarray_detecting_colons_or_commas_in_a_ii_string_accepts_tokens_without_colons_or_commas"
strip_trailing_newline = true
source = '''
%i(foo bar baz)
'''
offenses = []

[[tests]]
name = "rubocopcoplintpercentsymbolarray_detecting_colons_or_commas_in_a_ii_string_accepts_likely_false_positive_"
