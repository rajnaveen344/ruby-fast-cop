[[tests]]
name = "rubocopcoplintpercentsymbolarray_detecting_colons_or_commas_in_a_ii_string_registers_an_offense_and_corrects_when_symbols_contain_colons_and_are_comma_separated"
source = '''
%i(:foo, :bar, :baz)
'''
corrected = '''
%i(foo bar baz)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Within `%i`/`%I`, ':' and ',' are unnecessary and may be unwanted in the resulting symbols."

