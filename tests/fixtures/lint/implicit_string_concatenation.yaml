cop: Lint/ImplicitStringConcatenation
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_implicitstringconcatenation_on_a_single_string_literal_does_not_register_an_offense
    source: |
      abc
    offenses:
      []

  - name: rubocop_cop_lint_implicitstringconcatenation_on_adjacent_string_literals_on_the_same_line_registers_an_offense
    source: |
      class A; "abc" "def"; end
      class B; 'ghi' 'jkl'; end
    offenses:
      - line: 1
        column_start: 9
        column_end: 20
        message: "Combine \"abc\" and \"def\" into a single string literal, rather than using implicit string concatenation."
      - line: 2
        column_start: 9
        column_end: 20
        message: "Combine 'ghi' and 'jkl' into a single string literal, rather than using implicit string concatenation."
    corrected: |
      class A; "abc" + "def"; end
      class B; 'ghi' + 'jkl'; end

  - name: rubocop_cop_lint_implicitstringconcatenation_on_adjacent_string_interpolation_literals_on_the_same_line_registers_an_offense
    source: |
      "string#{interpolation}" "def"
    offenses:
      - line: 1
        column_start: 0
        column_end: 30
        message: "Combine \"string#{interpolation}\" and \"def\" into a single string literal, rather than using implicit string concatenation."
    corrected: |
      "string#{interpolation}" + "def"

  - name: rubocop_cop_lint_implicitstringconcatenation_on_adjacent_string_interpolation_literals_on_the_same_line_with_multiple_concatenations_registers_an_offense
    source: |
      "foo""string#{interpolation}""bar"
    offenses:
      - line: 1
        column_start: 5
        column_end: 34
        message: "Combine \"string#{interpolation}\" and \"bar\" into a single string literal, rather than using implicit string concatenation."
      - line: 1
        column_start: 0
        column_end: 29
        message: "Combine \"foo\" and \"string#{interpolation}\" into a single string literal, rather than using implicit string concatenation."
    corrected: |
      "foo" + "string#{interpolation}" + "bar"

  - name: rubocop_cop_lint_implicitstringconcatenation_on_adjacent_string_literals_with_triple_quotes_registers_an_offense
    source: |
      """string"""
    offenses:
      - line: 1
        column_start: 2
        column_end: 12
        message: "Combine \"string\" and \"\" into a single string literal, rather than using implicit string concatenation."
      - line: 1
        column_start: 0
        column_end: 10
        message: "Combine \"\" and \"string\" into a single string literal, rather than using implicit string concatenation."
    corrected: |
      "string"

  - name: rubocop_cop_lint_implicitstringconcatenation_on_adjacent_string_literals_on_different_lines_does_not_register_an_offense
    source: |
      array = [
        'abc'\
        'def'
      ]
    offenses:
      []

  - name: rubocop_cop_lint_implicitstringconcatenation_when_implicitly_concatenating_a_string_literal_with_a_line_break_and_string_interpolation_registers_an_offense
    source: |
      'single-quoted string'"string
      #{interpolation}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 29
        message: "Combine 'single-quoted string' and \"string\\n\" into a single string literal, rather than using implicit string concatenation."
    corrected: |
      'single-quoted string' + "string
      #{interpolation}"

  - name: rubocop_cop_lint_implicitstringconcatenation_when_the_string_literals_contain_newlines_registers_an_offense
    source: |
      def method
        "ab
      c" "de
      f"
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: 'Combine "ab\nc" and "de\nf" into a single string literal, [...]'
    corrected: |
      def method
        "ab
      c" + "de
      f"
      end

  - name: rubocop_cop_lint_implicitstringconcatenation_when_the_string_literals_contain_newlines_does_not_register_an_offense_for_a_single_string
    source: |
      'abc
      def'
    offenses:
      []

  - name: rubocop_cop_lint_implicitstringconcatenation_on_a_string_with_interpolations_does_register_an_offense
    source: |
      array = ["abc#{something}def#{something_else}"]
    offenses:
      []

  - name: rubocop_cop_lint_implicitstringconcatenation_when_inside_an_array_notes_that_the_strings_could_be_separated_by_a_comma_instead
    source: |
      array = ["abc" "def"]
    offenses:
      - line: 1
        column_start: 9
        column_end: 20
        message: "Combine \"abc\" and \"def\" into a single string literal, rather than using implicit string concatenation. Or, if they were intended to be separate array elements, separate them with a comma."
    corrected: |
      array = ["abc" + "def"]

  - name: rubocop_cop_lint_implicitstringconcatenation_when_in_a_method_call_s_argument_list_notes_that_the_strings_could_be_separated_by_a_comma_instead
    source: |
      method("abc" "def")
    offenses:
      - line: 1
        column_start: 7
        column_end: 18
        message: "Combine \"abc\" and \"def\" into a single string literal, rather than using implicit string concatenation. Or, if they were intended to be separate method arguments, separate them with a comma."
    corrected: |
      method("abc" + "def")
