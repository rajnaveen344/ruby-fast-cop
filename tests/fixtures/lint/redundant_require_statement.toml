cop = "Lint/RedundantRequireStatement"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintredundantrequirestatement_registers_an_offense_when_using_requiring_enumerator"
source = '''
require 'enumerator'
require 'uri'
'''
corrected = '''
require 'uri'
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 20
message = "Remove unnecessary `require` statement."

