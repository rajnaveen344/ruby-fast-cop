cop: Lint/EmptyFile
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_emptyfile_does_not_register_an_offense_when_the_file_contains_code
    source: |
      foo.bar
    offenses:
      []
    config:
      AllowComments: true

  - name: rubocop_cop_lint_emptyfile_does_not_register_an_offense_when_the_file_contains_comments
    source: |
      # comment
    offenses:
      []
    config:
      AllowComments: true
