cop = "Lint/LambdaWithoutLiteralBlock"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintlambdawithoutliteralblock_registers_and_corrects_an_offense_when_using_lambda_with_proc__block_argument"
source = '''
lambda(&proc { do_something })
'''
corrected = '''
proc { do_something }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 30
message = "lambda without a literal block is deprecated; use the proc without lambda instead."

