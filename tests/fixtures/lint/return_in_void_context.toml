cop = "Lint/ReturnInVoidContext"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintreturninvoidcontext_with_an_initialize_method_containing_a_return_with_a_value_registers_an_offense"
source = '''
class A
  def initialize
    return :qux if bar?
  end
end
'''

[[tests.offenses]]
line = 3
column_start = 4
column_end = 10
message = "Do not return a value in `initialize`."

[[tests]]
name = "rubocopcoplintreturninvoidcontext_with_an_initialize_method_containing_a_return_with_a_value_registers_an_offense_when_the_value_is_returned_in_a_block"
source = '''
