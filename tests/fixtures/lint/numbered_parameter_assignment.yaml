cop: Lint/NumberedParameterAssignment
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_numberedparameterassignment_when_ruby_2_7_or_lower
    source: |
      _#{number} = :value
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: "`_#{number}` is reserved for numbered parameter; consider another name."
    ruby_version: ">= 2.7"
    interpolated: true
    verified: false

  - name: rubocop_cop_lint_numberedparameterassignment_registers_an_offense_when_using_0_lvar
    source: |
      _0 = :value
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: "`_0` is similar to numbered parameter; consider another name."

  - name: rubocop_cop_lint_numberedparameterassignment_registers_an_offense_when_using_10_lvar
    source: |
      _10 = :value
    offenses:
      - line: 1
        column_start: 0
        column_end: 12
        message: "`_10` is similar to numbered parameter; consider another name."

  - name: rubocop_cop_lint_numberedparameterassignment_does_not_register_an_offense_when_using_non_numbered_parameter
    source: |
      non_numbered_parameter_name = :value
    offenses:
      []

  - name: rubocop_cop_lint_numberedparameterassignment_does_not_register_an_offense_when_index_assignment
    source: |
      Hash.new { _1[_2] = :value }
    offenses:
      []
