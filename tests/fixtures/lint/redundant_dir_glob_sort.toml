cop = "Lint/RedundantDirGlobSort"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplintredundantdirglobsort_does_not_register_an_offense_when_not_using_sort_for_dir"
source = '''
Dir['./lib/**/*.rb'].each do |file|
end
'''
offenses = []

[[tests]]
name = "rubocopcoplintredundantdirglobsort_does_not_register_an_offense_when_using_sort_without_a_receiver"
source = '''
sort.do_something
'''
offenses = []

[[tests]]
name = "rubocopcoplintredundantdirglobsort_when_ruby_30_or_higher_registers_an_offense_and_correction_when_using_dirglobsort"
ruby_version = ">= 3.0"
source = '''
Dir.glob(Rails.root.join('test', '*.rb')).sort.each(&method(:require))
'''
corrected = '''
Dir.glob(Rails.root.join('test', '*.rb')).each(&method(:require))
'''

[[tests.offenses]]
line = 1
column_start = 42
column_end = 46
message = "Remove redundant `sort`."

