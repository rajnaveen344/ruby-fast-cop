cop = "Lint/SharedMutableDefault"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintsharedmutabledefault_when_line_is_unrelated_does_not_register_an_offense"
source = '''
[]
{}
Array.new
Hash.new
Hash.new { |h, k| h[k] = [] }
Hash.new { |h, k| h[k] = {} }
Hash.new { 0 }
Hash.new { Array.new }
Hash.new { Hash.new }
Hash.new { {} }
Hash.new { [] }
Hash.new(0)
Hash.new(false)
Hash.new(true)
Hash.new(nil)
Hash.new(BigDecimal(0))
Hash.new(BigDecimal(0.0))
Hash.new(0.0)
Hash.new(0.0.to_d)
'''
offenses = []

