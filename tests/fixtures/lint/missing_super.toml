cop = "Lint/MissingSuper"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcoplintmissingsuper_constructor_registers_an_offense_and_does_not_autocorrect_when_no_super_call"
source = '''
class Child < Parent
  def initialize
  end
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 16
message = "Call `super` to initialize state of the parent class."

[tests.config]
AllowedParentClasses = []

