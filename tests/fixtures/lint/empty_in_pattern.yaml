cop: Lint/EmptyInPattern
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_a_missing_in_body
    source: |
      case foo
      in [a] then 1
      in [a, b] # nothing
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_missing_in_body_followed_by_else
    source: |
      case foo
      in [a] then 1
      in [a, b] # nothing
      else 3
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_missing_in_then_body
    source: |
      case foo
      in [a] then 1
      in [a, b] then # nothing
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_missing_in_then_body_followed_by_else
    source: |
      case foo
      in [a] then 1
      in [a, b] then # nothing
      else 3
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_missing_in_body_with_a_comment
    source: |
      case foo
      in [a]
        1
      in [a, b]
        # nothing
      end
    offenses:
      - line: 4
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_missing_registers_an_offense_for_missing_in_body_with_a_comment_followed_by_else
    source: |
      case foo
      in [a]
        1
      in [a, b]
        # nothing
      else
        3
      end
    offenses:
      - line: 4
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_present_accepts_case_with_in_then_statements
    source: |
      case foo
      in [a] then 1
      in [a, b] then 2
      end
    offenses:
      []
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_present_accepts_case_with_in_then_statements_and_else_clause
    source: |
      case foo
      in [a] then 1
      in [a, b] then 2
      else 3
      end
    offenses:
      []
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_present_accepts_case_with_in_bodies
    source: |
      case foo
      in [a]
        1
      in [a, b]
        2
      end
    offenses:
      []
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_a_in_body_is_present_accepts_case_with_in_bodies_and_else_clause
    source: |
      case foo
      in [a]
        1
      in [a, b]
        2
      else
        3
      end
    offenses:
      []
    config:
      AllowComments: false
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_allowcomments_true_registers_an_offense_for_empty_in_when_comment_is_in_another_branch
    source: |
      case condition
      in [a]
      in [a, b]
        # do nothing
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 6
        message: Avoid `in` branches without a body.
    config:
      AllowComments: true
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_allowcomments_true_accepts_an_empty_in_body_with_a_comment
    source: |
      case condition
      in [a]
        do_something
      in [a, b]
        # do nothing
      end
    offenses:
      []
    config:
      AllowComments: true
    ruby_version: ">= 2.7"

  - name: rubocop_cop_lint_emptyinpattern_when_allowcomments_false_registers_an_offense_for_empty_in_body_with_a_comment
    source: |
      case condition
      in [a]
        do_something
      in [a, b]
        # do nothing
      end
    offenses:
      - line: 4
        column_start: 0
        column_end: 9
        message: Avoid `in` branches without a body.
    config:
      AllowComments: false
    ruby_version: ">= 2.7"
