[[tests]]
name = "rubocopcoplintassignmentincondition_registers_an_offense_for_lvar_assignment_in_condition"
source = '''
if test = 10
end
'''
corrected = '''
if (test = 10)
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 9
message = "Use `==` if you meant to do a comparison or wrap the expression in parentheses to indicate you meant to assign in a condition."

[tests.config]
AllowSafeAssignment = true

