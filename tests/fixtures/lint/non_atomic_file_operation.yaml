cop: Lint/NonAtomicFileOperation
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_nonatomicfileoperation_registers_an_offense_when_use_filetest_exist_before_creating_file
    source: |
      unless FileTest.exist?(path)
        FileUtils.mkdir(path)
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Remove unnecessary existence check `FileTest.exist?`.
      - line: 2
        column_start: 2
        column_end: 23
        message: Use atomic file operation method `FileUtils.mkdir_p`.
    corrected: |
      
      #{trailing_whitespace}#{trailing_whitespace}FileUtils.mkdir_p(path)
    interpolated: true

