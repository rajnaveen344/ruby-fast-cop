cop = "Lint/UselessNumericOperation"
department = "lint"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_lint_uselessnumericoperation_registers_an_offense_when_0_is_added_to_a_variable"
source = '''
x + 0
'''
corrected = '''
x
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Do not apply inconsequential numeric operations to variables."

