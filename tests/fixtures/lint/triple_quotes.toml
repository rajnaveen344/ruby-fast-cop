cop = "Lint/TripleQuotes"
department = "lint"
severity = "warning"
implemented = true

[[tests]]
name = "rubocopcoplinttriplequotes_does_not_register_an_offense_for_implicit_concatenation"
source = "'' ''\n'a''b''c'\n'a''''b'"
offenses = []

[[tests]]
name = "rubocopcoplinttriplequotes_triple_quotes_on_one_line_registers_an_offense_and_corrects"
source = '''
"""a string"""
'''
corrected = '''
"a string"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 14
message = "Delimiting a string with multiple quotes has no effect, use a single quote instead."

[[tests]]
name = "rubocopcoplinttriplequotes_triple_quotes_on_multiple_lines_registers_an_offense_and_corrects"
source = '''
"""
  a string
"""
'''
corrected = '''
"
  a string
"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Delimiting a string with multiple quotes has no effect, use a single quote instead."

[[tests]]
name = "rubocopcoplinttriplequotes_triple_quotes_when_only_quotes_registers_an_offense_and_corrects_to_a_single_empty_quote"
source = '''
""""""
'''
corrected = '''
""
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 6
message = "Delimiting a string with multiple quotes has no effect, use a single quote instead."

[[tests]]
name = "rubocopcoplinttriplequotes_triple_quotes_with_only_whitespace_does_not_register"
source = '''
" " " " " "
'''
offenses = []

[[tests]]
name = "rubocopcoplinttriplequotes_quintuple_quotes_registers_an_offense_and_corrects"
source = '''
"""""
  a string
"""""
'''
corrected = '''
"
  a string
"
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 5
message = "Delimiting a string with multiple quotes has no effect, use a single quote instead."

[[tests]]
name = "rubocopcoplinttriplequotes_string_interpolation_does_not_register_an_offense"
source = '''
str = "#{abc}"
'''
offenses = []

[[tests]]
name = "rubocopcoplinttriplequotes_string_interpolation_with_nested_extra_quotes_registers_an_offense_and_corrects"
strip_trailing_newline = true
source = "str = \"#{'''abc'''}\""
corrected = '''
str = "#{'abc'}"
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 18
message = "Delimiting a string with multiple quotes has no effect, use a single quote instead."

[[tests]]
name = "rubocopcoplinttriplequotes_heredocs_does_not_register_an_offense"
source = '''
str = <<~STRING
  a string
  #{interpolation}
STRING
'''
offenses = []
