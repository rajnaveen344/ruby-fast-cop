cop: Lint/LiteralInInterpolation
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_literalininterpolation_accepts_empty_interpolation
    source: |
      "this is #{a} silly"
    offenses:
      []

  - name: rubocop_cop_lint_literalininterpolation_accepts_interpolation_of_xstr
    source: |
      "this is #{`a`} silly"
    offenses:
      []

  - name: rubocop_cop_lint_literalininterpolation_accepts_interpolation_of_irange_where_endpoints_are_not_literals
    source: |
      "this is an irange: #{var1..var2}"
    offenses:
      []

  - name: rubocop_cop_lint_literalininterpolation_accepts_interpolation_of_erange_where_endpoints_are_not_literals
    source: |
      "this is an erange: #{var1...var2}"
    offenses:
      []

  - name: rubocop_cop_lint_literalininterpolation
    source: |
      "this is the #{%{literal}}"
    offenses:
      - line: 1
        column_start: 15
        column_end: 27
        message: Literal interpolation detected.
    corrected: |
      "this is the #{expected}"
    interpolated: true

  - name: rubocop_cop_lint_literalininterpolation
    source: |
      "this is the #{%{literal}} literally"
    offenses:
      - line: 1
        column_start: 15
        column_end: 37
        message: Literal interpolation detected.
    corrected: |
      "this is the #{expected} literally"
    interpolated: true

  - name: rubocop_cop_lint_literalininterpolation
    source: |
      "some #{%{literal}} with #{%{literal}} too"
    offenses:
      - line: 1
        column_start: 8
        column_end: 43
        message: Literal interpolation detected.
      - line: 1
        column_start: 0
        column_end: 43
        message: Literal interpolation detected.
    corrected: |
      "some #{expected} with #{expected} too"
    interpolated: true

  - name: rubocop_cop_lint_literalininterpolation_when_there_is_non_literal_and_literal_interpolation_when_literal_interpolation_is_before_non_literal_only_removes_interpolation_around_literal
    source: |
      "this is #{%{literal}} with #{a} now"
    offenses:
      - line: 1
        column_start: 11
        column_end: 37
        message: Literal interpolation detected.
    corrected: |
      "this is #{expected} with #{a} now"
    interpolated: true

  - name: rubocop_cop_lint_literalininterpolation_when_there_is_non_literal_and_literal_interpolation_when_literal_interpolation_is_after_non_literal_only_removes_interpolation_around_literal
    source: |
      "this is #{a} with #{%{literal}} now"
    offenses:
      - line: 1
        column_start: 21
        column_end: 37
        message: Literal interpolation detected.
    corrected: |
      "this is #{a} with #{expected} now"
    interpolated: true

  - name: rubocop_cop_lint_literalininterpolation
    source: |
      "this is the #{%{literal};%{literal}}"
    offenses:
      - line: 1
        column_start: 0
        column_end: 38
        message: Literal interpolation detected.

