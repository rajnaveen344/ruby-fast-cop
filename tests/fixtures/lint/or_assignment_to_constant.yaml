cop: Lint/OrAssignmentToConstant
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_orassignmenttoconstant_registers_an_offense_with_or_assignment_to_a_constant
    source: |
      CONST ||= 1
    offenses:
      - line: 1
        column_start: 6
        column_end: 9
        message: Avoid using or-assignment with constants.
    corrected: |
      CONST = 1

  - name: rubocop_cop_lint_orassignmenttoconstant_registers_an_offense_with_or_assignment_to_a_constant_in_method_definition
    source: |
      def foo
        M::CONST ||= 1
      end
    offenses:
      - line: 2
        column_start: 11
        column_end: 14
        message: Avoid using or-assignment with constants.

  - name: rubocop_cop_lint_orassignmenttoconstant_registers_an_offense_with_or_assignment_to_a_constant_in_singleton_method_definition
    source: |
      def self.foo
        M::CONST ||= 1
      end
    offenses:
      - line: 2
        column_start: 11
        column_end: 14
        message: Avoid using or-assignment with constants.

  - name: rubocop_cop_lint_orassignmenttoconstant_registers_an_offense_with_or_assignment_to_a_constant_in_method_definition_using_define_method
    source: |
      define_method :foo do
        M::CONST ||= 1
      end
    offenses:
      - line: 2
        column_start: 11
        column_end: 14
        message: Avoid using or-assignment with constants.
    corrected: |
      define_method :foo do
        M::CONST = 1
      end

  - name: rubocop_cop_lint_orassignmenttoconstant_does_not_register_an_offense_with_plain_assignment_to_a_constant
    source: |
      CONST = 1
    offenses:
      []

  - name: rubocop_cop_lint_orassignmenttoconstant
    source: |
      ‹BASE›0‹/BASE›
      #{var} ||= 1
    offenses:
      []
    interpolated: true
    verified: false
