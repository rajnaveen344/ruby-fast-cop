cop: Lint/IneffectiveAccessModifier
department: lint
severity: warning
implemented: false

tests:
  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_private_is_applied_to_a_class_method_registers_an_offense
    source: |
      class C
        private
      
        def self.method
          puts "hi"
        end
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 5
        message: "`private` (on line 2) does not make singleton methods private. Use `private_class_method` or `private` inside a `class << self` block instead."

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_protected_is_applied_to_a_class_method_registers_an_offense
    source: |
      class C
        protected
      
        def self.method
          puts "hi"
        end
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 5
        message: "`protected` (on line 2) does not make singleton methods protected. Use `protected` inside a `class << self` block instead."

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_private_class_method_is_used_when_private_class_method_contains_all_private_method_names_doesn_t_register_an_offense
    source: |
      class C
        private
      
        def self.method
          puts "hi"
        end
      
        private_class_method :method
      end
    offenses:
      []

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_private_class_method_is_used_when_private_class_method_does_not_contain_the_method_registers_an_offense
    source: |
      class C
        private
      
        def self.method2
          puts "hi"
        end
      
        private_class_method :method
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 5
        message: "`private` (on line 2) does not make singleton methods private. Use `private_class_method` or `private` inside a `class << self` block instead."

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_no_access_modifier_is_used_doesn_t_register_an_offense
    source: |
      class C
        def self.method
          puts "hi"
        end
      
        def self.method2
          puts "hi"
        end
      end
    offenses:
      []

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_a_class_self_block_is_used_doesn_t_register_an_offense
    source: |
      class C
        private
      
        class << self
          def self.method
            puts "hi"
          end
        end
      end
    offenses:
      []

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_there_is_an_intervening_instance_method_still_registers_an_offense
    source: |
      class C
      
        private
      
        def instance_method
        end
      
        def self.method
          puts "hi"
        end
      end
    offenses:
      - line: 8
        column_start: 2
        column_end: 5
        message: "`private` (on line 3) does not make singleton methods private. Use `private_class_method` or `private` inside a `class << self` block instead."

  - name: rubocop_cop_lint_ineffectiveaccessmodifier_when_there_is_begin_before_a_method_definition_does_not_register_an_offense
    source: |
      class C
        begin
        end
      
        def do_something
        end
      end
    offenses:
      []
