cop: Layout/FirstHashElementLineBreak
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_firsthashelementlinebreak_registers_an_offense_and_corrects_elements_listed_on_the_first_line
    source: |
      a = { a: 1,
            b: 2 }
    offenses:
      - line: 1
        column_start: 6
        column_end: 10
        message: Add a line break before the first element of a multi-line hash.
    corrected: |
      a = {#{trailing_whitespace}
      a: 1,
            b: 2 }
    interpolated: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_registers_an_offense_and_corrects_hash_nested_in_a_method_call
    source: |
      method({ foo: 1,
               bar: 2 })
    offenses:
      - line: 1
        column_start: 9
        column_end: 15
        message: Add a line break before the first element of a multi-line hash.
    corrected: |
      method({#{trailing_whitespace}
      foo: 1,
               bar: 2 })
    interpolated: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_registers_an_offense_and_corrects_single_element_multi_line_hash
    source: |
      { foo: {
        bar: 2,
      } }
    offenses:
      - line: 1
        column_start: 2
        column_end: 8
        message: Add a line break before the first element of a multi-line hash.
    corrected: |
      {#{trailing_whitespace}
      foo: {
        bar: 2,
      } }
    interpolated: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_ignores_implicit_hashes_in_method_calls_with_parens
    source: |
      method(
        foo: 1,
        bar: 2)
    offenses:
      []

  - name: rubocop_cop_layout_firsthashelementlinebreak_ignores_implicit_hashes_in_method_calls_without_parens
    source: |
      method foo: 1,
       bar: 2
    offenses:
      []

  - name: rubocop_cop_layout_firsthashelementlinebreak_ignores_implicit_hashes_in_method_calls_that_are_improperly_formatted
    source: |
      method(foo: 1,
        bar: 2)
    offenses:
      []

  - name: rubocop_cop_layout_firsthashelementlinebreak_ignores_elements_listed_on_a_single_line
    source: |
      b = {
        a: 1,
        b: 2 }
    offenses:
      []

  - name: rubocop_cop_layout_firsthashelementlinebreak_last_element_can_be_multiline_ignores_last_argument_that_is_a_multiline_hash
    source: |
      h = {a: b, c: {
        d: e
      }}
    offenses:
      []
    config:
      AllowMultilineFinalElement: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_last_element_can_be_multiline_ignores_single_value_that_is_a_multiline_hash
    source: |
      h = {a: {
        b: c
      }}
    offenses:
      []
    config:
      AllowMultilineFinalElement: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_last_element_can_be_multiline_registers_and_corrects_values_that_are_multiline_hashes_and_not_the_last_value
    source: |
      h = {a: b, c: {
        d: e,
      }, f: g}
    offenses:
      - line: 1
        column_start: 5
        column_end: 9
        message: Add a line break before the first element of a multi-line hash.
    corrected: |
      h = {
      a: b, c: {
        d: e,
      }, f: g}
    config:
      AllowMultilineFinalElement: true

  - name: rubocop_cop_layout_firsthashelementlinebreak_last_element_can_be_multiline_registers_and_corrects_last_value_that_starts_on_another_line
    source: |
      h = {a: b, c: d,
      e: f}
    offenses:
      - line: 1
        column_start: 5
        column_end: 9
        message: Add a line break before the first element of a multi-line hash.
    corrected: |
      h = {
      a: b, c: d,
      e: f}
    config:
      AllowMultilineFinalElement: true
