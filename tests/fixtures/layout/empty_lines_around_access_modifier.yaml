cop: Layout/EmptyLinesAroundAccessModifier
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinesaroundaccessmodifier_enforcedstyle_is_around
    source: |
      class Test
        something
        #{access_modifier}
      
        def test; end
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 20
        message: "Keep a blank line before and after `#{access_modifier}`."
    corrected: |
      class Test
        something
      
        #{access_modifier}
      
        def test; end
      end
    config:
      EnforcedStyle: around
    interpolated: true

