column_end = 3
message = "Indent the right brace the same as the left brace."

[tests.config]
EnforcedStyle = "align_braces"

[[tests]]
name = "rubocopcoplayoutfirsthashelementindentation_when_enforcedstyle_is_align_braces_registers_an_offense_for_incorrectly_indented_hash_that_is_the_value_of_a_single_pair_hash"
