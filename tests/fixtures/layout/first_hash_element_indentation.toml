        a: 1, b: 2 }
'''
corrected = '''
func x: {
          a: 1, b: 2 }
'''

[[tests.offenses]]
line = 2
column_start = 8
column_end = 12
message = "Use 2 spaces for indentation in a hash, relative to the position of the opening brace."

[tests.config]
EnforcedStyle = "align_braces"

