      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidestringinterpolation_when_enforcedstyle_is_no_space_for_well_formatted_string_interpolations_accepts_excess_literal_spacing
    source: |
      "Variable is    #{var}      "
      "  Variable is  #{var}"
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidestringinterpolation_when_enforcedstyle_is_no_space_accepts_empty_interpolation
    source: |
      "#{}"
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidestringinterpolation_when_enforcedstyle_is_no_space_when_interpolation_starts_or_ends_with_a_line_break_does_not_register_an_offense
