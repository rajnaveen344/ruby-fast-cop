cop = "Layout/SpaceAfterColon"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_registers_an_offense_and_corrects_colon_without_space_after_it"
source = '''
{a:3}
'''
corrected = '''
{a: 3}
'''

[[tests.offenses]]
line = 1
column_start = 2
column_end = 3
message = "Space missing after colon."

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_colons_in_symbols"
strip_trailing_newline = true
source = '''
x = :a
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_colon_in_ternary_followed_by_space"
strip_trailing_newline = true
source = '''
x = w ? a : b
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_hashes_with_a_space_after_colons"
strip_trailing_newline = true
source = '''
{a: 3}
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_hash_rockets"
strip_trailing_newline = true
source = '''
x = {"a"=>1}
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_if"
source = '''
x = if w
      a
    end
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_colons_in_strings"
strip_trailing_newline = true
source = '''
str << ':'
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_required_keyword_arguments"
source = '''
def f(x:, y:)
end
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_accepts_colons_denoting_required_keyword_argument"
source = '''
def initialize(table:, nodes:)
end
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_registers_an_offense_and_corrects_a_keyword_optional_argument_without_a_space"
source = '''
def m(var:1, other_var: 2)
end
'''
corrected = '''
def m(var: 1, other_var: 2)
end
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 10
message = "Space missing after colon."

[[tests]]
name = "rubocopcoplayoutspaceaftercolon_ruby__31_does_not_register_an_offense_colon_without_space_after_it_when_using_hash_value_omission"
