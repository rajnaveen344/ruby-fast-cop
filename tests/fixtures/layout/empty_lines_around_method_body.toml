cop = "Layout/EmptyLinesAroundMethodBody"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutemptylinesaroundmethodbody_registers_an_offense_for_method_body_starting_with_a_blank"
source = '''
def some_method

  do_something
end
'''
corrected = '''
def some_method
  do_something
end
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 1
message = "{} Extra empty line detected at method body beginning."

