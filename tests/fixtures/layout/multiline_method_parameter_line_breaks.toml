cop = "Layout/MultilineMethodParameterLineBreaks"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilinemethodparameterlinebreaks_when_one_parameter_on_same_line_does_not_add_any_offenses"
source = '''
def taz(abc)
end
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinemethodparameterlinebreaks_when_there_are_no_parameters_does_not_add_any_offenses"
source = '''
def taz
end
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinemethodparameterlinebreaks_when_two_parameters_are_on_next_line_does_not_add_any_offenses"
source = '''
def taz(
  foo, bar
)
end
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinemethodparameterlinebreaks_when_many_parameter_are_on_multiple_lines_two_on_same_line_registers_an_offense_and_corrects"
source = '''
def taz(abc,
foo, bar,
baz
)
end
'''
corrected = '''
def taz(abc,
foo, 
bar,
baz
)
end
'''

[[tests.offenses]]
line = 2
column_start = 5
column_end = 8
message = "Each parameter in a multi-line method definition must start on a separate line."

[tests.config]
AllowMultilineFinalElement = false

