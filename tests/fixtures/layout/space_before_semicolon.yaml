cop: Layout/SpaceBeforeSemicolon
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spacebeforesemicolon_registers_an_offense_and_corrects_space_before_semicolon
    source: |
      x = 1 ; y = 2
    offenses:
      - line: 1
        column_start: 5
        column_end: 6
        message: Space found before semicolon.
    corrected: |
      x = 1; y = 2

  - name: rubocop_cop_layout_spacebeforesemicolon_does_not_register_an_offense_for_no_space_before_semicolons
    source: |
      x = 1; y = 2
    offenses:
      []

  - name: rubocop_cop_layout_spacebeforesemicolon_registers_an_offense_and_corrects_more_than_one_space_before_a_semicolon
    source: |
      x = 1  ; y = 2
    offenses:
      - line: 1
        column_start: 5
        column_end: 7
        message: Space found before semicolon.
    corrected: |
      x = 1; y = 2

