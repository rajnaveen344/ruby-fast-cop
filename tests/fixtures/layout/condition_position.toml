cop = "Layout/ConditionPosition"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutconditionposition_registers_an_offense_and_corrects_for_condition_on_the_next_line"
source = '''
if
x == 10
end
'''
corrected = '''
if x == 10
end
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 7
message = "Place the condition on the same line as `if`."

[[tests]]
name = "rubocopcoplayoutconditionposition_accepts_condition_on_the_same_line"
source = '''
if x == 10
 bala
end
'''
offenses = []

