cop: Layout/SpaceAfterNot
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceafternot_registers_an_offense_and_corrects_a_single_space_after
    source: |
      ‹BASE›0‹/BASE›
      ! something
    offenses:
      - line: 1
        column_start: 0
        column_end: 11
        message: Do not leave space between `!` and its argument.
    corrected: |
      ‹BASE›0‹/BASE›
      !something

  - name: rubocop_cop_layout_spaceafternot_registers_an_offense_and_corrects_multiple_spaces_after
    source: |
      ‹BASE›0‹/BASE›
      !   something
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Do not leave space between `!` and its argument.
    corrected: |
      ‹BASE›0‹/BASE›
      !something

  - name: rubocop_cop_layout_spaceafternot_registers_an_offense_and_corrects_newline_after
    source: |
      ‹BASE›0‹/BASE›
      !
      something
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Do not leave space between `!` and its argument.
    corrected: |
      ‹BASE›0‹/BASE›
      !something

  - name: rubocop_cop_layout_spaceafternot_accepts_no_space_after
    source: |
      ‹BASE›0‹/BASE›
      !something
    offenses:
      []

  - name: rubocop_cop_layout_spaceafternot_accepts_space_after_not_keyword
    source: |
      not something
    offenses:
      []

  - name: rubocop_cop_layout_spaceafternot
    source: |
      ‹BASE›0‹/BASE›
      ! (model)
    offenses:
      - line: 1
        column_start: 0
        column_end: 9
        message: Do not leave space between `!` and its argument.
    corrected: |
      ‹BASE›0‹/BASE›
      !(model)
