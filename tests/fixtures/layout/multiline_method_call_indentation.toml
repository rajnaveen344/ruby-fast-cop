line = 3
column_start = 2
column_end = 7
message = "Use 2 (not 0) spaces for indenting an expression spanning multiple lines."

[tests.config]
EnforcedStyle = "aligned"
IndentationWidth = ""

[tests.config."Layout/IndentationWidth"]
