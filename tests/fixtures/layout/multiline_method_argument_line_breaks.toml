[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_there_are_multiple_arguments_on_the_first_line_registers_an_offense_and_corrects_starting_from_the_2nd_argument"
source = '''
do_something(foo, bar, baz,
  quux)
'''
corrected = '''
do_something(foo,#{trailing_whitespace}
bar,#{trailing_whitespace}
baz,
  quux)
'''
interpolated = true
verified = false

