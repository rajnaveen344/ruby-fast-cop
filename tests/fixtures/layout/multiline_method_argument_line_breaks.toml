cop = "Layout/MultilineMethodArgumentLineBreaks"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_with_one_argument_on_same_line_as_the_method_call_does_not_add_any_offenses"
source = '''
taz("abc")
'''
offenses = []

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_bracket_hash_assignment_on_multiple_lines_does_not_add_any_offenses"
source = '''
class Thing
  def call
    bar['foo'] = ::Time.zone.at(
                   huh['foo'],
                 )
  end
end
'''
offenses = []

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_bracket_hash_assignment_key_on_multiple_lines_does_not_add_any_offenses"
source = '''
a['b',
    'c', 'd'] = e
'''
offenses = []

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_two_arguments_are_on_next_line_does_not_add_any_offenses"
source = '''
taz(
  "abc", "foo"
)
'''
offenses = []

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_many_arguments_are_on_multiple_lines_two_on_same_line_registers_an_offense_and_corrects"
source = '''
taz("abc",
"foo", "bar",
"baz"
)
'''
corrected = '''
taz("abc",
"foo", 
"bar",
"baz"
)
'''

[[tests.offenses]]
line = 2
column_start = 7
column_end = 12
message = "Each argument in a multi-line method call must start on a separate line."

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_when_many_arguments_are_on_multiple_lines_three_on_same_line_registers_an_offense_and_corrects"
source = '''
taz("abc",
"foo", "bar", "barz",
"baz"
)
'''
corrected = '''
taz("abc",
"foo", 
"bar", 
"barz",
"baz"
)
'''

