[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_with_safe_navigation_with_allowmultilinefinalelement_true_ignores_last_argument_that_is_a_multiline_hash"
source = '''
foo&.bar(1, 2, 3, {
  a: 1,
})
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = true

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_ignore_last_element_ignores_last_argument_that_is_a_multiline_hash"
source = '''
foo(1, 2, 3, {
  a: 1,
})
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = true

[[tests]]
name = "rubocop_cop_layout_multilinemethodargumentlinebreaks_ignore_last_element_registers_and_corrects_arguments_that_are_multiline_hashes_and_not_the_last_argument"
source = '''
foo(1, 2, 3, {
          ^ Each argument in a multi-line method call must start on a separate line.
  a: 1,
}, 4)
'''
corrected = '''
foo(1,#{trailing_whitespace}
2,#{trailing_whitespace}
3,#{trailing_whitespace}
{
  a: 1,
},#{trailing_whitespace}
4)
'''
interpolated = true
verified = false

