    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_when_using_hash_pattern_matching_registers_an_offense_when_hash_pattern_with_no_spaces
    source: |
      case foo
      in {k1: 0, k2: 1}
      end
    offenses:
      - line: 2
        column_start: 16
        column_end: 17
        message: Space inside } missing.
      - line: 2
        column_start: 3
        column_end: 4
        message: Space inside { missing.
    corrected: |
      case foo
      in { k1: 0, k2: 1 }
      end
    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space
    ruby_version: ">= 2.7"

