cop: Layout/SpaceInsideHashLiteralBraces
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_space_inside_empty_braces_not_allowed_accepts_empty_braces_with_no_space_inside
    source: |
      h = {}
    offenses:
      []
    config:
      EnforcedStyleForEmptyBraces: no_space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_space_inside_empty_braces_not_allowed_registers_an_offense_for_empty_braces_with_space_inside
    source: |
      h = { }
    offenses:
      - line: 1
        column_start: 5
        column_end: 6
        message: Space inside empty hash literal braces detected.
    corrected: |
      h = {}
    config:
      EnforcedStyleForEmptyBraces: no_space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_newline_inside_empty_braces_not_allowed_registers_an_offense
    source: |
      h = {
      }
    offenses:
      - line: 1
        column_start: 5
        column_end: 5
        message: Space inside empty hash literal braces detected.
    corrected: |
      h = {}
    config:
      EnforcedStyleForEmptyBraces: no_space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_space_inside_empty_braces_allowed_accepts_empty_braces_with_space_inside
    source: |
      h = { }
    offenses:
      []
    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_space_inside_empty_braces_allowed_registers_an_offense_for_empty_braces_with_no_space_inside
    source: |
      h = {}
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space inside empty hash literal braces missing.
    corrected: |
      h = { }
    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_with_space_inside_empty_braces_allowed_when_using_method_argument_that_both_key_and_value_are_hash_literals_registers_hashes_with_no_spaces
    source: |
      foo({key: value} => {key: value})
                          ^ Space inside { missing.
    offenses:
      - line: 1
        column_start: 31
        column_end: 32
        message: Space inside } missing.
      - line: 2
        column_start: 15
        column_end: 16
        message: Space inside } missing.
      - line: 2
        column_start: 4
        column_end: 5
        message: Space inside { missing.
    corrected: |
      foo({ key: value } => { key: value })
    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_registers_an_offense_for_hashes_with_no_spaces_if_so_configured
    source: |
      h = {a: 1, b: 2}
      h = {a => 1}
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space inside { missing.
      - line: 1
        column_start: 15
        column_end: 16
        message: Space inside } missing.
      - line: 2
        column_start: 4
        column_end: 5
        message: Space inside { missing.
      - line: 2
        column_start: 11
        column_end: 12
        message: Space inside } missing.
    corrected: |
      h = { a: 1, b: 2 }
      h = { a => 1 }
    config:
      EnforcedStyleForEmptyBraces: space
      EnforcedStyle: space

  - name: rubocop_cop_layout_spaceinsidehashliteralbraces_registers_an_offense_for_correct_opposite
    source: |
      h = { a: 1}
    offenses:
      - line: 1
        column_start: 10
        column_end: 11
        message: Space inside } missing.
    corrected: |
      h = { a: 1 }
