  - name: rubocop_cop_layout_emptylinesaroundexceptionhandlingkeywords_with_complex_begin_end_registers_many_offenses
    source: |
      ‹BASE›0‹/BASE›
      begin
      
        do_something1
      
      #{message} before the `rescue`.
      rescue RuntimeError
      
      #{message} after the `rescue`.
        do_something2
      
      #{message} before the `rescue`.
      rescue ArgumentError => ex
      
      #{message} after the `rescue`.
        do_something3
      
      #{message} before the `rescue`.
      rescue
      
      #{message} after the `rescue`.
        do_something3
      
      #{message} before the `else`.
      else
      
      #{message} after the `else`.
        do_something4
      
      #{message} before the `ensure`.
      ensure
      
      #{message} after the `ensure`.
        do_something4
      
      end
    offenses:
      []
    corrected: |
      begin
      
        do_something1
      rescue RuntimeError
        do_something2
      rescue ArgumentError => ex
        do_something3
      rescue
        do_something3
      else
        do_something4
      ensure
        do_something4
      
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundexceptionhandlingkeywords_with_complex_method_definition_registers_many_offenses
    source: |
      ‹BASE›0‹/BASE›
