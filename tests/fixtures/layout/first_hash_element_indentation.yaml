cop: Layout/FirstHashElementIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_firsthashelementindentation_registers_an_offense_and_corrects_incorrectly_indented
    source: |
      a << {
        }
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Indent the right brace the same as the start of the line where the left brace is.
    corrected: |
      a << {
      }
    config:
      EnforcedStyle: special_inside_parentheses

  - name: rubocop_cop_layout_firsthashelementindentation_when_the_hashalignment_style_is_separator_for_accepts_correctly_indented_first_pair
    source: |
      a << {
          a: 1,
        aaa: 222
      }
    offenses:
      []
    config:
      EnforcedStyle: special_inside_parentheses

  - name: rubocop_cop_layout_firsthashelementindentation_when_the_hashalignment_style_is_separator_for_registers_an_offense_and_corrects_incorrectly_indented_first_pair_with
    source: |
      a << {
             a: 1,
           aaa: 222
      }
    offenses:
      - line: 2
        column_start: 7
        column_end: 11
        message: Use 2 spaces for indentation in a hash, relative to the start of the line where the left curly brace is.
    corrected: |
      a << {
          a: 1,
           aaa: 222
      }
    config:
      EnforcedStyle: special_inside_parentheses

  - name: rubocop_cop_layout_firsthashelementindentation_when_the_hashalignment_style_is_separator_for_accepts_correctly_indented_first_pair
    source: |
      a << {
          'a' => 1,
        'aaa' => 222
