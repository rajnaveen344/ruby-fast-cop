  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_even_indentation_of_consecutive_lines_in_typical_rspec_code
    source: |
      expect { Foo.new }.
        to change { Bar.count }.
        from(1).to(2)
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_registers_an_offense_and_corrects_no_indentation_of_second_line
    source: |
      a.
      b
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Use 2 (not 0) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a.
        b

  - name: rubocop_cop_layout_multilinemethodcallindentation_registers_an_offense_and_corrects_3_spaces_indentation_of_2nd_line
    source: |
      a.
         b
      c.
         d
    offenses:
      - line: 2
        column_start: 3
        column_end: 4
        message: Use 2 (not 3) spaces for indenting an expression spanning multiple lines.
      - line: 4
        column_start: 3
        column_end: 4
        message: Use 2 (not 3) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a.
        b
      c.
        d

  - name: rubocop_cop_layout_multilinemethodcallindentation_registers_an_offense_and_corrects_extra_indentation_of_third_line
    source: |
      a.
        b.
          c
