cop: Layout/MultilineMethodCallIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_indented_methods_in_lhs_of_assignment
    source: |
      a
        .b[c] = 0
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_indented_methods_inside_and_outside_a_block
    source: |
      a = b.map do |c|
        c
          .b
          .d do
            x
              .y
          end
      end
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_indentation_relative_to_first_receiver
    source: |
      node
        .children.map { |n| string_source(n) }.compact
        .any? { |s| preferred.any? { |d| s.include?(d) } }
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_indented_methods_in_ordinary_statement
    source: |
      a.
        b
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_no_extra_indentation_of_third_line
    source: |
      a.
        b.
        c
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_indented_methods_in_for_body
    source: |
      for x in a
        something.
          something_else
      end
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_alignment_inside_a_grouped_expression
    source: |
      (a.
       b)
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_arithmetic_operation_with_block_inside_a_grouped_expression
    source: |
      (
        a * b do
        end
      )
        .c
    offenses:
      []

  - name: rubocop_cop_layout_multilinemethodcallindentation_accepts_an_expression_where_the_first_method_spans_multiple_lines
