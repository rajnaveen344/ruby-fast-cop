cop = "Layout/EmptyLinesAroundAccessModifier"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutemptylinesaroundaccessmodifier_enforcedstyle_is_around_requires_blank_line_before_private"
source = '''
class Test
  something
  private

  def test; end
end
'''
corrected = '''
class Test
  something

  private

  def test; end
end
'''

[[tests.offenses]]
line = 3
column_start = 2
column_end = 9
message = "Keep a blank line before and after `private`."

[tests.config]
EnforcedStyle = "around"
References = ["https://edgeguides.rubyonrails.org/contributing_to_ruby_on_rails.html#follow-the-coding-conventions"]

