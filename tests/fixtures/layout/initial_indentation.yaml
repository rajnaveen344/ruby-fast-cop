cop: Layout/InitialIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_initialindentation_accepts_unindented_method_definition
    source: |
      def f
      end
    offenses:
      []

  - name: rubocop_cop_layout_initialindentation_for_a_file_with_byte_order_mark_accepts_unindented_method_call
    source: |
      ﻿puts 1
    offenses:
      []

  - name: rubocop_cop_layout_initialindentation_for_a_file_with_byte_order_mark_registers_an_offense_and_corrects_indented_method_call
    source: |
      ﻿  puts 1
    offenses:
      - line: 1
        column_start: 3
        column_end: 7
        message: Indentation of first line in file detected.
    corrected: |
      ﻿puts 1

  - name: rubocop_cop_layout_initialindentation_for_a_file_with_byte_order_mark_registers_an_offense_and_corrects_indented_method_call_after_comment
    source: |
      ﻿# comment
        puts 1
    offenses:
      - line: 2
        column_start: 2
        column_end: 6
        message: Indentation of first line in file detected.
    corrected: |
      ﻿# comment
      puts 1

  - name: rubocop_cop_layout_initialindentation_accepts_unindented_comment_assignment
    source: |
      # comment
      x = 1
    offenses:
      []
