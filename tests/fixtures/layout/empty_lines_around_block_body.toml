cop = "Layout/EmptyLinesAroundBlockBody"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutemptylinesaroundblockbody_when_enforcedstyle_is_no_empty_lines_for___block_registers_an_offense_for_block_body_starting_with_a_blank"
source = '''
some_method {

  do_something
}
'''
corrected = '''
some_method {
  do_something
}
'''

[[tests.offenses]]
line = 2
column_start = 0
column_end = 1
message = "{} Extra empty line detected at block body beginning."

[tests.config]
EnforcedStyle = "no_empty_lines"

