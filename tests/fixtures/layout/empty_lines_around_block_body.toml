cop = "Layout/EmptyLinesAroundBlockBody"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_emptylinesaroundblockbody_registers_an_offense_for_block_body_starting_with_a_blank"
source = '''
some_method #{open}

#{beginning_offense_annotation}
  do_something
#{close}
'''
corrected = '''
some_method #{open}
  do_something
#{close}
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "no_empty_lines"

[[tests]]
name = "rubocop_cop_layout_emptylinesaroundblockbody_registers_an_offense_for_block_body_ending_with_a_blank"
source = '''
some_method #{open}
  do_something

  #{close}
'''
corrected = '''
some_method #{open}
  do_something
  #{close}
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 3
column_start = 0
column_end = 0
message = "Extra empty line detected at block body end."

[tests.config]
EnforcedStyle = "no_empty_lines"

