cop: Layout/EmptyComment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptycomment_registers_an_offense_and_corrects_using_single_line_empty_comment
    source: |
      #
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
    corrected: |
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_registers_an_offense_and_corrects_using_multiline_empty_comments
    source: |
      #
      #
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
      - line: 2
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
    corrected: |
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_registers_an_offense_and_corrects_using_an_empty_comment_next_to_code
    source: |
      def foo #
        something
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 9
        message: Source code comment is empty.
    corrected: |
      def foo
        something
      end
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_registers_an_offense_and_corrects_when_using_an_empty_comment_next_to_code_after_comment_line
    source: |
      # comment
      def foo #
        something
      end
    offenses:
      - line: 2
        column_start: 8
        column_end: 9
        message: Source code comment is empty.
    corrected: |
      # comment
      def foo
        something
      end
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_does_not_register_an_offense_when_using_comment_text
    source: |
      # Description of `Foo` class.
      class Foo
        # Description of `hello` method.
        def hello
        end
      end
    offenses:
      []
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_does_not_register_an_offense_when_using_comment_text_with_leading_and_trailing_blank_lines
    source: |
      #
      # Description of `Foo` class.
      #
      class Foo
        #
        # Description of `hello` method.
        #
        def hello
        end
      end
    offenses:
      []
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_allow_border_comment_default_does_not_register_an_offense_when_using_border_comment
    source: |
      #################################
    offenses:
      []
    config:
      AllowMarginComment: true
      AllowBorderComment: true

  - name: rubocop_cop_layout_emptycomment_disallow_border_comment_registers_an_offense_and_corrects_using_single_line_empty_comment
    source: |
      #
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
    corrected: |
    config:
      AllowMarginComment: true
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_disallow_border_comment_registers_an_offense_and_corrects_using_border_comment
    source: |
      #################################
    offenses:
      - line: 1
        column_start: 0
        column_end: 33
        message: Source code comment is empty.
    corrected: |
    config:
      AllowMarginComment: true
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_allow_margin_comment_default_does_not_register_an_offense_when_using_margin_comment
    source: |
      #
      # Description of `hello` method.
      #
      def hello
      end
    offenses:
      []
    config:
      AllowMarginComment: true
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_disallow_margin_comment_registers_an_offense_and_corrects_using_margin_comment
    source: |
      #
      # Description of `hello` method.
      #
      def hello
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
      - line: 3
        column_start: 0
        column_end: 1
        message: Source code comment is empty.
    corrected: |
      # Description of `hello` method.
      def hello
      end
    config:
      AllowMarginComment: false
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_registers_an_offense_and_corrects_an_empty_comment_without_space_next_to_code
    source: |
      def foo#
        something
      end
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: Source code comment is empty.
    corrected: |
      def foo
        something
      end
    config:
      AllowMarginComment: false
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_registers_offenses_and_correct_multiple_empty_comments_next_to_code
    source: |
      def foo #
        something #
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 9
        message: Source code comment is empty.
      - line: 2
        column_start: 12
        column_end: 13
        message: Source code comment is empty.
    corrected: |
      def foo
        something
      end
    config:
      AllowMarginComment: false
      AllowBorderComment: false

  - name: rubocop_cop_layout_emptycomment_registers_offenses_and_correct_multiple_aligned_empty_comments_next_to_code
    source: |
      def foo     #
        something #
      end
    offenses:
      - line: 1
        column_start: 12
        column_end: 13
        message: Source code comment is empty.
      - line: 2
        column_start: 12
        column_end: 13
        message: Source code comment is empty.
    corrected: |
      def foo
        something
      end
    config:
      AllowMarginComment: false
      AllowBorderComment: false
