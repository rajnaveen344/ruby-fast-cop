cop: Layout/MultilineBlockLayout
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_multilineblocklayout_registers_an_offense_for_missing_newline_in_do_end_block_w_o_params
    source: |
      test do foo
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 11
        message: Block body expression is on the same line as the block start.
    corrected: |
      test do#{trailing_whitespace}
        foo
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_multilineblocklayout_registers_an_offense_and_corrects_for_missing_newline_in_block_w_o_params
    source: |
