  - name: rubocop_cop_layout_closingparenthesisindentation_for_method_chains_can_handle_multiple_chains_with_differing_breaks
    source: |
      good = foo.methA(:arg1, :arg2, options: :hash)
               .methB(
                 :arg1,
                 :arg2,
               )
               .methC
      
      good = foo.methA(
                 :arg1,
                 :arg2,
                 options: :hash,
               )
               .methB(
                 :arg1,
                 :arg2,
               )
               .methC
    offenses:
