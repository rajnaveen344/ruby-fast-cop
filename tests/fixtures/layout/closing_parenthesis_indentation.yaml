  - name: rubocop_cop_layout_closingparenthesisindentation_for_method_chains_registers_an_offense_and_corrects_method_chains
    source: |
      good = foo.methA(:arg1, :arg2, options: :hash)
               .methB(
                 :arg1,
                 :arg2,
           )
               .methC
      
      good = foo.methA(
                 :arg1,
                 :arg2,
                 options: :hash,
          )
               .methB(
                 :arg1,
                 :arg2,
             )
               .methC
    offenses:
      - line: 5
        column_start: 5
        column_end: 6
        message: Indent `)` to column 9 (not 5)
      - line: 12
        column_start: 4
        column_end: 5
        message: Indent `)` to column 9 (not 4)
      - line: 16
        column_start: 7
        column_end: 8
        message: Indent `)` to column 9 (not 7)
    corrected: |
      good = foo.methA(:arg1, :arg2, options: :hash)
               .methB(
                 :arg1,
                 :arg2,
               )
               .methC
      
      good = foo.methA(
                 :arg1,
                 :arg2,
                 options: :hash,
               )
               .methB(
                 :arg1,
                 :arg2,
               )
               .methC

