    corrected: |
      def a; end;#{trailing_whitespace}
      
      def b; end
    config:
      AllowAdjacentOneLineDefs: false
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinebetweendefs_when_allowadjacentonelinedefs_is_enabled_accepts_adjacent_one_liners
    source: |
      def a; end
      def b; end
    offenses:
      []
