      AllowAdjacentOneLineDefs: true

  - name: rubocop_cop_layout_emptylinebetweendefs_when_allowadjacentonelinedefs_is_enabled_registers_an_offense_for_adjacent_defs_if_some_are_multi_line
    source: |
      def a; end
      def b; end
      def c # Not a one-liner, so this is an offense.
      end
      def d; end # Also an offense since previous was multi-line:
    offenses:
      - line: 3
        column_start: 0
        column_end: 5
        message: Expected 1 empty line between method definitions; found 0.
      - line: 5
        column_start: 0
        column_end: 5
        message: Expected 1 empty line between method definitions; found 0.
    corrected: |
      def a; end
      def b; end
      
      def c # Not a one-liner, so this is an offense.
      end
      
      def d; end # Also an offense since previous was multi-line:
    config:
      AllowAdjacentOneLineDefs: true

