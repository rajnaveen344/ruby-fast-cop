    corrected: |
      class Test
        def foo
          true
        end
      
        def self.bar
          true
        end
      end
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_accepts_a_def_that_follows_a_line_with_code
    source: |
      x = 0
      def m
      end
    offenses:
      []
