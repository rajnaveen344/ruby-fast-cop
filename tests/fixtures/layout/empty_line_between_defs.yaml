cop: Layout/EmptyLineBetweenDefs
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinebetweendefs_finds_offenses_in_inner_classes
    source: |
      class K
        def m
        end
      
        class J
          def n
          end
          def o
          end
        end
      
        # checks something
        def p
        end
      end
    offenses:
      - line: 8
        column_start: 4
        column_end: 9
        message: Expected 1 empty line between method definitions; found 0.
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_when_there_are_only_comments_between_defs_registers_an_offense
    source: |
      class J
        def n
        end # n-related
        # checks something o-related
        # and more
        def o
        end
      end
    offenses:
      - line: 6
        column_start: 2
        column_end: 7
        message: Expected 1 empty line between method definitions; found 0.
    corrected: |
      class J
        def n
        end # n-related
      
        # checks something o-related
        # and more
        def o
        end
      end
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_conditional_method_definitions_accepts_defs_inside_a_conditional_without_blank_lines_in_between
    source: |
      if condition
        def foo
          true
        end
      else
        def foo
          false
        end
      end
    offenses:
      []
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_conditional_method_definitions_registers_an_offense_for_consecutive_defs_inside_a_conditional
    source: |
      if condition
        def foo
          true
        end
        def bar
          true
        end
      else
        def foo
          false
        end
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 9
        message: Expected 1 empty line between method definitions; found 0.
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_class_methods_adjacent_class_methods_registers_an_offense_for_missing_blank_line_between_methods
    source: |
      class Test
        def self.foo
          true
        end
        def self.bar
          true
        end
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 14
        message: Expected 1 empty line between method definitions; found 0.
    corrected: |
      class Test
        def self.foo
          true
        end
      
        def self.bar
          true
        end
      end
    config:
      AllowAdjacentOneLineDefs: false

  - name: rubocop_cop_layout_emptylinebetweendefs_class_methods_mixed_instance_and_class_methods_registers_an_offense_for_missing_blank_line_between_methods
    source: |
      class Test
        def foo
          true
        end
        def self.bar
          true
        end
      end
    offenses:
