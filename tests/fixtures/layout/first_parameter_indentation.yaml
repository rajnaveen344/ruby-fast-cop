cop: Layout/FirstParameterIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_no_paren_method_defs_ignores
    source: |
      def abc foo, bar, baz
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_no_paren_method_defs_ignores_with_hash_args
    source: |
      def abc foo: 1, bar: 3, baz: 3
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_single_line_method_defs_ignores
    source: |
      def abc(foo, bar, baz)
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_single_line_method_defs_ignores_with_hash_args
    source: |
      def abc(foo: 1, bar: 3, baz: 3)
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_valid_indentation_on_multi_line_defs_accepts_correctly_indented_first_element
    source: |
      def abc(
        foo,
        bar,
        baz
      )
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_valid_indentation_on_multi_line_defs_accepts_correctly_indented_first_element_hash
    source: |
      def abc(
        foo: 1,
        bar: 3,
        baz: 3
      )
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_valid_indentation_on_static_multi_line_defs_accepts_correctly_indented_first_element
    source: |
      def self.abc(
        foo,
        bar,
        baz
      )
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_valid_indentation_on_static_multi_line_defs_accepts_correctly_indented_first_element_hash
    source: |
      def self.abc(
        foo: 1,
        bar: 3,
        baz: 3
      )
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_invalid_indentation_on_multi_line_defs_normal_arguments_registers_an_offense_and_corrects_incorrectly_indented_first_element
    source: |
      def abc(
                  foo,
                  bar,
                  baz
      )
        foo
      end
    offenses:
      - line: 2
        column_start: 12
        column_end: 15
        message: Use 2 spaces for indentation in method args, relative to the start of the line where the left parenthesis is.
    corrected: |
      def abc(
        foo,
                  bar,
                  baz
      )
        foo
      end
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_invalid_indentation_on_multi_line_defs_hash_arguments_registers_an_offense_and_corrects_incorrectly_indented_first_element
    source: |
      def abc(
                foo: 1,
                bar: 3,
                baz: 3
      )
        foo
      end
    offenses:
      - line: 2
        column_start: 10
        column_end: 16
        message: Use 2 spaces for indentation in method args, relative to the start of the line where the left parenthesis is.
    corrected: |
      def abc(
        foo: 1,
                bar: 3,
                baz: 3
      )
        foo
      end
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_consistent_style_invalid_indentation_on_multi_line_defs_hash_arguments_static_method_def_registers_an_offense_and_corrects_incorrectly_indented_first_element
    source: |
      def self.abc(
                foo: 1,
                bar: 3,
                baz: 3
      )
        foo
      end
    offenses:
      - line: 2
        column_start: 10
        column_end: 16
        message: Use 2 spaces for indentation in method args, relative to the start of the line where the left parenthesis is.
    corrected: |
      def self.abc(
        foo: 1,
                bar: 3,
                baz: 3
      )
        foo
      end
    config:
      EnforcedStyle: consistent

  - name: rubocop_cop_layout_firstparameterindentation_align_parentheses_style_no_paren_method_defs_ignores
    source: |
      def abc foo, bar, baz
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:align_parentheses
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_firstparameterindentation_align_parentheses_style_no_paren_method_defs_ignores_with_hash_args
    source: |
      def abc foo: 1, bar: 3, baz: 3
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:align_parentheses
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_firstparameterindentation_align_parentheses_style_single_line_method_defs_ignores
    source: |
      def abc(foo, bar, baz)
        foo
      end
    offenses:
