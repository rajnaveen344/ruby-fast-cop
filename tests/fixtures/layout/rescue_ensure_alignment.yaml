cop: Layout/RescueEnsureAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_rescueensurealignment_accepts_the_modifier_form
    source: |
      test rescue nil
    offenses:
      []

  - name: rubocop_cop_layout_rescueensurealignment_rescue_with_begin_registers_an_offense
    source: |
      begin
        something
          rescue
          error
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 10
        message: "`rescue` at 3, 4 is not aligned with `begin` at 1, 0."
    corrected: |
      begin
        something
      rescue
          error
      end

  - name: rubocop_cop_layout_rescueensurealignment_rescue_with_begin_as_rhs_of_assignment_layout_beginendalignment_cop_is_not_enabled_accepts_multi_line_aligned
    source: |
      x ||= begin
              1
            rescue
              2
            end
    offenses:
      []
    config:
      EnforcedStyle: require_parentheses

