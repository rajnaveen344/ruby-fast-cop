cop = "Layout/MultilineAssignmentLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilineassignmentlayout_new_line_style_registers_an_offense_when_the_rhs_is_on_the_same_line"
source = '''
blarg = if true
end
'''
corrected = '''
blarg =
 if true
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Right hand side of multi-line assignment is on the same line as the assignment operator `=`."

[tests.config]
EnforcedStyle = "new_line"
SupportedTypes = ["if"]

[[tests]]
name = "rubocopcoplayoutmultilineassignmentlayout_new_line_style_registers_an_offense_when_the_rhs_is_on_the_same_line_in_"
source = '''
