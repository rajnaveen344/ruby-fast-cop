cop = "Layout/MultilineAssignmentLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_multilineassignmentlayout_new_line_style_registers_an_offense_when_the_rhs_is_on_the_same_line"
source = '''
blarg = if true
end
'''
corrected = '''
blarg =
 if true
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 15
message = "Right hand side of multi-line assignment is on the same line as the assignment operator `=`."

[tests.config]
EnforcedStyle = "$UNRESOLVED:enforced_style"
SupportedTypes = "$UNRESOLVED:supported_types"

