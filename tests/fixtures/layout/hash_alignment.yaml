cop: Layout/HashAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_hashalignment_accepts_single_line_hash
    source: |
      func(a: 0, bb: 1)
    offenses:
      []

  - name: rubocop_cop_layout_hashalignment_accepts_several_pairs_per_line
    source: |
      func(a: 1, bb: 2,
           ccc: 3, dddd: 4)
    offenses:
      []

  - name: rubocop_cop_layout_hashalignment_accepts_pairs_that_don_t_start_a_line
    source: |
      render :json => {:a => messages,
                       :b => :json}, :status => 404
      def example
        a(
          b: :c,
          d: e(
            f: g
          ), h: :i)
      end
    offenses:
      []

  - name: rubocop_cop_layout_hashalignment_when_using_hash_value_omission_accepts_single_line_hash
    source: |
      func(a:, bb:)
    offenses:
      []
    ruby_version: ">= 3.1"

