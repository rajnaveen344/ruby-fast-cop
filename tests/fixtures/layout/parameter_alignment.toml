cop = "Layout/ParameterAlignment"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_registers_an_offense_and_corrects_parameters_with_single_indent"
source = '''
def method(a,
  b)
end
'''
corrected = '''
def method(a,
           b)
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 3
message = "Align the parameters of a method definition if they span more than one line."

[tests.config]
EnforcedStyle = "with_first_parameter"

