cop: Layout/IndentationStyle
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_registers_and_corrects_an_offense_for_a_line_indented_with_tab
    source: |
      ‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_registers_and_corrects_an_offense_for_a_line_indented_with_multiple_tabs
    source: |
      ‹TAB›‹TAB›‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_registers_and_corrects_an_offense_for_a_line_indented_with_mixed_whitespaces
    source: |
       ‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_registers_offenses_before_end_but_not_after
    source: |
      ‹TAB›x = 0
      __END__
      ‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_with_a_tab_other_than_indentation
    source: |
      foo ‹TAB› bar
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_with_a_tab_between_string_literals
    source: |
      'foo'‹TAB›'bar'
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_with_tab_in_a_string
    source: |
      (x = "‹TAB›")
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_which_begins_with_tab_in_a_string
    source: |
      x = '
      ‹TAB›hello'
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_which_begins_with_tab_in_a_heredoc
    source: |
      x = <<HELLO
      ‹TAB›hello
      HELLO
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_accepts_a_line_which_begins_with_tab_in_a_multiline_heredoc
    source: |
      x = <<HELLO
      ‹TAB›hello
      ‹TAB›
      ‹TAB›‹TAB›
      hello
      HELLO
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_registers_and_corrects_an_offense_for_a_line_with_tab_in_a_string_indented_with_tab
    source: |
      ‹TAB›(x = "‹TAB›")
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_spaces_custom_indentation_width_uses_the_configured_number_of_spaces_to_replace_a_tab
    source: |
      ‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Tab detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:spaces
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_registers_and_corrects_an_offense_for_a_line_indented_with_space
    source: |
        x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Space detected in indentation.
    corrected: |
      ‹TAB›x = 0
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_registers_and_corrects_an_offense_for_a_line_indented_with_multiple_spaces
    source: |
            x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Space detected in indentation.
    corrected: |
      ‹TAB›‹TAB›‹TAB›x = 0
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_registers_an_offense_for_a_line_indented_with_mixed_whitespace
    source: |
       ‹TAB›x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 1
        message: Space detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_registers_offenses_before_end_but_not_after
    source: |
      ‹BASE›0‹/BASE›
        x = 0
      __END__
        x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Space detected in indentation.
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_a_tab_other_than_indentation
    source: |
      ‹TAB›foo ‹TAB› bar
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_with_tabs_between_string_literals
    source: |
      'foo'‹TAB›'bar'
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_with_tab_in_a_string
    source: |
      (x = "‹TAB›")
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_which_begins_with_tab_in_a_string
    source: |
      x = '
      ‹TAB›hello'
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_which_begins_with_tab_in_a_heredoc
    source: |
      x = <<HELLO
      ‹TAB›hello
      HELLO
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_accepts_a_line_which_begins_with_tab_in_a_multiline_heredoc
    source: |
      x = <<HELLO
      ‹TAB›hello
      ‹TAB›
      ‹TAB›‹TAB›
      hello
      HELLO
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs
    source: |
         x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Space detected in indentation.
    corrected: |
      ‹TAB›x = 0
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_registers_and_corrects_an_offense_for_a_line_with_tab_in_a_string_indented_with_space
    source: |
        (x = "‹TAB›")
    offenses:
      - line: 1
        column_start: 0
        column_end: 2
        message: Space detected in indentation.
    corrected: |
      ‹TAB›(x = "‹TAB›")
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_indentationstyle_when_enforcedstyle_is_tabs_custom_indentation_width_uses_the_configured_number_of_spaces_to_replace_with_a_tab
    source: |
            x = 0
    offenses:
      - line: 1
        column_start: 0
        column_end: 6
        message: Space detected in indentation.
    corrected: |
      ‹TAB›‹TAB›x = 0
    config:
      EnforcedStyle: $UNRESOLVED:tabs
      IndentationWidth: 3
    interpolated: true
    verified: false
