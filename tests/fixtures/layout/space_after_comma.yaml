cop: Layout/SpaceAfterComma
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceaftercomma_registers_an_offense_and_does_autocorrection
    source: |
      ‹BASE›0‹/BASE›
      #{source.call(items)}
      #{' ' * annotation_start}^ Space missing after comma.
    offenses:
      []
    corrected: |
      ‹BASE›0‹/BASE›
      #{source.call(correct_items)}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceaftercomma_block_argument_commas_without_space_ends_with_an_item_s_t
    source: |
      s,t
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_block_argument_commas_without_space_ends_with_an_item_s_t
    source: |
      s, t
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_block_argument_commas_without_space_trailing_comma_s_t
    source: |
      s, t,
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_array_index_commas_without_space_ends_with_an_item_0_1
    source: |
      0,1
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_array_index_commas_without_space_ends_with_an_item_0_1
    source: |
      0, 1
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_array_index_commas_without_space_trailing_comma_0
    source: |
      0,
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_method_call_arg_commas_without_space_ends_with_an_item_1_2
    source: |
      1,2
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_method_call_arg_commas_without_space_ends_with_an_item_1_2
    source: |
      1, 2
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_inside_hash_braces_accepts_a_space_between_a_comma_and_a_closing_brace
    source: |
      { foo:bar, }
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_space_registers_an_offense_for_no_space_between_a_comma_and_a_closing_brace
    source: |
      { foo:bar,}
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Space missing after comma.

  - name: rubocop_cop_layout_spaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_no_space_accepts_no_space_between_a_comma_and_a_closing_brace
    source: |
      {foo:bar,}
    offenses:
      []
