cop = "Layout/SpaceAfterSemicolon"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutspaceaftersemicolon_registers_an_offense_and_corrects_semicolon_without_space_after_it"
source = '''
x = 1;y = 2
'''
corrected = '''
x = 1; y = 2
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 6
message = "Space missing after semicolon."

[[tests]]
name = "rubocopcoplayoutspaceaftersemicolon_does_not_crash_if_semicolon_is_the_last_character_of_the_file"
strip_trailing_newline = true
source = '''
x = 1;
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftersemicolon_does_not_register_an_offense_when_semicolons_appear_consecutively"
source = '''
foo;; bar
'''
offenses = []

[[tests]]
