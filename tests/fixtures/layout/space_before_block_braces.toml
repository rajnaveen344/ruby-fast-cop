cop = "Layout/SpaceBeforeBlockBraces"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspacebeforeblockbraces_when_enforcedstyle_is_space_accepts_braces_surrounded_by_spaces"
strip_trailing_newline = true
source = '''
each { puts }
'''
offenses = []

[tests.config]
EnforcedStyle = "space"
EnforcedStyleForEmptyBraces = "space"
SupportedStylesForEmptyBraces = ["space", "no_space"]

