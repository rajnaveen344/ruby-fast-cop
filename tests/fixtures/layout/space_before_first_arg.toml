cop = "Layout/SpaceBeforeFirstArg"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutspacebeforefirstarg_for_method_calls_without_parentheses_registers_an_offense_and_corrects_method_call_with_two_spaces_before_the_first_arg"
source = '''
something  x
a.something  y, z
'''
corrected = '''
something x
a.something y, z
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 11
message = "Put one space between the method name and the first argument."

[[tests.offenses]]
line = 2
column_start = 11
column_end = 13
message = "Put one space between the method name and the first argument."

[tests.config]
AllowForAlignment = true

