  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_registers_an_offense_and_corrects_all_types_of_spacing_issues
    source: |
      {}.each { |  x=5,  (y,*z) |puts x }
                               ^ Space after last block parameter detected.
                 ^ Extra space before block parameter detected.
    offenses:
      - line: 1
        column_start: 26
        column_end: 27
        message: Space after closing `|` missing.
      - line: 2
        column_start: 17
        column_end: 18
        message: Extra space before block parameter detected.
      - line: 3
        column_start: 11
        column_end: 13
        message: Space before first block parameter detected.
    corrected: |
      {}.each { |x=5, (y,*z)| puts x }
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_registers_an_offense_and_corrects_all_types_of_spacing_issues_for_a_lambda
    source: |
      ->(  a,  b, c) { puts a }
         ^ Extra space before block parameter detected.
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: Extra space before block parameter detected.
      - line: 2
        column_start: 3
        column_end: 5
        message: Space before first block parameter detected.
    corrected: |
      ->(a, b, c) { puts a }
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
