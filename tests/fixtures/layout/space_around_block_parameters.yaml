cop: Layout/SpaceAroundBlockParameters
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spacearoundblockparameters_accepts_an_empty_block
    source: |
      {}.each {}
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundblockparameters_skips_lambda_without_args
    source: |
      ->() { puts "a" }
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundblockparameters_skips_lambda_without_parens
    source: |
      ->a { puts a }
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_accepts_a_block_with_spaces_in_the_right_places
    source: |
      {}.each { |x, y| puts x }
    offenses:
      []
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_accepts_a_block_with_parameters_but_no_body
    source: |
      {}.each { |x, y| }
    offenses:
      []
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_accepts_a_block_parameter_without_preceding_space
    source: |
      {}.each { |x,y| puts x }
    offenses:
      []
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_accepts_block_parameters_with_surrounding_space_that_includes_line_breaks
    source: |
      some_result = lambda do |
        so_many,
        parameters,
        it_will,
        be_too_long,
        for_one_line
      |
        do_something
      end
    offenses:
      []
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_accepts_a_lambda_with_spaces_in_the_right_places
    source: |
      ->(x, y) { puts x }
    offenses:
      []
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_registers_an_offense_and_corrects_space_before_first_parameter
    source: |
      {}.each { | x| puts x }
    offenses:
      - line: 1
        column_start: 11
        column_end: 12
        message: Space before first block parameter detected.
    corrected: |
      {}.each { |x| puts x }
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_registers_an_offense_and_corrects_space_after_last_parameter
    source: |
      {}.each { |x, y  | puts x }
    offenses:
      - line: 1
        column_start: 15
        column_end: 17
        message: Space after last block parameter detected.
    corrected: |
      {}.each { |x, y| puts x }
    config:
      EnforcedStyleInsidePipes: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spacearoundblockparameters_when_enforcedstyleinsidepipes_is_no_space_registers_an_offense_and_corrects_no_space_after_closing_pipe
    source: |
      {}.each { |x, y|puts x }
    offenses:
      - line: 1
