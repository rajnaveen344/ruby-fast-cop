  - name: rubocop_cop_layout_classstructure_when_def_modifier_is_used_registers_an_offense_and_corrects_when_definitions_that_need_to_be_sorted_are_defined_alternately
    source: |
      class A
        private def foo; end
      
        def bar; end
      
        private def baz; end
      
        def qux; end
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 14
        message: "`public_methods` is supposed to appear before `private_methods`."
      - line: 8
        column_start: 2
        column_end: 14
        message: "`public_methods` is supposed to appear before `private_methods`."
    corrected: |
      class A
        def bar; end
        def qux; end
        private def foo; end
      
      
        private def baz; end
      
      end

