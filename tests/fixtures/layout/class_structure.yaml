        private def foo
        end
      
        public def bar
        end
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 16
        message: "`public_methods` is supposed to appear before `private_methods`."
    corrected: |
      class A
        public def bar
        end
        private def foo
        end
      
      end

  - name: rubocop_cop_layout_classstructure_when_def_modifier_is_used_registers_an_offense_and_corrects_public_method_without_modifier_declared_after_private_method_with_modifier
    source: |
      class A
        private def foo
        end
      
        def bar
        end
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 9
        message: "`public_methods` is supposed to appear before `private_methods`."
    corrected: |
