cop: Layout/ClassStructure
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_classstructure_when_the_first_line_ends_with_a_comment_reports_an_offense_and_swaps_the_lines
    source: |
      class GridTask
        DESC = 'Grid Task' # grid task name OID, subclasses should set this
        extend Helpers::MakeFromFile
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 30
        message: "`module_inclusion` is supposed to appear before `constants`."
    corrected: |
      class GridTask
        extend Helpers::MakeFromFile
        DESC = 'Grid Task' # grid task name OID, subclasses should set this
      end

  - name: rubocop_cop_layout_classstructure_with_a_complete_ordered_example_does_not_create_offense
    source: |
      class Person
        # extend and include go first
        extend SomeModule
        include AnotherModule
      
        # inner classes
        CustomError = Class.new(StandardError)
      
        # constants are next
        SOME_CONSTANT = 20
      
        # afterwards we have attribute macros
        attr_reader :name
      
        # then we have public delegate macros
        delegate :to_s, to: :name
      
        # followed by other macros (if any)
        validates :name
      
        # public class methods are next in line
        def self.some_method
        end
      
        # initialization goes between class methods and other instance methods
        def initialize
        end
      
        # followed by other public instance methods
        def some_method
        end
      
        # protected attribute macros and methods go next
        protected
      
        attr_reader :protected_name
      
        def some_protected_method
        end
      
        # private attribute macros, delegate macros and methods are grouped near the end
        private
      
        attr_reader :private_name
      
        delegate :some_private_delegate, to: :name
      
        def some_private_method
        end
      end
    offenses:
      []

  - name: rubocop_cop_layout_classstructure_simple_example
    source: |
      class Person
        CONST = 'wrong place'
        include AnotherModule
        extend SomeModule
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 23
        message: "`module_inclusion` is supposed to appear before `constants`."
    corrected: |
      class Person
        include AnotherModule
        extend SomeModule
        CONST = 'wrong place'
      end

  - name: rubocop_cop_layout_classstructure_registers_an_offense_and_corrects_when_public_instance_method_is_before_class_method
    source: |
      class Foo
        def instance_method; end
        def self.class_method; end
      end
    offenses:
      - line: 3
        column_start: 2
        column_end: 28
        message: "`public_class_methods` is supposed to appear before `public_methods`."
    corrected: |
      class Foo
        def self.class_method; end
        def instance_method; end
      end

  - name: rubocop_cop_layout_classstructure_constant_is_not_a_literal_registers_an_offense_but_does_not_autocorrect
    source: |
      class Person
        def name; end
      
        foo = 5
        LIMIT = foo + 1
      end
    offenses:
      - line: 5
        column_start: 2
        column_end: 17
        message: "`constants` is supposed to appear before `public_methods`."

  - name: rubocop_cop_layout_classstructure_registers_an_offense_and_corrects_when_there_is_a_comment_in_the_macro_method
    source: |
      class Foo
        # This is a comment for macro method.
        validates :attr
        attr_reader :foo
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 18
        message: "`attribute_macros` is supposed to appear before `macros`."
    corrected: |
      class Foo
        attr_reader :foo
        # This is a comment for macro method.
        validates :attr
      end

  - name: rubocop_cop_layout_classstructure_registers_an_offense_and_corrects_when_literal_constant_is_after_method_definitions
    source: |
      class Foo
        def name; end
      
        LIMIT = 10
        CONST = 'wrong place'.freeze
        RECURSIVE_BASIC_LITERALS_CONST = [1, 2].freeze
        DYNAMIC_CONST = foo.freeze
      end
    offenses:
      - line: 4
        column_start: 2
        column_end: 12
        message: "`constants` is supposed to appear before `public_methods`."
    corrected: |
      class Foo
        LIMIT = 10
        CONST = 'wrong place'.freeze
        RECURSIVE_BASIC_LITERALS_CONST = [1, 2].freeze
        def name; end
      
        DYNAMIC_CONST = foo.freeze
      end

  - name: rubocop_cop_layout_classstructure_ignores_misplaced_private_constants
    source: |
      class Foo
        def name; end
      
        PRIVATE_CONST1 = 1
        PRIVATE_CONST2 = 2
        private_constant :PRIVATE_CONST1, :PRIVATE_CONST2
        PUBLIC_CONST = 'public'
      end
    offenses:
      - line: 7
        column_start: 2
        column_end: 25
        message: "`constants` is supposed to appear before `public_methods`."
    corrected: |
      class Foo
        PUBLIC_CONST = 'public'
        def name; end
      
        PRIVATE_CONST1 = 1
        PRIVATE_CONST2 = 2
        private_constant :PRIVATE_CONST1, :PRIVATE_CONST2
      end

  - name: rubocop_cop_layout_classstructure_registers_an_offense_and_corrects_when_str_heredoc_constant_is_defined_after_public_method
    source: |
      class Foo
        def do_something
        end
      
        CONSTANT = <<~EOS
          str
        EOS
      end
    offenses:
