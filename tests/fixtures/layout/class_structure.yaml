  - name: rubocop_cop_layout_classstructure_registers_an_offense_and_corrects_when_public_class_method_with_heredoc_after_instance_method
    source: |
      class Foo
        def instance_method
          'instance method'
        end
      
        def self.class_method
          <<~EOS
            class method
          EOS
        end
      end
    offenses:
      - line: 6
        column_start: 2
        column_end: 23
        message: "`public_class_methods` is supposed to appear before `public_methods`."
    corrected: |
      class Foo
        def self.class_method
          <<~EOS
            class method
          EOS
        end
        def instance_method
          'instance method'
        end
      
      end

  - name: rubocop_cop_layout_classstructure_when_def_modifier_is_used_registers_an_offense_and_corrects_public_method_with_modifier_declared_after_private_method_with_modifier
    source: |
