[[tests]]
name = "rubocop_cop_layout_indentationconsistency_with_class_with_indented_internal_methods_style_configured_accepts_different_indentation_in_different_visibility_sections"
source = '''
class Cat
  def meow
    puts('Meow!')
  end

  protected

    def can_we_be_friends?(another_cat)
      # some logic
    end

    def related_to?(another_cat)
      # some logic
    end

  private

              # Here we go back an indentation level again. This is a
              # violation of the indented_internal_methods style,
              # but it's not for this cop to report.
              # Layout/IndentationWidth will handle it.
  def meow_at_3am?
    rand < 0.8
  end

              # As long as the indentation of this method is
              # consistent with that of the last one, we're fine.
  def meow_at_4am?
    rand < 0.8
  end
end
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:indented_internal_methods"

