cop = "Layout/DefEndAlignment"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutdefendalignment_when_enforcedstylealignwith_is_start_of_line_behaves_like_misaligned_registers_an_offense_for_mismatched_def_test_newline_end_and_autocorrects"
source = '''
def test
  end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 5
message = "`end` at 2, 2 is not aligned with `def` at 1, 0."

[tests.config]
AutoCorrect = true
EnforcedStyleAlignWith = "start_of_line"

