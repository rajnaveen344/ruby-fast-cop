cop: Layout/EmptyLinesAroundModuleBody
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinesaroundmodulebody_when_enforcedstyle_is_no_empty_lines_registers_an_offense_for_module_body_starting_with_a_blank
    source: |
      module SomeModule
      
        do_something
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: "#{extra_begin}"
    config:
      EnforcedStyle: no_empty_lines
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundmodulebody_when_enforcedstyle_is_no_empty_lines_registers_an_offense_for_module_body_ending_with_a_blank
    source: |
      module SomeModule
        do_something
      
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 0
        message: "#{extra_end}"
    config:
      EnforcedStyle: no_empty_lines
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundmodulebody_when_enforcedstyle_is_no_empty_lines_autocorrects_beginning_and_end
    source: |
      module SomeModule
      
        do_something
      
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: "#{extra_begin}"
      - line: 4
        column_start: 0
        column_end: 0
        message: "#{extra_end}"
    corrected: |
      module SomeModule
        do_something
      end
    config:
      EnforcedStyle: no_empty_lines
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundmodulebody_when_enforcedstyle_is_empty_lines_registers_an_offense_for_module_body_not_starting_or_ending_with_a_blank
    source: |
