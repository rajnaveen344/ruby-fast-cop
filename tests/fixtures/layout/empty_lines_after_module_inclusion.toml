cop = "Layout/EmptyLinesAfterModuleInclusion"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutemptylinesaftermoduleinclusion_registers_an_offense_and_corrects_for_code_that_immediately_follows_include"
source = '''
include Foo
def do_something
end
'''
corrected = '''
include Foo

def do_something
end
'''

