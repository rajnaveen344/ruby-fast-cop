    source: |
      a‹TAB›+‹TAB›b
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundoperators_accepts_operator_symbols
    source: |
      func(:-)
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundoperators_accepts_ranges
    source: |
      a, b = (1..2), (1...3)
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundoperators_accepts_rational
    source: |
      x = 2/3r
    offenses:
      []

  - name: rubocop_cop_layout_spacearoundoperators_accepts_multiple_spaces_between_an_operator_and_a_tailing_comment
