cop: Layout/SpaceAfterColon
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceaftercolon_registers_an_offense_and_corrects_colon_without_space_after_it
    source: |
      {a:3}
    offenses:
      - line: 1
        column_start: 2
        column_end: 3
        message: Space missing after colon.
    corrected: |
      {a: 3}

  - name: rubocop_cop_layout_spaceaftercolon_accepts_colons_in_symbols
    source: |
      x = :a
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_colon_in_ternary_followed_by_space
    source: |
      x = w ? a : b
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_hashes_with_a_space_after_colons
    source: |
      {a: 3}
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_hash_rockets
    source: |
      x = {"a"=>1}
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_if
    source: |
      x = if w
            a
          end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_colons_in_strings
    source: |
      str << ':'
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_required_keyword_arguments
    source: |
      def f(x:, y:)
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_accepts_colons_denoting_required_keyword_argument
    source: |
      def initialize(table:, nodes:)
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftercolon_registers_an_offense_and_corrects_a_keyword_optional_argument_without_a_space
    source: |
      def m(var:1, other_var: 2)
      end
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Space missing after colon.
    corrected: |
      def m(var: 1, other_var: 2)
      end

  - name: rubocop_cop_layout_spaceaftercolon_ruby_3_1_does_not_register_an_offense_colon_without_space_after_it_when_using_hash_value_omission
    source: |
      {x:, y:}
    offenses:
      []
    ruby_version: ">= 3.1"

  - name: rubocop_cop_layout_spaceaftercolon_ruby_3_1_accepts_colons_denoting_hash_value_omission_argument
    source: |
      foo(table:, nodes:)
    offenses:
      []
    ruby_version: ">= 3.1"
