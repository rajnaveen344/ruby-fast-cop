cop = "Layout/FirstHashElementLineBreak"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutfirsthashelementlinebreak_registers_an_offense_and_corrects_elements_listed_on_the_first_line"
source = '''
a = { a: 1,
      b: 2 }
'''
corrected = '''
a = { 
a: 1,
      b: 2 }
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 10
message = "Add a line break before the first element of a multi-line hash."

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutfirsthashelementlinebreak_registers_an_offense_and_corrects_hash_nested_in_a_method_call"
source = '''
method({ foo: 1,
         bar: 2 })
'''
corrected = '''
method({ 
foo: 1,
         bar: 2 })
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 15
message = "Add a line break before the first element of a multi-line hash."

[tests.config]
AllowMultilineFinalElement = false

