  - name: rubocop_cop_layout_elsealignment_with_if_statement_with_assignment_when_alignment_style_is_variable_and_end_is_aligned_with_keyword_registers_offenses_for_an_if_with_setter
    source: |
      foo.bar = if baz
                  derp1
                elsif meh
                  derp2
                else
                  derp3
                end
    offenses:
      - line: 3
        column_start: 10
        column_end: 15
        message: Align `elsif` with `foo.bar`.
      - line: 5
        column_start: 10
        column_end: 14
        message: Align `else` with `foo.bar`.

  - name: rubocop_cop_layout_elsealignment_with_if_statement_with_assignment_when_alignment_style_is_variable_and_end_is_aligned_with_keyword_registers_an_offense_for_an_if_with_element_assignment
    source: |
