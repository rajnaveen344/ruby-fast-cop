  - name: rubocop_cop_layout_elsealignment_with_begin_rescue_else_ensure_end_registers_an_offense_for_misaligned_else
    source: |
      def my_func
        puts 'do something outside block'
        begin
          puts 'do something error prone'
        rescue SomeException, SomeOther => e
          puts 'wrongly intended error handling'
        rescue
          puts 'wrongly intended error handling'
      else
          puts 'wrongly intended normal case handling'
        ensure
          puts 'wrongly intended common handling'
        end
      end
    offenses:
      - line: 9
        column_start: 0
        column_end: 4
        message: Align `else` with `begin`.

  - name: rubocop_cop_layout_elsealignment_with_begin_rescue_else_ensure_end_accepts_a_correctly_aligned_else
    source: |
      begin
        raise StandardError.new('Fail') if rand(2).odd?
      rescue StandardError => error
        $stderr.puts error.message
      else
        $stdout.puts 'Lucky you!'
      end
    offenses:
      []

