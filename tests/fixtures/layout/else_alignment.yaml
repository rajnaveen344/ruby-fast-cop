      else
        derp2
      end
    offenses:
      []

  - name: rubocop_cop_layout_elsealignment_with_if_statement_with_assignment_when_alignment_style_is_variable_and_end_is_aligned_with_variable_accepts_an_if_elsif_else_with_end_aligned_with_setter
