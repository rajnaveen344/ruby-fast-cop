        column_start: 0
        column_end: 4
        message: Align `else` with `if`.
    corrected: |
      var = if a
        0
            else b
        1
      end

  - name: rubocop_cop_layout_elsealignment_with_if_statement_with_assignment_and_end_is_aligned_with_variable_registers_an_offense_for_an_elsif
