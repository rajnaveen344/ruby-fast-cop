cop: Layout/ElseAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_elsealignment_accepts_a_ternary_if
    source: |
      cond ? func1 : func2
    offenses:
      []

  - name: rubocop_cop_layout_elsealignment_with_if_statement_registers_an_offense_for_misaligned_else
    source: |
      if cond
        func1
       else
       func2
      end
    offenses:
      - line: 3
        column_start: 1
        column_end: 5
        message: Align `else` with `if`.
    corrected: |
      if cond
        func1
      else
       func2
      end

  - name: rubocop_cop_layout_elsealignment_with_if_statement_accepts_indentation_after_else_when_if_is_on_new_line_after_assignment
    source: |
      Rails.application.config.ideal_postcodes_key =
        if Rails.env.production? || Rails.env.staging?
          "AAAA-AAAA-AAAA-AAAA"
        else
          "BBBB-BBBB-BBBB-BBBB"
        end
    offenses:
      []

  - name: rubocop_cop_layout_elsealignment_with_if_statement_accepts_a_one_line_if_statement
    source: |
      if cond then func1 else func2 end
    offenses:
      []

  - name: rubocop_cop_layout_elsealignment_with_if_statement_accepts_a_correctly_aligned_if_elsif_else_end
    source: |
      if a1
        b1
      elsif a2
        b2
      else
        c
      end
    offenses:
      []

  - name: rubocop_cop_layout_elsealignment_with_if_statement_for_a_file_with_byte_order_mark_accepts_a_correctly_aligned_if_elsif_else_end
    source: |
      #{bom}if a1
        b1
      elsif a2
        b2
      else
        c
      end
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_layout_elsealignment_with_if_statement_with_assignment_when_alignment_style_is_variable_and_end_is_aligned_with_variable_accepts_an_if_else_with_end_aligned_with_setter
    source: |
