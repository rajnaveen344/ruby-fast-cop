cop: Layout/LineContinuationSpacing
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_registers_an_offense_when_no_space_in_front_of_backslash
    source: |
      if 2 + 2\
        == 4
        foo
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 9
        message: Use one space in front of backslash.
    corrected: |
      if 2 + 2 \
        == 4
        foo
      end
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_registers_an_offense_when_too_much_space_in_front_of_backslash
    source: |
      if 2 + 2  \
        == 4
        foo
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 11
        message: Use one space in front of backslash.
    corrected: |
      if 2 + 2 \
        == 4
        foo
      end
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_marks_the_offense_correctly_when_offense_is_not_in_first_line
    source: |
      foo
      bar
      baz
      if 2 + 2    \
        == 4
        foo
      end
    offenses:
      - line: 4
        column_start: 8
        column_end: 13
        message: Use one space in front of backslash.
    corrected: |
      foo
      bar
      baz
      if 2 + 2 \
        == 4
        foo
      end
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_registers_an_offense_when_too_much_space_in_front_of_backslash_in_array_literals
    source: |
      [
        :foo  \
      ]
    offenses:
      - line: 2
        column_start: 6
        column_end: 9
        message: Use one space in front of backslash.
    corrected: |
      [
        :foo \
      ]
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_registers_no_offense_with_one_space_in_front_of_backslash
    source: |
      if 2 + 2 \
        == 4
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_ignores_heredocs_and_comments
    source: |
      # this\
      <<-X
        is\
        ok
      X
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_ignores_percent_literals
    source: |
      %i[
        foo  \
      ]
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_ignores_when_too_much_space_in_front_of_backslash_after_end
    source: |
      foo
      bar
      __END__
      baz    \
      qux
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_a_multiline_string
    source: |
      'foo\
      bar'
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_a_q_string
    source: |
      %q{foo\
      bar}
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_a_regexp
    source: |
      /foo\
      bar/
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_a_r_regexp
    source: |
      %r{foo\
      bar}
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_an_xstr
    source: |
      `foo\
      bar`
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_space_does_not_register_an_offense_for_a_continuation_inside_an_x_xstr
    source: |
      %x{foo\
      bar}
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_registers_an_offense_when_one_space_in_front_of_backslash
    source: |
      if 2 + 2 \
        == 4
        foo
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 10
        message: Use zero spaces in front of backslash.
    corrected: |
      if 2 + 2\
        == 4
        foo
      end
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_registers_an_offense_when_many_spaces_in_front_of_backslash
    source: |
      if 2 + 2  \
        == 4
        foo
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 11
        message: Use zero spaces in front of backslash.
    corrected: |
      if 2 + 2\
        == 4
        foo
      end
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_marks_the_offense_correctly_when_offense_is_not_in_first_line
    source: |
      foo
      bar
      baz
      if 2 + 2    \
        == 4
        foo
      end
    offenses:
      - line: 4
        column_start: 8
        column_end: 13
        message: Use zero spaces in front of backslash.
    corrected: |
      foo
      bar
      baz
      if 2 + 2\
        == 4
        foo
      end
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_registers_no_offense_with_zero_spaces_in_front_of_backslash
    source: |
      if 2 + 2\
        == 4
        foo
      end
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_registers_an_offense_when_too_much_space_in_front_of_backslash_in_array_literals
    source: |
      [
        :foo  \
      ]
    offenses:
      - line: 2
        column_start: 6
        column_end: 9
        message: Use zero spaces in front of backslash.
    corrected: |
      [
        :foo\
      ]
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_ignores_heredocs_and_comments
    source: |
      # this \
      <<-X
        is  \
        ok
      X
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_ignores_percent_literals
    source: |
      %i[
        foo  \
      ]
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_ignores_when_too_much_space_in_front_of_backslash_after_end
    source: |
      foo
      bar
      __END__
      baz    \
      qux
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_a_multiline_string
    source: |
      'foo     \
      bar'
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_a_q_string
    source: |
      %q{foo     \
      bar}
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_a_multiline_string_with_interpolation
    source: |
      "#{foo}     \
      bar"
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_a_regexp
    source: |
      /foo     \
      bar/
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_a_r_regexp
    source: |
      %r{foo     \
      bar}
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_an_xstr
    source: |
      `foo     \
      bar`
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_linecontinuationspacing_enforcedstyle_no_space_does_not_register_an_offense_for_a_continuation_inside_an_x_xstr
    source: |
