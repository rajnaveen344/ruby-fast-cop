cop: Layout/SpaceAfterMethodName
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceaftermethodname_registers_an_offense_and_corrects_def_with_space_before_the_parenthesis
    source: |
      def func (x)
        a
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 9
        message: Do not put a space between a method name and the opening parenthesis.
    corrected: |
      def func(x)
        a
      end

  - name: rubocop_cop_layout_spaceaftermethodname_registers_an_offense_and_corrects_class_def_with_space_before_parenthesis
    source: |
      def self.func (x)
        a
      end
    offenses:
      - line: 1
        column_start: 13
        column_end: 14
        message: Do not put a space between a method name and the opening parenthesis.
    corrected: |
      def self.func(x)
        a
      end

  - name: rubocop_cop_layout_spaceaftermethodname_registers_an_offense_and_corrects_assignment_def_with_space_before_parenthesis
    source: |
      def func= (x)
        a
      end
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Do not put a space between a method name and the opening parenthesis.
    corrected: |
      def func=(x)
        a
      end

  - name: rubocop_cop_layout_spaceaftermethodname_accepts_a_def_without_arguments
    source: |
      def func
        a
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftermethodname_accepts_a_defs_without_arguments
    source: |
      def self.func
        a
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftermethodname_accepts_a_def_with_arguments_but_no_parentheses
    source: |
      def func x
        a
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftermethodname_accepts_class_method_def_with_arguments_but_no_parentheses
    source: |
      def self.func x
        a
      end
    offenses:
      []

  - name: rubocop_cop_layout_spaceaftermethodname_accepts_an_assignment_def_with_arguments_but_no_parentheses
    source: |
      def func= x
        a
      end
    offenses:
      []
