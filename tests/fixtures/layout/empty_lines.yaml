cop: Layout/EmptyLines
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylines_registers_an_offense_for_consecutive_empty_lines
    source: |
      test = 5
      
      
      top
    offenses:
      - line: 3
        column_start: 0
        column_end: 0
        message: Extra blank line detected.
    corrected: |
      test = 5
      
      top

  - name: rubocop_cop_layout_emptylines_does_not_register_an_offense_when_there_are_no_tokens
    source: |
      ‹BASE›0‹/BASE›
      #comment
    offenses:
      []

  - name: rubocop_cop_layout_emptylines_does_not_register_an_offense_for_comments
    source: |
      ‹BASE›0‹/BASE›
      test
      
      #comment
      top
    offenses:
      []

  - name: rubocop_cop_layout_emptylines_does_not_register_an_offense_for_empty_lines_in_a_string
    source: |
      result = "test
      
      
      
                                        string"
    offenses:
      []

  - name: rubocop_cop_layout_emptylines_does_not_register_an_offense_for_heredocs_with_empty_lines_inside
    source: |
      str = <<-TEXT
      line 1
      
      
      line 2
      TEXT
      puts str
    offenses:
      []
