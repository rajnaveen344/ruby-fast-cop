cop: Layout/EmptyLinesAfterModuleInclusion
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion
    source: |
      ‹BASE›0‹/BASE›
      #{method} Foo
      def do_something
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Add an empty line after module inclusion.
    corrected: |
      ‹BASE›0‹/BASE›
      #{method} Foo
      
      def do_something
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion
    source: |
      ‹BASE›0‹/BASE›
      #{method} Foo # my comment
      def do_something
      end
    offenses:
      - line: 1
        column_start: 0
        column_end: 26
        message: Add an empty line after module inclusion.
    corrected: |
      ‹BASE›0‹/BASE›
      #{method} Foo # my comment
      
      def do_something
      end
    interpolated: true
    verified: false

