  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion_does_not_register_an_offense_when_there_are_multiple_grouped_module_inclusion_methods
    source: |
      module Foo
        module Bar
          extend Baz
          prepend Baz
          include Baz
        end
      end
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion_does_not_register_an_offense_for_rspec_matcher_include
    source: |
      it 'something' do
        expect(foo).to include(bar), "baz"
      end
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion_does_not_register_an_offense_when_include_has_zero_arguments
    source: |
      class Foo
        includes = [include, sdk_include].compact.map do |inc|
          inc + "blah"
        end.join(' ')
      end
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaftermoduleinclusion_does_not_register_an_offense_when_module_inclusion_is_called_with_modifier
    source: |
      class Foo
        include Bar
        include Baz if condition
        include Qux
      end
    offenses:
      []
