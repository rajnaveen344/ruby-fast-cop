cop = "Layout/DotPosition"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutdotposition_leading_dots_style_registers_an_offense_for_trailing_dot_in_multiline_call"
source = '''
something.
  method_name
'''
corrected = '''
something
  .method_name
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 10
message = "Place the . on the next line, together with the method name."

[tests.config]
EnforcedStyle = "leading"

