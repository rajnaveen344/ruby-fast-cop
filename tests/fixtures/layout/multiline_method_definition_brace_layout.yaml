cop: Layout/MultilineMethodDefinitionBraceLayout
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_multilinemethoddefinitionbracelayout_ignores_implicit_defs
    source: |
      def foo a: 1,
      b: 2
      end
    offenses:
      []
    config:
      EnforcedStyle: symmetrical

  - name: rubocop_cop_layout_multilinemethoddefinitionbracelayout_ignores_single_line_defs
    source: |
      def foo(a,b)
      end
    offenses:
      []
    config:
      EnforcedStyle: symmetrical

  - name: rubocop_cop_layout_multilinemethoddefinitionbracelayout_ignores_defs_without_params
    source: |
      def foo
      end
    offenses:
      []
    config:
      EnforcedStyle: symmetrical
