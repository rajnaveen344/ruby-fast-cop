cop: Layout/LineLength
department: layout
severity: convention
implemented: false  # YAML has tab characters that break parsing

tests:
  - name: rubocop_cop_layout_linelength_registers_an_offense_for_a_line_that_s_81_characters_wide
    source: |
      #{maximum_string}#
    offenses:
      - line: 1
        column_start: 0
        column_end: 18
        message: Line is too long. [81/80]
    config:
      Max: 80
      AllowedPatterns: null
    interpolated: true

  - name: rubocop_cop_layout_linelength_highlights_excessive_characters
    source: |
      #{maximum_string}abc
    offenses:
      - line: 1
        column_start: 0
        column_end: 20
        message: Line is too long. [83/80]
    config:
      Max: 80
      AllowedPatterns: null
    interpolated: true

  - name: rubocop_cop_layout_linelength_accepts_the_first_line_if_it_is_a_shebang_line
    source: |
      #!/System/Library/Frameworks/Ruby.framework/Versions/2.3/usr/bin/ruby --disable-gems
      
      do_something
    offenses:
      []
    config:
      Max: 80
      AllowedPatterns: null

  - name: rubocop_cop_layout_linelength_registers_an_offense_for_long_line_before_end_but_not_after
    source: |
      #{maximum_string}#{'#' * 70}
      __END__
      #{'#' * 200}
    offenses:
      - line: 1
        column_start: 0
        column_end: 28
        message: Line is too long. [150/80]
    config:
      Max: 80
      AllowedPatterns: null
    interpolated: true

  - name: rubocop_cop_layout_linelength_when_line_is_indented_with_tabs_accepts_a_short_line
    source: |
      			123
    offenses:
      []
    config:
      Max: 10
      AllowedPatterns: null

  - name: rubocop_cop_layout_linelength_when_line_is_indented_with_tabs_registers_an_offense_for_a_long_line
    source: |
      												1
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Line is too long. [25/10]
    config:
      Max: 10
      AllowedPatterns: null

  - name: rubocop_cop_layout_linelength_when_allowuri_option_is_enabled_and_the_url_fits_within_the_max_allowed_characters_registers_an_offense_for_the_line
    source: |
                # Some documentation comment...
                # See: https://github.com/rubocop/rubocop and then words that are not part of a URL
    offenses:
      - line: 2
        column_start: 80
        column_end: 93
        message: Line is too long. [93/80]
    config:
      AllowQualifiedName: true
      AllowURI: true
      Max: 80
      AllowedPatterns: null

