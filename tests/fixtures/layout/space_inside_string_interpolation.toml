cop = "Layout/SpaceInsideStringInterpolation"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspaceinsidestringinterpolation_when_enforcedstyle_is_no_space_does_not_touch_spaces_inside_the_interpolated_expression"
source = '''
"#{ a; b }"
'''
corrected = '''
"#{a; b}"
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 4
message = "Do not use space inside string interpolation."

[[tests.offenses]]
line = 1
column_start = 8
column_end = 9
message = "Do not use space inside string interpolation."

[tests.config]
EnforcedStyle = "no_space"

