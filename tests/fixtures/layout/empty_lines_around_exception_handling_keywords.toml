cop = "Layout/EmptyLinesAroundExceptionHandlingKeywords"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutemptylinesaroundexceptionhandlingkeywords_registers_an_offense_for_above_rescue_keyword_with_a_blank"
source = '''
begin
  f1

rescue
  f2
end
'''
corrected = '''
begin
  f1
rescue
  f2
end
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 1
message = "{} Extra empty line detected before the `rescue`."

