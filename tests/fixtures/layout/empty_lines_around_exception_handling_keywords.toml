[[tests]]
name = "rubocop_cop_layout_emptylinesaroundexceptionhandlingkeywords_registers_an_offense_for_above_rescue_keyword_with_a_blank"
source = '''
begin
  f1

#{message} before the `rescue`.
rescue
  f2
end
'''
