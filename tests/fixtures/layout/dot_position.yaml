    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_the_receiver_has_a_heredoc_argument_as_the_first_argument_registers_an_offense
    source: |
      my_method
        .something(<<~HERE, true)
          #{something}
        HERE
        .somethingelse
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
      - line: 5
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      my_method.
        something(<<~HERE, true).
          #{something}
        HERE
        somethingelse
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_the_receiver_has_a_heredoc_argument_with_multiple_heredocs_registers_an_offense
    source: |
      my_method
        .something(<<~HERE, <<~THERE)
          something
        HERE
          another thing
        THERE
        .somethingelse
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
      - line: 7
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      my_method.
        something(<<~HERE, <<~THERE).
          something
        HERE
          another thing
        THERE
        somethingelse
