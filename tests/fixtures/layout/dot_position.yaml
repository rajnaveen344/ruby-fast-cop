      - line: 2
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
      - line: 5
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      my_method.
        something(<<~HERE).
