        HERE
        somethingelse
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_the_receiver_has_a_heredoc_argument_with_a_dynamic_heredoc_registers_an_offense
    source: |
      my_method
        .something(<<~HERE)
          #{something}
        HERE
        .somethingelse
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
      - line: 5
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      my_method.
        something(<<~HERE).
          #{something}
        HERE
        somethingelse
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_the_receiver_has_a_heredoc_argument_with_an_xstr_heredoc_registers_an_offense
    source: |
      my_method
        .something(<<~`HERE`)
