    offenses:
      []
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_does_not_err_on_method_call_without_a_method_name
    source: |
      l
      .(1)
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      l.
      (1)
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_does_not_err_on_method_call_on_same_line
    source: |
      something.method_name
    offenses:
      []
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_does_not_get_confused_by_several_lines_of_chained_methods
    source: |
      File.new(something).
      readlines.map.
      compact.join("
      ")
    offenses:
      []
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_using_safe_navigation_operator_registers_an_offense_for_correct_opposite
    source: |
      something
        &.method_name
    offenses:
      - line: 2
        column_start: 2
        column_end: 4
        message: Place the &. on the previous line, together with the method call receiver.
    corrected: |
      something&.
        method_name
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_using_safe_navigation_operator_accepts_trailing_dot_in_multi_line_method_call
    source: |
      something&.
        method_name
    offenses:
      []
    config:
      EnforcedStyle: trailing

