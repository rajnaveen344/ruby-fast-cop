    source: |
      <<~HEREDOC
        something
      HEREDOC
        .method_name
    offenses:
      - line: 4
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      <<~HEREDOC.
        something
      HEREDOC
        method_name
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_when_the_receiver_is_an_xstr_heredoc_registers_an_offense
