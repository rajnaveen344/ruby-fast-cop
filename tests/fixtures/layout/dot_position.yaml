cop: Layout/DotPosition
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_dotposition_leading_dots_style_registers_an_offense_for_trailing_dot_in_multi_line_call
    source: |
      something.
        method_name
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
    corrected: |
      something
        .method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_registers_an_offense_for_correct_opposite
    source: |
      something
        .method_name
      something.
        method_name
    offenses:
      - line: 3
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
    corrected: |
      something
        .method_name
      something
        .method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_registers_an_offense_for_only_dot_line
    source: |
      foo
        .bar
        .
        baz
    offenses:
      - line: 3
        column_start: 2
        column_end: 3
        message: Place the . on the next line, together with the method name.
    corrected: |
      foo
        .bar
        .baz
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_accepts_leading_do_in_multi_line_method_call
    source: |
      something
        .method_name
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_does_not_err_on_method_call_with_no_dots
    source: |
      puts something
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_does_not_err_on_method_call_without_a_method_name
    source: |
      l.
      (1)
    offenses:
      - line: 1
        column_start: 1
        column_end: 2
        message: Place the . on the next line, together with the method name.
    corrected: |
      l
      .(1)
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_does_not_err_on_method_call_on_same_line
    source: |
      something.method_name
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_there_is_an_intervening_line_comment_does_not_register_offense
    source: |
      something.
      # a comment here
        method_name
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_there_is_an_intervening_blank_line_does_not_register_offense
    source: |
      something.
      
        method_name
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_a_method_spans_multiple_lines_registers_an_offense
    source: |
      something(
        foo, bar
      ).
        method_name
    offenses:
      - line: 3
        column_start: 1
        column_end: 2
        message: Place the . on the next line, together with the method name.
    corrected: |
      something(
        foo, bar
      )
        .method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_using_safe_navigation_operator_registers_an_offense_for_correct_opposite
    source: |
      something
        &.method_name
      something&.
        method_name
    offenses:
      - line: 3
        column_start: 9
        column_end: 11
        message: Place the &. on the next line, together with the method name.
    corrected: |
      something
        &.method_name
      something
        &.method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_using_safe_navigation_operator_accepts_leading_do_in_multi_line_method_call
    source: |
      something
        &.method_name
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_with_multiple_offenses_registers_all_of_them
    source: |
      @objects = @objects.where(type: :a)
      
      @objects = @objects.
        with_relation.
        paginate
    offenses:
      - line: 3
        column_start: 19
        column_end: 20
        message: Place the . on the next line, together with the method name.
      - line: 4
        column_start: 15
        column_end: 16
        message: Place the . on the next line, together with the method name.
    corrected: |
      @objects = @objects.where(type: :a)
      
      @objects = @objects
        .with_relation
        .paginate
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_as_the_last_argument_registers_an_offense
    source: |
      my_method.
        something(<<~HERE).
          something
        HERE
        somethingelse
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
      - line: 2
        column_start: 20
        column_end: 21
        message: Place the . on the next line, together with the method name.
    corrected: |
      my_method
        .something(<<~HERE)
          something
        HERE
        .somethingelse
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_with_a_dynamic_heredoc_registers_an_offense
    source: |
      my_method.
        something(<<~HERE).
          #{something}
        HERE
        somethingelse
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
      - line: 2
        column_start: 20
        column_end: 21
        message: Place the . on the next line, together with the method name.
    corrected: |
      my_method
        .something(<<~HERE)
          #{something}
        HERE
        .somethingelse
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_with_an_xstr_heredoc_registers_an_offense
    source: |
      my_method.
        something(<<~`HERE`).
          ls -la
        HERE
        somethingelse
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
      - line: 2
        column_start: 22
        column_end: 23
        message: Place the . on the next line, together with the method name.
    corrected: |
      my_method
        .something(<<~`HERE`)
          ls -la
        HERE
        .somethingelse
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_as_the_first_argument_registers_an_offense
    source: |
      my_method.
        something(<<~HERE, true).
          #{something}
        HERE
        somethingelse
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
      - line: 2
        column_start: 26
        column_end: 27
        message: Place the . on the next line, together with the method name.
    corrected: |
      my_method
        .something(<<~HERE, true)
          #{something}
        HERE
        .somethingelse
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_with_multiple_heredocs_registers_an_offense
    source: |
      my_method.
        something(<<~HERE, <<~THERE).
          something
        HERE
          another thing
        THERE
        somethingelse
    offenses:
      - line: 1
        column_start: 9
        column_end: 10
        message: Place the . on the next line, together with the method name.
      - line: 2
        column_start: 30
        column_end: 31
        message: Place the . on the next line, together with the method name.
    corrected: |
      my_method
        .something(<<~HERE, <<~THERE)
          something
        HERE
          another thing
        THERE
        .somethingelse
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_has_a_heredoc_argument_with_another_method_on_the_same_line_does_not_register_an_offense
    source: |
      foo(<<~HEREDOC).squish
        something
      HEREDOC
    offenses:
      []
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_is_a_heredoc_registers_an_offense
    source: |
      <<~HEREDOC.
        something
      HEREDOC
        method_name
    offenses:
      - line: 1
        column_start: 10
        column_end: 11
        message: Place the . on the next line, together with the method name.
    corrected: |
      <<~HEREDOC
        something
      HEREDOC
        .method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_leading_dots_style_when_the_receiver_is_an_xstr_heredoc_registers_an_offense
    source: |
      <<~`HEREDOC`.
        ls -la
      HEREDOC
        method_name
    offenses:
      - line: 1
        column_start: 12
        column_end: 13
        message: Place the . on the next line, together with the method name.
    corrected: |
      <<~`HEREDOC`
        ls -la
      HEREDOC
        .method_name
    config:
      EnforcedStyle: leading

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_registers_an_offense_for_leading_dot_in_multi_line_call
    source: |
      something
        .method_name
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Place the . on the previous line, together with the method call receiver.
    corrected: |
      something.
        method_name
    config:
      EnforcedStyle: trailing

  - name: rubocop_cop_layout_dotposition_trailing_dots_style_accepts_trailing_dot_in_multi_line_method_call
    source: |
      something.
        method_name
    offenses:
      []
    config:
      EnforcedStyle: trailing

