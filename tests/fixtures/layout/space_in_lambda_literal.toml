cop = "Layout/SpaceInLambdaLiteral"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspaceinlambdaliteral_when_configured_to_enforce_spaces_registers_an_offense_and_corrects_no_space_between__and_"
source = '''
a = ->(b, c) { b + c }
'''
corrected = '''
a = -> (b, c) { b + c }
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 12
message = "Use a space between `->` and `(` in lambda literals."

[tests.config]
EnforcedStyle = "require_space"

[[tests]]
name = "rubocopcoplayoutspaceinlambdaliteral_when_configured_to_enforce_spaces_does_not_register_an_offense_for_a_space_between__and_"
strip_trailing_newline = true
source = '''
a = -> (b, c) { b + c }
'''
offenses = []

[tests.config]
EnforcedStyle = "require_space"

[[tests]]
name = "rubocopcoplayoutspaceinlambdaliteral_when_configured_to_enforce_spaces_does_not_register_an_offense_for_multiline_lambdas"
source = '''
l = lambda do |a, b|
  tmp = a * 7
  tmp * b / 50
end
'''
offenses = []

[tests.config]
EnforcedStyle = "require_space"

