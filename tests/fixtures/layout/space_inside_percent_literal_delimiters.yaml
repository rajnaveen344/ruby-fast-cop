cop: Layout/SpaceInsidePercentLiteralDelimiters
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_registers_an_offense_for_unnecessary_spaces
    source: |
      ‹BASE›0‹/BASE›
      #{code_example(' 1 2  ')}
    offenses:
      - line: 1
        column_start: 7
        column_end: 9
        message: "#{message}"
      - line: 1
        column_start: 3
        column_end: 4
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('1 2')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_registers_an_offense_for_spaces_after_first_delimiter
    source: |
      ‹BASE›0‹/BASE›
      #{code_example(' 1 2')}
    offenses:
      - line: 1
        column_start: 3
        column_end: 4
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('1 2')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_registers_an_offense_for_spaces_before_final_delimiter
    source: |
      ‹BASE›0‹/BASE›
      #{code_example('1 2 ')}
    offenses:
      - line: 1
        column_start: 6
        column_end: 7
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('1 2')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_registers_an_offense_for_literals_with_escaped_and_other_spaces
    source: |
      ‹BASE›0‹/BASE›
      #{code_example(' \ a b c\  ')}
    offenses:
      - line: 1
        column_start: 13
        column_end: 14
        message: "#{message}"
      - line: 1
        column_start: 3
        column_end: 4
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('\ a b c\ ')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_accepts_multi_line_literals
    source: |
      ‹BASE›0‹/BASE›
      %#{type}(
        a
        b
        c
      )
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_accepts_multi_line_literals_within_a_method
    source: |
      def foo
        %#{type}(
          a
          b
          c
        )
      end
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_accepts_newlines_and_additional_following_alignment_spaces
    source: |
      ‹BASE›0‹/BASE›
      %#{type}(a b
         c)
    offenses:
      []
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_with_space_in_blank_percent_literals_registers_and_corrects_an_offense
    source: |
      ‹BASE›0‹/BASE›
      #{code_example(' ')}
    offenses:
      - line: 1
        column_start: 3
        column_end: 4
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_with_spaces_in_blank_percent_literals_registers_and_corrects_an_offense
    source: |
      ‹BASE›0‹/BASE›
      #{code_example('  ')}
    offenses:
      - line: 1
        column_start: 3
        column_end: 5
        message: "#{message}"
    corrected: |
      ‹BASE›0‹/BASE›
      #{code_example('')}
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_accepts_other_percent_literals
    source: |
      ‹BASE›0‹/BASE›
      %q( a  b c )
      %r( a  b c )
      %s( a  b c )
    offenses:
      []

  - name: rubocop_cop_layout_spaceinsidepercentliteraldelimiters_accepts_execute_string_literals
    source: |
      ‹BASE›0‹/BASE›
      ` curl `
    offenses:
      []
