cop = "Layout/BlockEndNewline"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutblockendnewline_accepts_a_oneliner"
source = '''
test do foo end
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutblockendnewline_accepts_multiline_blocks_with_newlines_before_the_end"
source = '''
test do
  foo
end
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutblockendnewline_does_not_register_an_offense_when_multiline_blocks_with_newlines_before_the__end"
