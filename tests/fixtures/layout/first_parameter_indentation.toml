[[tests]]
name = "rubocopcoplayoutfirstparameterindentation_consistent_style_invalid_indentation_on_multiline_defs_normal_arguments_registers_an_offense_and_corrects_incorrectly_indented_first_element"
source = '''
def abc(
            foo,
            bar,
            baz
)
  foo
end
'''
corrected = '''
def abc(
  foo,
            bar,
            baz
)
  foo
end
'''

[[tests.offenses]]
line = 2
column_start = 12
column_end = 15
message = "Use 2 spaces for indentation in method args, relative to the start of the line where the left parenthesis is."

[tests.config]
EnforcedStyle = "consistent"
IndentationWidth = ""

