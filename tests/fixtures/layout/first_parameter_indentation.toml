cop = "Layout/FirstParameterIndentation"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutfirstparameterindentation_consistent_style_no_paren_method_defs_ignores"
source = '''
def abc foo, bar, baz
  foo
end
'''
offenses = []

[tests.config]
EnforcedStyle = "consistent"
IndentationWidth = ""

