[[tests]]
name = "rubocopcoplayoutmultilinemethodcallbracelayout_registers_an_offense_when_using_method_chain_for_heredoc_argument_in_multiline_literal_brace_layout"
source = '''
foo(<<~EOS, arg
  text
EOS
).do_something
'''
corrected = '''
foo(<<~EOS, arg).do_something
  text
EOS
'''

[[tests.offenses]]
line = 4
column_start = 0
column_end = 1
message = "Closing method call brace must be on the same line as the last argument when opening brace is on the same line as the first argument."

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinemethodcallbracelayout_registers_an_offense_when_using_safe_navigation_method_chain_for_heredoc_argument_in_multiline_literal_brace_layout"
