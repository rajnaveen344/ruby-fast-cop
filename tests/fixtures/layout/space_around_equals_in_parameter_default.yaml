  - name: rubocop_cop_layout_spacearoundequalsinparameterdefault_when_enforcedstyle_is_space_registers_an_offense_and_corrects_missing_space_for_arguments_with_unary_operators
    source: |
      def f(x=-1, y= 0, z =+1)
                   ^^ Surrounding space missing in default value assignment.
      end
    offenses:
