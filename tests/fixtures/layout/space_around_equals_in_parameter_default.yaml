        column_start: 10
        column_end: 12
        message: Surrounding space missing in default value assignment.
      - line: 1
        column_start: 16
        column_end: 17
        message: Surrounding space missing in default value assignment.
    corrected: |
      def f(x, y = 0, z = 1)
      end
    config:
      EnforcedStyle: $UNRESOLVED:space
    interpolated: true
    verified: false

