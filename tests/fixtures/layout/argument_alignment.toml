cop = "Layout/ArgumentAlignment"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutargumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_arguments_with_single_indent"
source = '''
function(a,
  if b then c else d end)
'''
corrected = '''
function(a,
         if b then c else d end)
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 24
message = "Align the arguments of a method call if they span more than one line."

[tests.config]
EnforcedStyle = "with_first_argument"

[tests.config."Layout/IndentationWidth"]
Width = 2

