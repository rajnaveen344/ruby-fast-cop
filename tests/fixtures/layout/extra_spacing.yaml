cop: Layout/ExtraSpacing
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_extraspacing_registers_an_offense_and_corrects_alignment_with_token_not_preceded_by_space
    source: |
      website("example.org")
      name   = "Jill"
    offenses:
      - line: 2
        column_start: 4
        column_end: 6
        message: Unnecessary spacing detected.
    corrected: |
      website("example.org")
      name = "Jill"

  - name: rubocop_cop_layout_extraspacing_accepts_aligned_values_of_an_implicit_hash_literal
    source: |
      register(street1:    '1 Market',
               street2:    '#200',
               :city =>    'Some Town',
               state:      'CA',
               postal_code:'99999-1111')
    offenses:
      []

  - name: rubocop_cop_layout_extraspacing_accepts_space_between_key_and_value_in_a_hash_with_hash_rockets
    source: |
      ospf_h = {
        'ospfTest'    => {
          'foo'      => {
            area: '0.0.0.0', cost: 10, hello: 30, pass: true },
          'longname' => {
            area: '1.1.1.38', pass: false },
          'vlan101'  => {
            area: '2.2.2.101', cost: 5, hello: 20, pass: true }
        },
        'TestOspfInt' => {
          'x'               => {
            area: '0.0.0.19' },
          'vlan290'         => {
            area: '2.2.2.29', cost: 200, hello: 30, pass: true },
          'port-channel100' => {
            area: '3.2.2.29', cost: 25, hello: 50, pass: false }
        }
      }
    offenses:
      []

  - name: rubocop_cop_layout_extraspacing_when_spaces_are_present_in_a_single_line_hash_literal_registers_an_offense_and_corrects_hashes_with_symbol_keys
    source: |
      hash = {a:   1,  b:    2}
                     ^ Unnecessary spacing detected.
    offenses:
      - line: 1
        column_start: 10
        column_end: 12
        message: Unnecessary spacing detected.
      - line: 2
        column_start: 19
        column_end: 22
        message: Unnecessary spacing detected.
    corrected: |
      hash = {a: 1, b: 2}

  - name: rubocop_cop_layout_extraspacing_when_spaces_are_present_in_a_single_line_hash_literal_registers_an_offense_and_corrects_hashes_with_hash_rockets
    source: |
      let(:single_line_hash) {
        {"a"   => "1", "b" => "2"}
      }
    offenses:
      - line: 2
        column_start: 6
        column_end: 8
        message: Unnecessary spacing detected.
    corrected: |
      let(:single_line_hash) {
        {"a" => "1", "b" => "2"}
      }

  - name: rubocop_cop_layout_extraspacing_registers_an_offense_and_corrects_extra_space_before_a_float
    source: |
      {:a => "a",
       :b => [nil,  2.5]}
    offenses:
      - line: 2
        column_start: 12
        column_end: 13
        message: Unnecessary spacing detected.
    corrected: |
      {:a => "a",
       :b => [nil, 2.5]}

  - name: rubocop_cop_layout_extraspacing_registers_an_offense_and_corrects_extra_spacing_before_a_unary_plus_in_an_argument_list
    source: |
      assert_difference(MyModel.count, +2,
                        3,  +3, # Extra spacing only here.
                        4,+4)
    offenses:
      - line: 2
        column_start: 20
        column_end: 21
        message: Unnecessary spacing detected.
    corrected: |
      assert_difference(MyModel.count, +2,
                        3, +3, # Extra spacing only here.
                        4,+4)

  - name: rubocop_cop_layout_extraspacing_registers_an_offense_and_corrects_double_extra_spacing_in_variable_assignment
    source: |
      m    = "hello"
    offenses:
      - line: 1
        column_start: 1
        column_end: 4
        message: Unnecessary spacing detected.
    corrected: |
      m = "hello"

  - name: rubocop_cop_layout_extraspacing_ignores_whitespace_at_the_beginning_of_the_line
    source: |
        m = "hello"
    offenses:
      []

  - name: rubocop_cop_layout_extraspacing_ignores_whitespace_inside_a_string
    source: |
      m = "hello   this"
    offenses:
      []

  - name: rubocop_cop_layout_extraspacing_registers_an_offense_and_corrects_extra_spacing_in_class_inheritance
    source: |
      class A   < String
      end
    offenses:
      - line: 1
        column_start: 7
        column_end: 9
        message: Unnecessary spacing detected.
    corrected: |
      class A < String
      end

  - name: rubocop_cop_layout_extraspacing_when_allowforalignment_is_true_registers_an_offense_and_corrects_when_a_character_is_vertically_aligned
    source: |
      d_is_vertically_aligned  do
        _______________________d
      end
    offenses:
      - line: 1
        column_start: 23
        column_end: 24
        message: Unnecessary spacing detected.
    corrected: |
      d_is_vertically_aligned do
        _______________________d
      end
    config:
      ForceEqualSignAlignment: false
      AllowForAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_allowbeforetrailingcomments_is_true_allows_it
    source: |
      object.method(argument)  # this is a comment
    offenses:
      []
    config:
      ForceEqualSignAlignment: false
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: allow_alignment

  - name: rubocop_cop_layout_extraspacing_when_allowbeforetrailingcomments_is_false_registers_an_offense
    source: |
      object.method(argument)  # this is a comment
    offenses:
      - line: 1
        column_start: 23
        column_end: 24
        message: Unnecessary spacing detected.
    config:
      ForceEqualSignAlignment: false
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: allow_alignment

  - name: rubocop_cop_layout_extraspacing_when_allowbeforetrailingcomments_is_false_does_not_trigger_on_only_one_space_before_comment
    source: |
      object.method(argument) # this is a comment
    offenses:
      []
    config:
      ForceEqualSignAlignment: false
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: allow_alignment

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_does_not_register_offenses_for_multiple_complex_nested_assignments
    source: |
      def batch
        @areas   = params[:param].map {
                     var_1      = 123_456
                     variable_2 = 456_123 }
        @another = params[:param].map {
                     char_1 = begin
                                variable_1_1  = 'a'
                                variable_1_20 = 'b'
      
                                variable_1_300  = 'c'
                                # A Comment
                                variable_1_4000 = 'd'
      
                                variable_1_50000           = 'e'
                                puts 'a non-assignment statement without a blank line'
                                some_other_length_variable = 'f'
                              end
                     var_2  = 456_123 }
      
        render json: @areas
      end
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_does_not_register_an_offense_if_assignments_are_separated_by_blanks
    source: |
      a = 1
      
      bb = 2
      
      ccc = 3
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_does_not_register_an_offense_if_assignments_are_aligned
    source: |
      a   = 1
      bb  = 2
      ccc = 3
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_aligns_the_first_assignment_with_the_following_assignment
    source: |
      # comment
      a   = 1
      bb  = 2
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_does_not_register_alignment_errors_on_outdented_lines
    source: |
      @areas = params[:param].map do |ca_params|
                 ca_params = ActionController::Parameters.new(stuff)
               end
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_an_offense_and_corrects_consecutive_assignments_that_are_not_aligned
    source: |
      a = 1
      bb = 2
      ccc = 3
      
      abcde        = 1
      a                 = 2
      abc = 3
    offenses:
      - line: 2
        column_start: 3
        column_end: 4
        message: "`=` is not aligned with the preceding assignment."
      - line: 3
        column_start: 4
        column_end: 5
        message: "`=` is not aligned with the preceding assignment."
      - line: 6
        column_start: 18
        column_end: 19
        message: "`=` is not aligned with the preceding assignment."
      - line: 7
        column_start: 4
        column_end: 5
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      a   = 1
      bb  = 2
      ccc = 3
      
      abcde = 1
      a     = 2
      abc   = 3
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_offenses_and_correct_consecutive_operator_assignments_which_are_not_aligned
    source: |
      a += 1
      bb = 2
      ccc <<= 3
      
      abcde        = 1
      a                 *= 2
      abc ||= 3
    offenses:
      - line: 3
        column_start: 4
        column_end: 7
        message: "`=` is not aligned with the preceding assignment."
      - line: 6
        column_start: 18
        column_end: 20
        message: "`=` is not aligned with the preceding assignment."
      - line: 7
        column_start: 4
        column_end: 7
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      a    += 1
      bb    = 2
      ccc <<= 3
      
      abcde = 1
      a    *= 2
      abc ||= 3
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_an_offense_and_corrects_consecutive_aref_assignments_which_are_not_aligned
    source: |
      a[1] = 1
      bb[2,3] = 2
      ccc[:key] = 3
      
      abcde[0]        = 1
      a                 = 2
      abc += 3
    offenses:
      - line: 2
        column_start: 8
        column_end: 9
        message: "`=` is not aligned with the preceding assignment."
      - line: 3
        column_start: 10
        column_end: 11
        message: "`=` is not aligned with the preceding assignment."
      - line: 6
        column_start: 18
        column_end: 19
        message: "`=` is not aligned with the preceding assignment."
      - line: 7
        column_start: 4
        column_end: 6
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      a[1]      = 1
      bb[2,3]   = 2
      ccc[:key] = 3
      
      abcde[0] = 1
      a        = 2
      abc     += 3
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_offenses_and_correct_consecutive_attribute_assignments_which_are_not_aligned
    source: |
      a.attr = 1
      bb &&= 2
      ccc.s = 3
      
      abcde.blah        = 1
      a.attribute_name              = 2
      abc[1] = 3
    offenses:
      - line: 2
        column_start: 3
        column_end: 6
        message: "`=` is not aligned with the preceding assignment."
      - line: 3
        column_start: 6
        column_end: 7
        message: "`=` is not aligned with the preceding assignment."
      - line: 6
        column_start: 30
        column_end: 31
        message: "`=` is not aligned with the preceding assignment."
      - line: 7
        column_start: 7
        column_end: 8
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      a.attr = 1
      bb   &&= 2
      ccc.s  = 3
      
      abcde.blah       = 1
      a.attribute_name = 2
      abc[1]           = 3
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_offenses_and_correct_complex_nested_assignments
    source: |
      def batch
        @areas = params[:param].map {
                     var_1 = 123_456
                     variable_2 = 456_123 }
        @another = params[:param].map {
                     char_1 = begin
                                variable_1_1     = 'a'
                                variable_1_20  = 'b'
      
                                variable_1_300    = 'c'
                                # A Comment
                                variable_1_4000      = 'd'
      
                                variable_1_50000     = 'e'
                                puts 'a non-assignment statement without a blank line'
                                some_other_length_variable     = 'f'
                              end
                     var_2 = 456_123 }
      
        render json: @areas
      end
    offenses:
      - line: 4
        column_start: 26
        column_end: 27
        message: "`=` is not aligned with the preceding assignment."
      - line: 5
        column_start: 11
        column_end: 12
        message: "`=` is not aligned with the preceding assignment."
      - line: 8
        column_start: 41
        column_end: 42
        message: "`=` is not aligned with the preceding assignment."
      - line: 12
        column_start: 47
        column_end: 48
        message: "`=` is not aligned with the preceding assignment."
      - line: 16
        column_start: 57
        column_end: 58
        message: "`=` is not aligned with the preceding assignment."
      - line: 18
        column_start: 21
        column_end: 22
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      def batch
        @areas   = params[:param].map {
                     var_1      = 123_456
                     variable_2 = 456_123 }
        @another = params[:param].map {
                     char_1 = begin
                                variable_1_1  = 'a'
                                variable_1_20 = 'b'
      
                                variable_1_300  = 'c'
                                # A Comment
                                variable_1_4000 = 'd'
      
                                variable_1_50000           = 'e'
                                puts 'a non-assignment statement without a blank line'
                                some_other_length_variable = 'f'
                              end
                     var_2  = 456_123 }
      
        render json: @areas
      end
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true
    source: |
      def method(arg = 1)
        var = arg
      end
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_an_offense_and_corrects_when_there_is_in_a_string_after_assignment
    source: |
      e, f = val.split('=')
      opt.ssh_config[e] = f
    offenses:
      - line: 2
        column_start: 18
        column_end: 19
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      e, f              = val.split('=')
      opt.ssh_config[e] = f
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_registers_an_offense_and_corrects_with_op_asgn_when_there_is_in_a_string_after_assignment
    source: |
      xy &&= val.split('=')
      opt.ssh_config[e] = f
    offenses:
      - line: 2
        column_start: 18
        column_end: 19
        message: "`=` is not aligned with the preceding assignment."
    corrected: |
      xy              &&= val.split('=')
      opt.ssh_config[e] = f
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_endless_methods_does_not_register_an_offense_when_not_aligned
    source: |
      def deleted = do_something
      def updated = do_something
      def added = do_something
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true
    ruby_version: ">= 3.0"

  - name: rubocop_cop_layout_extraspacing_when_forceequalsignalignment_is_true_endless_methods_does_not_register_an_offense_with_optional_values
    source: |
      def deleted(x = true) = do_something(x)
      def updated(x = true) = do_something(x)
      def added(x = true) = do_something(x)
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true
    ruby_version: ">= 3.0"

  - name: rubocop_cop_layout_extraspacing_when_exactly_two_comments_have_extra_spaces_and_they_are_aligned_does_not_register_an_offense
    source: |
      one  # comment one
      two  # comment two
    offenses:
      []
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_exactly_two_comments_have_extra_spaces_and_they_are_not_aligned_registers_an_offense
    source: |
      one  # comment one
      two   # comment two
    offenses:
      - line: 1
        column_start: 3
        column_end: 4
        message: Unnecessary spacing detected.
      - line: 2
        column_start: 3
        column_end: 5
        message: Unnecessary spacing detected.
    corrected: |
      one # comment one
      two # comment two
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true

  - name: rubocop_cop_layout_extraspacing_when_multiple_comments_have_extra_spaces_registers_offenses_for_all_comments
    source: |
      class Foo
        def require(p)  # rubocop:disable Naming/MethodParameterName
        end
      
        def load(p)  # rubocop:disable Naming/MethodParameterName
        end
      
        def join(*ps)  # rubocop:disable Naming/MethodParameterName
        end
      
        def exist?(*ps)  # rubocop:disable Naming/MethodParameterName
        end
      end
    offenses:
      - line: 2
        column_start: 16
        column_end: 17
        message: Unnecessary spacing detected.
      - line: 5
        column_start: 13
        column_end: 14
        message: Unnecessary spacing detected.
      - line: 8
        column_start: 15
        column_end: 16
        message: Unnecessary spacing detected.
      - line: 11
        column_start: 17
        column_end: 18
        message: Unnecessary spacing detected.
    corrected: |
      class Foo
        def require(p) # rubocop:disable Naming/MethodParameterName
        end
      
        def load(p) # rubocop:disable Naming/MethodParameterName
        end
      
        def join(*ps) # rubocop:disable Naming/MethodParameterName
        end
      
        def exist?(*ps) # rubocop:disable Naming/MethodParameterName
        end
      end
    config:
      AllowBeforeTrailingComments: allow_comments
      AllowForAlignment: true
      ForceEqualSignAlignment: true
