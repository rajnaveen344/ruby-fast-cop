      super(
          :foo,
          bar: 3
      )
    offenses:
      - line: 2
        column_start: 4
        column_end: 8
        message: Indent the first argument one step more than the start of the previous line.
    corrected: |
      super(
        :foo,
          bar: 3
      )
    config:
      EnforcedStyle: style

