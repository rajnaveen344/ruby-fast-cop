cop: Layout/FirstArgumentIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_firstargumentindentation_when_indentationwidth_width_is_2_registers_an_offense_and_corrects_an_over_indented_first_argument
    source: |
      run(
          :foo,
          bar: 3
      )
    offenses:
      - line: 2
        column_start: 4
        column_end: 8
        message: Indent the first argument one step more than the start of the previous line.
    corrected: |
      run(
        :foo,
          bar: 3
      )
    config:
      EnforcedStyle: style

  - name: rubocop_cop_layout_firstargumentindentation_when_indentationwidth_width_is_2_registers_an_offense_and_corrects_an_over_indented_first_argument_of_super
