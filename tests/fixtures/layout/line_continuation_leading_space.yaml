cop: Layout/LineContinuationLeadingSpace
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_linecontinuationleadingspace_enforcedstyle_trailing_registers_an_offense_when_2nd_line_has_one_leading_space
    source: |
      'this text is too' \
      ' long'
    offenses:
      - line: 2
        column_start: 1
        column_end: 2
        message: Move leading spaces to the end of the previous line.
    corrected: |
      'this text is too ' \
      'long'
    config:
      EnforcedStyle: $UNRESOLVED:trailing
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_linecontinuationleadingspace_enforcedstyle_trailing_puts_the_offense_message_in_correct_position_also_on_indented_line
    source: |
      'this text is too' \
        ' long'
    offenses:
      - line: 2
        column_start: 3
        column_end: 4
        message: Move leading spaces to the end of the previous line.
    corrected: |
      'this text is too ' \
        'long'
    config:
      EnforcedStyle: $UNRESOLVED:trailing
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_linecontinuationleadingspace_enforcedstyle_trailing_registers_an_offense_when_2nd_line_has_multiple_leading_spaces
    source: |
      'this text contains a lot of' \
      '               spaces'
    offenses:
      - line: 2
        column_start: 1
        column_end: 16
        message: Move leading spaces to the end of the previous line.
    corrected: |
      'this text contains a lot of               ' \
      'spaces'
    config:
      EnforcedStyle: $UNRESOLVED:trailing
    interpolated: true
    verified: false

