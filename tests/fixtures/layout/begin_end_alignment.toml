cop = "Layout/BeginEndAlignment"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutbeginendalignment_behaves_like_aligned_accepts_matching_begin__end"
source = '''
begin 
end
'''
offenses = []

[tests.config]
EnforcedStyleAlignWith = "begin"
SupportedStylesAlignWith = ["start_of_line", "begin"]

[[tests]]
name = "rubocopcoplayoutbeginendalignment_behaves_like_misaligned_registers_an_offense_for_mismatched_begin_newline_end_and_autocorrects"
source = '''
begin
  end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 5
message = "`end` at 2, 2 is not aligned with `begin` at 1, 0."

[tests.config]
EnforcedStyleAlignWith = "begin"
SupportedStylesAlignWith = ["start_of_line", "begin"]

