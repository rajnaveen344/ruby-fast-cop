cop = "Layout/BeginEndAlignment"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_beginendalignment_aligned_begin"
source = '''
begin
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyleAlignWith = "$UNRESOLVED:begin"

[[tests]]
name = "rubocop_cop_layout_beginendalignment_aligned_end"
source = '''
end
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyleAlignWith = "$UNRESOLVED:begin"

[[tests]]
name = "rubocop_cop_layout_beginendalignment_misaligned_begin"
source = '''
begin
  end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 2
column_start = 2
column_end = 5
message = "`end` at 2, 2 is not aligned with `begin` at 1, 0."

[tests.config]
EnforcedStyleAlignWith = "$UNRESOLVED:begin"

