cop: Layout/SpaceBeforeBlockBraces
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_accepts_braces_surrounded_by_spaces
    source: |
      each { puts }
    offenses:
      []
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_registers_an_offense_and_corrects_left_brace_without_outer_space
    source: |
      each{ puts }
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space missing to the left of {.
    corrected: |
      each { puts }
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_registers_an_offense_and_corrects_opposite_correct_style
    source: |
      each{ puts }
      each { puts }
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space missing to the left of {.
    corrected: |
      each { puts }
      each { puts }
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space
    source: |
      foo.map{ |a|
        a.bar.to_s
      }
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: Space missing to the left of {.
    corrected: |
      foo.map { |a|
        a.bar.to_s
      }
    config:
      EnforcedStyle: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_ruby_2_7_registers_an_offense_and_corrects_opposite_correct_style
    source: |
      each{ _1 }
      each { _1 }
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space missing to the left of {.
    corrected: |
      each { _1 }
      each { _1 }
    config:
      EnforcedStyle: space
    ruby_version: ">= 2.7"

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_ruby_2_7
    source: |
      foo.map{
        _1.bar.to_s
      }
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: Space missing to the left of {.
    corrected: |
      foo.map {
        _1.bar.to_s
      }
    config:
      EnforcedStyle: space
    ruby_version: ">= 2.7"

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_ruby_3_4_registers_an_offense_and_corrects_opposite_correct_style
    source: |
      each{ it }
      each { it }
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space missing to the left of {.
    corrected: |
      each { it }
      each { it }
    config:
      EnforcedStyle: space
    ruby_version: ">= 3.4"

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_space_ruby_3_4
    source: |
      foo.map{
        it.bar.to_s
      }
    offenses:
      - line: 1
        column_start: 7
        column_end: 8
        message: Space missing to the left of {.
    corrected: |
      foo.map {
        it.bar.to_s
      }
    config:
      EnforcedStyle: space
    ruby_version: ">= 3.4"

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_no_space_registers_an_offense_and_corrects_braces_surrounded_by_spaces
    source: |
      each { puts }
    offenses:
      - line: 1
        column_start: 4
        column_end: 5
        message: Space detected to the left of {.
    corrected: |
      each{ puts }
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_no_space_registers_an_offense_and_corrects_correct_opposite_style
    source: |
      each{ puts }
      each { puts }
    offenses:
      - line: 2
        column_start: 4
        column_end: 5
        message: Space detected to the left of {.
    corrected: |
      each{ puts }
      each{ puts }
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_no_space_accepts_left_brace_without_outer_space
    source: |
      each{ puts }
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_no_space_ruby_2_7_registers_an_offense_and_corrects_correct_opposite_style
    source: |
      each{ _1 }
      each { _1 }
    offenses:
      - line: 2
        column_start: 4
        column_end: 5
        message: Space detected to the left of {.
    corrected: |
      each{ _1 }
      each{ _1 }
    config:
      EnforcedStyle: no_space
    ruby_version: ">= 2.7"

  - name: rubocop_cop_layout_spacebeforeblockbraces_when_enforcedstyle_is_no_space_with_enforcedstyle_of_style_blockdelimiters_accepts_left_brace_without_outer_space
    source: |
      let(:foo){{foo: 1, bar: 2}}
    offenses:
      []
    config:
      EnforcedStyle: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_with_space_before_empty_braces_not_allowed_accepts_empty_braces_without_outer_space
    source: |
      ->{}
    offenses:
      []
    config:
      EnforcedStyle: space
      EnforcedStyleForEmptyBraces: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_with_space_before_empty_braces_not_allowed_registers_an_offense_and_corrects_empty_braces
    source: |
      -> {}
    offenses:
      - line: 1
        column_start: 2
        column_end: 3
        message: Space detected to the left of {.
    corrected: |
      ->{}
    config:
      EnforcedStyle: space
      EnforcedStyleForEmptyBraces: no_space

  - name: rubocop_cop_layout_spacebeforeblockbraces_with_space_before_empty_braces_allowed_accepts_empty_braces_with_outer_space
    source: |
      -> {}
    offenses:
      []
    config:
      EnforcedStyle: no_space
      EnforcedStyleForEmptyBraces: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_with_space_before_empty_braces_allowed_registers_an_offense_and_corrects_empty_braces
    source: |
      ->{}
    offenses:
      - line: 1
        column_start: 2
        column_end: 3
        message: Space missing to the left of {.
    corrected: |
      -> {}
    config:
      EnforcedStyle: no_space
      EnforcedStyleForEmptyBraces: space

  - name: rubocop_cop_layout_spacebeforeblockbraces_with_invalid_value_for_enforcedstyleforemptybraces_fails_with_an_error
    source: |
      each {}
    offenses:
      []
    config:
      EnforcedStyle: no_space
      EnforcedStyleForEmptyBraces: unknown
