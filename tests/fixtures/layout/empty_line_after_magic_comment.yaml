cop: Layout/EmptyLineAfterMagicComment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_for_code_that_immediately_follows_comment
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      class Foo; end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_when_code_that_immediately_follows_rbs_inline_enabled_comment
    source: |
      ‹BASE›0‹/BASE›
      # rbs_inline: enabled
      class Foo; end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # rbs_inline: enabled
      
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_when_code_that_immediately_follows_rbs_inline_disabled_comment
    source: |
      ‹BASE›0‹/BASE›
      # rbs_inline: disabled
      class Foo; end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # rbs_inline: disabled
      
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_does_not_register_an_offense_when_code_that_immediately_follows_rbs_inline_invalid_value_comment
    source: |
      ‹BASE›0‹/BASE›
      # rbs_inline: invalid_value
      class Foo; end
    offenses:
      []

  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_when_code_that_immediately_follows_typed_comment
    source: |
      ‹BASE›0‹/BASE›
      # typed: true
      class Foo; end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # typed: true
      
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_for_documentation_immediately_following_comment
    source: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      # Documentation for Foo
      class Foo; end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # frozen_string_literal: true
      
      # Documentation for Foo
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_registers_an_offense_when_multiple_magic_comments_without_empty_line
    source: |
      ‹BASE›0‹/BASE›
      # encoding: utf-8
      # frozen_string_literal: true
      class Foo; end
    offenses:
      - line: 3
        column_start: 0
        column_end: 1
        message: Add an empty line after magic comments.
    corrected: |
      ‹BASE›0‹/BASE›
      # encoding: utf-8
      # frozen_string_literal: true
      
      class Foo; end

  - name: rubocop_cop_layout_emptylineaftermagiccomment_accepts_magic_comment_followed_by_encoding
    source: |
      ‹BASE›0‹/BASE›
