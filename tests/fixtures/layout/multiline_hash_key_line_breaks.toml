[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_without_line_break_after_opening_bracket_ignore_last_element_ignores_last_value_that_is_a_multiline_hash"
source = '''
{foo: 1, bar: {
  a: 1
}}
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = true

