cop = "Layout/MultilineHashKeyLineBreaks"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_with_line_break_after_opening_bracket_registers_an_offense_and_corrects_when_key_starts_on_same_line_as_another"
source = '''
{
  foo: 1,
  baz: 3, bar: "2"}
'''
corrected = '''
{
  foo: 1,
  baz: 3, 
bar: "2"}
'''

[[tests.offenses]]
line = 3
column_start = 10
column_end = 18
message = "Each key in a multi-line hash must start on a separate line."

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_with_line_break_after_opening_bracket_when_on_different_lines_than_brackets_but_keys_on_one_does_not_add_any_offenses"
source = '''
{
  foo: 1, bar: "2"
}
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_with_line_break_after_opening_bracket_when_on_all_keys_on_one_line_different_than_brackets_does_not_add_any_offenses"
source = '''
{
  foo => 1, bar => "2"
}
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_with_line_break_after_opening_bracket_when_key_starts_on_same_line_as_another_with_rockets_adds_an_offense"
source = '''
{
  foo => 1,
  baz => 3, bar: "2"}
'''
corrected = '''
{
  foo => 1,
  baz => 3, 
bar: "2"}
'''

[[tests.offenses]]
line = 3
column_start = 12
column_end = 20
message = "Each key in a multi-line hash must start on a separate line."

[tests.config]
AllowMultilineFinalElement = false

[[tests]]
name = "rubocopcoplayoutmultilinehashkeylinebreaks_without_line_break_after_opening_bracket_registers_an_offense_and_corrects_when_key_starts_on_same_line_as_another"
source = '''
