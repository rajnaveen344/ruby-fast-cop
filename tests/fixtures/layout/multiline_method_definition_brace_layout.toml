cop = "Layout/MultilineMethodDefinitionBraceLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_ignores_implicit_defs"
source = '''
def foo a: 1,
b: 2
end
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_ignores_singleline_defs"
source = '''
def foo(a,b)
end
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_ignores_defs_without_params"
source = '''
def foo
end
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_behaves_like_multiline_literal_brace_layout_heredoc_ignores_heredocs_that_could_share_a_last_line"
strip_trailing_newline = true
source = '''
def foo(a,
b: <<-EOM
baz
EOM
)
end
'''
offenses = []

[tests.config]
EnforcedStyle = "same_line"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_behaves_like_multiline_literal_brace_layout_heredoc_detects_heredoc_structures_that_are_safe_to_add_to"
source = '''
def foo(a,
b: {
a: <<-EOM
baz
EOM
}
)
end
'''
corrected = '''
def foo(a,
b: {
a: <<-EOM
baz
EOM
})
end
'''

[[tests.offenses]]
line = 7
column_start = 0
column_end = 1
message = "Closing method definition brace must be on the same line as the last parameter."

[tests.config]
EnforcedStyle = "same_line"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_behaves_like_multiline_literal_brace_layout_symmetrical_style_opening_brace_on_same_line_as_first_element_allows_closing_brace_on_same_line_as_last_element"
