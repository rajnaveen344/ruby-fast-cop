[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinemethoddefinitionbracelayout_behaves_like_multiline_literal_brace_layout_symmetrical_style_opening_brace_on_same_line_as_first_element_allows_closing_brace_on_same_line_as_last_multiline_element"
