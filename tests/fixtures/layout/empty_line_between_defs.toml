[[tests]]
name = "rubocopcoplayoutemptylinebetweendefs_finds_offenses_in_inner_classes"
source = '''
class K
  def m
  end

  class J
    def n
    end
    def o
    end
  end

  # checks something
  def p
  end
end
'''

