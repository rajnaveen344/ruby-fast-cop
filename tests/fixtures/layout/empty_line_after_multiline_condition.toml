cop = "Layout/EmptyLineAfterMultilineCondition"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutemptylineaftermultilinecondition_registers_an_offense_when_no_new_line_after_if_with_multiline_condition"
source = '''
if multiline &&
   condition
  do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 15
message = "Use empty line after multiline condition."

[tests.config]
References = ["https://github.com/airbnb/ruby#multiline-if-newline"]

[[tests]]
name = "rubocopcoplayoutemptylineaftermultilinecondition_does_not_register_an_offense_when_new_line_after_if_with_multiline_condition"
