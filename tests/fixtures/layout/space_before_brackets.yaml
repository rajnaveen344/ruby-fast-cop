cop: Layout/SpaceBeforeBrackets
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spacebeforebrackets_when_referencing_registers_an_offense_and_corrects_when_using_space_between_lvar_receiver_and_left_brackets
    source: |
      collection = do_something
      collection [index_or_key]
    offenses:
      - line: 2
        column_start: 10
        column_end: 11
        message: Remove the space before the opening brackets.
    corrected: |
      collection = do_something
      collection[index_or_key]

  - name: rubocop_cop_layout_spacebeforebrackets_when_referencing_registers_an_offense_and_corrects_when_using_space_between_ivar_receiver_and_left_brackets
    source: |
      @collection [index_or_key]
    offenses:
      - line: 1
        column_start: 11
        column_end: 12
        message: Remove the space before the opening brackets.
    corrected: |
      @collection[index_or_key]

  - name: rubocop_cop_layout_spacebeforebrackets_when_referencing_registers_an_offense_and_corrects_when_using_space_between_cvar_receiver_and_left_brackets
    source: |
      @@collection [index_or_key]
    offenses:
      - line: 1
        column_start: 12
        column_end: 13
        message: Remove the space before the opening brackets.
    corrected: |
      @@collection[index_or_key]

