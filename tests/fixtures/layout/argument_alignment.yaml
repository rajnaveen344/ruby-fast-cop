cop: Layout/ArgumentAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_arguments_with_single_indent
    source: |
      function(a,
        if b then c else d end)
    offenses:
      - line: 2
        column_start: 2
        column_end: 24
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      function(a,
               if b then c else d end)
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_multiline_missed_indentation
    source: |
      func(a,
             b,
      c)
    offenses:
      - line: 2
        column_start: 7
        column_end: 8
        message: Align the arguments of a method call if they span more than one line.
      - line: 3
        column_start: 0
        column_end: 1
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      func(a,
           b,
           c)
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_arguments_with_double_indent
    source: |
      function(a,
          if b then c else d end)
    offenses:
      - line: 2
        column_start: 4
        column_end: 26
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      function(a,
               if b then c else d end)
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_accepts_multiline_method_call
    source: |
      Test.config["something"] =
       true
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_accepts_correctly_aligned_arguments
    source: |
      function(a,
               0, 1,
               (x + y),
               if b then c else d end)
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_accepts_correctly_aligned_arguments_with_fullwidth_characters
    source: |
      f 'Ｒｕｂｙ', g(a,
                      b)
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_accepts_calls_that_only_span_one_line
    source: |
      find(path, s, @special[sexp[0]])
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_doesn_t_get_confused_by_a_symbol_argument
    source: |
      add_offense(index,
                  MSG % kind)
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_when_missed_indentation_kwargs
    source: |
      func1(foo: 'foo',
        bar: 'bar',
        baz: 'baz')
      func2(do_something,
        foo: 'foo',
        bar: 'bar',
        baz: 'baz')
    offenses:
      - line: 2
        column_start: 2
        column_end: 12
        message: Align the arguments of a method call if they span more than one line.
      - line: 3
        column_start: 2
        column_end: 12
        message: Align the arguments of a method call if they span more than one line.
      - line: 5
        column_start: 2
        column_end: 13
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      func1(foo: 'foo',
            bar: 'bar',
            baz: 'baz')
      func2(do_something,
            foo: 'foo',
            bar: 'bar',
            baz: 'baz')
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_splat_operator
    source: |
      func1(*a,
            *b,
            c)
      func2(a,
           *b,
            c)
      func3(*a)
    offenses:
      - line: 5
        column_start: 5
        column_end: 7
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      func1(*a,
            *b,
            c)
      func2(a,
            *b,
            c)
      func3(*a)
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_doesn_t_get_confused_by_extra_comma_at_the_end
    source: |
      func1(a,
           b,)
    offenses:
      - line: 2
        column_start: 5
        column_end: 6
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      func1(a,
            b,)
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_can_handle_a_correctly_aligned_string_literal_as_first_argument
    source: |
      add_offense(x,
                  a)
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_can_handle_a_string_literal_as_other_argument
    source: |
      add_offense(
                  "", a)
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_doesn_t_get_confused_by_a_line_break_inside_a_parameter
    source: |
      read(path, { headers:    true,
                   converters: :numeric })
    offenses:
      []
    config:
      EnforcedStyle: with_first_argument

