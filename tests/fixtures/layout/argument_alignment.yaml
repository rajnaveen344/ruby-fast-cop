  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_can_handle_heredoc_strings
    source: |
      class_eval(<<-EOS, __FILE__, __LINE__ + 1)
                  def run_#{name}_callbacks(*args)
                    a = 1
                    return value
                  end
