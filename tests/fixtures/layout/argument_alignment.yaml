    offenses:
      - line: 2
        column_start: 2
        column_end: 13
        message: Align the arguments of a method call if they span more than one line.
      - line: 4
        column_start: 6
        column_end: 25
        message: Align the arguments of a method call if they span more than one line.
      - line: 5
        column_start: 8
        column_end: 25
        message: Align the arguments of a method call if they span more than one line.
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_assigned_methods_accepts_the_first_parameter_being_on_a_new_row
