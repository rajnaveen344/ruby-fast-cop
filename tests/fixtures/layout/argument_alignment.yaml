  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_corrects_multi_line_outdented_parameters
    source: |
      create :transaction, :closed,
            account:          account,
            open_price:       1.29,
            close_price:      1.30
    offenses:
      - line: 2
        column_start: 6
        column_end: 32
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      create :transaction, :closed,
             account:          account,
             open_price:       1.29,
             close_price:      1.30
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_registers_an_offense_and_correct_multi_line_parameters_indented_too_far
    source: |
      create :transaction, :closed,
               account:          account,
               open_price:       1.29,
               close_price:      1.30
    offenses:
      - line: 2
        column_start: 9
        column_end: 35
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      create :transaction, :closed,
             account:          account,
             open_price:       1.29,
             close_price:      1.30
    config:
      EnforcedStyle: with_first_argument

  - name: rubocop_cop_layout_argumentalignment_aligned_with_first_argument_does_not_crash_in_autocorrect_on_dynamic_string_in_parameter_value
    source: |
      class MyModel < ActiveRecord::Base
        has_many :other_models,
          class_name: "legacy_name",
          order: "#{legacy_name.table_name}.published DESC"
      
      end
    offenses:
      - line: 3
        column_start: 4
        column_end: 30
        message: Align the arguments of a method call if they span more than one line.
    corrected: |
      class MyModel < ActiveRecord::Base
        has_many :other_models,
                 class_name: "legacy_name",
                 order: "#{legacy_name.table_name}.published DESC"
      
      end
