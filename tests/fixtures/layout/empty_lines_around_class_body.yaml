cop: Layout/EmptyLinesAroundClassBody
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinesaroundclassbody_when_enforcedstyle_is_no_empty_lines_registers_an_offense_for_class_body_starting_with_a_blank
    source: |
      class SomeClass
      
        do_something
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: "#{extra_begin}"
    corrected: |
      class SomeClass
        do_something
      end
    config:
      EnforcedStyle: no_empty_lines
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundclassbody_when_enforcedstyle_is_no_empty_lines_registers_an_offense_for_class_body_ending_with_a_blank
    source: |
      class SomeClass
        do_something
      
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 0
        message: "#{extra_end}"
    corrected: |
      class SomeClass
        do_something
      end
    config:
      EnforcedStyle: no_empty_lines
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundclassbody_when_enforcedstyle_is_no_empty_lines_autocorrects_singleton_class_body_containing_only_a_blank
