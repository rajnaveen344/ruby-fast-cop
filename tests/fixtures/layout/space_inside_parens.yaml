      f( x( 3 ))
      g( f( x( 3 )), 5 )
    offenses:
      []
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_compact_accepts_three_consecutive_left_parentheses
