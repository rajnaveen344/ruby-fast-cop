      g( f( x( 3 )))
      w( g( f( x( 3 ))), 5 )
    offenses:
      []
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_compact_registers_an_offense_for_space_between_consecutive_brackets
    source: |
      f( ( 3 + 5 ) * x )
      g( ( ( 3 + 5 ) * f ) ** x, 5 )
      f( x( 3 ) )
      g( f( x( 3 ) ), 5 )
    offenses:
      - line: 1
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
      - line: 2
        column_start: 4
        column_end: 5
        message: Space inside parentheses detected.
      - line: 2
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
      - line: 3
        column_start: 9
        column_end: 10
        message: Space inside parentheses detected.
      - line: 4
        column_start: 12
        column_end: 13
        message: Space inside parentheses detected.
    corrected: |
      f(( 3 + 5 ) * x )
      g((( 3 + 5 ) * f ) ** x, 5 )
      f( x( 3 ))
      g( f( x( 3 )), 5 )
    config:
      EnforcedStyle: compact

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_compact_registers_multiple_offenses_for_a_missing_and_extra_space_between_consecutive_brackets
    source: |
      g( (( 3 + 5 ) * f) ** x, 5)
                       ^ No space inside parentheses detected.
      (g( f( x( 3 ) ), 5 ) )
                   ^ Space inside parentheses detected.
    offenses:
      - line: 1
        column_start: 26
        column_end: 27
        message: No space inside parentheses detected.
      - line: 2
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
      - line: 3
        column_start: 20
        column_end: 21
        message: Space inside parentheses detected.
      - line: 4
        column_start: 1
        column_end: 2
        message: No space inside parentheses detected.
    corrected: |
      g((( 3 + 5 ) * f ) ** x, 5 )
      ( g( f( x( 3 )), 5 ))
    config:
      EnforcedStyle: compact
