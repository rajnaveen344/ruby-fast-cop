cop: Layout/SpaceInsideParens
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_no_space_registers_an_offense_for_spaces_inside_parens
    source: |
      f( 3)
      g = (a + 3 )
      f( )
    offenses:
      - line: 1
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
      - line: 2
        column_start: 10
        column_end: 11
        message: Space inside parentheses detected.
      - line: 3
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
    corrected: |
      f(3)
      g = (a + 3)
      f()
    config:
      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_no_space_registers_an_offense_for_space_around_heredoc_start
    source: |
      f( <<~HEREDOC )
        This is my text
      HEREDOC
    offenses:
      - line: 1
        column_start: 13
        column_end: 14
        message: Space inside parentheses detected.
      - line: 1
        column_start: 2
        column_end: 3
        message: Space inside parentheses detected.
    corrected: |
      f(<<~HEREDOC)
        This is my text
      HEREDOC
    config:
      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_no_space_accepts_parentheses_in_block_parameter_list
    source: |
      list.inject(Tms.new) { |sum, (label, item)|
      }
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:no_space
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_spaceinsideparens_when_enforcedstyle_is_no_space_accepts_parentheses_with_no_spaces
