source = '''
[a,
<<-EOM
baz
EOM
]
'''
offenses = []

[tests.config]
EnforcedStyle = "same_line"

[[tests]]
name = "rubocopcoplayoutmultilinearraybracelayout_behaves_like_multiline_literal_brace_layout_heredoc_detects_heredoc_structures_that_are_safe_to_add_to"
source = '''
[a,
{
a: <<-EOM
baz
EOM
}
]

'''
corrected = '''
[a,
{
a: <<-EOM
baz
EOM
}]

'''

[[tests.offenses]]
line = 7
column_start = 0
column_end = 1
message = "The closing array brace must be on the same line as the last array element."

[tests.config]
EnforcedStyle = "same_line"

