cop = "Layout/MultilineArrayBraceLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilinearraybracelayout_ignores_implicit_arrays"
source = '''
foo = a,
b
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinearraybracelayout_ignores_singleline_arrays"
strip_trailing_newline = true
source = '''
[a, b, c]
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinearraybracelayout_ignores_empty_arrays"
