        SOMETHING = <<GOO
      text
      more text
      foo
      GOO
        def baz
          do_something("#{x}")
        end
      end
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 10
        message: Use 2 (not 0) spaces for indentation.
    corrected: |
      module Foo
        module Bar
          SOMETHING = <<GOO
      text
      more text
      foo
      GOO
          def baz
            do_something("#{x}")
          end
        end
      end
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns

