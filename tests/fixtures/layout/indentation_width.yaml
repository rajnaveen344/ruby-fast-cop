cop: Layout/IndentationWidth
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_4_for_a_file_with_byte_order_mark_accepts_correctly_indented_method_definition
    source: |
      #{bom}class Test
          def method
          end
      end
    offenses:
      []
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns
    interpolated: true

  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_4_with_ignored_patterns_set_accepts_unindented_lines_for_those_keywords
    source: |
      module Foo
      class Test
          if blah
              if blah == Apple
      puts "sweet"
              elsif blah == Lemon
      puts "sour"
              elsif blah == popcorn
                  puts "salty"
              end
          end
      end
      end
    offenses:
      []
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns

  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_4_with_if_statement_registers_an_offense_for_bad_indentation_of_an_if_body
    source: |
      if cond
       func
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Use 4 (not 1) spaces for indentation.
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns

  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_4_registers_and_corrects_offense_for_bad_indentation
    source: |
      if a1
         b1
         b1
      elsif a2
       b2
      else
          c
      end
    offenses:
      - line: 2
        column_start: 0
        column_end: 3
        message: Use 4 (not 3) spaces for indentation.
      - line: 5
        column_start: 0
        column_end: 1
        message: Use 4 (not 1) spaces for indentation.
    corrected: |
      if a1
          b1
         b1
      elsif a2
          b2
      else
          c
      end
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns

