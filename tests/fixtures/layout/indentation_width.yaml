  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_2_with_if_statement_does_not_correct_in_scopes_that_contain_block_comments
    source: |
      module Foo
      # The class has a block comment within, so it's not corrected.
      class Bar
      =begin
      This is a nice long
      comment
      which spans a few lines
      =end
      # The method has no block comment inside,
      # but it's within a class that has a block
      # comment, so it's not corrected either.
      def baz
      do_something
      end
      end
      end
    offenses:
      - line: 3
        column_start: 0
        column_end: 9
        message: Use 2 (not 0) spaces for indentation.
      - line: 12
        column_start: 0
        column_end: 7
        message: Use 2 (not 0) spaces for indentation.
      - line: 13
        column_start: 0
        column_end: 12
        message: Use 2 (not 0) spaces for indentation.
    config:
      EnforcedStyleAlignWith: enforced_style_align_with
      SupportedStylesAlignWith: [start_of_line, relative_to_receiver]
      Width: width
      AllowedPatterns: allowed_patterns

  - name: rubocop_cop_layout_indentationwidth_with_width_set_to_2_with_if_statement_does_not_indent_heredoc_strings
    source: |
