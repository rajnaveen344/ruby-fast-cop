cop = "Layout/SpaceAroundEqualsInParameterDefault"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspacearoundequalsinparameterdefault_when_enforcedstyle_is_space_registers_an_offense_and_corrects_default_value_assignment_without_space"
source = '''
def f(x, y=0, z= 1)
end
'''
corrected = '''
def f(x, y = 0, z = 1)
end
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 11
message = "Surrounding space missing in default value assignment."

[[tests.offenses]]
line = 1
column_start = 15
column_end = 17
message = "Surrounding space missing in default value assignment."

[tests.config]
EnforcedStyle = "space"

