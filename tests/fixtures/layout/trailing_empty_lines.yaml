cop: Layout/TrailingEmptyLines
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_accepts_final_newline
    source: |
      x = 0
    offenses:
      []
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_accepts_final_blank_lines_if_they_come_after_end
    source: |
      x = 0
      
      __END__
    offenses:
      []
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_accepts_final_blank_lines_if_they_come_after_end_in_empty_file
    source: |
      __END__
      
    offenses:
      []
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_registers_an_offense_for_multiple_trailing_blank_lines
    source: |
      x = 0
      
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: 3 trailing blank lines detected.
    corrected: |
      x = 0
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_registers_an_offense_for_multiple_blank_lines_in_an_empty_file
    source: |
      
      
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: 3 trailing blank lines detected.
    corrected: |
      
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_registers_an_offense_for_no_final_newline_after_assignment
    source: |
      x = 0
    offenses:
      - line: 1
        column_start: 5
        column_end: 5
        message: Final newline missing.
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_registers_an_offense_for_no_final_newline_after_block_comment
    source: |
      puts 'testing rubocop when final new line is missing
                                after block comments'
      
      =begin
      first line
      second line
      third line
      =end
    offenses:
      - line: 8
        column_start: 4
        column_end: 4
        message: Final newline missing.
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_autocorrects_even_if_some_lines_have_space
    source: |
      x = 0
      
      #{trailing_whitespace}
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: 4 trailing blank lines detected.
    corrected: |
      x = 0
    config:
      EnforcedStyle: final_newline
    interpolated: true

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_accepts_the_form_string_n_n_at_the_end_of_file
    source: |
      %
      
    offenses:
      []
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_newline_accepts_when_assigning_the_form_string_n_n_to_a_variable_at_the_end_of_file
    source: |
      x = %
      
    offenses:
      []
    config:
      EnforcedStyle: final_newline

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_registers_an_offense_for_final_newline
    source: |
      x = 0
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: Trailing blank line missing.
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_registers_an_offense_for_multiple_trailing_blank_lines
    source: |
      x = 0
      
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: 3 trailing blank lines instead of 1 detected.
    corrected: |
      x = 0
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_registers_an_offense_for_multiple_blank_lines_in_an_empty_file
    source: |
      
      
    offenses:
      - line: 2
        column_start: 0
        column_end: 0
        message: 3 trailing blank lines instead of 1 detected.
    corrected: |
      
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_registers_an_offense_for_no_final_newline
    source: |
      x = 0
    offenses:
      - line: 1
        column_start: 5
        column_end: 5
        message: Final newline missing.
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_accepts_final_blank_line
    source: |
      x = 0
      
    offenses:
      []
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_accepts_the_form_string_n_n_at_the_end_of_file
    source: |
      %
      
    offenses:
      []
    config:
      EnforcedStyle: final_blank_line

  - name: rubocop_cop_layout_trailingemptylines_when_enforcedstyle_is_final_blank_line_accepts_when_assigning_the_form_string_n_n_to_a_variable_at_the_end_of_file
    source: |
      x = %
      
    offenses:
      []
    config:
      EnforcedStyle: final_blank_line
