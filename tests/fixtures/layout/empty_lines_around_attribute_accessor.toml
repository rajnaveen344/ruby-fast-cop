cop = "Layout/EmptyLinesAroundAttributeAccessor"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutemptylinesaroundattributeaccessor_registers_an_offense_and_corrects_for_code_that_immediately_follows_accessor"
source = '''
attr_accessor :foo
def do_something
end
'''
corrected = '''
attr_accessor :foo

def do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 18
message = "Add an empty line after attribute accessor."

[tests.config]
AllowAliasSyntax = true
AllowedMethods = ["alias_method", "public", "protected", "private"]

