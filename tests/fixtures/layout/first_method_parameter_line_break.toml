cop = "Layout/FirstMethodParameterLineBreak"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutfirstmethodparameterlinebreak_registers_an_offense_and_corrects_params_listed_on_the_first_line"
source = '''
def foo(bar,
  baz)
  do_something
end
'''
corrected = '''
def foo(
bar,
  baz)
  do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 11
message = "Add a line break before the first parameter of a multi-line method parameter list."

[tests.config]
AllowMultilineFinalElement = false

