b: <<-EOM
baz
EOM
}
'''
offenses = []

[tests.config]
EnforcedStyle = "same_line"

[[tests]]
name = "rubocopcoplayoutmultilinehashbracelayout_behaves_like_multiline_literal_brace_layout_heredoc_detects_heredoc_structures_that_are_safe_to_add_to"
source = '''
{a: 1,
b: {
a: <<-EOM
baz
EOM
}
}
'''
corrected = '''
{a: 1,
b: {
a: <<-EOM
baz
EOM
}}
'''

[[tests.offenses]]
line = 7
column_start = 0
column_end = 1
message = "Closing hash brace must be on the same line as the last hash element."

[tests.config]
EnforcedStyle = "same_line"

