cop = "Layout/MultilineHashBraceLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_multilinehashbracelayout_ignores_implicit_hashes"
source = '''
foo(a: 1,
b: 2)
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:symmetrical"

[[tests]]
name = "rubocop_cop_layout_multilinehashbracelayout_ignores_single_line_hashes"
source = '''
{a: 1, b: 2}
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:symmetrical"

[[tests]]
name = "rubocop_cop_layout_multilinehashbracelayout_ignores_empty_hashes"
source = '''
{}
'''
interpolated = true
verified = false
offenses = []

[tests.config]
EnforcedStyle = "$UNRESOLVED:symmetrical"
