cop = "Layout/MultilineHashBraceLayout"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutmultilinehashbracelayout_ignores_implicit_hashes"
source = '''
foo(a: 1,
b: 2)
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinehashbracelayout_ignores_singleline_hashes"
strip_trailing_newline = true
source = '''
{a: 1, b: 2}
'''
offenses = []

[tests.config]
EnforcedStyle = "symmetrical"

[[tests]]
name = "rubocopcoplayoutmultilinehashbracelayout_ignores_empty_hashes"
