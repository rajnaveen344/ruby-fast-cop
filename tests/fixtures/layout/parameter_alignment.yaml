cop: Layout/ParameterAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_registers_an_offense_and_corrects_parameters_with_single_indent
    source: |
      def method(a,
        b)
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Align the parameters of a method definition if they span more than one line.
    corrected: |
      def method(a,
                 b)
      end
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_registers_an_offense_and_corrects_parameters_with_double_indent
    source: |
      def method(a,
          b)
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 5
        message: Align the parameters of a method definition if they span more than one line.
    corrected: |
      def method(a,
                 b)
      end
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_accepts_parameter_lists_on_a_single_line
    source: |
      def method(a, b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_accepts_proper_indentation
    source: |
      def method(a,
                 b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_accepts_the_first_parameter_being_on_a_new_row
    source: |
      def method(
        a,
        b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_accepts_a_method_definition_without_parameters
    source: |
      def method
      end
    offenses:
      []
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_doesn_t_get_confused_by_splat
    source: |
      def func2(a,
               *b,
                c)
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 11
        message: Align the parameters of a method definition if they span more than one line.
    corrected: |
      def func2(a,
                *b,
                c)
      end
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_defining_self_method_registers_an_offense_and_corrects_parameters_with_single_indent
    source: |
      def self.method(a,
        b)
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 3
        message: Align the parameters of a method definition if they span more than one line.
    corrected: |
      def self.method(a,
                      b)
      end
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_defining_self_method_accepts_proper_indentation
    source: |
      def self.method(a,
                      b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_first_parameter_registers_an_offense_and_corrects_alignment_in_simple_case
    source: |
      def func(a,
             b,
      c)
        123
      end
    offenses:
      - line: 2
        column_start: 7
        column_end: 8
        message: Align the parameters of a method definition if they span more than one line.
      - line: 3
        column_start: 0
        column_end: 1
        message: Align the parameters of a method definition if they span more than one line.
    corrected: |
      def func(a,
               b,
               c)
        123
      end
    config:
      EnforcedStyle: with_first_parameter

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_registers_an_offense_and_corrects_parameters_aligned_to_first_param
    source: |
      def method(a,
                 b)
      end
    offenses:
      - line: 2
        column_start: 11
        column_end: 12
        message: Use one level of indentation for parameters following the first line of a multi-line method definition.
    corrected: |
      def method(a,
        b)
      end
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_registers_an_offense_and_corrects_parameters_with_double_indent
    source: |
      def method(a,
          b)
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 5
        message: Use one level of indentation for parameters following the first line of a multi-line method definition.
    corrected: |
      def method(a,
        b)
      end
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_accepts_parameter_lists_on_a_single_line
    source: |
      def method(a, b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_accepts_proper_indentation
    source: |
      def method(a,
        b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_accepts_the_first_parameter_being_on_a_new_row
    source: |
      def method(
        a,
        b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_accepts_a_method_definition_without_parameters
    source: |
      def method
      end
    offenses:
      []
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_doesn_t_get_confused_by_splat
    source: |
      def func2(a,
               *b,
                c)
      end
    offenses:
      - line: 2
        column_start: 9
        column_end: 11
        message: Use one level of indentation for parameters following the first line of a multi-line method definition.
      - line: 3
        column_start: 10
        column_end: 11
        message: Use one level of indentation for parameters following the first line of a multi-line method definition.
    corrected: |
      def func2(a,
        *b,
        c)
      end
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_defining_self_method_registers_an_offense_and_corrects_parameters_aligned_to_first_param
    source: |
      def self.method(a,
                      b)
      end
    offenses:
      - line: 2
        column_start: 16
        column_end: 17
        message: Use one level of indentation for parameters following the first line of a multi-line method definition.
    corrected: |
      def self.method(a,
        b)
      end
    config:
      EnforcedStyle: with_fixed_indentation

  - name: rubocop_cop_layout_parameteralignment_aligned_with_fixed_indentation_defining_self_method_accepts_proper_indentation
    source: |
      def self.method(a,
        b)
      end
    offenses:
      []
    config:
      EnforcedStyle: with_fixed_indentation
