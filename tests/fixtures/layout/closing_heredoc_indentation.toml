[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_registers_an_offense_for_bad_indentation_of_a_closing_heredoc"
source = '''
class Test
  def foo
    <<-SQL
      bar
  SQL
  end
end
'''
corrected = '''
class Test
  def foo
    <<-SQL
      bar
    SQL
  end
end
'''

[[tests.offenses]]
line = 5
column_start = 0
column_end = 5
message = "`SQL` is not aligned with `<<-SQL`."

[tests.config]
Enabled = true

[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_registers_an_offense_for_incorrectly_indented_empty_heredocs"
source = '''
def foo
  <<-NIL

    NIL
end
'''
corrected = '''
def foo
  <<-NIL

  NIL
end
'''

[[tests.offenses]]
line = 4
column_start = 0
column_end = 7
message = "`NIL` is not aligned with `<<-NIL`."

[tests.config]
Enabled = true

[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_does_not_register_an_offense_for_correctly_indented_empty_heredocs"
source = '''
