cop = "Layout/ClosingHeredocIndentation"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_accepts_correctly_indented_closing_heredoc"
source = '''
class Test
  def foo
    <<-SQL
      bar
    SQL
  end
end
'''
offenses = []

[tests.config]
Enabled = true

[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_accepts_correctly_indented_closing_heredoc_when_heredoc_contents_is_after_closing_heredoc"
source = '''
include_examples :offense,
                 <<-EOS
                   foo
                     bar
                 EOS
'''
offenses = []

[tests.config]
Enabled = true

[[tests]]
name = "rubocopcoplayoutclosingheredocindentation_accepts_correctly_indented_closing_heredoc_when_heredoc_contents_with_blank_line"
source = '''
def_node_matcher :eval_without_location?, <<~PATTERN
  {
    (send $(send _ $:sort ...) ${:[] :at :slice} {(int 0) (int -1)})

    (send $(send _ $:sort_by _) ${:last :first})
  }
PATTERN
'''
offenses = []

[tests.config]
Enabled = true

