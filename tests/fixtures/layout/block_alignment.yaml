  - name: rubocop_cop_layout_blockalignment_when_the_method_part_is_a_call_chain_that_spans_several_lines_accepts_pretty_alignment_style
    source: |
      def foo(bar)
        bar.get_stuffs
            .reject do |stuff|
              stuff.with_a_very_long_expression_that_doesnt_fit_the_line
            end.select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
            end
            .select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
            end
      end
    offenses:
      []
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_when_the_method_part_is_a_call_chain_that_spans_several_lines_registers_offenses_for_misaligned_ends
    source: |
      def foo(bar)
        bar.get_stuffs
            .reject do |stuff|
              stuff.with_a_very_long_expression_that_doesnt_fit_the_line
              end.select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
          end
            .select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
              end
      end
    offenses:
      - line: 5
        column_start: 8
        column_end: 11
        message: "`end` at 5, 8 is not aligned with `bar.get_stuffs` at 2, 2 or `.reject do |stuff|` at 3, 6."
      - line: 7
        column_start: 4
        column_end: 7
        message: "`end` at 7, 4 is not aligned with `bar.get_stuffs` at 2, 2 or `end.select do |stuff|` at 5, 8."
      - line: 10
        column_start: 8
        column_end: 11
        message: "`end` at 10, 8 is not aligned with `bar.get_stuffs` at 2, 2 or `.select do |stuff|` at 8, 6."
    corrected: |
      def foo(bar)
        bar.get_stuffs
            .reject do |stuff|
              stuff.with_a_very_long_expression_that_doesnt_fit_the_line
        end.select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
        end
            .select do |stuff|
              stuff.another_very_long_expression_that_doesnt_fit_the_line
        end
      end
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_when_the_method_part_is_a_call_chain_that_spans_several_lines_accepts_end_indented_as_the_start_of_the_block
    source: |
      ‹BASE›0‹/BASE›
             my_object.chaining_this_very_long_method(with_a_parameter)
                 .and_one_with_a_block do
               do_something
             end
      # Other variant:
             my_object.chaining_this_very_long_method(
                 with_a_parameter).and_one_with_a_block do
               do_something
             end
    offenses:
      []
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_when_the_method_part_is_a_call_chain_that_spans_several_lines_accepts_two_kinds_of_end_alignment
    source: |
      ‹BASE›0‹/BASE›
      # Aligned with start of line where do is:
      params = default_options.merge(options)
                .delete_if { |k, v| v.nil? }
                .each_with_object({}) do |(k, v), new_hash|
                  new_hash[k.to_s] = v.to_s
                end
      # Aligned with start of the whole expression:
      params = default_options.merge(options)
                .delete_if { |k, v| v.nil? }
                .each_with_object({}) do |(k, v), new_hash|
                  new_hash[k.to_s] = v.to_s
      end
    offenses:
      []
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_when_variables_of_a_mass_assignment_spans_several_lines_accepts_end_aligned_with_the_variables
