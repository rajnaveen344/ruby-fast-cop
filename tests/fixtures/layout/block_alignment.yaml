cop: Layout/BlockAlignment
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_blockalignment_when_the_block_has_no_arguments_registers_an_offense_for_mismatched_block_end
    source: |
      test do
        end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: "`end` at 2, 2 is not aligned with `test do` at 1, 0."
    corrected: |
      test do
      end
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_when_the_block_has_arguments_registers_an_offense_for_mismatched_block_end
    source: |
      test do |ala|
        end
    offenses:
      - line: 2
        column_start: 2
        column_end: 5
        message: "`end` at 2, 2 is not aligned with `test do |ala|` at 1, 0."
    corrected: |
      test do |ala|
      end
    config:
      EnforcedStyleAlignWith: $UNRESOLVED:either
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_blockalignment_accepts_a_block_end_that_does_not_begin_its_line
    source: |
      scope :bar, lambda { joins(:baz)
