cop: Layout/EmptyLinesAroundArguments
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_for_empty_line_before_arg
    source: |
      ‹BASE›0‹/BASE›
      foo(
      
      #{empty_line_annotation}
        bar
      )
    offenses:
      []
    corrected: |
      foo(
        bar
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_for_empty_line_after_arg
    source: |
      ‹BASE›0‹/BASE›
      bar(
        [baz, qux]
      
      #{empty_line_annotation}
      )
    offenses:
      []
    corrected: |
      bar(
        [baz, qux]
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_for_empty_line_between_args
    source: |
      ‹BASE›0‹/BASE›
      foo.do_something(
        baz,
      
      #{empty_line_annotation}
        qux: 0
      )
    offenses:
      []
    corrected: |
      foo.do_something(
        baz,
        qux: 0
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offenses_when_multiple_empty_lines_are_detected
    source: |
      ‹BASE›0‹/BASE›
      foo(
        baz,
      
      #{empty_line_annotation}
        qux,
      
      #{empty_line_annotation}
        biz,
      
      #{empty_line_annotation}
      )
    offenses:
      []
    corrected: |
      foo(
        baz,
        qux,
        biz,
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_when_args_start_on_definition_line
    source: |
      ‹BASE›0‹/BASE›
      foo(biz,
      
      #{empty_line_annotation}
          baz: 0)
    offenses:
      []
    corrected: |
      foo(biz,
          baz: 0)
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_when_empty_line_between_normal_arg_block_arg
    source: |
      ‹BASE›0‹/BASE›
      Foo.prepend(
        a,
      
      #{empty_line_annotation}
        Module.new do
          def something; end
      
          def anything; end
        end
      )
    offenses:
      []
    corrected: |
      Foo.prepend(
        a,
        Module.new do
          def something; end
      
          def anything; end
        end
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_on_correct_line_for_single_offense_example
    source: |
      ‹BASE›0‹/BASE›
      class Foo
      
        include Bar
      
        def baz(qux)
          fizz(
            qux,
      
      #{empty_line_annotation}
            10
          )
        end
      end
    offenses:
      []
    corrected: |
      class Foo
      
        include Bar
      
        def baz(qux)
          fizz(
            qux,
            10
          )
        end
      end
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_on_correct_lines_for_multi_offense_example
    source: |
      ‹BASE›0‹/BASE›
      something(1, 5)
      something_else
      
      foo(biz,
      
      #{empty_line_annotation}
          qux)
      
      quux.map do
      
      end.another.thing(
      
      #{empty_line_annotation}
        [baz]
      )
    offenses:
      []
    corrected: |
      something(1, 5)
      something_else
      
      foo(biz,
          qux)
      
      quux.map do
      
      end.another.thing(
        [baz]
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_when_using_safe_navigation_operator_registers_and_autocorrects_offense_for_empty_line_before_arg
    source: |
      ‹BASE›0‹/BASE›
      receiver&.foo(
      
      #{empty_line_annotation}
        bar
      )
    offenses:
      []
    corrected: |
      receiver&.foo(
        bar
      )
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_autocorrects_empty_line_when_args_start_on_definition_line
    source: |
      ‹BASE›0‹/BASE›
      bar(qux,
      
      #{empty_line_annotation}
          78)
    offenses:
      []
    corrected: |
      bar(qux,
          78)
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_one_line_methods
    source: |
      foo(bar)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_multiple_listed_mixed_args
    source: |
      foo(
        bar,
        [],
        baz = nil,
        qux: 2
      )
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_listed_args_starting_on_definition_line
    source: |
      foo(bar,
          [],
          qux: 2)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_block_argument_with_empty_line
    source: |
      Foo.prepend(Module.new do
        def something; end
      
        def anything; end
      end)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_method_with_argument_that_trails_off_block
    source: |
      fred.map do
        <<-EOT
          bar
      
          foo
        EOT
      end.join("
      ")
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_method_with_no_arguments_that_trails_off_block
    source: |
      foo.baz do
      
        bar
      end.compact
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_method_with_argument_that_trails_off_heredoc
    source: |
      bar(<<-DOCS)
        foo
      
      DOCS
        .call!(true)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_when_blank_line_is_inserted_between_method_with_arguments_and_receiver
    source: |
      foo.
      
        bar(arg)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_accepts_multiline_style_argument_for_method_call_without_selector
    source: |
      foo.(
        arg
      )
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_ignores_a_multiline_string_with_only_whitespace_on_one_line_and_style_method_call_after
    source: |
      format('%d
      
      ', 1)[0]
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_with_one_argument_ignores_empty_lines_inside_of_method_arguments
    source: |
      private(def bar
      
        baz
      end)
    offenses:
      []

  - name: rubocop_cop_layout_emptylinesaroundarguments_when_no_extra_lines_with_multiple_arguments_ignores_empty_lines_inside_of_method_arguments
    source: |
      foo(:bar, [1,
      
                 2]
      )
    offenses:
      []
