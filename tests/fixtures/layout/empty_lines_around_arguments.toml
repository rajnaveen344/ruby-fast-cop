cop = "Layout/EmptyLinesAroundArguments"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_layout_emptylinesaroundarguments_when_extra_lines_registers_and_autocorrects_offense_for_empty_line_before_arg"
source = '''
foo(

#{empty_line_annotation}
  bar
)
'''
corrected = '''
foo(
  bar
)
'''
interpolated = true
verified = false
offenses = []

