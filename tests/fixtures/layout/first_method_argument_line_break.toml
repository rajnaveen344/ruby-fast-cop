bar,
  baz)
'''

[[tests.offenses]]
line = 1
column_start = 14
column_end = 17
message = "Add a line break before the first argument of a multi-line method argument list."

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_last_element_can_be_multiline_ignores_last_argument_that_is_a_multiline_hash"
source = '''
foo(bar, {
  a: b
})
'''
offenses = []

[tests.config]
AllowMultilineFinalElement = true

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_last_element_can_be_multiline_ignores_single_argument_that_is_a_multiline_hash"
source = '''
