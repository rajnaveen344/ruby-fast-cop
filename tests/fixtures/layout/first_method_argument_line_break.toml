bar,
  baz)
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "Add a line break before the first argument of a multi-line method argument list."

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_args_listed_on_the_first_line_registers_an_offense_and_corrects_using_safe_navigation_operator"
source = '''
receiver&.foo(bar,
  baz)
'''
corrected = '''
