cop = "Layout/FirstMethodArgumentLineBreak"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_registers_an_offense_and_corrects_hash_arg_spanning_multiple_lines"
source = '''
something(3, bar: 1,
baz: 2)
'''
corrected = '''
something(
3, bar: 1,
baz: 2)
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 11
message = "Add a line break before the first argument of a multi-line method argument list."

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_registers_an_offense_and_corrects_hash_arg_without_a_line_break_before_the_first_pair"
source = '''
something(bar: 1,
baz: 2)
'''
corrected = '''
something(
bar: 1,
baz: 2)
'''

[[tests.offenses]]
line = 1
column_start = 10
column_end = 16
message = "Add a line break before the first argument of a multi-line method argument list."

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_ignores_arguments_listed_on_a_single_line"
source = '''
foo(bar, baz, bing)
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_ignores_kwargs_listed_on_a_single_line_when_the_arguments_are_used_in_super"
source = '''
super(foo: 1, bar: 2)
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_ignores_arguments_without_parens"
source = '''
foo bar,
  baz
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_ignores_methods_without_arguments"
source = '''
foo
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_args_listed_on_the_first_line_registers_an_offense_and_corrects"
source = '''
foo(bar,
  baz)
'''
corrected = '''
foo(
bar,
  baz)
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Add a line break before the first argument of a multi-line method argument list."

[[tests]]
name = "rubocopcoplayoutfirstmethodargumentlinebreak_args_listed_on_the_first_line_registers_an_offense_and_corrects_using_super"
source = '''
