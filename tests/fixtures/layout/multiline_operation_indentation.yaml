    corrected: |
      def config_to_allow_offenses
        a +
          b == c
      end
    config:
      EnforcedStyle: $UNRESOLVED:aligned
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_registers_indented_code_on_lhs_of_equality_operator_in_the_modifier_method_definition
    source: |
      private def config_to_allow_offenses
        a +
