cop: Layout/MultilineOperationIndentation
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_multilineoperationindentation_accepts_unary_operations
    source: |
      call a,
           !b
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_operator_without_arguments
    source: |
      begin
      rescue =>
        A[]
      end
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_indented_operands_in_ordinary_statement
    source: |
      a +
        b
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_indented_operands_inside_and_outside_a_block
    source: |
      a = b.map do |c|
        c +
          b +
          d do
            x +
              y
          end
      end
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_registers_an_offense_and_corrects_no_indentation_of_second_line
    source: |
      a +
      b
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Use 2 (not 0) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a +
        b

  - name: rubocop_cop_layout_multilineoperationindentation_registers_an_offense_and_corrects_one_space_indentation_of_second_line
    source: |
      a +
       b
    offenses:
      - line: 2
        column_start: 1
        column_end: 2
        message: Use 2 (not 1) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a +
        b

  - name: rubocop_cop_layout_multilineoperationindentation_does_not_check_method_calls
    source: |
      a
       .(args)
      
      Foo
      .a
        .b
      
      Foo
      .a
        .b(c)
      
      Foo.&(
          foo,
          bar
      )
      
      expect { Foo.new }.
        to change { Bar.count }.
            from(1).to(2)
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_registers_an_offense_and_corrects_three_space_indentation_of_second_line
    source: |
      a ||
         b
      c and
         d
    offenses:
      - line: 2
        column_start: 3
        column_end: 4
        message: Use 2 (not 3) spaces for indenting an expression spanning multiple lines.
      - line: 4
        column_start: 3
        column_end: 4
        message: Use 2 (not 3) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a ||
        b
      c and
        d

  - name: rubocop_cop_layout_multilineoperationindentation_registers_an_offense_and_corrects_extra_indentation_of_third_line
    source: |
      a ||
        b ||
          c
    offenses:
      - line: 3
        column_start: 4
        column_end: 5
        message: Use 2 (not 4) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a ||
        b ||
        c

  - name: rubocop_cop_layout_multilineoperationindentation
    source: |
      [
       a +
       b
      ]
    offenses:
      - line: 3
        column_start: 1
        column_end: 2
        message: Use 2 (not 0) spaces for indenting an expression spanning multiple lines.
    corrected: |
      [
       a +
         b
      ]

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_indented_operands_in_an_array
    source: |
      dm[i][j] = [
        dm[i-1][j-1] +
          (this[j-1] == that[i-1] ? 0 : sub),
        dm[i][j-1] + ins,
        dm[i-1][j] + del
      ].min
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_two_spaces_indentation_in_assignment_of_local_variable
    source: |
      a =
        'foo' +
        'bar'
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_two_spaces_indentation_in_assignment_of_array_element
    source: |
      a['test'] =
        'foo' +
        'bar'
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_two_spaces_indentation_of_second_line
    source: |
      a ||
        b
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_no_extra_indentation_of_third_line
    source: |
      a &&
        b &&
        c
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_indented_operands_in_for_body
    source: |
      for x in a
        something &&
          something_else
      end
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_alignment_inside_a_grouped_expression
    source: |
      (a +
       b)
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_an_expression_where_the_first_operand_spans_multiple_lines
    source: |
      subject.each do |item|
        result = resolve(locale) and return result
      end and nil
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation_accepts_any_indentation_of_parameters_to
    source: |
      payment = Models::IncomingPayments[
              id:      input['incoming-payment-id'],
                 user_id: @user[:id]]
    offenses:
      []

  - name: rubocop_cop_layout_multilineoperationindentation
    source: |
      a +
      b < 3
    offenses:
      - line: 2
        column_start: 0
        column_end: 1
        message: Use 2 (not 0) spaces for indenting an expression spanning multiple lines.
    corrected: |
      a +
        b < 3

  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_accepts_aligned_operands_in_if_condition
    source: |
      if a +
         b
        something
      end
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:aligned
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_registers_an_offense_and_corrects_indented_operands_in_if_condition
    source: |
      if a +
          b
        something
      end
    offenses:
      - line: 2
        column_start: 4
        column_end: 5
        message: Align the operands of a condition in an `if` statement spanning multiple lines.
    corrected: |
      if a +
         b
        something
      end
    config:
      EnforcedStyle: $UNRESOLVED:aligned
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_registers_indented_code_on_lhs_of_equality_operator_in_the_method_definition
    source: |
      def config_to_allow_offenses
