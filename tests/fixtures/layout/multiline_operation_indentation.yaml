  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_accepts_indented_operands_inside_block_assignment
    source: |
      a = b.map do |c|
        c +
          d
      end
      
      requires_interpolation = node.children.any? do |s|
        s.type == :dstr ||
          s.source_range.source =~ REGEXP
      end
