      []
    config:
      EnforcedStyle: $UNRESOLVED:aligned
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_multilineoperationindentation_when_enforcedstyle_is_aligned_accepts_indented_operands_with_ternary_operators
