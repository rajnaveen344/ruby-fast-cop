cop = "Layout/SpaceAfterComma"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_block_argument_commas_without_space_behaves_like_ends_with_an_item_registers_an_offense_and_does_autocorrection"
source = '''
each { |s,t| }
'''
corrected = '''
each { |s, t| }
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 10
message = "Space missing after comma."

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_block_argument_commas_without_space_behaves_like_trailing_comma_accepts_the_last_comma"
source = '''
each { |s, t,| }
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_array_index_commas_without_space_behaves_like_ends_with_an_item_registers_an_offense_and_does_autocorrection"
source = '''
formats[0,1]
'''
corrected = '''
formats[0, 1]
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 10
message = "Space missing after comma."

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_array_index_commas_without_space_behaves_like_trailing_comma_accepts_the_last_comma"
source = '''
formats[0,]
'''
offenses = []

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_method_call_arg_commas_without_space_behaves_like_ends_with_an_item_registers_an_offense_and_does_autocorrection"
source = '''
a(1,2)
'''
corrected = '''
a(1, 2)
'''

[[tests.offenses]]
line = 1
column_start = 3
column_end = 4
message = "Space missing after comma."

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_space_registers_an_offense_for_no_space_between_a_comma_and_a_closing_brace"
source = '''
{ foo:bar,}
'''

[[tests.offenses]]
line = 1
column_start = 9
column_end = 10
message = "Space missing after comma."

[tests.config]
SpaceInsideHashLiteralBraces = { EnforcedStyle = "space" }

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_space_behaves_like_common_behavior_accepts_a_space_between_a_comma_and_a_closing_brace"
source = '''
{ foo:bar, }
'''
offenses = []

[tests.config]
SpaceInsideHashLiteralBraces = { EnforcedStyle = "space" }

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_no_space_accepts_no_space_between_a_comma_and_a_closing_brace"
source = '''
{foo:bar,}
'''
offenses = []

[tests.config]
SpaceInsideHashLiteralBraces = { EnforcedStyle = "no_space" }

[[tests]]
name = "rubocopcoplayoutspaceaftercomma_inside_hash_braces_when_enforcedstyle_for_spaceinsideblockbraces_is_no_space_behaves_like_common_behavior_accepts_a_space_between_a_comma_and_a_closing_brace"
source = '''
{ foo:bar, }
'''
offenses = []

[tests.config]
SpaceInsideHashLiteralBraces = { EnforcedStyle = "no_space" }
