cop: Layout/EndOfLine
department: layout
severity: convention
implemented: false

tests:
  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_native_registers_an_offense_for_an_incorrect_eol
    source: |
      x=0
      
      y=1
    offenses:
      - line: 3
        column_start: 0
        column_end: 3
        message: Carriage return character detected.
    config:
      EnforcedStyle: $UNRESOLVED:native
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_crlf_registers_an_offense_for_cr_lf
    source: |
      x=0
      
      y=1
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Carriage return character missing.
    config:
      EnforcedStyle: $UNRESOLVED:crlf
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_crlf_does_not_register_offense_for_no_cr_at_end_of_file
    source: |
      x=0
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:crlf
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_crlf_does_not_register_offenses_after_end
    source: |
      x=0
      __END__
      x=0
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:crlf
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_crlf_and_there_are_many_lines_ending_with_lf_registers_only_one_offense
    source: |
      x=0
      
      y=1
    offenses:
      - line: 1
        column_start: 0
        column_end: 3
        message: Carriage return character missing.
    config:
      EnforcedStyle: $UNRESOLVED:crlf
    interpolated: true
    verified: false

  - name: rubocop_cop_layout_endofline_when_enforcedstyle_is_crlf_and_the_default_external_encoding_is_us_ascii_does_not_crash_on_utf_8_encoded_non_ascii_characters
    source: |
      class Epd::ReportsController < EpdAreaController
        'terecht bij uw ROM-coördinator.'
      end
    offenses:
      []
    config:
      EnforcedStyle: $UNRESOLVED:crlf
    interpolated: true
    verified: false

