cop = "Layout/EndOfLine"
department = "layout"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_native_registers_an_offense_for_an_incorrect_eol"
source = '''
x=0

y=1
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "native"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_registers_an_offense_for_crlf"
source = '''
x=0

y=1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character missing."

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_does_not_register_offense_for_no_cr_at_end_of_file"
strip_trailing_newline = true
source = '''
x=0
'''
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_does_not_register_offenses_after___end__"
source = '''
x=0
__END__
x=0
'''
offenses = []

[tests.config]
EnforcedStyle = "crlf"

