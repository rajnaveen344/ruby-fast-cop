cop = "Layout/EndOfLine"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "native_registers_offense_for_incorrect_eol"
source = "x=0\n\ny=1\r\n"

[[tests.offenses]]
line = 3
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "native"

[[tests]]
name = "crlf_registers_offense_for_missing_cr"
source = "x=0\n\ny=1\r\n"

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character missing."

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "crlf_no_offense_for_no_cr_at_end_of_file"
strip_trailing_newline = true
source = "x=0"
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "crlf_does_not_register_offenses_after___end__"
source = "x=0\r\n__END__\nx=0\n"
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "crlf_accepts_empty_file"
strip_trailing_newline = true
source = ""
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "crlf_many_lf_lines_registers_only_one_offense"
