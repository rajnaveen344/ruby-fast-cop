cop = "Layout/EndOfLine"
department = "layout"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_native_registers_an_offense_for_an_incorrect_eol"
source = "x=0\n\ny=1\r"

[[tests.offenses]]
line = 3
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "native"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_registers_an_offense_for_crlf"
source = "x=0\n\ny=1\r"

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character missing."

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_does_not_register_offense_for_no_cr_at_end_of_file"
strip_trailing_newline = true
source = '''
x=0
'''
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_does_not_register_offenses_after___end__"
source = "x=0\r\n__END__\nx=0"
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_behaves_like_all_configurations_accepts_an_empty_file"
strip_trailing_newline = true
source = '''

'''
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_and_there_are_many_lines_ending_with_lf_registers_only_one_offense"
source = '''
x=0

y=1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character missing."

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_crlf_and_the_default_external_encoding_is_us_ascii_does_not_crash_on_utf8_encoded_nonascii_characters"
source = "class Epd::ReportsController < EpdAreaController\r\n  'terecht bij uw ROM-coördinator.'\r\nend\r"
offenses = []

[tests.config]
EnforcedStyle = "crlf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_registers_an_offense_for_crlf"
source = "x=0\n\ny=1\r"

[[tests.offenses]]
line = 3
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "lf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_registers_an_offense_for_cr_at_end_of_file"
source = "x=0\r"

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "lf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_does_not_register_offenses_after___end__"
source = "x=0\n__END__\nx=0\r"
offenses = []

[tests.config]
EnforcedStyle = "lf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_behaves_like_all_configurations_accepts_an_empty_file"
strip_trailing_newline = true
source = '''

'''
offenses = []

[tests.config]
EnforcedStyle = "lf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_and_there_are_many_lines_ending_with_crlf_registers_only_one_offense"
source = "x=0\r\n\r\ny=1"

[[tests.offenses]]
line = 1
column_start = 0
column_end = 3
message = "Carriage return character detected."

[tests.config]
EnforcedStyle = "lf"

[[tests]]
name = "rubocopcoplayoutendofline_when_enforcedstyle_is_lf_and_the_default_external_encoding_is_us_ascii_does_not_crash_on_utf8_encoded_nonascii_characters"
source = '''
class Epd::ReportsController < EpdAreaController
  'terecht bij uw ROM-coördinator.'
end
'''
offenses = []

[tests.config]
EnforcedStyle = "lf"
