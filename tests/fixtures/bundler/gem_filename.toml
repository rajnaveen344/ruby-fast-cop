cop = "Bundler/GemFilename"
department = "bundler"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopbundlergemfilename_with_default_configuration_enforcedstyle__gemfile_with_gemsrb_file_path_behaves_like_invalid_gem_file_registers_an_offense"
filename = "gems.rb"
source = '''
print 1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 0
message = "`gems.rb` file was found but `Gemfile` is required (file path: gems.rb)."

[tests.config]
EnforcedStyle = "Gemfile"
Include = ["**/Gemfile", "**/gems.rb", "**/Gemfile.lock", "**/gems.locked"]

