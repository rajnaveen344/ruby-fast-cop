  - name: rubocop_cop_bundler_gemcomment_when_investigating_gemfiles_and_the_file_contains_source_and_group_does_not_register_any_offenses
    source: |
      ‹BASE›0‹/BASE›
      source 'http://rubygems.org'
      
      # Style-guide enforcer.
      group :development do
        # …
      end
    offenses:
      []
    config:
      IgnoredGems: [$UNRESOLVED:rake]
      Include: ["**/Gemfile"]
      OnlyFor: []

  - name: rubocop_cop_bundler_gemcomment_when_investigating_gemfiles_and_a_gem_has_no_comment_registers_an_offense
    source: |
      gem 'rubocop'
    offenses:
      - line: 1
        column_start: 0
        column_end: 13
        message: Missing gem description comment.
    config:
      IgnoredGems: [$UNRESOLVED:rake]
      Include: ["**/Gemfile"]
      OnlyFor: []

