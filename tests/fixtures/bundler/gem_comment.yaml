cop: Bundler/GemComment
department: bundler
severity: convention
implemented: false

tests:
  - name: rubocop_cop_bundler_gemcomment_when_investigating_ruby_files_does_not_register_any_offenses
    source: |
      gem('rubocop')
    offenses:
      []
    config:
      IgnoredGems: [$UNRESOLVED:rake]
      Include: ["**/Gemfile"]
      OnlyFor: []

  - name: rubocop_cop_bundler_gemcomment_when_investigating_gemfiles_and_the_gem_is_commented_does_not_register_any_offenses
    source: |
      ‹BASE›0‹/BASE›
      # Style-guide enforcer.
      gem 'rubocop'
    offenses:
      []
    config:
      IgnoredGems: [$UNRESOLVED:rake]
      Include: ["**/Gemfile"]
      OnlyFor: []

  - name: rubocop_cop_bundler_gemcomment_when_investigating_gemfiles_and_the_gem_is_commented_on_the_same_line_does_not_register_any_offenses
