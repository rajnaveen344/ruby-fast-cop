      gem 'rubocop' # Style-guide enforcer.
    offenses:
      []
    config:
      IgnoredGems: [$UNRESOLVED:rake]
      Include: ["**/Gemfile"]
      OnlyFor: []

  - name: rubocop_cop_bundler_gemcomment_when_investigating_gemfiles_and_the_gem_is_permitted_does_not_register_any_offenses
    source: |
      gem 'rake'
