cop = "Bundler/InsecureProtocolSource"
department = "bundler"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopbundlerinsecureprotocolsource_registers_an_offense_when_using_source_gemcutter"
source = '''
source :gemcutter
'''
corrected = '''
source 'https://rubygems.org'
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 17
message = "The source `:gemcutter` is deprecated because HTTP requests are insecure. Please change your source to 'https://rubygems.org' if possible, or 'http://rubygems.org' if not."

[tests.config]
AllowHttpProtocol = true
Include = ["**/*.gemfile", "**/Gemfile", "**/gems.rb"]

