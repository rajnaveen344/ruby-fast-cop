cop = "Bundler/GemVersion"
department = "bundler"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_bundler_gemversion_when_enforcedstyle_is_set_to_required_default_flags_gems_that_do_not_specify_a_version"
source = '''
gem 'rubocop'
gem 'rubocop', require: false
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 0
column_end = 13
message = "Gem version specification is required."

[[tests.offenses]]
line = 2
column_start = 0
column_end = 29
message = "Gem version specification is required."

[tests.config]
AllowedGems = ["$UNRESOLVED:rspec"]
EnforcedStyle = "$UNRESOLVED:required"

[[tests]]
name = "rubocop_cop_bundler_gemversion_when_enforcedstyle_is_set_to_required_default_does_not_flag_gems_with_a_specified_version"
source = '''
gem 'rubocop', '>=1.10.0'
gem 'rubocop', '~> 1'
gem 'rubocop', '~> 1.12', require: false
gem 'rubocop', '>= 1.5.0', '< 1.10.0', git: 'https://github.com/rubocop/rubocop'
gem 'rubocop', branch: 'feature-branch'
gem 'rubocop', ref: 'b3f37bc7f'
gem 'rubocop', tag: 'v1'
'''
interpolated = true
verified = false
offenses = []

[tests.config]
AllowedGems = ["$UNRESOLVED:rspec"]
EnforcedStyle = "$UNRESOLVED:required"

[[tests]]
name = "rubocop_cop_bundler_gemversion_when_enforcedstyle_is_set_to_required_default_does_not_flag_gems_included_in_allowedgems_metadata"
source = '''
