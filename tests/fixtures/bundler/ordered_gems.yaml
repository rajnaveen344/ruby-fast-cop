cop: Bundler/OrderedGems
department: bundler
severity: convention
implemented: false

tests:
  - name: rubocop_cop_bundler_orderedgems_when_gems_are_alphabetically_sorted_does_not_register_any_offenses
    source: |
      gem 'rspec'
      gem 'rubocop'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_is_referenced_from_a_variable_ignores_the_line
    source: |
      gem 'rspec'
      gem ENV['env_key_undefined'] if ENV.key?('env_key_undefined')
      gem 'rubocop'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_is_referenced_from_a_variable_resets_the_sorting_to_a_new_block
    source: |
      gem 'rubocop'
      gem ENV['env_key_undefined'] if ENV.key?('env_key_undefined')
      gem 'ast'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_gems_are_not_alphabetically_sorted_registers_an_offense
    source: |
      gem 'rubocop'
      gem 'rspec'
    offenses:
      - line: 2
        column_start: 0
        column_end: 11
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `rspec` should appear before `rubocop`.
    corrected: |
      gem 'rspec'
      gem 'rubocop'
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_each_individual_group_of_line_is_sorted_does_not_register_any_offenses
    source: |
      gem 'rspec'
      gem 'rubocop'
      
      gem 'hello'
      gem 'world'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_declaration_takes_several_lines_registers_an_offense
    source: |
      gem 'rubocop',
          '0.1.1'
      gem 'rspec'
    offenses:
      - line: 3
        column_start: 0
        column_end: 11
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `rspec` should appear before `rubocop`.
    corrected: |
      gem 'rspec'
      gem 'rubocop',
          '0.1.1'
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_the_gemfile_is_empty_does_not_register_any_offenses
    source: |
      ‹BASE›0‹/BASE›
      # Gemfile
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_each_individual_group_of_line_is_not_sorted_registers_some_offenses
    source: |
      gem "d"
      gem "b"
      gem "e"
      gem "a"
      gem "c"
      
      gem "h"
      gem "g"
      gem "j"
      gem "f"
      gem "i"
    offenses:
      - line: 2
        column_start: 0
        column_end: 7
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `b` should appear before `d`.
      - line: 4
        column_start: 0
        column_end: 7
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `a` should appear before `e`.
      - line: 8
        column_start: 0
        column_end: 7
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `g` should appear before `h`.
      - line: 10
        column_start: 0
        column_end: 7
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `f` should appear before `j`.
    corrected: |
      gem "a"
      gem "b"
      gem "c"
      gem "d"
      gem "e"
      
      gem "f"
      gem "g"
      gem "h"
      gem "i"
      gem "j"
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_gem_groups_is_separated_by_multiline_comment_with_treatcommentsasgroupseparators_true_accepts
    source: |
      ‹BASE›0‹/BASE›
      # For code quality
      gem 'rubocop'
      # For
      # test
      gem 'rspec'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_gem_groups_is_separated_by_multiline_comment_with_treatcommentsasgroupseparators_false_registers_an_offense
    source: |
      ‹BASE›0‹/BASE›
      # For code quality
      gem 'rubocop'
      # For
      # test
      gem 'rspec'
    offenses:
      - line: 5
        column_start: 0
        column_end: 11
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `rspec` should appear before `rubocop`.
    corrected: |
      ‹BASE›0‹/BASE›
      # For
      # test
      gem 'rspec'
      # For code quality
      gem 'rubocop'
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_gems_have_an_inline_comment_and_not_sorted_registers_an_offense
    source: |
      gem 'rubocop' # For code quality
      gem 'pry'
      gem 'rspec'   # For test
    offenses:
      - line: 2
        column_start: 0
        column_end: 9
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `pry` should appear before `rubocop`.
    corrected: |
      gem 'pry'
      gem 'rspec'   # For test
      gem 'rubocop' # For code quality
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_gems_are_asciibetically_sorted_irrespective_of_does_not_register_an_offense
    source: |
      gem 'paperclip'
      gem 'paper_trail'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_that_starts_with_a_capital_letter_is_sorted_does_not_register_an_offense
    source: |
      gem 'a'
      gem 'Z'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_that_starts_with_a_capital_letter_is_not_sorted_registers_an_offense
    source: |
      gem 'Z'
      gem 'a'
    offenses:
      - line: 2
        column_start: 0
        column_end: 7
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `a` should appear before `Z`.
    corrected: |
      gem 'a'
      gem 'Z'
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_is_sorted_but_not_so_when_disregarding_by_default_registers_an_offense
    source: |
      gem 'active-admin-some_plugin'
      gem 'active_admin_other_plugin'
      gem 'activeadmin'
    offenses:
      - line: 2
        column_start: 0
        column_end: 31
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `active_admin_other_plugin` should appear before `active-admin-some_plugin`.
      - line: 3
        column_start: 0
        column_end: 17
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `activeadmin` should appear before `active_admin_other_plugin`.
    corrected: |
      gem 'activeadmin'
      gem 'active_admin_other_plugin'
      gem 'active-admin-some_plugin'
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_a_gem_is_sorted_but_not_so_when_disregarding_when_considerpunctuation_is_true_does_not_register_an_offense
    source: |
      gem 'active-admin-some_plugin'
      gem 'active_admin_other_plugin'
      gem 'activeadmin'
    offenses:
      []
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false

  - name: rubocop_cop_bundler_orderedgems_when_there_are_duplicated_gems_in_group_registers_an_offense
    source: |
      gem 'a'
      
      group :development do
        gem 'b'
        gem 'c'
        gem 'b'
      end
    offenses:
      - line: 6
        column_start: 2
        column_end: 9
        message: Gems should be sorted in an alphabetical order within their section of the Gemfile. Gem `b` should appear before `c`.
    corrected: |
      gem 'a'
      
      group :development do
        gem 'b'
        gem 'b'
        gem 'c'
      end
    config:
      TreatCommentsAsGroupSeparators: $UNRESOLVED:treat_comments_as_group_separators
    interpolated: true
    verified: false
