cop = "Security/Eval"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcopsecurityeval_registers_an_offense_for_eval_as_function"
source = '''
eval(something)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `eval` is a serious security risk."

