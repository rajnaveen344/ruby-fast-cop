cop = "Security/YAMLLoad"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcopsecurityyamlload_does_not_register_an_offense_for_yamldump"
source = '''
YAML.dump("foo")
::YAML.dump("foo")
Module::YAML.dump("foo")
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]

[[tests]]
name = "rubocopcopsecurityyamlload_does_not_register_an_offense_for_yamlload_under_a_different_namespace"
strip_trailing_newline = true
source = '''
Module::YAML.load("foo")
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]

[[tests]]
name = "rubocopcopsecurityyamlload_ruby__30_registers_an_offense_and_corrects_load_with_a_literal_string"
ruby_version = ">= 3.0"
source = '''
YAML.load("--- !ruby/object:Foo {}")
'''
corrected = '''
YAML.safe_load("--- !ruby/object:Foo {}")
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 9
message = "Prefer using `YAML.safe_load` over `YAML.load`."

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]

[[tests]]
name = "rubocopcopsecurityyamlload_ruby__30_registers_an_offense_and_corrects_a_fully_qualified_yamlload"
ruby_version = ">= 3.0"
source = '''
::YAML.load("--- foo")
'''
corrected = '''
::YAML.safe_load("--- foo")
'''

[[tests.offenses]]
line = 1
column_start = 7
column_end = 11
message = "Prefer using `YAML.safe_load` over `YAML.load`."

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]

[[tests]]
name = "rubocopcopsecurityyamlload_ruby__31_does_not_register_an_offense_load_with_a_literal_string"
ruby_version = ">= 3.1"
source = '''
YAML.load("--- !ruby/object:Foo {}", permitted_classes: [Foo])
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]

[[tests]]
name = "rubocopcopsecurityyamlload_ruby__31_does_not_register_an_offense_a_fully_qualified_yamlload"
ruby_version = ">= 3.1"
source = '''
::YAML.load("--- !ruby/object:Foo {}", permitted_classes: [Foo])
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/stdlib-2.7.0/libdoc/yaml/rdoc/YAML.html#module-YAML-label-Security"]
