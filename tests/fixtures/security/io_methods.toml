cop = "Security/IoMethods"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcopsecurityiomethods_when_using_io_receiver_and_variable_argument_registers_and_corrects_an_offense_when_using_foreach"
source = '''
IO.foreach(path) { |x| puts x }
'''
corrected = '''
File.foreach(path) { |x| puts x }
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 16
message = "`File.foreach` is safer than `IO.foreach`."

