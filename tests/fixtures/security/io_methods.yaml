cop: Security/IoMethods
department: security
severity: warning
implemented: false

tests:
  - name: rubocop_cop_security_iomethods
    source: |
      #{current}
    offenses:
      - line: 1
        column_start: 0
        column_end: 10
        message: "`File.#{method_name}` is safer than `IO.#{method_name}`."
    corrected: |
      #{preferred}
    interpolated: true

  - name: rubocop_cop_security_iomethods
    source: |
      #{code}
    offenses:
      []
    interpolated: true

  - name: rubocop_cop_security_iomethods_when_using_io_receiver_and_variable_argument_offense_io_read_path
    source: |
      IO.read(path)
    offenses:
      []

