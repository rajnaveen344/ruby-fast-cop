cop = "Security/JsonLoad"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_security_jsonload_registers_an_offense_and_corrects_json_load"
source = '''
JSON.load(arg)
::JSON.load(arg)
'''
corrected = '''
JSON.parse(arg)
::JSON.parse(arg)
'''

[[tests.offenses]]
line = 1
column_start = 5
column_end = 9
message = "Prefer `JSON.parse` over `JSON.load`."

[[tests.offenses]]
line = 2
column_start = 7
column_end = 11
message = "Prefer `JSON.parse` over `JSON.load`."

[[tests]]
name = "rubocop_cop_security_jsonload_registers_no_offense_when_create_additions_option_is_passed"
source = '''
JSON.load(arg, create_additions: true)
::JSON.load(arg, create_additions: false)
JSON.load(arg, { allow_nan: false, create_additions: true })
::JSON.load(arg, { allow_nan: false, create_additions: true })
JSON.load(arg, proc {}, create_additions: false, max_nesting: 19)
::JSON.load(arg, proc {}, create_additions: false, max_nesting: 19)
JSON.load(arg, -> {}, { max_nesting: 19, create_additions: false, allow_nan: true })
::JSON.load(arg, -> {}, { max_nesting: 19, create_additions: false, allow_nan: true })
'''
offenses = []

[[tests]]
name = "rubocop_cop_security_jsonload_registers_an_offense_when_an_unrelated_option_is_passed"
source = '''
