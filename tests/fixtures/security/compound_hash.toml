cop = "Security/CompoundHash"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_the_hash_method"
source = '''
def hash
  1.hash ^ 2.hash ^ 3.hash
end
'''

[[tests.offenses]]
line = 2
column_start = 2
column_end = 26
message = "Use `[...].hash` instead of combining hash values manually."

