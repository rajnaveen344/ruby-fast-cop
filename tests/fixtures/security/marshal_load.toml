cop = "Security/MarshalLoad"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcopsecuritymarshalload_registers_an_offense_for_using_marshalload"
source = '''
Marshal.load('{}')
::Marshal.load('{}')
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 12
message = "Avoid using `Marshal.load`."

[[tests.offenses]]
line = 2
column_start = 10
column_end = 14
message = "Avoid using `Marshal.load`."

[tests.config]
References = ["https://ruby-doc.org/core-2.7.0/Marshal.html#module-Marshal-label-Security+considerations"]

[[tests]]
name = "rubocopcopsecuritymarshalload_registers_an_offense_for_using_marshalrestore"
source = '''
Marshal.restore('{}')
::Marshal.restore('{}')
'''

[[tests.offenses]]
line = 1
column_start = 8
column_end = 15
message = "Avoid using `Marshal.restore`."

[[tests.offenses]]
line = 2
column_start = 10
column_end = 17
message = "Avoid using `Marshal.restore`."

[tests.config]
References = ["https://ruby-doc.org/core-2.7.0/Marshal.html#module-Marshal-label-Security+considerations"]

[[tests]]
name = "rubocopcopsecuritymarshalload_does_not_register_an_offense_for_marshaldump"
source = '''
Marshal.dump({})
::Marshal.dump({})
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/core-2.7.0/Marshal.html#module-Marshal-label-Security+considerations"]

[[tests]]
name = "rubocopcopsecuritymarshalload_does_not_register_an_offense_marshal_methods_under_another_namespace"
source = '''
SomeNamespace::Marshal.load('')
SomeNamespace::Marshal.restore('')
SomeNamespace::Marshal.dump('')
::SomeNamespace::Marshal.load('')
::SomeNamespace::Marshal.restore('')
::SomeNamespace::Marshal.dump('')
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/core-2.7.0/Marshal.html#module-Marshal-label-Security+considerations"]

[[tests]]
name = "rubocopcopsecuritymarshalload_allows_using_dangerous_marshal_methods_for_deep_cloning"
source = '''
Marshal.load(Marshal.dump({}))
Marshal.restore(Marshal.dump({}))
'''
offenses = []

[tests.config]
References = ["https://ruby-doc.org/core-2.7.0/Marshal.html#module-Marshal-label-Security+considerations"]
