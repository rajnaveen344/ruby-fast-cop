cop = "Security/Open"
department = "security"
severity = "warning"
implemented = false

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open"
source = '''
open(something)
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open_with_mode_argument"
source = '''
open(something, "r")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open_with_dynamic_string_that_is_not_prefixed"
source = '''
open("#{foo}.txt")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open_with_string_that_starts_with_a_pipe"
source = '''
open("| #{foo}")
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open_with_a_literal_string_starting_with_a_pipe"
source = '''
open('| foo')
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_open_with_a_block"
source = '''
open("#{foo}.txt") do |f|
  f.gets
end
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 4
message = "The use of `Kernel#open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_uriopen_with_string_that_starts_with_a_pipe"
source = '''
URI.open("| #{foo}")
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 8
message = "The use of `URI.open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_uriopen_with_string_that_starts_with_a_pipe_2"
source = '''
::URI.open("| #{foo}")
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 10
message = "The use of `::URI.open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_registers_an_offense_for_uriopen_with_a_block"
source = '''
::URI.open("| #{foo}") do |f|
  f.gets
end
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 10
message = "The use of `::URI.open` is a serious security risk."

[[tests]]
name = "rubocopcopsecurityopen_accepts_open_as_variable"
strip_trailing_newline = true
source = '''
open = something
'''
offenses = []

