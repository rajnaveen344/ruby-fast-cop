cop: Security/CompoundHash
department: security
severity: warning
implemented: false

tests:
  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_the_hash_method
    source: |
      def hash
        1.hash ^ 2.hash ^ 3.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_the_hash_method_even_without_sub_calls_to_hash
    source: |
      def hash
        1 ^ 2 ^ 3
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 11
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_the_hash_singleton_method
    source: |
      def object.hash
        1.hash ^ 2.hash ^ 3.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_a_dynamic_hash_method
    source: |
      define_method(:hash) do
        1.hash ^ 2.hash ^ 3.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_a_dynamic_hash_singleton_method
    source: |
      define_singleton_method(:hash) do
        1.hash ^ 2.hash ^ 3.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 26
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_delegating_to_array_hash_for_a_single_value
    source: |
      def hash
        [1].hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 10
        message: Delegate hash directly without wrapping in an array when only using a single value.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_if_hash_is_called_on_any_elements_of_a_hashed_array
    source: |
      [1, 2.hash, 3].hash
    offenses:
      - line: 1
        column_start: 4
        column_end: 10
        message: Calling .hash on elements of a hashed array is redundant.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_if_hash_is_called_on_any_elements_of_a_hashed_array_with_safe_navigation
    source: |
      def hash
        [foo&.hash, bar&.hash].hash
      end
    offenses:
      - line: 2
        column_start: 14
        column_end: 23
        message: Calling .hash on elements of a hashed array is redundant.
      - line: 2
        column_start: 3
        column_end: 12
        message: Calling .hash on elements of a hashed array is redundant.

  - name: rubocop_cop_security_compoundhash_does_not_register_an_offense_when_delegating_to_array_hash
    source: |
      def hash
        [1, 2, 3].hash
      end
    offenses:
      []

  - name: rubocop_cop_security_compoundhash_does_not_register_an_offense_when_delegating_to_a_single_object
    source: |
      def hash
        1.hash
      end
    offenses:
      []

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_operator_in_the_implementation_of_the_hash_method_even_if_intermediate_variable_is_used
    source: |
      def hash
        value = 1.hash ^ 2.hash ^ 3.hash
        value
      end
    offenses:
      - line: 2
        column_start: 10
        column_end: 34
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_assignment_operator_in_the_implementation_of_the_hash_method
    source: |
      def hash
        h = 0
      
        things.each do |thing|
          h ^= thing.hash
        end
      
        h
      end
    offenses:
      - line: 5
        column_start: 4
        column_end: 19
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_addition_assignment_operator_in_the_implementation_of_the_hash_method
    source: |
      def hash
        h = 0
      
        things.each do |thing|
          h += thing.hash
        end
      
        h
      end
    offenses:
      - line: 5
        column_start: 4
        column_end: 19
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_multiplication_assignment_operator_in_the_implementation_of_the_hash_method
    source: |
      def hash
        h = 0
      
        things.each do |thing|
          h *= thing.hash
        end
      
        h
      end
    offenses:
      - line: 5
        column_start: 4
        column_end: 19
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_addition_in_the_implementation_of_the_hash_method
    source: |
      def hash
        foo.hash + bar.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 21
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_multiplication_in_the_implementation_of_the_hash_method
    source: |
      def hash
        to_s.hash * -1
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 16
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_between_an_array_hash_and_a_class
    source: |
      def hash
        [red, blue, green, alpha].hash ^ self.class.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 50
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_involving_super
    source: |
      def hash
        foo.hash ^ super ^ bar.hash
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 29
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_xor_and_bitshifts
    source: |
      def hash
        foo.hash ^ bar.hash << 1 ^ biz.hash << 2 ^ bar.hash << 3
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 58
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_when_using_bitshift_and_or
    source: |
      def hash
        ([@addr, @mask_addr, @zone_id].hash << 1) | (ipv4? ? 0 : 1)
      end
    offenses:
      - line: 2
        column_start: 2
        column_end: 61
        message: Use `[...].hash` instead of combining hash values manually.

  - name: rubocop_cop_security_compoundhash_registers_an_offense_for_complex_usage
    source: |
      def hash
        @hash ||= begin
          hash_ = [@factory, geometry_type].hash
          (0...num_geometries).inject(hash_) do |h_, i_|
            (1664525 * h_ + geometry_n(i_).hash).hash
          end
        end
      end
    offenses:
      - line: 5
        column_start: 7
        column_end: 41
        message: Use `[...].hash` instead of combining hash values manually.
