cop: Naming/RescuedExceptionsVariableName
department: naming
severity: convention
implemented: false

tests:
  - name: rubocop_cop_naming_rescuedexceptionsvariablename_with_default_config_with_explicit_rescue_with_exception_variable_registers_an_offense_when_using_exc
    source: |
      begin
        something
      rescue MyException => exc
        # do something
      end
    offenses:
      - line: 3
        column_start: 22
        column_end: 25
        message: Use `e` instead of `exc`.
    corrected: |
      begin
        something
      rescue MyException => e
        # do something
      end

  - name: rubocop_cop_naming_rescuedexceptionsvariablename_with_default_config_with_explicit_rescue_with_exception_variable_registers_an_offense_when_using_exc
