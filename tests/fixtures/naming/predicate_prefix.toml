cop = "Naming/PredicatePrefix"
department = "naming"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopnamingpredicateprefix_with_restricted_prefixes_registers_an_offense_when_method_name_starts_with_is"
source = '''
def is_attr; end
'''

[[tests.offenses]]
line = 1
column_start = 4
column_end = 11
message = "Rename `is_attr` to `attr?`."

[tests.config]
AllowedMethods = ["is_a?"]
Exclude = ["/private/tmp/rubocop-repo/spec/**/*"]
ForbiddenPrefixes = ["has_", "is_"]
MethodDefinitionMacros = ["define_method", "define_singleton_method"]
NamePrefix = ["has_", "is_"]
UseSorbetSigs = false

