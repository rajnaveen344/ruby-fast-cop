[[tests]]
name = "rubocop_cop_naming_predicateprefix_using_sorbet_sigs_registers_an_offense_if_no_when_sig_returns_t_boolean_and_variants"
source = '''
sig do
  returns(T::Boolean)
end
def is_attr; end
'''

[[tests.offenses]]
line = 4
column_start = 4
column_end = 11
message = "Rename `is_attr` to `is_attr?`."

[tests.config]
AllowedMethods = ["is_a?"]
ForbiddenPrefixes = []
MethodDefinitionMacros = ["$UNRESOLVED:define_method", "$UNRESOLVED:def_node_matcher"]
NamePrefix = ["$UNRESOLVED:is_", "$UNRESOLVED:has_"]
UseSorbetSigs = "true"

