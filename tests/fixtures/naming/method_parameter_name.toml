cop = "Naming/MethodParameterName"
department = "naming"
severity = "convention"
implemented = false

[[tests]]
name = "rubocopcopnamingmethodparametername_does_not_register_for_method_without_parameters"
source = '''
def something
  do_stuff
end
'''
offenses = []

[tests.config]
AllowNamesEndingInNumbers = false
AllowedNames = ["as", "at", "by", "cc", "db", "id", "if", "in", "io", "ip", "of", "on", "os", "pp", "to"]
ForbiddenNames = []
MinNameLength = 3

