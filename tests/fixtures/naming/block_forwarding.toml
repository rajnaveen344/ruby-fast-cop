cop = "Naming/BlockForwarding"
department = "naming"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_naming_blockforwarding_when_enforcedstyle_anonymous_ruby_3_1_registers_and_corrects_an_offense_when_using_explicit_block_forwarding"
source = '''
def foo(&block)
  bar(&block)
  baz(qux, &block)
end
'''
corrected = '''
def foo(&)
  bar(&)
  baz(qux, &)
end
'''
ruby_version = ">= 3.1"
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 8
column_end = 14
message = "Use anonymous block forwarding."

[[tests.offenses]]
line = 2
column_start = 6
column_end = 12
message = "Use anonymous block forwarding."

[[tests.offenses]]
line = 3
column_start = 11
column_end = 17
message = "Use anonymous block forwarding."

[tests.config]
EnforcedStyle = "$UNRESOLVED:anonymous"

