cop: Naming/BlockForwarding
department: naming
severity: convention
implemented: false

tests:
  - name: rubocop_cop_naming_blockforwarding_when_enforcedstyle_anonymous_ruby_3_1_registers_and_corrects_an_offense_when_using_explicit_block_forwarding
    source: |
      def foo(&block)
        bar(&block)
        baz(qux, &block)
      end
    offenses:
      - line: 1
        column_start: 8
        column_end: 14
        message: Use anonymous block forwarding.
      - line: 2
        column_start: 6
        column_end: 12
        message: Use anonymous block forwarding.
      - line: 3
        column_start: 11
        column_end: 17
        message: Use anonymous block forwarding.
    corrected: |
      def foo(&)
        bar(&)
        baz(qux, &)
      end
    config:
      EnforcedStyle: anonymous
    ruby_version: ">= 3.1"

  - name: rubocop_cop_naming_blockforwarding_when_enforcedstyle_anonymous_ruby_3_1_registers_and_corrects_an_offense_when_using_explicit_block_forwarding_in_singleton_method
    source: |
      def self.foo(&block)
        self.bar(&block)
        self.baz(qux, &block)
      end
    offenses:
      - line: 1
        column_start: 13
        column_end: 19
        message: Use anonymous block forwarding.
      - line: 2
        column_start: 11
        column_end: 17
        message: Use anonymous block forwarding.
      - line: 3
        column_start: 16
        column_end: 22
        message: Use anonymous block forwarding.
    corrected: |
      def self.foo(&)
        self.bar(&)
        self.baz(qux, &)
      end
    config:
      EnforcedStyle: anonymous
    ruby_version: ">= 3.1"

  - name: rubocop_cop_naming_blockforwarding_when_enforcedstyle_anonymous_ruby_3_1_registers_and_corrects_an_offense_when_using_symbol_proc_argument_in_method_body
