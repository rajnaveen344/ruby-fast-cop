cop = "Naming/FileName"
department = "naming"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopnamingfilename_with_camelcase_file_names_ending_in_rb_registers_an_offense"
filename = "/some/dir/testCase.rb"
source = '''
print 1
'''

[[tests.offenses]]
line = 1
column_start = 0
column_end = 1
message = "{} The name of this source file (`testCase.rb`) should use snake_case."

[tests.config]
CheckDefinitionPathHierarchy = true
CheckDefinitionPathHierarchyRoots = ["lib", "spec", "test", "src"]
ExpectMatchingDefinition = false
IgnoreExecutableScripts = true
Regex = ""

