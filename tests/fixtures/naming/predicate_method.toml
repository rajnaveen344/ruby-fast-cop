implemented = false

[[tests]]
name = "rubocop_cop_naming_predicatemethod_implicit_return_registers_an_offense_when_the_method_name_does_not_end_with"
source = '''
def foo
  #{return_statement}
end
'''
interpolated = true
verified = false

[[tests.offenses]]
line = 1
column_start = 4
column_end = 7
message = "Predicate method names should end with `?`."

