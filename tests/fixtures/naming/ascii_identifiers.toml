cop = "Naming/AsciiIdentifiers"
department = "naming"
severity = "convention"
implemented = true

[[tests]]
name = "rubocopcopnamingasciiidentifiers_when_asciiconstants_is_true_registers_an_offense_for_a_constant_name_with_nonascii_chars"
source = '''
