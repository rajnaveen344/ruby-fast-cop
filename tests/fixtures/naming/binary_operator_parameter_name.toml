[[tests]]
name = "rubocop_cop_naming_binaryoperatorparametername_registers_an_offense_and_corrects_when_argument_is_referenced_in_method_body"
source = '''
def +(arg)
  lvar = 'lvar'
  do_something(arg, lvar)
end
'''
corrected = '''
def +(other)
  lvar = 'lvar'
  do_something(other, lvar)
end
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "When defining the `+` operator, name its argument `other`."

[[tests]]
name = "rubocop_cop_naming_binaryoperatorparametername_registers_an_offense_and_corrects_when_assigned_to_argument_in_method_body"
source = '''
def +(arg)
  arg = do_something
end
'''
corrected = '''
def +(other)
  other = do_something
end
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "When defining the `+` operator, name its argument `other`."

