cop = "Naming/BinaryOperatorParameterName"
department = "naming"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_naming_binaryoperatorparametername_registers_an_offense_and_corrects_for_when_argument_is_not_named_other"
source = '''
def +(foo); end
'''
corrected = '''
def +(other); end
'''

[[tests.offenses]]
line = 1
column_start = 6
column_end = 9
message = "When defining the `+` operator, name its argument `other`."

