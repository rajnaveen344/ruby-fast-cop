cop = "Naming/HeredocDelimiterNaming"
department = "naming"
severity = "convention"
implemented = false

[[tests]]
name = "rubocop_cop_naming_heredocdelimiternaming_with_an_interpolated_heredoc_registers_an_offense_with_a_non_meaningful_delimiter"
source = '''
<<-END
  foo
END
'''

[[tests.offenses]]
line = 3
column_start = 0
column_end = 3
message = "Use meaningful heredoc delimiters."

[tests.config]
ForbiddenDelimiters = ["END"]

[[tests]]
name = "rubocop_cop_naming_heredocdelimiternaming_with_an_interpolated_heredoc_does_not_register_an_offense_with_a_meaningful_delimiter"
