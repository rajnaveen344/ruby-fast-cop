  - name: rubocop_cop_naming_heredocdelimitercase_when_enforced_style_is_uppercase_with_an_interpolated_heredoc_registers_an_offense_and_corrects_with_a_lowercase_delimiter
    source: |
      <<-sql
        foo
      sql
    offenses:
      - line: 3
        column_start: 0
        column_end: 3
        message: Use uppercase heredoc delimiters.
    corrected: |
      <<-SQL
        foo
      SQL
    config:
      SupportedStyles: [uppercase, lowercase]
      EnforcedStyle: uppercase

